ביותר. ההמלצה היא רק לחמי מחמצת (או ללא לחם כלל) וגבינות טבעוניות ללא שמרי בירה. קלפרוטקטין כן מסייע במעקב; האבחון כולל גם תסמינים+סיפור, מדדי דלקת בדם, וקולונוסקופיה/גסטרוסקופיה/קפסולה; ו-MAP מוזכר בהקשר לסיבת ההימנעות מחלב בקרוהן. שקופית: 83 - תזכורת, חלב ושמרים בקרוהן","slides":"","section":"A"},{"n":19,"text":"אילו מהקביעות הבאות לגבי קלפרוטקטין נכונות?","options":{"A":"קלפרוטקטין הוא חלבון קושר סידן הנמצא בתאי דם לבנים מסוג נויטרופילים.","B":"נויטרופילים מוזעקים לאתר הדלקת גם בשל חדירת חיידקים לרירית המעי הפגועה.","C":"לנויטרופילים יש משך חיים קצר מאוד, והם מתוכנתים למות במהירות יחסית.","D":"הסיבה שקלפרוטקטין יוצא שלם בצואה היא שהוא לא עבר דנטורציה בקיבה, בניגוד לחלבונים אחרים.","E":"השימוש במדד הקלפרוטקטין חוסך את הצורך בבדיקות גסטרוסקופיה/קולונוסקופיה תכופות למעקב אחר מהלך המחלה.","F":"במעי רגיש (IBS), בדיקת קלפרוטקטין צפויה להיות תקינה.","G":"רמת קלפרוטקטין גבוהה משמעותית מרמזת על דלקת פעילה במעי, ולא רק על זיהום חולף."},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"קלפרוטקטין הוא חלבון קושר סידן בנויטרופילים; נויטרופילים מוזעקים למקום הדלקת וחדירת החיידקים, \"מתאבדים\" בלחימה בהם, וממילא בעלי משך חיים קצר; לאחר מותם משתחררים לחלל המעי ויוצאים בצואה בשלמותם כי לא עברו דנטורציה בקיבה; המדד חוסך בדיקות פולשניות תכופות; ב-IBS התוצאה תקינה; ורמה גבוהה (מעל הסף הנמוך) מרמזת על דלקת פעילה. שקופית: 84-85 - קלפרוטקטין","slides":"","section":"A"},{"n":20,"text":"אילו מהקביעות הבאות לגבי הטיפול התזונתי בהחמרת קרוהן/קוליטיס נכונות?","options":{"A":"דיאטת אורז (לבן), שהיא תזונה דלת סיבים, מוצגת כגישה המקובלת בעת החמרה.","B":"בזמן החמרה, מומלץ להרבות בירקות חיים כדי להעשיר את התזונה בסיבים תזונתיים.","C":"בזמן התקף קשה, ניתן לעבור לשלב של מיצים בלבד.","D":"תזונה קטוגנית תוארה כמזיקה במיוחד לחולים בזמן החמרה, בניגוד לגישות האחרות.","E":"לכל החולים יש נוסחה זהה אחת שמתאימה תמיד לזמן החמרה.","F":"צום מים אינו נשקל כלל במקרים אלו, גם לא אצל מטופלים שאינם בתת משקל.","G":"פירות מומלצים בכמות גדולה לכל החולים בזמן החמרה, ללא יוצא מן הכלל."},"answer":["A","C"],"multi":true,"explanation":"הגישה המקובלת בהחמרה היא דיאטת אורז לבן (דלת סיבים); בזמן התקף קשה אפשר לעבור למיצים בלבד, ולעיתים אף לצום מים אם המטופל אינו בתת משקל. בזמן החמרה נמנעים מירקות חיים (רק מאודים ומרקים), ומפירות שגורמים לבעיה אצל חלק מהחולים; לעומת זאת תזונה קטוגנית דווקא עזרה מאוד לחלק מהחולים; ואין נוסחה אחת שמתאימה לכולם. שקופית: 86 - הטיפול התזונתי בהחמרת קרוהן/קוליטיס","slides":"","section":"A"},{"n":21,"text":"אילו מהקביעות הבאות לגבי המחקר על הפעלת המערכת הסימפתטית והמערכת החיסונית (Kox et al., 2014) נכונות?","options":{"A":"במחקר שהוצג, קבוצת המחקר תרגלה נשימות מהירות מלוות בעצירת נשימה יחד עם טבילה במי קרח, בעוד קבוצת הביקורת לא עשתה דבר.","B":"השערת המחקר הייתה שהפעלת המערכת הפאראסימפתטית (ולא הסימפתטית) תוביל להפחתת הדלקת","C":"פעילות סימפתטית, על פי המוצג, מחזקת את פעילות המערכת החיסונית המולדת ומגבירה דלקת","D":"קבוצת המחקר הפרישה פחות אדרנלין מקבוצת הביקורת; במחלות אוטואימוניות יש בדרך כלל חוסר בציטוקינים דלקתיים, ולא עודף","E":"הרעלן (אנדוטוקסין) הוזרק לגוף הנבדקים דרך מערכת העיכול ולא ישירות למחזור הדם; תוצאות המחקר הראו שסימני השפעת היו חמורים יותר בקבוצת המחקר לעומת קבוצת הביקורת"},"answer":["A"],"multi":false,"explanation":"קבוצת המחקר תרגלה נשימות מהירות מלוות בעצירת נשימה וטבילה במי קרח, לעומת קבוצת הביקורת שלא עשתה דבר. ההשערה עסקה בהפעלת המערכת הסימפתטית (לא הפאראסימפתטית), שמחלישה את המערכת החיסונית המולדת. הרעלן הוזרק ישירות למחזור הדם. בקבוצת המחקר הייתה הפרשת יתר של אדרנלין, וסימני שפעת מופחתים (לא חמורים יותר). שקופית: 88-89 - הפעלת המערכת הסימפתטית ומחלות אוטואימוניות","slides":"","section":"A"},{"n":22,"text":"אילו מהקביעות הבאות לגבי זונולין ומעי דליף נכונות?","options":{"A":"זונולין הינו חלבון שמופרש מתאי המעי כדי לפתוח את הצמתים בין תאי אפיתל המעי בעת הצורך.","B":"בין הגורמים להפרשת יתר של זונולין נמנים לקטינים (כגון גליאדין בחולי צליאק), דיסביוזיס, סטרס כרוני, NSAIDs וצריכת אלכוהול רבה.","C":"פתיחת הצמתים בין תאי המעי בעת קלקול קיבה נועדה, בין השאר, לאפשר \"שטיפה חוצה\" של חיידקים מזיקים.","D":"זונולין התגלה לראשונה לפני יותר מ-100 שנה, במאה ה-19.","E":"הפרשת זונולין היא תמיד תהליך פתולוגי בלבד, ללא כל תפקיד פיזיולוגי תקין.","F":"סטרס כרוני אינו נחשב גורם אפשרי להפרשת יתר של זונולין.","G":"לאחר אירוע חד-פעמי של קלקול קיבה, המעי אינו מסוגל להיסגר מחדש ונשאר פתוח לצמיתות."},"answer":["A","B","C"],"multi":true,"explanation":"זונולין מופרש מתאי המעי כדי לפתוח צמתים בין תאי האפיתל בעת הצורך; מופרש ביתר בעקבות לקטינים, דיסביוזיס, סטרס כרוני, NSAIDs ואלכוהול; פתיחת הצמתים בקלקול קיבה היא תגובה קצרת טווח תקינה לשטיפה חוצה וזיהוי פתוגנים, והמעי יודע להיסגר מחדש מיד לאחר מכן. זונולין התגלה בשנת 2000, לא במאה ה-19. שקופית: 90-91 - זונולין ומעי דליף","slides":"","section":"A"},{"n":23,"text":"אילו מהקביעות הבאות לגבי הטיפול במעי דליף נכונות?","options":{"A":"המעי, לפי המוצג, אינו מסוגל להשתקם בעצמו וזקוק תמיד להתערבות תרופתית משמעותית.","B":"הימנעות מסוכר (כולל מקורות טבעיים מרוכזים) אינה חלק מהאסטרטגיה לטיפול במעי דליף.","C":"בדיקת זונולין מוצגת כהכרחית לחלוטין לפני תחילת כל טיפול במעי דליף.","D":"מזון מותסס ומזון פרה-ביוטי מומלצים להינתן מיד בתחילת הטיפול, לפני כל \"תקופת מנוחה\".","E":"הפחתת סטרס אינה נחשבת גורם רלוונטי בטיפול במעי דליף.","F":"במחלה אוטואימונית, אין שום היגיון להניח שקיים גם מעי דליף במקביל.","G":"סיבים תזונתיים אינם מומלצים כלל בטיפול במעי דליף.","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"המעי יודע להשתקם בעצמו, רק צריך לא להפריע לו (הסרת הטריגר); הימנעות מסוכר כן חלק מהאסטרטגיה; בדיקת זונולין אינה הכרחית; מזון מותסס ופרה-ביוטי ניתנים לאחר \"תקופת המנוחה\" ולא לפניה; הפחתת סטרס וסיבים כן חלק מהטיפול; ובכל מחלה אוטואימונית יש היגיון להניח שקיים גם מעי דליף. שקופית: 92 - טיפול במעי דליף","slides":"","section":"A"},{"n":24,"text":"אילו מהקביעות הבאות לגבי תת פעילות בלוטת התריס נכונות?","options":{"A":"בין תסמיני תת פעילות בלוטת התריס נמנים עייפות, קושי בירידה במשקל ורגישות לקור.","B":"מחלה אוטואימונית עם נוגדנים כנגד בלוטת התריס (השימוטו) נחשבת לאחת הסיבות האפשריות לתת פעילות.","C":"חוסר יוד כרוני ומשמעותי מוזכר כגורם אפשרי לתת פעילות.","D":"חוסר בסלניום כפקטור לתהליך ההמרה (מ-T4 ל-T3) מוזכר כגורם אפשרי.","E":"כלור וגויטרוגנים (כגון סויה ומצליבים) עלולים להפריע לקליטת יוד לבלוטה.","F":"אחת ההמלצות במקרי תת פעילות היא להימנע מבריכות שחייה, ולהשתמש במטהר מים שמסלק כלור ופלואור.","G":"נשירת שיער וקשיי ריכוז נמנים בין הסימפטומים הנפוצים לתת פעילות בלוטת התריס."},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל הפרטים מדויקים לפי השקופיות - תסמיני תת פעילות (עייפות, קושי בירידה במשקל, רגישות לקור, נשירת שיער, קשיי ריכוז ועוד), הסיבות (מחלה אוטואימונית, חוסר יוד, חוסר סלניום), וגורמי ההפרעה בקליטת יוד (כלור, גויטרוגנים), עם ההמלצה המעשית להימנע מבריכות ולסנן כלור ופלואור במים. שקופית: 96-97 - הסיבות והסימפטומים לתת פעילות בלוטת התריס","slides":"","section":"A"},{"n":25,"text":"אילו מהקביעות הבאות לגבי הטיפול הקונבנציונלי בתת פעילות בלוטת התריס נכונות?","options":{"A":"הטיפול הסינטטי (כגון אלטרוקסין, יוטירוקס, סינתרואיד) יעיל כאשר הבעיה היא בלוטה \"עצלה\".","B":"הטיפול הקונבנציונלי הסינטטי תמיד פותר את בעיית ההמרה מ-T4 ל-T3, גם כאשר הבעיה בהמרה חמורה.","C":"אחת הבעיות המיוחסות לטיפול הקונבנציונלי היא גרימת ניוון נוסף לבלוטה.","D":"הטיפול הסינטטי מטפל תמיד בשורש הבעיה, גם במקרה של מחלה אוטואימונית.","E":"בהריון, אם הטיפול הטבעי לא הצליח לאזן את הבלוטה, אין כל מקום לשקול טיפול תרופתי.","F":"לבעיה קלה בתהליך ההמרה, הטיפול הסינטטי לעולם אינו מסייע ותמיד מחמיר את המצב.","G":"במקרה של בלוטה \"עצלה\" (ולא בעיה אוטואימונית), הטיפול הסינטטי אינו יעיל כלל."},"answer":["A","C"],"multi":true,"explanation":"הטיפול הסינטטי יעיל בבלוטה \"עצלה\", אך אינו מתמודד עם שורש הבעיה במחלה אוטואימונית, לא יעזור אם יש בעיה חמורה בהמרה (אם כי יעזור בבעיה קלה בהמרה), ואף עלול לגרום לניוון נוסף של הבלוטה. בהריון, אם הטיפול הטבעי לא הצליח - \"בוודאי שלקחת\" את הטיפול התרופתי. שקופית: 98 - הטיפול הקונבנציונלי בתת פעילות","slides":"","section":"A"},{"n":26,"text":"אילו מהקביעות הבאות לגבי מחלה אוטואימונית בבלוטת התריס נכונות?","options":{"A":"גם כאשר TSH תקין, כדאי לשקול לבקש בדיקות Anti-TG ו-Anti-TPO, כיוון שהגוף עשוי לשמור על רמה תקינה חרף מאבק הנוגדנים שגורם לעייפות.","B":"Anti-TG ו-Anti-TPO הן בדיקות שאינן קשורות כלל לאבחון מחלה אוטואימונית בבלוטת התריס","C":"רעלים סביבתיים אינם נזכרים כלל (אפילו כשאלה) כגורם אפשרי בהקשר של מחלה אוטואימונית","D":"TSH תקין שולל לחלוטין קיום מאבק אוטואימוני כלשהו נגד הבלוטה; סטרס ולחץ נפשי אינם נחשבים כלל טריגר אפשרי למחלה אוטואימונית","E":"נטייה גנטית אינה מוזכרת כלל כגורם אפשרי למחלה אוטואימונית בבלוטת התריס; גלוטן, מוצרי חלב וסויה מומלצים דווקא להגברת הצריכה במקרה של תת פעילות בלוטת התריס"},"answer":["A"],"multi":false,"explanation":"אף שה-TSH תקין, כדאי לבקש נוגדנים כי הגוף עשוי לשמור על איזון חרף מאבק הנוגדנים - ומאבק זה עצמו גורם לעייפות. סטרס, גלוטן/חלב/סויה (בהימנעות ולא בהגברה), נטייה גנטית, ורעלים סביבתיים (כשאלה) כולם מופיעים כגורמים אפשריים או להימנעות. שקופית: 99 - מה עלול לגרום למחלה אוטואימונית / איך מזהים","slides":"","section":"A"},{"n":27,"text":"אילו מהקביעות הבאות לגבי אלצהיימר וקשר להשכלה נכונות?","options":{"A":"סוכרת מוזכרת כגורם סיכון מרכזי לאלצהיימר.","B":"נשים נמצאות בסיכון מוגבר יותר מגברים לפתח אלצהיימר.","C":"עיסוק בפעילות אינטלקטואלית מוגברת מפחית את הסיכון הכולל לחלות באלצהיימר.","D":"לפי חלק מהמחקרים, ההידרדרות לאחר הופעת המחלה מהירה יותר בקרב אנשים משכילים.","E":"אלצהיימר אינה מחלה פרוגרסיבית, ולרוב מצבו של החולה משתפר עם הזמן ללא טיפול.","F":"עיסוק בפעילות אינטלקטואלית גורם להופעת המחלה בגיל צעיר יותר, ולא מאוחר יותר.","G":"אין שום נטייה גנטית מובהקת לאלצהיימר, ומדובר במחלה סביבתית בלבד."},"answer":["A","B","D"],"multi":true,"explanation":"סוכרת היא גורם סיכון מרכזי; נשים בסיכון מוגבר מגברים; יש נטייה גנטית מובהקת; המחלה פרוגרסיבית. הסיכון לחלות זהה בקרב עוסקים בפעילות אינטלקטואלית (לא מופחת) - אך המחלה מופיעה בגיל מאוחר יותר בזכות קשרים נוירונליים מרובים, ולפי חלק מהמחקרים ההידרדרות לאחר ההופעה מהירה יותר בקרב משכילים. שקופית: 103-104 - אלצהיימר, דגשים וקשר להשכלה","slides":"","section":"A"},{"n":28,"text":"אילו מהקביעות הבאות לגבי מצבים בהם נשקלת תזונה קטוגנית נכונות?","options":{"A":"הכניסה לקטוזיס מתרחשת כבר ביום הראשון לתזונה קטוגנית.","B":"תזונה קטוגנית אינה נשקלת כלל במקרים של אפילפסיה.","C":"תזונה קטוגנית מומלצת אך ורק במקרים של עודף משקל, ואינה רלוונטית למצבים נוירולוגיים.","D":"אין כל תועלת בשימוש במד קטונים או במחשבון תזונה בעת מעבר לתזונה קטוגנית.","E":"תזונה קטוגנית אינה נשקלת בהקשר של גידולים סרטניים.","F":"דיכאון קליני, חרדות ואוטיזם אינם נמנים בין המצבים בהם נשקלת תזונה קטוגנית.","G":"תזונה קטוגנית מתאימה במיוחד למקרים של תסמונת טורט וטיקים, אך אינה נחשבת לגישה אפשרית בבעיות קשב וריכוז קשות.","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"הכניסה לקטוזיס מתרחשת רק מהיום השלישי; תזונה קטוגנית כן נשקלת באפילפסיה, בגידולים במוח ובכל גידול סרטני, בדיכאון קליני/חרדות/אוטיזם, ובבעיות קשב וריכוז קשות (יחד עם טיקים/תסמונת טורט), ומומלץ להשתמש במחשבון תזונה או מד קטונים כדי לעקוב אחר הכניסה לקטוזיס. שקופית: 106 - פרטים נוספים בתזונה קטוגנית, באיזה מצבים נשקול","slides":"","section":"A"},{"n":29,"text":"אילו מהקביעות הבאות לגבי פרקינסון נכונות?","options":{"A":"במחלת פרקינסון, תאי מוח המייצרים דופמין מתים בהדרגה.","B":"בבדיקה פתולוגית שלאחר המוות מזוהים בתאי המוח גושי חלבון הנקראים אלפא סינוקלאין.","C":"רוב המחקרים הראו דווקא סיכון מופחת לפרקינסון בקרב אנשים עם כולסטרול גבוה.","D":"לא נמליץ לחולה פרקינסון להיגמל מקפה.","E":"פעילות גופנית מכל סוג, כולל הליכה, שחייה ותרגול שיווי משקל, מומלצת לחולי פרקינסון.","F":"ניקוטין מגן על המוח מפני פרקינסון, ולכן יש היגיון בשימוש במדבקות ניקוטין.","G":"הירקות הסולניים (ממשפחת הסולניים) הם מקור לניקוטין הנזכר בהקשר להגנה מפני פרקינסון."},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל הפרטים מופיעים בשקופיות פרקינסון - מוות הדרגתי של תאי דופמין, גושי אלפא סינוקלאין, רוב המחקרים מראים סיכון מופחת בכולסטרול גבוה, אין המלצה להיגמל מקפה, פעילות גופנית מכל סוג מומלצת, וניקוטין (הנמצא בירקות סולניים) מגן על המוח - ולכן יש היגיון במדבקות ניקוטין. שקופית: 107-108 - פרקינסון, דגשים טיפוליים ותזונתיים","slides":"","section":"A"},{"n":30,"text":"אילו מהקביעות הבאות לגבי השינויים ההורמונליים בפרהמנופאוזה נכונות?","options":{"A":"הפרוגסטרון הוא ההורמון הראשון שמתחיל לרדת בפרהמנופאוזה, כיוון שיש מחזורים ללא ביוץ.","B":"פרהמנופאוזה נחשבת לשלב היציב ביותר מבחינה הורמונלית, ללא שינויים חדים.","C":"רמת ה-FSH עולה בפרהמנופאוזה מכיוון שהשחלה \"לא מגיבה\" מבחינת ההיפופיזה.","D":"טסטוסטרון יורד בפרהמנופאוזה בצורה חדה יותר מהאסטרוגן.","E":"קל מאוד לאבחן בבדיקת דם בודדת שאישה נכנסה לפרהמנופאוזה, כיוון שהתוצאות יציבות.","F":"מנופאוזה מוגדרת כשלושה חודשים בלבד ללא ווסת.","G":"LH (הורמון הביוץ) יורד בפרהמנופאוזה, בניגוד ל-FSH שעולה."},"answer":["A","C"],"multi":true,"explanation":"הפרוגסטרון יורד ראשון בשל מחזורים ללא ביוץ (אין גופיף צהוב); זהו השלב הכי \"כאוטי\" הורמונלית עם שינויים חדים, לא היציב ביותר; FSH ו-LH שניהם עולים (לא רק FSH); טסטוסטרון יורד בהדרגה אך לא בחדות כמו האסטרוגן; קשה מאוד לאבחן כי התוצאות משתנות בחדות מיום ליום; ומנופאוזה מוגדרת כ-12 חודשים ללא ווסת, לא שלושה. שקופית: 123 - פרהמנופאוזה","slides":"","section":"A"},{"n":1,"text":"מטופל בן 55 עם סכרת מסוג 2, המנטר את רמות הסוכר שלו, מדווח כי הוא עקבית מתעורר עם רמת סוכר גבוהה יותר מהרמה שהייתה לו בעת ההליכה לישון, למרות שלא אכל דבר בלילה. הרופא המטפל שלו הציע לו לאכול חטיף קטן לפני השינה כדי למנוע זאת. אילו מהקביעות הבאות נכונות ביחס למקרה זה?","options":{"A":"זהו כנראה תסמונת השחר, המעידה שהמטופל עדיין עמיד לאינסולין; אין צורך בטיפול מיוחד, והתסמונת צפויה להיעלם ככל שהרגישות לאינסולין תשתפר.","B":"ההמלצה של הרופא לאכול לפני השינה היא הגישה המועדפת לטיפול בתופעה, על פי עמדת המרצה בהרצאה","C":"יש לחשוד תחילה בהיפוגליקמיה לילית ולהפסיק לאלתר את כל התרופות לסכרת; יש להגביר מיידית את מינון תרופות הסוכר בעקבות תופעה זו, ללא כל בירור נוסף","D":"יש להימנע מכל שינוי תזונתי נוסף כיוון שהמצב מעיד בהכרח על בעיה חמורה בכבד; יש לבצע מיד קולונוסקופיה לבירור הממצא; תופעה זו מוכיחה שהמטופל נרפא לחלוטין מהסכרת"},"answer":["A"],"multi":false,"explanation":"לקראת הבוקר הכבד מפרק גליקוגן לגלוקוז, ותהליך זה חזק יותר אצל סכרתיים (כי תאיהם \"מרגישים\" חוסר בסוכר). התסמונת מעידה שהמטופל עדיין עמיד לאינסולין, אינה דורשת טיפול מיוחד, וצפויה להיעלם עם שיפור הרגישות לאינסולין. המרצה חולק במפורש על ההמלצה לאכול לפני השינה וקורא לה \"טעות\". שקופית: 67-68 - תסמונת השחר","slides":"","section":"B"},{"n":2,"text":"אישה בת 30 מגיעה עם נפיחות כרונית, שלשולים ועצירות לסירוגין, כאבי בטן וגזים, המחמירים לאחר אכילת בצל, שום וקטניות. היא מבקשת להבין את גישת ה-FODMAP והעקרונות הטיפוליים הנוספים שניתן להציע לה","options":{"A":"להמליץ לה על הימנעות מבצל, שום וקטניות, לצד הקפדה על כללי אכילה (עיתוי, לעיסה, לא לשתות עם האוכל) ובחינת הקשר למצב הנפשי.","B":"להמליץ לה לצרוך יותר דבש וסילאן כתחליף ממתיק בריא לסוכר לבן.","C":"להמליץ לה על תזונה עתירת ארטישוק ירושלמי וכרישה להעשרת הסיבים.","D":"להמליץ לה לשלב פעילות גופנית סדירה, שכן זו נחשבת מקלה מאוד על תסמיני התסמונת.","E":"להסביר לה שקיים פרוטוקול אחיד המתאים לכל חולי המעי הרגיז ללא צורך בהתאמה אישית.","F":"להמליץ לה להימנע לחלוטין מכל הירקות, כיוון שכל הירקות אסורים בדיאטת FODMAP.","G":"להציע לשקול בהמשך גם תזונה דלת לקטינים (כגון פליאו/קטוגני) אם הגישה הראשונית לא מספיקה."},"answer":["A","D","G"],"multi":true,"explanation":"בצל, שום וקטניות מכילים אוליגוסכרידים (FODMAP) ויש להימנע מהם; דבש/סילאן ואגבה הם מקורות שיש להימנע מהם; ארטישוק וכרישה מכילים אינולין ולכן אסורים; פעילות גופנית מקלה מאוד; אין נוסחה אחידה לכולם; לא כל הירקות אסורים; ותזונה דלת לקטינים (פליאו/קטוגני) יכולה להישקל כהמשך הטיפול. שקופית: 76-78 - Fodmap diet / דגשים לטיפול טבעי במעי רגיש","slides":"","section":"B"},{"n":3,"text":"גבר בן 24 עם מחלת קרוהן ידועה חווה החמרה חריפה עם כאבי בטן קשים ושלשולים. הוא אינו בתת משקל. הוא שואל אילו עקרונות תזונתיים עשויים לסייע בתקופה החריפה הזו","options":{"A":"במקרה של התקף קשה ניתן לשקול מעבר זמני למיצים בלבד, ולעיתים אף לצום מים אם המטופל אינו בתת משקל.","B":"יש להמליץ לו לאכול ירקות חיים בכמות גדולה כדי להעשיר את התזונה בסיבים.","C":"דיאטת אורז לבן (דלת סיבים) מוצגת כגישה המקובלת בקרב הגישות השונות להחמרה.","D":"יש להימנע משמרים ומוצרי חלב במסגרת הטיפול.","E":"יש להמליץ לו על צריכת פירות מרובה, כיוון שהם מומלצים לכל החולים במצב זה.","F":"אין כל צורך בלעיסה מדוקדקת של המזון בזמן החמרה.","G":"יש להתעלם לחלוטין ממצבו הנפשי-רגשי, כיוון שאין קשר בין סטרס להתקפים."},"answer":["A","C","D"],"multi":true,"explanation":"בהחמרה קשה ניתן לעבור למיצים בלבד ואף לצום מים (אם לא בתת משקל); דיאטת אורז לבן דלת סיבים היא הגישה המקובלת; יש להימנע משמרים וחלב לאורך כל הטיפול. בזמן החמרה נמנעים מירקות חיים (רק מאודים ומרקים) ולעיתים גם מפירות; לעיסה מדוקדקת ומצב נפשי-רגשי (הקשור מאוד לסטרס כטריגר) חשובים תמיד. שקופית: 82,86 - דגשים כללים / הטיפול התזונתי בהחמרת קרוהן/קוליטיס","slides":"","section":"B"},{"n":4,"text":"אישה בת 40 עם דלקת השימוטו נוטלת הורמון תריס סינטטי (אלטרוקסין) כשנה, עם TSH תקין, אך ממשיכה לסבול מעייפות, רגישות לקור וקשיי ריכוז. היא כבר ניסתה תזונה נטולת גלוטן וחלב, הפחתת סטרס ושינויי אורח חיים, ללא שיפור מלא. מה נכון לשקול במקרה זה?","options":{"A":"יש לשקול שקיימת בעיה בתהליך ההמרה מ-T4 ל-T3 שהטיפול הסינטטי אינו פותר, וייתכן שיהיה צורך בהמשך לשקול הורמון טבעי (מבלוטת תריס של חזיר) אם הטיפול הטבעי לא הצליח.","B":"יש לוודא בדיקות Anti-TG ו-Anti-TPO גם כשה-TSH תקין, כיוון שהגוף עשוי לשמור על רמה תקינה חרף מאבק הנוגדנים.","C":"יש להעלות משמעותית את צריכת הסויה והמצליבים החיים בתזונתה כדי לשפר את תפקוד הבלוטה.","D":"יש להמליץ לה להפסיק את הטיפול הסינטטי מיידית ולעבור לתזונה בלבד, ללא ליווי רפואי.","E":"כדאי לבדוק חשיפה לכלור ולפלואור במים ובבריכות שחייה, ולשקול מטהר מים מתאים.","F":"אין קשר בין רמות סטרס לתפקוד בלוטת התריס, ולכן אין טעם בהפגת סטרס.","G":"יש להימנע מכל בדיקת נוגדנים נוספת, כיוון שרמת TSH תקינה שוללת מחלה אוטואימונית."},"answer":["A","B","E"],"multi":true,"explanation":"הטיפול הסינטטי לא יעזור אם קיימת בעיה חמורה בהמרה, ובמקרים כאלה (אם הטיפול הטבעי לא הצליח) יש לשקול הורמון טבעי. TSH תקין אינו שולל מאבק אוטואימוני מתמשך שגורם לעייפות - ולכן כדאי לבדוק נוגדנים. כלור ופלואור עלולים להפריע לקליטת יוד ולכן כדאי לבדוק חשיפה ולסנן. סויה ומצליבים חיים (גויטרוגנים) דווקא מומלץ להפחית, לא להעלות. שקופית: 97-99,102 - תת פעילות בלוטת התריס, איך מטפלים ו-rT3","slides":"","section":"B"},{"n":5,"text":"גבר בן 52 בעודף משקל עם היסטוריה של גאוט מגיע עם התקף חריף באגודל הרגל, לאחר סוף שבוע של אכילת בשר אדום, פירות ים ובירה בכמות גדולה. אילו המלצות תזונתיות מתאימות להמשך הטיפול בו?","options":{"A":"להמליץ על צמצום או הימנעות מבשר אדום, איברים פנימיים, פירות ים ודגים קטנים (כגון סרדינים) העשירים בפורינים.","B":"להמליץ על הימנעות מאלכוהול, ובמיוחד בירה, המכילה גם שמרים.","C":"להמליץ לו לצרוך דובדבנים, המוזכרים כ\"מזון הסודי\" לגאוט.","D":"להמליץ לו לצום מים במהלך ההתקף הנוכחי כדי להוריד מהר את חומצת השתן.","E":"להרגיע אותו שקטניות וירקות עתירי פורינים כגון עגבניות ותרד מסוכנים בדיוק כמו בשר ודגים.","F":"להמליץ לו להימנע לחלוטין ממוצרי חלב, כיוון שהם מעלים משמעותית את הסיכון להתקפי גאוט.","G":"להמליץ על איזון רמות סוכר וירידה במשקל כחלק מהטיפול הכולל."},"answer":["A","B","C","G"],"multi":true,"explanation":"יש לצמצם מקורות פורינים מן החי (בשר אדום, איברים פנימיים, פירות ים, דגים קטנים), להימנע מאלכוהול ובמיוחד בירה, וכן ירידה במשקל ואיזון סוכר חשובים. דובדבנים הם \"המזון הסודי\" לגאוט. אין לעשות צום בזמן התקף; פורינים מהצומח (קטניות, עגבניות, תרד) אינם מעלים סיכון לגאוט כמו אלו מן החי; ומוצרי חלב דווקא קשורים לסיכון נמוך יותר. שקופית: 129-132 - גאוט, דגשים תזונתיים וטיפוליים","slides":"","section":"B"},{"n":6,"text":"אישה בת 26 מגיעה עם אקנה חדש, לצד שיעור יתר בפנים ומחזור לא סדיר עם קושי להיכנס להריון. מה עולה מהחומר הנלמד ביחס למקרה זה?","options":{"A":"יש לחשוד ברמות הורמוני מין חריגות ואף בשחלות פוליציסטיות, ולהפנות לבדיקת הורמונים.","B":"אקנה נגרמת תמיד מרמות טסטוסטרון גבוהות בדם, ולכן אין צורך בבדיקות נוספות.","C":"שחלות פוליציסטיות מגדילות את הסיכון לאקנה.","D":"ניתן לשקול הוספת פיטו-אסטרוגנים (כגון סויה, זרעי פשתן) לתזונה במצב של עודף טסטוסטרון יחסי.","E":"יש להמליץ לה להרבות בשמן מחומצן ומטוגן כחלק מהטיפול התזונתי.","F":"תזונה טבעית ובריאה, כולל הימנעות מסוכר וממתקים, אינה קשורה כלל לחומרת האקנה.","G":"אין כל קשר בין מצב נפשי לחומרת האקנה."},"answer":["A","C","D"],"multi":true,"explanation":"אקנה חדש בבגרות עם שיעור יתר וקושי בכניסה להריון מחייב בדיקת הורמוני מין, כולל חשד לשחלות פוליציסטיות (המגדילות סיכון לאקנה). הבעיה אינה טסטוסטרון גבוה בדם אלא רגישות גנטית של בלוטות החלב בעור. במצב של עודף טסטוסטרון יחסי אפשר לשקול פיטואסטרוגנים. יש להימנע (לא להרבות) בשמן מחומצן ומטוגן; תזונה בריאה ומצב נפשי כן קשורים לחומרת האקנה. שקופית: 133-134 - אקנה בנערות ונשים","slides":"","section":"B"},{"n":7,"text":"אישה בת 45 עברה תאונת דרכים עם בלימה פתאומית וחבלה בצוואר לפני שנה. כעת היא סובלת מכאבי שרירים נרחבים, קשיון בוקר, קשיי ריכוז, עייפות ותסמינים דמויי מעי רגיז. אילו עקרונות מנחים את גישת הטיפול המתוארת במקרה זה?","options":{"A":"יש לשקול טיפול מנואלי לצוואר (כירופרקטי או אוסטאופתי), בהתחשב בהיסטוריה של בלימת רכב פתאומית ועוצמתית.","B":"תזונה בריאה היא הכלי המרכזי והחשוב ביותר בטיפול בפיברומיאלגיה, לפי המצגת.","C":"יש לשים דגש משמעותי על עבודה נפשית-רגשית ועל איזון מערכת העצבים.","D":"פיברומיאלגיה מוגדרת במצגת כמחלה דלקתית מובהקת.","E":"טראומה גופנית וחבלה בצוואר מוזכרות כגורמים המגדילים סיכון להתפרצות המחלה.","F":"יש להמליץ על פעילות גופנית אינטנסיבית ותובענית מאוד, ללא כל התאמה למגבלות המטופלת.","G":"הגישה הפסיכולוגית המוזכרת במצגת קושרת בין אישיות רגישה ואירועי סטרס רגשיים (גם בילדות) לבין המחלה."},"answer":["A","C","E","G"],"multi":true,"explanation":"היסטוריה של חבלה בצוואר/בלימה עוצמתית מחזקת שיקול לטיפול מנואלי בצוואר, ומוזכרת כגורם המגדיל סיכון להתפרצות. עבודה רגשית ואיזון מערכת העצבים מרכזיים בטיפול, בעוד תזונה בריאה אינה הכלי המרכזי במקרה זה. המחלה אינה דלקתית לפי המצגת. הגישה הפסיכולוגית קושרת בין אישיות רגישה וסטרס רגשי (כולל בילדות) למחלה. פעילות גופנית מומלצת אך בהתאמה (כמו טאי-צ'י/צ'יקונג/יוגה), לא באופן תובעני. שקופית: 135-137 - פיברומיאלגיה, תיאוריות וטיפול","slides":"","section":"B"},{"n":8,"text":"מטופל עם אבחנה מאושרת של הליקובקטר פילורי שואל האם טיפול תזונתי טבעי בלבד יכול להכחיד את החיידק, ואילו אמצעים תזונתיים עשויים לתמוך בטיפול","options":{"A":"יש להסביר לו שאין מחקרים על הכחדת החיידק באמצעים טבעיים בלבד, אלא רק בשילוב עם טיפול אנטיביוטי.","B":"ניתן להמליץ על תזונה נטולת סוכרים (למעט פירות בכמות מתונה) וירקות כבושים ביתיים.","C":"אפשר לשקול תזונה מופחתת עמילנים או ללא עמילנים (כגון פליאו/קטוגני/קרניבורי).","D":"יש להבטיח למטופל שתזונה טבעית לבדה תכחיד את החיידק לחלוטין תוך שבועיים.","E":"נבטי ברוקולי, חמוציות, פרופוליס ותה ירוק הם מזונות שנמצאו כמסייעים אפשריים להכחדת החיידק.","F":"עוצמת הראיות המחקרית לגבי כל המזונות המיוחדים הללו זהה וחד-משמעית לחלוטין.","G":"אין כל היגיון בשילוב גישה תזונתית לצד טיפול אנטיביוטי במקרה זה."},"answer":["A","B","C","E"],"multi":true,"explanation":"אין מחקרים על הכחדה טבעית בלבד - רק בשילוב אנטיביוטיקה; ניתן להמליץ על תזונה ללא סוכרים, ירקות כבושים, ותזונה מופחתת/נטולת עמילנים; נבטי ברוקולי (עשירים בסולפורפאן), חמוציות, פרופוליס ותה ירוק נמצאו כמזונות מסייעים אפשריים, כאשר עוצמת הראיות משתנה ואינה עקבית תמיד - ולכן אין להבטיח הכחדה מלאה תוך זמן קצר. שקופית: 139 - הליקובקטר פילורי, הגישה הטבעית ומזונות מסייעים","slides":"","section":"B"},{"n":9,"text":"אישה בת 35 עם דיכאון קל-בינוני מבקשת לנסות גישות תזונתיות ואורח חיים לפני שיקול טיפול תרופתי. מה ניתן להציע לה על סמך החומר הנלמד?","options":{"A":"להמליץ על תוספת קקאו בתוך תמר כממתק בריא הקשור לשיפור מצב הרוח.","B":"להמליץ לנסות תזונה נטולת גלוטן למספר חודשים, בהתחשב בעדויות לשיפור (יתכן עקב צליאק לא מאובחן).","C":"להמליץ בהחלט להימנע לחלוטין מקפה, כיוון שהוא מעלה משמעותית סיכון לדיכאון ולהתאבדות.","D":"להסביר שפעילות גופנית וחשיפה לשמש נחשבות בעלות חשיבות רבה מאוד.","E":"להמליץ להפחית משמעותית את צריכת הירקות והפירות, כיוון שהם עלולים להחמיר דיכאון.","F":"אפשר לשקול תבלין זעפרן (צלקת פרח הכורכום), שנמצא יעיל כמו פרוזאק במחקר שהוזכר.","G":"יש להסביר שתזונה קטוגנית לא נבדקה כלל בהקשר לדיכאון."},"answer":["A","B","D","F"],"multi":true,"explanation":"קקאו בתוך תמר מוצג כממתק בריא נוגד דיכאון; יש עדויות לשיפור עם הימנעות מגלוטן; פעילות גופנית וחשיפה לשמש חשובות מאוד; זעפרן נמצא יעיל כמו פרוזאק במחקר. צריכת קפה בכמות מסוימת נמצאה קשורה דווקא לסיכון מופחת להתאבדות (לא מוגבר); ככל שצריכת ירקות ופירות גדולה יותר - הסיכון לדיכאון קטן; ותזונה קטוגנית כן נבדקה עם עדויות רבות לשיפור. שקופית: 117-122 - דיכאון, דגשים תזונתיים","slides":"","section":"B"},{"n":10,"text":"אישה בת 51 בגיל המעבר מגיעה עם גלי חום, הזעות לילה, קשיי שינה ועלייה במשקל בטני. היא מעוניינת בירידה מהירה וקיצונית במשקל באמצעות הגבלה קלורית חמורה. מה מתאים להנחות אותה על פי החומר?","options":{"A":"להמליץ על פעילות אירובית סדירה וקבועה, תוך שמירה על מסת שריר.","B":"להמליץ לנסות זרעי פשתן להקלה על גלי חום והזעות לילה.","C":"לתמוך בבקשתה לירידה קיצונית ומהירה מאוד במשקל, ללא כל הסתייגות.","D":"להסביר לה שאיבוד מסת השריר בגיל המעבר מחמיר את ההאטה בחילוף החומרים, ולכן חשובה תוספת חלבון.","E":"להסביר שהגורם לגלי חום הוא עלייה אמיתית בטמפרטורת הגוף הפנימית, ולא בעיה בוויסות במוח.","F":"להמליץ על יוגה ודיקור כאמצעים העשויים להקל על תופעות גיל המעבר.","G":"להסביר לה שתופעת גלי החום וההזעות תימשך ללא כל הסתגלות למשך שארית חייה."},"answer":["A","B","D","F"],"multi":true,"explanation":"פעילות אירובית סדירה עם שמירה על מסת שריר, זרעי פשתן להקלה על גלי חום, תוספת חלבון (בשל איבוד מסת שריר שמחמיר האטה מטבולית), ויוגה/דיקור - כולם מומלצים. אין לתמוך בירידה קיצונית ומהירה במשקל ללא הסתייגות (פעילות קיצונית מדי עלולה אף לפגוע בפוריות). גלי חום נובעים מבעיית ויסות בהיפותלמוס ולא מעלייה אמיתית בחום הגוף, וזו התופעה שהגוף מסתגל אליה בסופו של דבר. שקופית: 125-128 - גיל המעבר, השלכות ודגשים טיפוליים","slides":"","section":"B"},{"n":9000,"text":"הקפדה על כללי אכילה כגון כמות, עיתוי, לעיסה וסדר האכילה נחשבת עיקרון טיפולי חשוב — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["A"],"multi":false,"explanation":"המשפט נכון על פי החומר. כל העקרונות מופיעים בשקופיות דגשי הטיפול הטבעי במעי רגיש - הקפדה על כללי אכילה, פעילות גופנית, פרוביוטיקה בהדרגה, בדיקות נשיפה, חליטות סופחות גזים, וההבנה של הקשר הרגשי-נפשי. שקופית: 77-78 - דגשים לטיפול טבעי במעי רגיש","slides":"","section":"A","tf":1},{"n":9001,"text":"רמת קלפרוטקטין גבוהה משמעותית מרמזת על דלקת פעילה במעי, ולא רק על זיהום חולף — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["A"],"multi":false,"explanation":"המשפט נכון על פי החומר. קלפרוטקטין הוא חלבון קושר סידן בנויטרופילים; נויטרופילים מוזעקים למקום הדלקת וחדירת החיידקים, \"מתאבדים\" בלחימה בהם, וממילא בעלי משך חיים קצר; לאחר מותם משתחררים לחלל המעי ויוצאים בצואה בשלמותם כי לא עברו דנטורציה בקיבה; המדד חוסך בדיקות פולשניות תכופות; ב-IBS התוצאה תקינה; ורמה גבוהה (מעל הסף הנמוך) מרמזת על דלקת פעילה. שקופית: 84-85 - קלפרוטקטין","slides":"","section":"A","tf":1},{"n":9002,"text":"בשר אינו נחשב מקור לאבץ כלל — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["B"],"multi":false,"explanation":"המשפט שגוי על פי החומר. מקורות האבץ שהוזכרו הם נבט חיטה, גרעיני דלעת, אגוזים, שקדים, קטניות מונבטות ובשר. חוסר אבץ נקשר להפרעות עיכול (במחקרי חיות). הימנעות מגלוטן \"לא פסולה\" - כלומר מותרת ולא טעות. דיאטת אלימינציה קשוחה (אורז לבן/כוסמת) מוצעת דווקא לטבעונים אידיאולוגיים. שקופית: 78 - המשך טיפול במעי רגיש","slides":"","section":"A","tf":1},{"n":9003,"text":"חומץ תפוחים פועל בעיקר על ידי עיכוב ספיגת שומנים במעי הדק — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["B"],"multi":false,"explanation":"המשפט שגוי על פי החומר. המנגנונים המוצעים הם האטת התרוקנות הקיבה ועיכוב אנזים האמילאז (רגיש לחומציות), וכן השערה (במחקרי בעלי חיים) על הגברת אגירת גלוקוז ושיפור ניצולו. השתייה מומלצת דרך קשית בדיוק כדי להפחית פגיעה באמייל, כיוון שזו חומצה. שקופית: 66 - כלי נוסף לאיזון רמות הסוכר לאחר הארוחה (חומץ תפוחים)","slides":"","section":"A","tf":1},{"n":9004,"text":"הפחתת סטרס אינה נחשבת גורם רלוונטי בטיפול במעי דליף — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["B"],"multi":false,"explanation":"המשפט שגוי על פי החומר. המעי יודע להשתקם בעצמו, רק צריך לא להפריע לו (הסרת הטריגר); הימנעות מסוכר כן חלק מהאסטרטגיה; בדיקת זונולין אינה הכרחית; מזון מותסס ופרה-ביוטי ניתנים לאחר \"תקופת המנוחה\" ולא לפניה; הפחתת סטרס וסיבים כן חלק מהטיפול; ובכל מחלה אוטואימונית יש היגיון להניח שקיים גם מעי דליף. שקופית: 92 - טיפול במעי דליף","slides":"","section":"A","tf":1},{"n":9005,"text":"כלור וגויטרוגנים (כגון סויה ומצליבים) עלולים להפריע לקליטת יוד לבלוטה — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["A"],"multi":false,"explanation":"המשפט נכון על פי החומר. כל הפרטים מדויקים לפי השקופיות - תסמיני תת פעילות (עייפות, קושי בירידה במשקל, רגישות לקור, נשירת שיער, קשיי ריכוז ועוד), הסיבות (מחלה אוטואימונית, חוסר יוד, חוסר סלניום), וגורמי ההפרעה בקליטת יוד (כלור, גויטרוגנים), עם ההמלצה המעשית להימנע מבריכות ולסנן כלור ופלואור במים. שקופית: 96-97 - הסיבות והסימפטומים לתת פעילות בלוטת התריס","slides":"","section":"A","tf":1}]},{"id":"33","title":"דגשים תזונתיים לאוכלוסיות מיוחדות","questions":[{"n":1,"text":"מהו העיקרון הבסיסי העומד בבסיס הגישה התזונתית לאוכלוסיות מיוחדות, כפי שהוצג בפתיחת ההרצאה?","options":{"A":"יש לבנות תפריט שונה לחלוטין עבור כל קבוצת גיל, שאינו קשור לעקרונות התזונה הבריאה הכלליים","B":"התזונה המתאימה לאדם בריא מתאימה, בבסיסה, לכל גיל, ויש להתאימה בדגשים לפי הצרכים הייחודיים של האוכלוסייה","C":"אוכלוסיות מיוחדות זקוקות לתזונה הפוכה לחלוטין מזו המומלצת לאדם הבריא","D":"עקרונות התזונה הבריאה רלוונטיים רק לאוכלוסייה הבוגרת הבריאה, ואינם ישימים לילדים, קשישים, ספורטאים או נשים בהריון","E":"אין כל צורך בהתאמות תזונתיות לאוכלוסיות מיוחדות מעבר לתזונה הרגילה","F":"ההתאמות התזונתיות לאוכלוסיות מיוחדות מבוססות בעיקר על תוספי תזונה ולא על מזון רגיל","G":"כל אוכלוסייה מיוחדת דורשת דיאטה דלת פחמימות כבסיס"},"answer":["B"],"multi":false,"explanation":"השקופית הפותחת קובעת שהעיקרון הבסיסי הוא שתזונה המתאימה לאדם בריא מתאימה לכל גיל, ושההתאמות לאוכלוסיות המיוחדות (ספורטאים, קשישים, הריון, ילדים) הן דגשים נוספים על בסיס זה, לא תזונה חלופית. שקופית: 141 - עיקרון בסיסי","slides":"","section":"A"},{"n":2,"text":"אילו מהמשפטים הבאים לגבי חלבון בספורטאים נכונים?","options":{"A":"פעילות גופנית גורמת לקרעים מיקרוסקופיים בשרירים","B":"תזונה רגילה (לא מועשרת) מספיקה כל עוד האדם אינו ספורטאי מקצועי","C":"תוספת חלבון חיונית במיוחד במאמצים קצרים ומאומצים","D":"הכמות המדויקת של תוספת החלבון הנדרשת לספורטאים היא נושא מוסכם וברור, ללא מחלוקת מקצועית","E":"אצל ספורטאי סיבולת ארוכת טווח הצורך בחלבון נמוך יותר מאשר בפעילות אירובית קלה","F":"חלבון אינו קשור כלל לאיזון חומצה-בסיס בגוף","G":"אצל מפתחי גוף, הפחתת כמות החלבון היא המפתח לגדילת מסת השריר"},"answer":["A","B","C"],"multi":true,"explanation":"השקופית מציינת שפעילות גופנית יוצרת קרעים מיקרוסקופיים בשריר ומחייבת יותר חלבון, שבמאמצים קצרים ואינטנסיביים תוספת חלבון חיונית במיוחד, ושתזונה רגילה מספיקה למי שאינו ספורטאי מקצועי; לעומת זאת כמות התוספת המדויקת שנויה במחלוקת, חלבון כן קשור לאיזון חומצה-בסיס בתא, ואצל מפתחי גוף מגדילים (לא מפחיתים) את כמות החלבון. שקופית: 142 - ספורטאים: חלבון","slides":"","section":"A"},{"n":3,"text":"אילו מהמשפטים הבאים לגבי אחוזי שומן בגוף ספורטאים נכונים?","options":{"A":"ספורטאים חובבים מומלצים לשאוף לקצה הגבוה של סקאלת אחוזי השומן התקינה","B":"ירידה לאחוז שומן נמוך מאוד בטוחה לחלוטין ואינה קשורה לסיכון לפוריות","C":"אין כל סקאלה מומלצת לאחוזי שומן בספורטאים - כל רמה נחשבת תקינה","D":"ככל שאחוז השומן בגוף נמוך יותר, כך משתפרים תמיד הביצועים הספורטיביים, ללא סף תחתון","E":"בדיקת הרכב גוף אינה כוללת מדידת אחוז שומן, אלא רק משקל כללי","F":"אחוז שומן גבוה במיוחד הוא היעד המומלץ למפתחי גוף במהלך תקופת עבודה על מסת שריר","G":"מומלץ לספורטאים מקצועיים להימנע כליל ממעקב אחר אחוז השומן בגוף לאורך תקופת האימונים","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"בפועל, ספורטאים חובבים מומלצים לשאוף לקצה הנמוך (לא הגבוה) של הסקאלה, אחוז שומן נמוך מדי מהווה סיכון (כולל לפוריות), קיימת סקאלה מוגדרת של אחוזי שומן, בדיקת הרכב הגוף כן כוללת מדידת אחוז שומן, ואצל מפתחי גוף מגדילים את מסת השריר/חלבון ולא שואפים לשומן גבוה. שקופית: 142/143 - אחוזי שומן ובדיקת הרכב גוף","slides":"","section":"A"},{"n":4,"text":"מהן מטרות בדיקת הרכב הגוף שהוצגו במצגת?","options":{"A":"לוודא שבזמן ירידה במשקל האיבוד הוא במסת השומן בלבד, ולא במסת השריר","B":"לוודא שאחוזי השומן בגוף אינם נמוכים מדי","C":"לקבוע את גובהו העתידי הצפוי של הספורטאי","D":"לאבחן מחלות לב וכלי דם באופן ישיר","E":"למדוד את רמת הסוכר בדם בצום","F":"לעקוב אחר שימור או הגדלה של מסת השריר","G":"לקבוע את סוג הדם של הנבדק"},"answer":["A","B","F"],"multi":true,"explanation":"בדיקת הרכב הגוף נועדה לוודא כי בירידה במשקל האיבוד הוא במסת השומן ולא בשריר, שאחוזי השומן אינם נמוכים מדי, ולעקוב אחר שימור/הגדלת מסת השריר - ולא לאבחן מחלות לב, למדוד סוכר בדם, לקבוע גובה עתידי או סוג דם. שקופית: 143 - בדיקת הרכב גוף","slides":"","section":"A"},{"n":5,"text":"אילו מהפעולות/מזונות הבאים תורמים לשיפור ביצועים אצל ספורטאים, על פי המצגת?","options":{"A":"צריכת סלק / מיץ סלק העשיר בניטראטים","B":"הקפדה על תזונה נוגדת חמצון, בייחוד אצל רצי מרתון","C":"צריכת קפאין (למשל בקפה), הנפוץ בקרב רוב הספורטאים המקצועיים","D":"קפאין עשוי להפחית כאב ועייפות ולעודד שריפת שומנים","E":"אכילת פחמימות לפני הפעילות כאשר המטרה היא שיפור ביצועים","F":"פעילות גופנית בבוקר ללא אכילה כלל, כאשר המטרה היא ירידה במשקל","G":"התאמת תזמון האכילה סביב האימון בהתאם למטרה האישית (ירידה במשקל מול ביצועים)"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל הפעולות הללו מוזכרות במצגת: סלק/ניטראטים ותזונה נוגדת חמצון (שקופית 143), קפאין המפחית כאב ועייפות ומעודד שריפת שומן (שקופית 144), ותזמון האכילה - צום בבוקר לירידה במשקל מול אכילת פחמימות לביצועים (שקופית 144). שקופית: 143-144 - מזונות ומשקאות משפרי ביצועים ותזמון פעילות","slides":"","section":"A"},{"n":6,"text":"ספורטאי חובב שמטרתו העיקרית היא ירידה במשקל שואל מתי הכי נכון לבצע פעילות גופנית. מה ההמלצה על פי המצגת?","options":{"A":"לבצע את הפעילות בבוקר, ללא אכילה כלל לפני האימון","B":"לבצע את הפעילות רק בערב, לאחר ארוחה עשירה בפחמימות","C":"לבצע את הפעילות מיד לאחר ארוחה גדולה, ללא קשר לשעה","D":"לבצע את הפעילות דווקא בזמן שהכי פחות נוח לו, כדי להגביר מוטיבציה","E":"אין כל המלצה לגבי תזמון האכילה ופעילות גופנית","F":"יש לאכול חלבון בלבד (ללא פחמימות) לפני כל פעילות גופנית, ללא קשר למטרה","G":"יש להימנע מפעילות גופנית בבוקר בכל מקרה"},"answer":["A"],"multi":false,"explanation":"לפי המצגת, כאשר המטרה היא ירידה במשקל, ההמלצה היא לבצע פעילות גופנית בבוקר וללא אכילה כלל; לעומת זאת לקבלת ביצועים טובים יותר מומלץ לאכול פחמימות לפני הפעילות. שקופית: 144 - תזמון פעילות גופנית","slides":"","section":"A"},{"n":7,"text":"אילו מהמשפטים הבאים על קפאין/קפה וספורט נכונים?","options":{"A":"קפאין עשוי להפחית תחושת כאב במהלך מאמץ גופני","B":"קפאין ידוע כמגביר את תחושת העייפות במהלך פעילות גופנית","C":"קפאין מעכב לחלוטין את שריפת השומנים בגוף","D":"רוב הספורטאים המקצועיים נמנעים לחלוטין מתוספי קפאין","E":"קפאין הוא המזון היחיד שמומלץ לפני פעילות אירובית","F":"רוב הספורטאים המקצועיים לוקחים תוספי קפאין","G":"תזונה נוגדת חמצון אינה רלוונטית לרצי מרתון"},"answer":["A","F"],"multi":true,"explanation":"המצגת מציינת כי קפה/קפאין מפחית כאב ועייפות, מעודד שריפת שומנים, ושרוב הספורטאים המקצועיים לוקחים תוספי קפאין - ולכן הטענות ההפוכות (מגביר עייפות, מעכב שריפת שומן, נמנעים מקפאין, לא רלוונטי לרצי מרתון) שגויות. שקופית: 144 - משקה משפר ביצועים אירוביים","slides":"","section":"A"},{"n":8,"text":"מה ההבדל המרכזי, על פי המצגת, בין הצורך בתוספת חלבון אצל אדם המבצע פעילות גופנית מזדמנת לבין מפתח גוף?","options":{"A":"אצל אדם עם פעילות גופנית רגילה (שאינו ספורטאי מקצועי) תזונה רגילה מספיקה, ואילו אצל מפתחי גוף מגדילים את כמות החלבון לצורך גדילה והאצת מסת השריר","B":"אין שום הבדל - שני המקרים דורשים אותה כמות מדויקת של חלבון","C":"מפתחי גוף צריכים להפחית את צריכת החלבון שלהם ככל שמסת השריר גדלה","D":"אדם עם פעילות גופנית מזדמנת זקוק לכמות חלבון גדולה יותר ממפתח גוף","E":"חלבון רלוונטי רק למפתחי גוף ואינו קשור כלל לפעילות גופנית רגילה","F":"התזונה הרגילה אינה מספיקה אף פעם ללא תוסף חלבון, גם למי שאינו ספורטאי מקצועי","G":"תוספת חלבון חיונית במיוחד במאמצים קצרים ומאומצים, בשל עלייה בחומצה לקטית וקרעים בשריר"},"answer":["A","G"],"multi":true,"explanation":"המצגת מבחינה בין הכלל - תזונה רגילה מספיקה כל עוד אינך ספורטאי מקצועי - לבין מפתחי גוף, שאצלם מגדילים את כמות החלבון כדי לתמוך בגדילה ובהאצת מסת השריר; בנוסף, תוספת חלבון חיונית במיוחד במאמצים קצרים ואינטנסיביים. שקופית: 142 - ספורטאים: חלבון ומפתחי גוף","slides":"","section":"A"},{"n":9,"text":"אילו מהמשפטים הבאים לגבי קשישים נכונים, על פי המצגת?","options":{"A":"ספיגת מזון במעי משתפרת עם הגיל בשל התעבות רירית המעי","B":"עצירות אינה שכיחה יותר בגיל מבוגר","C":"מומלץ לקשישים לשתות כמויות גדולות של נוזלים תוך כדי האכילה עצמה כדי לסייע בבליעה","D":"מומלץ להגביר את הארוחות לכמות גדולה יותר בכל ארוחה ותדירות נמוכה יותר","E":"יש להעביר כל קשיש שאינו טבעוני לתזונה טבעונית מלאה כדי לשפר את בריאותו","F":"תיאבון גובר בדרך כלל עם העלייה בגיל","G":"קושי בהכנת ארוחות אינו קשור לגיל מבוגר ואינו אתגר רלוונטי לאוכלוסיה זו","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"בפועל: הספיגה במעי דווקא פוחתת עם הגיל (רירית מעי \"זקנה\"), עצירות היא אתגר שכיח, מומלץ שלא לשתות תוך כדי האכילה, מומלץ ארוחות קטנות יותר בתדירות גבוהה יותר (לא גדולות ונדירות), אין להעביר קשישים לטבעונות, תיאבון בדרך כלל פוחת עם הגיל, וקושי בהכנת ארוחות הוא אתגר מוכר בקשישים. שקופית: 145 - קשישים: אתגרים ודגשים כלליים","slides":"","section":"A"},{"n":10,"text":"אילו מהדגשים הבאים מומלצים באופן כללי לטיפול תזונתי-התנהגותי בקשישים, על פי המצגת?","options":{"A":"עידוד ללעיסה מרובה","B":"ארוחות קטנות יותר בתדירות גדולה יותר","C":"הימנעות משתייה תוך כדי האכילה","D":"שימוש רב יותר בבלנדר ובמזון מבושל/מאודה","E":"דגש על בניית מסת שריר ועומס על השלד","F":"עידוד לפעילות חברתית, התנדבות ואכילה חברתית","G":"עידוד לצאת מהבית ולהיחשף לשמש, ועידוד לתנועה ופעילות גופנית"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל אלו מופיעים כדגשים כלליים לקשישים במצגת: לעיסה מרובה, ארוחות קטנות ותכופות, הימנעות משתייה תוך כדי אכילה, שימוש בבלנדר/מזון מבושל, בניית מסת שריר ועומס שלד, פעילות חברתית והתנדבות, וחשיפה לשמש ותנועה. שקופית: 145 - דגשים כלליים לקשישים","slides":"","section":"A"},{"n":11,"text":"קשיש רזה מאוד, עם מדד גוף (BMI) נמוך מ-19.5, מגיע לייעוץ תזונתי. מה ההמלצה התזונתית הספציפית עבורו על פי המצגת?","options":{"A":"העשרת המזון באגוזים, שקדים, אבוקדו, שמן זית ושמן קוקוס","B":"מעבר מיידי לתזונה טבעונית מלאה כדי להפחית עומס על מערכת העיכול","C":"הפחתת כמות הארוחות היומית לארוחה אחת גדולה","D":"הימנעות מוחלטת משומנים מכל סוג","E":"מעבר לתזונה דלת קלוריות להרזיה מבוקרת","F":"הפסקת צריכת חלבון מן החי לחלוטין","G":"אין המלצה ייחודית - הטיפול זהה לכל קשיש ללא קשר למשקלו"},"answer":["A"],"multi":false,"explanation":"לפי המצגת, בקשישים רזים מדי (BMI מתחת ל-19.5) מומלץ להעשיר את המזון באגוזים, שקדים, אבוקדו, שמן זית ושמן קוקוס - ולא להעביר אותם לטבעונות, שעלולה להחמיר בעיות ספיגה. שקופית: 146 - דגשים תזונתיים לקשישים","slides":"","section":"A"},{"n":12,"text":"אילו מהמשפטים הבאים לגבי טבעונות בגיל מבוגר נכונים, על פי המצגת?","options":{"A":"אין להעביר קשישים לתזונה טבעונית, מכיוון שהדבר עלול ליצור ולהחמיר בעיות ספיגה","B":"אדם שהיה טבעוני לאורך חייו יכול לרוב להמשיך להיות טבעוני גם בגיל מבוגר","C":"אין שום מחקר המראה יתרון לחלבון מן החי בגיל השלישי","D":"יש להעביר כל קשיש לטבעונות כדי להפחית כולסטרול","E":"טבעונות מומלצת כברירת מחדל לכל קשיש רזה מדי","F":"תזונה טבעונית משפרת תמיד את יכולת הספיגה במעי הקשיש","G":"אין כל הבדל תזונתי בין קשיש טבעוני לקשיש שאינו טבעוני"},"answer":["A","B"],"multi":true,"explanation":"המצגת קובעת שאין להעביר קשישים לטבעונות (מחמיר בעיות ספיגה), אך מי שכבר היה טבעוני יכול בדרך כלל להמשיך כך, למרות שקיימים מחקרים המראים יתרון לחלבון מן החי בגיל השלישי. שקופית: 146 - דגשים תזונתיים לקשישים","slides":"","section":"A"},{"n":13,"text":"אילו מהמשפטים הבאים לגבי מקורות חלבון והכנת מזון לקשישים נכונים?","options":{"A":"טופו נחשב מקור חלבון טוב וקל לעיכול לקשישים","B":"קציצות בשר בקר טחון מוזכרות כאפשרות מזון מתאימה לקשישים","C":"מומלץ להעדיף אצל קשישים מזון חי על פני מזון מבושל","D":"יש להימנע לחלוטין מכל סוגי הקטניות בתזונת הקשיש","E":"מרקים דלילים ומימיים עדיפים על פני מרקים עשירים וסמיכים לקשישים","F":"תבשילי קטניות מוזכרים כאפשרות תזונתית מתאימה לקשישים","G":"אין שום יתרון להכנת מזון מבושל על פני מזון חי אצל קשישים"},"answer":["A","B","F"],"multi":true,"explanation":"המצגת ממליצה על טופו כמקור חלבון קל לעיכול, קציצות בשר בקר טחון ותבשילי קטניות כמקורות חלבון לקשישים; כמו כן מומלץ להגדיל דווקא את כמות המזון המבושל (ולא החי) ולהעדיף מרקים עשירים וסמיכים (לא דלילים). שקופית: 146 - דגשים תזונתיים לקשישים (המשך)","slides":"","section":"A"},{"n":14,"text":"קשיש המתקשה להכין ארוחות בעצמו. אילו מהפתרונות הבאים מומלצים על פי המצגת?","options":{"A":"להימנע לחלוטין מכל מזון מוקפא, שכן הקפאה פוגעת בערך התזונתי","B":"לוותר על ארוחות עשירות ולהסתפק בחטיפים קלים בלבד לאורך היום","C":"להכין רק מנות גדולות שיוגשו פעם בחודש, ללא הקפאה","D":"להימנע משיתוף המשפחה או מטפל בהכנת המזון, כדי לשמר את עצמאות הקשיש בכל מחיר","E":"להעדיף תמיד מזון תעשייתי מוכן על פני בישול ביתי","F":"להימנע מהכנת מרקים סמיכים, שכן הם קשים לעיכול בגיל מבוגר","G":"לוותר על תבשילים ומרקים ולעבור לתזונה המבוססת על מזון חי בלבד","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"ההמלצה במצגת היא שבן/בת המשפחה או המטפל/ת שמבקרים פעם בשבוע יכינו תבשילים ומרקים סמיכים ויקפיאו אותם במנות קטנות - כלומר דווקא כן להשתמש בהקפאה, שיתוף בהכנה, מרקים סמיכים ותבשילים, ולא מזון חי בלבד. שקופית: 146 - דגשים תזונתיים לקשישים (המשך)","slides":"","section":"A"},{"n":15,"text":"אילו מהבאים מוזכרים במצגת כאתגרים אופייניים באוכלוסיית הקשישים?","options":{"A":"ספיגה נמוכה יותר עקב רירית מעי מזדקנת","B":"תיאבון מופחת","C":"איבוד מסת שריר ומסת עצם","D":"קושי בלעיסה עקב שיניים תותבות או חוסר שיניים","E":"בדידות ודיכאון","F":"תרופות המשפיעות על התזונה","G":"קושי בהכנת ארוחות"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל אלו מופיעים ברשימת \"האתגרים - קשישים\" במצגת: ספיגה ירודה, תיאבון מופחת, איבוד מסת שריר ועצם, עצירות, קושי בלעיסה, בדידות, דיכאון, תרופות וקושי בהכנת ארוחות. שקופית: 145 - האתגרים בקשישים","slides":"","section":"A"},{"n":16,"text":"בהתייחס להמלצה על תוסף יוד בהריון, כיצד מוצגת ההמלצה במצגת?","options":{"A":"כדעתו האישית של המרצה/ת (\"לדעתי חובה תוסף יוד\"), ולא כהנחיה רשמית מפורשת","B":"כהנחיה רשמית ומחייבת מטעם משרד הבריאות, ללא מקום לדעה אישית","C":"כהמלצה שאינה רלוונטית כלל לנשים בהריון","D":"כהמלצה הנוגדת לחלוטין את הצורך בברזל בהריון","E":"כהמלצה המיועדת רק לנשים מניקות ולא לנשים בהריון","F":"כהמלצה שמקורה במחקר שנסתר לחלוטין","G":"כהמלצה הזהה במהותה להמלצה על ברזל, המוצגת גם היא כדעה אישית בלבד"},"answer":["A"],"multi":false,"explanation":"המצגת מנסחת את ההמלצה על תוסף יוד באופן מפורש כדעה אישית (\"לדעתי חובה תוסף יוד\"), בשונה מהצורך בברזל שמוצג ביחס ל\"הנחיות הרשמיות\" - הבחנה חשובה בין דעה אישית להנחיה רשמית. שקופית: 147 - הריון והנקה","slides":"","section":"A"},{"n":17,"text":"אילו מהמזונות הבאים מוזכרים במצגת כמקורות סידן מומלצים בהריון?","options":{"A":"טחינה","B":"שקדים","C":"במיה","D":"בשר בקר","E":"אורז לבן","F":"ביצים","G":"חלב פרה הוא המקור היחיד לסידן המומלץ בהריון"},"answer":["A","B","C"],"multi":true,"explanation":"המצגת מונה טחינה, שקדים, טופו, במיה, ברוקולי ושעועית כמקורות סידן מומלצים בהריון (עם שיקול להמלצה על סידן אמורפי), ולא מתמקדת בבשר, אורז לבן, ביצים או בחלב פרה כמקור בלעדי. שקופית: 147 - הריון והנקה, סידן","slides":"","section":"A"},{"n":18,"text":"אילו מהמשפטים הבאים נכונים לגבי המלצות נלוות בהריון, על פי המצגת?","options":{"A":"הימנעות מרעלים וסלולר ככל האפשר","B":"אין כל צורך בהגבלת שימוש בטלפון הסלולרי בהריון","C":"יש להשתמש בטלפון הסלולרי צמוד לבטן ככל האפשר לצורך מעקב","D":"מומלץ לעודד התחלת פעילות גופנית מתונה כחודש עד חודש וחצי לאחר הלידה","E":"חשיפה לרעלים סביבתיים מומלצת דווקא בהריון לצורך חיסון העובר","F":"מומלץ להתחיל פעילות גופנית אינטנסיבית כבר למחרת הלידה","G":"אין קשר בין רעלים סביבתיים לבריאות ההריון"},"answer":["A","D"],"multi":true,"explanation":"המצגת ממליצה על הימנעות מרעלים וקרינה סלולרית ככל האפשר, וכן על עידוד התחלת פעילות גופנית מתונה (לא מיידית ולא אינטנסיבית) כחודש-חודש וחצי לאחר הלידה. שקופית: 147 - הריון והנקה","slides":"","section":"A"},{"n":19,"text":"אילו מהמשפטים הבאים בנוגע להריון והנקה נכונים על פי המצגת?","options":{"A":"מומלץ להתחיל פעילות גופנית אינטנסיבית מיד לאחר הלידה, ביום הראשון","B":"הצורך בברזל בהריון פוחת בהשוואה לצורך הרגיל, בשל ירידה בדרישות הגוף","C":"אין כל קושי מיוחד בספיגת ברזל בהריון","D":"ההנחיות הרשמיות לצריכת ברזל בהריון אינן מתייחסות כלל לכמות היומית","E":"תוסף יוד בהריון הוא נושא שאין לגביו כל התייחסות במצגת","F":"מומלץ לדחות כל פעילות גופנית עד לפחות שנה לאחר הלידה","G":"סידן אמורפי הוא הסוג היחיד של סידן שאסור בהחלט לצרוך בהריון","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"בפועל, ההמלצה היא להתחיל פעילות גופנית מתונה (לא אינטנסיבית) כחודש-חודש וחצי לאחר הלידה (לא מיד ולא רק אחרי שנה); הצורך בברזל עולה בהריון ויש קושי מיוחד בספיגתו; ההנחיות הרשמיות דווקא כן מתייחסות לכמות יומית; יוד כן מוזכר (כדעה אישית); וסידן אמורפי מוזכר כהמלצה אפשרית לשקילה, לא כאיסור. שקופית: 147 - הריון והנקה","slides":"","section":"A"},{"n":20,"text":"אילו מהמשפטים הבאים לגבי תזונה בהריון והנקה נכונים על פי המצגת?","options":{"A":"יש קושי מיוחד בספיגת ברזל בהריון, ולכן הדרישה היומית לברזל עולה","B":"קיימות הנחיות רשמיות המפרטות כמות ברזל מומלצת ליום בהריון","C":"טחינה, שקדים, טופו, במיה, ברוקולי ושעועית מוזכרים כמקורות סידן, עם שיקול להמלצה על סידן אמורפי","D":"תוסף יוד מוצג במצגת כהמלצה אישית של המרצה/ת","E":"מומלץ להימנע מרעלים וקרינה סלולרית ככל האפשר","F":"מומלץ לעודד התחלת פעילות גופנית מתונה כחודש עד חודש וחצי לאחר הלידה","G":"כל הנקודות הנ\"ל מתייחסות לפרק \"הריון והנקה\" במצגת"},"answer":["G"],"multi":false,"explanation":"כל המשפטים תואמים את תוכן שקופית \"הריון והנקה\": קושי בספיגת ברזל והנחיות רשמיות לגביו, מקורות סידן ושיקול לסידן אמורפי, תוסף יוד כדעה אישית, הימנעות מרעלים וסלולר, ועידוד פעילות גופנית מתונה כחודש-חודש וחצי לאחר הלידה. שקופית: 147 - הריון והנקה","slides":"","section":"A"},{"n":21,"text":"מדוע, על פי המצגת, יש חשיבות מיוחדת להקפדה על צריכת ברזל מספקת בהריון?","options":{"A":"משום שקיים קושי מיוחד בספיגת ברזל בתקופת ההריון, ולכן יש להקפיד על צריכה מספקת בהתאם להנחיות הרשמיות","B":"משום שברזל מחליף את הצורך בסידן בהריון; משום שברזל אינו קשור כלל לתזונת הריון והנקה","C":"משום שברזל נחשב מזיק בהריון ויש להימנע ממנו לחלוטין; משום שברזל מומלץ רק בשליש הראשון להריון ולא לאחר מכן","D":"משום שהצורך בברזל בהריון זהה לחלוטין לצורך אצל גבר מבוגר; משום שספיגת הברזל דווקא משתפרת בהריון וניתן להפחית את הצריכה"},"answer":["A"],"multi":false,"explanation":"המצגת מציינת קושי בספיגת ברזל בהריון, ולכן יש הנחיות רשמיות לגבי כמות הברזל היומית המומלצת. שקופית: 147 - הריון והנקה","slides":"","section":"A"},{"n":22,"text":"אילו מהמשפטים הבאים נכונים לגבי תוספי תזונה בהריון, על פי המצגת?","options":{"A":"יש לשקול המלצה על תוסף סידן אמורפי","B":"תוסף יוד מוצג כדעה אישית של המרצה/ת (\"לדעתי חובה תוסף יוד\")","C":"סידן אמורפי אסור בהחלט בהריון","D":"אין כל התייחסות לתוספי סידן או יוד במצגת","E":"תוסף יוד מוצג כהנחיה רשמית מחייבת ולא כדעה אישית","F":"יש להימנע מכל תוסף מינרלים בהריון בכל מקרה","G":"תוסף סידן אמורפי מוזכר כחובה מוחלטת ולא כשיקול"},"answer":["A","B"],"multi":true,"explanation":"המצגת מזכירה שיקול להמלצה על סידן אמורפי, ומנסחת את ההמלצה על תוסף יוד באופן מפורש כדעה אישית של המרצה/ת, בניגוד להנחיות רשמיות. שקופית: 147 - הריון והנקה","slides":"","section":"A"},{"n":23,"text":"אילו מהגישות הבאות מוצגות במצגת כדגשים תזונתיים לילדים?","options":{"A":"פחות להקפיד על הפרדת מזונות ושעת האכילה","B":"דגש על חלבון בגיל הגדילה, כולל שילוב מוצרי חלב במידת הצורך","C":"הוספה הדרגתית (\"לאט לאט\") של ירקות ועלים לשייקים וגלידות פירות","D":"יש להימנע לחלוטין מכל שילוב של ילדים בהכנת האוכל, מטעמי בטיחות","E":"בררנות באכילה היא לרוב תופעה חיובית שיש לעודד ללא סייג","F":"יש להקפיד תמיד על הפרדה קפדנית בין סוגי מזונות אצל ילדים","G":"אין כל דרך לשלב ירקות במזון שילדים אוהבים"},"answer":["A","B","C"],"multi":true,"explanation":"המצגת ממליצה להקל בהפרדת מזונות ושעות אכילה, לשים דגש על חלבון בגיל הגדילה (כולל מוצרי חלב), ולהוסיף בהדרגה ירקות ועלים לשייקים וגלידות - בניגוד לגישות קיצוניות של הפרדה קפדנית, הימנעות משיתוף ילדים בבישול, או ראיית בררנות כחיובית ללא סייג. שקופית: 147 - דגשים לילדים","slides":"","section":"A"},{"n":24,"text":"אילו מהמשפטים הבאים על בררנות באכילה אצל ילדים נכונים על פי המצגת?","options":{"A":"בררנות אצל ילדים היא תמיד תופעה נייטרלית שאינה משפיעה על גיוון או כמות האכילה","B":"בררנות אף פעם אינה משמשת כלי נגד ההורים","C":"יש להקפיד תמיד באופן קפדני על הפרדת מזונות ושעות אכילה קבועות אצל ילדים בררנים","D":"אין שום דרך יעילה לשלב ירקות ועלים במאכלים שילדים אוהבים כמו קציצות","E":"יש להימנע לחלוטין משיתוף ילדים בהכנת האוכל, כדי לא לעודד בררנות נוספת","F":"גרעיני דלעת וברוקולי אינם מתאימים לשילוב בקציצות לילדים","G":"תמיד עדיף לתת לילד לאכול אך ורק את מה שהוא בוחר, ללא כל ניסיון לגיוון","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"לפי המצגת, בררנות פוגעת פעמים רבות בגיוון ובכמות האכילה, ולא פעם משמשת כלי נגד ההורים; מומלץ להקל (לא להחמיר) בהפרדת מזונות; ניתן לשלב ירקות ועלים בקציצות (כולל ברוקולי וגרעיני דלעת) שילדים אוהבים; ומומלץ לשלב ילדים בהכנת האוכל, לא להימנע מכך. שקופית: 147 - דגשים לילדים","slides":"","section":"A"},{"n":25,"text":"אילו מהבאים מוצגים במצגת כדרכים טובות לשלב מזון מזין אצל ילדים?","options":{"A":"קציצות עדשים","B":"קציצות עם טופו","C":"קציצות עם עלים ירוקים וברוקולי","D":"קציצות עם גרעיני דלעת","E":"שימוש אפשרי בנבט חיטה","F":"שילוב הילדים בהכנת האוכל","G":"הוספה הדרגתית של ירקות ועלים לשייקים וגלידות פירות"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל אלו מופיעים במצגת כדרכים לשלב מזון מזין: קציצות עדשים/טופו/עלים ירוקים/ברוקולי/גרעיני דלעת, אפשרות לנבט חיטה, שיתוף ילדים בהכנת האוכל, והוספה הדרגתית של ירקות לשייקים וגלידות. שקופית: 147 - דגשים לילדים","slides":"","section":"A"},{"n":26,"text":"אם/אב מדווחים כי ילדם אוכל רק מספר מצומצם של מאכלים ומסרב לנסות דברים חדשים, ולעיתים נראה כי הדבר קורה בעיקר במצבי עימות עם ההורים. כיצד מתייחסת המצגת לתופעה זו?","options":{"A":"כתופעה שלא פעם קשורה לבררנות שמביאה לאכילה מופחתת ולא מגוונת, ולעיתים משמשת כלי נגד ההורים (לא תמיד)","B":"כתופעה שאינה קשורה כלל לדינמיקה המשפחתית; כתופעה נדירה ביותר שאינה מוכרת כלל בילדים","C":"כתופעה המחייבת הפרדה קפדנית של מזונות כדי לפתור אותה; כתופעה שפתרונה היחיד הוא הפסקת כל ארוחה משותפת עם ההורים","D":"כתופעה שיש להתעלם ממנה לחלוטין ולא להתייחס אליה בשום אופן; כתופעה המעידה בהכרח על מחלה חמורה שדורשת בירור רפואי מיידי"},"answer":["A"],"multi":false,"explanation":"המצגת מציינת במפורש שבררנות \"לא פעם\" מביאה לאכילה מופחתת ולא מגוונת, ו\"לא פעם\" (לא תמיד) משמשת כלי נשק מול ההורים - כלומר יש לה גם ממד התנהגותי-משפחתי. שקופית: 147 - דגשים לילדים","slides":"","section":"A"},{"n":27,"text":"אילו משני המשפטים הבאים לגבי שילוב ירקות ועלים בתזונת ילדים מדויקים, על פי המצגת?","options":{"A":"מומלץ להוסיף ירקות ועלים לשייקים וגלידות פרי בהדרגה, לאט לאט","B":"ניתן להסתיר ירקות ועלים ירוקים בתוך קציצות (למשל עדשים, טופו, ברוקולי) כשיטה טובה לאכילת מזון מזין","C":"יש להוסיף ירקות ועלים בבת אחת ובכמות גדולה כדי להרגיל את הילד מהר","D":"אין כל דרך לשלב ירקות בקציצות","E":"גלידות ושייקים אינם מקום מתאים לשילוב ירקות בשום מקרה","F":"יש להימנע משילוב עלים ירוקים בתזונת ילדים לחלוטין","G":"קציצות אינן שיטה מומלצת לשילוב מזון מזין בתזונת ילדים"},"answer":["A","B"],"multi":true,"explanation":"המצגת ממליצה להוסיף ירקות ועלים לשייקים וגלידות \"לאט לאט\" (לא בבת אחת), ולהשתמש בקציצות (עדשים, טופו, עלים ירוקים, ברוקולי, גרעיני דלעת) כשיטה טובה לאכילת מזון מזין. שקופית: 147 - דגשים לילדים","slides":"","section":"A"},{"n":28,"text":"אילו מהמשפטים הבאים לגבי חלבון ומזון בגיל הילדות נכונים על פי המצגת?","options":{"A":"יש דגש על צריכת חלבון בגיל הגדילה","B":"במידת הצורך, ניתן לשלב מוצרי חלב כחלק מהדגש על חלבון","C":"חלבון אינו חשוב במיוחד בגיל הילדות לעומת גיל מבוגר","D":"שייקים וגלידות מפירות יכולים לשמש בסיס להוספת ירקות ועלים בהדרגה","E":"יש להימנע ממוצרי חלב אצל כל הילדים ללא יוצא מן הכלל","F":"נבט חיטה מוזכר במצגת כמזון שיש להימנע ממנו לחלוטין אצל ילדים","G":"יש להאכיל ילדים אך ורק מזון נא (חי), ולעולם לא מבושל"},"answer":["A","B","D"],"multi":true,"explanation":"המצגת שמה דגש על חלבון בגיל הגדילה כולל מוצרי חלב בעת הצורך, ומציעה שייקים וגלידות פרי כבסיס להוספה הדרגתית של ירקות ועלים. לעומת זאת נבט חיטה מוזכר במצגת כאפשרות שימושית (לא כמשהו להימנע ממנו), ואין המלצה להאכיל רק מזון נא בלבד. שקופית: 147 - דגשים לילדים","slides":"","section":"A"},{"n":29,"text":"אילו מהמשפטים הבאים לגבי הפרדת מזונות ושעות אכילה בילדים נכונים על פי המצגת?","options":{"A":"יש להקפיד ביתר שאת (יותר מבמבוגרים) על הפרדת מזונות קפדנית ושעות אכילה קבועות אצל ילדים","B":"הפרדת מזונות ושעות אכילה הן הנושא המרכזי היחיד שיש להתמקד בו בתזונת ילדים","C":"אין כל קשר בין גמישות בהפרדת מזונות לבין שיתוף פעולה של הילד בארוחה","D":"יש להעניש ילד שאינו שומר על סדר אכילה קבוע","E":"גמישות בהפרדת מזונות ושעות אכילה רלוונטית רק לילדים מעל גיל 10","F":"אין כל המלצה במצגת בנוגע להפרדת מזונות אצל ילדים","G":"יש לאסור לחלוטין חטיפים בין ארוחות אצל ילדים בכל מצב","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"המצגת ממליצה דווקא על גמישות רבה יותר - \"פחות להקפיד\" על הפרדת מזונות ושעת האכילה אצל ילדים - ולא על החמרה, איסורים או התמקדות בלעדית בנושא זה. שקופית: 147 - דגשים לילדים","slides":"","section":"A"},{"n":30,"text":"אילו מההתאמות הבאות בין אוכלוסייה להמלצה תזונתית נכונות, על פי המצגת?","options":{"A":"ספורטאים - תזונה רגילה מספיקה כל עוד אינם ספורטאים מקצועיים, אך תוספת חלבון חיונית במאמצים קצרים ואינטנסיביים","B":"קשישים - אין להעביר אותם לטבעונות, אך מי שהיה טבעוני יכול לרוב להמשיך כך","C":"נשים בהריון - קיים קושי מיוחד בספיגת ברזל, ולכן יש הנחיות רשמיות לגבי כמות יומית מומלצת","D":"ילדים - מומלץ להקל (ולא להחמיר) בהפרדת מזונות ובשעות אכילה קבועות","E":"קשישים רזים מדי (BMI מתחת ל-19.5) - מומלצת העשרת המזון בשומנים איכותיים כמו אגוזים, שקדים ואבוקדו","F":"ילדים - ניתן לשלב ירקות ועלים בהדרגה בשייקים, גלידות פרי וקציצות","G":"העיקרון הבסיסי לכל האוכלוסיות: התזונה המתאימה לאדם בריא מתאימה לכל גיל, עם דגשים ייחודיים לכל אוכלוסייה"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל התאמה משקפת נאמנה עיקרון מרכזי מהמצגת עבור כל אחת מהאוכלוסיות שנסקרו (ספורטאים, קשישים, הריון, ילדים), תוך שמירה על העיקרון הבסיסי המשותף שנפתחה בו המצגת. שקופית: 141-147 - סיכום כלל האוכלוסיות","slides":"","section":"A"},{"n":1,"text":"מתאמן חובב בן 28, המתאמן בחדר כושר 3 פעמים בשבוע לצורך שיפור כושר גופני כללי (לא ספורטאי תחרותי), שואל אם עליו להתחיל ליטול תוסף חלבון בכמות גבוהה כדי \"לא לפספס\" התקדמות. מה ההמלצה המתאימה ביותר על פי עקרונות המצגת?","options":{"A":"להסביר לו שכל עוד אינו ספורטאי מקצועי, תזונה רגילה ומאוזנת צפויה להספיק לצרכיו","B":"להמליץ לו מיידית על מינון תוסף חלבון מקסימלי, ללא קשר לעצימות האימונים","C":"להמליץ לו להפסיק כל צריכת חלבון מהמזון ולעבור לתוספים בלבד","D":"להסביר שספורטאים חובבים תמיד זקוקים לאותה כמות תוסף חלבון כמו מפתחי גוף מקצועיים","E":"להמליץ לו להימנע מכל פעילות גופנית עד להתייעצות תזונתית מקיפה","F":"להסביר שחלבון אינו קשור כלל לפעילות גופנית מתונה","G":"להמליץ לו לצרוך תוסף חלבון רק בימים שבהם אינו מתאמן כלל"},"answer":["A"],"multi":false,"explanation":"המצגת קובעת שתזונה רגילה מספיקה כל עוד האדם אינו ספורטאי מקצועי; מחלוקת קיימת רק סביב כמה יותר חלבון נחוץ, ולא סביב הצורך הבסיסי בתוסף עבור מתאמן חובב. שקופית: 142 - ספורטאים: חלבון","slides":"","section":"B"},{"n":2,"text":"ספורטאית תחרותית המקפידה על אחוזי שומן נמוכים מאוד בגופה מדווחת על הפרעות במחזור החודשי. מה הקשר האפשרי, על פי המצגת?","options":{"A":"אחוז שומן נמוך מדי בגוף עלול להוות סיכון לפגיעה בפוריות, ולכן גם ספורטאים חובבים מומלצים לשאוף לקצה הנמוך (ולא הקיצוני) של הסקאלה התקינה, לא מתחתיה","B":"יש להפסיק לחלוטין את המעקב אחר הרכב הגוף שלה; אין כל קשר בין אחוז שומן בגוף לתפקוד ההורמונלי","C":"אחוז שומן נמוך מדי הוא תמיד יעד רצוי ללא סייגים; יש להגדיל את נפח האימונים כדי לפצות על אחוז השומן הנמוך","D":"יש להנחות אותה להוריד את אחוז השומן עוד יותר כדי לשפר ביצועים; הפרעות במחזור אצל ספורטאיות אינן קשורות בשום צורה לתזונה או להרכב הגוף"},"answer":["A"],"multi":false,"explanation":"המצגת מציינת כי שומן גוף נמוך מדי מסוכן ומהווה סיכון לפגיעה בפוריות; לכן ההמלצה היא לשאוף לקצה הנמוך של הסקאלה התקינה, לא מתחתיה. שקופית: 142 - ספורטאים: אחוזי שומן","slides":"","section":"B"},{"n":3,"text":"רץ מרתון המתכונן לתחרות שואל איך לשפר את ביצועיו התזונתיים לפני ובמהלך האימונים. אילו שתי המלצות מהמצגת רלוונטיות ביותר עבורו?","options":{"A":"הקפדה על תזונה עשירה בנוגדי חמצון, המומלצת במיוחד לרצי מרתון","B":"שילוב סלק/מיץ סלק העשיר בניטראטים, בסמוך למאמץ (בטווח הזמן שצוין במצגת)","C":"הימנעות מוחלטת מכל פחמימה לפני האימון, ללא קשר למטרה","D":"הפסקת כל צריכת נוזלים החל משעה לפני המרוץ","E":"מעבר לתזונה טבעונית מלאה בסמוך למרוץ, ללא קשר להרגלים קודמים","F":"הימנעות מוחלטת מקפאין בכל מצב","G":"הפחתת אחוז השומן בגוף לרמה הקיצונית ביותר האפשרית"},"answer":["A","B"],"multi":true,"explanation":"המצגת ממליצה במיוחד לרצי מרתון על תזונה נוגדת חמצון, וכן על צריכת סלק/מיץ סלק (ניטראטים) בחלון הזמן שצוין לפני המאמץ לשיפור ביצועים. שקופית: 143 - מזונות משפרי ביצועים","slides":"","section":"B"},{"n":4,"text":"אישה בת 82, שוקלת פחות מהרצוי, עם BMI מחושב מתחת ל-19.5, מתגוררת לבד ומתקשה להכין ארוחות מורכבות. אילו שתי המלצות מהמצגת הכי מתאימות למצבה?","options":{"A":"העשרת המזון שהיא כן מצליחה להכין באגוזים, שקדים, אבוקדו, שמן זית או שמן קוקוס","B":"תיאום עם בן/בת משפחה או מטפל/ת שיבקרו פעם בשבוע ויכינו תבשילים/מרקים סמיכים שיוקפאו במנות קטנות","C":"מעבר מיידי לתזונה טבעונית מלאה כדי להקל על מערכת העיכול","D":"הפחתת מספר הארוחות היומי לארוחה אחת מרוכזת","E":"הימנעות מוחלטת משומן מכל סוג בשל גילה","F":"הפסקת כל בישול ומעבר למזון חי בלבד","G":"הימנעות מוחלטת ממרקים, מאחר שהם \"מדללים\" את הערך התזונתי"},"answer":["A","B"],"multi":true,"explanation":"לקשישה רזה מדי (BMI מתחת ל-19.5) מומלצת העשרת המזון בשומנים איכותיים, ובמקרה של קושי בהכנת ארוחות - היעזרות בבן משפחה/מטפל שיכין ויקפיא מנות קטנות של תבשילים ומרקים סמיכים. שקופית: 146 - דגשים תזונתיים לקשישים","slides":"","section":"B"},{"n":5,"text":"קשיש עם שיניים תותבות המתקשה ללעוס ובנוסף סובל מעצירות חוזרת. אילו מהפעולות הבאות מומלצות עבורו על פי המצגת?","options":{"A":"הגברת השימוש בבלנדר ובמזון מבושל/מאודה, יחד עם ארוחות קטנות ותכופות יותר","B":"עידוד ללעיסה מרובה ככל שניתן","C":"מתן ארוחה גדולה אחת ביום כדי לצמצם את מספר פעמי הלעיסה","D":"עידוד לשתות כמויות גדולות של נוזלים בו-זמנית עם האוכל כדי לסייע בבליעה","E":"הימנעות מוחלטת מכל מזון מבושל","F":"הימנעות מפעילות גופנית עד לפתרון בעיית העצירות","G":"הימנעות מוחלטת ממזון מאודה"},"answer":["A","B"],"multi":true,"explanation":"המצגת ממליצה לקשישים עם קשיי לעיסה על שימוש רב יותר בבלנדר/מזון מבושל או מאודה, לעיסה מרובה, וארוחות קטנות ותכופות - ולא ארוחות גדולות בודדות או שתייה בזמן האכילה, שאינה מומלצת. שקופית: 145 - דגשים כלליים לקשישים","slides":"","section":"B"},{"n":6,"text":"שני קשישים מגיעים לייעוץ: קשיש א' היה טבעוני משך רוב חייו הבוגרים; קשיש ב' אוכל כל סוגי המזון ובני משפחתו מבקשים להעביר אותו לתזונה טבעונית כדי \"להבריא\" אותו. מה ההמלצה הנכונה על פי המצגת?","options":{"A":"קשיש א' יכול לרוב להמשיך בתזונה הטבעונית שלו; אין להעביר את קשיש ב' לטבעונות, שכן הדבר עלול ליצור/להחמיר בעיות ספיגה","B":"אין כל מחקר המראה יתרון לחלבון מן החי בגיל מבוגר, ולכן ההחלטה חסרת משמעות תזונתית","C":"יש להעביר את שני הקשישים לתזונה טבעונית מלאה באופן מיידי; יש לאסור על קשיש א' להמשיך בתזונה הטבעונית שלו בגיל מבוגר","D":"יש להעביר רק את קשיש ב' לטבעונות, ואילו קשיש א' צריך להפסיק להיות טבעוני; אין שום הבדל בגישה בין שני המקרים; טבעונות בגיל מבוגר תמיד משפרת את הספיגה במעי"},"answer":["A"],"multi":false,"explanation":"המצגת מבחינה בין קשיש שהיה טבעוני והיה יכול להמשיך כך, לבין קשיש שאינו טבעוני שאין להעביר אותו לטבעונות בגיל מבוגר בשל סיכון להחמרת בעיות ספיגה. שקופית: 146 - דגשים תזונתיים לקשישים","slides":"","section":"B"},{"n":7,"text":"אישה בהריון שבוע 20 מדווחת על עייפות ומתעניינת מדוע יש הדגשה כה גדולה על צריכת ברזל בהריון, יותר מכפי שהייתה לפני ההריון. מה ההסבר וההמלצה הנכונים על פי המצגת?","options":{"A":"בהריון קיים קושי מיוחד בספיגת ברזל, ולכן קיימות הנחיות רשמיות לגבי כמות הברזל היומית המומלצת, וחשוב להקפיד עליהן","B":"ברזל רלוונטי רק בשליש האחרון להריון; יש להימנע מברזל בהריון בשל סיכון לעובר","C":"יש להחליף את כל מקורות הברזל בסידן בלבד; עייפות בהריון אינה קשורה בשום צורה לצריכת ברזל","D":"ספיגת הברזל משתפרת באופן טבעי בהריון ולכן ניתן להפחית צריכה; אין שום סיבה מיוחדת - הצורך בברזל בהריון זהה לגמרי לצורך הרגיל"},"answer":["A"],"multi":false,"explanation":"המצגת מסבירה שקיים קושי מיוחד בספיגת ברזל בהריון, ולכן יש הנחיות רשמיות ברורות לגבי כמות הברזל היומית המומלצת שיש להקפיד עליה. שקופית: 147 - הריון והנקה","slides":"","section":"B"},{"n":8,"text":"אישה בהריון הנמנעת ממוצרי חלב שואלת ממה תוכל לקבל סידן, ובנוסף שואלת אם תוסף יוד הכרחי או שמדובר בהמלצה שנויה במחלוקת. מה התשובה המתאימה ביותר על פי המצגת?","options":{"A":"ניתן להיעזר במקורות כמו טחינה, שקדים, טופו, במיה, ברוקולי ושעועית (ואף לשקול סידן אמורפי); לגבי יוד - המצגת מציגה זאת כדעה אישית של המרצה/ת (\"לדעתי חובה\") ולא כהנחיה רשמית מוחלטת","B":"יש להימנע מכל מקור סידן צמחי בהריון; תוסף יוד אינו מוזכר כלל בהקשר של הריון","C":"יוד מוצג כהנחיה רשמית מחייבת ללא מקום לשיקול דעת; במיה וברוקולי אינם נחשבים מקורות סידן על פי המצגת","D":"הדרך היחידה לקבל סידן בהריון היא באמצעות תוסף בלבד; אין שום מקור סידן שאינו מוצרי חלב, ולכן חייבת לחדש את צריכת החלב"},"answer":["A"],"multi":false,"explanation":"המצגת מציעה מגוון מקורות סידן צמחיים (טחינה, שקדים, טופו, במיה, ברוקולי, שעועית) ומזכירה שיקול לסידן אמורפי; ולגבי יוד, מנסחת זאת כדעה אישית מפורשת ולא כהנחיה רשמית. שקופית: 147 - הריון והנקה","slides":"","section":"B"},{"n":9,"text":"הורה מדווח כי ילדו בן ה-5 אוכל כמות מצומצמת של מזונות, מסרב לירקות לחלוטין, ולעיתים נראה שהסירוב מחריף דווקא כאשר ההורים מתעקשים. אילו שתי גישות מהמצגת הכי מתאימות למקרה זה?","options":{"A":"הוספה הדרגתית (\"לאט לאט\") של ירקות ועלים לשייקים או גלידות פרי שהילד כבר אוהב","B":"הכנת קציצות המשלבות עדשים/טופו/עלים ירוקים/ברוקולי כדרך לגוון את התזונה בצורה מזינה ומקובלת על ילדים","C":"הקפדה קפדנית עוד יותר על כך שהילד יאכל אך ורק את מה שההורים מגישים, ללא כל גמישות","D":"הפרדת מזונות קפדנית לפי סוג, כדי \"לאלף\" את הילד לאכול נכון","E":"הענשת הילד על כל סירוב לאכול ירקות","F":"הפסקת כל שיתוף של הילד בהכנת האוכל","G":"מתן ירקות רק כאשר הילד אוכל לבד, ללא שום שינוי בהגשה"},"answer":["A","B"],"multi":true,"explanation":"המצגת ממליצה לשלב ירקות ועלים בהדרגה בשייקים/גלידות, ולהשתמש בקציצות עם עדשים/טופו/ירקות כדרך אהודה על ילדים לאכול מזון מזין - ולא בגישות מכריחות שעלולות להחריף את הבררנות. שקופית: 147 - דגשים לילדים","slides":"","section":"B"},{"n":10,"text":"ילד בן 9 בתקופת גדילה מואצת; ההורים מדווחים שהוא ממעט לאכול חלבון ומתעניין רק במאכלים מתוקים. הם גם שוקלים אם לשתף אותו בבישול. מה ההמלצה המתאימה ביותר על פי המצגת?","options":{"A":"לשים דגש על צריכת חלבון בגיל הגדילה, כולל מוצרי חלב במידת הצורך, ולשלב את הילד בהכנת האוכל כגישה מומלצת","B":"להימנע מכל שינוי בתזונה עד גיל ההתבגרות; להקפיד על הפרדת מזונות קפדנית כפתרון לבעיה","C":"להפסיק לגמרי את צריכת מוצרי החלב שלו בשל גילו; להאכיל אותו אך ורק מזון מתוק כדי להימנע ממאבקי כוח","D":"להתעלם מהנושא, שכן חלבון אינו רלוונטי במיוחד לגיל 9; להימנע לחלוטין משיתוף הילד בבישול כדי לא להסיח את דעתו מהאכילה"},"answer":["A"],"multi":false,"explanation":"המצגת מדגישה חלבון בגיל הגדילה (כולל מוצרי חלב לפי הצורך) וממליצה לשלב ילדים בהכנת האוכל כדרך מומלצת לעודד תזונה טובה יותר. שקופית: 147 - דגשים לילדים","slides":"","section":"B"},{"n":9000,"text":"כתופעה שלא פעם קשורה לבררנות שמביאה לאכילה מופחתת ולא מגוונת, ולעיתים משמשת כלי נגד ההורים (לא תמיד) — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["A"],"multi":false,"explanation":"המשפט נכון על פי החומר. המצגת מציינת במפורש שבררנות \"לא פעם\" מביאה לאכילה מופחתת ולא מגוונת, ו\"לא פעם\" (לא תמיד) משמשת כלי נשק מול ההורים - כלומר יש לה גם ממד התנהגותי-משפחתי. שקופית: 147 - דגשים לילדים","slides":"","section":"A","tf":1},{"n":9001,"text":"משום שברזל מומלץ רק בשליש הראשון להריון ולא לאחר מכן — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["B"],"multi":false,"explanation":"המשפט שגוי על פי החומר. המצגת מציינת קושי בספיגת ברזל בהריון, ולכן יש הנחיות רשמיות לגבי כמות הברזל היומית המומלצת. שקופית: 147 - הריון והנקה","slides":"","section":"A","tf":1},{"n":9002,"text":"נשים בהריון - קיים קושי מיוחד בספיגת ברזל, ולכן יש הנחיות רשמיות לגבי כמות יומית מומלצת — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["A"],"multi":false,"explanation":"המשפט נכון על פי החומר. כל התאמה משקפת נאמנה עיקרון מרכזי מהמצגת עבור כל אחת מהאוכלוסיות שנסקרו (ספורטאים, קשישים, הריון, ילדים), תוך שמירה על העיקרון הבסיסי המשותף שנפתחה בו המצגת. שקופית: 141-147 - סיכום כלל האוכלוסיות","slides":"","section":"A","tf":1},{"n":9003,"text":"חלבון אינו קשור כלל לאיזון חומצה-בסיס בגוף — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["B"],"multi":false,"explanation":"המשפט שגוי על פי החומר. השקופית מציינת שפעילות גופנית יוצרת קרעים מיקרוסקופיים בשריר ומחייבת יותר חלבון, שבמאמצים קצרים ואינטנסיביים תוספת חלבון חיונית במיוחד, ושתזונה רגילה מספיקה למי שאינו ספורטאי מקצועי; לעומת זאת כמות התוספת המדויקת שנויה במחלוקת, חלבון כן קשור לאיזון חומצה-בסיס בתא, ואצל מפתחי גוף מגדילים (לא מפחיתים) את כמות החלבון. שקופית: 142 - ספורטאים: חלבון","slides":"","section":"A","tf":1},{"n":9004,"text":"פעילות גופנית בבוקר ללא אכילה כלל, כאשר המטרה היא ירידה במשקל — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["A"],"multi":false,"explanation":"המשפט נכון על פי החומר. כל הפעולות הללו מוזכרות במצגת: סלק/ניטראטים ותזונה נוגדת חמצון (שקופית 143), קפאין המפחית כאב ועייפות ומעודד שריפת שומן (שקופית 144), ותזמון האכילה - צום בבוקר לירידה במשקל מול אכילת פחמימות לביצועים (שקופית 144). שקופית: 143-144 - מזונות ומשקאות משפרי ביצועים ותזמון פעילות","slides":"","section":"A","tf":1},{"n":9005,"text":"בררנות אצל ילדים היא תמיד תופעה נייטרלית שאינה משפיעה על גיוון או כמות האכילה — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["B"],"multi":false,"explanation":"המשפט שגוי על פי החומר. לפי המצגת, בררנות פוגעת פעמים רבות בגיוון ובכמות האכילה, ולא פעם משמשת כלי נגד ההורים; מומלץ להקל (לא להחמיר) בהפרדת מזונות; ניתן לשלב ירקות ועלים בקציצות (כולל ברוקולי וגרעיני דלעת) שילדים אוהבים; ומומלץ לשלב ילדים בהכנת האוכל, לא להימנע מכך. שקופית: 147 - דגשים לילדים","slides":"","section":"A","tf":1}]},{"id":"34","title":"המפגש הטיפולי","questions":[{"n":1,"text":"אילו משבע האפשרויות הבאות מוזכרות במצגת כמצבים שבהם אין לטפל טיפולית-תזונתית (או שיש להימנע מייעוץ) ללא ניסיון וליווי רפואי מתאים?","options":{"A":"שחמת כבד עם אלבומין נמוך","B":"סוכרת סוג 2 מאוזנת","C":"מטופל הנוטל קומדין","D":"עודף משקל קל","E":"מטופל לאחר ניתוח בריאטרי (קיצור קיבה)","F":"כולסטרול גבוה","G":"אלרגיה עונתית קלה"},"answer":["A","C","E"],"multi":true,"explanation":"המצגת מציינת במפורש כמצבים שבהם לא מטפלים: שחמת כבד/אי ספיקת כבד עם אלבומין נמוך, מטופלים הנוטלים קומדין (סיכון לאינטראקציות), ומטופלים לאחר ניתוח בריאטרי (פגיעה משמעותית במערכת העיכול). שאר האפשרויות אינן מוזכרות כמניעה. שקופית: 149-150 - במה אתם לא מטפלים","slides":"","section":"A"},{"n":2,"text":"לפי המצגת, מה מומלץ לגבי אורך השאלון שנשלח למטופל לפני הפגישה הראשונה?","options":{"A":"שאלון קצר יחסית, כדי לגרום למטופל לדבר בפגישה עצמה ולא להרגיש שכבר \"כתב הכל\"","B":"שאלון שיוחזר רק בסוף הפגישה; שאלון שממלא המטפל ולא המטופל","C":"שאלון הכולל אך ורק שאלות רפואיות; שאלון הנשלח רק לאחר הפגישה הראשונה","D":"אין צורך בשאלון כלל, הכל נשאל בעל פה; שאלון ארוך ומפורט ביותר כדי לא לפספס שום פרט"},"answer":["A"],"multi":false,"explanation":"המרצה מציין במפורש שלדעתו עדיף שאלון יחסית קצר, כדי לגרום למטופל לדבר בפגישה ולא לגרום לו לומר \"כבר כתבתי לכם הכל\". שקופית: 151 - לפני הטיפול / דילמת השאלון","slides":"","section":"A"},{"n":3,"text":"לגבי מבנה הפגישה הטיפולית עצמה, אילו מהקביעות הבאות נכונות?","options":{"A":"בתחילת הפגישה בעיקר המטפל מדבר, ובהמשך המטופל מדבר","B":"מומלץ להימנע מקשר עין כדי לא להלחיץ את המטופל","C":"עדיף להימנע מלהזכיר את המודל הטיפולי בתחילת הפגישה כדי לא להעמיס מידע","D":"יש להתמקד אך ורק בבעיות הרפואיות ולא לשאול על החיים הפרטיים","E":"מומלץ להקליד את כל דברי המטופל במחשב, ואין כל הבדל לעומת כתיבה ביד","F":"אין צורך לחייך בפגישה הראשונה כדי לשמור על רצינות מקצועית","G":"יש להימנע משאלות על תחביבים ופנאי כי אינן רלוונטיות לטיפול התזונתי","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"למעשה זה הפוך - בתחילת הפגישה המטופל מדבר ואילו בהמשך בעיקר המטפל מדבר; מומלץ קשר עין, להנהן ולהיות קשובים; מומלץ להזכיר את המודל הטיפולי; מומלץ לחייך; ומומלץ להתעניין בחיים הפרטיים ובתחביבים בגבול הטעם הטוב. שקופית: 154 - מה קורה בפועל בפגישה עצמה","slides":"","section":"A"},{"n":4,"text":"מהם שני הדברים שמומלץ להזכיר למטופל בתחילת הפגישה, לדברי המרצה?","options":{"A":"את המודל הטיפולי","B":"את מחיר הטיפול המדויק בשקלים","C":"את ה\"אני מאמין\" הטיפולי שלכם","D":"רשימת כל תופעות הלוואי האפשריות של התוספים","E":"את שמות שאר המטופלים שהצליחו","F":"את תנאי ביטול הפגישה","G":"את משך הזמן המדויק שייקח לריפוי מלא"},"answer":["A","C"],"multi":true,"explanation":"המצגת ממליצה להזכיר את המודל הטיפולי ואת ה\"אני מאמין\" הטיפולי, כדי שהמטופל ידע מה הולך להיות בהמשך התהליך. שקופית: 154 - מה קורה בפועל בפגישה עצמה","slides":"","section":"A"},{"n":5,"text":"אילו מהפעולות הבאות מומלצות כחלק מ\"שיעורי הבית\" שעל המטפל לעשות לפני הפגישה הראשונה עם מטופל חדש?","options":{"A":"ללמוד על המחלה הרלוונטית מיד לאחר שיחת הטלפון המקדימה","B":"לקרוא את השאלון שמילא המטופל","C":"ללמוד על התרופות שהמטופל נוטל","D":"לעבור ביסודיות על בדיקות הדם של המטופל","E":"להתכונן מראש כדי להגיע בטוחים יותר לפגישה","F":"לקבוע את הפגישה מספר ימים מראש כדי לאפשר זמן הכנה","G":"לבקש מהמטופל להביא לפגישה את התרופות ותוספי התזונה שהוא נוטל"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל הפעולות הללו מוזכרות במפורש במצגת כחלק מההכנה לפגישה - לימוד על המחלה, קריאת השאלון, לימוד על התרופות, מעבר על בדיקות הדם, קביעת הפגישה מראש כדי לאפשר הכנה, ובקשה מהמטופל להביא חומרים רלוונטיים. שקופית: 151-152 - לפני הטיפול / מה עושים לפני הפגישה","slides":"","section":"A"},{"n":6,"text":"מהי שאלת ההמשך שנשאלת כאשר המטופל עונה \"כן\" לשאלה החשובה מאוד \"האם אתה אוהב לשיר\"?","options":{"A":"האם אתה מוכן לעשות זאת כל יום","B":"האם אתה מוכן לשלם עבור זה","C":"האם בן/בת הזוג שלך מסכימים","D":"האם ניסית את זה בעבר","E":"האם הרופא שלך ממליץ על כך","F":"האם אתה זוכר מתי התחלת להרגיש כך","G":"האם תוכל להביא מכתב המלצה"},"answer":["A"],"multi":false,"explanation":"לפי המצגת, אם התשובה חיובית, השאלה הבאה היא \"האם אתה מוכן לעשות זאת כל יום\", ולאחריה גם \"האם אתה מסוגל לדמיין את עצמך בריא\". שקופית: 156 - שאלה מאוד מאוד חשובה","slides":"","section":"A"},{"n":7,"text":"אילו משבע האפשרויות הבאות מוזכרות במצגת כדוגמאות למאכלים תעשייתיים שחשוב לשאול עליהם במהלך בירור התזונה?","options":{"A":"שקדי מרק","B":"חסה טרייה","C":"חומוס קנוי","D":"אבטיח","E":"עוגיות תעשייתיות","F":"שקדי עץ טבעיים (ללא תוספות)","G":"גזר חי"},"answer":["A","C","E"],"multi":true,"explanation":"המצגת מונה במפורש שקדי מרק, חומוס קנוי ועוגיות כדוגמאות למאכלים תעשייתיים שחשוב לברר עליהם, לצד מיונז, מאפים, שוקולד וחטיפים. חסה, אבטיח, אגוזים טבעיים וגזר אינם ברשימה זו. שקופית: 155 - היכרות מעמיקה עם התזונה של המטופל","slides":"","section":"A"},{"n":8,"text":"לגבי שלב הליווי (המעקב לאחר הפגישה), אילו מהקביעות הבאות נכונות?","options":{"A":"הליווי הוא שלב לא קריטי ואפשר לוותר עליו כדי לחסוך זמן","B":"מומלץ להימנע מיצירת קשר עם המטופל בין הפגישות","C":"אין צורך לשאול את המטופל מה עשה ומה לא עשה מהתוכנית","D":"אסור להפנות מטופלים לטיפולים משלימים נוספים כמו טיפול זוגי או דמיון מודרך","E":"עדיף לא לשלוח למטופל דוגמאות לרשימות קניות או מתכונים","F":"יש להימנע משיחות טלפון תכופות כדי לא להישמע פולשני","G":"ברגע שנבנתה תוכנית התזונה, אין עוד צורך במעקב שוטף אחריה","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"להפך - הליווי מוגדר כ\"קריטי להצלחת הטיפול\", מומלצת שיחה טלפונית לפחות פעם בשבוע, יש לברר מה בוצע ומה לא ולמה, מומלץ לשלוח רשימות קניות ומתכונים, ומומלץ להפנות לטיפולים משלימים. שקופית: 162 - הליווי","slides":"","section":"A"},{"n":9,"text":"אילו שני נושאים מוזכרים כדוגמאות לטיפולים משלימים שניתן להפנות אליהם מטופלים, כחלק מהליווי?","options":{"A":"טיפול זוגי","B":"שיטת ארויגו (עיסוי בטן וגב)","C":"ניתוח בריאטרי","D":"טיפול בקומדין","E":"דיאליזה","F":"כימותרפיה","G":"השתלת איברים"},"answer":["A","B"],"multi":true,"explanation":"המצגת מזכירה טיפול זוגי, שיטת ארויגו, שיטת פאולה, דמיון מודרך, טיפול רגשי, ופעילות גופנית מתאימה (יוגה, טאי צ'י, צ'י קונג) כדוגמאות לסיוע מטפלים נוספים. שקופית: 162 - הליווי / סיוע במטפלים מתחומים נוספים","slides":"","section":"A"},{"n":10,"text":"אילו מהבאים מוזכרים כ\"סקירת מערכות\" בשאלון המקיף, כחלק מהבירור הרפואי הכללי?","options":{"A":"כאבי ראש/מיגרנות - תדירות ומיקום","B":"סחרחורות ובעיות שיווי משקל","C":"דלקות גרון חוזרות","D":"כאבים בשרירים ובפרקים","E":"צרבות ותדירות יציאות","F":"נשירת שיער ושבירות ציפורניים","G":"כמות ואיכות השינה"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל הפריטים הללו מוזכרים בפירוש בסעיפי סקירת המערכות השונים בשאלון המקיף - מערכת עצבים/ראש, אף-אוזן-גרון, שלד, עיכול ועור/שיער. שקופית: 178-182 - סקירת מערכות","slides":"","section":"A"},{"n":11,"text":"לפי דברי הרמב\"ם המצוטטים במצגת, מה עדיף לחזק אצל החולה, מלבד הכוח הטבעי באמצעות מזון?","options":{"A":"את הכוח הנפשי/החיוני, בין השאר באמצעות שמחה, סיפורים וניגון","B":"את הזיכרון באמצעות תרגילים קוגניטיביים בלבד","C":"רק את מערכת החיסון באמצעות תרופות; רק את התיאבון; את שרירי הליבה בלבד","D":"רק את הכוח הפיזי באמצעות תרגילי כוח; את מערכת הנשימה באמצעות תרגילי נשימה בלבד"},"answer":["A"],"multi":false,"explanation":"הרמב\"ם מדגיש חיזוק הכוח הטבעי במזון, אך גם חיזוק הכוח הנפשי והכוח החיוני, בין השאר באמצעות ניגון, סיפורים משמחים, שמחה וחידושים שמרחיבים את הלב. שקופית: 153 - דברי הרמב\"ם - מה אמור לקרות בפגישה","slides":"","section":"A"},{"n":12,"text":"אילו מהבאות מוזכרות כאלמנטים ה\"לא תזונתיים\" שמומלץ להתחיל בהם את בניית תוכנית הטיפול?","options":{"A":"פעילות גופנית (כולל תרגילי כוח ועליה במדרגות)","B":"דמיון מודרך","C":"שינוי דפוסי חשיבה","D":"קביעת תפריט קלוריות מדויק","E":"חישוב יחס חלבון-פחמימה-שומן","F":"רשימת תוספי תזונה מפורטת","G":"יעד ירידה במשקל קבוע מראש"},"answer":["A","B","C"],"multi":true,"explanation":"המצגת ממליצה להתחיל את בניית התוכנית מהאלמנטים שאינם תזונתיים, וביניהם פעילות גופנית, דמיון מודרך ושינוי דפוסי חשיבה - ורק לאחר מכן לעבור לכללי האכילה ולתפריט עצמו. שקופית: 159 - בניית תוכנית הטיפול","slides":"","section":"A"},{"n":13,"text":"מהם שני הגורמים שהמרצה מציין כמשפיעים על ההחלטה כיצד להתקדם עם מטופל ספציפי - התחלה מיידית באידיאל מול הדרגתיות?","options":{"A":"כוחותיו ורצונותיו של המטופל","B":"אילוצי החיים של המטופל והרצון שלו לראות תוצאות מהירות","C":"גובה המטופל","D":"מספר הילדים של המטופל","E":"הוותק המקצועי של המטפל בלבד","F":"מזג האוויר בעונה הנוכחית","G":"מחיר התוכנית"},"answer":["A","B"],"multi":true,"explanation":"המצגת קובעת שההחלטה משתנה ממטופל למטופל, לפי כוחותיו, רצונותיו, אילוצי חייו והרצון שלו לראות תוצאות מהירות. שקופית: 159 - הדילמה המרכזית ביותר לגבי תוכנית הטיפול","slides":"","section":"A"},{"n":14,"text":"לגבי טופס ההסכמה לטיפול, אילו מהקביעות הבאות נכונות?","options":{"A":"הטופס אינו צריך לציין שהמטפל אינו רופא או תזונאי קליני","B":"הטופס צריך להבטיח למטופל תוצאות מובטחות של ריפוי","C":"אין צורך ליידע את רופא המשפחה על שינויים בתרופות","D":"הטופס אינו צריך לכלול הגדרה של היקף הליווי","E":"עדיף לא לציין את עלות הפגישה והליווי בטופס","F":"אין חובה שהמטופל יהיה מודע לכך שהמטפל אינו רופא","G":"הטופס נועד בעיקר לצרכים שיווקיים ולא להבהרת גבולות האחריות","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"להפך - הטופס צריך לציין שהמטפל אינו רופא/תזונאי קליני, שאין התחייבות לתוצאות, ששינוי תרופות הוא באחריות המטופל תוך יידוע רופא המשפחה, שיש הגדרה מדויקת של היקף הליווי, ושהמטופל מודע לעלות. שקופית: 171 - מה צריך להיות רשום בטופס ההסכמה לטיפול","slides":"","section":"A"},{"n":15,"text":"אילו מהצעדים הבאים מוזכרים כחלק מההתחלה הטכנית/עסקית של הפעלת קליניקה, לפי המצגת?","options":{"A":"פתיחת תיק עוסק פטור במס הכנסה ובמע\"מ","B":"עשיית ביטוח אחריות מקצועית וביטוח צד ג'","C":"קניית פנקס קבלות","D":"הכנת חדר ייעודי בבית או שכירת חדר בקליניקה","E":"חתימת המטופל על טופס הסכמה לטיפול","F":"הכנה מראש והגעה מוכנים לכל פגישה","G":"שקילת אפשרות למיתוג, לוגו ואתר אינטרנט"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל הצעדים הללו מוזכרים במצגת כחלק מתחילת הדרך - הצד הטכני/עסקי (עוסק פטור, ביטוחים, פנקס קבלות), מיקום הטיפול, חתימה על הסכמה, הכנה לפגישות, ואפשרויות מיתוג ושיווק מתקדמות יותר. שקופית: 170-172 - איך מתחילים / איפה מטפלים / מיתוג ושיווק","slides":"","section":"A"},{"n":16,"text":"לפי המצגת, מהו הכלי המתואר כ\"אחד העוצמתיים ביותר\" ליצירת היכרות עם מטפלים חדשים (שיווק)?","options":{"A":"הרצאות","B":"פרסום בעיתון מודפס","C":"שילוט חוצות","D":"דיוור ישיר בדואר רגיל","E":"מודעות ברדיו","F":"חלוקת עלונים ברחוב","G":"שיתוף פעולה עם חברות תרופות"},"answer":["A"],"multi":false,"explanation":"המצגת מציינת שהרצאות הן \"אחד הכלים העוצמתיים ביותר\" לכך שיכירו אתכם, וממליצה להתאמן מול הראי ולהתחיל מקהלים לא מפחידים. שקופית: 172 - איך משיגים מטופלים / טיפים להרצאות","slides":"","section":"A"},{"n":17,"text":"אילו מהבאות מוזכרות כ\"טעויות נפוצות בטיפול\" לפי המצגת?","options":{"A":"להתחיל לטפל בחינם","B":"להתמקד בתוספים ובצמחי מרפא ולא בהרגלי החיים","C":"לשאול את המטופל שאלות רבות מדי בפגישה הראשונה","D":"לחייך יותר מדי למטופל","E":"להזכיר את שם המטופל בסוף הפגישה","F":"לבקש מכתב תודה בסוף תהליך מוצלח","G":"להתעניין בחיים הפרטיים של המטופל"},"answer":["A","B"],"multi":true,"explanation":"המצגת מציינת כטעויות נפוצות: התחלת טיפול בחינם, ליווי לא מוגדר או ליווי יתר, התעלמות מהפן הרגשי-נפשי-רוחני, והתמקדות בתוספים ובצמחי מרפא במקום בהרגלי החיים ובדפוסי חשיבה. שקופית: 173 - טעויות נפוצות בטיפול","slides":"","section":"A"},{"n":18,"text":"אילו מהבאות מוזכרות כדוגמאות לתחומים שבהם שיטת הארויגו (עיסוי בטן וגב) יכולה לסייע?","options":{"A":"בעיות פוריות","B":"אנדומטריוזיס","C":"דלקת בערמונית","D":"סוכרת סוג 1","E":"אבנים בכליה","F":"שבר בעצם הירך","G":"יתר לחץ דם ריאתי"},"answer":["A","B","C"],"multi":true,"explanation":"המצגת מזכירה במפורש שיטת ארויגו לבעיות פוריות, בעיות באיברי האגן, מיומות, אנדומטריוזיס, עצירות, דלקת בערמונית, כאבי מחזור ואי-סדירות במחזור. שקופית: 162 - סיוע במטפלים מתחומים נוספים","slides":"","section":"A"},{"n":19,"text":"לגבי מצבים שבהם המלצות תזונתיות עלולות לפגוע, אילו מהקביעות הבאות נכונות?","options":{"A":"יש לטפל תמיד גם במטופלים עם דיכאון קשה כדי לעזור להם","B":"מומלץ להמליץ על צריכת יוד גבוהה למטופלים עם היפר-תירואידיזם","C":"תזונה קיצונית שאי אפשר להתמיד בה לכל החיים היא בטוחה כל עוד רואים תוצאות מהירות","D":"אין בעיה להמליץ על אשכוליות בכמות רבה למטופלים הנוטלים קומדין","E":"מותר לתת מזון מותסס ללא הגבלה למטופלים עם כשל חיסוני משמעותי","F":"הגעה לתת משקל מסוכן אינה סיבה להיזהר מהמלצות תזונתיות נוספות","G":"ניתן לטפל בביטחון מלא בחולה בהתקף פעיל של קרוהן גם ללא ניסיון טיפולי קודם","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"המצגת קובעת בדיוק את ההפך: דיכאון קשה הוא מצב שאין לטפל בו; יוד בהיפר-תירואידיזם עלול להזיק; תזונה קיצונית שאי אפשר להתמיד בה עלולה להזיק; אשכוליות מסוכנות עם קומדין; מזון מותסס לא כראוי מסוכן בכשל חיסוני; תת משקל מסוכן מחייב זהירות; והתקף פעיל של קרוהן/קוליטיס מחייב ניסיון טיפולי קודם. שקופית: 150 - מתי המלצות תזונתיות יכולות לפגוע","slides":"","section":"A"},{"n":20,"text":"אילו מהבאים מוזכרים כחלק מהמידע שיש לכלול בשאלון הקצר לפני הפגישה, לפי המצגת?","options":{"A":"פרטים אישיים בסיסיים","B":"המחלות/בעיות הבריאות הנוכחיות","C":"הסימפטומים מהם המטופל סובל","D":"הרגלים כמו עישון, אלכוהול ופעילות גופנית","E":"תרופות ומחלות בעבר, כולל ניתוחים ואשפוזים","F":"רשימת תוספי התזונה","G":"בדיקות דם מצורפות"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל הפריטים הללו מופיעים במפורש ברשימת \"מה צריך להיות בשאלון הקצר\" - פרטים אישיים, מחלות/בעיות בהווה, סימפטומים, הרגלים, מחלות ותרופות בעבר, תוספי תזונה, ובדיקות דם מצורפות. שקופית: 152 - מה צריך להיות בשאלון הקצר","slides":"","section":"A"},{"n":21,"text":"מה, לפי המרצה, הדבר היחיד שמטפלים מצטערים עליו לאחר שהתחילו לטפל בפועל?","options":{"A":"שלא התחילו לטפל מוקדם יותר","B":"שהתחילו לטפל בכלל","C":"שלמדו יותר מדי לפני שהתחילו","D":"שלא גבו מספיק כסף","E":"שלא פתחו אתר אינטרנט מיד","F":"שלא התמחו בנישה ספציפית","G":"שלא קנו ציוד יקר יותר"},"answer":["A"],"multi":false,"explanation":"המצגת מציינת שהדבר היחיד שמטפלים יצטערו עליו אחרי שיתחילו לטפל הוא שלא התחילו לטפל קודם. שקופית: 169 - \"אני לא מרגיש מוכן לטפל\"","slides":"","section":"A"},{"n":22,"text":"אילו מהבאות מתוארות כ\"תובנות חשובות לזכור\" לגבי הצלחה וכישלון בטיפול?","options":{"A":"לא כל כישלון הוא שלכם - להצלחה נדרש גם שיתוף פעולה של המטופל","B":"אתם רק שליחים שמסייעים לאדם להבריא את עצמו","C":"כל כישלון הוא באחריות המטפל בלבד","D":"יש להתרגש ולהתייאש אם לא הצלחתם עם המטופל הראשון","E":"הצלחה תלויה אך ורק בכישורי המטפל","F":"אין שום דרך לדעת מראש אם מטופל ישתף פעולה","G":"יש לוותר על מטופלים שלא מגיעים להצלחה מיידית"},"answer":["A","B"],"multi":true,"explanation":"המצגת מדגישה שלא כ
