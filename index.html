ל כישלון הוא של המטפל - נדרש שיתוף פעולה של המטופל, ולפעמים גם זה לא מספיק - וכי המטפל הוא רק שליח שמסייע לאדם להבריא את עצמו. שקופית: 174 - תובנות שחשוב לזכור","slides":"","section":"A"},{"n":23,"text":"אילו מהבאות מוזכרות כ\"צרות של עשירים\" - אתגרים שעולים ככל שהקליניקה גדלה?","options":{"A":"ניהול כספים וניהול יומן","B":"צ'קים שחזרו","C":"דוחות למס הכנסה ומע\"מ","D":"מחסור מוחלט בכלים מקצועיים","E":"חוסר עניין ציבורי בתחום התזונה","F":"איסור חוקי על טיפול תזונתי","G":"חוסר גישה לאינטרנט"},"answer":["A","B","C"],"multi":true,"explanation":"המצגת מונה כ\"צרות של עשירים\" ניהול יומן, ניהול כספים, צ'קים שחזרו, ביטול עסקה באשראי, דוחות למס הכנסה ומע\"מ, והעסקת עובדים. שקופית: 175 - להיות מוכנים לאתגרים","slides":"","section":"A"},{"n":24,"text":"אילו מהבאים מוזכרים כחלק מסקירת מערכת הרבייה הנשית בשאלון המקיף?","options":{"A":"סדירות המחזור וכאבים לפני/בזמן המחזור","B":"שימוש באמצעי מניעה ולכמה זמן","C":"דלקות חוזרות בדרכי השתן","D":"צניחת רחם ובריחת שתן","E":"קושי בכניסה להריון","F":"הפלות, אם היו - טבעיות או יזומות","G":"תופעות גיל המעבר"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל הפריטים הללו מופיעים במפורש בסעיף סקירת מערכת הרבייה הנשית בשאלון המקיף. שקופית: 181 - סקירת מערכת הרבייה הנשית","slides":"","section":"A"},{"n":25,"text":"לגבי סיום הפגישה הטיפולית, אילו מהקביעות הבאות נכונות?","options":{"A":"אין צורך להזכיר את שם המטופל בסיום הפגישה","B":"מומלץ לסיים את הפגישה בהבעת ספק לגבי סיכויי ההחלמה של המטופל","C":"אין צורך לבקש מהמטופל לעקוב אחר פרמטרים כמו לחץ דם או משקל","D":"עדיף להימנע מלהביע אמון במטופל כדי לא ליצור ציפיות מוגזמות","E":"אין קשר בין הבעת אמון בסיום הפגישה לבין הצלחת הטיפול","F":"יש להימנע מלהזכיר שהמטופל \"לא לבד\" כדי לא ליצור תלות","G":"עדיף לסיים את הפגישה במידע טכני בלבד ולא במסר מעודד","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"להפך - חשוב להזכיר את שם המטופל, לבקש ממנו לעקוב אחר פרמטרים כמו לחץ דם/סוכר/משקל, להביע אמון מלא בכך שיחלים, ולהזכיר לו שהוא לא לבד ושהמטפל איתו בתהליך. שקופית: 161 - עירוב המטופל בטיפול ובאחריות / ממש בסיום הפגישה","slides":"","section":"A"},{"n":26,"text":"מה, לפי המצגת, נחשב לקריטריון המרכזי להצלחת המפגש הטיפולי בסיומו?","options":{"A":"שהמטופל יוצא מהפגישה שמח יותר, אופטימי יותר, עם יותר אמונה, ביטחון ומוטיבציה","B":"שהפגישה נמשכה יותר משעתיים; שהמטופל קיבל תפריט מודפס מפורט","C":"שהמטופל שילם את מלוא הסכום מראש; שהמטופל קבע פגישת המשך באותו הרגע","D":"שהמטפל הצליח לאבחן את המחלה במדויק; שהמטופל הביע הסכמה מילולית לכל המלצה"},"answer":["A"],"multi":false,"explanation":"המצגת קובעת שהמטופל צריך לצאת מהפגישה שמח יותר ואופטימי יותר, עם הרבה יותר אמונה, ביטחון ומוטיבציה, בהשוואה למצבו לפני הפגישה. שקופית: 175 - לסיום - קריטריון מרכזי להצלחת המפגש הטיפולי","slides":"","section":"A"},{"n":27,"text":"אילו מהבאות מוזכרות כדוגמאות ל\"תגובות אתגר\" שעלולות להגיע מלקוחות לא מרוצים ככל שהקליניקה גדלה?","options":{"A":"דרישה להחזר כספי","B":"איום בתביעה","C":"בקשה לפגישת המשך נוספת","D":"בקשה למכתב תודה","E":"הפניה לחבר נוסף","F":"שביעות רצון גבוהה","G":"עמידה מוצלחת בתוכנית"},"answer":["A","B"],"multi":true,"explanation":"המצגת מזכירה כאתגרים שמגיעים כאשר גדלים: לקוחות שלא מרוצים שדורשים את הכסף חזרה, מאיימים בתביעה ומאיימים בשיימינג. שקופית: 175 - אתגרים שמגיעים כאשר גדלים","slides":"","section":"A"},{"n":28,"text":"אילו מהבאות מתוארות במצגת כ\"כלים ליצירת מוטיבציה לשינוי הרגלים\" אצל המטופל?","options":{"A":"משא ומתן - ויתור הדדי על חלק מהדרישות","B":"התחלה בצעדים קטנים (למשל שינוי רק בארוחת הבוקר)","C":"תלייה של דף משימות יומיות/שבועיות על המקרר","D":"איום מיידי בהפסקת הטיפול כבר בפגישה הראשונה","E":"חיוב המטופל להתחיל בדיוק מהתפריט הקיצוני ביותר","F":"הסתרת המידע הרפואי מהמטופל כדי לא להפחיד אותו","G":"ביטול כל אפשרות ל\"חטאים\" יזומים לאורך כל התהליך"},"answer":["A","B","C"],"multi":true,"explanation":"המצגת מונה כלים כמו דף משימות תלוי על המקרר, ניהול \"משא ומתן\" עם המטופל, והתחלה בצעדים קטנים (למשל שינוי בארוחת הבוקר בלבד בשלב ראשון). שקופית: 163 - כלים ליצירת מוטיבציה לשינוי הרגלים","slides":"","section":"A"},{"n":29,"text":"לגבי דרכים לתת \"מוטיבציה שכלית\" לביצוע שינויים, אילו מהקביעות הבאות נכונות?","options":{"A":"עדיף להימנע מלהמליץ למטופל לקרוא ספרים או מאמרים על תזונה כדי לא לבלבל אותו","B":"אין טעם להסביר למטופל את ה\"למה\" שמאחורי ההמלצות","C":"עדיף להימנע מהפניית המטופל לקבוצות פייסבוק בנושא בריאות","D":"סדנאות בישול בריא הן בזבוז זמן ואינן תורמות למוטיבציה","E":"הרצאות וכנסי בריאות אינם רלוונטיים לתהליך הטיפולי","F":"אין קשר בין הבנה שכלית של המטופל לבין שמירה על הכללים","G":"עדיף לא להמליץ על צפייה בסרטונים רלוונטיים ביוטיוב","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"המצגת ממליצה בדיוק על ההפך מכל הקביעות: להמליץ על ספרים ומאמרים, להסביר את ה\"למה\" (אחד הכלים העוצמתיים ביותר), להפנות לקבוצות פייסבוק, להמליץ על סדנאות בישול בריא, להמליץ על הרצאות וכנסים, ולהמליץ על סרטוני יוטיוב רלוונטיים. שקופית: 166 - איך נותנים מוטיבציה שכלית לביצוע שינויים","slides":"","section":"A"},{"n":30,"text":"אילו מהבאים מוזכרים במצגת כתנאים/עקרונות שחשוב שיהיו בטופס ההסכמה לטיפול שעליו חותם המטופל?","options":{"A":"המטופל מודע שהמטפל אינו רופא ואינו תזונאי קליני","B":"רופא המשפחה מיודע על הבעיות הרפואיות שהמטופל מספר עליהן","C":"שינוי בתרופות הוא באחריותו הבלעדית של המטופל, תוך יידוע רופא המשפחה","D":"המטופל מודע שאין התחייבות לתוצאות","E":"הגדרה מדויקת של היקף הליווי","F":"המטופל מודע לעלות הפגישה והליווי","G":"אין הבטחה לריפוי"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל הפריטים הללו מוזכרים במפורש כמרכיבים שצריכים להופיע בטופס ההסכמה לטיפול. שקופית: 171 - מה צריך להיות רשום בטופס ההסכמה לטיפול","slides":"","section":"A"},{"n":1,"text":"מטפל מקבל שיחת טלפון מקדימה ממועמד לטיפול, ומגלה שהמטופל סובל משחמת כבד עם רמת אלבומין נמוכה בבדיקות הדם שהוא שלח. מה הצעד הנכון ביותר עבור המטפל?","options":{"A":"להסביר למטופל בעדינות שמצב זה אינו בתחום הטיפול שהוא מספק, ולהפנותו לגורם רפואי מתאים","B":"להתחיל טיפול רק אחרי שהמטופל יביא אישור בכתב מרופא המשפחה","C":"להתחיל טיפול תזונתי מלא כרגיל, כי שחמת כבד אינה מוזכרת כמניעה לטיפול","D":"להתחיל טיפול אך להימנע רק מהמלצות על חלבון; להתעלם מהממצא ולהתמקד רק בתלונות שהמטופל הזכיר","E":"לבקש מהמטופל לחתום על טופס ויתור ולהתחיל טיפול מלא; להציע למטופל תוכנית \"קלה יותר\" הכוללת בעיקר תוספי תזונה"},"answer":["A"],"multi":false,"explanation":"שחמת כבד/אי ספיקת כבד עם אלבומין נמוך מוגדרת במצגת כמצב שבו אין לטפל, ולכן הצעד הנכון הוא לא להתחיל טיפול אלא להפנות לגורם רפואי מתאים. שקופית: 149 - במה אתם לא מטפלים","slides":"","section":"B"},{"n":2,"text":"מטופלת מגיעה לפגישה הראשונה ומספרת שהיא נוטלת קומדין בעקבות בעיית קרישה. במהלך הפגישה היא שואלת את המטפל האם כדאי לה להרבות באכילת אשכוליות ולשתות מיץ רימונים טרי מדי יום כחלק מהתוכנית התזונתית. מה התשובה הנכונה למטפל לתת?","options":{"A":"יש להיזהר ולהימנע מהמלצה על צריכה מרובה של אשכוליות ומיץ רימונים, בשל אינטראקציה אפשרית עם קומדין","B":"יש להפסיק לגמרי את נטילת הקומדין לפני תחילת התוכנית התזונתית","C":"כן, בהחלט - אשכוליות ומיץ רימונים בריאים לכולם ללא יוצא מן הכלל","D":"רק מיץ רימונים מותר, אשכוליות אסורות לחלוטין; רק אשכוליות מותרות, מיץ רימונים אסור לחלוטין","E":"אין שום קשר בין תזונה לבין תרופות נוגדות קרישה; יש להמליץ למטופלת להכפיל את מנת הקומדין כדי לפצות על התזונה"},"answer":["A"],"multi":false,"explanation":"המצגת מציינת במפורש שהמלצה על אשכוליות בכמות רבה (וכן מיץ רימונים בכמות רבה) בחולים הנוטלים קומדין היא דוגמה למצב שבו המלצה תזונתית עלולה לפגוע. שקופית: 150 - מתי המלצות תזונתיות יכולות לפגוע","slides":"","section":"B"},{"n":3,"text":"מטפל מסיים בניית תוכנית טיפול מקיפה למטופל, כולל שינויים באורח החיים ובתזונה. איזו שאלה חשובה נוספת, לפי עקרונות המצגת, עליו לשאול את המטופל לפני סיום שלב בניית התוכנית?","options":{"A":"\"האם נראה לך שתוכל לעמוד בתוכנית?\"","B":"\"כמה כסף יש לך בחשבון הבנק?\"","C":"\"האם אתה מוכן להמליץ עליי לחברים?\"","D":"\"מה דעתך על המחיר שגבינו?\"","E":"\"האם תרצה לקבוע כבר עכשיו את כל 10 הפגישות הבאות?\"","F":"\"האם אתה מאמין שאני המטפל הכי טוב שפגשת?\"","G":"\"האם תוכל לשלם מראש עבור חצי שנה?\""},"answer":["A"],"multi":false,"explanation":"המצגת מציינת זאת כשאלה חשובה מאוד שיש לשאול לאחר סיום בניית התוכנית - האם נראה למטופל שהוא יוכל לעמוד בה. שקופית: 160 - לאחר מכן בניית תוכנית התזונה","slides":"","section":"B"},{"n":4,"text":"מטפל בתחילת דרכו מרגיש חשש גדול לפני הפגישה הראשונה עם מטופל אמיתי, וחושב לעצמו \"אני לא מרגיש מוכן, זה חוסר אחריות מצידי לטפל\". לפי הדגשים במצגת, מה הגישה הנכונה להתמודדות עם המחשבה הזו?","options":{"A":"להבין שזו תחושה נורמלית וטבעית, ושהדרך היחידה ללמוד לטפל היא לטפל בפועל","B":"לוותר לגמרי על הרעיון לטפל במטופלים","C":"להמתין עוד כמה שנים וללמוד קורסים נוספים לפני שמתחילים לטפל בכלל","D":"לטפל רק במטופלים שמוכנים לחתום שהם לא יתבעו בשום מקרה","E":"להסתיר מהמטופל שזו הפגישה הראשונה שלו כמטפל עצמאי","F":"להימנע מלהתכונן לפגישה כדי לא להעצים את החרדה","G":"לבקש ממטפל מנוסה שיהיה נוכח בפגישה ולדבר בשם המטפל החדש"},"answer":["A"],"multi":false,"explanation":"המצגת מדגישה שהתחושה \"אני לא מרגיש מוכן\" היא נורמלית וטבעית ובריאה, ושהשיטה היחידה באמת ללמוד לטפל היא לטפל, וכי הכנה מוקדמת לפגישה מסייעת לתחושת הביטחון. שקופית: 168-169 - \"אני לא מרגיש מוכן לטפל, מרגיש לי שזה חוסר אחריות\"","slides":"","section":"B"},{"n":5,"text":"מטופל מגיע לפגישת המשך (לא הראשונה) ומדווח שלא הצליח לעמוד בהמלצות התזונתיות שנקבעו. הוא נראה מתוסכל ומאוכזב מעצמו. איזה שילוב כלים, לפי המצגת, הכי מתאים למצב הזה?","options":{"A":"לנהל איתו \"משא ומתן\", להתחיל שוב בצעדים קטנים, ולהזכיר לו שהוא לא לבד ושאתם איתו בתהליך","B":"להעביר אותו מיד למטפל אחר; להפסיק את הליווי לאלתר כי המטופל \"לא רציני\"","C":"לדרוש ממנו לשלם קנס כספי על אי העמידה בתוכנית; לבטל את כל התוכנית ולהתחיל מאפס בגישה קיצונית יותר","D":"להתעלם מהעניין ולעבור ישר לתוכנית הבאה כאילו לא קרה כלום; לנזוף בו בחומרה כדי שיבין את חומרת המצב ולאיים שיפסיק לטפל בו"},"answer":["A"],"multi":false,"explanation":"המצגת ממליצה על כלים כמו משא ומתן, התחלה מחדש בצעדים קטנים, והדגשה שהמטופל אינו לבד ושהמטפל הולך איתו יד ביד בכל קושי. שקופית: 163-165 - כלים ליצירת מוטיבציה לשינוי הרגלים / הליווי","slides":"","section":"B"},{"n":6,"text":"מטפלת בונה תוכנית טיפול למטופל חדש. היא מתלבטת אם להתחיל ישר עם התפריט האידיאלי והמחמיר ביותר, או להתקדם בהדרגה. המטופל מספר לה שהוא עובד במשרה מלאה, נוסע הרבה לחו\"ל, ומביע רצון עז לראות תוצאות מהירות ככל האפשר. אילו שיקולים, לפי המצגת, אמורים להנחות את ההחלטה שלה?","options":{"A":"כוחותיו ורצונותיו של המטופל, אילוצי החיים שלו והרצון שלו בתוצאות מהירות","B":"רק הניסיון האישי של המטפלת בדיאטות קודמות שהיא עשתה לעצמה","C":"רק גיל המטופל וכלום מעבר לכך; רק תוצאות בדיקת דם אחת שנעשתה חצי שנה קודם לכן","D":"אך ורק המלצת חברת התרופות שהמטופל נוטל מהן תרופות; רק המחיר שהמטופל מוכן לשלם; רק מזג האוויר בעונה הנוכחית"},"answer":["A"],"multi":false,"explanation":"המצגת מציינת שההחלטה בדילמה זו משתנה ממטופל למטופל, לפי כוחותיו, רצונותיו, אילוצי החיים שלו, והרצון שלו לראות תוצאות מהירות - בדיוק הנתונים שהמטופל בתרחיש שיתף. שקופית: 159 - הדילמה המרכזית ביותר לגבי תוכנית הטיפול","slides":"","section":"B"},{"n":7,"text":"מטפל עורך פגישה ראשונה עם מטופלת, וזוכר את ההנחיה מהמצגת לגבי \"החלק שבו המטופל מדבר\". מה ההתנהגות הנכונה של המטפל בשלב הזה של הפגישה?","options":{"A":"להסתכל בעיניים, להיות קשוב, להנהן, ולתת למטופלת להוביל את השיחה תוך שאלות מכוונות","B":"להראות למטופלת את בדיקות הדם שלה מיד בתחילת הפגישה","C":"לשאול רק שאלות רפואיות ולהימנע לחלוטין משאלות על החיים הפרטיים","D":"להקליד ללא הפסקה במחשב, מבלי להרים את המבט; לענות לטלפון ולהודעות במהלך שהמטופלת מדברת","E":"להסביר למטופלת מיד את כל תוכנית הטיפול המלאה; לדבר בעצמו רוב הזמן ולתת למטופלת רק להנהן בהסכמה"},"answer":["A"],"multi":false,"explanation":"בחלק הראשון של הפגישה המטופל מדבר והמטפל שואל ומכוון, תוך קשר עין, הקשבה והנהון - כפי שמודגש במצגת. שקופית: 154 - מה קורה בפועל בפגישה עצמה","slides":"","section":"B"},{"n":8,"text":"מטפל מתחיל לעבוד עם מטופל שיש לו גם עודף משקל משמעותי וגם היסטוריה של אכילה רגשית בלילה. בבניית התוכנית, באיזה סדר, לפי עקרונות המצגת, נכון להתחיל?","options":{"A":"בשלב ראשון להתמקד באלמנטים הלא-תזונתיים (פעילות גופנית, שינה, דמיון מודרך, שינוי דפוסי חשיבה) ורק לאחר מכן לעבור לבניית תוכנית התזונה עצמה","B":"בהפניה מיידית לתרופות לדיכוי תיאבון; ישר בהגבלת קלוריות דרסטית ללא כל שלב הכנה","C":"בבניית תפריט לשנה שלמה מראש בפגישה הראשונה; בדרישה שהמטופל יפסיק לגמרי לאכול בערב מהיום הראשון","D":"בהזמנת בדיקות דם חוזרות בלבד, ללא כל שינוי התנהגותי; ישר בתפריט הכי קיצוני ומחמיר האפשרי, בלי שום שלב מקדים"},"answer":["A"],"multi":false,"explanation":"המצגת ממליצה על סדר בניית תוכנית שמתחיל מהאלמנטים שאינם תזונתיים, ורק לאחר מכן עוברים לבניית תוכנית התזונה עצמה. שקופית: 159-160 - בניית תוכנית הטיפול / בניית תוכנית התזונה","slides":"","section":"B"},{"n":9,"text":"מטופל מספר למטפל שהוא מתעניין מאוד להבין את הרציונל שמאחורי כל המלצה תזונתית שהוא מקבל, ושואל שאלות רבות \"למה\". לפי המצגת, איך כדאי למטפל להתייחס לכך?","options":{"A":"להסביר לו את ה\"למה\" - זהו אחד הכלים העוצמתיים ביותר ליצירת מוטיבציה לשמירה על הכללים","B":"להגיד לו שאין צורך להבין, רק לבצע; לענות בקצרה \"כי ככה\" בלי הסבר נוסף","C":"לבקש מהמטופל לשלם תוספת עבור הסברים; להתעלם מהשאלות ולהמשיך בתוכנית כמתוכנן","D":"לבקש מהמטופל להפסיק לשאול כי זה מעכב את הפגישה; להפנות אותו לרופא אחר כי השאלות \"לא מתאימות\" לתזונאי"},"answer":["A"],"multi":false,"explanation":"המצגת מדגישה שהסבר ה\"למה\" הוא אחד הכלים העוצמתיים ביותר, כי הוא נותן מוטיבציה לשמור על הכללים - ואנשים אוהבים להבין. שקופית: 165 - הכלים ליצירת שינוי אצל המטופל","slides":"","section":"B"},{"n":10,"text":"מטפלת שנה בתחום מבחינה שיש לה תקופה של מספר שבועות ללא מטופלים חדשים. היא מתחילה לדאוג ולחשוב אולי לוותר על התחום. לפי המצגת, מה ההתמודדות המומלצת עם תקופות כאלה?","options":{"A":"לנצל את הזמן ללמידה, חשיבה יצירתית, בניית הרצאה ויציאה להרצות כדי להיות מוכרת יותר","B":"לבטל את הביטוח המקצועי כדי לחסוך בהוצאות בתקופה השקטה","C":"להפסיק לגמרי כל פעילות שיווקית ולחכות שמטופלים יגיעו מעצמם","D":"לסגור מיד את העסק ולחפש עבודה אחרת; להימנע מהרצאות כי הן \"לא באמת עוזרות\" לפי המצגת","E":"להוריד את המחירים לאפס כדי למשוך מטופלים בכל מחיר; להאשים את עצמה בחוסר כישרון ולהפסיק ללמוד את התחום"},"answer":["A"],"multi":false,"explanation":"המצגת ממליצה שבתקופות ללא מטופלים ללמוד, לחשוב באופן יצירתי, לבנות הרצאה ולצאת להרצות - כדרך להתכונן ולהיות מוכרים יותר. שקופית: 175 - להיות מוכנים לאתגרים","slides":"","section":"B"},{"n":9000,"text":"שינוי בתרופות הוא באחריותו הבלעדית של המטופל, תוך יידוע רופא המשפחה — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["A"],"multi":false,"explanation":"המשפט נכון על פי החומר. כל הפריטים הללו מוזכרים במפורש כמרכיבים שצריכים להופיע בטופס ההסכמה לטיפול. שקופית: 171 - מה צריך להיות רשום בטופס ההסכמה לטיפול","slides":"","section":"A","tf":1},{"n":9001,"text":"שאלון קצר יחסית, כדי לגרום למטופל לדבר בפגישה עצמה ולא להרגיש שכבר \"כתב הכל\" — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["A"],"multi":false,"explanation":"המשפט נכון על פי החומר. המרצה מציין במפורש שלדעתו עדיף שאלון יחסית קצר, כדי לגרום למטופל לדבר בפגישה ולא לגרום לו לומר \"כבר כתבתי לכם הכל\". שקופית: 151 - לפני הטיפול / דילמת השאלון","slides":"","section":"A","tf":1},{"n":9002,"text":"הטופס נועד בעיקר לצרכים שיווקיים ולא להבהרת גבולות האחריות — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["B"],"multi":false,"explanation":"המשפט שגוי על פי החומר. להפך - הטופס צריך לציין שהמטפל אינו רופא/תזונאי קליני, שאין התחייבות לתוצאות, ששינוי תרופות הוא באחריות המטופל תוך יידוע רופא המשפחה, שיש הגדרה מדויקת של היקף הליווי, ושהמטופל מודע לעלות. שקופית: 171 - מה צריך להיות רשום בטופס ההסכמה לטיפול","slides":"","section":"A","tf":1},{"n":9003,"text":"לא כל כישלון הוא שלכם - להצלחה נדרש גם שיתוף פעולה של המטופל — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["A"],"multi":false,"explanation":"המשפט נכון על פי החומר. המצגת מדגישה שלא כל כישלון הוא של המטפל - נדרש שיתוף פעולה של המטופל, ולפעמים גם זה לא מספיק - וכי המטפל הוא רק שליח שמסייע לאדם להבריא את עצמו. שקופית: 174 - תובנות שחשוב לזכור","slides":"","section":"A","tf":1},{"n":9004,"text":"תזונה קיצונית שאי אפשר להתמיד בה לכל החיים היא בטוחה כל עוד רואים תוצאות מהירות — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["B"],"multi":false,"explanation":"המשפט שגוי על פי החומר. המצגת קובעת בדיוק את ההפך: דיכאון קשה הוא מצב שאין לטפל בו; יוד בהיפר-תירואידיזם עלול להזיק; תזונה קיצונית שאי אפשר להתמיד בה עלולה להזיק; אשכוליות מסוכנות עם קומדין; מזון מותסס לא כראוי מסוכן בכשל חיסוני; תת משקל מסוכן מחייב זהירות; והתקף פעיל של קרוהן/קוליטיס מחייב ניסיון טיפולי קודם. שקופית: 150 - מתי המלצות תזונתיות יכולות לפגוע","slides":"","section":"A","tf":1},{"n":9005,"text":"אין צורך לשאול את המטופל מה עשה ומה לא עשה מהתוכנית — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["B"],"multi":false,"explanation":"המשפט שגוי על פי החומר. להפך - הליווי מוגדר כ\"קריטי להצלחת הטיפול\", מומלצת שיחה טלפונית לפחות פעם בשבוע, יש לברר מה בוצע ומה לא ולמה, מומלץ לשלוח רשימות קניות ומתכונים, ומומלץ להפנות לטיפולים משלימים. שקופית: 162 - הליווי","slides":"","section":"A","tf":1}]},{"id":"35","title":"שיטות תזונה","questions":[{"n":2,"text":"לגבי שיטת קינגסטון בישראל, אילו שתי הקביעות נכונות?","options":{"A":"הביאה אותה לישראל הנטורופתית אלי שטראוס","B":"הביאה אותה לישראל ד\"ר פנינה בר סלע","C":"שרה חמו נתנה לשיטה פרסום גדול בספרה \"שביל הזהב לריפוי טבעי\"","D":"השיטה מעולם לא הגיעה לישראל","E":"הספר \"אני ערב לו\" עוסק בהמשך התפתחות השיטה בארץ","F":"השיטה הובאה לישראל דרך מכון היפוקרטס","G":"השיטה פותחה במקור בישראל ולאחר מכן יוצאה לחו\"ל"},"answer":["A","C"],"multi":true,"explanation":"לישראל הביאה את שיטת קינגסטון הנטורופתית אלי שטראוס, ושרה חמו נתנה לשיטה פרסום גדול בספרה \"שביל הזהב לריפוי טבעי\". בהמשך פורסם גם הספר \"אני ערב לו\". (ד\"ר פנינה בר סלע קשורה לשיטת אן ויגמור, לא לקינגסטון). שקופית: 5 - שיטת קינגסטון","slides":"","section":"A"},{"n":3,"text":"אילו מהעקרונות הבאים מאפיינים את שיטת קינגסטון?","options":{"A":"הליכה ופעילות גופנית עדינה בבוקר, ללא עומס","B":"פסילה מוחלטת של סוכר, קפה, תה שחור ושוקולד","C":"עידוד לשימוש נרחב בתוספי תזונה וצמחי מרפא","D":"חיים לפי השעון הביולוגי הטבעי - הליכה לישון מוקדם וקימה מוקדמת","E":"עידוד לשתייה מרובה של מים לאורך כל היום","F":"דגש על מוצרי חלב מפוסטרים כמקור עיקרי לחלבון","G":"ארוחת הערב היא הארוחה העיקרית ביום"},"answer":["A","B","D"],"multi":true,"explanation":"שיטת קינגסטון כוללת פעילות גופנית עדינה בבוקר ללא עומס, פסילה מוחלטת של סוכר/קפה/תה שחור/שוקולד, וחיים לפי השעון הביולוגי (שינה וקימה מוקדמות). לעומת זאת, השיטה מתנגדת לתוספי תזונה וצמחי מרפא (לא מעודדת אותם), מתנגדת לשתייה מרובה (יש לשתות רק כשיש צמא אמיתי), דוגלת דווקא במוצרי חלב עיזים לא מפוסטרים, וארוחת הצהריים - לא הערב - היא הארוחה העיקרית. שקופית: 6 - עקרונות מרכזיים - שיטת קינגסטון","slides":"","section":"A"},{"n":4,"text":"מהן התועלות הבריאותיות שנמצאו לתזונה הקטוגנית, לפי השקופית?","options":{"A":"ירידה בתדירות התקפים באפילפסיה, עד כדי הפסקה מוחלטת","B":"ירידה משמעותית בערכי הסוכר בסוכרת","C":"ירידה משמעותית במשקל בעודף משקל","D":"שיפור בתסמינים ובאיכות החיים בטרשת נפוצה","E":"שיפור קוגניטיבי מובהק באלצהיימר, בעיקר בשלבים מוקדמים","F":"שיפור משמעותי בתסמינים ואיכות החיים בקרוהן וקוליטיס, לעיתים הפוגה מלאה","G":"ירידה משמעותית במדדי דלקת בדלקת פרקים"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"השקופית מפרטת רשימה ארוכה של תועלות שנמצאו לתזונה הקטוגנית: אפילפסיה, סוכרת, עודף משקל, טרשת נפוצה (ללא הוכחה חד-משמעית על המחלה עצמה), אלצהיימר, קרוהן וקוליטיס, דלקת פרקים (וכן היפותירואידיזם וסרטן, שלא נכללו כאן). כל שבע האפשרויות נכונות. שקופית: 65 - התועלות שנמצאו לתזונה הקטוגנית","slides":"","section":"A"},{"n":5,"text":"אילו מהקביעות הבאות לגבי שיטת שלטון (ההיגיינה הטבעית) נכונות?","options":{"A":"שלטון עודד שילוב חופשי בין חלבונים לפחמימות בכל ארוחה","B":"שלטון פיתח את שיטתו כתוצאה ממחקר קליני מבוקר בבית חולים","C":"שלטון המליץ על שתיית מים מרובה בזמן הסעודה כדי לסייע לעיכול","D":"שלטון עודד שימוש נרחב בתוספי תזונה כדי למנוע חסרים תזונתיים","E":"שלטון טען כי כל טיפול חיצוני מפריע לתהליך הריפוי הטבעי של הגוף","F":"שלטון פיתח את השיטה מתוך התנסות אישית מוצלחת בריפוי עצמו ממחלה נוירולוגית","G":"שלטון המליץ על צריכה גבוהה של מזון מהחי כמקור החלבון העיקרי","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"כל הקביעות שגויות ביחס לשקופיות: שלטון דווקא אסר שילוב חלבונים עם פחמימות (הכלל המפורסם ביותר בשיטתו); השיטה לא נבנתה ממחקר קליני מבוקר; הוא אסר שתיית מים בזמן הסעודה או שעתיים אחריה; הוא התנגד לחלוטין לתוספי תזונה וצמחי מרפא; הוא עצמו חלה במחלה נוירולוגית ניוונית (כנראה פרקינסון) וניסה לרפא את עצמו ללא הצלחה (ולא \"בהצלחה\"); והתזונה שלו מבוססת בעיקר על פירות, אגוזים ושקדים - לא מזון מן החי. שקופית: 14-16 - שיטת שלטון","slides":"","section":"A"},{"n":6,"text":"לפי התזונה האידאלית במקרוביוטיקה, איזה אחוז מהקלוריות מומלץ שיגיע מדגנים מלאים ופחמימות מלאות (אורז מלא, כוסמת, דוחן)?","options":{"A":"5%-10%","B":"10%-20%","C":"25%-35%","D":"50%-60%","E":"70%-80%","F":"90%-100%","G":"אין המלצה מספרית בשיטה זו"},"answer":["D"],"multi":false,"explanation":"לפי התזונה האידאלית במקרוביוטיקה, 50%-60% מהקלוריות אמורות להגיע מדגנים מלאים ופחמימות מלאות (אורז מלא, כוסמת, דוחן), כ-25% מירקות, ואחוזים קטנים יותר (5%-10% כל אחד) ממרכיבים נוספים כמו קטניות וירקות ים. שקופית: 10 - עקרונות התזונה במקרוביוטיקה","slides":"","section":"A"},{"n":8,"text":"אילו שלוש נקודות ביקורת עולות כלפי שיטת המקרוביוטיקה, לפי השקופית?","options":{"A":"ההתנגדות לירקות סולניים (עגבנייה, חציל, פלפל, תפוח אדמה) תמוהה וללא בסיס מוצק","B":"הוויתור על מינימום פירות ורק פירות מקומיים הוא ויתור על שפע שיש לעולם להציע","C":"ההתנגדות להקפאת מזון מבוססת על מחקרים קליניים מוצקים שהוכיחו נזק בריאותי","D":"השיטה מספקת אספקה גרועה מאוד של יוד ומחייבת תוספים יקרים","E":"השיטה מחייבת שימוש בתוספי תזונה יקרים כדי למנוע חסרים","F":"ההסתמכות על אורז כפחמימה עלולה להיות בעייתית","G":"השיטה מסוכנת לחלוטין לילדים ואין לה כל יתרון"},"answer":["A","B","F"],"multi":true,"explanation":"הביקורת העיקרית כוללת: התנגדות תמוהה לירקות סולניים ללא בסיס מדעי מוצק; ויתור על שפע פירות (מינימום ורק פירות מקומיים) שהוא ויתור על מה שיש לעולם להציע; והסתמכות על אורז כפחמימה עיקרית שעלולה להיות בעייתית. לעומת זאת, לשיטה יש דווקא אספקה טובה מאוד של יוד (דגים ואצות) ואינה דורשת תוספי תזונה, וההתנגדות להקפאה אינה מבוססת על מחקרים קליניים אלא היא ביקורת עקרונית על ויתור על נוחות מודרנית. שקופית: 12-13 - דיון וביקורת - מקרוביוטיקה","slides":"","section":"A"},{"n":9,"text":"מהן התועלות שדווחו לתזונה הפליאוליתית (פליאו), לפי השקופית?","options":{"A":"מסייעת מאוד לאיזון סוכר","B":"מסייעת לירידה במשקל","C":"עשירה בחלבון - מתאימה לקשישים, ספורטאים וגיל ההתבגרות","D":"מקנה שובע","E":"מתקנת חסרים תזונתיים","F":"מפחיתה דלקתיות","G":"משפרת חיוניות ורמות אנרגיה ואינה מכבידה"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"השקופית מפרטת רשימה ארוכה של יתרונות שדווחו לתזונה הפליאוליתית: איזון סוכר, ירידה במשקל, עושר בחלבון (מתאים לקשישים/ספורטאים/מתבגרים), שובע, תיקון חסרים תזונתיים, הפחתת דלקתיות, ושיפור חיוניות ואנרגיה ללא הכבדה (וכן שיפור מראה עור, שינה, ביצועים ספורטיביים והפחתת אלרגיות). כל שבע האפשרויות נכונות. שקופית: 55 - היתרונות של תזונה פליאוליתית","slides":"","section":"A"},{"n":10,"text":"אילו מהקביעות הבאות לגבי שיטת אן ויגמור נכונות?","options":{"A":"אן ויגמור עודדה בישול ממושך של כל המזון כדי להרוג חיידקים","B":"שיטתה מבוססת על מזון מן החי כמקור החלבון והקלוריות העיקרי","C":"אן ויגמור המליצה על צריכת בשר מן החי כמקור החלבון העיקרי","D":"אן ויגמור פיתחה את משקה ה-Rejuvelac המבוסס על קטניות מבושלות","E":"מכון היפוקרטס שהקימה נמצא כיום בבוסטון בלבד","F":"עיקרון מרכזי בשיטתה הוא שהמחלות נגרמות בעיקר מתורשה גנטית","G":"שיטתה מעודדת אכילת פירות רבים כמקור הקלוריות העיקרי","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"כל הקביעות שגויות: אן ויגמור טענה שכל חימום הורס אנזימים ולוקח חיות מהמזון - ולכן דווקא התנגדה לבישול, לא עודדה אותו; שיטתה טבעונית לחלוטין וללא מזון מן החי כלל; מקור הקלוריות העיקרי בשיטתה הוא שומנים (אגוזים, שקדים, אבוקדו) ולא פירות; משקה ה-Rejuvelac שפיתחה מבוסס על דגנים מותססים ולא קטניות מבושלות; מכון היפוקרטס שהקימה בבוסטון נמצא כיום בדרום פלורידה, לא בבוסטון בלבד; ועיקרון מרכזי בשיטתה הוא שמחלות נגרמות מרעלים, חסרים תזונתיים וסטרס נפשי - לא מתורשה גנטית. שקופית: 19-21 - שיטת אן ויגמור","slides":"","section":"A"},{"n":12,"text":"אילו שני כללי צירופי מזון הבאים מיוחסים לשיטת שלטון?","options":{"A":"לא לערבב חלבונים עם פחמימות","B":"לא לערבב ירקות עם פירות","C":"לא לערבב חומצות עם פחמימות","D":"יש לאכול פחמימות רק בבוקר","E":"יש לערבב חלבון עם פרי הדר/לימון לשיפור העיכול","F":"לא לערבב חלב עם דגים","G":"יש לאכול חלבון וירק בלבד בכל ארוחה"},"answer":["A","C"],"multi":true,"explanation":"הכלל המפורסם ביותר בשיטת שלטון הוא לא לערבב חלבונים עם פחמימות (בטענה שכל אחד דורש תנאי עיכול שונים). כלל נוסף הוא לא לערבב חומצות עם פחמימות (חומצה עלולה לפגוע לטענתו בפעילות האנזים אמילאז). לגבי חלבון ולימון - הכלל של שלטון הוא ההפך: לא לערבב חלבון עם פרי הדר/לימון (לא לערבב אותם, לא לשלב אותם לשיפור עיכול). שקופית: 15 - צירופי מזון בשיטת שלטון שקופית: 15 - צירופי מזון בשיטת שלטון","slides":"","section":"A"},{"n":13,"text":"מהן שלוש נקודות הביקורת המדעית על כללי צירופי המזון של שלטון?","options":{"A":"אין ראיות מדעיות לכך שערבוב חלבון עם פחמימה משמעותי לעיכול","B":"לימון לא נמצא במחקרים כפוגע בהפרשת חומצת קיבה","C":"הגוף מחליט כמה חומצה לייצר לפי כמות המזון וכמות החלבון בו, ולא לפי חומציותו","D":"מחקרים הראו שערבוב פחמימות עם חלבון גורם לעלייה חדה בסוכר הדם","E":"כל האנזימים בגוף האדם מפרקים אך ורק חלבון או אך ורק פחמימה בלעדית","F":"יש הוכחות מוצקות שהתססת סוכרים במעי מייצרת רעלים משמעותיים גם בבני אדם בריאים","G":"חומצה חיצונית מוכחת כפוגעת בהפרשת החומצה הטבעית בקיבה ובעיכול"},"answer":["A","B","C"],"multi":true,"explanation":"הביקורת המדעית כוללת: אין ראיות מדעיות משמעותיות לכלל אי-ערבוב חלבון-פחמימה; לימון אינו נמצא במחקרים כפוגע בהפרשת חומצה; והגוף מווסת את כמות החומצה לפי כמות המזון והחלבון ולא לפי מידת החומציות של המזון עצמו. הטענות בדבר עלייה חדה בסוכר, אנזימים ייעודיים בלעדיים, רעלים מהתססה בבני אדם בריאים, ופגיעה מוכחת של חומצה חיצונית - כולן חסרות תימוכין מדעי בחומר. שקופית: 15-16 - ביקורת על צירופי מזון בשיטת שלטון","slides":"","section":"A"},{"n":14,"text":"אילו מהמאפיינים הבאים משותפים לכל השיטות הטבעיות שנסקרו בפרק המבוא?","options":{"A":"אמונה בכוח הריפוי של הגוף","B":"מזון טבעי בלבד","C":"הימנעות מרעלים","D":"מזון אורגני","E":"כמויות קטנות","F":"לעיסה מרובה","G":"חשיבות המצב הנפשי / הסטרס הנפשי על הבריאות"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"המכנה המשותף לכל השיטות הטבעיות כולל: אמונה בכוח הריפוי העצמי של הגוף, מזון טבעי בלבד, הימנעות מרעלים, מזון אורגני, אכילת כמויות קטנות, לעיסה מרובה, וחשיבות המצב הנפשי/הסטרס (וכן חשיבות צירופי המזון ברוב השיטות, ואוויר נקי/שינה/פעילות גופנית). כל שבע האפשרויות נכונות. שקופית: 2 - המכנה המשותף לכל השיטות","slides":"","section":"A"},{"n":15,"text":"אילו מהקביעות הבאות לגבי המחקר של גולדהמר על צום מים נכונות?","options":{"A":"המחקר הראה עלייה בלחץ הדם בקרב כלל המשתתפים","B":"הירידה הממוצעת בלחץ הדם הייתה גדולה יותר במטופלים שסבלו מיתר לחץ דם חמור יותר בתחילת המחקר","C":"המחקר בדק צום מים ארוך, ולאחריו הוכנסה בהדרגה תזונה טבעונית דלת שומן ודלת נתרן","D":"הצום השפיע רק על מערכת הלב וכלי הדם ולא על מערכות גוף נוספות","E":"חלק גדול מהשינויים החיוביים בחלבונים נשמרו רק בזמן הצום עצמו ונעלמו מיד לאחריו","F":"נמצאה השפעה של הצום על רמות סוכר, אינסולין, לחץ דם, משקל וקטוזיס","G":"המחקר בוצע ללא כל פיקוח רפואי","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"כל הקביעות שגויות: המחקר הראה ירידה בלחץ הדם (לא עלייה); B מנוגד לנתונים המוצגים (הירידה הגדולה ביותר תוארה במטופלים עם יל\"ד מעל סף מסוים, אך הניסוח כאן שגוי ביחס לפרטים); הצום השפיע על כמעט כל מערכת בגוף (לא רק לב וכלי דם); חלק מהשינויים החיוביים נשמרו גם מספר ימים לאחר החזרה לאכילה (לא נעלמו מיד); והמחקר בוצע תחת פיקוח רפואי (Medically supervised water-only fasting). שקופית: 18 - המחקרים - צום מים","slides":"","section":"A"},{"n":16,"text":"מהי ההגדרה של קטוזיס?","options":{"A":"מצב שבו הגוף משתמש בעיקר בגופי קטו כמקור אנרגיה, כשהצרכן העיקרי שלהם הוא המוח","B":"מצב של עודף אינסולין כרוני בדם; תהליך פירוק חלבונים לאנרגיה בכבד","C":"תהליך ספיגת שומן מוגברת במעי הגס; מצב של עודף גליקוגן בכבד ובשרירים","D":"מצב של חוסר איזון חומצי-בסיסי חמור בדם; מצב שבו הגוף משתמש בעיקר בגלוקוז ממקור שרירי כמקור אנרגיה"},"answer":["A"],"multi":false,"explanation":"קטוזיס הוא מצב שבו הגוף משתמש בעיקר בגופי קטו (המיוצרים בכבד מחומצות שומן) כמקור אנרגיה, כאשר הצרכן העיקרי של גופי הקטו הוא המוח. שקופית: 60 - תזונה קטוגנית","slides":"","section":"A"},{"n":17,"text":"אילו שני גורמים גורמים ל\"שפעת הקטו\" (Keto Flu)?","options":{"A":"איבוד אלקטרוליטים ונוזלים (בעיקר נתרן, אשלגן ומגנזיום)","B":"עלייה חדה ברמות הסוכר בדם","C":"תהליך ההסתגלות של המוח לייצור אנזימים שמייצרים אנרגיה מקטונים, שלוקח זמן","D":"זיהום חיידקי במערכת העיכול","E":"עלייה פתאומית במסת השריר","F":"חוסר בוויטמין D","G":"עודף בוויטמין B12"},"answer":["A","C"],"multi":true,"explanation":"שפעת הקטו נגרמת מאיבוד אלקטרוליטים ונוזלים (בעיקר נתרן, אשלגן ומגנזיום) ומתהליך ההסתגלות של המוח לייצור אנזימים המפיקים אנרגיה מקטונים - תהליך שלוקח זמן ועד להסתגלות המוח חווה מחסור זמני \"בדלק\", מה שגורם לערפול מוחי ועייפות. שקופית: 61 - Keto Flu","slides":"","section":"A"},{"n":20,"text":"אילו מהקביעות הבאות לגבי מחקר אורניש (Ornish) על היפוך מחלת לב כלילית נכונות?","options":{"A":"במחקר לא הייתה כלל קבוצת ביקורת","B":"בקבוצת ההתערבות נצפתה נסיגה במצב טרשת העורקים","C":"ההתערבות כללה רק שינוי תזונתי, ללא פעילות גופנית או ניהול סטרס","D":"בקבוצת הטיפול הרגיל נצפתה החמרה משמעותית במצב טרשת העורקים","E":"אחת הביקורות היא שההתערבות שינתה יותר מדי משתנים בו-זמנית (תזונה, ספורט, ניהול סטרס, הפסקת עישון, תמיכה קבוצתית)","F":"המחקר הוכיח בוודאות שהתזונה דלת השומן, ולא הצמחונות, היא שהביאה לתוצאות","G":"אחת הביקורות מציינת שאולי דווקא הימנעות ממזון תעשייתי (ולא הצמחונות) היא שהביאה לתוצאות"},"answer":["B","D","E","G"],"multi":true,"explanation":"המחקר כלל קבוצת ביקורת (טיפול רגיל מול התערבות אינטנסיבית). בקבוצת ההתערבות נצפתה נסיגה בטרשת העורקים ואילו בקבוצת הביקורת נצפתה החמרה. ההתערבות כללה שילוב של תזונה דלת שומן, פעילות גופנית אירובית, ניהול סטרס, הפסקת עישון ותמיכה פסיכו-חברתית קבוצתית - ולא תזונה בלבד. הביקורת מציינת שריבוי המשתנים מקשה לקבוע מה בדיוק הכריע, ושייתכן שהצמחונות (ולא הדל-שומן) או הימנעות ממזון תעשייתי הם הגורם האמיתי. שקופית: 29-31 - מחקר אורניש","slides":"","section":"A"},{"n":21,"text":"מהו האחוז המשוער של נפח מערכת העיכול המיוחס למעי הגס (Colon) בקופים הגדולים, בהשוואה לבני אדם, לפי השקופית?","options":{"A":"גבוה משמעותית מבני אדם - כ-45%-50% מנפח מערכת העיכול","B":"הקופים הגדולים חסרים מעי גס לחלוטין","C":"תלוי לחלוטין בסוג המזון הנצרך באותו יום","D":"אין נתונים על כך בשקופית; דומה בדיוק לבני אדם - כ-20%","E":"גבוה יותר בבני אדם מאשר בקופים; נמוך משמעותית מבני אדם - כ-5% בלבד"},"answer":["A"],"multi":false,"explanation":"אצל הקופים הגדולים (שימפנזות וגורילות) המעי הגס (Colon) מהווה נתח גדול משמעותית מנפח מערכת העיכול (כ-45%-50%) לעומת בני אדם, שאצלם המעי הדק תופס חלק גדול יותר. הבדל זה מסביר מדוע הקופים הגדולים מכוונים לעיכול וספיגה מבוססי תסיסה במעי הגס, בעוד בני אדם מכוונים לספיגה במעי הדק של מזון מרוכז אנרגטית (עמילנים מבושלים, שומן, חלבון). שקופית: 39 - ההבדלים בין הקופים הגדולים לבני אדם","slides":"","section":"A"},{"n":23,"text":"מהם שלושת המנגנונים המוסברים בשקופית להיווצרות אבנים בכליות בקרב אנשים על תזונה קטוגנית?","options":{"A":"חומציות השתן עולה, מה שמעודד היווצרות אבני סידן-אוקסלט","B":"מעבר סידן מוגבר דרך הכליה","C":"חסר בציטראט (הקושר סידן ומונע ממנו להתגבש לאבנים)","D":"עודף מסיבי בוויטמין D הגורם להסתיידויות","E":"ירידה חדה בלחץ הדם הפוגעת בזרימת הדם לכליה","F":"עלייה בצריכת חלבון מן החי הגורמת לעומס ישיר על הכליה","G":"חסר בוויטמין C הגורם לשקיעת סידן"},"answer":["A","B","C"],"multi":true,"explanation":"תזונה קטוגנית מעלה את חומציות השתן (מעודד היווצרות אבני סידן-אוקסלט), מגדילה את מעבר הסידן דרך הכליה, וגורמת לחסר בציטראט - חומר שתפקידו לקשור סידן ולמנוע ממנו להתגבש לאבנים. שילוב שלושת המנגנונים הללו מסביר את הסיכון המוגבר לאבנים בכליות בתזונה זו, גם בקרב ילדים המטופלים בה לאפילפסיה. שקופית: 67-68 - תזונה קטוגנית ואבנים בכליות","slides":"","section":"A"},{"n":24,"text":"באילו מצבים רפואיים מוצג בשקופית שיש מקום לשקול או להמליץ על תזונה קטוגנית?","options":{"A":"עודף משקל","B":"סוכרת נעורים / סוכרת מבוגרים","C":"דמנציה / אלצהיימר","D":"דלקות פרקים","E":"מחלות מעי דלקתיות","F":"סרטן","G":"אוטיזם"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"השקופית מציגה רשימה ארוכה של מצבים שבהם יש מקום לשקול תזונה קטוגנית: עודף משקל, סוכרת (נעורים ומבוגרים), דמנציה/אלצהיימר, דלקות פרקים, מחלות מעי דלקתיות, סרטן, טרשת נפוצה ומחלות נוירולוגיות נוספות, תת-פעילות בלוטת התריס, מעי רגיז/רגיש, אוטיזם ודכאון קליני. כל שבע האפשרויות המוצגות נכונות. שקופית: 73 - מתי יש מקום לשקול תזונה קטוגנית","slides":"","section":"A"},{"n":25,"text":"אילו מהקביעות הבאות לגבי דיאטת 80/10/10 נכונות?","options":{"A":"השיטה מבוססת על ההנחה שקופים גדולים דמויי אדם הם טבעונים מוחלטים בטבע","B":"ד\"ר גרהם דאגלס פיתח את השיטה כדי לסייע לספורטאי כוח לבנות מסת שריר מהר יותר","C":"שימפנזות ניזונות אך ורק מפירות ועלים ואינן צדות מעולם","D":"אחוז הנטישה מהשיטה נמוך מאוד בזכות קלות ההתמדה בה","E":"השיטה כוללת בפועל שימוש נרחב בכלי בישול וטיגון מתקדמים, כמו הקופים הגדולים","F":"השיטה מומלצת במיוחד לספורטאי כוח בשל תכולת החלבון הגבוהה שלה","G":"גורילות ושימפנזות אינן אוכלות מעולם שום דבר מלבד פירות וירקות","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"כל הקביעות שגויות: קופים גדולים דמויי אדם אינם טבעונים מוחלטים בטבע - הם צדים באופן פעיל חרקים (טרמיטים, נמלים) ואף יונקים קטנים וקופים אחרים; ד\"ר גרהם דאגלס לא פיתח את השיטה למען ספורטאי כוח - להפך, הוא טען שאין צורך בהרבה חלבון לבניית שריר, בהתבסס (בטעות) על הקופים הגדולים; שימפנזות כן צדות; אחוז הנטישה מהשיטה גבוה מאוד, לא נמוך; הקופים הגדולים אינם משתמשים בבלנדר או מכונת מיצים (בניגוד לשיטה שמרבה להשתמש בהם); השיטה כמעט נטולת חלבון ואינה מומלצת לספורטאי כוח; וגורילות ושימפנזות כן אוכלות חרקים וזחלים על העלים והפירות. שקופית: 38 - 80/10/10","slides":"","section":"A"},{"n":26,"text":"מהו הנימוק המדעי המרכזי שמעלה ד\"ר מקדוגל (McDougall) לתמיכה בדיאטת העמילנים (Starch Diet)?","options":{"A":"מחקרים המראים שבני אדם מפרישים יותר אנזים ליפאז מקופים","B":"מחקר שמצא שלבני אדם יש הרבה יותר עותקים של הגן לאלפא-עמילאז לעומת קופים","C":"תגליות ארכיאולוגיות המראות שבני אדם קדמונים אכלו בעיקר בשר","D":"מחקרים גנטיים המראים חוסר יכולת מוחלט של בני אדם לפרק חלבון מן החי","E":"עדויות מתרבויות עתיקות שאכלו בעיקר פירות","F":"מחקרי הדמיה מוחית המראים תלות של המוח בגלוקוז מפחמימות בלבד","G":"השוואת אורך המעי בין בני אדם לטורפים"},"answer":["B"],"multi":false,"explanation":"מקדוגל מנמק את שיטתו על סמך מחקר שמצא שלבני אדם יש הרבה יותר עותקים של הגן לאלפא-עמילאז (האנזים המפרק עמילן) בהשוואה לקופים, וטוען שזו הוכחה לכך שבני האדם צריכים להתבסס בעיקר על פחמימות מורכבות (עמילניות). שקופית: 42 - הנימוק המדעי לדיאטת העמילן","slides":"","section":"A"},{"n":28,"text":"אילו שלוש עמדות הבאות מאפיינות את גישת דיאטת העמילנים (Starch Diet) של מקדוגל?","options":{"A":"נגד תוספי תזונה - נחשבים מיותרים בשיטתם","B":"מתירים כוס יין מלאה בכל ארוחה, ללא הגבלה שבועית","C":"מעודדים שתיית מיצי פירות טבעיים טריים בכמות בלתי מוגבלת","D":"קפאין נחשב רעל, יש להימנע ממנו לחלוטין","E":"מומלץ להשתמש בשמן זית כתית מעולה בכמות נדיבה בכל ארוחה","F":"בעד ירקות כבושים ביתית","G":"אין כל המלצה בשיטה זו לגבי השריית דגנים וקטניות לפני הבישול"},"answer":["A","D","F"],"multi":true,"explanation":"גישת דיאטת העמילנים מתנגדת לתוספי תזונה (נחשבים מיותרים בשיטתם), אוסרת קפאין באופן מוחלט (מוגדר כרעל), ותומכת בירקות כבושים ביתית. לעומת זאת, השיטה מתירה לכל היותר חצי כוס יין בשבוע (לא כוס מלאה בכל ארוחה - קביעה זו שגויה), מתנגדת למיצים טבעיים (לא מעודדת אותם - קביעה זו שגויה), שוללת שמן לחלוטין כולל שמן זית איכותי (לא ממליצה עליו - קביעה זו שגויה), וכן ממליצה במפורש על השריית דגנים וקטניות לפני הבישול/אידוי (בניגוד לניסוח ב-G). שקופית: 43 - Starch diet","slides":"","section":"A"},{"n":29,"text":"מהם ההבדלים בין תזונת הפליאו לדיאטת אטקינס, לפי השקופית?","options":{"A":"מטרת אטקינס היא ירידה במשקל, ואילו מטרת הפליאו היא אורח חיים בריא המתאים לאדם","B":"אצל אטקינס אין בעיה עם בשר מעובד, ממתיקים מלאכותיים ונקניקיות מעובדות, ואילו בפליאו הדגש הוא על מזון אמיתי","C":"מוצרי חלב הם מרכיב מרכזי אצל אטקינס, ואילו הפליאו שולל אותם","D":"אטקינס שואף להביא את הגוף לקטוזיס, ואילו בפליאו אין מטרה כזו","E":"אטקינס עודד שימוש בממתיקים מלאכותיים לצורך המתיקות, ואילו זה פסול בפליאו","F":"בטטה ושורשים מותרים בפליאו ואסורים אצל אטקינס","G":"בורגר מעובד וקולה זירו נחשבים ארוחה מעולה לפי אטקינס וגרועה לפי פליאו"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"השקופית מפרטת שבעה הבדלים מדויקים בין הגישות: מטרות שונות (ירידה במשקל מול אורח חיים), עמדה שונה כלפי מזון מעובד/ממתיקים מלאכותיים, מוצרי חלב (מרכזי מול נשלל), שאיפה לקטוזיס (יש מול אין), בטטה ושורשים (מותר מול אסור), ודוגמת בורגר מעובד וקולה זירו הממחישה את ההבדל בין \"מינימום פחמימות\" (אטקינס) ל\"איכות המזון\" (פליאו). כל שבע האפשרויות נכונות. שקופית: 57 - ההבדל בין פליאו לתזונה של דר אטקינס","slides":"","section":"A"},{"n":30,"text":"אילו מהקביעות הבאות לגבי תזונה קרניבורית (Carnivore) נכונות?","options":{"A":"השיטה מבוססת בעיקר על אכילת בשר, כאשר יש המוסיפים ביצים ודגים","B":"השיטה עשירה מאוד בסיבים תזונתיים ונוגדי חמצון","C":"יש הקוראים לשיטה גם \"Zero Carb diet\"","D":"חלק מהגרסאות כוללות תוספת של מוצרי חלב מתרנין (ואינן אפס-פחמימות לחלוטין)","E":"במחקר תצפיתי דווח על שיפור בהשמנת יתר, לחץ דם, ושימוש מופחת בתרופות","F":"תדירות היציאות הצפויה בתזונה זו גבוהה במיוחד עקב עודף סיבים","G":"ד\"ר שון בייקר, מקדם בולט של השיטה, איבד את רישיונו הרפואי בעקבות חשד לחוסר כשירות והוחזר בהגבלות"},"answer":["A","C","D","E","G"],"multi":true,"explanation":"התזונה הקרניבורית מבוססת על בשר (עם או בלי ביצים/דגים), נקראת גם Zero Carb diet, וקיימות גרסאות עם מוצרי חלב שאינן אפס-פחמימות מוחלטות. מחקר תצפיתי דיווח על שיפורים בהשמנה, לחץ דם ושימוש בתרופות. השיטה דלה מאוד בסיבים ונוגדי חמצון (ולא עשירה בהם - קביעה זו שגויה), ולכן דווקא גורמת לעצירות ותדירות יציאות נמוכה (לא גבוהה - קביעה זו שגויה). ד\"ר שון בייקר, אורתופד אמריקאי ומקדם בולט של השיטה, אכן נשלל רישיונו עקב חשד לחוסר כשירות והוחזר תחת הגבלות. שקופית: 74-76 - תזונה קרניבורית","slides":"","section":"A"},{"n":1,"text":"מהו לקטין, לפי תיאוריית ד\"ר סטיבן גנדרי (The Plant Paradox)?","options":{"A":"חלבון בעל יכולת להיקשר לסוכר, ולכן יכול להידבק לדפנות תאים, קולטני הורמונים וחיידקים","B":"סוג של שומן רווי; ויטמין מסיס בשומן","C":"חומצת אמינו יחידה; סוג של פחמימה פשוטה","D":"סוג של סיב תזונתי מסיס; מינרל הנמצא בעיקר בדגנים"},"answer":["A"],"multi":false,"explanation":"לקטין הוא חלבון בעל יכולת להיקשר לסוכר (carbohydrate-binding protein), ולכן מסוגל להידבק לדפנות תאים ולקולטנים של הורמונים וחיידקים ועוד. יש מאות עד אלפי סוגי לקטינים בעלי השפעות מגוונות מאוד. שקופית: 1 - \"התזונה נטולת הלקטין\"","slides":"","section":"A"},{"n":4,"text":"אילו מהקביעות הבאות לגבי הנזק המיוחס ללקטינים לפי תיאוריית ד\"ר גנדרי נכונות?","options":{"A":"לקטינים נדבקים לקולטנים של אינסולין, וגורמים לכך לעמידות לאינסולין והשמנה","B":"לקטינים מעוררים תגובה חיסונית מוגזמת, ותורמים לאלרגיות ולמחלות אוטואימוניות","C":"לקטינים פוגעים בפלורת המעיים בעקבות הידבקות לחיידקים","D":"לקטינים גורמים למעי דליף (Leaky gut)","E":"לקטינים, לפי הטענה, אינם קשורים בשום צורה למערכת החיסון","F":"לקטינים, לפי הטענה, משפרים תמיד את רגישות האינסולין","G":"אין שום קשר נטען בין לקטינים לאלרגיות"},"answer":["A","B","C","D"],"multi":true,"explanation":"לפי הטענות בתיאוריה, לקטינים נדבקים לקולטני אינסולין (תורמים לעמידות והשמנה), מעוררים תגובה חיסונית מוגזמת (אלרגיות ומחלות אוטואימוניות), פוגעים בפלורת המעיים (הידבקות לחיידקים), וגורמים למעי דליף. שקופית: 3 - הנזק לפי תיאוריית ד\"ר גנדרי","slides":"","section":"A"},{"n":5,"text":"אילו מהקביעות הבאות לגבי הפגמים בתיאוריית הלקטינים נכונות?","options":{"A":"רוב רובם של הלקטינים נהרסים כליל בבישול","B":"הבישול גורם לדה-נטורציה של החלבון, ולאחר שינוי מבני זה הם כבר לא מתפקדים כלקטינים","C":"אין שום בעיה באכילתם לאחר בישול","D":"גם הגלוטן נהרס לחלוטין בחום כמו שאר הלקטינים","E":"הגלוטן הוא לקטין יוצא דופן שאינו נהרס באפייה, אך מתפרק חלקית בהחמצה (הסתה ארוכה)","F":"ד\"ר גנדרי עצמו אומר שמי שממש רוצה לאכול לחם, שיאכל רק לחם מחמצת","G":"אין שום פגם ידוע בתיאוריית הלקטינים"},"answer":["A","B","C","E","F"],"multi":true,"explanation":"שימו לב - זו שאלה מטעה בניסוחה. בפועל רוב הקביעות נכונות (רוב הלקטינים נהרסים בבישול עקב דה-נטורציה; הגלוטן הוא יוצא הדופן שאינו נהרס באפייה אך מתפרק חלקית בהחמצה; גנדרי ממליץ על לחם מחמצת בלבד). מאחר שרק שתי קביעות שגויות מתוך השבע, ושש מהאפשרויות אינן \"כל התשובות\" ואינן \"אף תשובה\" באופן נקי - יש להתייחס לתשובה הרשמית. שקופית: 4 - הפגמים בתיאוריה","slides":"","section":"A"},{"n":6,"text":"מהי השיטה היעילה ביותר לנטרול לקטינים בבישול, לפי המצגת?","options":{"A":"בישול רטוב הוא הדרך הטובה ביותר לנטרול לקטינים, יעיל יותר מאפייה/קלייה","B":"יש להימנע מבישול לחלוטין כדי לשמר לקטינים","C":"בישול יבש (אפייה/קלייה) תמיד יעיל יותר מבישול רטוב","D":"מיקרוגל הוא הדרך המומלצת היחידה; בישול אינו משפיע כלל על רמת הלקטינים","E":"סיר לחץ אינו שונה בשום צורה מבישול רגיל; הקפאה היא הדרך הטובה ביותר לנטרול לקטינים"},"answer":["A"],"multi":false,"explanation":"בישול רטוב הוא הדרך הטובה ביותר לנטרול לקטינים, טוב יותר מאפייה/קלייה. סיר לחץ שונה מבישול רגיל בשל הטמפרטורה הגבוהה יותר הנוצרת מהלחץ, ולכן יעיל אף יותר בנטרול לקטינים (מחקר Hina Vasishtha על שעועית). שקופית: 5 - עד כמה יעיל בישול לנטרול לקטינים","slides":"","section":"A"},{"n":9,"text":"אילו מהקביעות הבאות לגבי Wheat Germ Agglutinin (נבט חיטה) נכונות?","options":{"A":"במחקרי מעבדה נמצא כמסוגל להיקשר לתאי רירית המעי ולשבש את \"מחסום המעי\"","B":"לפי התיאוריה, הוא האשם העיקרי במעי דליף ובדלקת במעיים","C":"במוצר \"נבט חיטה\" עצמו הוא לא עבר תסיסה או חשיפה לחום","D":"בלחם מחיטה מלאה הוא קיים, אך ההחמצה מנטרלת/מפרקת חלק ניכר ממנו","E":"צריכת נבט חיטה כתוסף (סתם ככה) אינה טריוויאלית לפי המצגת","F":"אין שום מחקר שנמצא ספציפית בנושא ההשפעה של ההחמצה על הנבט","G":"כל הקביעות הנ\"ל נכונות"},"answer":["G"],"multi":false,"explanation":"נבט החיטה נמצא במחקרי מעבדה כמסוגל להיקשר לתאי רירית המעי ולשבש את מחסום המעי, ולפי התיאוריה הוא האשם העיקרי במעי דליף ובדלקת מעיים. בניגוד ללחם מחיטה מלאה (שם ההחמצה מפרקת/מנטרלת חלק ניכר ממנו, אף שלא נמצא מחקר ספציפי לכך), במוצר \"נבט חיטה\" עצמו אין תסיסה או חשיפה לחום, ולכן צריכתו כתוסף אינה עניין טריוויאלי. שקופית: 6 - התבכרותה של נבט החיטה","slides":"","section":"A"},{"n":14,"text":"אילו מהקביעות הבאות לגבי התזונה הים-תיכונית נכונות?","options":{"A":"בסיס התזונה: דגנים מלאים, פירות, ירקות, קטניות, אגוזים ושקדים","B":"מקור השומן העיקרי: שמן זית כתית מעולה","C":"דגים, עוף וביצים - מספר פעמים בשבוע","D":"בשר בקר טבעי - מספר פעמים בחודש בלבד, ובשר מעובד אסור","E":"אלכוהול מותר - יין אדום על בסיס יומיומי","F":"למעשה מדובר באורח חיים ולא ב\"שיטת תזונה\" נוקשה, המבוסס על הרגלי אכילה מסורתיים של מדינות החוף הים-תיכוני לפני עידן המזון המתועש","G":"כל הקביעות הנ\"ל נכונות"},"answer":["G"],"multi":false,"explanation":"כל הפרטים תואמים את המצגת: בסיס דגנים מלאים/פירות/ירקות/קטניות/אגוזים, שמן זית כשומן עיקרי, דגים/עוף/ביצים מספר פעמים בשבוע, בשר בקר טבעי מוגבל ובשר מעובד אסור, יין אדום יומיומי מותר, וההגדרה כאורח חיים מסורתי ולא שיטת דיאטה נוקשה. שקופית: 9 - התזונה הים-תיכונית","slides":"","section":"A"},{"n":15,"text":"אילו מהקביעות הבאות לגבי המחקר הגדול על התזונה הים-תיכונית (PREDIMED) נכונות?","options":{"A":"זהו המחקר המבוקר הגדול ביותר שנעשה על התזונה הים-תיכונית","B":"המחקר מצא הפחתה בסיכון למחלות לב בהשוואה לתזונה דלת שומן","C":"המחקר נמשך תקופה של שנים ופורסם ב-New England Journal of Medicine","D":"המחקר לא מצא שום הבדל בין התזונה הים-תיכונית לתזונה דלת שומן","E":"המחקר בוצע רק על חיות מעבדה","F":"המחקר הראה שתזונה ים-תיכונית מזיקה יותר מתזונה דלת שומן","G":"המחקר לא כלל שמן זית או אגוזים כלל"},"answer":["A","B","C"],"multi":true,"explanation":"רוב הקביעות נכונות בפועל (המחקר המבוקר הגדול ביותר על התזונה הים-תיכונית, שנמשך שנים ופורסם ב-NEJM, מצא הפחתה בסיכון למחלות לב לעומת תזונה דלת שומן - Stewart 2018) - אך והשאר שגויות, ולכן התשובה הרשמית לשאלה כפי שנוסחה (המחפשת התאמה מלאה לכל 7 האפשרויות) היא ש\"אף תשובה\" מהמוצגות במלואן כמכלול אינה נכונה במדויק; יש להתייחס בפועל לתשובות כנכונות. שקופית: 10 - המחקר הגדול על התזונה הים-תיכונית","slides":"","section":"A"},{"n":16,"text":"מהי דיאטת DASH?","options":{"A":"Dietary Approaches to Stop Hypertension - דיאטה שפותחה באגף במשרד הבריאות האמריקאי במטרה להוריד לחץ דם באוכלוסייה","B":"דיאטה טבעונית שפותחה בישראל; דיאטה נטולת פחמימות לחלוטין","C":"דיאטה המבוססת אך ורק על אורז; דיאטה המבוססת על צום לסירוגין","D":"דיאטה שפותחה במקור למניעת סוכרת בלבד; דיאטה קטוגנית קלינית לירידה במשקל בלבד"},"answer":["A"],"multi":false,"explanation":"DASH (Dietary Approaches to Stop Hypertension) היא דיאטה שפותחה באגף במשרד הבריאות האמריקאי, במטרה להוריד לחץ דם באוכלוסייה. היא כוללת פירות, ירקות, מוצרי חלב דלי/נטולי שומן, דגנים מלאים, אגוזים, קטניות, בשר, דגים ועוף, עם צמצום מזון מעובד וממותק. שקופית: 11 - Dash diet","slides":"","section":"A"},{"n":17,"text":"אילו מהקביעות הבאות לגבי ממצאי מחקר ה-DASH נכונות?","options":{"A":"אף אחת מהדיאטות שנבחנו במחקר לא הייתה טבעונית, צמחונית או פרו-צמחונית טהורה","B":"הדיאטה כללה כמות משמעותית של פירות, ירקות, אגוזים וקטניות","C":"השינוי בלחץ הדם התרחש רק בעקבות ירידה משמעותית במשקל","D":"השינוי בלחץ הדם התרחש ללא ירידה במשקל","E":"המחקר פורסם בכתב עת לא מדעי","F":"הדיאטה לא כללה בכלל ירקות","G":"אין שום ממצא לגבי לחץ דם סיסטולי ודיאסטולי"},"answer":["A","B","D"],"multi":true,"explanation":"אף אחת מהדיאטות שנבחנו לא הייתה טבעונית/צמחונית/פרו-צמחונית טהורה; הדיאטה כללה כמות משמעותית של פירות, ירקות, אגוזים וקטניות; והשינוי בלחץ הדם (הן הסיסטולי והן הדיאסטולי) התרחש ללא ירידה במשקל (Appel et al. 1997, NEJM). שקופית: 11 - Dash diet - ממצאי המחקר","slides":"","section":"A"},{"n":19,"text":"אילו מהקביעות הבאות לגבי דיאטת האורז (Rice Diet) של ד\"ר קמפנר נכונות?","options":{"A":"פותחה בארה\"ב כטיפול במצבים מורכבים לפני שהיו תרופות יעילות למצבים אלו","B":"במקור: אורז (לבן או מלא), פירות וירקות, כמעט ללא תוספת מלח","C":"נמצאה יעילה ליתר לחץ דם (דלת נתרן, גורמת להשתנה מוגברת)","D":"נמצאה יעילה להורדת עומס מהכליה (דלת חלבון)","E":"נמצאה יעילה לאיזון סוכר (אוכלים מעט ויורדים במשקל)","F":"הדיאטה כוללת כמות קלוריות גבוהה ביום","G":"כל הקביעות הנ\"ל, מלבד F, נכונות"},"answer":["G"],"multi":false,"explanation":"דיאטת האורז פותחה בארה\"ב על ידי ד\"ר קמפנר כטיפול במצבים מורכבים לפני קיום תרופות יעילות, מבוססת על אורז/פירות/ירקות כמעט ללא מלח, ונמצאה יעילה ליתר לחץ דם, להורדת עומס כלייתי ולאיזון סוכר - אך היא דלת קלוריות (לא עתירת קלוריות). שקופית: 13 - זרוא דיאטה - כלי טיפולי","slides":"","section":"A"},{"n":21,"text":"מהי הגרסה הטיפולית האולטרה-מודרנית של דיאטת האורז, ולמה היא משמשת?","options":{"A":"אורז לבן/מלא ומים בלבד לתקופה קצובה, ולאחר מכן הוספה הדרגתית של מזונות; ללא הגבלת כמות קלוריות; משמשת גם כדיאטת אלימינציה יעילה לזיהוי אלרגיות מזון, ובחולי קרוהן - גרסת אורז לבן עם עדויות רבות לתועלת","B":"משמשת רק לתוספת משקל; אורז מלא בלבד ללא כל הגבלה","C":"אין שום שימוש בה בחולי קרוהן; אינה משמשת כלל לזיהוי אלרגיות","D":"יש הגבלה קפדנית על כמות הקלוריות; אין שום גרסה מודרנית לדיאטת האורז"},"answer":["A"],"multi":false,"explanation":"הגרסה הטיפולית האולטרה-מודרנית כוללת אורז לבן/מלא ומים בלבד לתקופה קצובה, ולאחר מכן הוספה הדרגתית של מזונות ללא הגבלת קלוריות; היא משמשת ביעילות כדיאטת אלימינציה לזיהוי אלרגיות מזון, ובחולי קרוהן (בגרסת אורז לבן) יש לה עדויות רבות לתועלת והשפעה חיובית משמעותית. שקופית: 14 - הגרסה המודרנית האולטרה-טיפולית","slides":"","section":"A"},{"n":24,"text":"אילו מהמאפיינים התזונתיים הבאים משותפים לתושבי האזורים הכחולים?","options":{"A":"רוב הקלוריות מגיעות מהצומח","B":"רובם אינם טבעונים או צמחונים (למעט האדוונטיסטים)","C":"מקור מרכזי לקלוריות - פחמימות מורכבות (כולל קטניות)","D":"אין הקפדה על הפרדת מזונות","E":"אינם אוכלים מזון תעשייתי","F":"יש צריכה מתונה של אלכוהול (מלבד אצל האדוונטיסטים) ואינם מעשנים","G":"כל הקביעות הנ\"ל נכונות"},"answer":["G"],"multi":false,"explanation":"כל המאפיינים תואמים את המצגת: רוב הקלוריות מהצומח, רובם אינם טבעונים/צמחונים (חוץ מהאדוונטיסטים), פחמימות מורכבות וקטניות כמקור קלורי מרכזי, ללא הקפדה על הפרדת מזונות, ללא מזון תעשייתי, צריכת אלכוהול מתונה (למעט אדוונטיסטים) וללא עישון. שקופית: 21-22 - מאפייני התזונה בהאזורים הכחולים","slides":"","section":"A"},{"n":25,"text":"אילו מהקביעות הבאות לגבי \"האזור הכחול הישראלי\" נכונות?","options":{"A":"אין באמת אזור כחול בישראל","B":"יש אזור כחול בישראל - עיר עם תוחלת החיים הארוכה ביותר בין היישובים בישראל","C":"הלימוד והשינון הם ערך מרכזי","D":"יש הרבה שירה וניגונים","E":"יש כבוד ומעמד רב לזקנים ולקשישים","F":"אין שום חשיבות למשפחה או לתפילה באזור זה","G":"יין הוא חלק משגרת החיים"},"answer":["B","C","D","E","G"],"multi":true,"explanation":"יש כן אזור כחול ישראלי (קביעה זו נכונה, קביעה זו שגויה) - עיר שהובילה את רשימת היישובים עם תוחלת החיים הארוכה ביותר בישראל, המאופיינת בלימוד ושינון כערך מרכזי, שירה וניגונים, כבוד רב לזקנים, ארוחות משפחתיות ותפילה כטקס יומיומי משמעותי (בניגוד לקביעה השגויה), ויין כחלק משגרת החיים. שקופית: 23 - האזור הכחול הישראלי","slides":"","section":"A"},{"n":31,"text":"מטופל בן 45 עם יתר לחץ דם עמיד לתרופות פונה אליך ומבקש לדעת האם צום מים ממושך תחת פיקוח רפואי (בסגנון שיטת שלטון) עשוי לסייע לו. מהי התשובה המבוססת-ראיות הנכונה ביותר?","options":{"A":"מחקרים (כגון של גולדהמר) הראו ירידה ממוצעת משמעותית בלחץ הדם בעקבות צום מים תחת פיקוח רפואי, עם ירידה בולטת יותר במטופלים עם יל\"ד גבוה יותר בבסיס","B":"אין כל בסיס מחקרי לכך שצום מים משפיע על לחץ דם; צום מים אסור באופן מוחלט לכל אדם עם יתר לחץ דם","C":"צום מים מומלץ ללא כל צורך בפיקוח רפואי, גם למשך שבועות ארוכים; הראיות המחקריות על צום מים ולחץ דם מבוססות רק על מודלים בבעלי חיים","D":"צום מים הוא הטיפול המועדף היחיד ליתר לחץ דם ועדיף על תרופות בכל מקרה; אין צורך לשלב תזונה מתאימה בסיום הצום - ניתן לחזור מיד לתזונה הרגילה"},"answer":["A"],"multi":false,"explanation":"מחקרים כגון זה של גולדהמר (הממשיך בדרכו של שלטון) בוצעו תחת פיקוח רפואי והראו ירידה ממוצעת משמעותית בלחץ הדם, כאשר מטופלים עם לחץ דם גבוה יותר בתחילת הטיפול הראו ירידה ממוצעת גדולה יותר. חשוב לציין שבתום הצום הוכנסה בהדרגה תזונה טבעונית דלת שומן ודלת נתרן, וכי גישה כזו טעונה פיקוח רפואי הדוק. שקופית: 18 - המחקרים - צום מים","slides":"","section":"B"},{"n":32,"text":"ילדה בת 8 עם אפילפסיה עמידה לתרופות מופנית לתזונה קטוגנית. ההורים שואלים אילו סיכונים יש לעקוב אחריהם באופן שוטף לאורך הטיפול. אילו שלושה סיכונים עיקריים יש להזכיר להם, לפי החומר?","options":{"A":"פגיעה אפשרית בצפיפות העצם, המחייבת מעקב ותוספת סידן/מגנזיום/חלבון ואימוני התנגדות","B":"סיכון מוגבר לאבנים בכליות, המחייב מעקב ואפשר תוסף אשלגן/ציטראט להפחתת הסיכון","C":"סיכון לירידה במגוון פלורת המעיים, שניתן לצמצם עם צריכת מזון מותסס","D":"סיכון ודאי ומיידי לפגיעה בתפקוד הכליות עד כדי אי-ספיקה חריפה תוך ימים","E":"סיכון לעלייה חדה וקבועה בלחץ הדם תוך ימים בודדים","F":"סיכון ל\"שפעת קטו\" בתחילת הדרך - עייפות, כאבי ראש, סחרחורות","G":"סיכון מוחלט ומיידי לפגיעה קוגניטיבית בלתי הפיכה"},"answer":["A","B","C"],"multi":true,"explanation":"בתזונה קטוגנית לילדים עם אפילפסיה יש לעקוב אחר: סיכון לפגיעה בצפיפות העצם (מעקב, תוספת סידן/מגנזיום/חלבון, אימוני התנגדות); סיכון מוגבר לאבנים בכליות (עד כ-8% מהילדים המטופלים, הניתן להפחתה עם תוסף אשלגן-ציטראט); וירידה במגוון פלורת המעיים (הניתנת לצמצום עם צריכת מזון מותסס באופן קבוע). שפעת הקטו היא תופעה זמנית בתחילת הדרך ולא סיכון מתמשך. שקופית: 66-68 - קטוגנית וסיבוכים","slides":"","section":"B"},{"n":33,"text":"מטופל טבעוני בן 30 מעוניין לנסות תזונה קטוגנית טבעונית. מהו האתגר המרכזי שעליו להיות מודע אליו, לפי החומר?","options":{"A":"בעולם הצומח, מקורות החלבון (כגון קטניות) מגיעים כמעט תמיד יחד עם פחמימות, מה שמקשה לשמור על יחס המאקרו-נוטריאנטים הנדרש בקטוזיס","B":"קטו טבעוני מספק תמיד יותר חלבון מקטו רגיל; הסיכון היחיד הוא לחסר בברזל, ואין קשר לפחמימות","C":"תזונה טבעונית אינה יכולה להגיע כלל לקטוזיס בשום תנאי; אין שום הבדל בין קטו טבעוני לקטו רגיל - שניהם קלים באותה מידה","D":"הבעיה המרכזית היא עודף חלבון מהצומח שמוציא מקטוזיס באופן בלתי נמנע; אין צורך בתכנון תזונתי מיוחד - כל תזונה טבעונית דלת פחמימות היא אוטומטית תזונה קטוגנית"},"answer":["A"],"multi":false,"explanation":"האתגר הגדול בקטו טבעוני הוא שבעולם הצומח מקורות החלבון (בעיקר קטניות וסויה) מגיעים כמעט תמיד ארוזים יחד עם פחמימות, מה שמקשה לשמור על צריכת פחמימות נמוכה מספיק להשגת קטוזיס. מנגד, לקטו טבעוני יתרונות לעומת הגרסה הקלאסית: פחות רעלים, פגיעה קטנה יותר בפלורת המעיים, ו-LDL נמוך יותר - אך חסרונות: צריכת שמן נוזלי גבוהה יותר, תפריט מצומצם מאוד, וסיכון גדול לחסרים (כולל חלבון, שבקטו הרגיל בשר אדום מספק בעיקר). שקופית: 70-71 - טבעוני קטו","slides":"","section":"B"},{"n":34,"text":"מטופל בן 60 עם עודף משקל ניכר עוקב אחר תזונת פליאו ואוכל בשר אדום (\"מרעה חופשי\") מדי יום. הוא שואל האם עליו לדאוג לסיכון לסרטן ומחלות לב וכלי דם עקב צריכת הבשר האדום היומיומית. מהי התשובה המדויקת ביותר לפי הראיות שהוצגו?","options":{"A":"סקירה מקיפה מצאה שרמת הראיות להמלצה על הפחתת בשר אדום טבעי כדי להקטין סיכון לסרטן ומחלות לב היא נמוכה עד נמוכה מאוד","B":"אין כל מחקר שבדק את הנושא ולכן אי אפשר לדעת; יש להחליף מיידית את כל הבשר האדום בתחליפי סויה","C":"הסיכון תלוי אך ורק בכמות הקלוריות הכוללת ולא בסוג הבשר; יש הוכחה מדעית חדה שדווקא בשר אדום מונע סרטן ומחלות לב","D":"בשר אדום מכל סוג, כולל מעובד, נחשב בטוח לחלוטין ואין צורך בהגבלה; יש הוכחה חד-משמעית שבשר אדום גורם ישירות לסרטן ולכן יש להפסיק מיד"},"answer":["A"],"multi":false,"explanation":"סקירה שיטתית מקיפה (Zeraatkar et al., 2019) מצאה שרמת הראיות התומכת בהפחתת צריכת בשר אדום טבעי (לא מעובד) כדי להקטין סיכון לסרטן ומחלות לב וכלי דם היא נמוכה עד נמוכה מאוד. יש לציין שהמלצה זו מתייחסת לבשר אדום טבעי ולא לבשר מעובד, שלגביו יש המלצה ברורה יותר לצמצום/הימנעות. שקופית: 71 - האם יש הצדקה להמלצה להפחית בשר אדום","slides":"","section":"B"},{"n":36,"text":"מטופלת בת 50 עם היסטוריה של אבנים בכליות (סידן-אוקסלט) שוקלת לעבור לתזונה קטוגנית לצורך ירידה במשקל וויסות סוכר. מה תייעץ לה כדי להפחית את הסיכון הנוסף לאבנים בכליות שהתזונה עלולה להוות?","options":{"A":"להימנע לחלוטין מכל נוזל כדי לרכז את השתן","B":"לוודא צריכה מספקת של ירקות עלים ירוקים (תרד, קייל, מנגולד), ברוקולי ואבוקדו, ואולי תוסף אשלגן-ציטראט","C":"להוסיף לימון לתזונה כמקור לציטראט","D":"לצרוך חומץ תפוחים, שנמצא כמפחית יציאת סידן בשתן מבלי להשפיע על חומציות השתן","E":"לוודא שתייה מספקת למניעת התייבשות ולדילול השתן דרך צינורות הכליה","F":"להימנע לחלוטין מכל ירק ירוק כדי להפחית אוקסלט","G":"להגדיל דרסטית את צריכת החלבון מן החי כדי \"לנקות\" את הכליות"},"answer":["B","C","D","E"],"multi":true,"explanation":"להפחתת סיכון לאבנים בכליות בתזונה קטוגנית מומלץ: צריכה מספקת של ירקות עלים ירוקים, ברוקולי ואבוקדו (עשירים באשלגן) ואולי תוסף אשלגן-ציטראט; הוספת לימון כמקור מרוכז לציטראט; צריכת חומץ תפוחים (נמצא כמפחית יציאת סידן בשתן ללא השפעה על חומציות השתן); ושתייה מספקת למניעת התייבשות ולדילול השתן. הימנעות מנוזלים או מירקות ירוקים תזיק ולא תעזור. שקופית: 67-68 - סיכום חמשת הצעדים להפחתת הסיכון לאבנים בכליות","slides":"","section":"B"},{"n":37,"text":"מטופל בן 35 שאמץ את דיאטת העמילנים של מקדוגל (Starch Diet) פונה אליך לאחר כמה חודשים עם עייפות ותחושת חולשה בשרירים. אילו שני חסרים תזונתיים סבירים במיוחד יש לבדוק ראשונים, לפי הביקורת על השיטה?","options":{"A":"חסר בחלבון, בשל הסתמכות עיקרית על תפוחי אדמה ואורז ואיסור על אגוזי מלך וזרעי פשתן","B":"חסר בוויטמין C, כי השיטה אוסרת לחלוטין פירות הדר","C":"חסר בברזל בלבד, ללא כל קשר לחלבון","D":"כלל הסיכונים הנלווים לטבעונות באופן כללי (למשל B12)","E":"עודף מסוכן בוויטמין A מצריכת ירקות עמילניים","F":"חסר בסידן בלבד עקב הימנעות ממוצרי חלב","G":"חסר בפלואוריד"},"answer":["A","D"],"multi":true,"explanation":"הביקורת על דיאטת העמילנים מציינת סיכון לחסר בחלבון (בשל הסתמכות עיקרית על תפוחי אדמה ואורז, ואיסור על מקורות שומן-חלבון כמו אגוזי מלך וזרעי פשתן), וכן את כלל הסיכונים התזונתיים הכרוכים בטבעונות באופן כללי (כגון B12, ברזל, אבץ, אומגה 3). יש לזכור שהשיטה כן מתירה פירות (בכמות מוגבלת), כך שחסר בוויטמין C ספציפית פחות סביר כגורם ראשוני. שקופית: 45 - ביקורת על דיאטת העמילן","slides":"","section":"B"},{"n":38,"text":"אישה בת 55 עם מחלת לב כלילית ידועה שוקלת להצטרף לתוכנית שיקום המבוססת על עקרונות אסלסטיין (טבעונות דלת שומן קפדנית ללא כל תוספת שמן). מה חשוב להסביר לה לגבי הראיות התומכות בגישה זו?","options":{"A":"המחקר של אסלסטיין הראה תוצאות מרשימות (אחוז נמוך מאוד של אירועים שליליים בקבוצה הנענית לעומת אחוז גבוה בקבוצה שלא נענתה), אך מדובר במחקר עם מגבלות מתודולוגיות","B":"לא ברור מהמחקר האם התפריט היה דל שומן באמת או רק דל שמן נוזלי, כי הותר אבוקדו ואגוזים באי-בהירות מסוימת","C":"במסגרת התוכנית עודדו גם פעילות גופנית סדירה, כך שלא ברור מה חלקה בתוצאות","D":"המחקר הוא הראשון והיחיד אי פעם שנעשה על טבעונות דלת שומן ומחלות לב","E":"במחקר נאסר לחלוטין כל מזון מכיל סוכר מכל סוג, מה שמעלה שאלה אם ההגבלה החדה בסוכר היא שהכריעה את הכף","F":"תוצאות המחקר לא כללו כלל מעקב אחר תלונות של כאבים בחזה","G":"המחקר הוכיח שכל טבעונות, גם עתירת שומן, תניב אותן תוצאות"},"answer":["A","B","C","E"],"multi":true,"explanation":"יש להסביר שהתוצאות מרשימות (למשל אחוז נמוך של אירועים שליליים בקבוצה הנענית מול אחוז גבוה בקבוצה שלא נענתה, ללא אף מקרה של מוות לבבי בנענים), אך המחקר טעון מספר הסתייגויות: לא ברור אם היה דל שומן אמיתי או רק דל שמן נוזלי (הותרו אבוקדו/אגוזים בעמימות מסוימת); התוכנית כללה גם עידוד לפעילות גופנית סדירה וקבועה; ונאסרו גם מזונות עתירי סוכר מכל סוג, כך שההפחתה הדרסטית בסוכר עשויה להיות גורם משמעותי בפני עצמו - כל אלו מקשים להפריד את תרומת כל מרכיב בנפרד. שקופית: 32-34 - מחקר אסלסטיין","slides":"","section":"B"},{"n":39,"text":"מטופל עם טרשת נפוצה (MS) שואל אותך האם עדיף לו לנסות תזונה קטוגנית או תזונה טבעונית דלת שומן (בסגנון מקדוגל), על סמך הראיות שהוצגו בחומר. מה התשובה המדויקת ביותר?","options":{"A":"לשתי הגישות דווח שיפור בתסמינים ואיכות חיים במחקרים על MS, אך ללא הוכחה חד-משמעית להשפעה על מהלך המחלה עצמה או עדיפות ברורה של אחת על השנייה","B":"אין שום מחקר שבדק אף אחת מהגישות בהקשר של טרשת נפוצה; תזונה קטוגנית הוכחה כמרפאת לחלוטין את מחלת הטרשת הנפוצה","C":"שתי הגישות הוכחו כמזיקות לחולי טרשת נפוצה ואסורות לשימוש; יש להימנע מכל שינוי תזונתי בטרשת נפוצה ולהסתמך רק על תרופות","D":"יש הוכחה חד-משמעית שקטוגנית עדיפה לחלוטין על טבעונית דלת שומן ב-MS; יש הוכחה חד-משמעית שטבעונית דלת שומן עדיפה לחלוטין על קטוגנית ב-MS"},"answer":["A"],"multi":false,"explanation":"הן במחקרים על תזונה קטוגנית והן במחקר של מקדוגל על תזונה טבעונית דלת שומן בקרב חולי MS דווח שיפור בתסמינים, בתדירות התקפים או בתפקוד, אך בשני המקרים אין הוכחה חד-משמעית על השפעה על מהלך המחלה עצמה (ה\"מלך המחלות\" כפי שמכונה בחומר), ואין נתונים המראים עדיפות ברורה וחד-משמעית של גישה אחת על פני השנייה. יש להציג למטופל את מגבלות הראיות בשתי הגישות. שקופית: 44-45, 65 - מחקרי MS בדיאטת עמילן ובתזונה קטוגנית","slides":"","section":"B"},{"n":1,"text":"מטופל המאמץ תזונה דלת לקטינים בהשראת ד\"ר גנדרי שואל כיצד להכין קטניות (כגון חומוס ושעועית) בצורה שתמזער את הלקטינים בהן. מה תמליץ?","options":{"A":"לבשל אותן בסיר לחץ, שיבטל כמעט לחלוטין את הלקטינים","B":"לבשל רק בטמפרטורה נמוכה מאוד לזמן קצר","C":"להימנע מבישול לחלוטין כדי לשמר ערך תזונתי","D":"לאכול אותן נאות לחלוטין; להקפיא אותן בלבד ללא בישול","E":"לצרוך אותן רק כתוסף תזונה מרוכז; אין שום דרך להפחית לקטינים בקטניות"},"answer":["A"],"multi":false,"explanation":"בישול קטניות (כגון חומוס, שעועית, פול) בסיר לחץ הוא הדרך היעילה ביותר לבטל כמעט לחלוטין את הלקטינים שבהן, יעיל יותר מבישול רגיל. שקופית: 6 - הנחיות להפחתת חשיפה ללקטינים","slides":"","section":"B"},{"n":3,"text":"מטופל עם יתר לחץ דם מבקש להשוות בין דיאטת DASH לדיאטת האורז של קמפנר מבחינת מנגנון הפעולה. מה ההסבר הנכון?","options":{"A":"DASH מפחיתה לחץ דם דרך שילוב עשיר של פירות/ירקות/דגנים מלאים/מוצרי חלב דלי שומן והפחתת נתרן ושומן רווי, בעוד שדיאטת האורז פועלת בעיקר דרך הפחתה קיצונית של נתרן (המובילה להשתנה מוגברת) ושל קלוריות","B":"שתי הדיאטות מבוססות על אותו מנגנון בדיוק - הגברת צריכת מלח","C":"DASH מבוססת אך ורק על צום מוחלט; אין שום הבדל מנגנוני בין השתיים","D":"דיאטת האורז מבוססת על עודף חלבון; שתי הדיאטות דורשות הימנעות מוחלטת מפירות וירקות","E":"אף אחת מהדיאטות אינה יעילה ליתר לחץ דם"},"answer":["A"],"multi":false,"explanation":"DASH מפחיתה לחץ דם דרך תזונה מאוזנת עשירה בפירות/ירקות/דגנים מלאים ודלת נתרן ושומן רווי, בעוד דיאטת האורז של קמפנר פועלת בעיקר דרך הפחתה קיצונית של נתרן (המובילה להשתנה מוגברת) ושל קלוריות וחלבון. שקופית: 11, 13 - DASH ודיאטת האורז","slides":"","section":"B"},{"n":4,"text":"מטופלת מבקשת דרך יעילה לזהות אלרגיות מזון באמצעות דיאטת אלימינציה. מה תמליץ בהתבסס על החומר?","options":{"A":"הגרסה הטיפולית האולטרה-מודרנית של דיאטת האורז (אורז ומים בלבד לתקופה קצובה, ולאחר מכן הוספה הדרגתית של מזונות) נמצאה יעילה מאוד כדיאטת אלימינציה","B":"אין צורך בתקופת בסיס לפני הוספת מזונות; דיאטת DASH היא הכלי היחיד לזיהוי אלרגיות","C":"יש להוסיף את כל המזונות בבת אחת ולבדוק תגובה; יש להימנע מאורז לחלוטין בתהליך זיהוי אלרגיות","D":"אין שום דיאטה שיכולה לשמש לזיהוי אלרגיות מזון; התזונה הים-תיכונית היא הכלי המומלץ לזיהוי אלרגיות"},"answer":["A"],"multi":false,"explanation":"הגרסה הטיפולית האולטרה-מודרנית של דיאטת האורז (תקופת בסיס של אורז ומים בלבד, ולאחר מכן הוספה הדרגתית ואיטית של מזונות) נמצאה יעילה מאוד כדיאטת אלימינציה לזיהוי אלרגיות מזון. שקופית: 14 - הגרסה המודרנית האולטרה-טיפולית","slides":"","section":"B"},{"n":5,"text":"מטופל עם מחלת קרוהן בהתקף שואל האם דיאטת אורז יכולה לסייע לו. מה ההמלצה המבוססת על החומר?","options":{"A":"גרסת אורז לבן של דיאטת האורז נמצאה עם עדויות רבות לתועלת ולהשפעה חיובית משמעותית במצבי קרוהן","B":"יש לאכול רק אורז קר; רק אורז מלא מומלץ בהתקף קרוהן","C":"יש להעדיף פריכיות אורז מלא בהתקף; אין שום עדות לתועלת של אורז בקרוהן","D":"יש להימנע מאורז לחלוטין בכל מצב של קרוהן; אין קשר בין דיאטת אורז למחלות מעי דלקתיות"},"answer":["A"],"multi":false,"explanation":"בהתקפי קרוהן, גרסת אורז לבן (ולא מלא) של דיאטת האורז נמצאת עם עדויות רבות לתועלת ולהשפעה חיובית משמעותית. שקופית: 14 - אזור הבסיס לחולי קרוהן","slides":"","section":"B"},{"n":6,"text":"מטופלת עם אבנים בכליות חוזרות שואלת אם יש קשר בין דיאטת DASH לבעיה שלה. מה תשיב?","options":{"A":"דיאטת DASH נמצאה מפחיתה היווצרות אבנים בכליות","B":"דיאטת DASH מגבירה משמעותית סיכון לאבנים בכליות","C":"אין שום קשר בין DASH לאבנים בכליות","D":"DASH גורמת תמיד להחמרה במצבי כליה","E":"יש להימנע מכל דיאטה בעלת השפעה על לחץ דם","F":"DASH מיועדת רק לחולי סוכרת","G":"אין שום מחקר על DASH וכליות"},"answer":["A"],"multi":false,"explanation":"בין הממצאים הנוספים על דיאטת DASH - היא נמצאה מפחיתה היווצרות אבנים בכליות. שקופית: 12 - Dash diet (המשך)","slides":"","section":"B"},{"n":7,"text":"מטופל בעל נטייה לדלקות אוטואימוניות שוקל לעבור לתזונה קטוגנית דלת לקטינים בהשראת ד\"ר גנדרי, אך שואל אם יש בסיס מדעי מוצק לחלוטין לתיאוריה. מה תשיב לו באופן מאוזן?","options":{"A":"יש לתיאוריה גם צדדים בעייתיים - רוב הלקטינים נהרסים בבישול (למעט גלוטן), כך שההנחה שיש להימנע מכל מזון \"מכיל לקטינים\" גם לאחר בישול נכון אינה מבוססת דיה","B":"אין שום פגם בתיאוריה; בישול אינו משפיע כלל על לקטינים","C":"גם הגלוטן נהרס לחלוטין בבישול רגיל; אין שום יתרון פוטנציאלי ללקטינים במחקרים","D":"התיאוריה מוכחת מדעית באופן מוחלט וללא עוררין; יש להימנע מכל מזון מבושל כדי להימנע מלקטינים"},"answer":["A"],"multi":false,"explanation":"יש לגשת לתיאוריית הלקטינים בביקורתיות - רוב הלקטינים נהרסים כליל בבישול (עקב דנטורציה), למעט הגלוטן (הנהרס רק חלקית, בהחמצה), ומחקרים אף מצאו ללקטינים תכונות אנטי-סרטניות מסוימות - כך שגורף ההימנעות מכל מזון \"המכיל לקטין\" גם לאחר בישול, אינו מבוסס דיו. שקופית: 4-6 - הפגמים בתיאוריה ויתרונות ללקטינים","slides":"","section":"B"},{"n":9000,"text":"סיר לחץ אינו שונה בשום צורה מבישול רגיל — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["B"],"multi":false,"explanation":"המשפט שגוי על פי החומר. בישול רטוב הוא הדרך הטובה ביותר לנטרול לקטינים, טוב יותר מאפייה/קלייה. סיר לחץ שונה מבישול רגיל בשל הטמפרטורה הגבוהה יותר הנוצרת מהלחץ, ולכן יעיל אף יותר בנטרול לקטינים (מחקר Hina Vasishtha על שעועית). שקופית: 5 - עד כמה יעיל בישול לנטרול לקטינים","slides":"","section":"A","tf":1},{"n":9001,"text":"ארוחת הערב היא הארוחה העיקרית ביום — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["B"],"multi":false,"explanation":"המשפט שגוי על פי החומר. שיטת קינגסטון כוללת פעילות גופנית עדינה בבוקר ללא עומס, פסילה מוחלטת של סוכר/קפה/תה שחור/שוקולד, וחיים לפי השעון הביולוגי (שינה וקימה מוקדמות). לעומת זאת, השיטה מתנגדת לתוספי תזונה וצמחי מרפא (לא מעודדת אותם), מתנגדת לשתייה מרובה (יש לשתות רק כשיש צמא אמיתי), דוגלת דווקא במוצרי חלב עיזים לא מפוסטרים, וארוחת הצהריים - לא הערב - היא הארוחה העיקרית. שקופית: 6 - עקרונות מרכזיים - שיטת קינגסטון","slides":"","section":"A","tf":1},{"n":9002,"text":"מכון היפוקרטס שהקימה נמצא כיום בבוסטון בלבד — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["B"],"multi":false,"explanation":"המשפט שגוי על פי החומר. כל הקביעות שגויות: אן ויגמור טענה שכל חימום הורס אנזימים ולוקח חיות מהמזון - ולכן דווקא התנגדה לבישול, לא עודדה אותו; שיטתה טבעונית לחלוטין וללא מזון מן החי כלל; מקור הקלוריות העיקרי בשיטתה הוא שומנים (אגוזים, שקדים, אבוקדו) ולא פירות; משקה ה-Rejuvelac שפיתחה מבוסס על דגנים מותססים ולא קטניות מבושלות; מכון היפוקרטס שהקימה בבוסטון נמצא כיום בדרום פלורידה, לא בבוסטון בלבד; ועיקרון מרכזי בשיטתה הוא שמחלות נגרמות מרעלים, חסרים תזונתיים וסטרס נפשי - לא מתורשה גנטית. שקופית: 19-21 - שיטת אן ויגמור","slides":"","section":"A","tf":1},{"n":9003,"text":"גבוה יותר בבני אדם מאשר בקופים — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["B"],"multi":false,"explanation":"המשפט שגוי על פי החומר. אצל הקופים הגדולים (שימפנזות וגורילות) המעי הגס (Colon) מהווה נתח גדול משמעותית מנפח מערכת העיכול (כ-45%-50%) לעומת בני אדם, שאצלם המעי הדק תופס חלק גדול יותר. הבדל זה מסביר מדוע הקופים הגדולים מכוונים לעיכול וספיגה מבוססי תסיסה במעי הגס, בעוד בני אדם מכוונים לספיגה במעי הדק של מזון מרוכז אנרגטית (עמילנים מבושלים, שומן, חלבון). שקופית: 39 - ההבדלים בין הקופים הגדולים לבני אדם","slides":"","section":"A","tf":1},{"n":9004,"text":"חלק מהגרסאות כוללות תוספת של מוצרי חלב מתרנין (ואינן אפס-פחמימות לחלוטין) — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["A"],"multi":false,"explanation":"המשפט נכון על פי החומר. התזונה הקרניבורית מבוססת על בשר (עם או בלי ביצים/דגים), נקראת גם Zero Carb diet, וקיימות גרסאות עם מוצרי חלב שאינן אפס-פחמימות מוחלטות. מחקר תצפיתי דיווח על שיפורים בהשמנה, לחץ דם ושימוש בתרופות. השיטה דלה מאוד בסיבים ונוגדי חמצון (ולא עשירה בהם - קביעה זו שגויה), ולכן דווקא גורמת לעצירות ותדירות יציאות נמוכה (לא גבוהה - קביעה זו שגויה). ד\"ר שון בייקר, אורתופד אמריקאי ומקדם בולט של השיטה, אכן נשלל רישיונו עקב חשד לחוסר כשירות והוחזר תחת הגבלות. שקופית: 74-76 - תזונה קרניבורית","slides":"","section":"A","tf":1},{"n":9005,"text":"שיפור משמעותי בתסמינים ואיכות החיים בקרוהן וקוליטיס, לעיתים הפוגה מלאה — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["A"],"multi":false,"explanation":"המשפט נכון על פי החומר. השקופית מפרטת רשימה ארוכה של תועלות שנמצאו לתזונה הקטוגנית: אפילפסיה, סוכרת, עודף משקל, טרשת נפוצה (ללא הוכחה חד-משמעית על המחלה עצמה), אלצהיימר, קרוהן וקוליטיס, דלקת פרקים (וכן היפותירואידיזם וסרטן, שלא נכללו כאן). כל שבע האפשרויות נכונות. שקופית: 65 - התועלות שנמצאו לתזונה הקטוגנית","slides":"","section":"A","tf":1},{"n":9006,"text":"מטרת אטקינס היא ירידה במשקל, ואילו מטרת הפליאו היא אורח חיים בריא המתאים לאדם — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["A"],"multi":false,"explanation":"המשפט נכון על פי החומר. השקופית מפרטת שבעה הבדלים מדויקים בין הגישות: מטרות שונות (ירידה במשקל מול אורח חיים), עמדה שונה כלפי מזון מעובד/ממתיקים מלאכותיים, מוצרי חלב (מרכזי מול נשלל), שאיפה לקטוזיס (יש מול אין), בטטה ושורשים (מותר מול אסור), ודוגמת בורגר מעובד וקולה זירו הממחישה את ההבדל בין \"מינימום פחמימות\" (אטקינס) ל\"איכות המזון\" (פליאו). כל שבע האפשרויות נכונות. שקופית: 57 - ההבדל בין פליאו לתזונה של דר אטקינס","slides":"","section":"A","tf":1},{"n":9007,"text":"רוב רובם של הלקטינים נהרסים כליל בבישול — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["A"],"multi":false,"explanation":"המשפט נכון על פי החומר. שימו לב - זו שאלה מטעה בניסוחה. בפועל רוב הקביעות נכונות (רוב הלקטינים נהרסים בבישול עקב דה-נטורציה; הגלוטן הוא יוצא הדופן שאינו נהרס באפייה אך מתפרק חלקית בהחמצה; גנדרי ממליץ על לחם מחמצת בלבד). מאחר שרק שתי קביעות שגויות מתוך השבע, ושש מהאפשרויות אינן \"כל התשובות\" ואינן \"אף תשובה\" באופן נקי - יש להתייחס לתשובה הרשמית. שקופית: 4 - הפגמים בתיאוריה","slides":"","section":"A","tf":1}]},{"id":"23","title":"היכרות עם הסוכרים השונים","questions":[{"n":1,"text":"איך מתחלקות הפחמימות הפשוטות (בניגוד לעמילן, שהוא פחמימה מורכבת)?","options":{"A":"לדו-סוכרים (די-סכרידים) ולחד-סוכרים (מונו-סכרידים)","B":"לגלוקוז בלבד; לעמילן ולתאית","C":"לדו-סוכרים בלבד; לחד-סוכרים בלבד","D":"לגליקוגן ולעמילן; לפולי-סכרידים בלבד"},"answer":["A"],"multi":false,"explanation":"פחמימות פשוטות מתחלקות לשתי קבוצות: דו-סוכרים (די-סכרידים) וחד-סוכרים (מונו-סכרידים), בעוד עמילן הוא פולי-סכריד המוגדר כפחמימה מורכבת. שקופית: 1 - פחמימות","slides":"","section":"A"},{"n":2,"text":"אילו מהאפשרויות הבאות הן חד-סוכרים (מונו-סכרידים) לפי המצגת?","options":{"A":"סוכרוז","B":"גלוקוז","C":"לקטוז","D":"גלקטוז","E":"מלטוז","F":"עמילן","G":"תאית"},"answer":["B","D"],"multi":true,"explanation":"החד-סוכרים המוזכרים במצגת הם גלוקוז, פרוקטוז וגלקטוז. סוכרוז, לקטוז ומלטוז הם דו-סוכרים, ועמילן ותאית הם פוליסכרידים. שקופית: 2 - מונו-סכרידים","slides":"","section":"A"},{"n":3,"text":"אילו מהקביעות הבאות לגבי גלוקוז נכונות?","options":{"A":"גלוקוז הוא מקור אנרגיה לתאים בעולם הצומח והחי","B":"לגלוקוז יש מבנה מרחבי של שרשרת פתוחה","C":"פירוק גלוקוז יוצר CO2 ומים בתהליכי נשימה","D":"הצמחים אינם מסוגלים לייצר גלוקוז בעצמם ותלויים באדם","E":"גלוקוז הוא \"הדלק\" של התאים לנשימה אירובית, אנאירובית ותסיסה","F":"גלוקוז מגיע לצמחים אך ורק מהקרקע","G":"גלוקוז אינו יכול לשמש כל יצור חי"},"answer":["A","B","C","E"],"multi":true,"explanation":"גלוקוז הוא מקור אנרגיה מרכזי בעולם הצומח והחי, בעל מבנה שרשרת פתוחה, \"דלק\" לנשימה אירובית/אנאירובית ולתסיסה, והצמחים מייצרים אותו בעצמם בפוטוסינתזה (ולא מקבלים אותו מהקרקע). שקופית: 3 - גלוקוז","slides":"","section":"A"},{"n":4,"text":"אילו מהקביעות הבאות לגבי פירוק גלוקוז ללא חמצן (תסיסה) נכונות?","options":{"A":"תסיסה מתרחשת בהיעדר חמצן בתוך התאים","B":"חיידקים או שמרים יכולים לגרום לתסיסה","C":"תסיסה היא אחד מאופני קוריפ הגלוקוז חסר החמצן","D":"תסיסה קשורה לפירוק גלוקוז ולא לחלבון","E":"גלוקוז יכול להתפרק גם בנוכחות מיקרואורגניזמים מתאימים","F":"תהליך התסיסה מוכר בתעשיית המזון (למשל בייצור לחם ואלכוהול)","G":"כל הקביעות הנ\"ל נכונות"},"answer":["G"],"multi":false,"explanation":"תסיסה היא אחד מאופני פירוק הגלוקוז בהיעדר חמצן, המתבצעת על ידי חיידקים או שמרים, ומוכרת מתעשיות כמו אפייה ותסיסה אלכוהולית. שקופית: 4 - אופני פירוק גלוקוז ללא חמצן","slides":"","section":"A"},{"n":5,"text":"מה קורה לגלוקוז בתאי הגוף, לפי המצגת?","options":{"A":"הוא תמיד הופך מיידית לשומן ללא כל תפקיד אנרגטי","B":"הוא נאגר תמיד ורק כתאית","C":"הוא משמש אך ורק לבניית ממברנות תאיות בבעלי חיים","D":"הוא נאגר כגליקוגן בבני אדם ובבעלי חיים, וכעמילן בצמחים, ומשמש כמקור אנרגיה","E":"גליקציה (הידבקות לחלבון/שומן) היא התהליך היחיד שקורה לגלוקוז בתאים","F":"גלוקוז לעולם אינו יכול להפוך לשומן","G":"תאית נבנית אך ורק מחד-סוכרי גלקטוז","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"גלוקוז משמש כמקור אנרגיה, נאגר כגליקוגן (בבעלי חיים) או כעמילן (בצמחים), משמש לבניית ממברנות בתאים צמחיים (תאית), ורק במקרים נדירים (גליקציה) עובר גם הפיכה לשומן - כך שכל הקביעות שהוצגו כמוחלטות/בלעדיות שגויות. שקופית: 5 - מה קורה לגלוקוז בתאים/בגוף","slides":"","section":"A"},{"n":6,"text":"מהי גליקציה (Glycation)?","options":{"A":"הידבקות של סוכר לחלבון או לשומן, הפוגעת על פי רוב בחלבון (אנזימים)","B":"הפיכת גלוקוז לגלקטוז; תהליך אגירת גלוקוז כתאית","C":"תהליך שמתרחש אך ורק בעיניים; תסיסה של גלוקוז על ידי חיידקים","D":"תהליך פירוק גלוקוז לאנרגיה בלבד; תהליך שתמיד משפר את תפקוד האנזימים"},"answer":["A"],"multi":false,"explanation":"גליקציה היא הידבקות סוכר לחלבון או לשומן. פעולה זו פוגעת בחלבון (אנזימים) על פי רוב, אם כי במקרים בודדים ההידבקות דווקא חיונית לפעילות האנזים (למשל בהמוגלובין הקשור לסוכר). שקופית: 6 - Glycation","slides":"","section":"A"},{"n":7,"text":"אילו מהקביעות הבאות לגבי מקורות ואגירת גלוקוז בגוף נכונות?","options":{"A":"אדם שאינו אוכל גלוקוז כלל (למשל אוכל רק בשר) יכול עדיין לקבל גלוקוז מגליצרול, לקטט וחומצות אמינו","B":"גלוקוז מגיע לגוף אך ורק ממזון עשיר בגלוקוז חופשי","C":"גלוקוז נאגר בבעלי חיים ובפטריות כעמילן","D":"גלוקוז נאגר בבעלי חיים כגליקוגן ובצמחים כעמילן","E":"גלוקוז אינו יכול להגיע לגוף מדו-סוכר או מעמילן","F":"חומצות אמינו אינן יכולות לשמש כלל כמקור לגלוקוז","G":"גליצרול אינו קשור כלל לייצור גלוקוז בגוף"},"answer":["A","D"],"multi":true,"explanation":"הגוף יכול לייצר גלוקוז גם מגליצרול, לקטט וחומצות אמינו (כמו במקרה של תזונה מבוססת בשר בלבד), וגלוקוז נאגר בבעלי חיים כגליקוגן ובצמחים כעמילן. שקופית: 7 - מהיכן מגיע גלוקוז לגוף","slides":"","section":"A"},{"n":8,"text":"אילו מהקביעות הבאות לגבי גליקוגן נכונות?","options":{"A":"במולקולת גליקוגן יש כ-30,000 מולקולות גלוקוז","B":"במרכז מולקולת הגליקוגן יש חלבון בשם גליקוגנין","C":"הגליקוגן הוא כדור מסועף (ולא שרשרת ישרה) כדי לאפשר גישה מהירה לאנזימים רבים בו-זמנית ממספר קצוות","D":"הגליקוגן בשריר משתחרר בחזרה למחזור הדם ומשמש את הגוף כולו","E":"הגליקוגן בכבד אחראי על שמירת רמת סוכר תקינה בדם, במיוחד לצורך אספקת אנרגיה למוח","F":"גליקוגן הוא שרשרת ישרה אחת ללא הסתעפויות","G":"גליקוגן קיים אך ורק בכבד ולא בשרירים"},"answer":["A","B","C","E"],"multi":true,"explanation":"גליקוגן מכיל כ-30,000 מולקולות גלוקוז סביב חלבון גליקוגנין במרכזו, ומבנהו המסועף מאפשר גישה מהירה לאנזימים ממספר קצוות בו-זמנית. גליקוגן הכבד שומר על רמת סוכר תקינה בדם עבור המוח, בעוד גליקוגן השריר משרת רק את השריר בו הוא נמצא ואינו משתחרר חזרה לדם. שקופית: 8-9 - גליקוגן","slides":"","section":"A"},{"n":9,"text":"אילו מהקביעות הבאות לגבי \"טריק\" רצי המרתון לפני תחרות נכונות?","options":{"A":"לפני התחרות הם עוברים לתזונה קטוגנית לכמה ימים בשילוב אימון מפרך כדי לרוקן את מאגרי הגליקוגן","B":"יום לפני התחרות הם אוכלים כמות פחמימות גדולה מאוד","C":"המטרה היא לדחות או למנוע את תופעת \"הקיר\" (ריקון מאגרי הגליקוגן) המפורסמת בריצות ארוכות","D":"שיטה זו נקראת \"פיצוי יתר\" של מאגרי הגליקוגן","E":"תהליך זה קשור לניצול יעיל יותר של מאגרי הגליקוגן בשרירים","F":"מטרת התהליך היא להעלות את רמת הגליקוגן בשרירים לקראת המאמץ","G":"כל הקביעות הנ\"ל נכונות"},"answer":["G"],"multi":false,"explanation":"רצי מרתון עוברים תהליך של דלדול מאגרי גליקוגן (תזונה קטוגנית + אימון מפרך) ולאחר מכן \"פיצוי יתר\" - אכילת פחמימות מרובה יום לפני התחרות - כדי למקסם את מאגרי הגליקוגן בשרירים ולדחות/למנוע את תופעת \"הקיר\". שקופית: 10 - הטריק של רצי מרתון","slides":"","section":"A"},{"n":10,"text":"מה ההבדל בסוג הקשרים הכימיים בין עמילן (וגליקוגן) לבין תאית (סיבים), ומה תופעת ה-Maillard reaction?","options":{"A":"בעמילן ובגליקוגן יש קשרי אלפא בין גלוקוז לגלוקוז, ובתאית (סיבים) קשרי ביתא; Maillard reaction אחראית, בין היתר, לצבע החום בלחם","B":"בעמילן ובגליקוגן יש קשרי ביתא, ובתאית קשרי אלפא; Maillard היא תופעת קירור מזון","C":"עמילן אינו מכיל קשרי גלוקוז-גלוקוז כלל; תאית מכילה קשרי אלפא בלבד; אין הבדל כימי בין עמילן לתאית","D":"Maillard reaction גורמת לפירוק מוחלט של הפחמימה למים בלבד; עמילן ותאית מחוברים באותו סוג קשר בדיוק; Maillard אינה קשורה למזון"},"answer":["A"],"multi":false,"explanation":"בעמילן ובגליקוגן הקשרים בין יחידות הגלוקוז הם קשרי אלפא, ואילו בתאית (סיבים) הם קשרי ביתא. תופעת ה-Maillard reaction אחראית, בין היתר, לצבע החום המתפתח בלחם בעת האפייה. שקופית: 9, 11 - עמילן מול תאית ותגובת מייארד","slides":"","section":"A"},{"n":11,"text":"כיצד מתבצעת ספיגת הפרוקטוז מהמעי לדם?","options":{"A":"הפרוקטוז נספג מהמעי אל דופן המעי ומשם לדם, בתהליך ספיגה שאינו מושלם כמו ספיגת גלוקוז","B":"הפרוקטוז נספג רק דרך המעי הגס; הפרוקטוז אינו נספג כלל למחזור הדם","C":"ספיגת הפרוקטוז תמיד גבוהה מספיגת הגלוקוז; ספיגת הפרוקטוז אינה תלויה כלל בכמות הנצרכת","D":"הפרוקטוז נספג ישירות לכבד ללא מעבר דרך המעי; הפרוקטוז נספג באופן מושלם, זהה לחלוטין לספיגת גלוקוז"},"answer":["A"],"multi":false,"explanation":"ספיגת הפרוקטוז מהמעי הדק לדופן המעי ולדם אינה מושלמת כמו ספיגת גלוקוז - עובדה המשפיעה על כל התופעות הפיזיולוגיות הקשורות לצריכת פרוקטוז מרובה. שקופית: 12 - ספיגת הפרוקטוז מהמעי לדם","slides":"","section":"A"},{"n":12,"text":"אילו מהתכונות הכימיות הבאות של פרוקטוז נכונות?","options":{"A":"פרוקטוז הוא המתוק ביותר מכל סוגי המונו-סכרידים (יותר מגלוקוז וסוכרוז)","B":"פרוקטוז סופח לחות בצורה גרועה יותר מגלוקוז","C":"פרוקטוז נמצא ברובו בצורה \"פתוחה\", ולכן מגיב בקלות רבה יותר (ועלול להיכנס לתגובות לא רצויות)","D":"תעשיית המזון משתמשת בפרוקטוז טהור בכל מוצריה","E":"פרוקטוז מאריך חיי מדף בזכות ספיחת לחות טובה","F":"פרוקטוז זהה בתגובתיות הכימית לגלוקוז","G":"פרוקטוז הוא הכי פחות מתוק מבין המונו-סכרידים"},"answer":["A","C","E"],"multi":true,"explanation":"פרוקטוז הוא המתוק ביותר מהמונו-סכרידים, נמצא ברובו בצורה הפתוחה (ולכן מגיב בקלות רבה, כולל בתגובות לא רצויות), וסופח לחות מצוין - ולכן מאריך חיי מדף של מוצרי מזון. תעשיית המזון בפועל אינה משתמשת בפרוקטוז טהור. שקופית: 13 - פרוקטוז","slides":"","section":"A"},{"n":13,"text":"אילו מהקביעות הבאות מסבירות את ההבדל בגורל עודפי גלוקוז לעומת פרוקטוז?","options":{"A":"עודף גלוקוז נאגר כגליקוגן בשרירים","B":"עודף פרוקטוז נאגר כגליקוגן בכבד","C":"כדי שגלוקוז/פרוקטוז יהיו זמינים להפקת אנרגיה, עליהם לעבור פוספורילציה (הוספת זרחן)","D":"האנזימים המזרחנים פרוקטוז ואוגרים אותו כגליקוגן נמצאים בכמות משמעותית רק בכבד","E":"גלוקוז ופרוקטוז נאגרים תמיד באותו איבר בדיוק","F":"אין שום הבדל אנזימטי בין טיפול הגוף בגלוקוז לפרוקטוז","G":"פרוקטוז נאגר תמיד בשרירים בדיוק כמו גלוקוז"},"answer":["A","B","C","D"],"multi":true,"explanation":"גלוקוז נאגר כגליקוגן בשרירים, בעוד פרוקטוז נאגר כגליקוגן בכבד בלבד - וזאת משום שהאנזימים המזרחנים (הופכים לזמין לאגירה/אנרגיה) את הפרוקטוז נמצאים בכמות משמעותית אך ורק בכבד. שקופית: 14 - מה גורל עודפי הגלוקוז והפרוקטוז","slides":"","section":"A"},{"n":14,"text":"אילו מהקביעות הבאות לגבי פרוקטוז ורמת הסוכר/אינסולין נכונות?","options":{"A":"פרוקטוז אינו מהווה טריגר משמעותי לייצור אינסולין על ידי הלבלב (בניגוד לגלוקוז)","B":"לפרוקטוז יש את האינדקס הגליקמי הנמוך ביותר מבין כל מקורות הסוכר","C":"האינדקס הגליקמי חשוב פחות מכמות הגלוקוז שנספגת בפועל","D":"אכילת פירות מרובה תגרום ישירות לסוכרת","E":"עודף פרוקטוז שהכבד לא מצליח להפוך לגליקוגן הופך לשומן, מה שעלול להוביל לכבד שומני","F":"כבד שומני הופך את הכבד עמיד לאינסולין, מה שמאלץ את הלבלב לשחרר עוד יותר אינסולין","G":"כל הקביעות הנ\"ל נכונות"},"answer":["G"],"multi":false,"explanation":"פרוקטוז כמעט אינו מעלה אינסולין ובעל האינדקס הגליקמי הנמוך ביותר, אך אכילת פירות מרובה לא גורמת ישירות לסוכרת (רק עלולה להקשות על איזון בחולי סוכרת קיימים). עודף פרוקטוז שאינו מטופל בכבד הופך לשומן וליצירת כבד שומני, המוביל למעגל של עמידות לאינסולין. שקופית: 15-16 - פרוקטוז ורמת הסוכר וכבד שומני","slides":"","section":"A"},{"n":15,"text":"אילו מהקביעות הבאות לגבי מקורות טבעיים לפרוקטוז נכונות?","options":{"A":"פרוקטוז נמצא בכל הפירות","B":"מקורות עיקריים לפרוקטוז כוללים תוקות שורש, דבש, אגבה ומולסה","C":"פרוקטוז אינו קיים כלל בירקות","D":"בפירות עשירי פרוקטוז כמו בננה וענבים יש יחס גבוה של פרוקטוז לגלוקוז","E":"דבש ואגבה נחשבים למקורות דלים בפרוקטוז","F":"פרוקטוז נמצא רק בסוכר לבן","G":"ירקות שורש אינם מכילים כלל פרוקטוז","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"פרוקטוז אכן נמצא בכל הפירות ומקורותיו כוללים גם ירקות שורש, דבש, אגבה ומולסה (בניגוד לקביעות השגויות שפוסלות ירקות), ובננה וענבים דווקא עשירים ביחס גבוה של פרוקטוז (לא דל, בניגוד לקביעה השגויה), ופרוקטוז כמובן אינו נמצא רק בסוכר לבן (בניגוד לקביעה השגויה). הקביעה הרלוונטית נכונה - ולכן כשילוב הקביעות המוצגות ככלל מוחלט/בלעדי, כולן שגויות במידה זו או אחרת למעט D; עם זאת לצורך שאלה זו התשובה הרשמית \"אף תשובה אינה נכונה\" מתייחסת לניסוח המוקצן של כל אחת מהאפשרויות כפי שנוסחו (רק D תואמת את המצגת במדויק). שקופית: 17 - מקורות לפרוקטוז","slides":"","section":"A"},{"n":16,"text":"אילו מהקביעות הבאות לגבי סירופ תירס עשיר בפרוקטוז (High-Fructose Corn Syrup) נכונות?","options":{"A":"הוא נוצר בתהליך אנזימטי ההופך כמחצית מהגלוקוז לפרוקטוז","B":"הוא נוסף בעיקר למשקאות קלים ולמזון מעובד","C":"הוא קשור למצבים כגון כבד שומני, סוכרת ויתר לחץ דם","D":"הוא נדיר ביותר במזון המערבי המודרני","E":"הוא זהה לחלוטין לפרוקטוז שבפירות שלמים","F":"תעשיית המזון נמנעת ממנו לחלוטין","G":"אין לו שום השפעה בריאותית מתועדת"},"answer":["A","B","C"],"multi":true,"explanation":"סירופ תירס עשיר בפרוקטוז נוצר בתהליך אנזימטי ההופך כמחצית מהגלוקוז שבתירס לפרוקטוז, נוסף למשקאות קלים ולמזון מעובד, וקשור למצבים כמו כבד שומני, סוכרת ויתר לחץ דם - בשונה מהותית מפרוקטוז הנצרך כחלק מפרי שלם עם סיביו. שקופית: 18 - High-fructose corn syrup","slides":"","section":"A"},{"n":17,"text":"אילו מהסיבות הבאות מסבירות מדוע התעשייה משתמשת בסירופ תירס עשיר בפרוקטוז ולא בסוכר לבן רגיל?","options":{"A":"עלות הייצור נמוכה משמעותית מסוכר לבן, בזכות סובסידיות לגידול תירס ומכסי מגן על ייבוא סוכר","B":"הוא שומר על לחות המזון ומאריך חיי מדף של מאפים","C":"הוא יציב מאוד במשקאות קלים וחומציים","D":"הוא יקר משמעותית יותר מסוכר לבן","E":"הוא פוגע בלחות המזון ומקצר חיי מדף","F":"הוא בלתי יציב בתנאים חומציים","G":"אין שום סיבה כלכלית לשימוש בו"},"answer":["A","B","C"],"multi":true,"explanation":"הסיבות העיקריות לשימוש בסירופ תירס עשיר בפרוקטוז הן עלות ייצור נמוכה (סובסידיות ומכסים), שמירה על לחות/האר
