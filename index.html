כת חיי מדף, ויציבות במשקאות קלים וחומציים. שקופית: 19 - למה התעשייה משתמשת בסירופ תירס עשיר בפרוקטוז","slides":"","section":"A"},{"n":18,"text":"מה ההבדל המהותי בין סירופ תירס עשיר בפרוקטוז לבין פירות (מעבר לכך ששניהם מכילים גלוקוז ופרוקטוז)?","options":{"A":"בסוכר לבן/פירות הגלוקוז והפרוקטוז קשורים זה לזה ודורשים פירוק (הידרוליזה) במעי הדק, בעוד שבסירופ התירס העשיר בפרוקטוז הם כבר חופשיים ומגיעים לכבד במהירות שיא והופכים לטריגליצרידים","B":"אין שום הבדל נוסף מעבר לזה; אין הבדל בין קצב ההגעה לכבד","C":"סירופ תירס דורש פירוק ארוך יותר מפירות; הפירות מכילים פי כמה פרוקטוז מסירופ תירס","D":"פירות מכילים גלוקוז וסירופ תירס מכיל פרוקטוז בלבד; הפירות תמיד מכילים יותר פרוקטוז חופשי מסירופ התירס"},"answer":["A"],"multi":false,"explanation":"בפירות (ובסוכר לבן) הגלוקוז והפרוקטוז קשורים זה לזה ודורשים פירוק (הידרוליזה) במעי הדק - תהליך הלוקח זמן. בסירופ תירס עשיר פרוקטוז הסוכרים כבר חופשיים, ולכן הפרוקטוז מגיע לכבד במהירות שיא והופך לטריגליצרידים, מה שעלול לגרום לכבד שומני. שקופית: 20 - ההבדל בין סירופ תירס לפירות","slides":"","section":"A"},{"n":19,"text":"אילו מהקביעות הבאות לגבי חוסר ספיגה של פרוקטוז (Fructose malabsorption) נכונות?","options":{"A":"ספיגה חלקית של פרוקטוז גורמת לו לעבור למעי הגס ולהיות מותסס שם על ידי חיידקים","B":"תסיסת פרוקטוז יוצרת גז מימן, שנספג לדם ונפלט דרך הריאות","C":"מבחן נשיפה לגז מימן עשוי להעיד על בעיה בספיגת פרוקטוז","D":"תסיסת הפרוקטוז במעי הגס עלולה לגרום לתפיחות, גזים, שלשול וכאבי בטן","E":"תזונה עשירה בפרוקטוז לאורך זמן עלולה לגרום לייצור מוגבר של נשאי הספיגה בממברנה","F":"ספיגת פרוקטוז תמיד מלאה ומושלמת ואינה תלויה בכמות","G":"כל הקביעות הנ\"ל, מלבד F, נכונות"},"answer":["G"],"multi":false,"explanation":"פרוקטוז שאינו נספג במלואו במעי הדק ממשיך למעי הגס, שם הוא מותסס ויוצר גז מימן (הניתן לזיהוי במבחן נשיפה) וכן חומצות וגזים נוספים הגורמים לתפיחות, גזים, שלשול וכאבי בטן; תזונה עשירה בפרוקטוז לאורך זמן עלולה גם להגביר את ייצור נשאי הספיגה. שקופית: 21 - ספיגת הפרוקטוז - חוסר ספיגה","slides":"","section":"A"},{"n":20,"text":"אילו מהקביעות הבאות לגבי אכילת פירות אחרי הארוחה נכונות?","options":{"A":"אין מחקרים ישירים המראים נזק מאכילת פירות אחרי הארוחה","B":"למרות היעדר מחקרים, רוב שיטות התזונה בעולם הבריאות ממליצות להימנע מאכילת פירות אחרי הארוחה","C":"אכילת פרי אחרי ארוחה (עם שומן/חלבון) מובילה לעליית סוכר נמוכה יותר בהשוואה לאכילתו על בטן ריקה","D":"עבור רוב האנשים אין מניעה לאכול פרי אחרי הארוחה","E":"קקאו נחשב במצגת לקינוח לגיטימי, טוב יותר מכל קינוח אחר","F":"אכילת פרוקטוז לאחר ארוחה עלולה להגדיל את אחוז הפרוקטוז שאינו נספג במעי הדק","G":"כל הקביעות הנ\"ל נכונות"},"answer":["G"],"multi":false,"explanation":"כל הקביעות תואמות את תוכן המצגת: אין מחקרים ישירים על נזק, אך רוב הגישות התזונתיות ממליצות נגד זאת; אכילת פרי אחרי ארוחה (עם שומן/חלבון) מורידה את עליית הסוכר בהשוואה לבטן ריקה; קקאו הוגדר קינוח לגיטימי. שקופית: 22 - אכילת תוריפ אחרי ארוחה","slides":"","section":"A"},{"n":21,"text":"מהו הרציונל המדעי שהוצג להימנעות מפירות בהרעבת גידולים סרטניים (ולמה יש בו סימני שאלה)?","options":{"A":"תאים סרטניים מסוימים מבטאים כמויות גבוהות של נשא GLUT5 המאפשר להם לשאוב פרוקטוז גם כשיש \"תחרות\" על גלוקוז, ופרוקטוז אף מספק לתא הסרטני אבני בניין ל-RNA","B":"יש לכן היגיון להימנע מסוכר לבן/חום ומסירופ תירס עשיר בפרוקטוז, אך לא ברור מדוע שההגיון הזה יחול גם על פירות שלמים","C":"הרעבה אמיתית מתרחשת רק בתזונה קטוגנית","D":"אין שום מחקר שמראה קשר בין פרוקטוז לגידולים סרטניים","E":"יש עדויות לריפוי סרטן בכל סוגי התזונה, כולל תזונה עתירת פירות","F":"חלק מהגישות מתירות אכילת קמח לבן/קינואה תוך הימנעות מפירות, מה שמעורר תמיהה לגבי עקביות הרציונל","G":"כל הקביעות הנ\"ל, מלבד D, נכונות"},"answer":["G"],"multi":false,"explanation":"יש בסיס מחקרי לכך שסוגי סרטן מסוימים מנצלים פרוקטוז (דרך נשא GLUT5) הן לאנרגיה והן כאבני בניין ל-RNA, מה שמצדיק הימנעות מסוכר/סירופ מרוכזים - אך המצגת מציגה סימני שאלה לגבי הרחבת ההיגיון הזה להימנעות מפירות שלמים, בין היתר לאור עדויות לריפוי סרטן בגישות תזונתיות שונות כולל עתירות פירות, ואי-עקביות בהיתר לאכול קמוסטה/קינואה. שקופית: 27, 29 - פירות וסרטן והרציונל בהרעבת גידול מפרוקטוז","slides":"","section":"A"},{"n":22,"text":"אילו מהקביעות הבאות לגבי גלקטוז נכונות?","options":{"A":"המקור הכמעט-יחיד לגלקטוז הוא כחלק מהדו-סוכר לקטוז","B":"תאי הגוף יודעים לנצל גלקטוז ישירות כאנרגיה ללא צורך בהמרה","C":"גלקטוז נמצא על פני השטח של תאים כחלק ממערכות זיהוי (כולל סוג הדם) ומהווה מרכיב במיאלין ובגלקטוליפידים","D":"גלקטוז אינו קיים בטבע כלל","E":"גלקטוז חייב להפוך לגלוקוז כדי לשמש כאנרגיה","F":"הכבד אינו מסוגל לייצר גלקטוז מגלוקוז","G":"גלקטוז מהווה מקור אנרגיה ישיר וזמין יותר מגלוקוז"},"answer":["A","C","E"],"multi":true,"explanation":"גלקטוז מגיע בעיקר מהלקטוז, אינו יכול לשמש ישירות כאנרגיה (חייב להפוך לגלוקוז דרך הכבד), ומשמש כמרכיב על פני שטח תאים (כולל קביעת סוג דם), במיאלין ובגלקטוליפידים. שקופית: 28 - גלקטוז","slides":"","section":"A"},{"n":23,"text":"מדוע צריכת מוצרי חלב (עשירים בגלקטוז) אינה גורמת בדרך כלל לכבד שומני באותה מידה כמו עודף פרוקטוז, אך עדיין עלולה \"לתרום\" לכבד שומני?","options":{"A":"קשה מאוד להעמיס גלקטוז - נדרשות כמויות גדולות מאוד של מוצרי חלב בזמן קצר, והאדם ירגיש תופעות בטניות מעודף לקטוז הרבה לפני שהגלקטוז יגיע לכבד; אך מוצרי חלב מעלים אינסולין, וזה \"מורה\" לכבד לאגור שומן","B":"גלקטוז אינו נספג כלל לדם; מוצרי חלב אינם מעלים אינסולין בכלל","C":"הכבד אינו מסוגל להפוך גלקטוז לגלוקוז; אין קשר בין אינסולין לאגירת שומן בכבד","D":"גלקטוז זהה בהשפעתו לפרוקטוז חופשי מסירופ תירס; עודף גלקטוז תמיד גורם לכבד שומני חמור יותר מפרוקטוז"},"answer":["A"],"multi":false,"explanation":"קשה להעמיס גלקטוז בכמות שתזיק (וגם יגרמו תופעות בטניות קודם), אך מוצרי חלב עדיין יכולים \"לתרום\" ליצירת כבד שומני משום שהם מעלים אינסולין, וזה \"מורה\" לכבד לאגור שומן. שקופית: 29 - גלקטוז - חידון מהיר","slides":"","section":"A"},{"n":24,"text":"מה ההרכב של שלושת הדו-סוכרים המרכזיים לפי המצגת?","options":{"A":"סוכרוז = גלוקוז + פרוקטוז; לקטוז = גלוקוז + גלקטוז; מלטוז = גלוקוז + גלוקוז","B":"סוכרוז = גלוקוז + גלוקוז; לקטוז = גלוקוז + פרוקטוז; מלטוז = גלוקוז + גלקטוז","C":"כל שלושת הדו-סוכרים מורכבים מגלוקוז בלבד","D":"סוכרוז = פרוקטוז + גלקטוז","E":"לקטוז = פרוקטוז + פרוקטוז","F":"מלטוז = גלקטוז + גלקטוז","G":"אין דו-סוכרים המכילים גלוקוז"},"answer":["A"],"multi":false,"explanation":"סוכרוז מורכב מגלוקוז ופרוקטוז, לקטוז מגלוקוז וגלקטוז, ומלטוז משתי מולקולות גלוקוז. שקופית: 22-27 - דו-סוכרים / סוכרוז","slides":"","section":"A"},{"n":25,"text":"אילו מהקביעות הבאות לגבי סוכרוז ובריאות השן נכונות?","options":{"A":"עששת נגרמת מהפיכת סוכר לחומצה לקטית על ידי חיידקים - זו החומצה שפוגעת באמייל השן, לא הסוכר עצמו","B":"סוכרוז גורם לעששת יותר מכל שאר סוגי הסוכרים","C":"חיידקי סטרפטוקוקוס מוטנס מייצרים מסוכרוז חומר דביק (גלוקן) המאפשר להם להידבק לשן וליצור פלאק","D":"הסוכר הגורם הכי פחות נזק לשיניים הוא לקטוז","E":"מרקם המזון (דביק/גמיש לעומת נוזלי) אינו משפיע על מידת הנזק לשיניים","F":"עמילן אינו יכול לגרום נזק לשיניים בשום מצב","G":"קרמל נוצר מחימום סוכרוז לטמפרטורה גבוהה, בה הגלוקוז והפרוקטוז מתפרקים ונוצרות מולקולות חדשות"},"answer":["A","B","C","D","G"],"multi":true,"explanation":"החומצה הלקטית (תוצר פירוק חיידקי של הסוכר) היא הפוגעת באמייל; סוכרוז גורם לעששת יותר מכל שאר הסוכרים, בעיקר דרך יצירת גלוקן דביק על ידי חיידקי סטרפטוקוקוס מוטנס; לקטוז הוא הפחות מזיק לשיניים; מרקם המזון (דביק וגמיש) כן משפיע ומגביר נזק; ועמילן יכול לגרום נזק אם הוא נדבק לשיניים לזמן ארוך; קרמל נוצר מחימום סוכרוז לטמפרטורה גבוהה. שקופית: 32-35 - סוכרוז ובריאות השן וקרמל","slides":"","section":"A"},{"n":26,"text":"מהי ההגדרה של תהליך \"הידרוליזה\" בהקשר לפירוק סוכרוז?","options":{"A":"פירוק מולקולה לשני חלקים תוך כדי תגובה עם מים (H2O) - חלק אחד הולך לגלוקוז וחלק לפרוקטוז","B":"חימום סוכרוז ללא מים; תהליך שמתרחש אך ורק בכבד","C":"הפיכת סוכרוז לחומצה לקטית; תהליך היוצר גלקטוז מסוכרוז","D":"תהליך המתרחש אך ורק במעי הגס; תהליך פירוק ללא מעורבות אנזימים כלל"},"answer":["A"],"multi":false,"explanation":"הידרוליזה היא פירוק מולקולת סוכרוז לשני חלקים (גלוקוז ופרוקטוז) תוך כדי תגובה עם מים; חומצת הקיבה מתחילה את התהליך, אך רובו מתבצע במעי הדק בעזרת אנזים הסוכראז, הפועל מהר מאוד. שקופית: 31 - סוכרוז - הידרוליזה","slides":"","section":"A"},{"n":27,"text":"אילו מהקביעות הבאות לגבי לקטוז נכונות?","options":{"A":"לקטוז מורכב מגלוקוז וגלקטוז והוא המקור לגלקטוז עבור תינוקות","B":"רק האנזים לקטאז יודע לפרק את הקשר בין גלוקוז לגלקטוז בלקטוז","C":"לקטוז מסייע לספיגת סידן, מגנזיום ואבץ במעי, מה שהופך את החלב למקור יעיל לבניית עצמות","D":"לקטוז קיים בשפע בממלכת הצומח","E":"חלב לעולם אינו מכיל כמות סוכר משמעותית","F":"לקטוז מתוק יותר מסוכרוז ביחס שווה","G":"אין קשר בין לקטוז לספיגת מינרלים"},"answer":["A","B","C"],"multi":true,"explanation":"לקטוז מורכב מגלוקוז וגלקטוז, הוא המקור לגלקטוז עבור תינוקות, רק האנזים לקטאז מפרק אותו, והוא מסייע לספיגת סידן/מגנזיום/אבץ - מה שהופך את החלב למקור יעיל לבניית עצמות. בטבע לקטוז קיים רק ביונקים (לא בשפע בצומח), ולמרות תכולת סוכר גבוהה החלב אינו מתוק כמו כוס מיץ פירות בעל אותה כמות סוכר. שקופית: 35 - לקטוז","slides":"","section":"A"},{"n":28,"text":"אילו מהקביעות הבאות לגבי אי-סבילות ללקטוז נכונות?","options":{"A":"אחרי סיום ההיניקה, אין צורך לייצר לקטאז אלא אם האדם ממשיך לצרוך מוצרי חלב","B":"באירופה האנזים מיוצר לכל החיים אצל רוב האוכלוסייה, בעוד שבמזרח אסיה רבים אינם סבילים ללקטוז","C":"חלק מהאנשים הלא-סבילים ללקטוז יכולים לאכול גבינות קשות, כי רוב הלקטוז יוצא עם מי הגבינה","D":"יוגורט קל יותר לעיכול עבור לא-סבילים ללקטוז, כי חיידקים פרוביוטיים כבר פירקו חלק מהלקטוז לחומצה לקטית","E":"אי-סבילות ללקטוז היא מצב אחיד וזהה אצל כל האנשים ברחבי העולם","F":"אי-סבילות ללקטוז אינה קשורה כלל לכמות מוצרי החלב הנצרכת","G":"כמות האנזים הלקטאז קבועה מלידה ואינה משתנה לעולם"},"answer":["A","B","C","D"],"multi":true,"explanation":"לאחר ההיניקה אין צורך פיזיולוגי בייצור לקטאז ללא המשך צריכת חלב; יש הבדל אזורי/עממי משמעותי (אירופה מול מזרח אסיה); גבינות קשות מכילות פחות לקטוז כי הוא יוצא עם מי הגבינה; ויוגורט קל יותר לעיכול הודות לפירוק חלקי של הלקטוז על ידי חיידקים פרוביוטיים. אי-סבילות ללקטוז היא ספקטרום, לא מצב אחיד. שקופית: 36 - אי-סבילות ללקטוז","slides":"","section":"A"},{"n":29,"text":"אילו מהקביעות הבאות לגבי מלטוז ומעכבי מלטאז נכונות?","options":{"A":"מלטוז מורכב משתי מולקולות גלוקוז, ומקורו הפנימי הוא פירוק עמילן בגוף, והחיצוני - זרעי דגנים מונבטים","B":"האנזים המפרק מלטוז נקרא מלטאז","C":"הירקות והעלים מכילים חומרים המעכבים מלטאז, כגון לוטאולין וקוורצטין","D":"קינמון (ציילוני) פועל בין היתר על ידי עיכוב מלטאז, חיקוי פעולת אינסולין, והאטת ריקון הקיבה","E":"מומלץ להוסיף קינמון עם הארוחה העמילנית ולא לאחריה","F":"לחם ובירה מרגישים \"עמילניים\" ולא מתוקים, למרות שהם מזרימים הרבה סוכר למחזור הדם","G":"כל הקביעות הנ\"ל נכונות"},"answer":["G"],"multi":false,"explanation":"מלטוז (שני גלוקוזים) נוצר מפירוק עמילן פנימי או מדגנים מונבטים חיצוניים ומפורק על ידי מלטאז; ירקות ועלים מכילים מעכבי מלטאז שונים (לוטאולין, קוורצטין ועוד), וקינמון ציילוני פועל במספר מנגנונים (עיכוב מלטאז, חיקוי אינסולין, האטת ריקון קיבה) ומומלץ להוספה יחד עם הארוחה העמילנית. שקופית: 37-39 - מלטוז, מעכבי מלטאז וקינמון","slides":"","section":"A"},{"n":30,"text":"אילו מהקביעות הבאות בהשוואת הממתיקים הטבעיים (דבש, סילאן, מולסה, אגבה, סירופ מייפל) נכונות?","options":{"A":"לאגבה יש את האינדקס הגליקמי הנמוך ביותר מכל הממתיקים, כי היא מכילה בעיקר פרוקטוז חופשי - אך היא נחשבת המסוכנת ביותר בזכות ריכוז הפרוקטוז הגבוה, היעדר סיבים ומינרלים/ויטמינים כמעט אפסיים","B":"המולסה הכהה (Blackstrap) מכילה את הפעילות האנטי-אוקסידנטית הגבוהה ביותר מבין הממתיקים המבוססים על סוכר, ואת ריכוז המינרלים הגבוה ביותר","C":"סילאן (תמרים) מכיל גלוקוז ופרוקטוז חופשיים כבר בתמר עצמו לפני הבישול, בזכות אנזים הסוכראז הפעיל בתמר","D":"אף אחד מהממתיקים הטבעיים המרוכזים אינו מכיל סיבים תזונתיים משמעותיים","E":"סירופ מייפל עשיר יחסית במנגן, המשמש כקו-פקטור לאנזימים ולבניית עצמות ורקמות חיבור","F":"דבש מעלה סוכרים בדם בקלות רבה יותר מסוכר לבן, כי הגלוקוז והפרוקטוז שבו כבר חופשיים (בעקבות פירוק אנזימטי בקיבת הדבורה)","G":"כל הקביעות הנ\"ל נכונות"},"answer":["G"],"multi":false,"explanation":"כל הקביעות תואמות את השוואת הממתיקים הטבעיים במצגת: אגבה - GI נמוך אך המסוכנת ביותר; מולסה כהה - הכי עשירה במינרלים ובנוגדי חמצון; סילאן - סוכרים חופשיים כבר בתמר עצמו; אף אחד מהם אינו מכיל סיבים משמעותיים (למעט התמר השלם עצמו, בניגוד לסילאן המופק ממנו); סירופ מייפל עשיר במנגן; ודבש מעלה סוכר בקלות רבה בזכות סוכרים חופשיים. שקופית: 30-41 - ממתיקים טבעיים (דבש, סילאן, מולסה, אגבה, סירופ מייפל)","slides":"","section":"A"},{"n":26,"text":"מהו האינדקס הגליקמי, לפי הגדרתו המקורית?","options":{"A":"מדד שפיתח ד\"ר ג'נקינס מאוניברסיטת טורונטו, המודד את עליית רמת הגלוקוז בדם שעות מסוימות לאחר אכילת מזון מסוים, בהשוואה לגלוקוז או ללחם לבן","B":"מדד לרמת הנתרן במזון; מדד לכמות החלבון במזון","C":"מדד לכמות הקלוריות במזון; מדד לרמת השומן הרווי במזון","D":"מדד שאינו קשור כלל לרמת סוכר בדם; מדד שפותח על ידי ארגון הבריאות העולמי בלבד"},"answer":["A"],"multi":false,"explanation":"האינדקס הגליקמי פותח על ידי ד\"ר ג'נקינס מאוניברסיטת טורונטו, ומודד את עליית רמת הגלוקוז בדם מספר שעות לאחר אכילת מזון מסוים, בהשוואה לגלוקוז טהור או ללחם לבן (שערכו מוגדר כ-100). שקופית: 25 - הגדרת האינדקס הגליקמי","slides":"","section":"A"},{"n":27,"text":"אילו מהגורמים הבאים משפיעים על התגובה הגליקמית, לפי המצגת?","options":{"A":"מידת עיבוד המזון (מזון גולמי לעומת מזון מעובד)","B":"סוג וכמות העמילופקטין בעמילן","C":"צבע האריזה של המזון","D":"חלבון ושומן במזון מפחיתים את הערך הגליקמי","E":"חוזק הכוח בו לועסים את המזון בלבד","F":"חומץ ואלכוהול בתבשיל מעלים את הערך הגליקמי","G":"מידת הבשלת הפרי אינה משפיעה כלל"},"answer":["A","B","D"],"multi":true,"explanation":"הגורמים המשפיעים על התגובה הגליקמית כוללים מידת עיבוד המזון, סוג וכמות העמילופקטין, וכן חלבון ושומן במזון (המפחיתים את הערך הגליקמי) - בניגוד לקביעה השגויה שם חומץ ואלכוהול דווקא מורידים (ולא מעלים) ערך גליקמי, ובניגוד לקביעה השגויה שכן משפיעה מידת הבשלת הפרי. שקופית: 26 - מה משפיע על התגובה הגליקמית","slides":"","section":"A"},{"n":28,"text":"אילו מהקביעות הבאות לגבי סיבים והאינדקס הגליקמי נכונות?","options":{"A":"השפעת הסיבים על האינדקס הגליקמי תלויה - היא משתנה בהתאם לאופן הכנת המזון","B":"פריכיות אורז מלא נמצאות בעלות אינדקס גליקמי גבוה מאוד למרות שיש בהן סיבים","C":"מזון מותפח כמו פופקורן דומה בהתנהגותו לפריכיות אורז מלא","D":"פסטה מקמח מלא - תלוי במידת הבישול (Al Dente לעומת Well Done)","E":"טחינת הגרגיר לקמח כלל אינה משפיעה על ההשפעה של הסיבים על הערך הגליקמי","F":"סיבים תמיד מורידים את הערך הגליקמי ללא יוצא מן הכלל","G":"אין שום קשר בין אופן הכנת המזון לערך הגליקמי"},"answer":["A","B","C","D"],"multi":true,"explanation":"השפעת הסיבים על האינדקס הגליקמי תלויה מאוד באופן הכנת המזון - פריכיות אורז מלא (ומזון מותפח כמו פופקורן) הן בעלות אינדקס גליקמי גבוה מאוד למרות תכולת הסיבים; פסטה מקמח מלא תלויה במידת הבישול; וטחינת הגרגיר לקמח כן פוגעת משמעותית בהשפעת הסיבים על הערך הגליקמי (בניגוד לקביעה השגויה). שקופית: 27 - האם סיבים משפיעים על האינדקס הגליקמי","slides":"","section":"A"},{"n":29,"text":"מהו האינדקס העומס הגליקמי (Glycemic Load), וכיצד הוא מחושב?","options":{"A":"הערך הגליקמי בלבד, ללא כל שקלול נוסף","B":"שקלול הערך הגליקמי עם הכמות שנאכלה בפועל: הערך הגליקמי מחולק ב-100 וכפול בכמות הפחמימות שנאכלה","C":"מדד המתעלם לחלוטין מכמות הפחמימות שנאכלה","D":"מדד המבוסס אך ורק על כמות הקלוריות","E":"עומס גליקמי של כ-10 ומטה נחשב נמוך","F":"עומס גליקמי של 20 ומעלה נחשב גבוה","G":"עומס גליקמי אמצעי הוא סביב 20"},"answer":["B","E","F","G"],"multi":true,"explanation":"העומס הגליקמי שוקלל את הערך הגליקמי עם כמות הפחמימות שנאכלה בפועל (ערך גליקמי חלקי 100, כפול כמות הפחמימות שנאכלה); עומס גליקמי של כ-10 נחשב נמוך, סביב 20 בינוני, ו-20 ומעלה גבוה. פתרון זה נועד לתקן בעיה מבנית באינדקס הגליקמי - כמות גדולה של מזון בעל ערך גליקמי נמוך עדיין יכולה לגרום לעלייה חדה בסוכר הדם. שקופית: 29 - האינדקס העומס הגליקמי","slides":"","section":"A"},{"n":30,"text":"אילו מהקביעות הבאות לגבי מגבלות נוספות של מדדי הסוכר (עומס גליקמי, אינדקס אינסולין ו-DayTwo) נכונות?","options":{"A":"יש מזונות בעלי ערך גליקמי נמוך שבכל זאת מעלים משמעותית אינסולין - ולכן פותח \"אינדקס האינסולין\"","B":"DayTwo מתאים המלצות מזון לפי בדיקת פלורת המעיים, אך פלורת המעיים דינמית ומשתנה בהתאם לתזונה, תרופות, סטרס ועוד","C":"ההמלצות של DayTwo תמיד תואמות אכילה בריאה","D":"עומס גליקמי ותגובה גליקמית משתנים גם אצל אותו אדם עצמו בזמנים שונים","E":"מה שנאכל בלילה משפיע משמעותית על העומס הגליקמי של ארוחת הבוקר למחרת","F":"אופן הבישול (חום נמוך לזמן ארוך מול חום גבוה לזמן קצר) משפיע משמעותית על הערך הגליקמי","G":"כמות השומן בארוחה אינה משפיעה כלל על העומס הגליקמי"},"answer":["A","B","D","E","F"],"multi":true,"explanation":"רוב הקביעות נכונות בפועל: אינדקס האינסולין פותח כי יש מזונות בעלי GI נמוך שמעלים אינסולין; DayTwo מתבסס על פלורת מעיים דינמית שאינה תמיד תואמת אכילה בריאה (ולכן קביעה זו שגויה); עומס גליקמי משתנה מאדם לאדם וגם אצל אותו אדם; ארוחת לילה משפיעה על עומס בוקר; ואופן הבישול וכמות השומן משפיעים משמעותית על העומס הגליקמי (ולכן קביעה זו שגויה). שקופית: 30-31 - מגבלות המודלים - אינדקס אינסולין ו-DayTwo","slides":"","section":"A"},{"n":1,"text":"מטופל סוכרתי שותה משקאות קלים ממותקים בסירופ תירס עשיר בפרוקטוז ומדווח על עלייה במשקל ובעיות בכבד. מהו ההסבר הפיזיולוגי המתאים ביותר?","options":{"A":"הפרוקטוז החופשי בסירופ מגיע לכבד במהירות שיא והופך לטריגליצרידים, מה שעלול לגרום לכבד שומני ולעמידות לאינסולין","B":"הבעיה נובעת מגלוטן שבמשקה; משקאות קלים אינם קשורים לתפקוד הכבד","C":"הסירופ מעלה בעיקר גלקטוז ולא פרוקטוז; הסירופ מכיל אך ורק גלוקוז שאינו קשור כלל לכבד שומני","D":"פרוקטוז מהמשקה תמיד נספג באיטיות בזכות סיבים תזונתיים; אין שום הבדל בין שתיית משקה ממותק בסירופ תירס לאכילת פרי שלם"},"answer":["A"],"multi":false,"explanation":"בסירופ תירס עשיר בפרוקטוז, בניגוד לפרי שלם, הגלוקוז והפרוקטוז חופשיים וללא סיבים, כך שהפרוקטוז מגיע לכבד במהירות שיא והופך לטריגליצרידים - מה שעלול לגרום לכבד שומני ולמעגל של עמידות לאינסולין. שקופית: 18-20 - סירופ תירס עשיר בפרוקטוז וכבד שומני","slides":"","section":"B"},{"n":2,"text":"מטופלת מדווחת על נפיחות, גזים וכאבי בטן לאחר אכילת כמות גדולה של תפוחים ואגסים על בטן ריקה. מהו ההסבר הסביר ביותר?","options":{"A":"מדובר בספיגה חלקית של הפרוקטוז במעי הדק, כך שחלקו עובר למעי הגס ועובר שם תסיסה חיידקית היוצרת גזים וכאבי בטן","B":"הבעיה נובעת מעודף גלקטוז; מדובר תמיד באלרגיה לגלוטן","C":"אין קשר בין פרי לתסמינים אלו; מדובר בהכרח בזיהום חיידקי במזון","D":"תפוחים ואגסים אינם מכילים פרוקטוז כלל; הסימפטומים נובעים מעודף חלבון בתפוחים"},"answer":["A"],"multi":false,"explanation":"ספיגת הפרוקטוז במעי הדק אינה מלאה; פרוקטוז שאינו נספג עובר למעי הגס ומותסס שם על ידי חיידקים, מה שיוצר גז מימן וחומצות הגורמים לתפיחות, גזים וכאבי בטן. שקופית: 21 - ספיגת הפרוקטוז - חוסר ספיגה","slides":"","section":"B"},{"n":3,"text":"מטופל עם עששת חוזרת שואל אילו הרגלי אכילת ממתקים מסוכנים במיוחד לשיניים. מה תשיב לו בהתבסס על המצגת?","options":{"A":"מזון דביק וגמיש (כמו סוכריות טופי, פירות יבשים, עוגיות) מכיל סוכרוז שנשאר צמוד לשן זמן רב יותר מאשר שתייה, ומעלה סיכון לעששת","B":"חיידקי הפה אינם קשורים כלל לעששת; משקה ממותק מסוכן יותר משוקולד דביק","C":"לקטוז הוא הסוכר המזיק ביותר לשיניים; אין שום הבדל במרקם המזון מבחינת נזק לשיניים","D":"עמילן אינו יכול לגרום נזק לשיניים בשום נסיבות; רק שתיית משקאות ממותקים מסוכנת, מזון מוצק לעולם לא"},"answer":["A"],"multi":false,"explanation":"מרקם המזון משפיע על משך ההידבקות לשן - מזון דביק וגמיש (סוכריות, פירות יבשים, עוגיות) נשאר צמוד לשן זמן רב יותר משתייה, ומעלה סיכון לעששת (בעיקר בזכות סוכרוז, הגורם היעיל ביותר לעששת מבין הסוכרים). שקופית: 33 - סוכרוז ובריאות השן","slides":"","section":"B"},{"n":4,"text":"מטופלת אינה סובלת מוצרי חלב נוזליים אך מדווחת שהיא יכולה לאכול גבינה קשה וגם יוגורט ללא בעיה. כיצד תסביר זאת?","options":{"A":"גבינות קשות מכילות רוב הלקטוז שיוצא עם מי הגבינה, ויוגורט קל יותר לעיכול כי חיידקים פרוביוטיים כבר פירקו חלק מהלקטוז לחומצה לקטית","B":"גבינה ויוגורט אינם מכילים כלל חלב; הלקטאז נוצר מחדש בכל מוצר חלב שונה","C":"גבינה קשה מכילה יותר לקטוז מחלב נוזלי; יוגורט תמיד קשה יותר לעיכול מחלב רגיל","D":"הסבר זה אינו רלוונטי לאי-סבילות ללקטוז; אי-סבילות ללקטוז היא מצב הכל-או-כלום, ולכן אין הסבר אפשרי"},"answer":["A"],"multi":false,"explanation":"באי-סבילות ללקטוז (שהיא ספקטרום ולא מצב אחיד), גבינות קשות מכילות פחות לקטוז כי רובו יוצא עם מי הגבינה, ויוגורט קל יותר לעיכול הודות לפירוק חלקי של הלקטוז לחומצה לקטית על ידי חיידקים פרוביוטיים בתהליך התסיסה. שקופית: 36 - אי-סבילות ללקטוז","slides":"","section":"B"},{"n":5,"text":"מטופל בעל היסטוריה של כבד שומני שואל אם עליו להימנע לחלוטין מכל הפירות. מה ההמלצה המבוססת ביותר לפי החומר?","options":{"A":"אין צורך להימנע מפירות שלמים; הבעיה העיקרית קשורה בעיקר לפרוקטוז חופשי ומרוכז (סירופ תירס, סוכר, מיצים) ולא לפרי שלם עם סיביו, שבו הספיגה איטית יותר","B":"יש להימנע רק מבננות; אין שום הבדל בין פרי שלם למיץ פרי","C":"יש להימנע מפירות אך להרבות בסוכר לבן; פרי שלם מסוכן פי כמה מסירופ תירס עשיר בפרוקטוז","D":"כן, יש להימנע לחלוטין מכל הפירות ללא יוצא מן הכלל; יש להעדיף אך ורק מיצי פירות טריים על פני פירות שלמים"},"answer":["A"],"multi":false,"explanation":"הבעיה של פרוקטוז וכבד שומני קשורה בעיקר לצריכה מרוכזת של פרוקטוז חופשי (סירופ תירס, סוכר, כמויות גדולות בזמן קצר) ולא לפרי שלם, שבו הסיבים מאטים את ספיגת הפרוקטוז ומקטינים משמעותית את הסיכון. שקופית: 23-24 - TG ופרוקטוז וכבד שומני","slides":"","section":"B"},{"n":6,"text":"מטופלת בהריון שאינה צורכת מוצרי חלב שואלת מהיכן יגיע גלקטוז לחלב האם שלה. מה התשובה הנכונה?","options":{"A":"בלוטות החלב מייצרות גלקטוז מגלוקוז שנע בדם, כך שאין צורך בצריכת מוצרי חלב כדי לייצר לקטוז בחלב אם","B":"יש לצרוך דווקא עודף מוצרי חלב במהלך ההנקה כדי להבטיח גלקטוז מספק","C":"הכבד אינו מסוגל לייצר גלקטוז; תינוקות אינם זקוקים ללקטוז בחלב אם","D":"חלב אם אינו מכיל כלל לקטוז; גלקטוז אינו נחוץ כלל לתינוק; גלקטוז יכול להגיע רק ממוצרי חלב, ולכן היא חייבת לצרוך אותם"},"answer":["A"],"multi":false,"explanation":"הגוף (בלוטות החלב) יודע לייצר גלקטוז מגלוקוז הנע בדם, ולכן גם אישה מניקה שאינה צורכת מוצרי חלב יכולה לייצר לקטוז (גלוקוז+גלקטוז) בחלבה עבור התינוק. שקופית: 29 - גלקטוז - חידון מהיר","slides":"","section":"B"},{"n":7,"text":"מאמן כושר שואל מתי ולמה מומלץ לרצי מרתון \"לרוקן\" את מאגרי הגליקוגן שלהם לפני תחרות. מה ההסבר הנכון?","options":{"A":"יש לעבור לתזונה קטוגנית עם אימון מפרך לכמה ימים לפני התחרות כדי לרוקן את מאגרי הגליקוגן, ואז יום לפני התחרות לאכול כמות פחמימות גדולה - כדי לדחות או למנוע את תופעת \"הקיר\"","B":"תופעת \"הקיר\" אינה קשורה למאגרי גליקוגן; יש להימנע מפחמימות לחלוטין גם לפני התחרות","C":"תזונה קטוגנית לפני התחרות אינה חלק מהשיטה; ריקון גליקוגן אינו קשור כלל לביצועים בריצה","D":"יש לאכול פחמימות רבות דווקא בזמן התחרות בלבד; יש לרוקן גליקוגן ולהישאר ריקים עד התחרות עצמה"},"answer":["A"],"multi":false,"explanation":"הטריק כולל דלדול מאגרי הגליקוגן (תזונה קטוגנית + אימון מפרך) ולאחר מכן \"פיצוי יתר\" - אכילת פחמימות מרובה יום לפני התחרות - כדי למקסם את מאגרי הגליקוגן ולדחות/למנוע את תופעת \"הקיר\". שקופית: 10 - הטריק של רצי מרתון","slides":"","section":"B"},{"n":8,"text":"מטופל עם תסמינים של נפיחות וגזים לאחר אכילת פירות שואל אם כדאי לבצע בדיקה לאבחון הבעיה. מה ההמלצה הנכונה בהתבסס על החומר?","options":{"A":"מבחן נשיפה לגז מימן עשוי להעיד על בעיה בספיגת פרוקטוז","B":"יש לבדוק רק את רמת האינסולין בצום","C":"הבדיקה היחידה הרלוונטית היא בדיקת עששת","D":"יש לבצע רק בדיקת דם לגלוטן; יש לבדוק רמת גלקטוז בדם בלבד","E":"אין שום בדיקה רלוונטית לבעיה זו; אין קשר בין תסמינים אלו לפרוקטוז"},"answer":["A"],"multi":false,"explanation":"מבחן נשיפה לגז מימן (Hydrogen breath test) עשוי להעיד על בעיה בספיגת פרוקטוז, מכיוון שפרוקטוז שאינו נספג ומגיע למעי הגס מותסס שם ויוצר גז מימן הנספג לדם ונפלט דרך הריאות. שקופית: 21 - ספיגת הפרוקטוז","slides":"","section":"B"},{"n":9,"text":"מטופלת שרוצה להמתיק תה בצורה שתסייע גם באיזון רמות סוכר שואלת אם יש תוסף טבעי שיכול לעזור. מה ההמלצה המבוססת ביותר מהחומר?","options":{"A":"תוספת מקל קינמון (ציילוני) לתה ירוק אחרי הארוחה, בזכות עיכוב מלטאז, חיקוי פעולת אינסולין והאטת ריקון הקיבה","B":"יש להוסיף קינמון קסיה (לא ציילוני) בלבד בכמות בלתי מוגבלת","C":"תוספת סירופ תירס עשיר בפרוקטוז; יש להימנע מקינמון לחלוטין בכל מצב","D":"תוספת סוכר לבן רגיל; תוספת מולסה בכמות גדולה; אין שום תוסף טבעי שיכול לסייע באיזון רמות סוכר"},"answer":["A"],"multi":false,"explanation":"קינמון (רצוי ציילוני, בעל פחות קומרין) פועל במספר מנגנונים לאיזון סוכר - עיכוב מלטאז, חיקוי פעולת אינסולין, והאטת ריקון הקיבה - ומומלץ להוספה עם/אחרי הארוחה העמילנית, למשל עם תה ירוק. שקופית: 38-39 - קינמון","slides":"","section":"B"},{"n":10,"text":"מטופל שסובל מכבד שומני ומעוניין לבחור ממתיק טבעי \"הכי פחות מזיק\" עבורו, בהתחשב בעומס הפרוקטוז החופשי, שואל בין אגבה למולסה כהה. מה תמליץ ומדוע?","options":{"A":"מולסה כהה, כי אגבה מכילה את ריכוז הפרוקטוז החופשי הגבוה ביותר מבין הממתיקים (ולכן מוגדרת המסוכנת ביותר), בעוד שהמולסה עשירה במינרלים ובנוגדי חמצון וכמעט נטולת פרוקטוז חופשי מרוכז באותה מידה","B":"אגבה, כי היא הכי מתוקה; אגבה נטולת פרוקטוז לחלוטין","C":"שניהם זהים לחלוטין מבחינת פרוקטוז; מולסה מכילה יותר פרוקטוז חופשי מאגבה","D":"יש להעדיף דווקא סירופ תירס עשיר בפרוקטוז; אין שום הבדל רלוונטי לכבד שומני בין הממתיקים"},"answer":["A"],"multi":false,"explanation":"אגבה מכילה בעיקר פרוקטוז חופשי בריכוז הגבוה ביותר מבין הממתיקים הטבעיים ומוגדרת במצגת \"המסוכנת ביותר\", בעוד שמולסה (בפרט Blackstrap) עשירה במינרלים ובפעילות אנטי-אוקסידנטית גבוהה, ומהווה אופציה עדיפה יחסית עבור מי שרוצה למזער עומס פרוקטוז חופשי. שקופית: 34-41 - השוואת ממתיקים טבעיים","slides":"","section":"B"},{"n":9,"text":"מטופל בודק את רמת הסוכר שלו לאחר אכילת אותה ארוחה בימים שונים, ומגלה תגובות שונות מאוד. הוא שואל מדוע האינדקס הגליקמי לא חוזה את התגובה שלו במדויק. מה ההסבר הנכון?","options":{"A":"התגובה הגליקמית לכל מזון משתנה מאדם לאדם וגם אצל אותו אדם בזמנים שונים, בהתאם למגוון פלורת המעיים, מה שנאכל בלילה הקודם, ואופן הכנת המזון","B":"אין שום הסבר אפשרי לתופעה זו; פלורת המעיים אינה משפיעה כלל על תגובת הסוכר","C":"מה שנאכל בלילה הקודם לא משפיע על תגובת הבוקר; תגובת הסוכר תלויה אך ורק בגנטיקה וזהה בכל מצב","D":"אופן הכנת המזון אינו משפיע על התגובה הגליקמית; האינדקס הגליקמי הוא מדד קבוע לחלוטין ואינו יכול להשתנות בשום מצב"},"answer":["A"],"multi":false,"explanation":"התגובה הגליקמית משתנה מאדם לאדם וגם אצל אותו אדם בזמנים שונים, בהתאם למגוון פלורת המעיים (המשתנה גם היא), למה שנאכל בארוחה הקודמת (למשל בלילה שלפני), ולאופן הכנת המזון (טמפרטורה ומשך הבישול) - כל אלו הופכים את האינדקס הגליקמי למדד לא מדויק ברמת הפרט. שקופית: 28, 30 - בעיות באינדקס הגליקמי ובכל המודלים","slides":"","section":"B"},{"n":10,"text":"מטופלת מגלה שמזון מסוים בעל ערך גליקמי נמוך גורם לה בכל זאת לעלייה חדה ברמת האינסולין. היא שואלת איזה מדד עשוי להסביר את התופעה. מה תשיב?","options":{"A":"אינדקס האינסולין (Insulin index) - שפותח בדיוק כדי לתעד מזונות בעלי ערך גליקמי נמוך שבכל זאת מעלים אינסולין באופן משמעותי","B":"אין שום מדד שיכול להסביר תופעה זו; אין שום מזון שיכול להראות פער כזה","C":"עומס גליקמי הוא המדד היחיד הרלוונטי כאן; תגובת אינסולין אינה קשורה כלל לערך גליקמי של מזון","D":"האינדקס הגליקמי תמיד תואם באופן מושלם לתגובת האינסולין; מדד DayTwo מבוסס אך ורק על ערך גליקמי ולא על פלורת מעיים"},"answer":["A"],"multi":false,"explanation":"אינדקס האינסולין פותח בדיוק כדי לטפל בבעיה שבה מזונות מסוימים אינם מעלים סוכר בדם (ערך גליקמי נמוך) אך בכל זאת מעלים משמעותית אינסולין. שקופית: 30 - אינדקס האינסולין","slides":"","section":"B"},{"n":9000,"text":"בפירות עשירי פרוקטוז כמו בננה וענבים יש יחס גבוה של פרוקטוז לגלוקוז — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["B"],"multi":false,"explanation":"המשפט שגוי על פי החומר. פרוקטוז אכן נמצא בכל הפירות ומקורותיו כוללים גם ירקות שורש, דבש, אגבה ומולסה (בניגוד לקביעות השגויות שפוסלות ירקות), ובננה וענבים דווקא עשירים ביחס גבוה של פרוקטוז (לא דל, בניגוד לקביעה השגויה), ופרוקטוז כמובן אינו נמצא רק בסוכר לבן (בניגוד לקביעה השגויה). הקביעה הרלוונטית נכונה - ולכן כשילוב הקביעות המוצגות ככלל מוחלט/בלעדי, כולן שגויות במידה זו או אחרת למעט D; עם זאת לצורך שאלה זו התשובה הרשמית \"אף תשובה אינה נכונה\" מתייחסת לניסוח המוקצן של כל אחת מהאפשרויות כפי שנוסחו (רק D תואמת את המצגת במדויק). שקופית: 17 - מקורות לפרוקטוז","slides":"","section":"A","tf":1},{"n":9001,"text":"השפעת הסיבים על האינדקס הגליקמי תלויה - היא משתנה בהתאם לאופן הכנת המזון — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["A"],"multi":false,"explanation":"המשפט נכון על פי החומר. השפעת הסיבים על האינדקס הגליקמי תלויה מאוד באופן הכנת המזון - פריכיות אורז מלא (ומזון מותפח כמו פופקורן) הן בעלות אינדקס גליקמי גבוה מאוד למרות תכולת הסיבים; פסטה מקמח מלא תלויה במידת הבישול; וטחינת הגרגיר לקמח כן פוגעת משמעותית בהשפעת הסיבים על הערך הגליקמי (בניגוד לקביעה השגויה). שקופית: 27 - האם סיבים משפיעים על האינדקס הגליקמי","slides":"","section":"A","tf":1},{"n":9002,"text":"אי-סבילות ללקטוז אינה קשורה כלל לכמות מוצרי החלב הנצרכת — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["B"],"multi":false,"explanation":"המשפט שגוי על פי החומר. לאחר ההיניקה אין צורך פיזיולוגי בייצור לקטאז ללא המשך צריכת חלב; יש הבדל אזורי/עממי משמעותי (אירופה מול מזרח אסיה); גבינות קשות מכילות פחות לקטוז כי הוא יוצא עם מי הגבינה; ויוגורט קל יותר לעיכול הודות לפירוק חלקי של הלקטוז על ידי חיידקים פרוביוטיים. אי-סבילות ללקטוז היא ספקטרום, לא מצב אחיד. שקופית: 36 - אי-סבילות ללקטוז","slides":"","section":"A","tf":1},{"n":9003,"text":"גלקטוז מהווה מקור אנרגיה ישיר וזמין יותר מגלוקוז — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["B"],"multi":false,"explanation":"המשפט שגוי על פי החומר. גלקטוז מגיע בעיקר מהלקטוז, אינו יכול לשמש ישירות כאנרגיה (חייב להפוך לגלוקוז דרך הכבד), ומשמש כמרכיב על פני שטח תאים (כולל קביעת סוג דם), במיאלין ובגלקטוליפידים. שקופית: 28 - גלקטוז","slides":"","section":"A","tf":1},{"n":9004,"text":"עומס גליקמי אמצעי הוא סביב 20 — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["A"],"multi":false,"explanation":"המשפט נכון על פי החומר. העומס הגליקמי שוקלל את הערך הגליקמי עם כמות הפחמימות שנאכלה בפועל (ערך גליקמי חלקי 100, כפול כמות הפחמימות שנאכלה); עומס גליקמי של כ-10 נחשב נמוך, סביב 20 בינוני, ו-20 ומעלה גבוה. פתרון זה נועד לתקן בעיה מבנית באינדקס הגליקמי - כמות גדולה של מזון בעל ערך גליקמי נמוך עדיין יכולה לגרום לעלייה חדה בסוכר הדם. שקופית: 29 - האינדקס העומס הגליקמי","slides":"","section":"A","tf":1},{"n":9005,"text":"תסיסה קשורה לפירוק גלוקוז ולא לחלבון — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["B"],"multi":false,"explanation":"המשפט שגוי על פי החומר. תסיסה היא אחד מאופני פירוק הגלוקוז בהיעדר חמצן, המתבצעת על ידי חיידקים או שמרים, ומוכרת מתעשיות כמו אפייה ותסיסה אלכוהולית. שקופית: 4 - אופני פירוק גלוקוז ללא חמצן","slides":"","section":"A","tf":1},{"n":9006,"text":"הגליקוגן הוא כדור מסועף (ולא שרשרת ישרה) כדי לאפשר גישה מהירה לאנזימים רבים בו-זמנית ממספר קצוות — נ function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function labelAns(q,arr){return q.tf?arr.map(l=>(q.options[l]||l)).join(", "):arr.join(", ");}

let examCount=33, examOff={};
function examAvail(){let n=0;QUIZZES.forEach((q,i)=>{if(!examOff[i])n+=q.questions.length;});return n;}
function toggleExamTopic(i){examOff[i]=!examOff[i];examSetup();}
function examAllTopics(on){QUIZZES.forEach((q,i)=>{examOff[i]=!on;});examSetup();}
function setExamCount(n){examCount=n;const el=document.getElementById('exNum');if(el)el.textContent=n;}
function pickExamCount(c){examCount=c;examSetup();}
function examSetup(){
  window.scrollTo(0,0);

  const maxN=Math.max(10,Math.min(120,avail||10));

  const chip=(c)=>`<button class="btn ${examCount===c?'btn-primary':'btn-ghost'}" style="padding:8px 16px;min-height:0;flex:0 0 auto" onclick="pickExamCount(${c})">${c}</button>`;

      <div style="display:flex;gap:10px;margin:4px 0 8px;font-size:13px">
        <button class="link" style="padding:2px" onclick="examAllTopics(true)">בחר/י הכל</button>
        <button class="link" style="padding:2px" onclick="examAllTopics(false)">נקה/י הכל</button></div>
      <div class="tlist">${rows}</div>
      <p class="section-title" style="margin-top:18px">מספר שאלות: <span id="exNum" style="color:var(--brand);font-weight:800">${examCount}</span> <span style="color:var(--muted);font-weight:400;font-size:13px">(זמינות: ${avail})</span></p>

      <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">${chip(33)}${chip(66)}${chip(99)}</div>

}
function launchExam(){
  const idxs=QUIZZES.map((q,i)=>i).filter(i=>!examOff[i]);
  if(!idxs.length){alert('יש לבחור לפחות נושא אחד');return;}
  startCombinedExam(examCount,idxs);
}
function startCombinedExam(n,idxs){
  window.scrollTo(0,0);
  const src=(idxs&&idxs.length)?idxs.map(i=>QUIZZES[i]):QUIZZES;
  let pool=[];
  src.forEach(q=>q.questions.forEach(x=>pool.push(Object.assign({},x,{_src:q.title,_srcId:q.id}))));
  n=Math.min(n,pool.length);
  const qs=shuffle(pool.slice()).slice(0,n).map((x,i)=>Object.assign({},x,{_i:i})).map(shuffleOpts);
  state={qi:-1,mode:'exam',quiz:{id:'EXAM',title:'מבחן מסכם',questions:qs},qs,cur:0,answers:{},checked:{},skipped:{}};
  renderQuestion();
}

/* ---------- QUIZ ENGINE ---------- */
function beginQuiz(qi,mode){
  const q=QUIZZES[qi];
  const total=q.questions.length;
  const n=(pickCount==null)?total:Math.min(pickCount,total);
  let pool=q.questions.map((x,idx)=>({...x,_i:idx}));
  let qs;
  if(n<total){ qs=shuffle(pool.slice()).slice(0,n); }
  else { const doShuffle=document.getElementById("shuffleChk")?.checked; qs=doShuffle?shuffle(pool.slice()):pool; }
  qs=qs.map(shuffleOpts);
  state={qi,mode,quiz:q,qs,cur:0,answers:{},checked:{},skipped:{}};
  renderQuestion();
}

function optionKeys(q){return LETTERS.filter(l=>q.options[l]!==undefined);}
function shuffleOpts(q){
  const keys=optionKeys(q);
  const pinKey=keys.find(k=>/^(אף אחת|כל ה)/.test((q.options[k]||"").trim()));
  let rest=shuffle(keys.filter(k=>k!==pinKey).slice());
  const order=pinKey?rest.concat([pinKey]):rest;
  const newOpts={},remap={};
  order.forEach((ok,idx)=>{const nl=LETTERS[idx];newOpts[nl]=q.options[ok];remap[ok]=nl;});
  const newAns=q.answer.map(a=>remap[a]).filter(Boolean).sort();
  return Object.assign({},q,{options:newOpts,answer:newAns});
}

function renderQuestion(){
  window.scrollTo(0,0);
  const s=state,q=s.qs[s.cur];
  const total=s.qs.length;
  const sel=s.answers[s.cur]||[];
  const isChecked=s.checked[s.cur];
  const badge=q.tf?`<span class="badge tf">נכון / שגוי</span>`:(q.section==='B'?`<span class="badge clin">מקרה קליני</span>`:`<span class="badge gen">שאלה כללית</span>`);
  const _st=q._src||(s.quiz&&s.quiz.title)||'', _sid=q._srcId||(s.quiz&&s.quiz.id)||'';
  const hintHtml=`<details class="hint"><summary>💡 רמז — מאיזו מצגת</summary><div>${_sid&&_sid!=='EXAM'?'מצגת '+esc(String(_sid))+' · ':''}${esc(_st)}${q.slides?' · שקופיות '+esc(q.slides):''}</div></details>`;
  const keys=optionKeys(q);
  const opts=keys.map(l=>{
    const selCls=sel.includes(l)?"sel":"";
    let stateCls="";
    if(isChecked){
      const correct=q.answer.includes(l);
      if(correct) stateCls="correct locked";
      else if(sel.includes(l)) stateCls="wrong locked";
      else stateCls="locked";
    }
    const shape=q.multi?"":"radio";
    const mark=q.multi?(sel.includes(l)?"✓":""):(sel.includes(l)?"●":l);
    return `<div class="opt ${shape} ${selCls} ${stateCls}" onclick="pick('${l}')">
      <div class="mark">${q.multi?mark:(isChecked?l:mark)}</div>
      <div class="txt">${esc(q.options[l])}</div></div>`;
  }).join("");

  let feedback="";
  if(isChecked){
    const ok=isCorrect(q,sel);
    feedback=`<div class="explain ${ok?'ok':'bad'}">
      <b>${ok?'✓ תשובה נכונה':'✗ תשובה שגויה'} — התשובה הנכונה: ${labelAns(q,q.answer)}</b>
      ${esc(q.explanation)}
      ${q.slides?`<div class="slides">📎 מקור: שקופיות ${esc(q.slides)}</div>`:""}
    </div>`;
  }

  const liveScore=s.mode==='practice'?`<div class="score-live">ניקוד: ${scoreSoFar()} / ${Object.keys(s.checked).length}</div>`:`<div class="score-live">${countAnswered()} / ${total} נענו</div>`;

  let navBtns="";
  if(s.mode==='practice'){
    if(!isChecked){
      navBtns=`<button class="btn btn-primary" onclick="checkAnswer()" ${sel.length?'':'disabled'}>בדיקה</button>`;
    }else{
      navBtns = s.cur<total-1
        ? `<button class="btn btn-primary" onclick="go(1)">השאלה הבאה ›</button>`
        : `<button class="btn btn-primary" onclick="finish()">סיום וצפייה בציון</button>`;
    }
  }else{
    const nextBtn = s.cur<total-1
      ? `<button class="btn btn-primary" onclick="go(1)">הבאה ›</button>`
      : `<button class="btn btn-primary" onclick="finish()">סיום ובדיקת ציון</button>`;
    const skipBtn = `<button class="btn btn-skip" onclick="skipQuestion()">דלג ⤼</button>`;
    navBtns=`<button class="btn btn-ghost" onclick="go(-1)" ${s.cur===0?'disabled':''}>‹ הקודמת</button>${skipBtn}${nextBtn}`;
  }

  app.innerHTML=`
    <button class="link" onclick="confirmQuit()">‹ יציאה</button>
    <div class="qhead"><span>שאלה ${s.cur+1} מתוך ${total}</span>${liveScore}</div>
    <div class="pbar"><i style="width:${(s.cur+1)/total*100}%"></i></div>
    <div class="card">
      <div style="margin-bottom:6px">${badge}</div>
      <div class="qtext">${esc(q.text)}</div>
      ${q.multi?`<div class="multi-note">⚠ שאלה רב-ברירתית — סמן/י את כל התשובות הנכונות</div>`:""}
      <div class="opts">${opts}</div>
      ${hintHtml}
      ${feedback}
      <div class="nav">${s.mode==='practice'?'<span></span>':''}${navBtns}</div>
    </div>`;
}

function pick(l){
  const s=state;
  if(s.checked[s.cur]) return;
  const q=s.qs[s.cur];
  let sel=s.answers[s.cur]||[];
  if(q.multi){
    sel=sel.includes(l)?sel.filter(x=>x!==l):[...sel,l];
  }else{
    sel=[l];
  }
  s.answers[s.cur]=sel;
  if(s.skipped) delete s.skipped[s.cur];
  renderQuestion();
}
function checkAnswer(){state.checked[state.cur]=true;renderQuestion();}
function skipQuestion(){const s=state;s.skipped[s.cur]=true;delete s.answers[s.cur];if(s.cur<s.qs.length-1)go(1);else finish();}
function go(d){
  const s=state;const n=s.cur+d;
  if(n<0||n>=s.qs.length)return;
  s.cur=n;renderQuestion();
}
function isCorrect(q,sel){
  if(!sel||!sel.length) return false;
  const a=[...q.answer].sort().join(",");
  const b=[...sel].sort().join(",");
  return a===b;
}
function scoreSoFar(){
  let c=0;const s=state;
  for(const k in s.checked){if(isCorrect(s.qs[k],s.answers[k]||[]))c++;}
  return c;
}
function countAnswered(){return Object.keys(state.answers).filter(k=>state.answers[k].length).length;}

function confirmQuit(){
  if(confirm("לצאת מהשאלון? ההתקדמות לא תישמר.")){ if(state.qi===-1) home(); else startScreen(state.qi); }
}

/* ---------- RESULTS ---------- */
function finish(){
  window.scrollTo(0,0);
  const s=state,total=s.qs.length;
  let correct=0;
  let skippedN=0;
  const review=s.qs.map((q,i)=>{
    const sk=!!(s.skipped&&s.skipped[i]);
    const sel=s.answers[i]||[];
    const ok=!sk&&isCorrect(q,sel);
    if(sk)skippedN++; else if(ok)correct++;
    return {q,sel,ok,sk};
  });
  const scored=total-skippedN;
  const pct=scored>0?Math.round(correct/scored*100):0;
  const band = pct>=85?"var(--ok)":pct>=60?"var(--accent)":"var(--bad)";
  const msg = pct>=85?"מצוין! שליטה מצוינת בחומר":pct>=60?"כל הכבוד — כדאי לחזור על מה שפספסת":"כדאי לחזור על החומר ולנסות שוב";
  const R=52,C=2*Math.PI*R,off=C*(1-pct/100);
  const reviewHtml=review.map((r,i)=>{
    const cls=r.sk?'rskip':(r.ok?'rok':'rbad');
    const mk=r.sk?'⤼':(r.ok?'✓':'✗');
    const mkc=r.sk?'var(--accent)':(r.ok?'var(--ok)':'var(--bad)');
    const yours=r.sel.length?labelAns(r.q,r.sel):"— (לא נענתה)";
    return `<div class="review-item ${cls}">
      <div class="rq"><span class="ri-mark" style="color:${mkc}">${mk}</span>
        <span>${i+1}. ${esc(r.q.text)}</span></div>
      <div class="rdetail">
        ${r.sk?`<div style="color:var(--accent);font-weight:700">דולג — לא נספר בציון</div>`:(r.ok?'':`<div>תשובתך: <span class="yourans">${yours}</span></div>`)}
        <div>תשובה נכונה: <span class="rightans">${labelAns(r.q,r.q.answer)}</span></div>
        ${r.q._src?`<div style="font-size:12px;color:var(--brand);font-weight:700;margin-top:4px">📚 ${esc(r.q._src)}</div>`:""}
        <div style="margin-top:6px">${esc(r.q.explanation)}</div>
        ${r.q.slides?`<div class="slides" style="margin-top:5px;color:var(--muted);font-size:12px">📎 שקופיות ${esc(r.q.slides)}</div>`:""}
      </div>
    </div>`;
  }).join("");

  app.innerHTML=`
    <div class="card">
      <div class="result-hero">
        <div class="ring">
          <svg width="150" height="150"><circle cx="75" cy="75" r="${R}" fill="none" stroke="var(--line)" stroke-width="12"/>
          <circle cx="75" cy="75" r="${R}" fill="none" stroke="${band}" stroke-width="12" stroke-linecap="round"
            stroke-dasharray="${C}" stroke-dashoffset="${off}"/></svg>
          <div class="pct"><b style="color:${band}">${pct}%</b><span>ציון סופי</span></div>
        </div>
        <h2 style="margin:6px 0 2px">${esc(s.quiz.title)}</h2>
        <p style="color:var(--muted);margin:0">${msg}</p>
        <div class="stats"><div class="stats ok"><b>${correct}</b><small>נכונות</small></div>
          <div class="stats bad"><b>${scored-correct}</b><small>שגויות</small></div>
          ${skippedN?`<div class="stats skip"><b>${skippedN}</b><small>דולגו</small></div>`:''}
          <div><b>${scored}</b><small>נספרו</small></div></div>
      </div>
      <div class="nav">
        ${s.qi===-1
          ? `<button class="btn btn-ghost" onclick="home()">לדף הבית</button>
             <button class="btn btn-primary" onclick="examSetup()">מבחן מסכם חדש</button>`
          : `<button class="btn btn-ghost" onclick="startScreen(${s.qi})">חזרה לנושא</button>
             <button class="btn btn-primary" onclick="beginQuiz(${s.qi},'${s.mode}')">נסה/י שוב</button>`}
      </div>
    </div>
    <div class="review-head">
      <p class="section-title" style="margin:0">סקירת תשובות</p>
      ${(scored-correct)>0?`<label class="wrong-toggle"><input type="checkbox" onchange="document.getElementById('reviewList').classList.toggle('only-wrong', this.checked)"> הצג רק שגויות</label>`:''}
    </div>
    <div id="reviewList">${reviewHtml}</div>
    <div style="text-align:center;margin-top:20px"><button class="link" onclick="home()">↩ לכל הנושאים</button></div>`;
}

function boot(){ home(); }
document.addEventListener('keydown',function(e){
  if(!state||!state.qs)return;
  if(/result-hero/.test(app.innerHTML))return;
  const s=state,q=s.qs[s.cur]; if(!q)return;
  if(/^[1-9]$/.test(e.key)){
    const keys=optionKeys(q),idx=+e.key-1;
    if(idx<keys.length && !s.checked[s.cur]){pick(keys[idx]);e.preventDefault();}
    return;
  }
  if(e.key==='Enter'){
    e.preventDefault();
    if(s.mode==='practice'){
      if(!s.checked[s.cur]){if((s.answers[s.cur]||[]).length)checkAnswer();}
      else{s.cur<s.qs.length-1?go(1):finish();}
    }else{s.cur<s.qs.length-1?go(1):finish();}
  }
});
boot();
</script>
</body>
</html>
