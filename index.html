n":"התססה מוגדרת כיצירת סביבת חיים שתעודד התרבות סלקטיבית של חיידקי חומצה לקטית, תוך דיכוי התרבותם של חיידקים אחרים. שקופית: 129 - התססה","slides":"","section":"A"},{"n":5,"text":"אילו מהתנאים הבאים נדרשים לצורך התססה נכונה?","options":{"A":"מים - כדי שלא יהיה חמצן בסביבת ההתססה.","B":"סוכר - כמקור האנרגיה לחיידקי חומצה לקטית.","C":"מלח - על מנת לנטרל התרבות של חיידקים אחרים ולהשאיר את הסוכר לחיידקי חומצה לקטית.","D":"חום גבוה מתמשך לאורך כל תהליך ההתססה.","E":"תוספת שמרים מסחריים בכל תהליך.","F":"נוכחות חמצן חופשי בריכוז גבוה.","G":"תוספת חומצה אצטית מוכנה מראש לצנצנת."},"answer":["A","B","C"],"multi":true,"explanation":"התנאים להתססה נכונה הם מים (כדי למנוע חמצן), סוכר (מקור אנרגיה) ומלח (לנטרול חיידקים לא רצויים והשארת הסוכר לחיידקי חומצה לקטית). שקופית: 129 - התססה","slides":"","section":"A"},{"n":6,"text":"אילו מהמשפטים הבאים לגבי תהליך ההתססה נכונים?","options":{"A":"במהלך ההתססה, מולקולה אחת של גלוקוז הופכת לשתי מולקולות של חומצה לקטית.","B":"ההתססה נעצרת כאשר נגמר הסוכר הזמין בכלי.","C":"קור מאט את קצב התרבות החיידקים בתהליך ההתססה.","D":"בתהליך ההתססה נוצר גז דו-תחמוצת הפחמן.","E":"רוב החיידקים אינם שורדים בתנאים של חומציות גבוהה ומלח בריכוז גבוה.","F":"בזכות התנאים הסלקטיביים, התססה משמשת בפועל כשיטת שימור מזון.","G":"הרכיבים העיקריים הנדרשים לתהליך הם מים, סוכר ומלח."},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל הפרטים נכונים על פי תיאור תהליך ההתססה: הפיכת גלוקוז לחומצה לקטית, עצירה עם גמר הסוכר, האטה בקור, ייצור CO2, ותפקוד ההתססה כשיטת שימור מזון בזכות התנאים הבלתי-נסבלים לרוב החיידקים. שקופית: 129 - התססה","slides":"","section":"A"},{"n":7,"text":"אילו משני היתרונות הבאים מיוחסים לצריכת מזון מותסס?","options":{"A":"שיפור ספיגה של מינרלים וויטמינים.","B":"נטרול חומצה פיטית.","C":"הגברת רמות הכולסטרול הרע (LDL) בדם.","D":"פגיעה בלתי הפיכה בפלורת המעי הטבעית.","E":"עלייה בסיכון למחסור בוויטמין D.","F":"ירידה בפעילות נוגדת החמצון במזון.","G":"הגברת רגישות למחלות אוטואימוניות."},"answer":["A","B"],"multi":true,"explanation":"מבין התועלות המנויות: נטרול חומצה פיטית ושיפור ספיגה של מינרלים וויטמינים - שתיהן מופיעות במפורש כתועלות של תהליך ההתססה לאדם. שקופית: 130 - התועלת לאדם בהתססה","slides":"","section":"A"},{"n":8,"text":"אילו מהמשפטים הבאים לגבי התועלות והדוגמאות למזון מותסס נכונים?","options":{"A":"התססה תורמת להתרבות חיידקים פרוביוטיים במזון.","B":"נמצאה בחיידקי ההתססה פעילות נוגדת חמצון המשפרת את כמות נוגדי החמצון במזון.","C":"לצמחי מרפא מותססים נמצאה פעילות אנטי-דלקתית חזקה יותר מאשר לאותם צמחים ללא התססה.","D":"קפיר הוא שילוב של חיידקים פרוביוטיים ושמרים הגדלים לרוב על חלב.","E":"יין נחשב למוצר תסיסה המתבצע באמצעות שמרים ולא חיידקים.","F":"מיסו, נאטו וטמפה נמנים על מוצרי סויה מותססים.","G":"לחם מחמצת נמנה גם הוא על דוגמאות המזון המותסס."},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל הפרטים תואמים את הרשימה בשקופית: תועלות ההתססה (פרוביוטיקה, נוגדי חמצון, אנטי-דלקתי) ודוגמאות המזון המותסס (קפיר, יין, מוצרי סויה מותססים, לחם מחמצת). שקופית: 130 - התועלת לאדם בהתססה","slides":"","section":"A"},{"n":9,"text":"מה ייחודי לקפיר בהשוואה למזונות מותססים אחרים שהוזכרו?","options":{"A":"הוא שילוב של חיידקים פרוביוטיים ושמרים הגדלים לרוב על חלב.","B":"הוא תוצר תסיסה המתבצע אך ורק באמצעות חיידקי חומצה אצטית.","C":"הוא נוצר על ידי הרתחת חלב בטמפרטורה גבוהה ללא כל חיידקים.","D":"הוא מוצר סויה מותסס בדומה למיסו ולנאטו.","E":"הוא מיוצר אך ורק מירקות כבושים במלח.","F":"הוא זהה לחלוטין ליוגורט מבחינת סוג החיידקים המעורבים.","G":"אין בו כל רכיב חי לאחר תהליך הייצור."},"answer":["A"],"multi":false,"explanation":"קפיר מוגדר במפורש כשילוב של חיידקים פרוביוטיים ושמרים הגדלים לרוב על חלב - שילוב שאינו מופיע באופן זהה במזונות המותססים האחרים שהוזכרו. שקופית: 130 - התועלת לאדם בהתססה","slides":"","section":"A"},{"n":10,"text":"אילו מהקביעות הבאות לגבי בחירת כלי להתססת ירקות נכונות?","options":{"A":"רבים טוענים שרצוי כלי אטום לאור ולא כלי שקוף, מחשש שהאור יפריע להתרבות החיידקים.","B":"רבים מתסיסים בהצלחה גם בצנצנות זכוכית שקופות.","C":"אסור שהירקות יצאו מתוך המים, שכן חיידקים רעים באוויר עלולים לקלקל את תכולת הכלי.","D":"חובה חוקית להשתמש אך ורק בכלי פלסטיק מיוחד להתססה.","E":"מומלץ להשאיר את הירקות חשופים לאוויר החופשי לאורך כל התהליך.","F":"הדעה לגבי הצורך בכלי אטום לאור אינה חד-משמעית, ותלויה בגישות שונות.","G":"שימוש במשקולות אינו קשור כלל לשמירת הירקות מתחת למים."},"answer":["A","B","C"],"multi":true,"explanation":"על פי השקופית: יש הטוענים לעדיפות כלי אטום לאור, אך רבים מתסיסים בהצלחה בצנצנות זכוכית שקופות; בכל מקרה קריטי שהירקות יישארו מתחת למים כדי למנוע חדירת חיידקים רעים מהאוויר (ולכן משתמשים במשקולות). שקופית: 131 - התנאים להתססה (בחירת כלי)","slides":"","section":"A"},{"n":11,"text":"אילו משני היתרונות הבאים מיוחסים לכלי ייעודי להתססה, בהשוואה לצנצנת רגילה?","options":{"A":"מאפשר לשחרר גזים מבלי לפתוח את הכלי מדי יום, בזכות מגרעת שממלאים אותה במים.","B":"מאפשר להשתמש בפחות מלח, מכיוון שאין צורך לפתוח את הכלי ולחשוף אותו לחיידקים רעים.","C":"מבטל לחלוטין את הצורך במים בתהליך ההתססה.","D":"הופך את השימוש במשקולות למיותר לחלוטין בכל מקרה.","E":"מייצר את החומצה הלקטית מהר פי עשרה מכלי רגיל.","F":"אינו דורש כלל נוכחות סוכר בתהליך.","G":"מונע כל אפשרות לגידול חיידקים בכלי."},"answer":["A","B"],"multi":true,"explanation":"לכלי ייעודי יתרון בכך שיש בו מגרעת מלאת מים שמאפשרת יציאת גזים ומונעת כניסת חמצן מבלי לפתוח את הכלי, וכן מאפשר שימוש בפחות מלח כי אין חשיפה תכופה לחיידקים רעים בעת פתיחה. שקופית: 131 - התנאים להתססה (כלי ייעודי)","slides":"","section":"A"},{"n":12,"text":"אילו מהקביעות הבאות לגבי כלי ההתססה נכונות?","options":{"A":"חובה להשתמש בכלי פלסטיק שקוף בלבד, אחרת ההתססה לא תצליח.","B":"מותר ואף רצוי שהירקות יצופו מעל פני המים לאורך כל התהליך.","C":"כלי ייעודי להתססה דורש פתיחה יומית חובה לשחרור גזים.","D":"משקולות משמשות להגברת החום בתוך הכלי ואינן קשורות לירקות עצמם.","E":"כלי אטום לאור מחייב שימוש בכמות מלח גבוהה פי עשרה מכלי שקוף.","F":"שימוש בצנצנת זכוכית שקופה אסור באופן מוחלט ותמיד יגרום לקלקול המזון.","G":"אין כל חשיבות לכך שהירקות יישארו מתחת לפני המים בזמן ההתססה.","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"כל הקביעות שגויות: אין חובה לכלי פלסטיק שקוף, אסור שהירקות יצופו מעל המים, כלי ייעודי דווקא מאפשר לא לפתוח מדי יום, המשקולות משמשות להשארת הירקות מתחת למים ולא לחימום, ורבים מתסיסים בהצלחה גם בצנצנת זכוכית שקופה. שקופית: 131 - התנאים להתססה (כלי)","slides":"","section":"A"},{"n":13,"text":"אילו מהמשפטים הבאים לגבי עיקור הכלי וסוג המים הנכונים להתססה תואמים את החומר?","options":{"A":"קיימת מחלוקת האם יש צורך לעקר את הכלי לפני ההתססה.","B":"יש הטוענים שהעיקור הוא בעיקר \"פסיכולוגי\", שכן גם המים וגם הירקות אינם סטריליים ממילא.","C":"בפועל, ניתן להתסיס בהצלחה גם ללא עיקור הכלי.","D":"מומלץ להימנע משימוש במי ברז, בין היתר בשל טענות לגבי השפעת הכלור והפלואור על החיידקים הפרוביוטיים.","E":"הכלור המצוי במי הברז הוא חומר חיטוי.","F":"ניתן להשתמש במי מינרלים, במים לאחר אוסמוזה הפוכה, במים ממזקק או במים שעברו סינון כלור.","G":"הירקות עצמם אינם סטריליים ונושאים עליהם גם חיידקים לא רצויים."},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל הקביעות תואמות את השקופית: קיימת מחלוקת לגבי עיקור, ניתן להתסיס גם בלעדיו, ומומלץ להימנע ממי ברז בשל הכלור (חומר חיטוי) והפלואור, ולהעדיף מים מינרלים/מסוננים/מזוקקים/לאחר אוסמוזה הפוכה. שקופית: 132 - עיקור וסוג המים","slides":"","section":"A"},{"n":14,"text":"מדוע רבים ממליצים להימנע משימוש במי ברז לצורך התססת ירקות?","options":{"A":"משום שמי ברז יקרים משמעותית ממים מינרלים.","B":"בשל טענות שהכלור והפלואור עלולים להפריע להתרבות החיידקים הפרוביוטיים.","C":"משום שמי ברז מכילים ריכוז מלח גבוה מדי באופן טבעי.","D":"משום שמי ברז מכילים סוכר בריכוז הפוגע בהתססה.","E":"משום שמי ברז חמים תמיד מכדי לשמש בתהליך.","F":"משום שמי ברז אינם מכילים מים כלל.","G":"משום שמי ברז מקדמים דווקא את התרבות חיידקי חומצה לקטית ביתר שאת."},"answer":["B"],"multi":false,"explanation":"הטענה המרכזית נגד מי ברז היא שהכלור (חומר חיטוי) והפלואור עלולים להפריע להתרבות החיידקים הפרוביוטיים הרצויים בתהליך ההתססה. שקופית: 132 - עיקור וסוג המים","slides":"","section":"A"},{"n":15,"text":"אילו מהקביעות הבאות לגבי מים לצורך התססה נכונות?","options":{"A":"מי ברז הם המים המומלצים ביותר להתססה בזכות ריכוז הכלור שבהם.","B":"עיקור הכלי הוא חובה מוחלטת שאין לגביה כל מחלוקת.","C":"מים לאחר אוסמוזה הפוכה אסורים לשימוש בהתססה.","D":"הירקות עצמם נחשבים סטריליים לחלוטין ואינם נושאים חיידקים.","E":"אין כל טענה הקושרת בין כלור לפגיעה בחיידקים פרוביוטיים.","F":"מי מזקק אינם מתאימים כלל לתהליך ההתססה.","G":"מים מינרלים אסורים לשימוש בתהליך ההתססה.","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"כל הקביעות שגויות: מי ברז דווקא לא מומלצים, יש מחלוקת לגבי עיקור, מים לאחר אוסמוזה הפוכה ומזקק ומינרלים כן מתאימים, הירקות אינם סטריליים, וקיימת טענה שהכלור פוגע בחיידקים. שקופית: 132 - עיקור וסוג המים","slides":"","section":"A"},{"n":16,"text":"אילו מהקביעות הבאות לגבי סוג המלח המומלץ להתססה נכונות?","options":{"A":"מומלץ להשתמש במלח שאינו מועשר ביוד, שכן היוד עלול לעכב את התרבות חיידקי חומצה לקטית.","B":"מומלץ להשתמש במלח ים ללא חומרים מגבשים, או במלח הימלאיה.","C":"יש להשתמש אך ורק במלח שולחני מיודד לצורך ההתססה.","D":"אסור באיסור מוחלט להשתמש במלח גס.","E":"מלח טחון דק כלל אינו מתאים לתהליך ההתססה.","F":"כמות המלח בתהליך אינה משפיעה כלל על תוצאות ההתססה.","G":"אין כל הבדל בין סוגי המלח מבחינת השפעתם על החיידקים."},"answer":["A","B"],"multi":true,"explanation":"מומלץ להשתמש במלח שאינו מועשר ביוד (מכיוון שהיוד עלול לעכב את התרבות החיידקים הפרוביוטיים), ומעדיפים מלח ים ללא חומרים מגבשים או מלח הימלאיה; ניתן להשתמש הן במלח גס והן במלח טחון דק. שקופית: 133 - סוג המלח ומשך ההתססה","slides":"","section":"A"},{"n":17,"text":"אילו מהקביעות הבאות לגבי משך ההתססה נכונות?","options":{"A":"ככל שהכרוב מושאר לזמן ארוך יותר, נוצרות בו אוכלוסיות חיידקים נוספות ומגוונות יותר.","B":"לאחר חודש של התססה, מגוון החיידקים גדל משמעותית.","C":"יש סוגי חיידקים המופיעים רק בשבוע האחרון של תהליך ההתססה הממושך.","D":"מגוון החיידקים במזון מותסס אינו משתנה כלל לאורך זמן ההתססה.","E":"יש להפסיק כל תהליך התססה תוך 24 שעות בלבד, אחרת המזון מתקלקל.","F":"ריכוז החיידקים יורד ככל שההתססה נמשכת זמן רב יותר.","G":"משך ההתססה אינו קשור כלל למגוון אוכלוסיות החיידקים הנוצרות."},"answer":["A","B","C"],"multi":true,"explanation":"על פי השקופית, ככל שההתססה ממושכת יותר נוצרות אוכלוסיות חיידקים נוספות ומגוונות, מגוון החיידקים גדל משמעותית לאחר חודש, ויש חיידקים המופיעים רק בשבוע האחרון. שקופית: 133 - סוג המלח ומשך ההתססה","slides":"","section":"A"},{"n":18,"text":"אילו מהקביעות הבאות לגבי מלח ומשך ההתססה נכונות?","options":{"A":"מלח מועשר ביוד הוא הבחירה המומלצת ביותר להתססת ירקות.","B":"ככל שההתססה קצרה יותר, כך גדל מגוון אוכלוסיות החיידקים.","C":"כל סוגי החיידקים במזון מותסס מופיעים כבר ביום הראשון של ההתססה ואינם משתנים לאחר מכן.","D":"מלח הימלאיה אסור לשימוש בתהליכי התססה.","E":"מלח גס אינו מתאים כלל לתהליך ההתססה ויש להשתמש אך ורק במלח דק.","F":"משך ההתססה קבוע ואחיד לחלוטין בכל תהליך, ללא קשר לתנאים.","G":"אין קשר בין ריכוז המלח לבין עיכוב חיידקים לא רצויים.","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"כל הקביעות שגויות: מומלץ דווקא מלח שאינו מועשר ביוד, מגוון החיידקים גדל ככל שההתססה ארוכה יותר (לא קצרה), מלח הימלאיה ומלח גס כן מתאימים, ומלח בריכוז גבוה כן מנטרל חיידקים לא רצויים. שקופית: 133 - סוג המלח ומשך ההתססה","slides":"","section":"A"},{"n":19,"text":"אילו מהמשפטים הבאים לגבי הגורמים המתנגדים למזון מותסס נכונים?","options":{"A":"חלק מהמתנגדים חוששים מהיעדר שליטה על סוגי החיידקים המתרבים בתהליך.","B":"על פי גישות מסוימות, מזון מותסס נתפס כמזון מקולקל.","C":"חלק מהחשש נובע מפחד מהתרבות של חיידקים רעים בתהליך.","D":"מחקרים מסוימים מצאו קשר בין צריכת מזון מותסס וכבוש לבין עלייה בסיכון לסרטן הקיבה והוושט.","E":"אחת הטענות המרכזיות של המתנגדים היא היעדר שליטה מלאה על תהליך ההתססה הביתי.","F":"הביקורת על מזון מותסס נובעת בין היתר מממצאי מחקרים תצפיתיים על אוכלוסיות מסוימות.","G":"קיימת התנגדות למזון מותסס גם מטעמים תפיסתיים ולא רק מדעיים."},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל הקביעות תואמות את השקופית: החשש מהיעדר שליטה על החיידקים, התפיסה כ\"מזון מקולקל\", והממצאים ממחקרים תצפיתיים המקשרים בין מזון מותסס/כבוש לסרטן קיבה ווושט. שקופית: 134 - מתנגדים למזון מותסס","slides":"","section":"A"},{"n":20,"text":"מהו הממצא המרכזי של המחקר (Kim et al., 2010) שבחן צריכת ירקות כבושים בקרב אוכלוסיות יפניות וקוריאניות?","options":{"A":"צריכה רבה של ירקות כבושים הגדילה את הסיכון לסרטן הקיבה.","B":"צריכת ירקות כבושים הפחיתה את הסיכון לסרטן הקיבה.","C":"לא נמצא כל קשר בין צריכת ירקות כבושים לבין סרטן הקיבה.","D":"המחקר בדק אך ורק תושבים אירופאים.","E":"המחקר בדק את הקשר בין מזון מותסס לבין מחלות לב וכלי דם.","F":"המחקר הוכיח שמזון מותסס ביתי ללא תוספים בטוח לחלוטין.","G":"המחקר לא כלל כלל התייחסות לירקות כבושים."},"answer":["A"],"multi":false,"explanation":"המטה-אנליזה של Kim ואחרים (2010) מצאה שצריכה רבה של ירקות כבושים מגדילה את הסיכון לסרטן הקיבה, בקרב אוכלוסיות יפניות וקוריאניות. שקופית: 134 - מתנגדים למזון מותסס / מחקרים","slides":"","section":"A"},{"n":21,"text":"אילו מהקביעות הבאות לגבי ההתנגדות למזון מותסס וממצאי המחקרים נכונות?","options":{"A":"כלל המחקרים העוסקים בנושא מצאו שמזון מותסס וכבוש מפחית משמעותית את הסיכון לסרטן הקיבה.","B":"אין כל התנגדות מדעית או תפיסתית לצריכת מזון מותסס.","C":"המחקרים שנסקרו בדקו אך ורק מזון מותסס ביתי ללא תוספים, בהשוואה מלאה לקבוצת ביקורת זהה.","D":"חוסר השליטה על סוגי החיידקים המתרבים בתהליך אינו מהווה כלל סיבה להתנגדות.","E":"אף גישה תזונתית אינה מתייחסת למזון מותסס כאל \"מזון מקולקל\".","F":"כל המחקרים הקיימים בנושא בוצעו על אוכלוסיות מערביות בלבד.","G":"אין כל ממצא מחקרי המקשר בין צריכת מזון כבוש לבין סיכון מוגבר לסרטן.","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"כל הקביעות שגויות ביחס לתוכן השקופית: המחקרים דווקא הצביעו על עלייה בסיכון לסרטן, קיימת התנגדות תפיסתית (\"מזון מקולקל\") ומדעית (חשש מחיידקים), והמחקרים כלל לא בדקו מזון ביתי נטול תוספים מול קבוצת ביקורת זהה - זו בדיוק אחת הביקורות עליהם. שקופית: 134 - מתנגדים למזון מותסס","slides":"","section":"A"},{"n":22,"text":"אילו משני הפרטים הבאים נכונים לגבי המחקר של Cheng ואחרים (1992) שפורסם ב-Lancet?","options":{"A":"המחקר נערך על אוכלוסייה סינית בהונג קונג ובחן גורמים לסרטן הוושט.","B":"המחקר מצא שאכילת מזון כבוש הייתה אחד הגורמים שהגדילו את הסיכון לסרטן הוושט.","C":"המחקר בחן את הקשר בין מזון מותסס לבין מחלות עצם.","D":"המחקר הוכיח שמזון כבוש מונע לחלוטין סרטן וושט.","E":"המחקר נערך אך ורק על אוכלוסייה סקנדינבית.","F":"המחקר פורסם בכתב עת לרפואת עור ולא לאונקולוגיה.","G":"המחקר לא כלל כל קבוצת ביקורת."},"answer":["A","B"],"multi":true,"explanation":"מחקר Cheng ואחרים (1992, Lancet) נערך בקרב אוכלוסייה סינית בהונג קונג, ומצא שאכילת מזון כבוש הייתה אחד הגורמים שהגדילו את הסיכון לסרטן הוושט. שקופית: 135 - המשך מחקרים - מזון מותסס","slides":"","section":"A"},{"n":23,"text":"אילו מהבעיות הבאות מיוחסות למחקרים שקישרו בין מזון מותסס/כבוש לבין סרטן?","options":{"A":"לרוב לא תועדה שיטת ההתססה שבה נעשה שימוש.","B":"לא ברור אם מדובר במזונות מותססים בפועל או במזונות שהושרו בתחמיץ כלשהו.","C":"במזונות כבושים תעשייתיים לעיתים מוסיפים חומרים הידועים כקרצינוגנים.","D":"כל המחקרים כללו קבוצת ביקורת שצרכה מזון מותסס ביתי זהה לחלוטין לקבוצת המחקר.","E":"שיטת ההתססה בכל המחקרים תועדה בקפדנות ואומתה מדעית.","F":"נערך מחקר מבוקר שהשווה אנשים הצורכים מזון מותסס ביתי קבוע לעומת קבוצת ביקורת בעלת תזונה זהה.","G":"ידוע במדויק שכל המזון הכבוש התעשייתי הנצרך במזרח מכיל חיידקים פרוביוטיים פעילים."},"answer":["A","B","C"],"multi":true,"explanation":"הבעיות המרכזיות במחקרים שקישרו מזון מותסס/כבוש לסרטן: אי-תיעוד שיטת ההתססה, חוסר בהירות אם מדובר במזון מותסס או מושרה בתחמיץ, והוספת חומרים קרצינוגניים במזונות כבושים תעשייתיים; מעולם לא נערך מחקר מבוקר על צרכני מזון מותסס ביתי מול קבוצת ביקורת זהה, וגם לא ברור אם המזון הכבוש התעשייתי במזרח מכיל כלל חיידקים פרוביוטיים. שקופית: 135 - המשך מחקרים - בעיות מתודולוגיות","slides":"","section":"A"},{"n":24,"text":"אילו מהקביעות הבאות לגבי המחקרים שקישרו מזון כבוש/מותסס לסרטן נכונות?","options":{"A":"בכל המחקרים תועדה במדויק שיטת ההתססה שבה נעשה שימוש.","B":"ברור לחלוטין שכל המזונות שנבדקו במחקרים היו מזון מותסס טהור ולא מזון מושרה בתחמיץ.","C":"במזונות הכבושים התעשייתיים במזרח, ידוע בוודאות שלא נוספו לעולם חומרים קרצינוגניים.","D":"נערך מחקר מבוקר שהשווה צרכני מזון מותסס ביתי קבוע לעומת קבוצת ביקורת בעלת תזונה זהה לחלוטין.","E":"כל האוכלוסייה במזרח צורכת אך ורק מזון מותסס ביתי, ולא מזון כבוש תעשייתי.","F":"אין כל ספק לגבי נוכחות חיידקים פרוביוטיים במזון הכבוש התעשייתי שנבדק.","G":"שיטות ההתססה שנבדקו במחקרים היו אחידות ומתועדות בקפדנות מדעית מלאה.","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"כל הקביעות הפוכות מהאמת: שיטת ההתססה לרוב לא תועדה, לא ברור אם מדובר במזון מותסס או מושרה, יש חשש לתוספים קרצינוגניים במזון כבוש תעשייתי, מעולם לא נערך מחקר מבוקר כמתואר, ורוב האנשים במזרח צורכים מזון כבוש תעשייתי (לא ביתי). שקופית: 135 - המשך מחקרים - בעיות מתודולוגיות","slides":"","section":"A"},{"n":25,"text":"אילו מהמשפטים הבאים לגבי מצבים רפואיים ואוכלוסיות בסיכון בהקשר של מזון מותסס נכונים?","options":{"A":"קנדידה והליקובקטר פילורי הן בעיות רפואיות שבהן מזון מותסס מהווה חלק מרכזי בטיפול התזונתי.","B":"נשים בהיריון אינן אסורות באכילת מזון מותסס, אך יש להיזהר ולוודא שהירקות לא התקלקלו.","C":"אנשים המצויים בדיכוי של מערכת החיסון בעקבות כימותרפיה חזקה נדרשים להיזהר עם מזון מותסס.","D":"אנשים הנוטלים תרופות המדכאות את מערכת החיסון נכללים באוכלוסיות שצריכות להיזהר עם מזון מותסס.","E":"הזהירות הנדרשת מנשים בהיריון קשורה לחשש מהתקלקלות אפשרית של הירקות המותססים.","F":"מזון מותסס אינו אסור לחלוטין על נשים בהיריון, אלא מותר בזהירות.","G":"אוכלוסיות עם מערכת חיסון מדוכאת נמצאות בסיכון מוגבר יחסית לאוכלוסייה הכללית בצריכת מזון מותסס."},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל הפרטים תואמים את השקופית: קנדידה והליקובקטר פילורי כמצבים בהם מזון מותסס מרכזי בטיפול; נשים בהיריון - מותר בזהירות מחשש להתקלקלות; ואנשים מדוכאי חיסון (כימותרפיה או תרופות מדכאות חיסון) - קבוצה שצריכה להיזהר. שקופית: 136 - מצבים רפואיים ואוכלוסיות בסיכון","slides":"","section":"A"},{"n":26,"text":"לאיזה מהמצבים הרפואיים הבאים מזון מותסס מהווה חלק מרכזי בטיפול התזונתי, על פי המצגת?","options":{"A":"קנדידה והליקובקטר פילורי.","B":"סוכרת סוג 1 בלבד.","C":"אי ספיקת כליות כרונית.","D":"יתר לחץ דם ראשוני.","E":"מחלת ריאות חסימתית כרונית (COPD).","F":"אוסטאופורוזיס בלבד.","G":"מיגרנה כרונית."},"answer":["A"],"multi":false,"explanation":"המצגת מציינת במפורש קנדידה והליקובקטר פילורי כמצבים רפואיים שבהם מזון מותסס מהווה חלק מרכזי בטיפול התזונתי. שקופית: 136 - מצבים רפואיים ואוכלוסיות בסיכון","slides":"","section":"A"},{"n":27,"text":"אילו מהקביעות הבאות לגבי אוכלוסיות שצריכות להיזהר עם מזון מותסס נכונות?","options":{"A":"נשים בהיריון - מזון מותסס מותר, אך יש להיזהר שהירקות לא התקלקלו.","B":"אנשים המצויים בדיכוי חיסוני עקב כימותרפיה חזקה נמנים על אוכלוסיית הסיכון.","C":"אנשים הנוטלים תרופות המדכאות את מערכת החיסון נמנים גם הם על אוכלוסיית הסיכון.","D":"ילדים בריאים מתחת לגיל שנתיים אסורים לחלוטין באכילת מזון מותסס לפי המצגת.","E":"אנשים הסובלים מיתר לחץ דם מודרך אסורים לחלוטין מאכילת מזון מותסס.","F":"נשים בהיריון אסורות לחלוטין ובאופן מוחלט באכילת מזון מותסס בכל מצב.","G":"ספורטאים תחרותיים נמנים במפורש על אוכלוסיית הסיכון במצגת."},"answer":["A","B","C"],"multi":true,"explanation":"אוכלוסיות הסיכון שצוינו הן נשים בהיריון (מותר בזהירות) ואנשים עם דיכוי חיסוני עקב כימותרפיה חזקה או תרופות מדכאות חיסון; שאר הקבוצות (ילדים, יתר לחץ דם, ספורטאים) אינן מוזכרות במצגת. שקופית: 136 - מצבים רפואיים ואוכלוסיות בסיכון","slides":"","section":"A"},{"n":28,"text":"אילו משני הממצאים הבאים עולים מהמטה-אנליזה (Kim et al., 2011) שהשוותה צריכת מוצרי סויה מותססים ולא-מותססים ביפן ובקוריאה?","options":{"A":"צריכה גבוהה של מוצרי סויה שאינם מותססים נמצאה קשורה לסיכון מוגבר לחלות בסרטן הקיבה.","B":"הגורם המרכזי שעליו הצביעו החוקרים כאחראי לסיכון אינו תהליך ההתססה עצמו אלא כמות המלח הגבוהה.","C":"מוצרי סויה מותססים כלל לא נבדקו במסגרת המטה-אנליזה.","D":"נמצא שצריכת מוצרי סויה, מותססים ולא-מותססים כאחד, מפחיתה תמיד את הסיכון לסרטן.","E":"המחקר נערך אך ורק על אוכלוסייה אמריקאית.","F":"המחקר בחן קשר בין סויה לבין מחלות לב בלבד, ולא סרטן.","G":"נמצא שההתססה עצמה, ולא המלח, היא הגורם המזיק העיקרי."},"answer":["A","B"],"multi":true,"explanation":"המטה-אנליזה מצאה שצריכה גבוהה של מוצרי סויה שאינם מותססים קשורה לסיכון מוגבר לסרטן הקיבה, כאשר החוקרים ציינו שהאשם אינו תהליך ההתססה אלא כמות המלח הגבוהה במוצרים אלו. שקופית: 137 - מחקרי סויה מותססת","slides":"","section":"A"},{"n":29,"text":"אילו מהקביעות הבאות לגבי מנגנון הקשר בין מלח, הליקובקטר פילורי וסרטן הקיבה נכונות, על פי המצגת?","options":{"A":"מלח בכמות רבה פוגע ברירית הקיבה.","B":"פגיעה ברירית הקיבה עקב מלח מקלה על התיישבות חיידק ההליקובקטר פילורי.","C":"חיידק ההליקובקטר פילורי מגדיל את הסיכון לסרטן הקיבה.","D":"מלח בכמות רבה משפר ומחזק את רירית הקיבה מפני חיידקים.","E":"הליקובקטר פילורי מפחית את הסיכון לסרטן הקיבה בנוכחות מלח.","F":"אין כל קשר בין כמות המלח הנצרכת לבין התיישבות הליקובקטר פילורי בקיבה.","G":"לפי המצגת, ההתססה עצמה היא הגורם העיקרי הפוגע ברירית הקיבה, ולא כמות המלח."},"answer":["A","B","C"],"multi":true,"explanation":"לפי המצגת, מלח בכמות רבה פוגע ברירית הקיבה, מה שמקל על התיישבות הליקובקטר פילורי, אשר בתורו מגדיל את הסיכון לסרטן הקיבה - כאשר האשם המרכזי הוא המלח ולא תהליך ההתססה עצמו. שקופית: 137 - מחקרי סויה מותססת","slides":"","section":"A"},{"n":30,"text":"אילו מהמשפטים הבאים לגבי מסקנות המצגת בנוגע למוצרי סויה נכונים?","options":{"A":"האשם המרכזי בסיכון המוגבר לסרטן הקיבה שנמצא במחקרי הסויה הוא כמות המלח הגבוהה, ולא תהליך ההתססה עצמו.","B":"מומלץ להימנע מרוטב סויה בשל תכולת המלח הגבוהה שבו.","C":"מלח בכמות רבה פוגע ברירית הקיבה ומקל על התיישבות הליקובקטר פילורי.","D":"חיידק ההליקובקטר פילורי מגדיל את הסיכון לסרטן הקיבה.","E":"המטה-אנליזה השוותה בין מחקרים על צריכת מוצרי סויה מותססים לבין מחקרים על צריכת מוצרי סויה שאינם מותססים באוכלוסיות יפן וקוריאה.","F":"צריכה גבוהה של מוצרי סויה שאינם מותססים נמצאה קשורה לסיכון מוגבר לחלות בסרטן הקיבה.","G":"המסקנה המרכזית היא שיש להבחין בין תהליך ההתססה עצמו (שאינו הגורם המזיק) לבין כמות המלח הגבוהה (שכן מהווה גורם סיכון)."},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל הפרטים תואמים את מסקנות המצגת: המחקר על סויה מצא סיכון מוגבר לסרטן הקיבה בצריכת מוצרים שאינם מותססים, כאשר הגורם המזיק הוא כמות המלח (המקלה על התיישבות הליקובקטר פילורי) ולא ההתססה עצמה, ומכאן ההמלצה להימנע מרוטב סויה עתיר מלח. שקופית: 137 - מחקרי סויה מותססת","slides":"","section":"A"},{"n":1,"text":"מטופלת בת 52 נמצאת כעת בעיצומו של טיפול כימותרפי אגרסיבי לסרטן השד, ומדוכאת חיסונית. היא שואלת את הדיאטנית האם ניתן להמשיך לאכול כרוב כבוש ביתי כפי שנהגה לפני תחילת הטיפול. מה ההמלצה הנכונה ביותר?","options":{"A":"להמשיך לאכול כרגיל, מזון מותסס בטוח לחלוטין לכל אדם ללא יוצא מן הכלל.","B":"להיזהר ולשקול הימנעות ממזון מותסס בתקופה זו, בשל דיכוי מערכת החיסון עקב הטיפול הכימותרפי.","C":"להגביר משמעותית את צריכת המזון המותסס דווקא בתקופת הכימותרפיה כדי לחזק את מערכת החיסון.","D":"אין כל צורך בהתייחסות מיוחדת, שכן הכימותרפיה אינה קשורה כלל לנושא.","E":"להחליף את הכרוב הכבוש ברוטב סויה בכמות גדולה כתחליף בטוח.","F":"לאכול רק מזון מותסס תעשייתי, שנחשב בטוח יותר ממזון ביתי בתקופה זו.","G":"לצרוך את הכרוב הכבוש רק בלילה, שכן הזמן ביום אינו רלוונטי לבטיחות."},"answer":["B"],"multi":false,"explanation":"המצגת מציינת במפורש שאנשים עם דיכוי של מערכת החיסון במהלך ואחרי טיפולי כימותרפיה חזקים נמנים על אוכלוסיית הסיכון שצריכה להיזהר עם מזון מותסס. שקופית: 136 - מצבים רפואיים ואוכלוסיות בסיכון","slides":"","section":"B"},{"n":2,"text":"אישה בהיריון שבוע 28, בריאה וללא סיבוכים, שואלת האם מותר לה לאכול ירקות מותססים ביתיים שהכינה בעצמה. מה התשובה הנכונה ביותר בהתאם לחומר?","options":{"A":"אסור לחלוטין, נשים בהיריון צריכות להימנע לגמרי ממזון מותסס.","B":"מותר, אך יש להקפיד ולוודא שהירקות לא התקלקלו.","C":"מותר רק אם הירקות עברו הקפאה עמוקה לפני ההתססה.","D":"מותר רק בשליש הראשון להיריון ואסור לחלוטין לאחר מכן.","E":"מותר ללא כל הגבלה או תשומת לב מיוחדת.","F":"אסור, אלא אם כן מדובר במוצר תעשייתי בלבד.","G":"השאלה אינה רלוונטית שכן היריון אינו מוזכר בהקשר זה."},"answer":["B"],"multi":false,"explanation":"על פי המצגת, מזון מותסס מותר לנשים בהיריון, אך יש להיזהר רק אם קיים חשש שהירקות התקלקלו. שקופית: 136 - מצבים רפואיים ואוכלוסיות בסיכון","slides":"","section":"B"},{"n":3,"text":"מטופל אובחן לאחרונה עם עודף שגשוג של קנדידה במעי. הדיאטנית שוקלת לשלב מזון מותסס כחלק מתוכנית הטיפול התזונתי. האם גישה זו מבוססת על החומר הנלמד?","options":{"A":"כן, קנדידה מוזכרת במפורש כמצב שבו מזון מותסס מהווה חלק מרכזי בטיפול התזונתי.","B":"לא ניתן לדעת, הנושא שנוי במחלוקת מוחלטת בחומר","C":"לא, כיוון שמזון מותסס תמיד מחמיר זיהומי פטריות","D":"כן, אך רק אם מדובר ביין מותסס בלבד; לא, מזון מותסס אסור לחלוטין במצבי קנדידה","E":"כן, אך רק בשילוב עם רוטב סויה בכמות גדולה; לא רלוונטי, קנדידה לא הוזכרה כלל בחומר הנלמד"},"answer":["A"],"multi":false,"explanation":"המצגת מציינת קנדידה (יחד עם הליקובקטר פילורי) כמצב רפואי שבו מזון מותסס מהווה חלק מרכזי בטיפול התזונתי. שקופית: 136 - מצבים רפואיים ואוכלוסיות בסיכון","slides":"","section":"B"},{"n":4,"text":"מטופל המאובחן עם זיהום פעיל של הליקובקטר פילורי מדווח שהוא צורך מדי יום כמויות גדולות של רוטב סויה. בהתבסס על המנגנון שהוצג במצגת, מהי ההמלצה התזונתית המתאימה ביותר?","options":{"A":"להפחית משמעותית את צריכת רוטב הסויה, בשל תכולת המלח הגבוהה שעלולה להקל על התיישבות החיידק ולפגוע ברירית הקיבה.","B":"אין כל צורך בשינוי, רוטב סויה אינו קשור כלל להליקובקטר פילורי","C":"להגביר את צריכת רוטב הסויה כדי לחזק את המערכת החיסונית נגד החיידק","D":"להגביר את צריכת המלח באופן כללי כדי \"להרעיב\" את החיידק; רוטב הסויה דווקא מסייע בחיסול הליקובקטר פילורי לפי המצגת","E":"להחליף את רוטב הסויה בכרוב כבוש עתיר מלח באותה כמות בדיוק; להפסיק לחלוטין את כל סוגי המזון המותסס, כולל יוגורט וקפיר"},"answer":["A"],"multi":false,"explanation":"לפי המצגת, מלח בכמות רבה (כפי שמצוי ברוטב סויה) פוגע ברירית הקיבה ומקל על התיישבות הליקובקטר פילורי, אשר מגדיל את הסיכון לסרטן הקיבה - ולכן מומלץ להימנע מרוטב סויה. שקופית: 137 - מחקרי סויה מותססת","slides":"","section":"B"},{"n":5,"text":"מטופל מעוניין להתחיל להתסיס כרוב בבית, ושואל מדוע יש להקפיד שהירקות יישארו שקועים לחלוטין מתחת למים לאורך כל התהליך. מהי ההסבר הנכון ביותר?","options":{"A":"כדי למנוע חשיפה לחמצן ולחיידקים רעים מהאוויר, ולשמור על סביבה אנאירובית התומכת בחיידקי חומצה לקטית.","B":"כדי למנוע התאדות של המלח מהתמיסה; כדי לשמור על צבעו הירוק של הכרוב בלבד","C":"כדי למנוע מהכרוב לספוג מים נוספים מהסביבה; כדי לזרז את התחממות הכרוב ולקצר את זמן ההתססה","D":"אין כל סיבה מדעית לכך, מדובר במנהג מיושן בלבד; כדי להעניק לירקות טעם מתוק יותר בלבד, ללא כל השפעה על החיידקים"},"answer":["A"],"multi":false,"explanation":"הישארות הירקות מתחת למים חיונית כדי למנוע כניסת חמצן וחיידקים רעים מהאוויר, ולשמר את הסביבה האנאירובית הדרושה להתרבות חיידקי חומצה לקטית - זו הסיבה שרבים משתמשים במשקולות. שקופית: 131 - התנאים להתססה (כלי)","slides":"","section":"B"},{"n":6,"text":"מטופל מתלונן שהוא נאלץ לפתוח את צנצנת ההתססה שלו כמעט מדי יום כדי לשחרר גזים, ומעוניין בפתרון נוח יותר. מה ההמלצה המתאימה ביותר על סמך החומר?","options":{"A":"להשתמש בכלי ייעודי להתססה בעל מגרעת מלאה במים, המאפשרת שחרור גזים ללא צורך בפתיחה יומית.","B":"לאטום את הצנצנת הרמטית לחלוטין ללא כל אפשרות מעבר גזים","C":"אין כל פתרון אפשרי, יש להמשיך לפתוח את הצנצנת מדי יום ללא יוצא מן הכלל","D":"להעביר את הכרוב למקפיא לאורך כל תהליך ההתססה; להוסיף קרח לצנצנת מדי יום כדי לעצור את יצירת הגזים","E":"להפסיק להשתמש במלח לחלוטין, כך שלא ייווצרו גזים כלל; להשתמש בצנצנת שקופה בלבד, שכן שקיפות מונעת יצירת גזים"},"answer":["A"],"multi":false,"explanation":"כלי ייעודי להתססה כולל מגרעת שממלאים במים, המאפשרת יציאת גזים ומונעת כניסת חמצן, כך שאין צורך לפתוח את הכלי מדי יום לשחרור גזים. שקופית: 131 - התנאים להתססה (כלי ייעודי)","slides":"","section":"B"},{"n":7,"text":"מטופלת מעוניינת להתחיל להתסיס ירקות בבית ושואלת האם ניתן להשתמש במלח שולחני רגיל המועשר ביוד שנמצא במטבח שלה. מה התשובה הנכונה?","options":{"A":"לא מומלץ, מכיוון שהיוד עלול לעכב את התרבות חיידקי חומצה לקטית הרצויים בתהליך.","B":"כן, מלח מועשר ביוד דווקא משפר את קצב ההתססה פי שניים","C":"כן, אין כל הבדל בין מלח מועשר ביוד למלח שאינו מועשר לצורך התססה","D":"כן, אך רק אם משתמשים בכמות כפולה ממה שנדרש; לא רלוונטי, המצגת אינה מתייחסת כלל לסוג המלח","E":"לא, אך זאת אך ורק בשל טעמו המר של המלח המועשר ביוד; כן, בתנאי שהמלח יעבור המסה במים רותחים לפני השימוש"},"answer":["A"],"multi":false,"explanation":"מומחים המצוטטים בחומר טוענים שיש להשתמש במלח שאינו מועשר ביוד, שכן היוד עלול לעכב את התרבות חיידקי חומצה לקטית הפרוביוטיים. שקופית: 133 - סוג המלח ומשך ההתססה","slides":"","section":"B"},{"n":8,"text":"מטופל קרא כתבה שמזכירה שמחקרים קישרו בין צריכת מזון כבוש לבין עלייה בסיכון לסרטן הקיבה, והוא מודאג לגבי הכרוב הכבוש הביתי שהוא מכין ללא כל תוספים. איזו תשובה מבוססת ביותר ניתן לתת לו על סמך הביקורת על אותם מחקרים?","options":{"A":"יש להסביר שהמחקרים סבלו מבעיות מתודולוגיות משמעותיות - כגון אי-בהירות לגבי סוג המזון שנבדק (מותסס לעומת מושרה בתחמיץ) ותוספים קרצינוגניים במזון תעשייתי - ולכן אינם בהכרח משקפים סיכון ממזון מותסס ביתי טהור.","B":"יש לומר לו באופן חד-משמעי שהמחקרים הוכיחו סופית שגם מזון מותסס ביתי מסוכן באותה מידה בדיוק כמו מזון כבוש תעשייתי","C":"יש להמליץ לו לעבור לצריכת מזון כבוש תעשייתי בלבד, שנחשב בטוח יותר לפי המחקרים; יש לומר לו שאין כל בעיה מתודולוגית באותם מחקרים ושהם משקפים במדויק את הסיכון האמיתי","D":"אין כל תשובה אפשרית, הנושא אינו ניתן להסבר; יש להמליץ לו להפסיק לאלתר את כל צריכת הירקות מכל סוג; יש לומר לו שהמחקרים בדקו ישירות מזון מותסס ביתי נטול תוספים מול קבוצת ביקורת זהה, ומצאו סיכון זהה"},"answer":["A"],"multi":false,"explanation":"הביקורת על המחקרים כוללת אי-בהירות לגבי שיטת ההתססה וסוג המזון שנבדק, וכן תוספים קרצינוגניים המצויים במזון כבוש תעשייתי - ומעולם לא נערך מחקר שהשווה ישירות צרכני מזון מותסס ביתי טהור לקבוצת ביקורת זהה, ולכן אי אפשר להסיק ישירות סיכון למזון הביתי. שקופית: 135 - המשך מחקרים - בעיות מתודולוגיות","slides":"","section":"B"},{"n":9,"text":"מטופל מעוניין למקסם את מגוון החיידקים הפרוביוטיים בכרוב הכבוש שהוא מכין, ושואל כמה זמן כדאי להשאיר אותו בתהליך התססה. מה ההמלצה המבוססת ביותר?","options":{"A":"להשאיר את הכרוב להתסיס לאורך זמן ממושך יותר (כגון חודש), שכן מגוון החיידקים גדל משמעותית ככל שההתססה נמשכת, וחיידקים מסוימים מופיעים רק בשבוע האחרון.","B":"משך ההתססה אינו משפיע כלל על מגוון החיידקים הנוצרים; אין דרך לדעת כמה זמן מומלץ להתסיס, המידע אינו זמין כלל","C":"מגוון החיידקים דווקא פוחת ככל שההתססה נמשכת זמן רב יותר; יש להשאיר את הכרוב להתסיס לכל היותר שעתיים כדי למנוע קלקול","D":"יש להפסיק את ההתססה מיד כאשר מופיעים בועות גז, ללא קשר לזמן שחלף; להשאיר את הכרוב בתהליך התססה של יום אחד בלבד, שכן מגוון החיידקים גבוה ביותר בתחילת התהליך"},"answer":["A"],"multi":false,"explanation":"על פי המצגת, ככל שמשך ההתססה ארוך יותר (למשל לאחר חודש) מגוון החיידקים גדל משמעותית, ויש חיידקים המופיעים רק בשבוע האחרון של תהליך ממושך. שקופית: 133 - סוג המלח ומשך ההתססה","slides":"","section":"B"},{"n":10,"text":"מטופלת מכינה תמיסת מלח (ברינה) להתססת ירקות באמצעות מי ברז רגילים מהברז הביתי. מה ההמלצה הנכונה ביותר על סמך החומר הנלמד?","options":{"A":"עדיף להימנע ממי ברז ולהעדיף מים מינרלים, מים מסוננים מכלור, מים לאחר אוסמוזה הפוכה או מי מזקק, בשל טענות להשפעה שלילית של הכלור והפלואור על החיידקים הפרוביוטיים.","B":"יש להשתמש אך ורק במי ים טבעיים לצורך הכנת התמיסה; אין כל הבדל בין מי ברז לכל סוג מים אחר לצורך התססה","C":"מי ברז אסורים לחלוטין לכל שימוש ביתי, לא רק להתססה; הכלור במי הברז נדרש דווקא כדי לחטא את הירקות לפני ההתססה","D":"מי ברז הם הבחירה המומלצת ביותר, שכן הכלור שבהם מסייע להתססה; יש להרתיח את מי הברז במשך שעה שלמה כדי להתאימם להתססה, ובכך הם הופכים למים המומלצים ביותר"},"answer":["A"],"multi":false,"explanation":"המצגת ממליצה להימנע ממי ברז לטובת מים מינרלים, מסוננים, לאחר אוסמוזה הפוכה או מזוקקים, בשל טענות שהכלור (חומר חיטוי) והפלואור עלולים לפגוע בחיידקים הפרוביוטיים הרצויים. שקופית: 132 - עיקור וסוג המים","slides":"","section":"B"},{"n":9000,"text":"ביין נוצרת חומצה לקטית כתוצר הלוואי העיקרי — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["B"],"multi":false,"explanation":"המשפט שגוי על פי החומר. בתהליך פירוק הסוכר על ידי חיידקים נוצרים תוצרי לוואי - חומצות או אלכוהול (בשמרים). בייצור חומץ נוצרת חומצה אצטית, ואילו ביין נוצר אלכוהול; חיידקי חומצה לקטית מייצרים חומצה לקטית וזקוקים לסביבה אנאירובית. שקופית: 128 - מטבוליזם של חיידקים","slides":"","section":"A","tf":1},{"n":9001,"text":"יין נחשב למוצר תסיסה המתבצע באמצעות שמרים ולא חיידקים — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["A"],"multi":false,"explanation":"המשפט נכון על פי החומר. כל הפרטים תואמים את הרשימה בשקופית: תועלות ההתססה (פרוביוטיקה, נוגדי חמצון, אנטי-דלקתי) ודוגמאות המזון המותסס (קפיר, יין, מוצרי סויה מותססים, לחם מחמצת). שקופית: 130 - התועלת לאדם בהתססה","slides":"","section":"A","tf":1},{"n":9002,"text":"אחת הטענות המרכזיות של המתנגדים היא היעדר שליטה מלאה על תהליך ההתססה הביתי — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["A"],"multi":false,"explanation":"המשפט נכון על פי החומר. כל הקביעות תואמות את השקופית: החשש מהיעדר שליטה על החיידקים, התפיסה כ\"מזון מקולקל\", והממצאים ממחקרים תצפיתיים המקשרים בין מזון מותסס/כבוש לסרטן קיבה ווושט. שקופית: 134 - מתנגדים למזון מותסס","slides":"","section":"A","tf":1},{"n":9003,"text":"נערך מחקר מבוקר שהשווה אנשים הצורכים מזון מותסס ביתי קבוע לעומת קבוצת ביקורת בעלת תזונה זהה — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["B"],"multi":false,"explanation":"המשפט שגוי על פי החומר. הבעיות המרכזיות במחקרים שקישרו מזון מותסס/כבוש לסרטן: אי-תיעוד שיטת ההתססה, חוסר בהירות אם מדובר במזון מותסס או מושרה בתחמיץ, והוספת חומרים קרצינוגניים במזונות כבושים תעשייתיים; מעולם לא נערך מחקר מבוקר על צרכני מזון מותסס ביתי מול קבוצת ביקורת זהה, וגם לא ברור אם המזון הכבוש התעשייתי במזרח מכיל כלל חיידקים פרוביוטיים. שקופית: 135 - המשך מחקרים - בעיות מתודולוגיות","slides":"","section":"A","tf":1},{"n":9004,"text":"משך ההתססה אינו קשור כלל למגוון אוכלוסיות החיידקים הנוצרות — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["B"],"multi":false,"explanation":"המשפט שגוי על פי החומר. על פי השקופית, ככל שההתססה ממושכת יותר נוצרות אוכלוסיות חיידקים נוספות ומגוונות, מגוון החיידקים גדל משמעותית לאחר חודש, ויש חיידקים המופיעים רק בשבוע האחרון. שקופית: 133 - סוג המלח ומשך ההתססה","slides":"","section":"A","tf":1},{"n":9005,"text":"הרכיבים העיקריים הנדרשים לתהליך הם מים, סוכר ומלח — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["A"],"multi":false,"explanation":"המשפט נכון על פי החומר. כל הפרטים נכונים על פי תיאור תהליך ההתססה: הפיכת גלוקוז לחומצה לקטית, עצירה עם גמר הסוכר, האטה בקור, ייצור CO2, ותפקוד ההתססה כשיטת שימור מזון בזכות התנאים הבלתי-נסבלים לרוב החיידקים. שקופית: 129 - התססה","slides":"","section":"A","tf":1}]},{"id":"29","title":"ביצים","questions":[{"n":1,"text":"מבחינת יחס הרכיבים התזונתיים בביצה שלמה (חלבון/שומן/פחמימה), מה נכון?","options":{"A":"רוב הקלוריות בביצה מגיעות מפחמימות (עמילן)","B":"רוב הקלוריות בביצה מגיעות מחלבון","C":"רוב הקלוריות בביצה מגיעות משומן","D":"הביצה מכילה בעיקר עמילן, וכמעט ואין בה חלבון או שומן","E":"החלוקה בין חלבון לשומן שווה בדיוק, ואין בה כלל פחמימות","F":"רוב הקלוריות בביצה מגיעות מסיבים תזונתיים","G":"אי אפשר לדעת מאיזה רכיב מגיעות רוב הקלוריות בביצה"},"answer":["C"],"multi":false,"explanation":"המצגת פותחת בעובדה המפתיעה שרוב הקלוריות בביצה מגיעות דווקא משומן, למרות התפיסה הרווחת ש\"ביצה שווה חלבון\". תכולת העמילן בביצה כמעט אפסית.","slides":"2 - הרכב הביצה","section":"A"},{"n":2,"text":"לגבי הרכב חלבון הביצה (ה\"לבן\"), אילו מהקביעות הבאות נכונות?","options":{"A":"הלבן מורכב בעיקרו ממים, ורוב החלבון שבו הוא אלבומין","B":"הלבן מכיל אחוז שומן גבוה משמעותית מהחלמון","C":"עיקר תכולת הכולין בביצה נמצאת דווקא בלבן","D":"הלבן עשיר בוויטמינים ובמינרלים יותר מהחלמון","E":"בלבן קיימים סוגים רבים של חלבונים שונים, וביניהם אבידין","F":"הלבן מכיל את מרבית הכולסטרול שבביצה","G":"עיקר נוגדי החמצון בביצה, כגון לוטאין, נמצאים בלבן"},"answer":["A","E"],"multi":true,"explanation":"חלבון הביצה הוא בעיקרו מים וחלבון, שרובו אלבומין, וכולל בין חלבוניו הרבים גם אבידין. אין בו שומן או כולסטרול, ותכולת הוויטמינים והמינרלים בו נמוכה - כל אלה מרוכזים דווקא בחלמון.","slides":"2 - חלבון הביצה","section":"A"},{"n":3,"text":"אילו מהקביעות הבאות לגבי ההשוואה בין חלמון הביצה לחלבון הביצה נכונות?","options":{"A":"יש בחלמון יותר מים מאשר בחלבון","B":"השומן בביצה מפוזר באופן שווה בין החלבון לחלמון","C":"הלוטאין והזקסנטין מרוכזים בעיקר בחלבון (ב\"לבן\") ולא בחלמון","D":"הכולסטרול בביצה נמצא בעיקרו בחלבון","E":"הכולין נמצא בעיקרו בחלבון ולא בחלמון","F":"תכולת הסידן והזרחן בחלבון גבוהה יותר מאשר בחלמון","G":"ריכוז נוגדי החמצון בביצה גבוה יותר בחלבון מאשר בחלמון","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"כמעט כל העושר התזונתי של הביצה - שומן, כולסטרול, כולין, ויטמינים, מינרלים ונוגדי חמצון כמו לוטאין וזקסנטין - מרוכז בחלמון, לא בחלבון, שהוא בעיקרו מים וחלבון (אלבומין) עם הרבה יותר מים מהחלמון.","slides":"3 - השוואה בין הלבן לחלמון","section":"A"},{"n":4,"text":"אילו מבין שבעת המרכיבים הבאים מוזכרים במצגת כמרכיבים \"מיוחדים\" בביצה (מעבר לוויטמינים ומינרלים \"רגילים\")? בחר/י 3 נכונות?","options":{"A":"ביוטין","B":"כולין","C":"Co-Q10 בריכוז גבוה","D":"סיבים תזונתיים בריכוז גבוה","E":"ויטמין C בריכוז גבוה","F":"לקטוז","G":"ברזל בריכוז יוצא דופן מהרגיל"},"answer":["A","B","C"],"multi":true,"explanation":"בין המרכיבים המיוחדים המוזכרים בביצה (מעבר לחלבון מלא, B12, ויטמין D, לוטאין/זקסנטין, DHA ויוד) נמנים ביוטין, כולין ו-Co-Q10 בריכוז גבוה. הביצה אינה מכילה סיבים תזונתיים או לקטוז, ואינה בולטת בוויטמין C.","slides":"5 - המרכיבים המיוחדים בביצה","section":"A"},{"n":5,"text":"אילו מהקביעות הבאות לגבי תפקידי הכולין בגוף נכונות?","options":{"A":"הכולין הוא מרכיב מרכזי בממברנות התאים","B":"הכולין הוא חומר הגלם לייצור אצטילכולין - נוירוטרנסמיטור מרכזי במוח","C":"הכולין תורם קבוצת מתיל (באמצעות המטבוליט שלו)","D":"הכולין הוא מרכיב מהותי בהתפתחות מערכת העצבים של העובר","E":"הכולין מעורב בבקרה על כמות הפוספוליפידים בכבד ובדם","F":"לכולין תפקיד בהפיכת הומוציסטאין למטיונין","G":"נשים בגיל הפוריות זקוקות לכמות כולין נמוכה יותר מאשר גברים או נשים מבוגרות"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל הקביעות מופיעות במצגת כתפקידים או עובדות לגבי כולין: מרכיב ממברנלי, חומר גלם לאצטילכולין, תורם מתיל, חיוני להתפתחות עצבית עוברית, מווסת פוספוליפידים, ומעורב בהמרת הומוציסטאין למטיונין; כמו כן הצורך בכולין משתנה לפי שלב חיים ומין.","slides":"31 - תפקידי הכולין","section":"A"},{"n":6,"text":"מהי חומצת האמינו הנדירה ביותר בביצה, על פי המצגת?","options":{"A":"ליזין","B":"טריפטופאן","C":"לאוצין","D":"מתיונין","E":"היסטידין","F":"ארגינין","G":"גליצין"},"answer":["B"],"multi":false,"explanation":"המצגת מציינת במפורש שטריפטופאן היא חומצת האמינו הנדירה ביותר בביצה.","slides":"5 - כמות החלבון בביצה","section":"A"},{"n":7,"text":"אילו מהקביעות הבאות על הלוטאין נכונות?","options":{"A":"הלוטאין מיוצר רק על ידי צמחים, במיוחד עלים ירוקים","B":"הלוטאין הוא זה שנותן לחלמון הביצה את הצבע הצהוב","C":"הלוטאין מסיס במים ואינו נצבר ברקמת שומן","D":"ריכוז הלוטאין בחלמון אינו קשור כלל לצבעו","E":"הלוטאין מיוצר בגוף האדם מחומצות אמינו","F":"ככל שהחלמון בהיר יותר (צהוב חיוור), כך ריכוז הלוטאין בו גבוה יותר","G":"הלוטאין מצטבר בעיקר בכבד ולא ברשתית"},"answer":["A","B"],"multi":true,"explanation":"לוטאין מיוצר אך ורק בעולם הצומח (בעיקר עלים ירוקים) והוא זה שנותן לחלמון את צבעו הצהוב - ככל שהחלמון כתום יותר, ריכוז הלוטאין בו גבוה יותר. הלוטאין מסיס בשומן (לא במים) ומצטבר ברשתית העין, לא בכבד, ואינו מיוצר בגוף האדם.","slides":"6 - לוטאין ולמה החלמון צהוב","section":"A"},{"n":8,"text":"אילו מהקביעות הבאות לגבי לוטאין כתוסף תזונה נכונות?","options":{"A":"מחקרים על תוסף לוטאין הראו תועלת עקבית וברורה לכלל האוכלוסייה, ללא יוצא מן הכלל","B":"תוסף לוטאין במינון גבוה אינו גורם לתופעות לוואי כלשהן בעור","C":"הצורה הכימית של הלוטאין בצומח (אסטר לוטאין) זהה במאה אחוז לזו שבביצה, ואין כל מחלוקת מדעית בנושא","D":"לוטאין כתוסף הוכח כמונע לחלוטין קטרקט אצל כלל האנשים שנטלו אותו","E":"ביצה אינה נחשבת למקור טוב ללוטאין בהשוואה למזונות מן החי האחרים","F":"לוטאין מיוצר גם על ידי הגוף האנושי בכמות משמעותית, בנוסף למה שמגיע מהמזון","G":"E161b הוא סימון המציין חוסר בלוטאין במוצר מזון","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"בפועל, העדויות לתוסף לוטאין סותרות ומועילות בעיקר למי שתזונתו דלה בלוטאין; מינון גבוה כתוסף עלול לגרום לצבע עור ברונזה; צורת האסטר הצמחית שנויה במחלוקת מבחינת ספיגה; ביצה היא דווקא המקור העשיר ביותר ללוטאין מבין המזון מן החי; לוטאין אינו מיוצר בגוף האדם; ו-E161b הוא קוד המסמן נוכחות לוטאין, לא חוסר בו.","slides":"7 - לוטאין (המשך)","section":"A"},{"n":9,"text":"אילו 3 מהקביעות הבאות על מקורות לוטאין/זקסנטין וזמינותם הביולוגית נכונות?","options":{"A":"כלורופיל בעלים הירוקים מעכב את ספיגת הלוטאין והזקסנטין","B":"רוב המקורות הצמחיים מכילים הן לוטאין והן זקסנטין באותה מידה","C":"פרחי כובע (מריגולד) הם מהמקורות העשירים ביותר בטבע ללוטאין וזקסנטין","D":"הזמינות הביולוגית של לוטאין מביצה טובה יותר מאשר מהצומח","E":"כמות הלוטאין והזקסנטין בביצה גבוהה יותר מאשר בכל מקור צמחי אחר","F":"עלים ירוקים תמיד ייראו צהובים או כתומים בשל תכולת הלוטאין הגבוהה שבהם","G":"ריכוז הלוטאין בעלים ירוקים נמוך משמעותית מריכוזו בביצה"},"answer":["A","C","D"],"multi":true,"explanation":"כלורופיל מעכב ספיגת קרוטנואידים, פרחי כובע הם המקור העשיר ביותר בטבע ללוטאין וזקסנטין, והזמינות הביולוגית של לוטאין מביצה טובה משמעותית מזו שבצומח - אף שכמות הלוטאין המוחלטת בעלים ירוקים גבוהה בהרבה מזו שבביצה, וצבעם הירוק נובע מכיסוי הכלורופיל.","slides":"8-11 - מקורות ללוטאין וזקסנטין","section":"A"},{"n":10,"text":"אילו מהקביעות הבאות על ביוטין ואבידין בביצה נכונות?","options":{"A":"ביוטין (B7) חיוני לבריאות העור, השיער והציפורניים ולייצור אנרגיה","B":"הביצה היא מקור עשיר במיוחד לביוטין, הנמצא הן בחלבון והן בחלמון","C":"בחלבון הביצה קיים חלבון בשם אבידין הנקשר לביוטין ומונע את ספיגתו","D":"הקשר בין אבידין לביוטין חזק באופן מיוחד ודורש תנאים קיצוניים (כגון חום) כדי להתפרק","E":"בישול/חימום הביצה מפרק את מבנה האבידין ומחליש את הקשר לביוטין","F":"בטיגון (חביתה/מקושקשת) ייתכן שחלק מהביוטין עדיין אינו זמין לספיגה, כי לא כל אזורי הביצה מגיעים לטמפרטורה מספקת למשך זמן מספיק","G":"בישול הביצה במים רותחים למשך זמן מספיק מנטרל לחלוטין את הקשר בין אבידין לביוטין"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל הקביעות מתארות נכונה את הביוטין העשיר שבביצה, את חלבון האבידין ה\"אנטי-נוטריינט\" שחוסם את ספיגתו, ואת האופן שבו בישול יסודי (במיוחד הרתחה) מפרק את האבידין ומשחרר את הביוטין - בניגוד לטיגון שאינו תמיד מגיע לכל אזורי הביצה.","slides":"13-15 - ביוטין והאתגר עם האבידין","section":"A"},{"n":11,"text":"על פי המצגת, איזו שיטת בישול נמצאה כמנטרלת באופן המלא ביותר את הקשר בין אבידין לביוטין?","options":{"A":"בישול הביצה במים רותחים למשך מספר דקות לאחר הגעה לרתיחה","B":"ביצה מקושקשת (scrambled) בלבד","C":"השריית הביצה במים קרים ללא חימום","D":"הקפאת הביצה ואז הפשרתה; טיגון קצר בחביתה על אש גבוהה","E":"חימום הביצה במיקרוגל ללא מים; אכילת הביצה נא (ללא כל חימום)"},"answer":["A"],"multi":false,"explanation":"בעוד שטיגון (חביתה/מקושקשת) עלול להשאיר חלק מהביוטין לא זמין כי לא כל אזורי הביצה מגיעים לטמפרטורה מספקת לזמן מספיק, בישול הביצה במים רותחים למשך מספר דקות לאחר הרתיחה נמצא כמנטרל לחלוטין את הקשר אבידין-ביוטין.","slides":"15 - פתרון הבעיה","section":"A"},{"n":12,"text":"אילו מהקביעות הבאות מסבירות מדוע אנשים שונים מגיבים באופן שונה לכולסטרול התזונתי מהביצה?","options":{"A":"יש הבדל משמעותי בין אנשים בספיגת הכולסטרול במעי ובתעלות ההפרשה החוזרת לחלל המעי, הקשור לגנטיקה","B":"יש הבדל בין אנשים ביכולת הכבד \"לפצות\" ולהפחית את ייצור הכולסטרול העצמי כאשר הספיגה מהמזון עולה","C":"כל בני האדם סופגים כולסטרול מהמעי באותו אחוז בדיוק, ללא כל שוני","D":"הכבד מייצר תמיד את אותה כמות כולסטרול קבועה, ללא קשר לצריכה מהמזון","E":"ההבדלים בין אנשים נובעים אך ורק מגיל, ואינם קשורים לגנטיקה כלל","F":"כל בני האדם מגיבים לכולסטרול תזונתי באותה מידה בדיוק (\"היפר-רספונדרים\" הם מיתוס)","G":"כל האנשים חווים עלייה זהה בכולסטרול בעקבות אכילת ביצים"},"answer":["A","B"],"multi":true,"explanation":"השוני בין אנשים בתגובה לכולסטרול תזונתי נובע מהבדלים גנטיים בספיגת הכולסטרול במעי ובתעלות ההפרשה החוזרת, וכן מהבדלים ביכולת הכבד לפצות ולהפחית ייצור כולסטרול עצמי כאשר הספיגה מהמזון עולה.","slides":"15-16 - ביצים וכולסטרול","section":"A"},{"n":13,"text":"אילו מהקביעות הבאות לגבי \"מגיבי יתר\" (hyper responders) לכולסטרול תזונתי ותת-סוגי LDL נכונות?","options":{"A":"חלקיקי LDL קטנים וצפופים נחשבים לפחות מסוכנים מחלקיקי LDL גדולים","B":"אצל מגיבי יתר, העלייה בכולסטרול לאחר אכילת ביצים הייתה רק בחלקיקי ה-LDL הקטנים והצפופים המסוכנים","C":"עלייה בחלקיקי LDL גדולים נחשבת מדאיגה יותר מבחינה קלינית מאשר עלייה בחלקיקים קטנים וצפופים","D":"אכילת ביצים בכמות רבה מאוד מוכחת כבטוחה לחלוטין לכל האנשים, ללא כל סייג","E":"הגנטיקה מסבירה את מלוא השונות בתגובת בני האדם לכולסטרול מהמזון, ואין גורמים נוספים","F":"רמת הסוכר בדם אינה קשורה כלל לשאלת הבטיחות של אכילת ביצים בכמות גדולה","G":"אצל מגיבי יתר, היחס בין הכולסטרול הכללי ל-HDL תמיד יורד ומשתפר","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"חלקיקי LDL קטנים וצפופים הם דווקא המסוכנים, ואצל מגיבי יתר העלייה הייתה בעיקר בחלקיקים הגדולים הפחות מסוכנים; זהו רק פרמטר אחד ואין ודאות מלאה לבטיחות בכמות גדולה מאוד; הגנטיקה מסבירה רק חלק מהשונות; ורמת הסוכר בדם כן קשורה לבטיחות אכילת ביצים בכמות גדולה.","slides":"16 - ביצים וכולסטרול (המשך)","section":"A"},{"n":14,"text":"אילו 3 מהקביעות הבאות לגבי ביצים, מחלות לב ושבץ מוחי נכונות על פי המצגת?","options":{"A":"מרבית המחקרים (כולל מחקר האחיות) מצאו שביצה אחת ליום לא הגדילה את הסיכון למחלות לב","B":"מחקר גדול מצא שביצה אחת ליום לא הגדילה את הסיכון לשבץ מוחי","C":"הממצא שביצה אחת ליום אינה מגדילה סיכון למחלות לב/שבץ תקף לכלל האוכלוסייה, למעט חולי סכרת שבהם הממצא היה שונה","D":"כל המחקרים שהוצגו בנושא ביצים ומחלות לב היו מחקרים התערבותיים אקראיים (RCT) מבוקרים","E":"אין כל פרדוקס בנושא ביצים וכולסטרול - הנושא פשוט וחד משמעי לחלוטין","F":"אכילת ביצים מוכחת כמפחיתה תמיד ובוודאות את הסיכון למחלות לב אצל כל אדם","G":"תוצאות המחקרים על ביצים ומחלות לב זהות לחלוטין בכל האוכלוסיות, כולל חולי סכרת"},"answer":["A","B","C"],"multi":true,"explanation":"מרבית המחקרים, כולל מחקר האחיות, מצאו שביצה אחת ליום אינה מגדילה סיכון למחלות לב או לשבץ - אך בחולי סכרת הממצא היה שונה, וזה בדיוק \"הפרדוקס\" שהמצגת דנה בו, בעודה מדגישה שמדובר בעיקר במחקרי תצפית ולא ב-RCT.","slides":"17 - פרדוקס הביצים והכולסטרול","section":"A"},{"n":15,"text":"אילו מהקביעות הבאות בנושא ביצים וסכרת המובאות בסיכום המצגת נכונות?","options":{"A":"יש מחקרים שהראו שאכילת ארבע ביצים ומעלה בשבוע מעלה סיכון לסכרת סוג 2 באופן משמעותי","B":"יש מחקרים שלא מצאו כל קשר בין אכילת ביצים לסיכון לסכרת","C":"יש מחקרים שמצאו קשר הפוך - כלומר הקטנת סיכון לסכרת","D":"יש מחקרים שהראו שאין השפעה לרעה על מדדים מטבוליים וגורמי סיכון למחלות לב בעקבות אכילת ביצים","E":"לפי הידוע כיום, תזונה קטוגנית או תזונת פליאו (העשירות בביצים) אינן מעלות סיכון לסכרת","F":"יש להיזהר מסטטיסטיקות או סרטונים המציגים רק צד אחד של הנושא","G":"המסקנה הכוללת של המצגת היא שהמחקרים בנושא ביצים וסכרת אינם עקביים וסותרים זה את זה"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"שקופית הסיכום מציגה בפירוש את כל הממצאים הסותרים הללו זה לצד זה - עלייה בסיכון בחלק מהמחקרים, היעדר קשר באחרים, קשר הפוך (הקטנת סיכון) בנוספים, והיעדר פגיעה במדדים מטבוליים - תוך אזהרה מפני מידע חד-צדדי.","slides":"21 - סיכום ביצים וסכרת","section":"A"},{"n":16,"text":"במחקר ה-DIABEGG (Fuller et al.) שבדק דיאטה עתירת ביצים לעומת דיאטה דלת ביצים בחולי סכרת, כיצד חולקו הקבוצות?","options":{"A":"קבוצה אחת הונחתה לאכול שתי ביצים בשבוע, וקבוצה שנייה הונחתה לאכול שתים עשרה ביצים בשבוע","B":"קבוצה אחת אכלה ביצים אורגניות וקבוצה שנייה אכלה ביצי לול רגילות","C":"קבוצה אחת אכלה ביצים מבושלות בלבד, וקבוצה שנייה אכלה רק ביצים מטוגנות","D":"שתי הקבוצות אכלו את אותה כמות ביצים, אך בשעות שונות ביום; המחקר לא כלל חלוקה לקבוצות כלל, אלא מעקב אחר קבוצה אחת בלבד","E":"קבוצה אחת לא אכלה ביצים כלל, וקבוצה שנייה אכלה ביצה אחת ביום; קבוצה אחת אכלה שבע ביצים ביום, וקבוצה שנייה אכלה ביצה אחת בחודש"},"answer":["A"],"multi":false,"explanation":"במחקר ה-DIABEGG בן שלושת החודשים, קבוצה אחת של חולי סכרת סוג 2 הונחתה לאכול שתי ביצים בשבוע והשנייה שתים עשרה ביצים בשבוע, תוך השוואת מדדי כולסטרול ומטבוליזם בין הקבוצות.","slides":"19 - תוצאות מחקר ה-DIABEGG","section":"A"},{"n":17,"text":"אילו מהקביעות הבאות משקפות נכונה את תוצאות מחקר ה-DIABEGG (3 חודשים)?","options":{"A":"לא נמצא הבדל משמעותי במדדי LDL, HDL ואיזון הסוכר בין שתי הקבוצות","B":"משתתפי קבוצת שתים עשרה הביצים בשבוע דיווחו על שובע רב יותר ורעב מופחת","C":"משתתפי קבוצת שתים עשרה הביצים בשבוע פיתחו רמות כולסטרול גבוהות באופן מסוכן תוך שלושה חודשים","D":"החוקרים מסקנתם הייתה שיש לאסור על חולי סכרת לאכול ביצים","E":"לא נמצא כל שינוי בתחושת השובע בין הקבוצות","F":"המחקר כלל קבוצת ביקורת שאכלה אפס ביצים בשבוע","G":"משתתפי קבוצת שתים עשרה הביצים אכלו אותן כארוחת ערב בלבד"},"answer":["A","B"],"multi":true,"explanation":"המחקר לא מצא הבדל משמעותי במדדי LDL, HDL ואיזון הסוכר בין הקבוצות, בעוד שקבוצת שתים עשרה הביצים בשבוע (שאכלה אותן כארוחת בוקר) דיווחה על שובע רב יותר ורעב מופחת - ולכן החוקרים הסיקו שאין בעיה באכילת ביצים גם לחולי סכרת.","slides":"19 - תוצאות מחקר ה-DIABEGG","section":"A"},{"n":18,"text":"אילו מהקביעות הבאות לגבי הביקורת על מחקר ה-DIABEGG נכונות?","options":{"A":"המחקר בדק באופן ישיר את הסיכון בפועל למחלת לב, ולא רק מדדי כולסטרול","B":"משך המחקר המקורי היה מספר שנים ארוך, ולכן אין לו כל מגבלה מבחינת אורך המעקב","C":"במחקר הייתה קבוצת ביקורת שאכלה אפס ביצים בשבוע, כך שניתן להסיק ממנו מסקנות מוחלטות","D":"אין שום אפשרות שגם שתי ביצים בשבוע כבר \"מספיקות\" להגיע לרמת מקסימום ההשפעה, כך שהשוואה לאפס ביצים הייתה מראה תוצאה זהה","E":"מחקר ההמשך (שנה) מצא הבדלים דרמטיים וברורים בין הקבוצות בכל המדדים שנבדקו","F":"מקריאת מחקר ההמשך, היה ברור לחלוטין וללא כל ספק שהמשתתפים המשיכו לאכול בדיוק את אותה כמות ביצים כמו בשלושת חודשי המחקר המקורי","G":"הביקורת על המחקר כלל אינה רלוונטית, כיוון שהמחקר היה חף מכל מגבלה מתודולוגית","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"הביקורת האמיתית: המחקר בדק מדדי כולסטרול ולא אירועי לב בפועל; ארך שלושה חודשים בלבד; לא כלל קבוצת ביקורת של אפס ביצים (כך ששתי ביצים בשבוע כבר עשויות להיות \"תקרה\"); ומחקר ההמשך בן השנה לא מצא הבדלים בשומני הדם, בדלקת או בהמוגלובין המסוכרר, ולא היה ברור אם המשתתפים המשיכו באותה כמות ביצים.","slides":"20 - ביקורת על המחקר","section":"A"},{"n":19,"text":"אילו 3 מהקביעות הבאות על ביצים, מצב רוח וירידה במשקל נכונות?","options":{"A":"פסיכיאטר מאוניברסיטת קולומביה המליץ, בין היתר, על ארוחת בוקר הכוללת חביתה משתי ביצים כחלק מתזונה התומכת במצב הרוח","B":"מחקרים מצאו שאכילת ביצים בבוקר הובילה לאכילה מופחתת במשך שאר היום","C":"במחקר שהשווה ארוחות בוקר שוות קלוריות, ארוחת הביצים הביאה לפחות תחושת רעב לעומת ארוחה פחמימתית","D":"אכילת ביצים בבוקר תמיד מובילה לעלייה בצריכת קלוריות בארוחת הצהריים","E":"נמצאה עלייה ברמת הגרלין (הורמון הרעב) לאחר ארוחת ביצים, לעומת ארוחה פחמימתית","F":"לא נמצא כל קשר בין אכילת ביצים בבוקר לתחושת שובע במהלך היום","G":"ביצים אינן מוזכרות במצגת בהקשר למצב רוח כלל"},"answer":["A","B","C"],"multi":true,"explanation":"המצגת מצטטת פסיכיאטר מקולומביה הממליץ על ארוחת בוקר עם חביתה משתי ביצים למען מצב הרוח, ומחקרים שהראו שארוחת ביצים (בהשוואה לארוחה פחמימתית שוות-קלוריות) הפחיתה רעב, הפחיתה צריכת קלוריות בצהריים, והורידה את הגרלין - בניגוד לקביעות השגויות.","slides":"22 - ביצים ומצב רוח / ירידה במשקל","section":"A"},{"n":20,"text":"אילו מהקביעות הבאות מסבירות מדוע לא ניתן להסיק מסקנות חד-משמעיות מהמחקרים שבדקו קשר בין ביצים לסרטן (ערמונית, מעי גס, שחלות)?","options":{"A":"מדובר במחקרי תצפית (observational) ולא במחקרים התערבותיים (RCT)","B":"קשה לבודד משתנים בקרב בני אדם, כמו בכל מחקר תזונתי","C":"לחלק מהמחקרים יש בעיות מתודולוגיות נוספות","D":"לא נעשו מחקרים על אנשים שאוכלים תזונה בריאה הכוללת ביצים באמת","E":"המחקרים לא הפרידו בין אכילת חביתות מטוגנות בשמן לבין אכילת ביצים קשות","F":"המחקרים לא הפרידו בין אנשים שאוכלים סלט ביצים עם מיונז לבין אלו שאוכלים ביצים קשות בלבד","G":"לא נעשו מחקרים על אנשים שאכלו ביצי חופש אורגניות באופן ספציפי"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל המגבלות הללו מפורטות בשקופית הסיכום המסבירה מדוע אי אפשר להסיק מסקנות חד-משמעיות ממחקרי התצפית על ביצים וסרטן.","slides":"26 - מדוע אי אפשר להסיק מסקנות מהמחקרים","section":"A"},{"n":21,"text":"מרבית המחקרים שבדקו קשר בין אכילת ביצים לבין סרטן הערמונית, המעי הגס והשחלות היו מסוג:","options":{"A":"מחקרים התערבותיים אקראיים מבוקרים (RCT)","B":"מחקרי שאלונים בדיעבד/תצפיתיים (לא RCT)","C":"ניסויים במעבדה על תאים בלבד, ללא בני אדם","D":"מחקרים גנטיים על תאומים זהים בלבד","E":"מחקרי מטא-אנליזה של RCT בלבד","F":"ניסויים קליניים בשלב 3 בפיקוח ה-FDA","G":"מחקרים המבוססים על דגימות דם בלבד ללא שאלונים"},"answer":["B"],"multi":false,"explanation":"המצגת מציינת שמדובר ברובם במחקרי שאלונים בדיעבד/תצפיתיים ולא ב-RCT - וזו אחת הסיבות המרכזיות לזהירות הנדרשת בפרשנות הממצאים על ביצים וסרטן.","slides":"23 - ביצים וסרטן","section":"A"},{"n":22,"text":"אילו מהקביעות הבאות נכונות לגבי מטא-אנליזות שבדקו ביצים וסרטן?","options":{"A":"מטא-אנליזה מצאה שאין קשר בין אכילת ביצים לסרטן השחלות","B":"ה-American Institute for Cancer Research מצא ראיות מוצקות וברורות לקשר בין ביצים לסרטן השחלות","C":"מחקר על חולים בסיכון לסרטן המעי הגס לא מצא קשר בין אכילת ביצים להתפתחות פוליפים או למורפולוגיה שלהם","D":"כל המטא-אנליזות ללא יוצא מן הכלל מצאו קשר חזק וברור בין ביצים לסרטן המעי הגס","E":"אין כל מטא-אנליזה שמצאה קשר חיובי כלשהו, ולו חלש, בין ביצים לסרטן המעי הגס","F":"כל המחקרים על ביצים וסרטן הערמונית שהוצגו היו מחקרים התערבותיים אקראיים","G":"כל המטא-אנליזות שנבדקו מצאו קשר סיבתי מוכח בין ביצים לסרטן הערמונית"},"answer":["A","C"],"multi":true,"explanation":"מטא-אנליזה מצאה שאין קשר בין אכילת ביצים לסרטן השחלות, ומחקר על חולים בסיכון לסרטן המעי הגס לא מצא קשר בין אכילת ביצים להתפתחות פוליפים או למורפולוגיה שלהם; שאר הקביעות מציגות תמונה גורפת מדי ואינן משקפות את הממצאים המעורבים שהוצגו.","slides":"24-25 - ביצים וסרטן המעי הגס/השחלות","section":"A"},{"n":23,"text":"אילו מהקביעות הבאות לגבי תעשיית הביצים (לולי סוללה מול לולי חופש) נכונות?","options":{"A":"לולי סוללה מותרים ללא כל הגבלה בכל מדינות אירופה, ללא יוצא מן הכלל","B":"התקן לביצי חופש אינו כולל כל דרישה לפתח יציאה לחצר","C":"הצפיפות (מספר תרנגולות למטר רבוע) בלולי חופש גבוהה יותר מאשר בלולי סוללה","D":"ביצים אורגניות אינן דורשות שהזרעים בתערובת המזון יהיו אורגניים","E":"זרזי גדילה (בעיקר סוגי אנטיביוטיקה) עדיין מותרים לשימוש חופשי במשקים אורגניים","F":"אין כל הבדל בין הגדרת \"ביצי חופש\" ל\"ביצים אורגניות\" - הן מונחים זהים לחלוטין","G":"זרזי גדילה מותרים כיום לשימוש גם במשקים הרגילים (הלא-אורגניים)","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"בפועל, לולי סוללה נאסרו בחלק ממדינות אירופה; התקן לביצי חופש דורש פתח יציאה לחצר; ביצים אורגניות מחייבות זרעים אורגניים בתערובת המזון; זרזי גדילה אסורים לשימוש כיום גם במשקים הרגילים; ו\"ביצי חופש\" ו\"ביצים אורגניות\" הם תקנים שונים ולא זהים.","slides":"27-29 - תעשיית הביצים","section":"A"},{"n":24,"text":"אילו 3 מהקביעות הבאות על הבדלים תזונתיים בין ביצי חופש/ביצים אורגניות לביצים מלולים מסחריים נכונות?","options":{"A":"מחקר (Kühn J) הראה שגידול חופשי (עם גישה החוצה) הוא דרך טבעית להעשרת הביצים בוויטמין D","B":"במחקר שהשווה ביצי חופש לביצי לול מסחריים, תזונת התרנגולות הייתה שונה מאוד בין הקבוצות ולכן לא ניתן היה להשוות ביניהן","C":"מחקר (Anderson KE) מצא הבדל בין הקבוצות בהרכב חומצות השומן, בכולסטרול ובתכולת ויטמין A ו-E","D":"בביצי חופש נמצאה תכולה גבוהה יותר של חומצות שומן מסוג אומגה-3 ושל ויטמין E (אלפא-טוקופרול), לעומת ביצי חוות מסחריות","E":"לא נמצא כל הבדל בין ביצי חופש לביצי לול בשום פרמטר תזונתי שנבדק","F":"תכולת המתכות הכבדות (עופרת וכספית) זהה תמיד וללא כל שוני בין כל החוות, ללא תלות במיקום גיאוגרפי","G":"מחקר מאיטליה מצא הבדל דרמטי וברור בריכוז מתכות כבדות בין ביצי חופש לביצי כלובים"},"answer":["A","C","D"],"multi":true,"explanation":"מחקר שבדק ביצי חופש בתנאי תזונה וחשיפה לאור זהים לאלו של ביצי לול מסחריים מצא פוטנציאל גבוה יותר לוויטמין D, וכן הבדל בהרכב חומצות השומן, בכולסטרול ובתכולת ויטמין A ו-E, עם יותר אומגה-3 ואלפא-טוקופרול בביצי החופש; לעומת זאת רמת המתכות הכבדות משתנה מאוד בין חוות ואזורים, ומחקר מאיטליה דווקא לא מצא הבדל בין הסוגים.","slides":"28-30 - ביצי חופש ואורגניות","section":"A"},{"n":25,"text":"כל המזונות הבאים מוזכרים במצגת כמקורות לכולין","options":{"A":"בשר בקר, עוף ודגים","B":"ביצים","C":"ירקות מצליבים כגון כרוב, כרובית וכרוב ניצנים","D":"נבט חיטה","E":"טופו ופולי סויה (כולל לציטין סויה)","F":"קינואה, שעועית ואורז מלא","G":"שקדים ובוטנים"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"המצגת מפרטת את כל אלה כמקורות לכולין: מזון מן החי (בקר, עוף, דגים, ביצים), ירקות מצליבים, נבט חיטה, מוצרי סויה, קינואה/שעועית/אורז מלא, ואגוזים כגון שקדים ובוטנים.","slides":"32 - מקורות לכולין","section":"A"},{"n":26,"text":"על פי המצגת, איזו קבוצת אוכלוסייה זקוקה לכמות כולין נמוכה יותר מקבוצות האחרות?","options":{"A":"גברים","B":"נשים לאחר גיל המעבר (מנופאוזה)","C":"נשים בגיל הפוריות","D":"ילדים מתחת לגיל 5","E":"קשישים משני המינים","F":"ספורטאים תחרותיים","G":"תינוקות יונקים"},"answer":["C"],"multi":false,"explanation":"הצורך בכולין משתנה לאורך החיים; נשים בגיל הפוריות זקוקות לכמות כולין נמוכה יותר מאשר גברים או נשים לאחר גיל המעבר, על פי המצגת.","slides":"31 - כולין","section":"A"},{"n":27,"text":"אילו מהקביעות הבאות על השפעות חוסר כולין נכונות?","options":{"A":"חוסר כולין עלול לגרום לעלייה באנזימי כבד ולתרום לכבד שומני","B":"חוסר כולין בזמן היריון עלול לגרום לרעלת היריון, לידה מוקדמת, משקל לידה נמוך ומומים במערכת העצבים","C":"חוסר כולין נמצא קשור לדיכאון קליני חמור, אך לא לתסמיני חרדה","D":"עודף כולין (ולא חוסר בו) הוא שגורם לכבד שומני","E":"חוסר כולין משפר תמיד את הזיכרון, כפי שנמצא במחקרים בעכברים","F":"כולין נמצא כבעל השפעה פרו-דלקתית (מעלה מרקרים דלקתיים) ולא אנטי-דלקתית","G":"חוסר כולין אינו קשור לשום השפעה בריאותית ידועה"},"answer":["A","B"],"multi":true,"explanation":"חוסר כולין מעלה אנזימי כבד ותורם לכבד שומני, ובהיריון קשור לרעלת היריון, לידה מוקדמת, משקל לידה נמוך ומומים במערכת העצבים. רמות כולין נמוכות קשורות דווקא לחרדה (לא לדיכאון), וכולין עצמו אנטי-דלקתי ומשפר (לא פוגע ב-) זיכרון בעכברים.","slides":"32 - השפעות בריאותיות של כולין","section":"A"},{"n":28,"text":"אילו מהקביעות הבאות לגבי מנגנון היווצרות TMAO (טרימתילאמין-N-אוקסיד) מכולין נכונות?","options":{"A":"כולין מהמזון הופך ישירות ל-TMAO בקיבה, ללא מעורבות של חיידקי מעי כלשהם","B":"חיידקי מעי הופכים כולין ישירות ל-TMAO, ללא צורך בשום שלב אנזימטי נוסף בכבד","C":"לכל בני האדם יש בדיוק את אותם סוגי חיידקי מעי, ולכן רמת ה-TMAO זהה בכולם","D":"אנשים הצורכים תזונה כמעט טבעונית מפתחים תמיד רמות TMAO גבוהות יותר מאוכלי בשר, בגלל חיידקי המעי שלהם","E":"הוכח מדעית וקלינית, ללא כל ספק, שהכולין מהביצה הוא שמעלה סיכון למחלות לב","F":"על פי אחד המחקרים שהוצגו, תוספי כולין העלו TMAO פחות מאשר אכילת ביצים שלמות","G":"אין כל שונות בין בני אדם בתגובת ה-TMAO לאותה כמות כולין שנאכלת","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"המנגנון האמיתי: חיידקי מעי הופכים כולין ל-TMA, ואז אנזים ספציפי בכבד הופך אותו ל-TMAO - תהליך משתנה מאוד בין אנשים בהתאם לפלורת המעיים. בתזונה כמעט טבעונית חסרים חיידקי ה-TMA, כך שה-TMAO אינו עולה גם באכילת מזון מן החי מדי פעם; הקשר הסיבתי בין כולין מביצה למחלת לב לא הוכח; ומחקר אחד דווקא מצא שתוספי כולין (ולא ביצים) העלו TMAO.","slides":"34-38 - TMAO ומיקרוביום","section":"A"},{"n":29,"text":"אילו 3 מהקביעות הבאות על TMAO ואכילת ביצים נכונות?","options":{"A":"אנשים הנוהגים בתזונה כמעט טבעונית אינם מגדלים את חיידקי המעי ההופכים כולין ל-TMA, ולכן ה-TMAO שלהם אינו עולה גם כשאוכלים מדי פעם מזון מן החי","B":"מחקר שבדק אכילת שתי כוסות כרוב ניצנים ביום למשך שלושה שבועות לא הגדיל TMAO בדם, ואף הביא לירידה משמעותית בו","C":"מחקרים גדולים הראו שאכילת ביצה אחת ליום לא מעלה בפועל את הסיכון למחלות לב","D":"TMAO הנוצר מבשר אדום זהה תמיד בעוצמתו להשפעת אכילת ביצים, ללא כל הבדל","E":"אין כל שונות בין בני אדם ברמת ה-TMAO, ללא קשר להרכב פלורת המעיים","F":"כל המחקרים שהוצגו הראו קשר סיבתי מוכח וברור בין TMAO, ביצים ומחלות לב","G":"תוסף כולין וקרניטין תמיד בטוח יותר מאכילת ביצה שלמה מבחינת TMAO"},"answer":["A","B","C"],"multi":true,"explanation":"מכיוון שתזונה כמעט טבעונית אינה מטפחת את חיידקי ה-TMA, ה-TMAO אינו עולה משמעותית גם באכילת ביצה מזדמנת; אכילת כרוב ניצנים בפועל הורידה TMAO בדם; ומחקרים גדולים הראו שביצה אחת ליום אינה מעלה בפועל סיכון למחלות לב - בעוד שהקשר הסיבתי הכולל עדיין שנוי במחלוקת והשונות בין אנשים גדולה.","slides":"34-38 - TMAO, כרוב ניצנים ומיקרוביום","section":"A"},{"n":30,"text":"אילו מהקביעות הבאות מסכמות את המלצות המצגת לאכילת ביצים?","options":{"A":"אין הכרח לאכול ביצים, אך יש בהן חומרים חשובים רבים בזמינות ביולוגית מעולה","B":"לאדם בריא, נראה שיש תועלת באכילת ביצים נקיות מרעלים","C":"לגבי קשר לסרטן - אין ראיות מוצקות לקשר בין ביצים לסרטן","D":"לגבי סכרת - נראה שאין בעיה באכילת ביצים, במיוחד אם האדם אוכל בריא ומאזן רמות סוכר","E":"יש עדיפות לביצה קשה (מבושלת), אם כי אפשר גם ביצה מקושקשת עם הרבה עלים ירוקים","F":"מבין הלבן והחלמון - הכולסטרול והרעלים מרוכזים בחלמון, אך גם רוב הערך התזונתי הטוב נמצא דווקא שם","G":"לגבי ביצי חופש/אורגניות - עדיפות לחוות רחוקות מאזורי תעשייה ותנועה סואנת, אף שאין ערבות מוחלטת ואין נתונים ספציפיים לישראל"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"אלה בדיוק המלצות הסיכום של המצגת: ביצים אינן חובה אך בעלות ערך תזונתי בזמינות גבוהה; ככל הנראה מועילות לאדם בריא ולחולי סכרת המאזנים סוכר; אין ראיות מוצקות לקשר לסרטן; עדיפות לביצה קשה; והחלמון מרכז גם את הסיכונים וגם את רוב היתרונות; ועדיפות לביצי חופש/אורגניות מחוות איכותיות, ללא ערבות מוחלטת.","slides":"39-40 - סיכום ההמלצות","section":"A"},{"n":1,"text":"גבר בן 58 עם סוכרת סוג 2 מאוזנת היטב (HbA1c כ-6.5%), ללא מחלת לב ידועה, שואל אם עליו להימנע לחלוטין מביצים בגלל הסוכרת שלו, לאור מה ששמע פעם שביצים \"אסורות\" לחולי סכרת","options":{"A":"ניתן לשקול צריכת ביצים כחלק מתזונה מאוזנת, בדגש על שמירה על רמות סוכר תקינות והימנעות ממזון מעובד","B":"יש להעדיף אכילת ביצים אך ורק בשילוב עם בייקון ונקניקים כדי לשפר את הטעם","C":"יש להימנע לחלוטין מכל צריכת ביצים, בשל סיכון מוכח ועקבי בכל המחקרים לחולי סכרת","D":"יש להימנע מביצים רק בימים שבהם נאכל גם בשר אדום; אין כל צורך במעקב אחר רמות סוכר כאשר אוכלים ביצים","E":"יש להעדיף אכילת ביצים נא בלבד, ללא בישול, לחולי סכרת; יש לאכול לפחות שתים עשרה ביצים בשבוע כדי להשיג את מלוא היתרון הבריאותי"},"answer":["A"],"multi":false,"explanation":"המסקנה הכוללת של המצגת היא שביצים אינן נראות בעייתיות לחולי סכרת, בייחוד כאשר האדם אוכל בריא ומאזן רמות סוכר - לא הימנעות גורפת, לא מכסה קבועה, ובוודאי לא בשילוב עם מזון מעובד שהוא בעצמו גורם מבלבל (confounder) ידוע במחקרים.","slides":"21, 39 - ביצים וסכרת / סיכום המלצות","section":"B"},{"n":2,"text":"ספורטאי כושר בן 24 שנוהג לשתות שישה חלבוני ביצה נאים מדי יום כתוסף חלבון, במשך מספר חודשים. הוא מגיע עם תלונות על נשירת שיער, עור יבש וסדוק, ועייפות","options":{"A":"אכילת חלבון ביצה נא לאורך זמן עלולה לגרום לחוסר ביוטין בשל אבידין החוסם את ספיגתו; יש להמליץ על בישול הביצים","B":"התסמינים נובעים מרעלים בחלמון הביצה; יש להמליץ על החלפת חלבוני הביצה בתוסף ברזל בלבד","C":"התסמינים אינם קשורים כלל לתזונה, ואין צורך בשינוי כלשהו; יש להמליץ להוסיף עוד חלבוני ביצה נאים כדי לפצות על התסמינים","D":"התסמינים נובעים מעודף כולסטרול בחלמון, ולכן יש להפסיק לאכול חלמונים; הוא סובל מעודף ברזל בשל אכילת חלבוני ביצה, ויש להפסיק כל צריכת ביצים"},"answer":["A"],"multi":false,"explanation":"חלבון ביצה נא מכיל אבידין, הנקשר לביוטין וחוסם את ספיגתו; צריכה כרונית של כמות גדולה של חלבון ביצה נא עלולה לגרום לחוסר ביוטין המתבטא בנשירת שיער, בעיות עור ועייפות. בישול הביצים (ובמיוחד הרתחתן) מפרק את האבידין ופותר את הבעיה.","slides":"14-15 - האתגר עם הביוטין ופתרון הבעיה","section":"B"},{"n":3,"text":"אישה בת 72 שאובחנה לאחרונה עם שלב מוקדם של ניוון מקולרי הקשור לגיל (AMD), ומעוניינת לשפר את התזונה שלה כדי להעשיר את הצריכה של לוטאין וזקסנטין. היא שואלת אם עדיף שתאכל תרד או ביצים","options":{"A":"אף כי ריכוז הלוטאין בעלים ירוקים כמו תרד גבוה בהרבה מזה שבביצה, הזמינות הביולוגית של הלוטאין מביצה נמצאה טובה יותר, בין היתר כי הכלורופיל בעלים מעכב ספיגה","B":"תרד מכיל הרבה יותר לוטאין מביצה, ולכן הזמינות הביולוגית שלו לגוף תמיד גבוהה יותר מזו של ביצה","C":"עדיף לצרוך תוסף לוטאין בלבד ולהימנע ממזון עשיר בלוטאין; אין כל הבדל בזמינות הביולוגית בין לוטאין מביצה ללוטאין מתרד","D":"יש להימנע לחלוטין מביצים במקרה של AMD מכיוון שהן מזיקות לרשתית; לוטאין אינו רלוונטי כלל לבריאות העיניים; זקסנטין, בניגוד ללוטאין, אינו נמצא כלל בביצה"},"answer":["A"],"multi":false,"explanation":"אף שעלים ירוקים כמו תרד עשירים בלוטאין בהרבה יותר מביצה מבחינת כמות, הכלורופיל שבהם מעכב ספיגת קרוטנואידים, ואילו לוטאין מהביצה - \"ארוז\" יחד עם שומן החלמון - נמצא בעל זמינות ביולוגית טובה יותר, מה שהופך את הביצה למקור יעיל למרות כמותו הנמוכה יחסית.","slides":"8-11 - מקורות ללוטאין וזקסנטין וזמינות ביולוגית","section":"B"},{"n":4,"text":"אישה בהיריון בשבוע 20, טבעונית, המדווחת שאינה אוכלת מוצרים מן החי כלל ומודאגת לגבי צריכת כולין מספקת","options":{"A":"כולין חיוני במיוחד בהיריון להתפתחות מערכת העצבים של העובר, וחוסר בו נקשר לרעלת היריון, לידה מוקדמת ומשקל לידה נמוך; קיימים גם מקורות צמחיים לכולין כגון טופו, קינואה, שעועית ואגוזים","B":"כולין נחוץ רק לגברים, ואין לו כל תפקיד בהיריון; יש לה להימנע מכל מקור כולין צמחי ולעבור לאכילת בשר בלבד","C":"חוסר כולין קשור אך ורק לבעיות שריר, ואינו רלוונטי להיריון; יש להמליץ לה על צריכת ביצים נאות בלבד ככל שניתן, ללא בישול","D":"חוסר כולין בהיריון אינו קשור לשום סיכון עוברי, ולכן אין צורך לדאוג; אין שום מקור צמחי לכולין, ולכן טבעונות בהיריון בלתי אפשרית מבחינת כולין"},"answer":["A"],"multi":false,"explanation":"כולין חיוני להתפתחות מערכת העצבים של העובר, וחוסר בו בהיריון נקשר לרעלת היריון, לידה מוקדמת, משקל לידה נמוך ומומים במערכת העצבים. אף שביצה מקור עשיר לכולין, המצגת מונה גם מקורות צמחיים (טופו, סויה, קינואה, שעועית, אגוזים) שמטופלת טבעונית יכולה להסתמך עליהם.","slides":"31-32 - כולין: תפקידים ומקורות","section":"B"},{"n":5,"text":"גבר בן 45 שביצע בדיקת שומנים בדם לפני ואחרי תקופה שבה אכל ביצה אחת ביום, ונמצא שה-LDL שלו עלה משמעותית לאחר תוספת הביצים - הוא \"מגיב יתר\" (hyper responder)","options":{"A":"אצל מגיבי יתר, העלייה ב-LDL הייתה בעיקר בחלקיקים הגדולים, הנחשבים פחות מסוכנים, אך זה עדיין רק פרמטר אחד ואין ודאות מלאה לגבי בטיחות מוחלטת בכמות גדולה מאוד","B":"עליו להפסיק לחלוטין כל צריכת שומן מהתזונה; מגיבי יתר תמיד מפתחים מחלת לב תוך שנה מאכילת ביצים","C":"אין כל משמעות קלינית לתוצאת \"מגיב יתר\", ואפשר להתעלם ממנה; יש להגדיל את צריכת הביצים שלו לעשר ביצים ביום כדי \"לאמן\" את הכבד","D":"יש להחליף לחלוטין את הביצים בבשר אדום, שאינו משפיע על כולסטרול כלל; התוצאה מוכיחה שהגנטיקה היא ההסבר היחיד לתגובתו, ואין כל גורם נוסף מעורב"},"answer":["A"],"multi":false,"explanation":"המצגת מסבירה שאצל מגיבי יתר העלייה ב-LDL הייתה בעיקר בחלקיקים הגדולים והפחות מסוכנים, אך מדגישה שזהו רק פרמטר אחד, שהנושא מורכב, ושאין ודאות מלאה לבטיחות בכמות גדולה מאוד - בייחוד אם איזון הסוכר אינו תקין; הגנטיקה מסבירה רק חלק מהשונות בין אנשים.","slides":"16 - ביצים וכולסטרול (מגיבי יתר)","section":"B"},{"n":6,"text":"גבר בן 50 עם עניין רב בכתבות אינטרנט, מגיע מודאג ואומר: \"קראתי שאכילת שתי ביצים ביום מעלה TMAO בדם ולכן ביצים מסוכנות ללב שלי, ואני חייב להפסיק לגמרי.\"","options":{"A":"אכן נמצא מחקר שקישר צריכת שתי ביצים ביום לעלייה ב-TMAO, אך יש שונות רבה בין אנשים בתגובת ה-TMAO (תלוית מיקרוביום), הקשר הסיבתי למחלות לב לא הוכח באופן חד-משמעי, ומחקרים גדולים אחרים הראו שביצה אחת ביום אינה מעלה בפועל סיכון למחלות לב","B":"אין שום מחקר שמצא קשר בין כולין לביצים ל-TMAO; TMAO אינו קיים כלל בגוף האדם, וכל המחקר עליו הוא טעות","C":"ביצים הן המקור היחיד ל-TMAO בתזונה, ואין מקורות נוספים; הוא צודק לחלוטין, ויש להפסיק כל אכילת ביצים באופן מיידי וסופי","D":"יש להמליץ לו לאכול רק בשר אדום במקום ביצים, כי הוא לא מעלה TMAO כלל; יש להמליץ לו לעבור לתוסף כולין וקרניטין במקום ביצים, כי הם בטוחים יותר מבחינת TMAO"},"answer":["A"],"multi":false,"explanation":"אכן נמצא מחקר שקישר שתי ביצים ביום לעלייה ב-TMAO, אך המצגת מדגישה שונות אישית גדולה (תלוית מיקרוביום), שהקשר הסיבתי למחלות לב לא הוכח לא ביוכימית ולא קלינית, ושמחקרים גדולים הראו שביצה אחת ביום אינה מעלה בפועל סיכון למחלות לב - ואף מציעה זהירות דווקא עם תוספי כולין/קרניטין ולא עם ביצים שלמות.","slides":"33-38 - TMAO","section":"B"},{"n":7,"text":"אישה בת 35 החוששת מחשיפה לרעלים כמו דיוקסינים ומתכות כבדות, ושואלת אם ביצים אורגניות/חופש בטוחות יותר לחלוטין מביצים רגילות מבחינת רעלים","options":{"A":"הנתונים מעורבים: יש מחקרים שלא מצאו הבדל ברמות דיוקסינים בין ביצי חופש/אורגניות לרגילות, מחקר אחר מצא רמות גבוהות רק בחלק קטן מהחוות, ומחקר איטלקי לא מצא הבדל במתכות כבדות בין הסוגים - כך שאין ערבות מוחלטת, ורצוי גם לבדוק את מקור המימון של כל מחקר","B":"רמת המתכות הכבדות זהה בהכרח בכל החוות בעולם; אין כל מחקר שבדק רעלים בביצי חופש או אורגניות","C":"מקור מימון המחקר אינו רלוונטי כלל להערכת מהימנות הממצאים; ביצים מלולי סוללה נקיות לחלוטין מרעלים בהשוואה לביצי חופש","D":"ביצים אורגניות/חופש נקיות לחלוטין מכל רעל, ואין בהן שום סיכון; משרד הבריאות בישראל בודק ומפרסם נתונים מלאים על דיוקסינים בחוות אורגניות בישראל"},"answer":["A"],"multi":false,"explanation":"הממצאים מעורבים ואינם חד-משמעיים: מחקרים מסוימים לא מצאו הבדל ברמות דיוקסינים, מחקר דנמרקי מצא רמות גבוהות רק בחלק קטן מהחוות, ומחקר איטלקי לא מצא הבדל במתכות כבדות בין ביצי חופש לביצי כלובים - עם המלצה מפורשת לבדוק תמיד את מקור מימון המחקר, ובלי נתוני ניטור מקיפים לישראל.","slides":"30 - רעלים בביצים אורגניות","section":"B"},{"n":8,"text":"גבר בן 40 שעבר לתזונה כמעט טבעונית לפני שנה, אך אוכל ביצה מדי פעם באירועים חברתיים. הוא חושש שזה \"יהרוס\" לו את הפרופיל המטבולי כי קרא שביצים מעלות TMAO","options":{"A":"אנשים בתזונה כמעט טבעונית אינם \"מגדלים\" את חיידקי המעי ההופכים כולין ל-TMA, ולכן צפוי שלא תהיה עלייה משמעותית ב-TMAO גם כשהוא אוכל ביצה מדי פעם","B":"אין שום קשר בין הרכב חיידקי המעי לרמת TMAO; TMAO אינו מושפע כלל מהרכב התזונה הרגילה של האדם","C":"תזונה טבעונית תמיד מעלה TMAO יותר מתזונה עתירת בשר; עליו להימנע לצמיתות מכל אירוע חברתי שבו מוגשות ביצים","D":"יש לו להתחיל תוסף כולין וקרניטין כדי \"להתכונן\" לאכילת הביצה; כל אכילת ביצה בודדת, אפילו חד-פעמית, תגרום מיידית לעלייה קבועה ובלתי הפיכה ב-TMAO"},"answer":["A"],"multi":false,"explanation":"מכיוון שתזונה כמעט טבעונית אינה מטפחת את חיידקי המעי ההופכים כולין ל-TMA, צפוי שאכילת ביצה מזדמנת (כגון באירוע חברתי) לא תעלה משמעותית את ה-TMAO אצל אדם כזה - בהתאם לדיון במצגת על תלות ה-TMAO בהרכב פלורת המעיים.","slides":"35-36 - חיידקי מעי, טבעונות ו-TMAO","section":"B"},{"n":9,"text":"אישה בת 29 עם תסמיני חרדה קלים-בינוניים, ללא סימני דיכאון, שבבדיקות דם נמצאה עם רמת כולין נמוכה יחסית","options":{"A":"רמות כולין נמוכות בדם נמצאו קשורות לתסמיני חרדה (אך לא לדיכאון), כך שניתן לשקול העשרת התזונה במקורות כולין, כגון ביצים","B":"כולין קשור אך ורק לדיכאון ולא לחרדה כלל; אין שום קשר ידוע בין כולין לבריאות הנפשית","C":"יש להמליץ לה על תזונה נטולת כולין לחלוטין; רמת כולין בדם אינה ניתנת לשינוי על ידי תזונה","D":"יש להפסיק מיד כל צריכת כולין כי הוא גורם לחרדה; כולין רלוונטי רק לבריאות השרירים ואין לו קשר למוח כלל"},"answer":["A"],"multi":false,"explanation":"המצגת מציינת שרמות כולין נמוכות בדם נמצאו קשורות לתסמיני חרדה (אך לא לדיכאון), ושכולין הוא חומר הגלם לאצטילכולין, נוירוטרנסמיטור מרכזי במוח - ולכן העשרת התזונה במקורות כולין כגון ביצים היא שיקול סביר.","slides":"32 - השפעות בריאותיות של כולין","section":"B"},{"n":10,"text":"גבר בן 33 שרוצה לדעת מהי דרך ההכנה האידיאלית לביצה, כדי גם להימנע מבעיית האבידין-ביוטין וגם לא לחמצן את השומן והכולסטרול בחלמון","options":{"A":"עדיף בישול עדין - כגון ביצה רכה, עלומה (poached) או חביתה על אש נמוכה - המנטרל את האבידין מספיק מבלי לחמם יתר על המידה ולחמצן את השומן והכולסטרול בחלמון; ביצה קשה מבושלת כראוי גם היא אפשרות טובה","B":"יש לאכול את הביצה נא לחלוטין, כי כך נשמר מרב הערך התזונתי; חימום-יתר וטיגון בטמפרטורות גבוהות משפרים את איכות השומן בחלמון","C":"יש לטגן את הביצה זמן ארוך על אש גבוהה מאוד, כדי להבטיח חיטוי מלא; אין כל צורך לנטרל את האבידין, מכיוון שהוא אינו משפיע על ספיגת הביוטין","D":"אין כל הבדל בין שיטות הבישול מבחינת השפעתן על הביוטין או על השומן בחלמון; יש להימנע מבישול הביצה במים לחלוטין, ולהעדיף אך ורק טיגון עמוק בשמן רותח"},"answer":["A"],"multi":false,"explanation":"בישול עדין - ביצה רכה, עלומה או חביתה על אש נמוכה - או ביצה קשה מבושלת כראוי, מנטרל מספיק את האבידין כדי לשחרר ביוטין, מבלי לגרום לחימום-יתר וטיגון בטמפרטורות גבוהות שעלולים לחמצן את השומן והכולסטרול בחלמון.","slides":"13, 15, 39-40 - איך כדאי לאכול ביצה","section":"B"},{"n":9000,"text":"אין הכרח לאכול ביצים, אך יש בהן חומרים חשובים רבים בזמינות ביולוגית מעולה — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["A"],"multi":false,"explanation":"המשפט נכון על פי החומר. אלה בדיוק המלצות הסיכום של המצגת: ביצים אינן חובה אך בעלות ערך תזונתי בזמינות גבוהה; ככל הנראה מועילות לאדם בריא ולחולי סכרת המאזנים סוכר; אין ראיות מוצקות לקשר לסרטן; עדיפות לביצה קשה; והחלמון מרכז גם את הסיכונים וגם את רוב היתרונות; ועדיפות לביצי חופש/אורגניות מחוות איכותיות, ללא ערבות מוחלטת.","slides":"39-40 - סיכום ההמלצות","section":"A","tf":1},{"n":9001,"text":"בחלבון הביצה קיים חלבון בשם אבידין הנקשר לביוטין ומונע את ספיגתו — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["A"],"multi":false,"explanation":"המשפט נכון על פי החומר. כל הקביעות מתארות נכונה את הביוטין העשיר שבביצה, את חלבון האבידין ה\"אנטי-נוטריינט\" שחוסם את ספיגתו, ואת האופן שבו בישול יסודי (במיוחד הרתחה) מפרק את האבידין ומשחרר את הביוטין - בניגוד לטיגון שאינו תמיד מגיע לכל אזורי הביצה.","slides":"13-15 - ביוטין והאתגר עם האבידין","section":"A","tf":1},{"n":9002,"text":"הלבן מכיל אחוז שומן גבוה משמעותית מהחלמון — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["B"],"multi":false,"explanation":"המשפט שגוי על פי החומר. חלבון הביצה הוא בעיקרו מים וחלבון, שרובו אלבומין, וכולל בין חלבוניו הרבים גם אבידין. אין בו שומן או כולסטרול, ותכולת הוויטמינים והמינרלים בו נמוכה - כל אלה מרוכזים דווקא בחלמון.","slides":"2 - חלבון הביצה","section":"A","tf":1},{"n":9003,"text":"הלוטאין מיוצר רק על ידי צמחים, במיוחד עלים ירוקים — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["A"],"multi":false,"explanation":"המשפט נכון על פי החומר. לוטאין מיוצר אך ורק בעולם הצומח (בעיקר עלים ירוקים) והוא זה שנותן לחלמון את צבעו הצהוב - ככל שהחלמון כתום יותר, ריכוז הלוטאין בו גבוה יותר. הלוטאין מסיס בשומן (לא במים) ומצטבר ברשתית העין, לא בכבד, ואינו מיוצר בגוף האדם.","slides":"6 - לוטאין ולמה החלמון צהוב","section":"A","tf":1},{"n":9004,"text":"ה-American Institute for Cancer Research מצא ראיות מוצקות וברורות לקשר בין ביצים לסרטן השחלות — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["B"],"multi":false,"explanation":"המשפט שגוי על פי החומר. מטא-אנליזה מצאה שאין קשר בין אכילת ביצים לסרטן השחלות, ומחקר על חולים בסיכון לסרטן המעי הגס לא מצא קשר בין אכילת ביצים להתפתחות פוליפים או למורפולוגיה שלהם; שאר הקביעות מציגות תמונה גורפת מדי ואינן משקפות את הממצאים המעורבים שהוצגו.","slides":"24-25 - ביצים וסרטן המעי הגס/השחלות","section":"A","tf":1},{"n":9005,"text":"הביצה מכילה בעיקר עמילן, וכמעט ואין בה חלבון או שומן — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["B"],"multi":false,"explanation":"המשפט שגוי על פי החומר. המצגת פותחת בעובדה המפתיעה שרוב הקלוריות בביצה מגיעות דווקא משומן, למרות התפיסה הרווחת ש\"ביצה שווה חלבון\". תכולת העמילן בביצה כמעט אפסית.","slides":"2 - הרכב הביצה","section":"A","tf":1}]},{"id":"30","title":"פענוח בדיקות דם","questions":[{"n":1,"text":"מדוע הסיכוי לגלות אבחנה חדשה באמצעות בדיקות דם נמוך במטופל שכבר פנה למספר רופאים?","options":{"A":"כי רוב המטופלים מגיעים כבר עם אבחנה, ואם כמה רופאים (ולעיתים גם מטפלים טבעיים) כבר בדקו בעיון - לרוב לא יימצא דבר חדש","B":"כי בדיקות דם מתעדכנות רק אחת לשנה; כי בדיקות דם אינן אמינות מבחינה מעבדתית","C":"כי חוק הפרטיות מונע גישה לתוצאות קודמות; כי מטפלים טבעיים אינם רשאים לפרש בדיקות דם","D":"כי רוב המחלות אינן משפיעות על ערכי הדם כלל; כי בדיקות דם בודקות רק מדדים תזונתיים ולא מחלות"},"answer":["A"],"multi":false,"explanation":"כפי שנאמר בפתיחה, רוב החולים מגיעים עם אבחנה, ולאלו שאין להם - הסיכוי שנאבחן דבר חדש דרך בדיקות דם, לאחר שכמה רופאים כבר בדקו בעיון, הוא כמעט אפס. שקופית: 1 - פתיחה: מטרות ההסתכלות בבדיקות דם","slides":"","section":"A"},{"n":2,"text":"אילו מהבאות מופיעות במצגת כמטרות של בדיקות דם עבור המטפל התזונתי?","options":{"A":"מתן מוטיבציה למטופל לעשות שינוי בחייו","B":"קבלת רמז לקנדידה, פרזיטים או תגובה אלרגית","C":"קביעת סוג הדם של המטופל לצורך תרומת דם","D":"אבחון גנטי מלא של המטופל","E":"מדידת רמת הורמון הגדילה","F":"קביעת אבחנה פסיכיאטרית","G":"בדיקת תאימות לתרומת איברים"},"answer":["A","B"],"multi":true,"explanation":"המצגת מציינת בין מטרות בדיקות הדם: מתן מוטיבציה לשינוי, וקבלת רמזים לקנדידה/פרזיטים/תגובה אלרגית, לצד אבחון ומעקב מטבולי ורמזים לחוסרים תזונתיים. שקופית: 2 - מטרת בדיקות הדם עבורנו","slides":"","section":"A"},{"n":3,"text":"לפי המצגת, בדיקות דם משמשות ככלי מעקב עבור אילו מהבאים?","options":{"A":"חומצת שתן (חומצה אורית) בחולי גאוט","B":"מרקרים בחולי סרטן","C":"רמת חומצה אורית כמדד יחיד לאבחון גאוט ללא צורך בבדיקה גופנית","D":"גובה המטופל לאורך זמן","E":"TSH במעקב אחר תפקוד בלוטת התריס (בהקשר של תת-פעילות)","F":"משקל אידיאלי לפי טבלת BMI כללית","G":"רמת סוכר בדם וקצב פעימות לב במנוחה"},"answer":["A","B","E"],"multi":true,"explanation":"המצגת מזכירה שימוש בבדיקות דם למעקב אחר חומצת שתן בגאוט, מרקרים בחולי סרטן, ו-TSH בתת-פעילות של בלוטת התריס, לצד מעקב אחר מצב מטבולי כללי ו-CRP במצבי דלקת. שקופית: 2 - מטרת בדיקות הדם עבורנו","slides":"","section":"A"},{"n":4,"text":"אילו מהבדיקות הבאות מומלץ לבקש מהמטופל בשיחה הטלפונית שלפני המפגש, לפי המצגת?","options":{"A":"חומצה פולית","B":"ברזל","C":"פריטין","D":"טרנספרין","E":"ויטמין D","F":"CRP","G":"TSH"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"המצגת מפרטת רשימה מדויקת של בדיקות שכדאי לבקש מראש: חומצה פולית, ברזל, פריטין, טרנספרין, ויטמין D, CRP ו-TSH - כדי להגיע מוכנים למפגש. שקופית: 3 - הנחיות למטפל","slides":"","section":"A"},{"n":5,"text":"אילו מהמשפטים הבאים לגבי פריטין גבוה מאוד עם ברזל תקין נכונים, לפי המצגת?","options":{"A":"זהו תמיד סימן להמוכרומטוזיס (עודף ברזל תורשתי)","B":"זהו תמיד סימן לצריכת יתר של תוספי ברזל","C":"יש להפסיק מיד כל מעקב נוסף כי המצב תקין לחלוטין","D":"זהו סימן חד-משמעי לממאירות בלבד ולא לשום מצב אחר","E":"יש להתעלם מהערך כי פריטין אינו קשור לדלקת","F":"המצב תמיד מצריך עירוי דם דחוף","G":"פריטין גבוה עם ברזל תקין תמיד מעיד על ספיגת ברזל מוגברת מהמזון","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"לפי המצגת, פריטין גבוה מאוד כאשר הברזל תקין מעיד על מחלה דלקתית פעילה (פריטין הוא גם חלבון של תגובה דלקתית) - ולא על עודף ברזל, המוכרומטוזיס, ממאירות בלעדית, או צורך בעירוי. שקופית: 3 - הנחיות למטפל","slides":"","section":"A"},{"n":6,"text":"איזה תוסף תזונה, לפי המצגת, עלול לתת תוצאת בדיקה גבוהה באופן שקרי?","options":{"A":"ויטמין B12","B":"ויטמין C","C":"מגנזיום","D":"אבץ","E":"ויטמין K","F":"סידן","G":"ברזל תלת-ערכי"},"answer":["B"],"multi":false,"explanation":"המצגת מציינת במפורש כי תוסף ויטמין C עלול לתת תוצאת בדיקה גבוהה שקרית. שקופית: 4 - LDL/TG ותזונה","slides":"","section":"A"},{"n":7,"text":"אילו מהקביעות הבאות לגבי טריגליצרידים (TG) נכונות לפי המצגת?","options":{"A":"רמת ה-TG תלויה מאוד בתזונה בימים שלפני הבדיקה","B":"ערך TG גבוה (מעל כ-150) הוא סימן לא טוב ומעיד על אורח חיים לא בריא","C":"TG נקבע אך ורק גנטית וללא כל השפעה תזונתית","D":"TG הוא המדד היחיד שיש להתייחס אליו בפרופיל שומנים","E":"TG יורד תמיד בעת מחלה חריפה","F":"TG אינו נבדק כלל בפרופיל שומנים סטנדרטי","G":"TG גבוה תמיד מצריך טיפול תרופתי מיידי"},"answer":["A","B"],"multi":true,"explanation":"המצגת מדגישה שה-TG משתנה מאוד בהתאם לתזונה שלפני הבדיקה, וכי ערך גבוה (מעל כ-150) הוא סימן לא טוב המעיד על אורח חיים לא בריא. שקופית: 4 - LDL/TG ותזונה","slides":"","section":"A"},{"n":8,"text":"לפי הדוגמה במצגת (בחורה שעברה דיאטות רבות), אילו שלושה גורמים יכולים להסביר תנודות ב-LDL?","options":{"A":"שינויים תכופים בהרגלי התזונה","B":"ריבוי דיאטות שונות לאורך זמן","C":"שינויים משמעותיים באורח החיים","D":"סוג הסבון בו המטופלת משתמשת","E":"מספר שעות הצפייה בטלוויזיה","F":"צבע השיער של המטופלת","G":"מספר שעות השינה בכל לילה"},"answer":["A","B","C"],"multi":true,"explanation":"הדוגמה במצגת מתארת בחורה שעשתה הרבה מאוד דיאטות ושינויים בהרגלי התזונה - כלומר שינויים תכופים בתזונה, ריבוי דיאטות ושינויים באורח החיים מסבירים את התנודתיות ב-LDL. שקופית: 5 - תנודות LDL","slides":"","section":"A"},{"n":9,"text":"לגבי המטופל שהחל כטרום-סכרתי והפך לחולה סוכרת לא מאוזן שאינו חי בריא, המתואר במצגת, אילו מהמשפטים הבאים נכונים?","options":{"A":"תוצאות הבדיקות שלו משקפות טרום-סכרת ולאחר מכן חוסר איזון סוכרתי","B":"אורח חיים לא בריא בא לידי ביטוי בתוצאות הבדיקה","C":"סוכר גבוה בדם עלול להעלות גם את רמות הכולסטרול","D":"ההסבר לעליית הכולסטרול קשור לכך שאין משוב שלילי לכבד כאשר הסוכר גבוה","E":"כתוצאה מכך, ייצור הכולסטרול בכבד עולה","F":"יש קשר בין רמת הסוכר הלא מאוזנת לבין תוצאות פרופיל השומנים","G":"המצב מדגים כיצד תוצאה אחת (סוכר) יכולה להשפיע על מדד אחר (כולסטרול)"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"המצגת עוקבת אחרי מטופל שהחל כטרום-סכרתי והפך לחולה סוכרת לא מאוזן שאינו חי בריא, ומסבירה שסוכר גבוה מוביל להיעדר משוב שלילי לכבד ולכן לעלייה בייצור כולסטרול - קשר ישיר בין חוסר איזון סוכר לפרופיל השומנים. שקופית: 6-7 - טרום סכרת / סוכר גבוה וכולסטרול","slides":"
