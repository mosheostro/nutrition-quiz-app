<style>
:root{
  --bg:#f4f7f6; --card:#ffffff; --ink:#1f2d2b; --muted:#6b7a77;
  --brand:#0f766e; --brand-d:#0b5850; --brand-l:#e3f1ef;
  --accent:#f59e0b; --ok:#15803d; --ok-bg:#dcfce7; --bad:#b91c1c; --bad-bg:#fee2e2;
  --line:#e4ebe9; --shadow:0 6px 22px rgba(15,118,110,.10);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
button,.opt,.qz-card,.mode-opt,a{touch-action:manipulation}
body{margin:0;font-family:'Heebo',system-ui,'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;-webkit-text-size-adjust:100%;text-size-adjust:100%;overscroll-behavior-y:none}
.wrap{max-width:820px;margin:0 auto;padding:20px max(16px,env(safe-area-inset-right)) 80px max(16px,env(safe-area-inset-left))}
header.top{display:flex;align-items:center;gap:12px;padding:max(16px,env(safe-area-inset-top)) max(16px,env(safe-area-inset-right)) 16px max(16px,env(safe-area-inset-left));background:linear-gradient(135deg,var(--brand),var(--brand-d));color:#fff;box-shadow:var(--shadow)}
header.top .logo{width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:22px}
header.top h1{font-size:20px;margin:0;font-weight:800}
header.top .sub{font-size:13px;opacity:.85;margin-top:2px}
.btn{cursor:pointer;border:none;border-radius:12px;font-family:inherit;font-weight:700;font-size:16px;padding:13px 20px;min-height:48px;transition:.15s;display:inline-flex;align-items:center;justify-content:center;gap:8px;-webkit-user-select:none;user-select:none}
.btn-primary{background:var(--brand);color:#fff}
.btn-primary:hover{background:var(--brand-d)}
.btn-ghost{background:#fff;color:var(--brand);border:2px solid var(--brand-l)}
.btn-ghost:hover{border-color:var(--brand)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:22px}
@media(max-width:640px){.grid{grid-template-columns:1fr}}
.qz-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;cursor:pointer;box-shadow:var(--shadow);transition:.18s;display:flex;flex-direction:column;gap:8px;position:relative;overflow:hidden}
.qz-card:hover{transform:translateY(-3px);border-color:var(--brand)}
.qz-card .num{position:absolute;top:12px;left:14px;font-size:12px;font-weight:700;color:var(--brand);background:var(--brand-l);padding:2px 9px;border-radius:20px}
.qz-card h3{margin:6px 0 0;font-size:17px;font-weight:800}
.qz-card p{margin:0;color:var(--muted);font-size:13px}
.section-title{margin:26px 0 4px;font-size:15px;color:var(--muted);font-weight:700}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:24px;box-shadow:var(--shadow)}
.mode-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:20px}
@media(max-width:520px){.mode-row{grid-template-columns:1fr}}
.mode-opt{border:2px solid var(--line);border-radius:14px;padding:20px;text-align:center;cursor:pointer;transition:.15s}
.mode-opt:hover{border-color:var(--brand);background:var(--brand-l)}
.mode-opt .ic{font-size:30px}
.mode-opt h4{margin:8px 0 4px;font-size:18px}
.mode-opt p{margin:0;font-size:13px;color:var(--muted)}
.pbar{height:8px;background:var(--line);border-radius:20px;overflow:hidden;margin:6px 0 18px}
.pbar>i{display:block;height:100%;background:var(--brand);transition:.3s;border-radius:20px}
.qhead{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--muted);font-weight:600;margin-bottom:6px}
.badge{font-size:12px;padding:3px 10px;border-radius:20px;font-weight:700}
.badge.gen{background:#e0f2fe;color:#075985}
.badge.clin{background:#fef3c7;color:#92400e}
.qtext{font-size:19px;font-weight:700;margin:8px 0 4px}
.multi-note{font-size:13px;color:var(--accent);font-weight:700;margin-bottom:10px}
.opts{display:flex;flex-direction:column;gap:10px;margin-top:12px}
.opt{display:flex;align-items:flex-start;gap:12px;border:2px solid var(--line);border-radius:12px;padding:13px 15px;min-height:48px;cursor:pointer;transition:.12s;background:#fff}
.opt:hover{border-color:var(--brand)}
.opt.sel{border-color:var(--brand);background:var(--brand-l)}
.opt .mark{flex:0 0 26px;height:26px;border-radius:8px;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:var(--muted);background:#fff}
.opt.radio .mark{border-radius:50%}
.opt.sel .mark{border-color:var(--brand);background:var(--brand);color:#fff}
.opt .txt{flex:1;font-size:15.5px}
.opt.correct{border-color:var(--ok);background:var(--ok-bg)}
.opt.correct .mark{border-color:var(--ok);background:var(--ok);color:#fff}
.opt.wrong{border-color:var(--bad);background:var(--bad-bg)}
.opt.wrong .mark{border-color:var(--bad);background:var(--bad);color:#fff}
.opt.locked{cursor:default}
.explain{margin-top:16px;border-radius:12px;padding:14px 16px;font-size:15px;border-inline-start:5px solid var(--brand);background:var(--brand-l)}
.explain.ok{border-color:var(--ok);background:var(--ok-bg)}
.explain.bad{border-color:var(--bad);background:var(--bad-bg)}
.explain b{display:block;margin-bottom:4px}
.explain .slides{margin-top:8px;font-size:12.5px;color:var(--muted)}
.nav{display:flex;justify-content:space-between;gap:12px;margin-top:22px}
.score-live{font-size:13px;color:var(--muted);font-weight:700}
.result-hero{text-align:center;padding:10px 0 6px}
.ring{width:150px;height:150px;margin:0 auto 6px;position:relative}
.ring svg{transform:rotate(-90deg)}
.ring .pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring .pct b{font-size:34px}
.ring .pct span{font-size:12px;color:var(--muted)}
.stats{display:flex;justify-content:center;gap:26px;margin:14px 0 4px}
.stats div{text-align:center}
.stats b{display:block;font-size:22px}
.stats.ok b{color:var(--ok)}.stats.bad b{color:var(--bad)}
.stats small{color:var(--muted);font-size:12px}
.review-item{border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-top:10px}
.review-item .rq{font-weight:700;font-size:14.5px;display:flex;gap:8px;align-items:flex-start}
.review-item .ri-mark{flex:0 0 auto;font-weight:800}
.review-item.rok{border-inline-start:5px solid var(--ok)}
.review-item.rbad{border-inline-start:5px solid var(--bad)}
.rdetail{font-size:13.5px;color:var(--muted);margin-top:6px}
.rdetail .yourans{color:var(--bad)} .rdetail .rightans{color:var(--ok);font-weight:700}
.foot{text-align:center;color:var(--muted);font-size:12px;margin-top:30px;padding:0 16px calc(16px + env(safe-area-inset-bottom))}
.link{background:none;border:none;color:var(--brand);font-weight:700;cursor:pointer;font-family:inherit;font-size:14px;padding:6px}
.hidden{display:none}
.exam-banner{background:linear-gradient(135deg,var(--brand),var(--brand-d));color:#fff;border-radius:18px;padding:20px;box-shadow:var(--shadow);margin-bottom:6px}
.exam-banner .eb-top{display:flex;align-items:center;gap:12px}
.exam-banner .eb-ic{font-size:28px;background:rgba(255,255,255,.16);width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.exam-banner h3{margin:0;font-size:19px;font-weight:800}
.exam-banner p{margin:2px 0 0;font-size:13px;opacity:.92}
.exam-banner .eb-btns{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.exam-banner .eb-btns .btn{flex:1 1 90px;background:#fff;color:var(--brand);min-height:46px;padding:10px 12px;font-size:16px}
.exam-banner .eb-btns .btn:active{transform:scale(.98)}
</style>
</head>

const LETTERS=["A","B","C","D","E","F","G","H","N"];
const app=document.getElementById("app");
let state={};

function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ---------- HOME ---------- */
function home(){
  window.scrollTo(0,0);
  let cards=QUIZZES.map((q,i)=>`
    <div class="qz-card" onclick="startScreen(${i})">
      <span class="num">מס' ${esc(q.id)}</span>
      <h3>${esc(q.title)}</h3>
      <p>${q.questions.length} שאלות · ${q.questions.filter(x=>x.section==='B').length} מקרים קליניים</p>
    </div>`).join("");
  app.innerHTML=`
    <div class="exam-banner">
      <div class="eb-top"><span class="eb-ic">🎓</span>
        <div><h3>מבחן מסכם</h3><p>שאלות אקראיות מכל הנושאים · כולל מקרים קליניים</p></div></div>
      <div class="eb-btns">
        <button class="btn" onclick="startCombinedExam(33)">33 שאלות</button>
        <button class="btn" onclick="startCombinedExam(66)">66 שאלות</button>
        <button class="btn" onclick="startCombinedExam(99)">99 שאלות</button>
      </div>
    </div>
    <p class="section-title">או בחר/י נושא לתרגול או לבחינה</p>
    <div class="grid">${cards}</div>`;
}

/* ---------- COMBINED EXAM (all topics) ---------- */
function startCombinedExam(n){
  window.scrollTo(0,0);
  let pool=[];
  QUIZZES.forEach(q=>q.questions.forEach(x=>pool.push(Object.assign({},x,{_src:q.title}))));
  n=Math.min(n,pool.length);
  const qs=shuffle(pool.slice()).slice(0,n).map((x,i)=>Object.assign({},x,{_i:i}));
  state={qi:-1,mode:'exam',quiz:{id:'EXAM',title:'מבחן מסכם — כל הנושאים',questions:qs},qs,cur:0,answers:{},checked:{}};
  renderQuestion();
}

/* ---------- START SCREEN ---------- */
let pickCount=null;   /* null = all questions */
function setCount(qi,c){ pickCount=c; startScreen(qi); }
function startScreen(qi){
  window.scrollTo(0,0);
  const q=QUIZZES[qi];
  const total=q.questions.length;
  const clin=q.questions.filter(x=>x.section==='B').length;
  const gen=total-clin;
  const allOn=(pickCount==null)||(pickCount>=total);
  const chip=(label,val,on)=>`<button class="btn ${on?'btn-primary':'btn-ghost'}" style="padding:9px 16px;min-height:0;font-size:15px;flex:0 0 auto" onclick="setCount(${qi},${val})">${label}</button>`;
  const chips=[10,20,30,40,50].filter(c=>c<total).map(c=>chip(c,c,!allOn&&pickCount===c)).join('')
              +chip('הכל ('+total+')','null',allOn);
  app.innerHTML=`
    <button class="link" onclick="home()">‹ חזרה לרשימת הנושאים</button>
    <div class="card" style="margin-top:10px">
      <h2 style="margin:0 0 4px;font-size:22px">${esc(q.title)}</h2>
      <p style="color:var(--muted);margin:0">${total} שאלות · ${gen} כלליות + ${clin} מבוססות מקרה קליני</p>
      <p class="section-title" style="margin-top:20px">כמות שאלות</p>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:6px">${chips}</div>
      <p style="font-size:13px;color:var(--muted);margin:8px 2px 0">בבחירת כמות — השאלות נדגמות באקראי בכל כניסה, כולל מקרים קליניים משולבים.</p>
      <p class="section-title" style="margin-top:20px">איך תרצה/י לתרגל?</p>
      <div class="mode-row">
        <div class="mode-opt" onclick="beginQuiz(${qi},'practice')">
          <div class="ic">📚</div><h4>מצב תרגול</h4>
          <p>משוב מיידי והסבר אחרי כל שאלה</p>
        </div>
        <div class="mode-opt" onclick="beginQuiz(${qi},'exam')">
          <div class="ic">📝</div><h4>מצב מבחן</h4>
          <p>עונים על הכל ומקבלים ציון בסוף</p>
        </div>
      </div>
      <label style="display:flex;align-items:center;gap:8px;margin-top:18px;font-size:14px;color:var(--muted);cursor:pointer">
        <input type="checkbox" id="shuffleChk" style="width:18px;height:18px"> ערבב/י את הסדר גם במצב "הכל"
      </label>
    </div>`;
}

/* ---------- QUIZ ENGINE ---------- */
function beginQuiz(qi,mode){
  const q=QUIZZES[qi];
  const total=q.questions.length;
  const n=(pickCount==null)?total:Math.min(pickCount,total);
  let pool=q.questions.map((x,idx)=>({...x,_i:idx}));
  let qs;
  if(n<total){ qs=shuffle(pool.slice()).slice(0,n); }
  else { const doShuffle=document.getElementById("shuffleChk")?.checked; qs=doShuffle?shuffle(pool.slice()):pool; }
  state={qi,mode,quiz:q,qs,cur:0,answers:{},checked:{}};
  renderQuestion();
}

function optionKeys(q){return LETTERS.filter(l=>q.options[l]!==undefined);}

function renderQuestion(){
  window.scrollTo(0,0);
  const s=state,q=s.qs[s.cur];
  const total=s.qs.length;
  const sel=s.answers[s.cur]||[];
  const isChecked=s.checked[s.cur];
  const badge=q.section==='B'?`<span class="badge clin">מקרה קליני</span>`:`<span class="badge gen">שאלה כללית</span>`;
  const keys=optionKeys(q);
  const opts=keys.map(l=>{
    const selCls=sel.includes(l)?"sel":"";
    let stateCls="";
    if(isChecked){
      const correct=q.answer.includes(l);
      if(correct) stateCls="correct locked";
      else if(sel.includes(l)) stateCls="wrong locked";
      else stateCls="locked";
    }
    const shape=q.multi?"":"radio";
    const mark=q.multi?(sel.includes(l)?"✓":""):(sel.includes(l)?"●":l);
    return `<div class="opt ${shape} ${selCls} ${stateCls}" onclick="pick('${l}')">
      <div class="mark">${q.multi?mark:(isChecked?l:mark)}</div>
      <div class="txt">${esc(q.options[l])}</div></div>`;
  }).join("");

  let feedback="";
  if(isChecked){
    const ok=isCorrect(q,sel);
    feedback=`<div class="explain ${ok?'ok':'bad'}">
      <b>${ok?'✓ תשובה נכונה':'✗ תשובה שגויה'} — התשובה הנכונה: ${q.answer.join(", ")}</b>
      ${esc(q.explanation)}
      ${q.slides?`<div class="slides">📎 מקור: שקופיות ${esc(q.slides)}</div>`:""}
    </div>`;
  }

  const liveScore=s.mode==='practice'?`<div class="score-live">ניקוד: ${scoreSoFar()} / ${Object.keys(s.checked).length}</div>`:`<div class="score-live">${countAnswered()} / ${total} נענו</div>`;

  let navBtns="";
  if(s.mode==='practice'){
    if(!isChecked){
      navBtns=`<button class="btn btn-primary" onclick="checkAnswer()" ${sel.length?'':'disabled'}>בדיקה</button>`;
    }else{
      navBtns = s.cur<total-1
        ? `<button class="btn btn-primary" onclick="go(1)">השאלה הבאה ›</button>`
        : `<button class="btn btn-primary" onclick="finish()">סיום וצפייה בציון</button>`;
    }
  }else{
    const nextBtn = s.cur<total-1
      ? `<button class="btn btn-primary" onclick="go(1)">הבאה ›</button>`
      : `<button class="btn btn-primary" onclick="finish()">סיום ובדיקת ציון</button>`;
    navBtns=`<button class="btn btn-ghost" onclick="go(-1)" ${s.cur===0?'disabled':''}>‹ הקודמת</button>${nextBtn}`;
  }

  app.innerHTML=`
    <button class="link" onclick="confirmQuit()">‹ יציאה</button>
    <div class="qhead"><span>שאלה ${s.cur+1} מתוך ${total}</span>${liveScore}</div>
    <div class="pbar"><i style="width:${(s.cur+1)/total*100}%"></i></div>
    <div class="card">
      <div style="margin-bottom:6px">${badge}</div>
      <div class="qtext">${esc(q.text)}</div>
      ${q.multi?`<div class="multi-note">⚠ שאלה רב-ברירתית — סמן/י את כל התשובות הנכונות</div>`:""}
      <div class="opts">${opts}</div>
      ${feedback}
      <div class="nav">${s.mode==='practice'?'<span></span>':''}${navBtns}</div>
    </div>`;
}

function pick(l){
  const s=state;
  if(s.checked[s.cur]) return;
  const q=s.qs[s.cur];
  let sel=s.answers[s.cur]||[];
  if(q.multi){
    sel=sel.includes(l)?sel.filter(x=>x!==l):[...sel,l];
  }else{
    sel=[l];
  }
  s.answers[s.cur]=sel;
  renderQuestion();
}
function checkAnswer(){state.checked[state.cur]=true;renderQuestion();}
function go(d){
  const s=state;const n=s.cur+d;
  if(n<0||n>=s.qs.length)return;
  s.cur=n;renderQuestion();
}
function isCorrect(q,sel){
  if(!sel||!sel.length) return false;
  const a=[...q.answer].sort().join(",");
  const b=[...sel].sort().join(",");
  return a===b;
}
function scoreSoFar(){
  let c=0;const s=state;
  for(const k in s.checked){if(isCorrect(s.qs[k],s.answers[k]||[]))c++;}
  return c;
}
function countAnswered(){return Object.keys(state.answers).filter(k=>state.answers[k].length).length;}

function confirmQuit(){
  if(confirm("לצאת מהשאלון? ההתקדמות לא תישמר.")){ if(state.qi===-1) home(); else startScreen(state.qi); }
}

/* ---------- RESULTS ---------- */
function finish(){
  window.scrollTo(0,0);
  const s=state,total=s.qs.length;
  let correct=0;
  const review=s.qs.map((q,i)=>{
    const sel=s.answers[i]||[];
    const ok=isCorrect(q,sel);
    if(ok)correct++;
    return {q,sel,ok};
  });
  const pct=Math.round(correct/total*100);
  const band = pct>=85?"var(--ok)":pct>=60?"var(--accent)":"var(--bad)";
  const msg = pct>=85?"מצוין! שליטה מצוינת בחומר":pct>=60?"כל הכבוד — כדאי לחזור על מה שפספסת":"כדאי לחזור על החומר ולנסות שוב";
  const R=52,C=2*Math.PI*R,off=C*(1-pct/100);
  const reviewHtml=review.map((r,i)=>{
    const yours=r.sel.length?r.sel.join(", "):"— (לא נענתה)";
    return `<div class="review-item ${r.ok?'rok':'rbad'}">
      <div class="rq"><span class="ri-mark" style="color:${r.ok?'var(--ok)':'var(--bad)'}">${r.ok?'✓':'✗'}</span>
        <span>${i+1}. ${esc(r.q.text)}</span></div>
      <div class="rdetail">
        ${r.ok?'':`<div>תשובתך: <span class="yourans">${yours}</span></div>`}
        <div>תשובה נכונה: <span class="rightans">${r.q.answer.join(", ")}</span></div>
        ${r.q._src?`<div style="font-size:12px;color:var(--brand);font-weight:700;margin-top:4px">📚 ${esc(r.q._src)}</div>`:""}
        <div style="margin-top:6px">${esc(r.q.explanation)}</div>
        ${r.q.slides?`<div class="slides" style="margin-top:5px;color:var(--muted);font-size:12px">📎 שקופיות ${esc(r.q.slides)}</div>`:""}
      </div>
    </div>`;
  }).join("");

  app.innerHTML=`
    <div class="card">
      <div class="result-hero">
        <div class="ring">
          <svg width="150" height="150"><circle cx="75" cy="75" r="${R}" fill="none" stroke="var(--line)" stroke-width="12"/>
          <circle cx="75" cy="75" r="${R}" fill="none" stroke="${band}" stroke-width="12" stroke-linecap="round"
            stroke-dasharray="${C}" stroke-dashoffset="${off}"/></svg>
          <div class="pct"><b style="color:${band}">${pct}%</b><span>ציון סופי</span></div>
        </div>
        <h2 style="margin:6px 0 2px">${esc(s.quiz.title)}</h2>
        <p style="color:var(--muted);margin:0">${msg}</p>
        <div class="stats"><div class="stats ok"><b>${correct}</b><small>נכונות</small></div>
          <div class="stats bad"><b>${total-correct}</b><small>שגויות</small></div>
          <div><b>${total}</b><small>סה"כ</small></div></div>
      </div>
      <div class="nav">
        ${s.qi===-1
          ? `<button class="btn btn-ghost" onclick="home()">לדף הבית</button>
             <button class="btn btn-primary" onclick="startCombinedExam(${total})">מבחן מסכם חדש</button>`
          : `<button class="btn btn-ghost" onclick="startScreen(${s.qi})">חזרה לנושא</button>
             <button class="btn btn-primary" onclick="beginQuiz(${s.qi},'${s.mode}')">נסה/י שוב</button>`}
      </div>
    </div>
    <p class="section-title">סקירת תשובות</p>
    <div>${reviewHtml}</div>
    <div style="text-align:center;margin-top:20px"><button class="link" onclick="home()">↩ לכל הנושאים</button></div>`;
}

async function boot(){
  try{
    const bin=Uint8Array.from(atob(QUIZ_B64),c=>c.charCodeAt(0));
    let text;
    if('DecompressionStream' in window){
      const ds=new DecompressionStream('gzip');
      const stream=new Response(bin).body.pipeThrough(ds);
      text=await new Response(stream).text();
    }else{
      throw new Error('no-ds');
    }
    window.QUIZZES=JSON.parse(text);
    home();
  }catch(e){
    document.getElementById('app').innerHTML='<div class="card">הדפדפן אינו נתמך. נסה/י דפדפן עדכני (Chrome, Edge, Safari, Firefox).</div>';
    console.error(e);
  }
}
document.addEventListener('keydown',function(e){
  if(!state||!state.qs)return;
  if(/result-hero/.test(app.innerHTML))return;
  const s=state,q=s.qs[s.cur]; if(!q)return;
  if(/^[1-9]$/.test(e.key)){
    const keys=optionKeys(q),idx=+e.key-1;
    if(idx<keys.length && !s.checked[s.cur]){pick(keys[idx]);e.preventDefault();}
    return;
  }
  if(e.key==='Enter'){
    e.preventDefault();
    if(s.mode==='practice'){
      if(!s.checked[s.cur]){if((s.answers[s.cur]||[]).length)checkAnswer();}
      else{s.cur<s.qs.length-1?go(1):finish();}
    }else{s.cur<s.qs.length-1?go(1):finish();}
  }
});
boot();
</script>
</body>
</html>
