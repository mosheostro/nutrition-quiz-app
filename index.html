t":"מזון חומצי גורם תמיד לירידה מדידה ומיידית ב-pH הדם — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["B"],"multi":false,"explanation":"המשפט שגוי על פי החומר. טענות הנגד המרכזיות היו שהפרשת חומצה בשתן היא מנגנון תקין של הגוף, ושהכליות (בניגוד לטענת ההתעלמות) דווקא כן מייצרות ביקרבונט ומאזנות את החומציות בדם. שקופית: 8 - טענות הנגד","slides":"","section":"A","tf":1},{"n":9003,"text":"התופעה של עלייה בהפרשת סידן בשתן נצפית הן עם חלבון מן החי והן עם חלבון מן הצומח — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["A"],"multi":false,"explanation":"המשפט נכון על פי החומר. ה\"הוכחה הניצחת\" הראתה שהעלייה בהפרשת סידן בשתן לאחר אכילת חלבון נובעת משיפור ספיגת הסידן במעי (לא מפירוק עצם), ותופעה זו נצפית הן עם חלבון מן החי והן מן הצומח. מחקרים דווקא הראו ירידה (לא עלייה) בפרקציית הסידן ממקור עצם בתזונה עתירת חלבון. שקופית: 21 - הנוקאוט לתיאוריית האפר החומצי","slides":"","section":"A","tf":1},{"n":9004,"text":"קולגן הוא מרכיב עיקרי ברקמות חיבור כמו עצמות, גידים וסחוסים — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["A"],"multi":false,"explanation":"המשפט נכון על פי החומר. כל הפרטים הללו הוצגו בשיעור ביחס לקולגן - היותו החלבון החוץ-תאי הנפוץ ביותר, מרכיב עיקרי ברקמות חיבור, תלות קשיחות הרקמה במינרליזציה, מיקומיו בגוף, תפקידו בריפוי, זהותם של הגידים והרצועות כסיבי קולגן, ושימושו בקוסמטיקה. שקופית: 10-11 - קולגן","slides":"","section":"A","tf":1},{"n":9005,"text":"חלבון מן הצומח עשיר במיוחד במתיונין ובציסטאין בהשוואה לחלבון מן החי — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["B"],"multi":false,"explanation":"המשפט שגוי על פי החומר. כל הקביעות הפוכות מהעובדות שנלמדו: מתיונין וציסטאין (המכילות גופרית) הן החומציות ביותר, גלוטמט ואספרטט הן דווקא בסיסיות (\"פרדוקסליות\"), גליצין/אלנין/וולין ניטרליות, וחלבון מן החי (לא מהצומח) עשיר במיוחד במתיונין ובציסטאין. שקופית: 3-4 - חומציות חומצות אמינו","slides":"","section":"A","tf":1}]},{"id":"26","title":"ניקוי רעלים","questions":[{"n":1,"text":"מהו ההבדל המרכזי, לפי המצגת, בין רעלים מסיסי מים לרעלים מסיסי שומן מבחינת האתגר שהם מציבים בפני הגוף?","options":{"A":"רעלים מסיסי שומן חודרים לתאים ודורשים המרה למולקולה קוטבית (מסיסת מים) כדי לצאת מהגוף, ולכן הם האתגר האמיתי בניקוי רעלים","B":"רעלים מסיסי שומן אינם יכולים להצטבר ברקמת השומן; אין הבדל מהותי בין שני הסוגים מבחינת קושי הטיפול","C":"רעלים מסיסי מים תמיד מסוכנים יותר כי הם חודרים לכל תא בגוף; רעלים מסיסי שומן מופרשים ישירות לשלפוחית השתן ללא כל עיבוד","D":"רעלים מסיסי מים ורעלים מסיסי שומן מופרשים באותו אופן בדיוק דרך הכליה; רעלים מסיסי מים לעולם אינם גורמים נזק לגוף מכיוון שאינם נכנסים לתאים"},"answer":["A"],"multi":false,"explanation":"רעלים מסיסי מים שאינם חודרים לתאים מופרשים בקלות דרך הכליה, בעוד רעלים מסיסי שומן חודרים לתאים ודורשים המרה למולקולות קוטביות (מסיסות מים) כדי שיוכלו לצאת - זהו האתגר האמיתי בניקוי רעלים. שקופית: 3 - רעלים מסיסי מים ומסיסי שומן","slides":"","section":"A"},{"n":2,"text":"אילו מהקביעות הבאות לגבי רעלים מסיסי מים נכונות, לפי המצגת?","options":{"A":"חלק מהרעלים מסיסי המים בכל זאת מצליחים לחדור לתאים ומנוטרלים בתוכם","B":"רעלים מסיסי מים לעולם אינם גורמים נזק כלשהו כי הם לא נמצאים בתאים","C":"גם בדם ניתן לגרום נזק - למשל היצמדות לאנזימים ומולקולות או גניבת אלקטרונים","D":"כל הרעלים מסיסי המים חודרים לתאים ללא יוצא מן הכלל","E":"רעלים מסיסי מים שאינם חודרים לתאים גורמים תמיד לנזק חמור יותר מרעלים החודרים לתאים","F":"רעלים מסיסי מים תמיד עוברים המרה לצורה מסיסת שומן לפני הפרשה","G":"חומרים מסיסי מים רצויים לגוף אינם יכולים להיכנס לתאים כלל"},"answer":["A","C"],"multi":true,"explanation":"לפי שקופית 4, יש רעלים מסיסי מים שכן מצליחים להיכנס לתאים ומנוטרלים בתוכם. כמו כן, לא מדויק לומר שרעלים מסיסי מים אינם גורמים נזק בדם - הם יכולים להיצמד לאנזימים ולמולקולות ולגנוב אלקטרונים. שקופית: 4 - הטיפול של הגוף בחומרים מסיסי מים","slides":"","section":"A"},{"n":3,"text":"אילו מהבאים מוזכרים במצגת כמקורות חיצוניים לרעלים אורגניים?","options":{"A":"מזון שרוף","B":"שומן מחומצן","C":"עובש","D":"פעילות גופנית מתונה","E":"שינה איכותית","F":"תרגילי נשימה","G":"מדיטציה יומית"},"answer":["A","B","C"],"multi":true,"explanation":"שקופית 6 מפרטת רשימה ארוכה של מקורות חיצוניים לרעלים אורגניים, ובהם מזון שרוף, שומן מחומצן ועובש, לצד זיהום אוויר, צבעים, פלסטיק, דשנים ותרופות. פעילות גופנית, שינה, נשימה ומדיטציה אינן מוזכרות כמקורות רעלים. שקופית: 6 - מאיפה מגיעים הרעלים המסוכנים ביותר","slides":"","section":"A"},{"n":4,"text":"אילו מהקביעות הבאות לגבי רעלים הנוצרים בתוך הגוף עצמו (מקור פנימי) נכונות?","options":{"A":"רעלים הנוצרים בגוף מקורם אך ורק במזון מן החי שנאכל","B":"הורמוני סטרס מסווגים כרעלים המגיעים מבחוץ","C":"צמיחת יתר של חיידקים טובים במעיים היא מקור עיקרי לרעלים פנימיים","D":"מתכות כבדות הן דוגמה מרכזית לרעל בעל מקור פנימי","E":"תהליך חילוף החומרים הטבעי בגוף אינו קשור כלל ליצירת רעלים","F":"כל הרעלים בגוף מקורם חיצוני בלבד ואין רעלים ממקור פנימי","G":"עודף חיידקים ופטריות מזיקים במעיים תמיד מקורו בזיהום אוויר חיצוני","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"לפי שקופית 5, רעלים ממקור פנימי כוללים תהליך טבעי של חילוף חומרים, הורמוני סטרס, וצמיחת יתר של חיידקים רעים ופטריות (לא טובים) במעיים. מתכות כבדות מסווגות בנפרד מרעלים אורגניים, וכל הקביעות שהוצגו כאן הפוכות או שגויות. שקופית: 5 - איזה רעלים צריך לנקות (רעלים אורגניים מול מתכות כבדות)","slides":"","section":"A"},{"n":5,"text":"אילו מהקביעות הבאות לגבי דרכי הפרשת רעלים ומיקוד פרוטוקולי הניקוי נכונות?","options":{"A":"הגוף נפטר מרעלים דרך צואה, שתן, הזעה, ציפורניים ושיער","B":"תוכניות ניקוי הרעלים וצומות הניקוי מעודדות הפרשת רעלים אורגניים בעיקר דרך השתן","C":"תהליך נטרול הרעלים והפיכתם לחומרים לא מזיקים מתרחש בכבד","D":"הציפורניים והשיער נחשבים אמצעים נוספים להיפטרות מרעלים","E":"הזעה היא אחת הדרכים בהן הגוף נפטר מרעלים","F":"שתן הוא ערוץ מרכזי להפרשת רעלים שמעודדות אותו תוכניות הניקוי","G":"הכבד הוא האיבר המרכזי בו מתרחש תהליך נטרול הרעלים"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"שקופית 7 מפרטת את כל אמצעי הגוף להיפטרות מרעלים (צואה, שתן, הזעה, ציפורניים, שיער), ומציינת שתוכניות הניקוי מתמקדות בהפרשה דרך השתן בעוד תהליך הנטרול עצמו מתרחש בכבד. שקופית: 7 - האמצעים של הגוף להיפטר מרעלים","slides":"","section":"A"},{"n":6,"text":"אילו מהקביעות הבאות על תהליך נטרול הרעלים בכבד נכונות?","options":{"A":"שלב 1 (Phase 1) הופך את המולקולה למעט יותר קוטבית מאשר קודם, בעיקר בעזרת אנזימי OH","B":"שלב 2 (Phase 2) כולל צימוד (conjugation) של תרכובות פולריות למולקולה כדי לאפשר הפרשתה בשתן או בצואה","C":"המולקולה שנוצרת בסיום שלב 1 תמיד פחות ריאקטיבית ופחות רעילה מהרעל המקורי","D":"שלב 2 מתרחש תמיד לפני שלב 1","E":"מטרת התהליך היא להפוך חומר מסיס מים למסיס שומן","F":"אנזימי P450 אינם מעורבים כלל בתהליך נטרול הרעלים בכבד","G":"ניתן לדלג על שלב 1 ולעבור ישירות לצימוד הרעל בשלב 2"},"answer":["A","B"],"multi":true,"explanation":"שקופית 9 מסכמת ששלב 1 הופך את המולקולה למעט יותר קוטבית (אנזימי OH) ושלב 2 מצמד תרכובות פולריות לצורך הפרשה. לעומת זאת, תוצר שלב 1 דווקא ריאקטיבי ורעיל יותר מהרעל המקורי, ומטרת התהליך היא הפיכת חומר מסיס שומן למסיס מים. שקופית: 9 - סיכום ביניים: נטרול רעלים בכבד","slides":"","section":"A"},{"n":7,"text":"מהי הבעיה המרכזית שמצוינת בקשר לתוצר הביניים שנוצר בשלב 1 (Phase 1) של נטרול הרעלים בכבד?","options":{"A":"התוצר פעיל, ריאקטיבי ורעיל יותר מהרעל המקורי, ולכן אם שלב 2 לא יושלם כראוי הוא עלול לגרום נזק","B":"התוצר הופך לחומר בלתי פעיל לחלוטין וללא כל השפעה","C":"התוצר גורם לירידה מיידית ברמות הגלוטטיון בגוף בלבד וללא השפעה נוספת","D":"התוצר תמיד מופרש ישירות דרך הריאות; אין כל בעיה בתוצר הביניים - התהליך תמיד בטוח","E":"התוצר הופך לרעל מסיס שומן חדש שלא ניתן לטפל בו; התוצר אינו מסיס במים כלל ונשאר תקוע בכבד לצמיתות"},"answer":["A"],"multi":false,"explanation":"לפי שקופית 9, הבעיה היא שהתוצר לאחר שלב 1 פעיל, ריאקטיבי ורעיל יותר מהרעל המקורי - ולכן חשוב שהכבד יוכל להשלים גם את שלב 2 (הצימוד) בהצלחה, אחרת התוצר המסוכן עלול להצטבר. שקופית: 9 - סיכום ביניים: נטרול רעלים בכבד","slides":"","section":"A"},{"n":8,"text":"אילו מהתנאים הבאים מצוינים כמסייעים לתפקוד האופטימלי של הכבד בתהליך נטרול הרעלים?","options":{"A":"לאכול פחות, כדי להוריד עומס מהכבד","B":"להימנע מהחדרת רעלים חדשים לגוף","C":"לצרוך מלאי מספק של נוגדי חמצון, ויטמינים ומינרלים, בייחוד מהמצליבים","D":"להרבות באכילת מזון מן החי כדי לחזק את הכבד","E":"לאכול תזונה חומצית כדי לגרום לכליות לייצר כמה שיותר ביקרבונט","F":"להימנע משתיית מים לחלוטין בזמן הניקוי","G":"להעלים כליל אבחון רפואי לפני תחילת ניקוי"},"answer":["A","B","C"],"multi":true,"explanation":"שקופית 9 מציינת שיש להוריד מהכבד מטלות לא הכרחיות: לאכול פחות, להימנע מהחדרת רעלים חדשים, לצרוך נוטריאנטים (נוגדי חמצון, ויטמינים, מינרלים - במיוחד מהמצליבים) לצורך שלב 2, ולאכול תזונה בסיסית במקום לדרוש מהכליות ייצור ביקרבונט מוגבר. שקופית: 9 - התנאים האופטימליים לעבודת הנטרול של הכבד","slides":"","section":"A"},{"n":9,"text":"אילו מהקביעות הבאות בנוגע לסכנה שבניקוי רעלים מהיר מדי נכונות?","options":{"A":"ניקוי רעלים מהיר מדי משפר תמיד את יעילות שלב 2 בכבד","B":"כאשר הניקוי מהיר מדי, שלב 2 תמיד מתרחש במלואו ללא בעיה","C":"פליטת רעלים חזקים יותר למחזור הדם אינה קשורה לסיכון שקיעתם באיברים רגישים","D":"רוב הרעלים בגוף מצטברים באופן שווה בכל האיברים ללא הבדל","E":"ניקוי מהיר תמיד בטוח יותר מניקוי איטי","F":"אין כל סיכון בביצוע ניקוי רעלים עוצמתי ומהיר ללא הכנה","G":"פליטת רעלים חזקים למחזור הדם היא תמיד תופעה רצויה ומבוקשת","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"לפי שקופית 10, ניקוי מהיר מדי עבור מוכנות הכבד גורם לכך ששלב 2 לא יתרחש במלואו, מה שעלול להוביל לפליטת רעלים חזקים יותר למחזור הדם ולסיכון שקיעתם באיברים רגישים יותר - כל הקביעות שהוצגו הפוכות מכך. שקופית: 10 - הסכנה בניקוי רעלים","slides":"","section":"A"},{"n":10,"text":"אילו מהקביעות הבאות לגבי אגירת רעלים ברקמת השומן והוויכוח סביב ניקוי רעלים נכונות?","options":{"A":"רעלים מסיסי שומן אגורים ברקמת השומן","B":"יש הטוענים שעדיף להשאיר את הרעלים בתאי השומן (\"למה להעיר דובים ישנים\")","C":"הצד השני טוען שתמיד יש זליגה מרקמת השומן אל הדם ומשם לתאים, ולכן כדאי לנקות את רקמת השומן","D":"לטענת חלק, ניקוי רעלים מעורר גם תהליכי ריפוי ואוטופגיה, לא רק הפרשת רעלים מתאי השומן","E":"גם ללא קשר לניקוי הרעלים עצמו, מדובר במעין מנוחה למערכת העיכול","F":"הנושא נמצא במחלוקת בין אנשי מקצוע ואין הסכמה מלאה","G":"גם \"דוב ישן\" (רקמת שומן) עלול להתעורר יום אחד, כלומר הרעלים עלולים לצאת בכל מקרה"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"שקופית 11 מציגה מחלוקת של ממש: צד אחד טוען שעדיף לא \"להעיר דובים ישנים\", והצד השני טוען שתמיד יש זליגה מרקמת השומן ולכן כדאי לנקות אותה, ושניקוי מעורר גם ריפוי ואוטופגיה ומהווה מנוחה למערכת העיכול. שקופית: 11 - הרעלים מסיסי השומן אגורים ברקמת השומן","slides":"","section":"A"},{"n":11,"text":"אילו מבין הבאים הם עקרונות שהוזכרו כדרושים לניקוי רעלים יעיל?","options":{"A":"לעודד הפרשה של רעלים מרקמת השומן","B":"לספק לכבד את המולקולות הדרושות לתהליך נטרול הרעלים","C":"להימנע כליל מכל פעילות גופנית","D":"להגדיל צריכת סוכר פשוט כדי לספק אנרגיה לכבד","E":"תזונה דלת קלוריות אינה קשורה כלל ליכולת הגוף לנקות רעלים","F":"להגדיל חדירת רעלים חדשים לגוף כדי לחזק את המערכת החיסונית","G":"אין צורך בשום עיקרון מיוחד - ניקוי רעלים קורה מאליו תמיד"},"answer":["A","B"],"multi":true,"explanation":"שקופית 12 מפרטת שלושה עקרונות דרושים לניקוי יעיל: לעודד הפרשת רעלים מרקמת השומן, לספק לכבד את המולקולות הדרושות לנטרול, ולצמצם חדירת רעלים חדשים (ולא להגדיל אותה כפי שמוצע באחת מהתשובות השגויות). שקופית: 12 - שלושת העקרונות הדרושים לניקוי רעלים יעיל","slides":"","section":"A"},{"n":12,"text":"מהי ה\"הוכחה המדעית\" שמוצגת במצגת לכך שקיים תהליך ניקוי רעלים אמיתי בגוף?","options":{"A":"תזונה דלת קלוריות גורמת לירידה בייצור האנזימים הדרושים לנטרול רעלים","B":"תזונה דלת קלוריות גורמת לייצור מוגבר של האנזימים הדרושים לנטרול הרעלים","C":"צום מים מוכיח מדעית שהכבד מפסיק לתפקד","D":"אין שום הוכחה מדעית לתופעת ניקוי הרעלים","E":"תזונה עתירת קלוריות מעלה את ריכוז האנזימים המנטרלים רעלים","F":"חוקן קפה הוא ההוכחה המדעית היחידה לניקוי רעלים","G":"צום ענבים הוא ההוכחה המדעית המרכזית לניקוי רעלים"},"answer":["B"],"multi":false,"explanation":"השקופית מציינת שתזונה דלת קלוריות גורמת לייצור מוגבר של האנזימים הדרושים לנטרול הרעלים - זו העדות המדעית המובאת לכך שתהליך ניקוי הרעלים אכן מתרחש. שקופית: 12 - מהי ההוכחה המדעית שיש ניקוי רעלים","slides":"","section":"A"},{"n":13,"text":"אילו מהקביעות הבאות לגבי יתרונות תזונה דלת קלוריות בהקשר ניקוי רעלים נכונות?","options":{"A":"תזונה דלת קלוריות מגדילה את כמות הרעלים הנכנסת לגוף","B":"תזונה דלת קלוריות מגבירה את פירוק רקמת השריר בלבד ואינה משפיעה על רקמת השומן","C":"חיסכון באנרגיה לצורך עיכול פוגע ביכולת הגוף לבצע פעולות אחרות","D":"תזונה דלת קלוריות מגדילה את כמות הרעלים הנוצרת בגוף","E":"תזונה דלת קלוריות מפחיתה את ייצור האנזימים האחראים על נטרול רעלים","F":"ניקוי רעלים חייב להיות טבעוני לחלוטין כדי להיחשב יעיל","G":"מזון מן החי מכיל פחות רעלים ממזון צמחי ולכן מומלץ בזמן ניקוי","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"לפי שקופית 13, תזונה דלת קלוריות דווקא מקטינה את כמות הרעלים הנכנסת ונוצרת בגוף, מגבירה ייצור אנזימי נטרול, וחוסכת אנרגיית עיכול המאפשרת פעולות אחרות. כמו כן ניקוי אינו חייב להיות טבעוני (אם כי טבעוני יעיל פחות), ומזון מן החי דווקא מכיל יותר רעלים ממזון צמחי. שקופית: 13 - יתרונות תזונה דלת קלוריות; האם ניקוי חייב להיות טבעוני","slides":"","section":"A"},{"n":14,"text":"אילו מהפעולות הבאות מומלצות, לפי המצגת, כדי לצמצם את חדירת הרעלים החדשים לגוף בזמן ניקוי?","options":{"A":"להימנע ממזון מן החי בזמן הניקוי","B":"להימנע ממזון תעשייתי ולהתבסס על מזון אורגני","C":"להיות ברוגע ולא בסטרס","D":"לצרוך כמה שיותר תרופות מרשם כדי לתמוך בכבד","E":"לשתות אלכוהול במידה כדי לעודד את הכבד","F":"לשהות במקום מזוהם אוויר כדי לחזק את מערכת החיסון","G":"לשתות כמה שפחות מים כדי לא להעמיס על הכליות"},"answer":["A","B","C"],"multi":true,"explanation":"שקופית 14 מפרטת דרכים לצמצום חדירת רעלים חדשים: הימנעות ממזון מן החי, ממזון תעשייתי, מתרופות ומאלכוהול, שהייה במקום עם אוויר נקי, רוגע ולא סטרס, ושתיית מים נקיים - ולא ההפך כפי שמוצג בתשובות השגויות. שקופית: 14 - כיצד לצמצם חדירת רעלים חדשים","slides":"","section":"A"},{"n":15,"text":"אילו מהקביעות הבאות על שלב 2 (Phase 2) של נטרול הרעלים נכונות?","options":{"A":"אחד המסלולים המרכזיים הוא צימוד גלוטטיון","B":"מסלול נוסף הוא צימוד חומצות אמינו כמו גלוטמין, גליצין וציסטאין","C":"חומצות אמינו אלו (גלוטמין, גליצין, ציסטאין) אינן חומצות אמינו חיוניות","D":"יש מסלולים המצמדים קבוצת מתיל או קבוצת אצטיל לרעלן","E":"אדם עם מסת שריר נמוכה מאוד נמצא בסכנה גדולה יותר כשהוא עושה ניקוי רעלים","F":"לעיתים הפעולה הנכונה יותר לשיפור הבריאות היא בניית מסת שריר ולא צום מיצים ארוך","G":"מטרת שלב 2 היא להפוך את המולקולה למסיסת מים לחלוטין"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"שקופית 15 מפרטת את מסלולי שלב 2 - צימוד גלוטטיון, צימוד חומצות אמינו (שאינן חיוניות), וצימוד קבוצת מתיל/אצטיל - כולם לשם הפיכת המולקולה למסיסת מים לחלוטין. כן מודגש שאדם עם מסת שריר נמוכה בסיכון מוגבר, ולעיתים בניית שריר עדיפה על צום ארוך. שקופית: 15 - הפיכת המולקולה למסיסת מים לחלוטין (Phase 2)","slides":"","section":"A"},{"n":16,"text":"איזה מהחומרים הבאים מתואר כנמצא בריכוז הגבוה ביותר בנבטי ברוקולי, ותומך בפעילות אנזימי הגלוטטיון?","options":{"A":"טאורין","B":"סלניום","C":"סולפורפאן","D":"כורכומין","E":"רסברטרול","F":"סילימארין","G":"ויטמין C"},"answer":["C"],"multi":false,"explanation":"לפי שקופית 16, סולפורפאן נמצא בירקות המצליבים ובריכוז הגבוה ביותר דווקא בנבטי ברוקולי, ותומך בתהליך נטרול הרעלים. שקופית: 16 - חומרים תומכי Phase 2 (טאורין, סלניום, סולפורפאן ועוד)","slides":"","section":"A"},{"n":17,"text":"אילו מהקביעות הבאות לגבי כורכומין ורסברטרול נכונות?","options":{"A":"כורכומין נמצא במחקרים כמפעיל אנזימים המייצרים גלוטטיון ומעלה בפועל את רמת הגלוטטיון בדם","B":"כורכומין נמצא כמגן מפני רעלים המנוטרלים בכבד, כגון אצטמינופן (אקמול)","C":"רסברטרול מופק בעיקר מבשר אדום ומוצרי חלב","D":"סילימארין הוא החומר הפעיל בג'ינג'ר","E":"כורכומין מוריד את רמת הגלוטטיון בדם","F":"אקמול (אצטמינופן) הוא חומר שמסייע בייצור גלוטטיון","G":"סילימארין אינו מוזכר כלל במצגת"},"answer":["A","B"],"multi":true,"explanation":"שקופית 16 מציינת שכורכומין מפעיל אנזימים המייצרים גלוטטיון ומעלה את רמתו בדם, וכן מגן מפני רעלים המנוטרלים בכבד כגון אקמול. רסברטרול מקורו בענבים אדומים, יין אדום, פירות יער, פיסטוקים וקקאו - לא בבשר או חלב, וסילימארין הוא החומר הפעיל בגדילן (מרייה קדושה) ולא בג'ינג'ר. שקופית: 16 - כורכומין, רסברטרול וסילימארין","slides":"","section":"A"},{"n":18,"text":"אילו מהקביעות הבאות לגבי מיצים ואנזימי P450 בהקשר ניקוי רעלים נכונות?","options":{"A":"נרינגין (מיץ אשכוליות) מגביר את פעילות אנזימי P450 ולכן מומלץ לשתייה מרובה בזמן ניקוי","B":"הימנעות ממזונות אלרגניים אינה קשורה כלל ליעילות תהליך הניקוי","C":"מצב נפשי של שלווה ושמחה אינו משפיע על יעילות הניקוי","D":"כל המיצים הטבעיים, ללא יוצא מן הכלל, מומלצים לשתייה בזמן ניקוי רעלים","E":"מיץ אשכוליות הוא המיץ המומלץ ביותר לניקוי רעלים בזכות ההשפעה שלו על הכבד","F":"אין שום מיץ טבעי שכדאי להימנע ממנו בזמן ניקוי רעלים","G":"תנאים נפשיים כמו סטרס אינם משפיעים על מהלך הניקוי","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"שקופית 17 מציינת שיש מיץ טבעי (עשיר בנרינגין) שכדאי דווקא להימנע ממנו בזמן ניקוי, ושהימנעות ממזונות אלרגניים ושלווה נפשית הן תנאים נוספים שכן מסייעים לניקוי - כל הקביעות בשאלה זו הפוכות מהמוצג. שקופית: 17 - איזה מיץ טבעי לא כדאי לשתות תוך כדי ניקוי רעלים","slides":"","section":"A"},{"n":19,"text":"אילו מהגורמים הבאים מוזכרים כגורמי סיכון או כקשורים לכבד שומני?","options":{"A":"עודף משקל ושומן בטני","B":"עמידות לאינסולין","C":"תת פעילות של בלוטת התריס","D":"פלורת מעיים לא מאוזנת - קשורה לסיכון להידרדרות לכבד שומני דלקתי","E":"שחלות פוליציסטיות ודום נשימה בשינה","F":"תרופות מסוימות כמו סטרואידים, טמוקסיפן וכימותרפיות מסוימות","G":"אלכוהוליזם ומזון מתועש ומעובד"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"שקופית 18 מפרטת רשימה רחבה של גורמים הקשורים לכבד שומני, ובהם עודף משקל, עמידות לאינסולין, תת פעילות בלוטת התריס, פלורת מעיים לא מאוזנת, שחלות פוליציסטיות, דום נשימה בשינה, תרופות מסוימות, אלכוהוליזם, גנטיקה ומזון מעובד. שקופית: 18 - מהן הסיבות העיקריות לכבד שומני","slides":"","section":"A"},{"n":20,"text":"אילו מהקביעות הבאות מופיעות במצגת תחת \"דגשים חשובים בהקשר לניקוי רעלים\"?","options":{"A":"ניקוי המעי הגס אינו ניקוי רעלים מהגוף","B":"תוכנית ניקוי אינה הפתרון לכל בעיה (כגון חוסר איזון הורמונלי, חוסרים תזונתיים, דלקת, חוסר מסת שריר)","C":"הרבה יותר חשוב לשים דגש יומיומי על צמצום חשיפה לרעלים מאשר על פרויקט ניקוי פעם בשנה","D":"פרויקט ניקוי יכול להחליף לחלוטין את תהליך הניקוי היומיומי הטבעי של הגוף","E":"ניקוי המעי הגס זהה לחלוטין לניקוי רעלים מהגוף","F":"תוכנית ניקוי רעלים היא הפתרון האידיאלי לכל בעיה בריאותית כולל חוסר איזון הורמונלי","G":"אין כל חשיבות לצמצום חשיפה יומיומית לרעלים כל עוד עושים ניקוי שנתי"},"answer":["A","B","C"],"multi":true,"explanation":"שקופית 19 מדגישה שניקוי המעי הגס אינו ניקוי רעלים מהגוף, שתוכנית ניקוי אינה פותרת כל בעיה בריאותית, ושדגש יומיומי על צמצום חשיפה לרעלים חשוב הרבה יותר מפרויקט ניקוי שנתי - ושפרויקט ניקוי אינו יכול להחליף את תהליך הניקוי היומיומי הטבעי. שקופית: 19 - דגשים חשובים בהקשר לניקוי רעלים","slides":"","section":"A"},{"n":21,"text":"מדוע צום ענבים נחשב כמקנה תחושת ניקוי ומונע עצירות במהלך הצום, לפי המצגת?","options":{"A":"בזכות החומצה הטרטרית שיש לה השפעה משלשלת עדינה","B":"בזכות תכולת החלבון הגבוהה בענבים","C":"משום שענבים אינם מכילים קלוריות כלל","D":"בזכות תכולת המלח הגבוהה בענבים; בזכות תכולת השומן הרווי בענבים","E":"בזכות תכולת הברזל הגבוהה בענבים; בזכות תכולת הסיבים הגבוהה בענבים"},"answer":["A"],"multi":false,"explanation":"לפי שקופית 20, הענבים משלשלים בעדינות בזכות החומצה הטרטרית שבהם, מה שמקנה תחושת ניקוי ומונע עצירות במהלך הצום. חשוב לזכור שגם בצום ענבים חייבים גרעון קלורי ואי אפשר לאכול ענבים ללא הגבלה. שקופית: 20 - צום ענבים","slides":"","section":"A"},{"n":22,"text":"אילו מהקביעות הבאות לגבי בחירת עוצמת צום הניקוי נכונות?","options":{"A":"עדיף תמיד ניקוי מהיר ועוצמתי על פני ניקוי איטי, ללא קשר למצב הבריאותי","B":"תוצאות ניקוי איטי וממושך תמיד גרועות יותר מתוצאות ניקוי מהיר","C":"גיל האדם ומצב בריאותו אינם קשורים כלל לבחירת עוצמת הצום","D":"קל יותר לשמר מסת שריר בזמן ניקוי מהיר מאשר בזמן ניקוי איטי","E":"נוכחות כבד שומני או צריכת תרופות אינה משפיעה על בחירת עוצמת הניקוי","F":"ניקוי הרעלים מתחיל להיות משמעותי כבר בשעה הראשונה של הצום ואינו קשור לפירוק שומן","G":"מידת ההכנה והתזונה בתקופה שלפני הצום אינה משפיעה על בחירת העוצמה","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"שקופית 21 מציינת שהבחירה בעוצמת הצום תלויה בהכנה מוקדמת, במשך הצום המתוכנן, בכבד שומני/תרופות, בגיל ובמצב הבריאות, ושתמיד עדיף ניקוי איטי וממושך יותר - בטוח יותר וקל יותר לשמר בו מסת שריר. ניקוי משמעותי מתחיל רק מהיום השני-השלישי, לא מיד. שקופית: 21 - איזו עצימות כדאי לבחור; מתי מתחיל ניקוי הרעלים","slides":"","section":"A"},{"n":23,"text":"אילו מהפעולות הבאות מומלצות כדי לצמצם איבוד מסת שריר בזמן ניקוי רעלים?","options":{"A":"להגדיל מסת שריר בתקופה שלפני הניקוי","B":"לבצע תרגילים לשימור והגדלת מסת שריר במהלך הניקוי","C":"להימנע מכל פעילות גופנית לפני הניקוי כדי לשמור אנרגיה","D":"ככל שהניקוי עוצמתי יותר, קל יותר לשמר מסת שריר","E":"לאבד מסת שריר קל מאוד ולבנות אותה בחזרה זה גם קל וזריז","F":"ככל שמתבגרים, קל יותר לבנות מסת שריר","G":"אין צורך בפעילות בונת שריר לאחר תום צום הניקוי"},"answer":["A","B"],"multi":true,"explanation":"שקופית 22 ממליצה להגדיל מסת שריר לפני הניקוי, לבצע תרגילי שימור והגדלה במהלכו, ולהגדיל פעילות בונת שריר גם לאחריו. ככל שהצום עוצמתי יותר - קשה יותר (לא קל יותר) לשמר מסת שריר, לאבד מסת שריר קל אך לבנות אותה מחדש קשה מאוד, וככל שמתבגרים - קשה יותר לבנות מסת שריר. שקופית: 22 - צמצום איבוד מסת שריר בזמן ניקוי רעלים","slides":"","section":"A"},{"n":24,"text":"אילו מהקביעות הבאות לגבי ירידה מהירה במשקל בימים הראשונים של תזונה קטוגנית נכונות?","options":{"A":"הירידה המהירה במשקל אינה מעידה על ניקוי רעלים עוצמתי","B":"הירידה נובעת מהתרוקנות מאגרי הגליקוגן","C":"גליקוגן קושר איתו מים, ולכן ריקונו גורם לירידה מהירה במשקל מים","D":"עוצמת ניקוי הרעלים תלויה בגרעון קלורי לאורך זמן, ולא בסוג התפריט הספציפי","E":"תזונה קטוגנית כשלעצמה אינה ערובה לניקוי רעלים מהיר או עוצמתי","F":"יש להיזהר מפרשנות שגויה של ירידה מהירה במשקל כאילו מדובר בניקוי רעלים מוצלח במיוחד","G":"ירידה מהירה במשקל בימי הקטוגנית הראשונים קשורה בעיקר לאובדן מים ולא לפירוק רקמת שומן משמעותי"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"שקופית 23 מבהירה שהירידה המהירה במשקל בתחילת תזונה קטוגנית נובעת מהתרוקנות מאגרי הגליקוגן (שקושר מים), ואינה מעידה על ניקוי רעלים עוצמתי - שכן ניקוי הרעלים תלוי בגרעון קלורי לאורך זמן ולא בסוג התפריט. שקופית: 23 - האם ירידה מהירה במשקל בתזונה קטוגנית מעידה על ניקוי עוצמתי","slides":"","section":"A"},{"n":25,"text":"אילו מהפעולות הבאות מומלצות כהכנה לצום ניקוי רעלים עוצמתי?","options":{"A":"לאכול מזון טבעי בלבד וללא מזון מעובד ותעשייתי, ולהתחיל להפחית קלוריות זמן מה לפני הצום","B":"להיגמל מקפאין לפני תחילת הצום","C":"להפסיק צריכת מזונות אלרגניים נפוצים (גלוטן, סויה, שומשום, בוטנים) שבועות לפני תחילת הצום","D":"להגדיל צריכת אלכוהול כדי \"לנקות\" את הכבד מראש","E":"להפסיק לחלוטין כל פעילות גופנית בונת שריר לפני הצום","F":"להימנע ממודעות לצריכת חלבון ולאכול כרצון","G":"להקטין את כמות הירקות והעלים הירוקים לפני הצום"},"answer":["A","B","C"],"multi":true,"explanation":"שקופית 23 ממליצה על מזון טבעי בלבד, הפחתת קלוריות מבעוד מועד, הגדלת מצליבים-שום-בצל, גמילה מקפאין, מודעות לחלבון, הגדלת צריכת ירקות ועלים ירוקים, הגדלת פעילות בונת שריר, והפסקת מזונות אלרגניים שבועות מראש - ולא ההפך. שקופית: 23 - כיצד נכון להתכונן לצום ניקוי רעלים עוצמתי","slides":"","section":"A"},{"n":26,"text":"אילו מהקביעות הבאות לגבי צום מיצים נכונות?","options":{"A":"ככל שיש יותר מיצי פירות ופחות מיצי ירקות, הצום עוצמתי יותר","B":"מומלץ לשתות את המיץ בלגימה מהירה ולא לאט","C":"גבעולי סלרי אינם מכילים מלחים כלל","D":"מסחטת מיצים בטכנולוגיה של סחיטה מהירה ובחום גבוה עדיפה על פני סחיטה איטית","E":"בשבת אסור לאכול פירות שלמים במקום מיצים","F":"מיצים ירוקים נחשבים לפחות עוצמתיים מאשר מיצי פירות מתוקים","G":"גבעולי סלרי אינם מתאימים לאף אדם משום שהם רעילים","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"לפי שקופיות 24-25, ככל שיש יותר מיצי ירקות (במיוחד ירוקים) ופחות מיצי פירות - הצום עוצמתי יותר; מומלץ לשתות לאט (\"לאכול את המיץ\"); רצויה מסחטה בטכנולוגיית סחיטה איטית; גבעולי סלרי כן מכילים מלחים (ויש רגישים לכך); ובשבת אפשר לאכול פירות שלמים במקום מיצים. שקופית: 24-25 - דגשים לצום מיצים","slides":"","section":"A"},{"n":27,"text":"איזה מהבאים אינו מוזכר ברשימת הסימנים האפשריים לניקוי מהיר מדי?","options":{"A":"כאבי ראש","B":"בחילות","C":"נזלת מרובה","D":"עלייה חדה ומתמשכת בלחץ הדם","E":"ליחה","F":"פריחה","G":"החמרה לעיתים בבעיות רפואיות קיימות"},"answer":["D"],"multi":false,"explanation":"הרשימה שהוצגה בשקופית 26 כוללת כאבי ראש, בחילות, נזלת מרובה, ליחה, פריחה, ולעיתים החמרה בבעיות רפואיות קיימות - אך לא עלייה בלחץ הדם. שקופית: 26 - סימנים אפשריים לניקוי מהיר מדי","slides":"","section":"A"},{"n":28,"text":"אילו מהפעולות הבאות מוצעות במצגת כדי להאט צום ניקוי שמתקדם מהר מדי?","options":{"A":"להוסיף קלוריות, למשל פירות, שקדים ואגוזים או טחינה לסלט","B":"בצום מיצים - להוסיף מיצים עתירי סוכר כמו מיץ תפוחים, מיץ סלק וגזר","C":"להפסיק לחלוטין את הצום מיד ולעבור לצום מים","D":"להגביר את עוצמת הניקוי על ידי מעבר לצום מים","E":"להוריד עוד יותר את כמות הקלוריות הנצרכת","F":"להוסיף חוקן קפה יומיומי במקום להוסיף קלוריות","G":"לעבור ממיצי ירקות למיצים ירוקים בלבד"},"answer":["A","B"],"multi":true,"explanation":"שקופית 26 מציעה להוסיף קלוריות (פירות, שקדים ואגוזים, טחינה) כדי להאט צום ניקוי, ובצום מיצים ספציפית - להוסיף מיצים עתירי סוכר כמו מיץ תפוחים, סלק וגזר. הפחתת קלוריות נוספת או מעבר לצום מים יגבירו את עוצמת הניקוי ולא יאטו אותו. שקופית: 26 - כיצד להאט צום ניקוי","slides":"","section":"A"},{"n":29,"text":"אילו מהפעילויות הבאות מוזכרות כפעילות תומכת לצום ניקוי רעלים?","options":{"A":"רגיעה ושלווה","B":"פעילות גופנית אירובית ובניית מסת שריר, בעדינות","C":"שינה טובה ומספקת","D":"נשימות סרעפתיות","E":"סאונה יבשה או אינפרא-אדומה","F":"עיסויים, כולל אפשרות לעיסוי עצמי עם מברשת לכיוון הלב","G":"מקלחות חמות המסתיימות במים קרים, וחוקנים"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"שקופית 27 מפרטת רשימת פעילויות תומכות לצום ניקוי: רגיעה ושלווה, פעילות גופנית עדינה (אירובי ובניית שריר), שינה טובה, נשימות סרעפתיות, סאונה (יבשה או אינפרא-אדומה), עיסויים (כולל עצמי), מקלחות חמות המסתיימות בקרות, וחוקנים. שקופית: 27 - פעילות תומכת לצום ניקוי רעלים","slides":"","section":"A"},{"n":30,"text":"אילו מהקביעות הבאות לגבי חוקנים במהלך צום הניקוי, ובפרט חוקן קפה, נכונות?","options":{"A":"שימוש בתדירות גבוהה של חוקנים עלול ליצור תלות של המעי הגס","B":"חוקן קפה עוזר בשיפור תנועתיות המעי ובשיכוך כאבים, ומרחיב את צינוריות המרה בכבד","C":"יש להשתמש בקפה אורגני בקלייה בינונית לחוקן, ולא בקפה רגיל לשתייה","D":"אין שום סיכון בביצוע חוקנים בתדירות גבוהה מאוד","E":"חוקן קפה מגביר את ההשפעה הסיסטמית של הקפאין בגוף יותר משתיית קפה רגילה","F":"חוקנים אינם יכולים לגרום להפרשת מלחים מהגוף בשום מקרה","G":"חוקן קפה נועד להחליף לחלוטין את שלב 2 של נטרול הרעלים בכבד"},"answer":["A","B","C"],"multi":true,"explanation":"שקופיות 28-29 מציינות שחוקנים בתדירות גבוהה עלולים ליצור תלות של המעי הגס ולגרום להפרשת מלחים גדולה; חוקן קפה משפר תנועתיות מעי, משכך כאבים ומרחיב את צינוריות המרה בכבד; ויש להשתמש בקפה אורגני בקלייה בינונית ולא בקפה רגיל לשתייה. חוקן קפה דווקא מונע את ההשפעה הסיסטמית של הקפאין (לא מגביר אותה), ואינו מחליף את שלב 2 אלא מסייע לו. שקופית: 28-29 - חוקן במהלך צום הניקוי; חוקן קפה","slides":"","section":"A"},{"n":1,"text":"אישה בהריון בשבוע 20 מבקשת להצטרף לתוכנית ניקוי רעלים עוצמתית (צום מיצים ירוקים) ששמעה עליה מחברה. מה ההמלצה הנכונה לפי העקרונות שהוצגו?","options":{"A":"לעודד אותה לבצע דווקא צום מים כי הוא הבטוח ביותר להריון","B":"להסביר לה שהריון הוא אחד המצבים שבהם אין לעשות ניקוי רעלים כלל","C":"לאשר לה לבצע את הניקוי בתנאי שתוסיף מלח לתפריט","D":"לאשר את הניקוי רק אם תעשה זאת בשליש השלישי להריון","E":"להמליץ לה על ניקוי מתכות כבדות באמצעות כילציה כתחליף בטוח יותר","F":"לאשר את הניקוי בתנאי שתעשה חוקן קפה יומי","G":"להמליץ לה להתחיל בהדרגה מיום ניקוי אחד בשבוע"},"answer":["B"],"multi":false,"explanation":"הריון מופיע במפורש ברשימת המצבים שבהם אין לעשות ניקוי רעלים כלל, ולכן יש להימנע מכל פרוטוקול ניקוי, גם מתון, בזמן ההריון. שקופית: 32 - מתי ולמי לא עושים ניקוי (הריון, הנקה, מחלת כליות, ילדים ועוד)","slides":"","section":"B"},{"n":2,"text":"מטופל בן 58 עם שחמת כבד (מחלת כבד מתקדמת) מעוניין לבצע צום מים עוצמתי בן שבוע. מהי הגישה הנכונה?","options":{"A":"יש לנקוט זהירות רבה מאוד, שכן מחלת כבד ובמיוחד שחמת כבד מוזכרות כדורשות זהירות מיוחדת, ורצוי לשקול חלופה עדינה יותר במקום צום מים עוצמתי","B":"יש לאשר את הצום ללא הגבלה כל עוד הוא שותה הרבה מים; שחמת כבד אינה מוזכרת כלל כגורם המצריך זהירות בהקשר ניקוי רעלים","C":"יש להמליץ על צום מים בשילוב חוקן קפה יומיומי כדי להאיץ את ההחלמה; אין כל בעיה, כי דווקא מטופלים עם מחלת כבד זקוקים לניקוי העוצמתי ביותר","D":"יש להמליץ לו לעבור ישירות לניקוי מתכות כבדות בשיטת כילציה כדי להקל על הכבד; שחמת כבד היא התוויית נגד באותה רמת חומרה בדיוק כמו הריון - אסור בהחלט בכל מצב"},"answer":["A"],"multi":false,"explanation":"מחלת כבד ובמיוחד שחמת כבד מוזכרות במפורש כדורשות \"זהירות רבה\" (בשונה מהריון, הנקה, מחלת כליות וילדים - שהן התוויות נגד מוחלטות) - כלומר יש להתייחס לכך בזהירות רבה ובהחלט לא לבחור בפרוטוקול העוצמתי ביותר. שקופית: 32 - מתי ולמי לא עושים ניקוי","slides":"","section":"B"},{"n":3,"text":"אישה רזה במיוחד, ללא עודף משקל, מבקשת לבצע צום ניקוי ארוך כמו חברותיה. מה נכון להמליץ לה על פי העקרונות שהוצגו?","options":{"A":"לבצע דווקא צום ארוך יותר מהרגיל כי לרזים יש פחות רעלים ולכן הצום בטוח יותר","B":"אין שום צורך בזהירות נוספת עבור אנשים רזים","C":"יש לנקוט זהירות רבה יותר ולבצע צומות קצרים יותר, בשל הסיכון הגבוה יותר לאיבוד מסת שריר","D":"להמליץ לה על צום מים בלבד, כי הוא הכי מתאים לאנשים רזים","E":"להסביר לה שהיא כלל לא צריכה ניקוי כי לרזים אין רעלים","F":"להמליץ לה להימנע מכל פעילות גופנית בזמן הניקוי","G":"להמליץ לה להאריך את הצום כדי להגיע למשקל תקין יותר"},"answer":["C"],"multi":false,"explanation":"אנשים רזים ללא עודף משקל נמצאים בסיכון גבוה יותר לאיבוד מסת שריר בזמן ירידה במשקל, ולכן יש לנקוט זהירות רבה יותר ולהעדיף צומות קצרים יותר. גם לרזים יש רעלים, אך יש להיזהר במיוחד. שקופית: 31 - צום מים (המשך) - אנשים רזים וניקוי רעלים","slides":"","section":"B"},{"n":4,"text":"גבר בן 70 עם מסת שריר נמוכה מאוד (סרקופניה) מתכנן לבצע צום מיצים ממושך של מספר ימים רבים כדי \"לנקות רעלים\". מהי הגישה המומלצת?","options":{"A":"להסביר שאדם עם מסת שריר נמוכה מאוד נמצא בסכנה גדולה יותר בזמן ניקוי רעלים, ולעיתים הפעולה הנכונה יותר עבורו היא לבנות מסת שריר במקום לבצע צום מיצים ארוך","B":"לאשר את הצום בתנאי שיוסיף חוקן קפה יומי; להסביר לו שגיל וזהירות רבה אינם רלוונטיים כאן כלל","C":"להמליץ לו לוותר על כל פעילות גופנית לפני ואחרי הצום; להמליץ לו להאריך משמעותית את הצום כדי להעמיק את הניקוי","D":"להסביר שדווקא בגילו קל יותר לבנות בחזרה מסת שריר שתאבד בצום; לעודד אותו לבצע את הצום כפי שתכנן, ללא שינויים, כי מסת שריר אינה קשורה לניקוי רעלים"},"answer":["A"],"multi":false,"explanation":"המצגת מדגישה שאדם עם מסת שריר נמוכה מאוד נמצא בסכנה גדולה יותר בזמן ניקוי רעלים, ושלעיתים הפעולה הנכונה יותר לבריאות היא בניית מסת שריר ולא צום מיצים ארוך - חשוב במיוחד בגיל מבוגר, שבו קשה יותר לבנות מסת שריר מחדש. שקופית: 15/22 - חומצות אמינו ומסת שריר; שימור מסת שריר בגיל מבוגר","slides":"","section":"B"},{"n":5,"text":"אישה בת 45 עם עודף משקל, עמידות לאינסולין ושומן בטני מבקשת לדעת אם כבד שומני חוסם אותה מלעשות ניקוי רעלים. מה התשובה הנכונה?","options":{"A":"לא, בהחלט אפשר לעשות ניקוי רעלים גם עם כבד שומני, אך יש להתחשב בכך בבחירת העוצמה והקצב של הניקוי","B":"כן, כבד שומני הוא התוויית נגד מוחלטת לניקוי רעלים בדיוק כמו הריון","C":"יש לבצע דווקא את הניקוי העוצמתי ביותר כדי \"לרפא\" את הכבד השומני במהירות","D":"יש לבצע כילציה מיידית כפתרון לכבד שומני; כבד שומני משפר את היכולת לבצע ניקוי רעלים עוצמתי","E":"כבד שומני נגרם אך ורק מגנטיקה ואינו מושפע מתזונה; כבד שומני אינו קשור כלל לעודף משקל או לעמידות לאינסולין"},"answer":["A"],"multi":false,"explanation":"אנשים עם עודף משקל נמצאים בסבירות גבוהה יותר לכבד שומני, אך \"הם בהחלט יכולים\" לעשות ניקוי רעלים - יש רק להתחשב בכך, למשל בבחירת עוצמת הצום, שכן מצב כבד שומני מוזכר כגורם שיש לקחת בחשבון בבחירת עוצמת הניקוי. שקופית: 18/21 - כבד שומני; בחירת עוצמת הניקוי","slides":"","section":"B"},{"n":6,"text":"מטופל בן 75 עם סוכרת, הנוטל מספר תרופות מרשם קבועות, מתעניין בביצוע צום ניקוי רעלים עוצמתי. אילו שיקולים נכונים לגביו?","options":{"A":"גילו, היותו חולה סוכרת ונטילת תרופות מרשם - כל אלו מצבים המצריכים זהירות רבה מאוד לפי המצגת","B":"יש להמליץ לו לעבור ישירות לצום מים העוצמתי ביותר כדי לטפל בסוכרת","C":"יש להפסיק לו את כל התרופות באופן מיידי לפני תחילת כל ניקוי, ללא התייעצות","D":"גיל מבוגר אינו מוזכר כלל כגורם המצריך זהירות; חולי סוכרת אינם מוזכרים כלל כדורשים זהירות מיוחדת","E":"נטילת תרופות מרשם אינה רלוונטית לבחירת פרוטוקול ניקוי; אין שום מגבלה עליו כי הוא אינו סובל ממחלת כבד או כליות"},"answer":["A"],"multi":false,"explanation":"קשישים, חולי סוכרת ואנשים הנוטלים תרופות מרשם מופיעים במפורש ברשימת \"מצבים נוספים הדורשים זהירות רבה מאוד\" - כל שלושת המאפיינים של המטופל הזה מחייבים זהירות מוגברת. שקופית: 33 - מצבים נוספים הדורשים זהירות רבה מאוד","slides":"","section":"B"},{"n":7,"text":"אישה באמצע צום מיצים (בעיקר מיצי ירקות ופירות) מדווחת על כאבי ראש, חולשה ובחילות קלות ביום השלישי. מה הסביר ביותר ומה מומלץ לעשות?","options":{"A":"ייתכן חסר מלח, שכן ברוב הפירות והירקות יש יחסית מעט מלח, ותסמינים אלו עלולים לנבוע מכך; ניתן גם לשקול הוספת קלוריות כדי להאט את קצב הניקוי","B":"אין שום הסבר אפשרי לתסמינים כאלו במהלך צום מיצים; יש להפסיק לגמרי לשתות נוזלים עד להיעלמות התסמינים","C":"יש להוסיף מיד חוקן קפה בתדירות גבוהה כפתרון ראשוני; יש להגביר מיד לצום מים כדי להאיץ את הניקוי ולפתור את הבעיה","D":"התסמינים קשורים אך ורק לעודף מלח בתזונה ויש להימנע מכל מלח; זהו בהכרח סימן לניקוי רעלים מוצלח במיוחד ואין צורך בשום פעולה"},"answer":["A"],"multi":false,"explanation":"ברוב הפירות והירקות יש יחסית מעט מלח, וחסר מלח עלול לגרום לכאבי ראש, חולשה ובחילות אצל אנשים מסוימים; כמו כן מומלץ להוסיף קלוריות (למשל פירות, אגוזים) כדי להאט צום שמתקדם מהר מדי ולהקל על תסמינים. שקופית: 26/30 - סימנים לניקוי מהיר מדי; חסרונות בצום ניקוי (חסר מלח)","slides":"","section":"B"},{"n":8,"text":"גבר המעוניין לבצע ניקוי מתכות כבדות שואל אילו שיטות מוזכרות ומה מידת הסיכון שלהן. מה נכון להשיב?","options":{"A":"כילציה (chelation) מוזכרת כפעולה עם סיכונים, בעוד הזעה מתוארת כפעולה פשוטה ובטוחה יחסית לניקוי איטי של מתכות כבדות, וכן קיים תוסף (כלורלה) המתואר כסופח ומוציא מתכות כבדות מהגוף","B":"כלורלה מתוארת כמסוכנת ואסורה לשימוש; אין שום דרך בטוחה להיפטר ממתכות כבדות מהגוף","C":"הזעה אינה נחשבת כלל כדרך להיפטר ממתכות כבדות; שיער וציפורניים אינם קשורים כלל להפרשת מתכות כבדות","D":"כילציה היא השיטה הבטוחה ביותר ומומלצת לכל אדם ללא הגבלה; יש להעדיף תמיד כילציה על פני הזעה כי היא מהירה יותר וללא סיכונים"},"answer":["A"],"multi":false,"explanation":"חלק מהמתכות הכבדות יוצאות בהזעה, שיער וציפורניים; כילציה היא פעולה עם סיכונים; הזעה היא פעולה פשוטה ובטוחה לניקוי איטי; וכלורלה מתוארת כתוסף הסופח ומוציא מתכות כבדות מהגוף. שקופית: 32 - ניקוי מתכות כבדות","slides":"","section":"B"},{"n":9,"text":"צעיר בריא בן 28 מעוניין לנסות בפעם הראשונה בחייו צום ניקוי עוצמתי, אך חושש מהתמודדות עם צום ארוך. מה ההמלצה המתאימה ביותר על פי רעיון ה\"התחלה ההדרגתית\" שהוצג?","options":{"A":"להתחיל מיום צום ניקוי אחד, ובשבועות הבאים להוסיף בהדרגה יום נוסף של צום רציף בכל פעם (יומיים, שלושה ימים וכן הלאה)","B":"להתחיל בחוקן קפה יומי במקום כל צום אחר; להתחיל בצום ענבים בלבד לכל החיים ללא גיוון","C":"להתחיל בצום ארוך ולהפסיק בבת אחת אם קשה מדי; להתחיל ישירות בצום מים של שבוע שלם ללא הכנה מוקדמת","D":"להימנע לחלוטין מכל הכנה מוקדמת ולוותר על הפחתת קלוריות לפני הצום; אין שום דרך הדרגתית להתחיל צום ניקוי - חייבים לקפוץ ישר לעוצמה המקסימלית"},"answer":["A"],"multi":false,"explanation":"המצגת מציעה רעיון להתחלה הדרגתית: להתחיל מיום צום אחד, ואז בשבוע שלאחר מכן יומיים ברציפות, שבוע לאחר מכן שלושה ימים, וכן הלאה - כך שהגוף מסתגל בהדרגה לעוצמה גדלה. שקופית: 27 - רעיון להתחלה הדרגתית של צום עוצמתי","slides":"","section":"B"},{"n":10,"text":"מטופלת המבצעת תוכנית ניקוי רעלים מקפידה לשתות מדי בוקר כוס מיץ אשכוליות טרי כי היא חושבת שהוא \"מנקה\". מה נכון להסביר לה?","options":{"A":"מיץ אשכוליות מכיל נרינגין, שמשפיע על אנזימי P450 המעורבים בנטרול רעלים בכבד, ולכן זהו מהמיצים שכדאי להימנע משתייתם בזמן ניקוי רעלים","B":"מיץ אשכוליות מומלץ רק לאנשים עם כבד שומני; אין שום קשר בין מיצי הדרים לבין אנזימי הכבד","C":"נרינגין אינו משפיע כלל על תהליכי נטרול רעלים בכבד; יש להגביר את כמות מיץ האשכוליות כדי להאיץ את הניקוי","D":"מיץ אשכוליות הוא בדיוק המיץ המומלץ ביותר לניקוי רעלים; נרינגין הוא חומר שמצוי רק בענבים ואינו קשור למיץ אשכוליות"},"answer":["A"],"multi":false,"explanation":"יש להימנע משתיית מיץ עשיר בנרינגין בזמן ניקוי רעלים, שכן הוא משפיע על אנזימי המשפחה P450 המעורבים בתהליך נטרול הרעלים בכבד - מיץ אשכוליות ידוע כעשיר בנרינגין. שקופית: 17 - איזה מיץ טבעי לא כדאי לשתות תוך כדי ניקוי רעלים","slides":"","section":"B"},{"n":9000,"text":"פלורת מעיים לא מאוזנת - קשורה לסיכון להידרדרות לכבד שומני דלקתי — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["A"],"multi":false,"explanation":"המשפט נכון על פי החומר. שקופית 18 מפרטת רשימה רחבה של גורמים הקשורים לכבד שומני, ובהם עודף משקל, עמידות לאינסולין, תת פעילות בלוטת התריס, פלורת מעיים לא מאוזנת, שחלות פוליציסטיות, דום נשימה בשינה, תרופות מסוימות, אלכוהוליזם, גנטיקה ומזון מעובד. שקופית: 18 - מהן הסיבות העיקריות לכבד שומני","slides":"","section":"A","tf":1},{"n":9001,"text":"ניקוי המעי הגס זהה לחלוטין לניקוי רעלים מהגוף — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["B"],"multi":false,"explanation":"המשפט שגוי על פי החומר. שקופית 19 מדגישה שניקוי המעי הגס אינו ניקוי רעלים מהגוף, שתוכנית ניקוי אינה פותרת כל בעיה בריאותית, ושדגש יומיומי על צמצום חשיפה לרעלים חשוב הרבה יותר מפרויקט ניקוי שנתי - ושפרויקט ניקוי אינו יכול להחליף את תהליך הניקוי היומיומי הטבעי. שקופית: 19 - דגשים חשובים בהקשר לניקוי רעלים","slides":"","section":"A","tf":1},{"n":9002,"text":"הזעה היא אחת הדרכים בהן הגוף נפטר מרעלים — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["A"],"multi":false,"explanation":"המשפט נכון על פי החומר. שקופית 7 מפרטת את כל אמצעי הגוף להיפטרות מרעלים (צואה, שתן, הזעה, ציפורניים, שיער), ומציינת שתוכניות הניקוי מתמקדות בהפרשה דרך השתן בעוד תהליך הנטרול עצמו מתרחש בכבד. שקופית: 7 - האמצעים של הגוף להיפטר מרעלים","slides":"","section":"A","tf":1},{"n":9003,"text":"מטרת שלב 2 היא להפוך את המולקולה למסיסת מים לחלוטין — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["A"],"multi":false,"explanation":"המשפט נכון על פי החומר. שקופית 15 מפרטת את מסלולי שלב 2 - צימוד גלוטטיון, צימוד חומצות אמינו (שאינן חיוניות), וצימוד קבוצת מתיל/אצטיל - כולם לשם הפיכת המולקולה למסיסת מים לחלוטין. כן מודגש שאדם עם מסת שריר נמוכה בסיכון מוגבר, ולעיתים בניית שריר עדיפה על צום ארוך. שקופית: 15 - הפיכת המולקולה למסיסת מים לחלוטין (Phase 2)","slides":"","section":"A","tf":1},{"n":9004,"text":"רעלים מסיסי מים תמיד מסוכנים יותר כי הם חודרים לכל תא בגוף — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["B"],"multi":false,"explanation":"המשפט שגוי על פי החומר. רעלים מסיסי מים שאינם חודרים לתאים מופרשים בקלות דרך הכליה, בעוד רעלים מסיסי שומן חודרים לתאים ודורשים המרה למולקולות קוטביות (מסיסות מים) כדי שיוכלו לצאת - זהו האתגר האמיתי בניקוי רעלים. שקופית: 3 - רעלים מסיסי מים ומסיסי שומן","slides":"","section":"A","tf":1},{"n":9005,"text":"אין צורך בשום עיקרון מיוחד - ניקוי רעלים קורה מאליו תמיד — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["B"],"multi":false,"explanation":"המשפט שגוי על פי החומר. שקופית 12 מפרטת שלושה עקרונות דרושים לניקוי יעיל: לעודד הפרשת רעלים מרקמת השומן, לספק לכבד את המולקולות הדרושות לנטרול, ולצמצם חדירת רעלים חדשים (ולא להגדיל אותה כפי שמוצע באחת מהתשובות השגויות). שקופית: 12 - שלושת העקרונות הדרושים לניקוי רעלים יעיל","slides":"","section":"A","tf":1}]},{"id":"27","title":"סויה - אויב או ידיד","questions":[{"n":1,"text":"מהי המשמעות של הביטוי \"ER+\" (Estrogen receptor positive) בהקשר לגידולי שד, ומה ההשפעה של אסטרוגן על גידולים כאלה?","options":{"A":"הגידול אינו מבטא רצפטור לאסטרוגן, ולכן אסטרוגן מאט את גדילתו","B":"הגידול מבטא רצפטור לאסטרוגן, ואסטרוגן מאיץ את גדילתו","C":"הגידול מבטא רצפטור לפרוגסטרון בלבד","D":"ER+ מציין גידול עמיד לחלוטין לטיפול הורמונלי","E":"ER+ פירושו שהגידול אינו מגיב לשום הורמון","F":"הגידול מבטא רצפטור לאינסולין ולא לאסטרוגן","G":"אסטרוגן מעכב את גדילת גידולי ER+"},"answer":["B"],"multi":false,"explanation":"חלק מהגידולים בשד מבטאים רצפטור לאסטרוגן (ER+), ואסטרוגן מאיץ את גדילתם של גידולים אלו. שקופית: 2 - סרטן השד, מבוא","slides":"","section":"A"},{"n":2,"text":"אילו מהמשפטים הבאים נכונים לגבי מבנה רצפטור האסטרוגן (ER)?","options":{"A":"הרצפטור מורכב משתי תת-יחידות, אלפא או ביתא","B":"קיימות שלוש אפשרויות הרכבה: אלפא-אלפא, ביתא-ביתא, אלפא-ביתא","C":"הרצפטור מורכב תמיד משלוש תת-יחידות זהות","D":"תת-היחידה אלפא נמצאת בעצם ובכליות בלבד","E":"אין הבדל תפקודי בין תת-היחידות אלפא וביתא","F":"הרצפטור אינו יכול להיות מורכב משילוב של שתי תת-יחידות שונות","G":"ER-אלפא נמצא בעיקר בערמונית"},"answer":["A","B"],"multi":true,"explanation":"ה-ER מורכב משתי תת-יחידות (אלפא או ביתא), וקיימות שלוש אפשרויות הרכבה: אלפא-אלפא, ביתא-ביתא, או אלפא-ביתא. שקופית: 3 - ER, תת-יחידות","slides":"","section":"A"},{"n":3,"text":"אילו מהמשפטים הבאים לגבי התפלגות רצפטורי אסטרוגן בגוף נכונים?","options":{"A":"ER-אלפא נמצא בעיקר בעצם, בכליות ובמוח","B":"ER-ביתא נמצא בעיקר בשד וברחם","C":"ER-ביתא כלל אינו קיים בערמונית","D":"ER-אלפא הוא הרצפטור הדומיננטי בתאי גרנולוזה","E":"ER-ביתא נמצא בכבד בלבד ובשום רקמה אחרת","F":"שני סוגי הרצפטורים זהים לחלוטין מבחינת פיזור רקמתי","G":"ER-אלפא הוא הרצפטור היחיד הקיים בגוף האדם","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"ER-אלפא נמצא בעיקר בשד, רחם ותאי סטרומה; ER-ביתא נמצא בעצם, כליות, מוח, לב, רירית המעי, כלי דם, ערמונית ותאי גרנולוזה - כל המשפטים לעיל שגויים. שקופית: 3 - ER, פיזור רקמתי","slides":"","section":"A"},{"n":4,"text":"רצפטור מסוג ER-ביתא נמצא, בין היתר, ברקמות הבאות:","options":{"A":"עצם","B":"כבד","C":"שד","D":"ריאות","E":"לב","F":"רחם","G":"ערמונית"},"answer":["A","E","G"],"multi":true,"explanation":"ER-ביתא נמצא, בין היתר, בעצם, בלב ובערמונית. שד ורחם הם רקמות עשירות ב-ER-אלפא, וכבד וריאות אינם מוזכרים כרקמות מטרה של ER-ביתא במצגת. שקופית: 3 - ER-ביתא, פיזור רקמתי","slides":"","section":"A"},{"n":5,"text":"אילו מהמשפטים הבאים נכונים לגבי איזופלבונואידים (Isoflavones) ורצפטורי האסטרוגן?","options":{"A":"איזופלבונואידים הם מולקולות בצומח בעלות מבנה דומה לאסטרוגן שביונקים","B":"לחלק מהאיזופלבונואידים יש פעילות של נוגדי חמצון","C":"איזופלבונואידים מתפקדים כמעין SERMs - עלולים להפעיל רצפטור ברקמה אחת ולחסום אותו ברקמה אחרת","D":"אסטרדיול הוא האסטרוגן העיקרי בגוף ומפעיל את כל סוגי הרצפטורים","E":"SERMs הוא כינוי לחומרים שיכולים להפעיל רצפטור ברקמה אחת ולחסום אותו ברקמה שנייה","F":"חלק מהחומרים המווסתים את רצפטור האסטרוגן מפעילים אותו וחלקם חוסמים אותו","G":"איזופלבונואידים נמצאים בצמחים, ובעלי דמיון מבני לאסטרוגן ביונקים"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל המשפטים תואמים את ההגדרות במצגת - איזופלבונואידים הם מולקולות צמחיות דמויות אסטרוגן, בעלות פעילות מסוג SERM וחלקן בעלות פעילות נוגדת חמצון, ואסטרדיול מפעיל את כל סוגי הרצפטורים. שקופית: 4 - Estrogen receptors modulators, Isoflavones","slides":"","section":"A"},{"n":6,"text":"מהם המקורות הטבעיים העיקריים לאיזופלבונואידים בתזונה, על פי המצגת?","options":{"A":"פשתן ושומשום","B":"בשר בקר ועוף","C":"חלב פרה וגבינות","D":"ביצים ודגים","E":"אורז לבן בלבד","F":"שמן זית","G":"סוכר לבן"},"answer":["A"],"multi":false,"explanation":"המצגת מציינת כי המקורות הטבעיים העיקריים לאיזופלבונואידים הם פשתן ושומשום, ופיטואסטרוגנים נמצאים גם בפירות, ירקות וקטניות רבים נוספים. שקופית: 5 - Isoflavones, מקורות טבעיים","slides":"","section":"A"},{"n":7,"text":"אילו מהמשפטים הבאים נכונים לגבי גניסטאין (Genistein) ודאידזאין (Daidzein) בהקשר לסרטן השד, על פי סקירת דה למוס (de Lemos, 2001)?","options":{"A":"איזופלבונואידים אלו עלולים להאיץ גדילה של תאי סרטן שד בתרביות מעבדה","B":"הם פועלים כאנטגוניסטים לטמוקסיפן","C":"הם מגבירים את יעילות הטמוקסיפן פי כמה","D":"נשים עם סרטן שד בהווה או בעבר יכולות לצרוך כמות בלתי מוגבלת של תוספי איזופלבונואידים","E":"המסקנה הייתה שאין כל צורך בזהירות בנושא זה","F":"דה למוס בדק זאת רק על נבדקים גברים בריאים","G":"המחקר שנסקר בוצע על אוכלוסיות עכברים בלבד"},"answer":["A","B"],"multi":true,"explanation":"הסקירה מסכמת שאיזופלבונואידים כמו גניסטאין ודאידזאין עלולים להאיץ גדילה של תאי סרטן שד ופועלים כאנטגוניסטים לטמוקסיפן, ולכן נשים עם סרטן שד בהווה או בעבר צריכות להיזהר. שקופית: 6 - איזופלבונואידים וסרטן השד","slides":"","section":"A"},{"n":8,"text":"אילו מהממצאים הבאים דווחו במחקרים על בעלי חיים בנוגע להשפעת פיטואסטרוגנים על זכרים?","options":{"A":"נמצאה השפעה שלילית על זכרים בעשרות מחקרים","B":"נמצאה פגיעה קשה בהתפתחות אברי הרבייה ובפוריות","C":"נמצאה ירידה ברמות הטסטוסטרון","D":"נמצאה עלייה משמעותית בפוריות הזכרים","E":"נמצא שיפור בהתפתחות אברי הרבייה","F":"נמצאה עלייה ברמות הטסטוסטרון","G":"לא נמצאה כל השפעה על בעלי החיים הזכרים שנבדקו"},"answer":["A","B","C"],"multi":true,"explanation":"עשרות מחקרים על בעלי חיים מצאו השפעה שלילית של פיטואסטרוגנים על זכרים - פגיעה קשה בהתפתחות אברי הרבייה ובפוריות, וכן ירידה ברמות הטסטוסטרון. שקופית: 6 - השפעת פיטואסטרוגנים על זכרים (בעלי חיים)","slides":"","section":"A"},{"n":9,"text":"אילו מהמשפטים הבאים לגבי מסקנות הסקירה השיטתית של Fritz H (2013) על סויה וסרטן השד באדם נכונים?","options":{"A":"נמצא כי צריכת סויה קשורה לסיכון מוגבר למקרי סרטן שד חדשים","B":"נמצא אפקט אסטרוגני חזק של הסויה על בני אדם בהקשר לסרטן השד","C":"החוקרים המליצו על צריכה בלתי מוגבלת של תוספי פיטואסטרוגנים","D":"נמצא כי כמות הסויה בתזונה היפנית המסורתית מסוכנת לנשים שהחלימו מסרטן השד","E":"רמת איזופלבונים בדם נמצאה קשורה לעלייה בסיכון לסרטן השד","F":"הסקירה בדקה אך ורק מחקרים שנעשו על עכברים","G":"נמצא כי צריכת סויה קשורה לעלייה משמעותית בתמותה מסרטן השד","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"הסקירה מצאה בדיוק את ההפך - סיכון מופחת (לא מוגבר) למקרי סרטן שד חדשים, ללא אפקט אסטרוגני, המלצה לזהירות (לא צריכה בלתי מוגבלת) לגבי תוספים, בטיחות (לא סכנה) של הכמות היפנית המסורתית, הפחתה (לא עלייה) בסיכון הקשורה לרמת איזופלבונים, מחקרים על בני אדם (לא עכברים בלבד), וסיכון מופחת (לא עלייה) בתמותה. שקופית: 7 - מסקנות Fritz H, 2013","slides":"","section":"A"},{"n":10,"text":"אילו מהמשפטים הבאים משקפים נכונה את מסקנות הסקירה השיטתית (Fritz H, 2013) על סויה וסרטן השד?","options":{"A":"צריכת סויה קשורה לסיכון מופחת למקרי סרטן שד חדשים","B":"צריכת סויה קשורה לסיכון מופחת להישנות סרטן השד","C":"צריכת סויה קשורה לסיכון מופחת לתמותה מסרטן השד","D":"לא נמצא אפקט אסטרוגני של הסויה על בני אדם בהקשר לסרטן השד","E":"כמות הסויה הנצרכת בתזונה היפנית המסורתית נחשבת בטוחה לנשים שהחלימו מסרטן השד","F":"רמת איזופלבונים בדם נמצאה קשורה להפחתה בסיכון לסרטן השד","G":"החוקרים המליצו על זהירות לגבי תוספי פיטו-אסטרוגנים באופן ספציפי"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל אלו הם ממצאי הסקירה השיטתית של Fritz H (2013) - סיכון מופחת למקרים חדשים, להישנות ולתמותה, היעדר אפקט אסטרוגני, בטיחות הכמות היפנית המסורתית, קשר בין רמת איזופלבונים בדם להפחתת סיכון, והמלצה לזהירות לגבי תוספים מרוכזים. שקופית: 7 - מסקנות Fritz H, 2013","slides":"","section":"A"},{"n":11,"text":"במחקר של Mitchell (2001), בו נבדקה השפעת תוסף מזון פיטואסטרוגני על גברים במשך חודשיים, מה נמצא?","options":{"A":"לא הייתה כל השפעה על ספירת הזרע, תנועתיות הזרע, נפח האשך ונפח נוזל הזרע","B":"נמצאה ירידה חדה בספירת הזרע; נמצאה עלייה משמעותית בנפח האשך","C":"נמצאה ירידה בנפח נוזל הזרע בלבד; המחקר הראה עלייה ברמות הטסטוסטרון","D":"המחקר הופסק עקב תופעות לוואי קשות; נמצאה פגיעה קשה בתנועתיות תאי הזרע"},"answer":["A"],"multi":false,"explanation":"המחקר הראה שלא הייתה כל השפעה על ספירת הזרע, תנועתיות תאי הזרע, נפח האשך ונפח נוזל הזרע. שקופית: 8 - השפעה על גברים, Mitchell JH 2001","slides":"","section":"A"},{"n":12,"text":"אילו מהממצאים הבאים נכונים לגבי מחקרים על השפעת סויה/פיטואסטרוגנים על גברים בני אדם?","options":{"A":"מחקרים מבוקרי פלצבו לא מצאו השפעה על רמות הטסטוסטרון בדם (Hamilton-Reeves, 2010)","B":"מחקר על חלב סויה דל באיזופלבונואידים לא מצא השפעה על מדדי ספירת זרע (Beaton LK, 2010)","C":"נמצא כי רצפטורי ביתא מראים קשירה מועדפת וסלקטיבית לפיטואסטרוגנים, מה שעשוי להסביר את השוני מממצאי מחקרי בעלי החיים","D":"כל המחקרים על בני אדם הראו פגיעה קשה בפוריות הגברים","E":"נמצאה ירידה חדה בטסטוסטרון בכל הנבדקים הגברים שנבדקו","F":"תוצאות המחקרים בבני אדם תאמו לחלוטין את תוצאות מחקרי בעלי החיים","G":"לא בוצע מעולם אף מחקר מבוקר פלצבו בנושא זה בבני אדם"},"answer":["A","B","C"],"multi":true,"explanation":"מחקרים מבוקרי פלצבו לא מצאו השפעה על טסטוסטרון, מחקר נוסף לא מצא השפעה על ספירת זרע, וההסבר המוצע לשוני מממצאי בעלי החיים הוא קשירה סלקטיבית של פיטואסטרוגנים לרצפטורי ביתא. שקופית: 8-9, 14 - השפעה על גברים","slides":"","section":"A"},{"n":13,"text":"אילו מהמשפטים הבאים נכונים לגבי סויה כמזון, על פי המצגת?","options":{"A":"סויה מהווה מקור לחלבון מלא, המכיל חומצות אמינו שונות","B":"סויה מכילה מנגן בכמות רבה","C":"סויה אינה מכילה כל חלבון","D":"אכילת סויה כלל אינה מומלצת לאף אדם","E":"סויה מכילה כמות גבוהה של ויטמין D","F":"סויה נחשבת מקור עני בחומצות אמינו","G":"סויה מכילה ברזל בכמות המונעת לחלוטין ספיגתו"},"answer":["A","B"],"multi":true,"explanation":"המצגת מציינת כי סויה מהווה מקור לחלבון מלא עם חומצות אמינו שונות, ומכילה מנגן בכמות רבה. שקופית: 9 - נקודות נוספות, סויה","slides":"","section":"A"},{"n":14,"text":"אילו מהמשפטים הבאים נכונים לגבי מוצרי סויה שונים ורמת האיזופלבונואידים שבהם, על פי המצגת?","options":{"A":"טופו נוצר מחלב סויה שעבר תהליך הקרשה","B":"טמפה מיוצרת מפולי סויה שהושרו, בושלו חלקית ותססו באמצעות הוספת נבגי פטרייה","C":"חלב סויה מכיל מעט מאוד פלבנואידים","D":"רוטב סויה כיום הוא לרוב מוצר תעשייתי שעובר הידרוליזה","E":"צריכת סויה נמצאה קשורה לשיפור בפרופיל השומנים בדם (מטא-אנליזה של Anderson ואחרים, 1995)","F":"תהליך הכנת הטמפה כולל לעיתים גם הוספת חומץ המעודד את התרבות הפטרייה הספציפית","G":"קיימים מספר מוצרי סויה שונים, המבוססים על תהליכי הכנה שונים (הקרשה, תסיסה ועוד)"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל המשפטים תואמים את תיאור מוצרי הסויה במצגת - טופו כתוצר הקרשה, טמפה כתוצר תסיסה עם נבגי פטרייה וחומץ, חלב סויה דל בפלבנואידים, רוטב סויה כמוצר תעשייתי, וקשר בין סויה לשיפור בפרופיל השומנים. שקופית: 10 - סויה וכולסטרול, מוצרי סויה","slides":"","section":"A"},{"n":15,"text":"אילו מהמשפטים הבאים לגבי סרטן שחלה מסוג תאי גרנולוזה (Granulosa) והקשר לסויה נכונים?","options":{"A":"לתאים אלו אין כל רצפטור לאסטרוגן","B":"קיימים מחקרים רבים ומקיפים על בני אדם בנושא זה, המראים שסויה בטוחה לחלוטין","C":"גידול זה הוא הגידול השחלתי הנפוץ ביותר, ומהווה את רוב הגידולים בשחלה","D":"הרצפטורים בתאי גרנולוזה הם מסוג אלפא בלבד","E":"המצגת ממליצה במפורש לצרוך כמות בלתי מוגבלת של סויה בנשים עם גידול זה","F":"לא קיימת כל סיבה לזהירות לגבי תוספי איזופלבונואידים בהקשר לגידול זה","G":"סויה מוכחת כמונעת התפתחות של גידול זה","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"לתאי גרנולוזה יש רצפטורים לאסטרוגן מסוג ביתא (לא אלפא, ולא היעדר רצפטור), אין מחקרי אדם בנושא (לא מחקרים רבים המוכיחים בטיחות), גידול זה מהווה חלק קטן מכלל הגידולים בשחלה (לא הנפוץ ביותר), ומומלצת זהירות (לא צריכה בלתי מוגבלת) לגבי תוספים, ולא הוכח שסויה מונעת את הגידול. שקופית: 11 - סרטן שחלה מסוג גרנולוזה","slides":"","section":"A"},{"n":16,"text":"מה נמצא במחקרים על תאי סרטן שחלה מסוג גרנולוזה, הן בתרבית תאים אנושית והן בעכברים, בנוגע לסויה?","options":{"A":"סויה האיצה את התרבות תאי הגידול הקיים, אך לא הגדילה את הסיכון להיווצרות הגידול בעכברים","B":"לא בוצע אף מחקר על עכברים בנושא זה; סויה מנעה לחלוטין את התפתחות הגידול","C":"סויה הקטינה את קצב התרבות תאי הגידול; לא נמצא כל קשר בין סויה לגידול זה בשום מחקר","D":"הסויה גרמה להיעלמות מוחלטת של הגידול בעכברים; סויה הגדילה משמעותית את הסיכון להיווצרות הגידול בעכברים"},"answer":["A"],"multi":false,"explanation":"תרבית תאי סרטן גרנולוזה אנושיים הראתה שהתרבותם מואצת בנוכחות סויה, וגם בעכברים חולי גידול זה נמצאה אותה תוצאה; אולם סויה לא הגדילה את הסיכון להיווצרות הגידול בעכברים בריאים. שקופית: 12 - מחקרים על סרטן שחלה מסוג גרנולוזה","slides":"","section":"A"},{"n":17,"text":"אילו מהמשפטים הבאים לגבי תכולת איזופלבונואידים במוצרי סויה נכונים?","options":{"A":"טופו, אדממה, טמפה ונאטו מכילים כמויות נאותות של איזופלבונואידים","B":"חלב סויה מכיל מעט מאוד איזופלבונואידים","C":"תכולת האיזופלבונואידים משתנה בין מוצרי הסויה השונים","D":"לא כל מוצרי הסויה מכילים את אותה כמות איזופלבונואידים","E":"עיבוד מוצר הסויה משפיע על תכולת האיזופלבונואידים בו","F":"ידיעת תכולת האיזופלבונואידים במוצר רלוונטית להערכת חשיפה בנשים עם היסטוריה של סרטן שד","G":"קיים הבדל בין מוצרי סויה מותססים לחלב סויה מבחינת תכולת האיזופלבונואידים"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל המשפטים נכונים - טופו, אדממה, טמפה ונאטו מכילים כמויות נאותות, חלב סויה מכיל מעט מאוד, וקיים הבדל משמעותי בין המוצרים - עובדה בעלת רלוונטיות קלינית עבור נשים עם היסטוריה של סרטן שד. שקופית: 12 - איזופלבונואידים במוצרי סויה","slides":"","section":"A"},{"n":18,"text":"אילו מהממצאים הבאים דווחו במחקר של Strom BL (2001, JAMA) שבדק מבוגרים שקיבלו כתינוקות פורמולת סויה, בהשוואה למי שקיבלו פורמולה מבוססת חלב פרה?","options":{"A":"לא נמצא כל הבדל בגיל הופעת המחזור החודשי, גובה, משקל ובריאות כללית","B":"נמצא כי צריכת סויה בילדות (מספר פעמים בשבוע) הייתה בעלת אפקט מגן מפני סרטן שד בגיל מבוגר","C":"נמצאה פגיעה קשה בפוריות אצל מקבלי פורמולת הסויה","D":"נמצא כי כל מקבלי פורמולת הסויה סבלו מהשמנה","E":"נמצא כי גיל הופעת המחזור החודשי הגיע מוקדם משמעותית אצל מקבלות פורמולת הסויה","F":"המחקר בוצע רק על נבדקים זכרים","G":"נמצא כי צריכת הסויה בילדות הגבירה את הסיכון לסרטן שד בבגרות"},"answer":["A","B"],"multi":true,"explanation":"המחקר לא מצא הבדל בגיל הופעת המחזור, גובה, משקל ובריאות כללית בין מקבלי פורמולת סויה למקבלי פורמולה מבוססת חלב פרה, ונמצא שצריכת סויה בילדות היה בעל אפקט מגן מפני סרטן שד בגיל מבוגר. שקופית: 13 - פורמולות סויה לתינוקות, Strom BL 2001","slides":"","section":"A"},{"n":19,"text":"אילו מהממצאים הבאים דווחו בסקירה של Vandenplas Y (2014) שבדקה בטיחות פורמולות סויה לתינוקות?","options":{"A":"מדדי גוף כמו היקף ראש וגובה היו זהים בין הקבוצות שקיבלו פורמולות שונות","B":"ריכוזי סידן ואבץ בעצמות היו זהים בין הקבוצות","C":"מדדים חיסוניים ונוירו-קוגניטיביים נמצאו שונים באופן משמעותי בין הקבוצות","D":"נמצאה עדות חזקה לפגיעה במערכת הרבייה בקבוצת הסויה","E":"מסקנת החוקרים הייתה שיש להימנע לחלוטין משימוש בפורמולות מבוססות סויה","F":"נמצאה עדות לפגיעה קוגניטיבית קשה בילדים שקיבלו פורמולת סויה","G":"מסקנת החוקרים הייתה שפורמולות מבוססות סויה בטוחות לשימוש"},"answer":["A","B","G"],"multi":true,"explanation":"מדדי גוף וריכוזי סידן ואבץ היו זהים בין הקבוצות, ולא נמצאה עדות חזקה לפגיעה במערכת הרבייה; המדדים החיסוניים והנוירו-קוגניטיביים היו זהים (לא שונים) בין הקבוצות, ומסקנת החוקרים הייתה שפורמולות סויה בטוחות לחלוטין לשימוש. שקופית: 13 - מאמר סקירה, Vandenplas Y 2014","slides":"","section":"A"},{"n":20,"text":"אילו מהמשפטים הבאים בנוגע לסויה וספירת זרע/צריכת סויה ביפן נכונים?","options":{"A":"מחקר שבדק חלב סויה דל באיזופלבונואידים מצא פגיעה חמורה במדדי ספירת הזרע","B":"נמצא כי צריכת סויה גבוהה גורמת לעקרות מוחלטת אצל גברים","C":"במחקר של Beaton LK (2010) לא נבדק כלל נושא ספירת הזרע","D":"תושבי יפן אינם צורכים כלל מוצרי סויה בתזונתם המסורתית","E":"נמצא כי כל צריכת סויה, ללא יוצא מן הכלל, מסוכנת לבריאות הגבר","F":"מחקר שבדק חלב סויה דל באיזופלבונואידים מצא עלייה דרסטית בספירת הזרע","G":"לא בוצע אף מחקר שבחן צריכת סויה מסורתית ביפן","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"המחקר (Beaton LK, 2010) בדק חלב סויה דל באיזופלבונואידים ולא מצא כל השפעה (לא פגיעה ולא עלייה) על מדדי ספירת הזרע, ולא נמצאה עדות לעקרות מוחלטת; המצגת אף דנה בצריכת הסויה המסורתית ביפן. שקופית: 14 - סויה וספירת זרע, צריכת סויה ביפן","slides":"","section":"A"},{"n":21,"text":"מהם מנגנוני ההגנה שהציעו החוקרים להשפעה המגנה האפשרית של סויה מפני סרטן השד? בחר את הרשימה הנכונה ביותר:","options":{"A":"קשירה סלקטיבית בעיקר לרצפטורי ביתא, הקטנת רמות אסטרוגן חופשי בדם, עיכוב ביצירת כלי דם חדשים, הגברת אפופטוזיס בתאי סרטן שד ופעילות אנטיאוקסידנטית","B":"קשירה בלעדית לרצפטורי אלפא; פעילות פרו-אוקסידנטית בלבד","C":"הגברת קצב חלוקת תאי הגידול; עיכוב אפופטוזיס בתאי סרטן שד","D":"עידוד יצירת כלי דם חדשים בגידול; הגברת רמות אסטרוגן חופשי בדם בלבד"},"answer":["A"],"multi":false,"explanation":"המצגת מציעה חמישה מנגנוני הגנה אפשריים של סויה: קשירה סלקטיבית לרצפטורי ביתא, הקטנת אסטרוגן חופשי בדם, עיכוב יצירת כלי דם חדשים, הגברת אפופטוזיס דרך חלבון מדכא גידולים, ופעילות אנטיאוקסידנטית. שקופית: 15 - מנגנוני ההגנה של הסויה","slides":"","section":"A"},{"n":22,"text":"אילו מהבאים נמנים עם מנגנוני ההגנה שהציעו החוקרים כהסבר להשפעה המגנה האפשרית של סויה מפני סרטן השד?","options":{"A":"קשירה סלקטיבית בעיקר לרצפטורי ביתא","B":"עיכוב ביצירת כלי דם חדשים","C":"פעילות אנטיאוקסידנטית","D":"הגברת רמות אסטרוגן חופשי בדם","E":"עיכוב אפופטוזיס בתאי סרטן שד","F":"עידוד שגשוג בלתי מבוקר של תאי גידול","G":"פגיעה בחלבון מדכא גידולים (tumor suppressor protein)"},"answer":["A","B","C"],"multi":true,"explanation":"המנגנונים שהוצעו הם קשירה סלקטיבית לביתא, עיכוב יצירת כלי דם חדשים ופעילות אנטיאוקסידנטית - לעומת זאת, סויה מפחיתה (לא מגבירה) אסטרוגן חופשי, מגבירה (לא מעכבת) אפופטוזיס, ופועלת דרך (לא כנגד) חלבון מדכא גידולים. שקופית: 15 - מנגנוני ההגנה של הסויה","slides":"","section":"A"},{"n":23,"text":"אילו מהמשפטים הבאים, המסכמים את עמדת המצגת כלפי צריכת סויה במבוגרים בריאים, נכונים?","options":{"A":"ניתן וכדאי לאכול סויה","B":"סויה מהווה מקור לחלבון מלא","C":"במחקרים על בני אדם לא נמצא אפקט אסטרוגני מזיק של סויה בהקשר לסרטן השד","D":"יש לנקוט זהירות במיוחד לגבי תוספי איזופלבונואידים מרוכזים","E":"במחקרים בבני אדם (בניגוד לחלק ממחקרי בעלי החיים) לא נמצאה השפעה שלילית על פוריות או טסטוסטרון בגברים","F":"צריכת סויה נמצאה קשורה לשיפור בפרופיל שומני הדם","G":"יש לשים לב למקרים חריגים כמו נשים עם היסטוריה של סרטן שד או סרטן שחלה מסוג גרנולוזה, בהם מומלצת זהירות"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל המשפטים משקפים את מסקנת המצגת - סויה בטוחה ומומלצת לאוכלוסייה הכללית, עם המלצות זהירות ספציפיות לגבי תוספים מרוכזים ולאוכלוסיות מיוחדות. שקופית: 7, 9, 10, 11 - סיכום עמדת המצגת כלפי סויה","slides":"","section":"A"},{"n":24,"text":"אילו מהמשפטים הבאים נכונים לגבי המלצות זהירות ספציפיות בהקשר לסויה?","options":{"A":"נשים עם סרטן שד בהווה או בעבר נדרשות להיזהר מאפקט האנטגוניזם האפשרי לטמוקסיפן","B":"החוקרים ממליצים על זהירות לגבי תוספי פיטו-אסטרוגנים מרוכזים","C":"אין כל צורך בזהירות בשום מקרה קליני","D":"ההמלצה לזהירות חלה על כלל האוכלוסייה הבריאה ללא יוצא מן הכלל","E":"מומלצת זהירות מיוחדת לגבי נשים עם תוספי איזופלבונואידים בכמויות גבוהות","F":"ההמלצה לזהירות אינה קיימת כלל במחקר המדעי","G":"סויה נאסרה לשימוש באופן גורף בכל האוכלוסייה"},"answer":["A","B"],"multi":true,"explanation":"המלצות הזהירות הספציפיות במצגת מתייחסות לנשים עם סרטן שד בהווה או בעבר (עקב אנטגוניזם אפשרי לטמוקסיפן), ולזהירות כללית לגבי תוספי פיטו-אסטרוגנים מרוכזים - לא לאיסור גורף על האוכלוסייה הבריאה. שקופית: 6-7, 11 - המלצות זהירות","slides":"","section":"A"},{"n":25,"text":"אילו מהמשפטים הבאים נכונים?","options":{"A":"אסטרדיול הוא איזופלבונואיד ממקור צמחי","B":"SERMs הם חומרים שתמיד מפעילים את רצפטור האסטרוגן בכל הרקמות ללא יוצא מן הכלל","C":"ER-אלפא ו-ER-ביתא הם רצפטורים זהים לחלוטין מבחינת מבנה ותפקוד","D":"גניסטאין ודאידזאין הוכחו כמגבירים את יעילות הטמוקסיפן","E":"מחקרי בעלי החיים ומחקרי בני האדם בנושא פיטואסטרוגנים וזכרים הראו תוצאות זהות לחלוטין","F":"איזופלבונואידים אינם נמצאים בשום מזון מהצומח","G":"תאי סרטן שחלה מסוג גרנולוזה חסרים כל רצפטור לאסטרוגן","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"אסטרדיול הוא האסטרוגן העיקרי בגוף האדם (לא איזופלבונואיד צמחי), SERMs מפעילים ברקמה אחת וחוסמים באחרת (לא מפעילים בכל הרקמות), ER-אלפא וביתא שונים בפיזור ותפקוד, גניסטאין ודאידזאין הם אנטגוניסטים (לא מגבירי יעילות) לטמוקסיפן, תוצאות מחקרי בני אדם ובעלי חיים שונות, איזופלבונואידים כן נמצאים במזון מהצומח, ותאי גרנולוזה כן נושאים רצפטור ביתא. שקופית: 3, 4, 6, 9, 11 - סיכום מושגים","slides":"","section":"A"},{"n":26,"text":"מהו הכינוי הניתן לחומרים שיכולים להפעיל את רצפטור האסטרוגן ברקמה אחת ולחסום אותו ברקמה אחרת?","options":{"A":"SERMs - Selective Estrogen Receptor Modulators","B":"ACE inhibitors","C":"NSAIDs; Statins","D":"PPIs; SSRIs; Beta blockers"},"answer":["A"],"multi":false,"explanation":"חומרים המפעילים את רצפטור האסטרוגן ברקמה אחת וחוסמים אותו ברקמה אחרת מכונים SERMs - Selective Estrogen Receptor Modulators. שקופית: 4 - Estrogen receptors modulators","slides":"","section":"A"},{"n":27,"text":"אילו מהמשפטים הבאים לגבי מצבים קליניים בהם נדרשת התייחסות זהירה לצריכת סויה נכונים?","options":{"A":"בנשים עם סרטן שד בהווה או בעבר קיימת עדות לאנטגוניזם אפשרי לטמוקסיפן מאיזופלבונואידים","B":"לגבי סרטן שחלה מסוג תאי גרנולוזה, אין מחקרים על השפעת סויה בבני אדם","C":"מחקרים בתרביות תאים ובעכברים הראו האצת התרבות של תאי גרנולוזה סרטניים בנוכחות סויה","D":"לתאי גרנולוזה יש רצפטורים מסוג ביתא, שהסויה מפעילה","E":"יש להמליץ על זהירות מיוחדת בעת שקילת תוספי איזופלבונואידים מרוכזים אצל אוכלוסיות אלו","F":"סויה לא הוכחה כמגדילה סיכון להיווצרות סרטן שחלה מסוג גרנולוזה בעכברים","G":"בהיעדר מחקרי אדם ספציפיים לסרטן גרנולוזה, יש מקום לנקוט משנה זהירות"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל המשפטים תואמים את הממצאים המוצגים לגבי סרטן שד וסרטן שחלה מסוג גרנולוזה - קיימת עדות לאנטגוניזם לטמוקסיפן, אין מחקרי אדם על גרנולוזה, אך יש עדות מתאי מעבדה ועכברים להאצת גדילת גידול קיים (ולא ליצירת גידול חדש), ולכן מומלצת זהירות. שקופית: 6-7, 11-12 - מצבים קליניים הדורשים זהירות","slides":"","section":"A"},{"n":28,"text":"אילו מהמשפטים הבאים לגבי סרטן שד וסויה נכונים?","options":{"A":"חלק מהגידולים בשד מבטאים רצפטור לאסטרוגן (ER+)","B":"אסטרוגן מאיץ את גדילתם של גידולי ER+","C":"איזופלבונואידים כמו גניסטאין ודאידזאין עלולים להאיץ שגשוג של תאי סרטן שד בתרבית","D":"אסטרוגן מאט את גדילתם של גידולי ER+","E":"גידולי ER+ אינם מגיבים לרמות אסטרוגן בדם","F":"איזופלבונואידים מונעים לחלוטין שגשוג של כל תאי סרטן שד","G":"ER+ הוא מונח המתאר גידול שאינו מבטא כל רצפטור הורמונלי"},"answer":["A","B","C"],"multi":true,"explanation":"חלק מהגידולים בשד הם ER+, ואסטרוגן מאיץ (לא מאט) את גדילתם; איזופלבונואידים עלולים להאיץ (לא למנוע) שגשוג של תאי סרטן שד בתרבית, וגידולי ER+ אכן מגיבים לרמות אסטרוגן. שקופית: 2, 6 - סרטן השד ואיזופלבונואידים","slides":"","section":"A"},{"n":29,"text":"אילו מהמשפטים הבאים נכונים לגבי סויה וכולסטרול/שומני הדם, ולגבי מוצרי סויה?","options":{"A":"מטא-אנליזה (Anderson ואחרים, 1995) שסיכמה עשרות מחקרים מצאה קשר בין צריכת סויה לשיפור בפרופיל השומנים בדם","B":"חלב סויה מכיל מעט מאוד פלבנואידים בהשוואה למוצרי סויה מותססים כמו טופו וטמפה","C":"סויה נמצאה קשורה להרעה דרסטית ובלתי הפיכה בפרופיל השומנים בכל הנבדקים","D":"כל מוצרי הסויה מכילים בדיוק את אותה כמות פלבנואידים ללא הבדל","E":"לא בוצע מעולם מחקר שבדק את הקשר בין סויה לכולסטרול","F":"טמפה מיוצרת ללא כל תהליך תסיסה","G":"אין שום הבדל בין טופו לטמפה מבחינת תהליך הייצור"},"answer":["A","B"],"multi":true,"explanation":"מטא-אנליזה משנת 1995 מצאה קשר בין צריכת סויה לשיפור בפרופיל השומנים בדם, וחלב סויה מכיל מעט מאוד פלבנואידים בהשוואה למוצרים מותססים כמו טופו וטמפה. שקופית: 10 - סויה וכולסטרול, מוצרי סויה","slides":"","section":"A"},{"n":30,"text":"אילו מהמשפטים הבאים נכונים?","options":{"A":"כל הגידולים בשד מבטאים רצפטור לאסטרוגן ללא יוצא מן הכלל","B":"מחקרי אדם הראו כי סויה מגבירה סיכון לסרטן שד חדש","C":"איזופלבונואידים בסויה זהים כימית לחלוטין לאסטרדיול","D":"מנגנוני ההגנה המוצעים של סויה כוללים הגברת רמות אסטרוגן חופשי בדם","E":"תוצאות מחקרי בעלי החיים על זכרים תאמו במדויק את תוצאות מחקרי בני האדם","F":"הסקירה השיטתית של Fritz H משנת 2013 מצאה כי סויה מזיקה לנשים שהחלימו מסרטן שד","G":"פורמולות תינוקות מבוססות סויה נמצאו מסוכנות ובלתי בטוחות לשימוש","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"רק חלק (לא כל) הגידולים בשד הם ER+; מחקרי אדם הראו סיכון מופחת (לא מוגבר); איזופלבונואידים דומים במבנה אך אינם זהים כימית לאסטרדיול; מנגנוני ההגנה כוללים הפחתת (לא הגברת) אסטרוגן חופשי; תוצאות בעלי חיים ובני אדם שונות; הסקירה מצאה בטיחות (לא נזק); ופורמולות סויה נמצאו בטוחות (לא מסוכנות). שקופית: 2, 6, 7, 13, 15 - סיכום כללי","slides":"","section":"A"},{"n":1,"text":"אישה בת 55 שהחלימה לפני שלוש שנים מסרטן שד מסוג ER+, ומטופלת כיום בטמוקסיפן, מגיעה לייעוץ תזונתי. היא נוהגת לאכול טופו ואדממה כמה פעמים בשבוע כחלק מהתזונה הים-תיכונית שלה, ושוקלת גם להתחיל ליטול תוסף איזופלבונואידים מרוכז למניעת גלי חום. מה ההמלצה המתאימה ביותר על פי הספרות שנסקרה במצגת?","options":{"A":"יש לומר לה שצריכת מזון מלא כמו טופו ואדממה בכמות מתונה, כפי שנצרך בתזונה היפנית המסורתית, נחשבת בטוחה, אך יש להמליץ על זהירות והתייעצות רפואית נוספת לגבי התוסף המרוכז","B":"אין כל צורך בזהירות, גם לגבי התוסף המרוכז; יש להורות לה להפסיק לחלוטין כל צריכת סויה במזון","C":"אין כל מידע רלוונטי בספרות המחקרית לגבי מקרה כזה; יש להמליץ לה להחליף את הטמוקסיפן בתוסף איזופלבונואידים","D":"סויה מכל סוג אסורה באופן מוחלט לכל אישה שחלתה בסרטן שד; יש לעודד אותה להגדיל משמעותית את מינון תוסף האיזופלבונואידים המרוכז ללא הגבלה"},"answer":["A"],"multi":false,"explanation":"הסקירה השיטתית (Fritz H, 2013) מצאה שכמות הסויה הנצרכת בתזונה היפנית המסורתית (מזון מלא) בטוחה לנשים שהחלימו מסרטן שד, אך החוקרים ממליצים על זהירות ספציפית לגבי תוספי פיטו-אסטרוגנים מרוכזים, ואיזופלבונואידים כמו גניסטאין נמצאו כאנטגוניסטים אפשריים לטמוקסיפן. שקופית: 6-7 - השפעה על בני אדם וסרטן השד","slides":"","section":"B"},{"n":2,"text":"גבר בן 28, ספורטן חובב, שותה שייק חלבון סויה מדי יום ומודאג מכך שקרא באינטרנט שסויה \"מנשית\" גברים ופוגעת בפוריות ובטסטוסטרון. הוא מבקש ממך התייחסות מבוססת מחקר","options":{"A":"יש להרגיע אותו ולהסביר כי מחקרים מבוקרי פלצבו ומחקרי אדם נוספים לא מצאו השפעה על רמות הטסטוסטרון, ספירת הזרע, תנועתיות הזרע או נפח האשך אצל גברים","B":"יש לומר לו שאין כל מחקר בנושא זה בבני אדם; יש להמליץ לו להפסיק מיידית כל צריכת חלבון מן הצומח","C":"יש לאשר את חששו במלואו - כל המחקרים בבני אדם מצאו פגיעה קשה בפוריות; יש להסביר לו שהסויה תגרום בוודאות לירידה בטסטוסטרון תוך שבועות ספורים","D":"יש להמליץ לו להחליף את חלבון הסויה בתוסף איזופלבונואידים מרוכז, שהוא בטוח יותר; יש לומר לו שמחקרים בבני אדם ובבעלי חיים הראו תוצאות זהות לחלוטין - פגיעה קשה בשני המקרים"},"answer":["A"],"multi":false,"explanation":"מחקרים בבני אדם (Mitchell 2001, Hamilton-Reeves 2010, Beaton 2010) לא מצאו השפעה שלילית על טסטוסטרון, ספירת זרע, תנועתיות זרע או נפח אשך - בניגוד למחקרי בעלי חיים, כנראה בשל קשירה סלקטיבית לרצפטורי ביתא. שקופית: 8-9, 14 - השפעה על גברים","slides":"","section":"B"},{"n":3,"text":"אם לתינוק בן 4 חודשים שאובחן עם רגישות לחלבון חלב פרה שואלת האם פורמולת סויה בטוחה לתינוקה, מבחינת התפתחות מינית והורמונלית עתידית","options":{"A":"ניתן להרגיע אותה - מחקרים (כולל Strom BL 2001 ו-Vandenplas 2014) לא מצאו הבדל בגיל הופעת המחזור, פוריות, גובה, משקל ובריאות כללית, ומסקנת החוקרים היא שפורמולות סויה בטוחות לשימוש","B":"יש לומר לה שאין כל מחקר שבדק פורמולות סויה בתינוקות; יש לומר לה שפורמולת סויה גורמת בוודאות להתבגרות מינית מוקדמת","C":"יש לומר לה שפורמולת סויה תפגע בוודאות בפוריות העתידית של התינוק; יש לומר לה שמדדי הגוף (היקף ראש, גובה) היו שונים משמעותית בין הקבוצות","D":"יש לומר לה שהמדדים החיסוניים והנוירו-קוגניטיביים היו שונים משמעותית בין הקבוצות; יש להמליץ לה להימנע לחלוטין מכל תחליף מזון ולהאכיל את התינוק בחלב פרה רגיל למרות הרגישות"},"answer":["A"],"multi":false,"explanation":"המחקרים שנסקרו לא מצאו הבדלים משמעותיים בהתפתחות המינית, הגדילה, הבריאות הכללית או המדדים החיסוניים/נוירו-קוגניטיביים בין תינוקות שקיבלו פורמולת סויה לעומת פורמולה מבוססת חלב פרה, ומסקנת החוקרים הייתה שפורמולות סויה בטוחות לשימוש. שקופית: 13 - פורמולות סויה לתינוקות","slides":"","section":"B"},{"n":4,"text":"אישה שאובחנה לאחרונה עם גידול שחלתי מסוג תאי גרנולוזה שואלת אותך האם בטוח לה להמשיך ליטול תוסף איזופלבונואידים מרוכז שהיא נוטלת זה זמן מה להקלה על תסמיני גיל המעבר","options":{"A":"יש להמליץ לה בבירור להיזהר ולשקול הפסקת התוסף, שכן לתאי גרנולוזה יש רצפטורים מסוג ביתא שהסויה מפעילה, ומחקרי מעבדה ועכברים הראו האצת התרבות תאי הגידול בנוכחות סויה, כשאין מחקרי אדם ספציפיים המבטיחים בטיחות","B":"אין כל צורך בזהירות - התוסף בטוח לחלוטין עבורה; יש להמליץ לה להגדיל את מינון התוסף כדי להאיץ החלמה","C":"יש לומר לה שסויה מוכחת כמונעת לחלוטין גידולים מסוג זה; יש לומר לה שאין כל קשר בין סויה לרצפטורים בתאי גרנולוזה","D":"יש לומר לה שקיימים מחקרי אדם רבים שהוכיחו בטיחות מוחלטת במקרה זה; יש לומר לה שגידולי גרנולוזה חסרים לחלוטין רצפטורים לאסטרוגן ולכן אין רלוונטיות"},"answer":["A"],"multi":false,"explanation":"תאי גרנולוזה נושאים רצפטורי אסטרוגן מסוג ביתא שהסויה מפעילה; מחקרי תרבית תאים אנושיים ומחקרי עכברים הראו האצת התרבות תאי הגידול בנוכחות סויה, ואין מחקרי אדם ספציפיים - לכן מומלצת זהירות במיוחד לגבי תוספים מרוכזים. שקופית: 11-12 - סרטן שחלה מסוג גרנולוזה","slides":"","section":"B"},{"n":5,"text":"מטופל בן 60 עם היפרליפידמיה קלה, המעוניין לשפר את פרופיל השומנים בדם באמצעים תזונתיים לפני שיקול טיפול תרופתי, שואל האם יש עדות לכך שהחלפת חלק מהחלבון בתזונה בחלבון סויה עשויה לסייע","options":{"A":"כן - מטא-אנליזה שסיכמה עשרות מחקרים (Anderson ואחרים, 1995) מצאה קשר בין צריכת חלבון סויה לשיפור בפרופיל השומנים בדם","B":"סויה תמיד מחמירה את פרופיל השומנים בדם; יש להימנע מכל צריכת חלבון מהצומח במצב זה","C":"יש להמליץ אך ורק על תרופות ולהתעלם מהתזונה; לא - אין כל מחקר שבדק קשר בין סויה לכולסטרול","D":"אין כל השפעה מוכחת של סויה על מדדים מטבוליים כלשהם; סויה משפיעה אך ורק על רמות הסוכר בדם ולא על שומני הדם"},"answer":["A"],"multi":false,"explanation":"מטא-אנליזה משנת 1995 (Anderson ואחרים) שסיכמה עשרות מחקרים מצאה קשר בין צריכת חלבון סויה לשיפור בפרופיל השומנים בדם, ולכן ניתן לשקול זאת כחלק מהתערבות תזונתית. שקופית: 10 - סויה וכולסטרול","slides":"","section":"B"},{"n":6,"text":"אישה בת 50 לאחר גיל המעבר, ללא היסטוריה אישית או משפחתית של סרטן שד או גידולים שחלתיים, שואלת האם כדאי לה לשלב מוצרי סויה בתזונתה הכללית","options":{"A":"כן, ניתן וכדאי לאכול סויה - זהו מזון מלא, מקור לחלבון מלא, ואין עדות לנזק בקרב אוכלוסייה כללית בריאה; הזהירות המיוחדת נדרשת בעיקר באוכלוסיות ספציפיות כמו נשים עם היסטוריה של סרטן שד או גידולי גרנולוזה, ובעיקר לגבי תוספים מרוכזים","B":"סויה מותרת רק לגברים ולא לנשים בכל מצב; סויה אסורה לחלוטין לכל אישה לאחר גיל המעבר","C":"יש להמליץ לה להימנע ממזון מהצומח באופן כללי; אין כל מידע במחקר לגבי אוכלוסייה בריאה כללית","D":"לא, יש להימנע לחלוטין מסויה בכל מקרה וללא תלות ברקע הרפואי; יש להמליץ לה על תוסף איזופלבונואידים מרוכז במקום מזון מלא, מכיוון שהוא בטוח יותר"},"answer":["A"],"multi":false,"explanation":"המצגת מסכמת שניתן וכדאי לאכול סויה כמזון מלא עבור אוכלוסייה כללית בריאה, כשההמלצות לזהירות מתמקדות באוכלוסיות ספציפיות (כגון היסטוריה של סרטן שד או גידולי גרנולוזה) ובתוספים מרוכזים ולא במזון עצמו. שקופית: 9 - אפשר וכדאי לאכול סויה","slides":"","section":"B"},{"n":7,"text":"אם מניקה הקוראת מאמרים פופולריים המצטטים מחקרי עכברים על פגיעה קשה בפוריות ובטסטוסטרון בעקבות חשיפה לפיטואסטרוגנים, חוששת להמשיך לצרוך סויה ומבקשת הבהרה","options":{"A":"יש להסביר לה כי הממצאים המדאיגים ביותר מקורם במחקרי בעלי חיים, בעוד שבמחקרי בני אדם (כולל תינוקות שניזונו מפורמולת סויה) לא נמצאה עדות חזקה לפגיעה דומה, ככל הנראה בשל הבדלים בקשירה לרצפטורים","B":"יש להמליץ לה להפסיק להניק לחלוטין; יש לומר לה שאין כל מחקר על בעלי חיים בנושא זה","C":"יש להמליץ לה לעבור לפורמולת סויה מרוכזת עבור עצמה; יש לומר לה שאין הבדל בין מחקרי עכברים למחקרי בני אדם בנושא זה","D":"יש לאשר לה שמחקרי העכברים חלים במדויק על בני אדם ללא כל הסתייגות; יש לומר לה שמחקרי בני אדם הראו תוצאות חמורות יותר ממחקרי בעלי החיים"},"answer":["A"],"multi":false,"explanation":"בעוד שמחקרי בעלי חיים הראו השפעה שלילית של פיטואסטרוגנים על זכרים, מחקרי אדם (למשל על תינוקות שקיבלו פורמולת סויה) לא הראו עדות חזקה דומה, וההסבר המוצע הוא קשירה מועדפת וסלקטיבית לרצפטורי ביתא. שקופית: 6, 9, 13 - השוואת מחקרי בעלי חיים ובני אדם","slides":"","section":"B"},{"n":8,"text":"מטופלת עם גידול המערב את רירית הרחם (אנדומטריום) מגיעה לייעוץ. איזה תת-סוג של רצפטור אסטרוגן צפוי להיות דומיננטי ברקמה זו, על פי המצגת, ומהי המשמעות הפוטנציאלית לגבי רגישות לפיטואסטרוגנים?","options":{"A":"ER-אלפא הוא הדומיננטי ברחם; מכיוון שסויה משפיעה בעיקר על רצפטורי ביתא, ההשפעה הישירה של סויה על רקמה זו עשויה להיות שונה מהשפעתה על רקמות עשירות ברצפטורי ביתא","B":"אין כל רצפטור אסטרוגן ברחם; ER-ביתא הוא היחיד הקיים ברחם","C":"ER-אלפא קיים רק בעצם ובכליות; שני סוגי הרצפטורים נעדרים לחלוטין מהרחם","D":"הרחם עשיר אך ורק ברצפטורים לפרוגסטרון ולא לאסטרוגן; אין כל הבדל בין רקמות מבחינת סוג הרצפטור הדומיננטי"},"answer":["A"],"multi":false,"explanation":"לפי המצגת, ER-אלפא נמצא בעיקר בשד, ברחם ובתאי סטרומה, בעוד ER-ביתא נמצא בעיקר בעצם, כליות, מוח, לב, רירית מעי, כלי דם, ערמונית ותאי גרנולוזה. מאחר שהאפקט המגן/הסלקטיבי של סויה קשור בעיקר לקשירה לביתא, יש לכך משמעות קלינית שונה ברקמות עשירות אלפא כמו הרחם. שקופית: 3 - ER, תת-יחידות ופיזור רקמתי","slides":"","section":"B"},{"n":9,"text":"מטופל מספר לך בגאווה שהוא צורך רוטב סויה בכמות גדולה מדי יום כי הוא \"בטוח שזה מקור מצוין לאיזופלבונואידים בריאים\". מה נכון להשיב לו על סמך החומר שנלמד?","options":{"A":"יש לתקן את התפיסה - רוטב סויה כיום הוא לרוב מוצר תעשייתי שעובר הידרוליזה, ואינו נחשב מקור עשיר לאיזופלבונואידים כפי שאולי חשב","B":"יש לאשר את התפיסה שלו ללא כל הסתייגות; יש לומר לו שרוטב סויה הוא המזון היחיד המכיל איזופלבונואידים","C":"אין כל הבדל בין רוטב סויה לטופו מבחינת תכולת איזופלבונואידים; יש לומר לו שרוטב סויה מכיל יותר איזופלבונואידים מטופו ומאדממה","D":"יש לומר לו שרוטב סויה מיוצר אך ורק מתסיסה טבעית ללא כל תהליך תעשייתי; יש לאשר לו שרוטב סויה הוא אכן המקור העשיר ביותר לאיזופלבונואידים מכל מוצרי הסויה"},"answer":["A"],"multi":false,"explanation":"לפי המצגת, מוצרי סויה שונים מכילים כמויות שונות מאוד של איזופלבונואידים; רוטב סויה כיום הוא לרוב מוצר תעשייתי העובר הידרוליזה ולא בהכרח תסיסה מסורתית, בשונה ממוצרים כמו טופו, אדממה, טמפה ונאטו המכילים כמויות נאותות. שקופית: 10, 12 - מוצרי סויה ותכולת איזופלבונואידים","slides":"","section":"B"},{"n":10,"text":"מטופלת המטופלת כיום בטמוקסיפן לאחר סרטן שד מסוג ER+ שואלת האם ניתן להוסיף לתזונתה תוסף איזופלבונואידים מרוכז (במינון גבוה) כדי להקל על תסמיני גיל המעבר שהחמירו עקב הטיפול","options":{"A":"יש להזהיר אותה במפורש מפני נטילת תוסף איזופלבונואידים מרוכז, שכן קיימת עדות לכך שגניסטאין ודאידזאין עלולים לפעול כאנטגוניסטים לטמוקסיפן ולהאיץ שגשוג תאי סרטן שד, ולכן נשים עם היסטוריה כזו נדרשות להיזהר במיוחד","B":"אין כל בעיה בנטילת התוסף במינון גבוה ככל האפשר; יש לעודד אותה להגדיל את המינון בהדרגה ללא הגבלה עליונה","C":"יש לומר לה שתוספי איזופלבונואידים מומלצים במיוחד לנשים במצבה; יש לומר לה שאין כל הבדל בין אכילת טופו לבין נטילת תוסף מרוכז","D":"יש לומר לה שאין כל אינטראקציה אפשרית בין איזופלבונואידים לטמוקסיפן; יש להמליץ לה להפסיק את הטמוקסיפן ולעבור לתוסף האיזופלבונואידים בלבד"},"answer":["A"],"multi":false,"explanation":"סקירת דה למוס (2001) ומחקרים נוספים הראו שאיזופלבונואידים כמו גניסטאין ודאידזאין עלולים לפעול כאנטגוניסטים לטמוקסיפן ולהאיץ גדילת תאי סרטן שד; לכן נשים עם היסטוריה של סרטן שד צריכות להיזהר במיוחד מאפקט זה, בפרט מתוספים מרוכזים (בשונה ממזון מלא בכמות מתונה). שקופית: 6-7 - טמוקסיפן ואיזופלבונואידים","slides":"","section":"B"},{"n":9000,"text":"המסקנה הייתה שאין כל צורך בזהירות בנושא זה — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["B"],"multi":false,"explanation":"המשפט שגוי על פי החומר. הסקירה מסכמת שאיזופלבונואידים כמו גניסטאין ודאידזאין עלולים להאיץ גדילה של תאי סרטן שד ופועלים כאנטגוניסטים לטמוקסיפן, ולכן נשים עם סרטן שד בהווה או בעבר צריכות להיזהר. שקופית: 6 - איזופלבונואידים וסרטן השד","slides":"","section":"A","tf":1},{"n":9001,"text":"עיבוד מוצר הסויה משפיע על תכולת האיזופלבונואידים בו — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["A"],"multi":false,"explanation":"המשפט נכון על פי החומר. כל המשפטים נכונים - טופו, אדממה, טמפה ונאטו מכילים כמויות נאותות, חלב סויה מכיל מעט מאוד, וקיים הבדל משמעותי בין המוצרים - עובדה בעלת רלוונטיות קלינית עבור נשים עם היסטוריה של סרטן שד. שקופית: 12 - איזופלבונואידים במוצרי סויה","slides":"","section":"A","tf":1},{"n":9002,"text":"רמת איזופלבונים בדם נמצאה קשורה להפחתה בסיכון לסרטן השד — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["A"],"multi":false,"explanation":"המשפט נכון על פי החומר. כל אלו הם ממצאי הסקירה השיטתית של Fritz H (2013) - סיכון מופחת למקרים חדשים, להישנות ולתמותה, היעדר אפקט אסטרוגני, בטיחות הכמות היפנית המסורתית, קשר בין רמת איזופלבונים בדם להפחתת סיכון, והמלצה לזהירות לגבי תוספים מרוכזים. שקופית: 7 - מסקנות Fritz H, 2013","slides":"","section":"A","tf":1},{"n":9003,"text":"לחלק מהאיזופלבונואידים יש פעילות של נוגדי חמצון — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["A"],"multi":false,"explanation":"המשפט נכון על פי החומר. כל המשפטים תואמים את ההגדרות במצגת - איזופלבונואידים הם מולקולות צמחיות דמויות אסטרוגן, בעלות פעילות מסוג SERM וחלקן בעלות פעילות נוגדת חמצון, ואסטרדיול מפעיל את כל סוגי הרצפטורים. שקופית: 4 - Estrogen receptors modulators, Isoflavones","slides":"","section":"A","tf":1},{"n":9004,"text":"הרצפטור אינו יכול להיות מורכב משילוב של שתי תת-יחידות שונות — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["B"],"multi":false,"explanation":"המשפט שגוי על פי החומר. ה-ER מורכב משתי תת-יחידות (אלפא או ביתא), וקיימות שלוש אפשרויות הרכבה: אלפא-אלפא, ביתא-ביתא, או אלפא-ביתא. שקופית: 3 - ER, תת-יחידות","slides":"","section":"A","tf":1},{"n":9005,"text":"ER-אלפא ו-ER-ביתא הם רצפטורים זהים לחלוטין מבחינת מבנה ותפקוד — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["B"],"multi":false,"explanation":"המשפט שגוי על פי החומר. אסטרדיול הוא האסטרוגן העיקרי בגוף האדם (לא איזופלבונואיד צמחי), SERMs מפעילים ברקמה אחת וחוסמים באחרת (לא מפעילים בכל הרקמות), ER-אלפא וביתא שונים בפיזור ותפקוד, גניסטאין ודאידזאין הם אנטגוניסטים (לא מגבירי יעילות) לטמוקסיפן, תוצאות מחקרי בני אדם ובעלי חיים שונות, איזופלבונואידים כן נמצאים במזון מהצומח, ותאי גרנולוזה כן נושאים רצפטור ביתא. שקופית: 3, 4, 6, 9, 11 - סיכום מושגים","slides":"","section":"A","tf":1}]},{"id":"28","title":"מזון מותסס","questions":[{"n":1,"text":"איזה מהמשפטים הבאים לגבי מטבוליזם של חיידקים בתהליכי התססה הוא הנכון?","options":{"A":"מקור האנרגיה העיקרי של החיידקים בתהליך ההתססה הוא שומן.","B":"בייצור חומץ נוצרת חומצה אצטית כתוצר לוואי של פירוק הסוכר.","C":"ביין נוצרת חומצה לקטית כתוצר הלוואי העיקרי.","D":"כל החיידקים המעורבים בתהליכי התססה מייצרים אלכוהול כתוצר לוואי.","E":"תוצרי הלוואי של פירוק הסוכר על ידי חיידקים אינם כוללים חומצות.","F":"חיידקי חומצה לקטית זקוקים לסביבה עתירת חמצן על מנת לפעול.","G":"פירוק הסוכר על ידי חיידקים אינו מייצר אף תוצר לוואי."},"answer":["B"],"multi":false,"explanation":"בתהליך פירוק הסוכר על ידי חיידקים נוצרים תוצרי לוואי - חומצות או אלכוהול (בשמרים). בייצור חומץ נוצרת חומצה אצטית, ואילו ביין נוצר אלכוהול; חיידקי חומצה לקטית מייצרים חומצה לקטית וזקוקים לסביבה אנאירובית. שקופית: 128 - מטבוליזם של חיידקים","slides":"","section":"A"},{"n":2,"text":"אילו מהתכונות הבאות מאפיינות חיידקי חומצה לקטית, בהשוואה לרוב החיידקים האחרים?","options":{"A":"זקוקים לסביבה אנאירובית (ללא חמצן), ולכן התהליך חייב להתבצע בתוך מים.","B":"נהרסים באופן מיידי בריכוז מלח גבוה, בדיוק כמו רוב החיידקים האחרים.","C":"אינם מושפעים לרעה ממלח בריכוז גבוה, בניגוד לכמעט כל שאר החיידקים.","D":"זקוקים לסביבה עשירה בחמצן על מנת להתרבות.","E":"מפרישים אנזימים מעכלים ללא צורך במקור אנרגיה כלשהו.","F":"אינם תלויים כלל בנוכחות סוכר לצורך פעילותם.","G":"מתרבים בצורה זהה הן בסביבה עם מלח והן ללא מלח, ללא כל יתרון."},"answer":["A","C"],"multi":true,"explanation":"חיידקי חומצה לקטית זקוקים לסביבה אנאירובית ולכן ההתססה מתבצעת במים, ובניגוד לרוב החיידקים הם אינם מושפעים ממלח בריכוז גבוה - ולכן הוספת מלח מעודדת דווקא את התרבותם על פני חיידקים אחרים. שקופית: 128 - מטבוליזם של חיידקים","slides":"","section":"A"},{"n":3,"text":"אילו מהמשפטים הבאים לגבי מטבוליזם של חיידקים בתהליך התססה הם נכונים?","options":{"A":"מקור האנרגיה של החיידקים בתהליך ההתססה הוא בעיקר חלבון.","B":"ביין נוצרת חומצה אצטית כתוצר הלוואי העיקרי של התהליך.","C":"חיידקי חומצה לקטית משגשגים דווקא בסביבה עתירת חמצן.","D":"בחומץ נוצר אלכוהול כתוצר לוואי עיקרי של פירוק הסוכר.","E":"ריכוז מלח גבוה פוגע במידה שווה בכל סוגי החיידקים, כולל חיידקי חומצה לקטית.","F":"תהליך פירוק הסוכר על ידי חיידקים אינו מייצר תוצרי לוואי כלל.","G":"חיידקי חומצה לקטית זקוקים לנוכחות חמצן גבוהה כדי לפרק סוכר.","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"כל הקביעות שגויות: מקור האנרגיה הוא סוכר ולא חלבון, ביין נוצר אלכוהול (לא חומצה אצטית), בחומץ נוצרת חומצה אצטית (לא אלכוהול), חיידקי חומצה לקטית דווקא אינם נפגעים ממלח גבוה, וזקוקים לסביבה אנאירובית ולא עתירת חמצן. שקופית: 128 - מטבוליזם של חיידקים","slides":"","section":"A"},{"n":4,"text":"כיצד מוגדר תהליך ההתססה בהקשר של מזון מותסס?","options":{"A":"יצירת סביבת חיים שמעודדת התרבות סלקטיבית של חיידקי חומצה לקטית.","B":"הוספת חומרים משמרים סינתטיים למניעת התרבות חיידקים","C":"תהליך של חימום המזון להשמדת כלל החיידקים הנמצאים בו","D":"תהליך המתבצע אך ורק בנוכחות חמצן רב; תהליך שמטרתו להעשיר את המזון בשומן רווי","E":"הקפאת המזון על מנת לעצור כל פעילות חיידקית; ייבוש המזון להסרת מים ומניעת התפתחות חיידקים"},"answer":["A"],"multi":false,"explanatio
