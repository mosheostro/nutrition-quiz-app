","section":"A"},{"n":10,"text":"לפי ההסבר במצגת מדוע סוכר גבוה מעלה כולסטרול, אילו מהמשפטים הבאים נכונים?","options":{"A":"סוכר גבוה מוריד את ייצור הכולסטרול בכבד","B":"הקשר בין סוכר לכולסטרול מוסבר על ידי עודף בפעילות גופנית","C":"הכבד מקבל משוב שלילי חזק יותר כאשר הסוכר גבוה, ולכן מייצר פחות כולסטרול","D":"אין כל קשר בין רמת הסוכר לרמת הכולסטרול","E":"סוכר גבוה גורם לירידה מיידית ב-LDL","F":"ההסבר לתופעה קשור אך ורק לצריכת שומן רווי במזון","G":"עליית הכולסטרול בעקבות סוכר גבוה נובעת מירידה בייצור בכבד","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"לפי המצגת, סוכר גבוה גורם להיעדר משוב שלילי לכבד, וכתוצאה מכך עולה (ולא יורד) ייצור הכולסטרול בכבד - ולא בגלל שומן במזון או פעילות גופנית. שקופית: 7 - סוכר גבוה וכולסטרול","slides":"","section":"A"},{"n":11,"text":"לפי מחקרים חדשים שהוזכרו במצגת, עם מה נמצאו טסיות גבוהות בשכיחות גבוהה יותר?","options":{"A":"גידול ממאיר במערכת העיכול","B":"זיהום ויראלי בדרכי הנשימה העליונות","C":"חוסר בוויטמין D","D":"תת-פעילות בלוטת התריס","E":"אלרגיה למוצרי חלב","F":"מחסור בברזל בלבד","G":"עודף סידן בדם"},"answer":["A"],"multi":false,"explanation":"המצגת מציינת שטסיות גבוהות נמצאות בשכיחות גבוהה בקרב אנשים עם גידול ממאיר במערכת העיכול, וכן שערכים גבוהים קשורים לסיכון גדול יותר לתמותה מכל סיבה שהיא. שקופית: 8 - מחקרים חדשים בספירת דם","slides":"","section":"A"},{"n":12,"text":"אילו מהבאות מוזכרות במצגת כגורמים העלולים להעלות ספירת תאי דם לבנים (WBC)?","options":{"A":"עישון","B":"גידולים ממאירים","C":"חוסר שינה כרוני בלבד","D":"אכילת פירות הדר","E":"צריכת מים מרובה","F":"חשיפה ממושכת לשמש","G":"תזונה עתירת סיבים תזונתיים"},"answer":["A","B"],"multi":true,"explanation":"המצגת מציינת שעישון וגידולים ממאירים (יחד עם אחוז שומן גוף גבוה) עלולים להעלות את ספירת תאי הדם הלבנים. שקופית: 8 - מחקרים חדשים בספירת דם","slides":"","section":"A"},{"n":13,"text":"לגבי קריאטינין, אילו מהמשפטים הבאים נכונים לפי המצגת?","options":{"A":"קריאטינין הוא מדד רלוונטי הקשור גם למסת שריר","B":"קריאטינין נמוך עשוי לנבוע ממסת שריר נמוכה","C":"במקרה שהוצג במצגת של הבחורה הצעירה, הבדיקות נמצאו במבט ראשון תקינות","D":"קריאטינין תמיד מצביע על מחלת כליות חמורה כאשר הוא נמוך","E":"קריאטינין הוא בדיקה שאינה קשורה כלל לשריר","F":"יש לבדוק קריאטינין בהקשר הכללי של המטופל ולא במנותק","G":"קריאטינין נמוך תמיד דורש הפניה דחופה לדיאליזה"},"answer":["A","B","C"],"multi":true,"explanation":"המצגת מציינת שהסיבה לקריאטינין נמוך היא לרוב מסת שריר נמוכה, ובדוגמה של הבחורה הצעירה צוין שלכאורה \"הכל בסדר\" בבדיקות - כלומר יש לפרש קריאטינין בהקשר הכולל ולא כסימן אזעקה בלבד. שקופית: 9 - קריאטינין","slides":"","section":"A"},{"n":14,"text":"לגבי המקרה של הבחורה הצעירה שהוצג במצגת, אילו מהמשפטים הבאים נכונים?","options":{"A":"במבט ראשון הבדיקות נראות תקינות לחלוטין","B":"עם זאת, יש לשאול מה יכולות להיות הסיבות לתמונה כזו","C":"תזונה לא בריאה או בעיות ספיגה יכולות להיות הסבר אפשרי","D":"מחלה זיהומית חריפה (אקוטית) יכולה להיות הסבר אפשרי נוסף","E":"אכילת כמות גדולה של עלים ירוקים או נבטים יכולה להשפיע על התוצאות","F":"תוסף המכיל חומצה פולית עלול אף הוא להשפיע על התוצאות ולהיות בעייתי","G":"יש לבחון את התזונה והרגלי החיים של המטופלת ולא להסתפק במבט שטחי על הערכים"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"המצגת מציגה מקרה שבו לכאורה \"הכל תקין\", אך מבקשת מהמטפל לחשוב אילו סיבות (תזונה לקויה, בעיות ספיגה, מחלה זיהומית חריפה, צריכה גבוהה של עלים ירוקים/נבטים או תוסף חומצה פולית) עלולות להסתתר מאחורי תמונה שנראית תקינה. שקופית: 9-10 - קריאטינין / מקרה בחורה צעירה","slides":"","section":"A"},{"n":15,"text":"אילו מהמשפטים הבאים לגבי ספירה לבנה נמוכה נכונים לפי המצגת?","options":{"A":"ספירה לבנה נמוכה אינה קשורה בשום צורה לאנמיה","B":"ספירה לבנה נמוכה תמיד מעידה על סרטן הדם","C":"ספירה לבנה נמוכה אינה דורשת כל בירור נוסף","D":"ספירה לבנה נמוכה מופיעה במצגת ללא כל קשר לנושא האנמיה","E":"יש להתעלם מספירה לבנה נמוכה אם שאר הבדיקות תקינות","F":"ספירה לבנה נמוכה מעידה תמיד על זיהום ויראלי פעיל בלבד","G":"ספירה לבנה נמוכה קשורה תמיד לתזונה עתירת חלבון","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"המצגת מציגה את הנושאים \"ספירה לבנה נמוכה\" ו\"אנמיה\" זה לצד זה כמדדים שיש לפענח יחד ובהקשר הכולל, ולא כמנותקים או כמצביעים תמיד על אבחנה חד-משמעית אחת. שקופית: 11 - ספירה לבנה נמוכה / אנמיה","slides":"","section":"A"},{"n":16,"text":"לפי המצגת, האם ברזל רגעי נמוך בבדיקת דם בודדת מהווה בעיה?","options":{"A":"כן, תמיד מדובר בבעיה חמורה","B":"לא, ברזל רגעי נמוך בדם אינו בהכרח בעיה","C":"כן, אך ורק אם המטופל הוא גבר","D":"לא ניתן לדעת ללא ביופסיית מח עצם","E":"כן, זהו סימן ודאי לתלסמיה","F":"לא, כי בדיקת ברזל בדם כלל אינה נמדדת","G":"כן, תמיד מצריך עירוי ברזל תוך-ורידי מיידי"},"answer":["B"],"multi":false,"explanation":"המצגת קובעת במפורש: \"ברזל רגעי נמוך בדם אינו בעיה\" - שכן רמת הברזל בדם משתנה ואינה בהכרח משקפת מחסור אמיתי. שקופית: 12 - ברזל רגעי נמוך / בילירובין","slides":"","section":"A"},{"n":17,"text":"אילו מהקביעות הבאות לגבי בילירובין נכונות לפי המצגת?","options":{"A":"בילירובין הוא תוצר פירוק של מולקולת ההמוגלובין (וגם של מיוגלובין)","B":"תהליך פירוק תא דם אדום מתרחש בטחול ובמח העצם","C":"בילירובין מיוצר אך ורק בכליות","D":"בילירובין מסיס במים בצורתו הראשונית שנוצרת בפירוק","E":"בילירובין הבלתי-מצומד אינו נקשר לשום חלבון","F":"בילירובין קשור לתפקוד הלבלב בלבד","G":"בילירובין נוצר רק לאחר גיל 60"},"answer":["A","B"],"multi":true,"explanation":"לפי המצגת, בילירובין הוא תוצר פירוק של המוגלובין (וגם מיוגלובין), ותהליך פירוק תא הדם האדום מתרחש בטחול ובמח העצם. הבילירובין שנוצר אינו מסיס במים ולכן נקשר לאלבומין. שקופית: 12 - בילירובין","slides":"","section":"A"},{"n":18,"text":"אילו מהמשפטים הבאים לגבי בילירובין לא-מצומד (עקיף) לעומת מצומד (ישיר) נכונים?","options":{"A":"בילירובין לא-מצומד נקשר לאלבומין שמסיע אותו לכבד","B":"בכבד הבילירובין נקשר לחומצה גלוקורונית והופך למצומד ומסיס במים","C":"הבילירובין המצומד מועבר דרך דרכי המרה אל כיס המרה, והוא זה שמקנה את הצבע החום לצואה","D":"בילירובין לא-מצומד ובילירובין מצומד הם אותו הדבר בדיוק","E":"תהליך הצימוד לחומצה גלוקורונית מתרחש בכליות ולא בכבד","F":"בילירובין לא-מצומד מסיס במים באופן טבעי וללא צורך בחלבון נשא","G":"הבילירובין הלא-מצומד הוא זה שמקנה את הצבע החום לצואה"},"answer":["A","B","C"],"multi":true,"explanation":"לפי המצגת, בילירובין לא-מצומד נקשר לאלבומין ומגיע לכבד, שם הוא נקשר לחומצה גלוקורונית והופך למצומד ומסיס במים, ולאחר מכן מועבר דרך דרכי המרה לכיס המרה כשהוא זה שמקנה את הצבע החום לצואה. שקופית: 12-13 - בילירובין","slides":"","section":"A"},{"n":19,"text":"אילו מהמשפטים הבאים לגבי צהבת ילודים, תסמונת ז'ילבר ועליית בילירובין נכונים לפי המצגת?","options":{"A":"צהבת ילודים נובעת מכבד שאינו בשל מספיק כדי לעמוד בעומס פירוק תאי הדם לאחר הלידה","B":"בילירובין עולה כאשר קצב פירוק תאי הדם האדומים עולה על קצב הסילוק של הכבד","C":"בתסמונת ז'ילבר יש עלייה קלה בבילירובין הבלתי-ישיר, ללא כל בעיה או סכנה","D":"תסמונת ז'ילבר נובעת מבעיה גנטית באנזים האחראי לפעולת הצימוד","E":"במקרה של תסמונת ז'ילבר יש לעקוב ו/או לראות היסטוריה","F":"בילירובין יכול לעלות במצבי חום, אימון גופני אינטנסיבי, המוליזה, טיפולי כימותרפיה מסוימים או מחלת כבד","G":"כל הגורמים הללו ממחישים שיש להתייחס לרמת הבילירובין בהקשרה הקליני המלא"},"answer":["G"],"multi":false,"explanation":"כל המשפטים תואמים במדויק את תוכן המצגת לגבי צהבת ילודים, תסמונת ז'ילבר (עלייה שפירה בבילירובין הבלתי-ישיר עקב פגם גנטי באנזים הצימוד) וגורמים נוספים לעליית בילירובין. שקופית: 13 - בילירובין (המשך)","slides":"","section":"A"},{"n":20,"text":"אילו מהמשפטים הבאים לגבי תסמונת ז'ילבר נכונים לפי המצגת?","options":{"A":"תסמונת ז'ילבר היא מצב מסכן חיים המצריך טיפול מיידי","B":"תסמונת ז'ילבר גורמת לעלייה חדה בבילירובין המצומד (הישיר) בלבד","C":"תסמונת ז'ילבר נובעת מזיהום ויראלי חריף בכבד","D":"תסמונת ז'ילבר מצריכה תמיד השתלת כבד","E":"תסמונת ז'ילבר אינה קשורה לשום אנזים או תהליך גנטי","F":"תסמונת ז'ילבר מאובחנת רק באמצעות ביופסיית כבד","G":"תסמונת ז'ילבר גורמת לירידה בבילירובין הבלתי-ישיר מתחת לטווח התקין","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"לפי המצגת, ז'ילבר היא תופעה שפירה וגנטית (בעיה באנזים הצימוד) הגורמת לעלייה קלה בבילירובין הבלתי-ישיר, ואינה כרוכה בסכנה, זיהום, השתלה או ביופסיה. שקופית: 13 - בילירובין (המשך)","slides":"","section":"A"},{"n":21,"text":"היכן מיוצר TSH (Thyroid Stimulating Hormone), לפי המצגת?","options":{"A":"בבלוטת ההיפופיזה (במוח)","B":"בבלוטת התריס עצמה","C":"בבלוטת יותרת הכליה","D":"בכבד; בלבלב; בטחול; בכליות"},"answer":["A"],"multi":false,"explanation":"המצגת מציינת במפורש כי TSH מיוצר בבלוטת ההיפופיזה שבמוח, ומגרה את בלוטת התריס. שקופית: 14 - הורמוני בלוטת התריס","slides":"","section":"A"},{"n":22,"text":"אילו מהקביעות הבאות לגבי T3 ו-T4 נכונות לפי המצגת?","options":{"A":"T4 (טירוקסין) הוא ההורמון שמייצרת בלוטת התריס, אך הוא עצמו אינו פעיל (פרו-הורמון)","B":"T3 הוא הורמון התריס הפעיל, המווסת מטבוליזם","C":"T4 הוא ההורמון הפעיל ואילו T3 הוא הפרו-הורמון הבלתי-פעיל","D":"T3 ו-T4 מיוצרים אך ורק בכליות","E":"T4 אינו מכיל אטומי יוד","F":"T3 ו-T4 הם שני שמות לאותו הורמון בדיוק","G":"T3 מיוצר בעיקר בבלוטת הלבלב ואינו קשור לתאים היקפיים"},"answer":["A","B"],"multi":true,"explanation":"המצגת מבהירה ש-T4 (טירוקסין) הוא ההורמון שמפרישה בלוטת התריס אך אינו פעיל בעצמו (פרו-הורמון המכיל אטומי יוד), בעוד ש-T3 הוא ההורמון הפעיל המווסת את המטבוליזם. שקופית: 14 - הורמוני בלוטת התריס","slides":"","section":"A"},{"n":23,"text":"אילו שלושה עקרונות מנחים בפענוח פרופיל שומנים מוזכרים במצגת?","options":{"A":"הכולסטרול הכללי (הטוטלי) חסר חשיבות כשלעצמו","B":"יש תמיד להתייחס לחלוקה הפנימית בין רכיבי השומנים (כגון היחס בין LDL ל-HDL)","C":"יש להתייחס גם לרמת הסוכר וגם לרמת הטריגליצרידים לצד פרופיל השומנים","D":"יש להתעלם מטריגליצרידים בפענוח פרופיל השומנים","E":"יש להתבסס אך ורק על ערך הכולסטרול הכללי","F":"יש להתעלם מכל קשר בין רמת הסוכר לפרופיל השומנים","G":"חלוקת השומנים הפנימית אינה רלוונטית לפענוח"},"answer":["A","B","C"],"multi":true,"explanation":"המצגת מדגישה שהכולסטרול הכללי חסר חשיבות כשלעצמו, ותמיד יש להתייחס לחלוקה הפנימית וכן לרמת הסוכר ולטריגליצרידים. שקופית: 15 - פרופיל שומנים","slides":"","section":"A"},{"n":24,"text":"אילו מהמשפטים הבאים לגבי גאוט (שגדון) נכונים לפי המצגת?","options":{"A":"גאוט היא מחלה כרונית הפוגעת במפרקים (לרוב בכף הרגל) ועלולה לגרום נזק גם לכליות","B":"הביטוי המעבדתי של גאוט הוא רמה גבוהה של חומצה אורית (חומצת שתן) בדם","C":"לאחר שנים של רמה גבוהה בדם, חומצה אורית עלולה להתגבש וליצור משקעים במפרקים ובכליות","D":"הגורם למחלה הוא קצב הפרשת חומצת השתן הנמוך מקצב הייצור שלה","E":"קיימת נטייה גנטית לקצב הפרשה נמוך מהרגיל","F":"גאוט היא שילוב של נטייה גנטית והרגלי חיים","G":"עודף משקל, יתר לחץ דם וסוכרת מגדילים את הסיכון להתפתחות גאוט"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל הפרטים הללו מופיעים במפורש במצגת: מחלה כרונית הפוגעת במפרקים/כליות, רמת חומצה אורית גבוהה, יצירת משקעים, חוסר איזון בין הפרשה לייצור, נטייה גנטית, ושילוב עם גורמי סיכון כמו עודף משקל, יל\"ד וסוכרת. שקופית: 17 - גאוט","slides":"","section":"A"},{"n":25,"text":"אילו מהמשפטים הבאים לגבי גאוט נכונים לפי המצגת?","options":{"A":"רמה גבוהה של חומצה אורית לזמן קצר מהווה סכנה מיידית וחמורה","B":"גאוט היא מחלה חריפה בלבד ואינה כרונית","C":"גאוט נגרמת מקצב ייצור נמוך מדי של חומצה אורית","D":"גאוט אינה קשורה כלל לתורשה או לגנטיקה","E":"עודף משקל ויתר לחץ דם מפחיתים את הסיכון לגאוט","F":"גאוט פוגעת אך ורק במפרקי הידיים ולעולם לא ברגליים","G":"חומצה אורית אינה יכולה להצטבר כמשקעים במפרקים או בכליות","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"לפי המצגת, ההפך הוא הנכון בכל המשפטים: חומצה אורית גבוהה לזמן קצר אינה מסוכנת, גאוט היא מחלה כרונית, נגרמת מקצב הפרשה נמוך (לא ייצור נמוך), קשורה לנטייה גנטית, ועודף משקל ויל\"ד מגדילים (לא מפחיתים) את הסיכון, והיא פוגעת לרוב בכף הרגל. שקופית: 17 - גאוט","slides":"","section":"A"},{"n":26,"text":"אילו מזונות מוזכרים במצגת כמזונות עיקריים המביאים לייצור חומצה אורית?","options":{"A":"בשר, עוף ודגים","B":"תפוחי אדמה, אורז ולחם","C":"חלב, גבינה וביצים","D":"תפוחים, בננות וענבים","E":"שמן זית, אבוקדו ואגוזים","F":"סלט ירוק, מלפפון ועגבנייה","G":"אורז מלא, קינואה ושיבולת שועל"},"answer":["A"],"multi":false,"explanation":"המצגת מציינת בשר, עוף ודגים כמזונות העיקריים המביאים לייצור חומצה אורית (הנוצרת מפירוק פורינים - גואנין ואדנין). שקופית: 18 - חומצת שתן","slides":"","section":"A"},{"n":27,"text":"אילו מההמלצות הבאות מופיעות במצגת בהקשר לגאוט ולחומצה אורית?","options":{"A":"יש להימנע מאלכוהול, שכן הוא פוגע בתהליכי סילוק חומצה אורית","B":"גם צריכת סוכר מגדילה את ייצור חומצה האורית","C":"מומלץ להרבות בצריכת בשר אדום להורדת חומצה אורית","D":"יש לצרוך כמה שיותר פירות הדר עתירי סוכר","E":"יש להימנע לחלוטין מכל צריכת חלבון מן החי לצמיתות","F":"אין כל קשר בין תזונה לרמת חומצה אורית","G":"מומלץ לשתות אלכוהול במידה לשיפור סילוק חומצה אורית"},"answer":["A","B"],"multi":true,"explanation":"המצגת מציינת שיש להימנע מאלכוהול (הפוגע בסילוק חומצה אורית) וכי גם צריכת סוכר מגדילה את ייצור החומצה האורית - לצד המלצה כללית לתזונה פרו-צמחונית ומאוזנת סוכר לחולה גאוט. שקופית: 18 - חומצת שתן ותזונה","slides":"","section":"A"},{"n":28,"text":"אילו מהמשפטים הבאים לגבי ברזל וספיגתו נכונים לפי המצגת?","options":{"A":"הבדיקה הרלוונטית בודקת ברזל הקשור לטרנספרין","B":"ספיגת ברזל מהצומח (מקורות צמחיים) היא אתגר יחסי","C":"ספיגת הברזל מתרחשת בעיקר בתריסריון ובחלק הראשון של המעי הדק","D":"ספיגת ברזל מתרחשת אך ורק בקיבה","E":"ברזל מהצומח נספג בקלות רבה יותר מברזל מן החי","F":"גוף האדם מאבד ברזל מדי יום דרך נשירת תאי עור ותאי אפיתל","G":"אין כל מנגנון של איבוד ברזל יומיומי בגוף בריא"},"answer":["A","B","C"],"multi":true,"explanation":"המצגת מציינת שהבדיקה בודקת ברזל הקשור לטרנספרין, שספיגת ברזל מהצומח מהווה אתגר יחסי, ושהספיגה מתרחשת בתריסריון ובחלק הראשון של המעי הדק (וכן שיש איבוד ברזל יומיומי טבעי דרך נשירת תאי עור ואפיתל). שקופית: 19 - ברזל","slides":"","section":"A"},{"n":29,"text":"אילו מהמשפטים הבאים לגבי גורמים לאנמיה מחסר ברזל וברזל/פריטין נכונים לפי המצגת?","options":{"A":"איבוד דם מסיבי בוסת הוא סיבה נפוצה לאנמיה מחסר ברזל","B":"הריון והנקה עלולים לתרום לאנמיה מחסר ברזל","C":"דימום ממערכת העיכול הוא סיבה אפשרית","D":"ספיגה לקויה עקב מצב דלקתי במעיים או הרגלי חיים קלוקלים היא סיבה אפשרית","E":"תרופות מסוימות, כגון מטפורמין או תרופות לצרבת, עלולות לתרום לחסר ברזל","F":"מחלות כמו צליאק וקרוהן צפויות לגרום לחוסר ברזל","G":"פריטין הוא מאגר הברזל העיקרי בגוף, ורמתו בדם משקפת בצורה סבירה את מאגר הברזל"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל הפרטים מופיעים במפורש במצגת: גורמי אנמיה מחסר ברזל (איבוד דם בווסת, הריון/הנקה, דימום עיכולי, ספיגה לקויה, תרופות, צליאק/קרוהן), ותפקיד הפריטין כמאגר הברזל העיקרי שרמתו בדם משקפת את מאגר הברזל בגוף. שקופית: 19-20 - ברזל / אנמיה מחסר ברזל ופריטין","slides":"","section":"A"},{"n":30,"text":"אילו מהמשפטים הבאים לגבי CRP נכונים לפי המצגת?","options":{"A":"CRP עולה בכל מקרה של דלקת ללא יוצא מן הכלל","B":"CRP הוא מדד המשקף אך ורק דלקת כרונית ולא דלקת אקוטית","C":"תפקידו הביולוגי של CRP הוא לפרק ישירות חיידקים בזרם הדם","D":"CRP אינו יכול לשמש למעקב אחר יעילות טיפול במחלה דלקתית","E":"CRP עולה אך ורק בזיהומים חיידקיים ולעולם לא בזיהומים ויראליים או פטרייתיים","F":"CRP אינו קשור בשום צורה לתפקוד כלייתי","G":"CRP הוא מדד שאינו יכול לשקף מצב דלקתי בזמן אמת","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"לפי המצגת, CRP הוא מדד לדלקת בזמן אמת (אקוטית או כרונית), אך לא בכל דלקת הוא עולה; תפקידו הביולוגי הוא להיצמד לחלבון על תא מת/גוסס כדי לסמן למערכת החיסון לסלקו; הוא משמש למעקב אחר יעילות טיפול; ועולה גם בזיהומים ויראליים/פטרייתיים ובכשל כלייתי. שקופית: 21 - CRP","slides":"","section":"A"},{"n":1,"text":"מטופלת בת 29 עם אנדומטריוזיס ידועה מגיעה לבדיקת דם. תוצאות הבדיקה מראות רמת ברזל תקינה, אך רמת פריטין גבוהה מאוד. מה הפירוש הסביר ביותר של הממצא, לפי עקרונות המצגת?","options":{"A":"מחלה דלקתית פעילה, כאשר הפריטין עולה כחלק מתגובה דלקתית ואינו משקף נאמנה את מאגרי הברזל","B":"חוסר בוויטמין B12; אבחנה ודאית של סרטן","C":"מנת יתר של תוסף ברזל; תפקוד כלייתי לקוי בלבד","D":"עודף ברזל בגוף המחייב הפחתת צריכת ברזל; טעות מעבדתית ודאית שיש לחזור עליה בלבד"},"answer":["A"],"multi":false,"explanation":"לפי המצגת, פריטין גבוה מאוד עם ברזל תקין מעיד על מחלה דלקתית פעילה - ואנדומטריוזיס, כמצב בעל רכיב דלקתי, היא דוגמה מתאימה לכך. יש לזכור שפריטין הוא גם חלבון של תגובה דלקתית ולכן עלול \"להטעות\" לגבי מאגרי הברזל האמיתיים. שקופית: 3 - הנחיות למטפל (מקרה אנדומטריוזיס)","slides":"","section":"B"},{"n":2,"text":"אישה צעירה מגיעה עם בדיקות דם שנראות תקינות במבט ראשון. בבירור תזונתי מתגלה שהיא צורכת כמויות גדולות של עלים ירוקים ונבטים, ולעיתים גם תוסף המכיל חומצה פולית. מה החשש המרכזי שיש לקחת בחשבון במקרה כזה, לפי המצגת?","options":{"A":"צריכה גבוהה של חומצה פולית עלולה להסתיר (למסך) מחסור בוויטמין B12","B":"יש להפסיק לחלוטין את כל התזונה הצמחית של המטופלת","C":"עלים ירוקים תמיד מעלים את רמת חומצת השתן באופן מסוכן","D":"יש לחשוד מיידית בהמוכרומטוזיס; חומצה פולית גבוהה מעידה תמיד על מחלת כבד","E":"עלים ירוקים גורמים תמיד לירידה ברמת הבילירובין; אין כל צורך לברר תזונה כאשר הבדיקות נראות תקינות"},"answer":["A"],"multi":false,"explanation":"המצגת מדגישה שאכילת כמות גדולה של עלים ירוקים/נבטים או תוסף המכיל חומצה פולית \"עלול להיות בעייתי\" - משום שרמת חומצה פולית גבוהה יכולה להסתיר תמונה מעבדתית של חוסר B12, ולכן מצריכה תשומת לב ובירור תזונתי מעמיק, גם כאשר הבדיקות נראות תקינות על פניהן. שקופית: 9-10 - קריאטינין / מקרה בחורה צעירה","slides":"","section":"B"},{"n":3,"text":"מטופל שאובחן בעבר כטרום-סכרתי מגיע כעת עם ערכי סוכר לא מאוזנים ופרופיל שומנים שהחמיר, כאשר תיאור אורח חייו מעיד על תזונה לא בריאה. איך יש להסביר את הקשר בין הסוכר הגבוה לעלייה בכולסטרול, לפי המצגת?","options":{"A":"סוכר גבוה גורם להיעדר משוב שלילי לכבד, וכתוצאה מכך עולה ייצור הכולסטרול בכבד","B":"אין שום קשר בין השניים והממצאים מקריים בלבד","C":"יש להאשים אך ורק תורשה, ללא קשר לאורח החיים","D":"הקשר קיים רק אצל מטופלים מעל גיל 70; יש לטפל בכולסטרול בלבד ולהתעלם מהסוכר","E":"סוכר גבוה מוריד את ייצור הכולסטרול בכבד; הכולסטרול הגבוה גרם לעליית הסוכר, ולא להפך"},"answer":["A"],"multi":false,"explanation":"המצגת מסבירה שבמעבר מטרום-סכרת לסוכרת לא מאוזנת, סוכר גבוה מוביל להיעדר משוב שלילי לכבד, מה שגורם לעלייה בייצור הכולסטרול בכבד - כלומר איזון הסוכר ואורח החיים הם המפתח, לא רק מדדי השומנים בבידוד. שקופית: 6-7 - טרום סכרת / סוכר גבוה וכולסטרול","slides":"","section":"B"},{"n":4,"text":"מטופלת מגיעה עם היסטוריה של בדיקות LDL שהשתנו משמעותית בין בדיקה לבדיקה בשנים האחרונות. מבירור עולה שהיא עברה דיאטות רבות ושינויים תכופים בהרגלי התזונה. מה ההסבר הסביר ביותר לתנודתיות ב-LDL, לפי המצגת?","options":{"A":"תקלה טכנית קבועה במעבדה","B":"ריבוי הדיאטות והשינויים התכופים בהרגלי התזונה ובאורח החיים","C":"מוטציה גנטית נדירה שהתפתחה במהלך השנים","D":"LDL אינו יכול להשתנות כלל, ולכן מדובר בטעות מדידה","E":"שינוי בצבע השיער","F":"עלייה קבועה במסת השריר","G":"חוסר קשר לתזונה, אלא רק לגיל"},"answer":["B"],"multi":false,"explanation":"הדוגמה במצגת ממחישה כיצד ריבוי דיאטות ושינויים תכופים בהרגלי התזונה ובאורח החיים יכולים להסביר תנודתיות משמעותית ב-LDL בין בדיקה לבדיקה, ומדגישה שיש לפרש כל תוצאת LDL בהקשר התזונתי הסמוך לבדיקה. שקופית: 5 - תנודות LDL","slides":"","section":"B"},{"n":5,"text":"מטופל הגיע לבדיקת דם לאחר סוף שבוע של אכילה כבדה ולא מאוזנת, ותוצאת הטריגליצרידים (TG) שלו יצאה גבוהה משמעותית (מעל כ-150), בעוד שבדיקה קודמת לפני כמה חודשים הייתה תקינה. איך יש לפרש את הממצא, לפי המצגת?","options":{"A":"יש לקחת בחשבון שה-TG תלוי מאוד בתזונה בימים שלפני הבדיקה, וגם לראות בערך הגבוה סימן לא טוב שמעיד על הצורך בהתייחסות לאורח החיים","B":"יש לאבחן מיד סוכרת סוג 1; יש להפנות מיידית לניתוח לב פתוח","C":"יש להתעלם כי טריגליצרידים לא מושפעים מתזונה; יש לפרש כתוצאה תקינה לחלוטין וללא כל משמעות","D":"יש לייחס זאת אך ורק לגורם גנטי בלתי ניתן לשינוי; יש להתעלם לחלוטין מהתוצאה כי TG אינו מדד אמין בכלל"},"answer":["A"],"multi":false,"explanation":"המצגת מציינת שה-TG משתנה מאוד בהתאם לתזונה בימים שלפני הבדיקה, ושערך TG גבוה (מעל כ-150) הוא סימן לא טוב המעיד על אורח חיים לא בריא - ולכן יש לבדוק הן את ההקשר התזונתי הקרוב והן את המגמה הכללית. שקופית: 4 - LDL/TG ותזונה","slides":"","section":"B"},{"n":6,"text":"מטופל מגיע עם תוצאות בדיקת דם המראות פרופיל שומנים \"מסוכן\", בשילוב עם אנמיה קשה וספירה לבנה נמוכה מאוד. מהי הסיבה השכיחה ביותר לשילוב כזה, לפי המצגת?","options":{"A":"תזונה צמחונית מאוזנת","B":"טיפולים כימותרפיים","C":"פעילות גופנית אינטנסיבית בלבד","D":"עודף ויטמין D","E":"אלרגיה עונתית","F":"שתייה מרובה של מים","G":"חוסר שינה זמני"},"answer":["B"],"multi":false,"explanation":"המצגת מציינת שהסיבה הנפוצה ביותר לשילוב של פרופיל שומנים מסוכן, אנמיה קשה וספירה לבנה נמוכה מאוד היא טיפולים כימותרפיים, אשר פוגעים במח העצם ובמטבוליזם הכללי. שקופית: 16 - פרופיל שומנים מסוכן","slides":"","section":"B"},{"n":7,"text":"גבר בן 55 עם עודף משקל ויתר לחץ דם מגיע עם כאב חד במפרק בכף הרגל ורמת חומצה אורית גבוהה בבדיקת הדם. מהי המלצת התזונה שהמצגת מציעה עבור מטופל כזה?","options":{"A":"תזונה עתירת בשר אדום לחיזוק השרירים","B":"תזונה פרו-צמחונית, ללא קמחים, לאיזון הסוכר","C":"צום ממושך של שבוע ללא כל הגבלה נוספת","D":"הגברת צריכת אלכוהול להרפיית המפרקים","E":"תזונה עתירת סוכר לאנרגיה מהירה","F":"הימנעות מוחלטת מכל ירק עלים","G":"תזונה המבוססת בעיקרה על פירות ים בלבד"},"answer":["B"],"multi":false,"explanation":"המצגת ממליצה לחולה גאוט על תזונה פרו-צמחונית, ללא קמחים, לאיזון הסוכר - תוך הימנעות מאלכוהול (הפוגע בסילוק חומצה אורית) ומודעות לכך שגם צריכת סוכר וגם בשר/עוף/דגים מעלים את הייצור. שקופית: 17-18 - גאוט / חומצת שתן ותזונה","slides":"","section":"B"},{"n":8,"text":"אישה מבוגרת עם מסת שריר ירודה (סרקופניה) מגיעה עם ערך קריאטינין נמוך בבדיקת הדם, ללא כל תלונה אחרת. איך יש לפרש ממצא זה, לפי המצגת?","options":{"A":"קריאטינין נמוך יכול לנבוע ממסת שריר נמוכה, ולא בהכרח מצביע על פתולוגיה כלייתית","B":"יש להפנות מיד לדיאליזה; יש לחשוד מיידית בגידול ממאיר","C":"יש לאבחן מיידית אי-ספיקת כליות חריפה; קריאטינין נמוך תמיד מעיד על מחלת כבד","D":"התוצאה מחייבת הפסקת כל תרופה שהמטופלת נוטלת; יש להתעלם מהתוצאה כי קריאטינין אינו קשור לשריר"},"answer":["A"],"multi":false,"explanation":"המצגת מציינת שהסיבה לקריאטינין נמוך יכולה להיות מסת שריר נמוכה - ממצא שכיח וסביר במיוחד אצל מבוגרים עם סרקופניה, ואינו מצביע בהכרח על בעיה כלייתית. שקופית: 9 - קריאטינין","slides":"","section":"B"},{"n":9,"text":"מטופלת הנוטלת גלולות למניעת היריון ומחלימה לאחרונה מדלקת ריאות מגיעה עם רמת פריטין גבוהה בבדיקת דם. האם ניתן להסיק ממצא זה על מאגרי הברזל האמיתיים בגופה, לפי המצגת?","options":{"A":"לא בהכרח - פריטין עולה גם במצבים כמו דלקת ריאות ושימוש בגלולות למניעת היריון, ולכן ייתכן שאינו משקף נאמנה את מאגר הברזל האמיתי","B":"כן, אך רק אם המטופלת מעל גיל 80; כן, יש לאבחן מיידית המוכרומטוזיס","C":"לא, כי פריטין כלל אינו קשור לברזל; כן, יש להתחיל מיד טיפול בהפחתת ברזל","D":"לא, כי גלולות מורידות תמיד את הפריטין; כן, פריטין הוא תמיד מדד מדויק ומיידי למאגרי הברזל בכל מצב"},"answer":["A"],"multi":false,"explanation":"המצגת מפרטת רשימת מצבים שבהם פריטין עולה ואינו מייצג נאמנה את רמת הברזל האמיתית, ובהם דלקת ריאות וגלולות למניעת היריון (וכן דלקת כרונית בדרכי השתן, לופוס, סרטן השד, לאחר ניתוח, מחלת כבד דלקתית ושתיית אלכוהול) - ולכן יש לפרש את הפריטין בזהירות ובהקשר הקליני המלא. שקופית: 18 - פריטין לא אמין","slides":"","section":"B"},{"n":10,"text":"מטופל צעיר עם אנמיה מחסר ברזל חוזרת ונשנית, למרות תזונה עשירה בברזל, מגיע לבירור נוסף. אילו מחלות מוזכרות במצגת כמחלות שצפוי שיגרמו לחוסר ברזל דרך פגיעה בספיגה?","options":{"A":"צליאק וקרוהן","B":"אסתמה וסוכרת","C":"מיגרנה ואקזמה","D":"דלקת מפרקים שגרונית ופסוריאזיס","E":"יתר לחץ דם וקוצר נשימה","F":"אבנים בכליות ודלקת ריאות","G":"הפטיטיס A ושפעת"},"answer":["A"],"multi":false,"explanation":"המצגת מציינת ספציפית שצליאק וקרוהן הן מחלות שצפוי שיגרמו לחוסר ברזל, כתוצאה מפגיעה בספיגה במעי (התריסריון והחלק הראשון של המעי הדק) - ולכן אנמיה חוזרת חרף תזונה עשירה בברזל מחייבת בירור לכיוון מחלות מעי כאלה. שקופית: 19-20 - ברזל / אנמיה מחסר ברזל","slides":"","section":"B"},{"n":9000,"text":"בתסמונת ז'ילבר יש עלייה קלה בבילירובין הבלתי-ישיר, ללא כל בעיה או סכנה — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["A"],"multi":false,"explanation":"המשפט נכון על פי החומר. כל המשפטים תואמים במדויק את תוכן המצגת לגבי צהבת ילודים, תסמונת ז'ילבר (עלייה שפירה בבילירובין הבלתי-ישיר עקב פגם גנטי באנזים הצימוד) וגורמים נוספים לעליית בילירובין. שקופית: 13 - בילירובין (המשך)","slides":"","section":"A","tf":1},{"n":9001,"text":"T3 ו-T4 הם שני שמות לאותו הורמון בדיוק — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["B"],"multi":false,"explanation":"המשפט שגוי על פי החומר. המצגת מבהירה ש-T4 (טירוקסין) הוא ההורמון שמפרישה בלוטת התריס אך אינו פעיל בעצמו (פרו-הורמון המכיל אטומי יוד), בעוד ש-T3 הוא ההורמון הפעיל המווסת את המטבוליזם. שקופית: 14 - הורמוני בלוטת התריס","slides":"","section":"A","tf":1},{"n":9002,"text":"הבדיקה הרלוונטית בודקת ברזל הקשור לטרנספרין — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["A"],"multi":false,"explanation":"המשפט נכון על פי החומר. המצגת מציינת שהבדיקה בודקת ברזל הקשור לטרנספרין, שספיגת ברזל מהצומח מהווה אתגר יחסי, ושהספיגה מתרחשת בתריסריון ובחלק הראשון של המעי הדק (וכן שיש איבוד ברזל יומיומי טבעי דרך נשירת תאי עור ואפיתל). שקופית: 19 - ברזל","slides":"","section":"A","tf":1},{"n":9003,"text":"תסמונת ז'ילבר אינה קשורה לשום אנזים או תהליך גנטי — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["B"],"multi":false,"explanation":"המשפט שגוי על פי החומר. לפי המצגת, ז'ילבר היא תופעה שפירה וגנטית (בעיה באנזים הצימוד) הגורמת לעלייה קלה בבילירובין הבלתי-ישיר, ואינה כרוכה בסכנה, זיהום, השתלה או ביופסיה. שקופית: 13 - בילירובין (המשך)","slides":"","section":"A","tf":1},{"n":9004,"text":"עליית הכולסטרול בעקבות סוכר גבוה נובעת מירידה בייצור בכבד — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["B"],"multi":false,"explanation":"המשפט שגוי על פי החומר. לפי המצגת, סוכר גבוה גורם להיעדר משוב שלילי לכבד, וכתוצאה מכך עולה (ולא יורד) ייצור הכולסטרול בכבד - ולא בגלל שומן במזון או פעילות גופנית. שקופית: 7 - סוכר גבוה וכולסטרול","slides":"","section":"A","tf":1},{"n":9005,"text":"ערך TG גבוה (מעל כ-150) הוא סימן לא טוב ומעיד על אורח חיים לא בריא — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["A"],"multi":false,"explanation":"המשפט נכון על פי החומר. המצגת מדגישה שה-TG משתנה מאוד בהתאם לתזונה שלפני הבדיקה, וכי ערך גבוה (מעל כ-150) הוא סימן לא טוב המעיד על אורח חיים לא בריא. שקופית: 4 - LDL/TG ותזונה","slides":"","section":"A","tf":1}]},{"id":"31","title":"מבוא לטיפול, טיפול באתגרים בריאותיים נפוצים, תפריטים לדוגמא","questions":[{"n":1,"text":"אצל מטופל בריא שאין לו מחלת כליות, איזה מהגורמים הבאים עלול להעלות זמנית את רמת הקריאטינין בדם?","options":{"A":"מחלת כליה כרונית הפוגעת ביכולת הסינון","B":"ירידה במסת השריר","C":"שתיית מים מרובה","D":"אימון עוצמתי בחדר כושר","E":"צריכת פחמימות גבוהה","F":"חוסר שינה כרוני","G":"צריכת מלח מוגברת"},"answer":["D"],"multi":false,"explanation":"קריאטינין מיוצר מפירוק רקמת שריר ומפונה דרך הכליות. אימון עוצמתי בחדר כושר גורם לעלייה זמנית בקריאטינין, בניגוד למחלת כליה שהיא בעיה מתמשכת בסינון. שקופית: 22 - קריאטינין","slides":"","section":"A"},{"n":2,"text":"אילו מהעקרונות הבאים הוזכרו במפורש כעקרונות טיפול טבעי במחלות כרוניות?","options":{"A":"הימנעות מוחלטת מתוספי תזונה","B":"התמקדות בהפחתת קלוריות בלבד","C":"איזון מערכת העצבים","D":"ביטול פעילות גופנית לטובת מנוחה","E":"הסתמכות בלעדית על תרופות מרשם","F":"צמצום חשיפה לרעלים","G":"הפחתת צריכת חלבון לאפס"},"answer":["C","F"],"multi":true,"explanation":"בין עקרונות הטיפול הטבעי במחלות כרוניות מופיעים איזון מערכת העצבים וצמצום החשיפה לרעלים, לצד תזונה, תנועה, שינה, נשימות ואיזון תודעתי. שקופית: 23 - עקרונות הטיפול הטבעי במחלות כרוניות","slides":"","section":"A"},{"n":3,"text":"אילו מהמשפטים הבאים לגבי הטיפול התזונתי נכונים?","options":{"A":"הגוף מרפא את המחלה, לא המזון","B":"המזון מספק את \"הדלק והתחמושת\" לתהליכי הריפוי","C":"מטרת התזונה הטבעית היא לספק חומרי גלם הדרושים לפעילות תקינה של מערכות הגוף","D":"מטרה נוספת היא למנוע \"פתיחת חזיתות נוספות\" על ידי מאכלים שמעמיסים ומזיקים לגוף","E":"התזונה שמונעת מחלות היא גם זו שמאיצה ותומכת בריפוי","F":"עקרונות התזונה דומים ברוב המחלות, אך יש דגשים שונים למחלות שונות","G":"האתגר האמיתי הוא להתאים את העקרונות לחיי המטופל וללוות אותו בתהליך השינוי"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל המשפטים תואמים במדויק את התוכן שהוצג בשקופית לגבי מהות הטיפול התזונתי ומטרתו. שקופית: 24 - הטיפול התזונתי","slides":"","section":"A"},{"n":4,"text":"אילו מהקביעות הבאות נכונות לגבי טיפול באדם עם עודף משקל?","options":{"A":"יש להתמקד אך ורק בהפחתת כמות הקלוריות הנכנסות, גם אצל מי שעשה דיאטות רבות","B":"יש להימנע משיפוטיות כלפי אדם עם עודף משקל","C":"רמות קורטיזול גבוהות כרוניות אינן קשורות לצבירת שומן","D":"שינה אינה גורם משמעותי בירידה במשקל","E":"יש לבדוק TSH לפני תחילת הטיפול כדי לשלול תת פעילות בלוטת התריס","F":"חשיפה סביבתית ומשפחתית בילדות אינה משפיעה על הרגלי התזונה בבגרות","G":"יש לזכור שבגיל המעבר יש האטה בחילוף החומרים"},"answer":["B","E","G"],"multi":true,"explanation":"יש להימנע משיפוטיות, לבדוק TSH לשלילת תת-פעילות בלוטת התריס ולזכור את ההאטה המטבולית בגיל המעבר. לעומת זאת אצל מי שעשה דיאטות רבות מומלץ להתמקד יותר בהגדלת הקלוריות היוצאות מאשר בהפחתת הנכנסות, וקורטיזול גבוה כן גורם לצבירת שומן. שקופית: 26 - עודף משקל: הכי חשוב לזכור / לפני שמתחילים","slides":"","section":"A"},{"n":5,"text":"אילו מהקביעות הבאות לגבי האסטרטגיה הראשונית לטיפול בעודף משקל נכונות?","options":{"A":"מומלץ למלא את הבטן בכל ארוחה כדי למנוע נשנושים","B":"יש לעודד צריכת שמן נוזלי בכמות גדולה כדי לשפר ספיגת ויטמינים","C":"יש לאכול פחמימות מורכבות ללא הגבלה וללא קשר לירקות","D":"מומלץ לאכול גם כשלא רעבים, כדי לשמור על רמת אנרגיה קבועה","E":"יש להימנע מלעיסה מרובה כדי לזרז את קצב הארוחה","F":"תזונה עתירת קמח מומלצת כבסיס לתפריט להרזיה","G":"פעילות גופנית אינה נחוצה כל עוד שומרים על תזונה נכונה","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"האסטרטגיה שהוצגה היא הפוכה - לא להיות שבע ולא למלא את הבטן, לאכול רק כשרעבים, ללעוס הרבה, להימנע משמן נוזלי לחלוטין, לאכול פחמימות מורכבות רק עם סלט ירקות גדול, להימנע לרוב מקמחים, ולשלב פעילות גופנית סדירה. שקופית: 27 - עודף משקל: האסטרטגיה הראשונית","slides":"","section":"A"},{"n":6,"text":"מדוע חלבון עוזר לירידה במשקל, לפי השקופית?","options":{"A":"חלבון מוריד את רמות האינסולין בצורה ישירה, ללא קשר לפחמימות","B":"חלבון מגביר הפרשת אינסולין ובכך משפר שריפת שומן","C":"חלבון גורם לירידה מיידית במסת השריר","D":"חלבון מבטל לחלוטין את תחושת הרעב למשך היום כולו","E":"פירוק חלבון דורש יותר אנרגיה לעומת פירוק מקרו-נוטריאנטים אחרים","F":"חלבון מגביר את הצורך בצריכת פחמימות נוספות","G":"חלבון מוריד את חום הגוף ובכך מפחית תיאבון"},"answer":["E"],"multi":false,"explanation":"פירוק חלבון דורש יותר אנרגיה לעומת כל מקרו-נוטריאנט אחר, לצד השפעתו החיובית על הורמוני רעב ושובע והיותו גורם לאכילה מופחתת במשך היום. שקופית: 28 - חלבון וירידה במשקל","slides":"","section":"A"},{"n":7,"text":"אילו מהיתרונות הבאים של צום חלקי לסירוגין הוזכרו בשקופית?","options":{"A":"גורם לרוב לאכילת יתר בימים שלאחר מכן","B":"גורם לחוסרים תזונתיים משמעותיים","C":"מקצר תוחלת חיים בחולדות","D":"מונע האטה בחילוף החומרים","E":"מכביד על מערכת העיכול","F":"מצריך תמיד תוספי תזונה נלווים","G":"מעודד תהליכי אוטופגיה ומיטופגיה"},"answer":["D","G"],"multi":true,"explanation":"צום חלקי לסירוגין מונע האטה בחילוף החומרים ומעודד אוטופגיה ומיטופגיה, ולא גורם בדרך כלל לאכילת יתר, לחוסרים תזונתיים או להכבדה על מערכת העיכול. שקופית: 30 - יתרונות צום חלקי לסירוגין ושיטות (16/8)","slides":"","section":"A"},{"n":8,"text":"אילו מהקביעות הבאות נכונות ביחס לצום לסירוגין באופן כללי?","options":{"A":"בכל הפרוטוקולים מדובר בצום מלא של מים בלבד, ללא יוצא מן הכלל","B":"יש עשרות פרוטוקולים שונים לצום לסירוגין","C":"כל הפרוטוקולים מבוססים על מחזוריות של יום כן יום לא בלבד","D":"הרעיון המשותף הוא צמצום חלקי או מלא בצריכה הקלורית במחזוריות כלשהי","E":"עיקר הביקורת על הגישה טוענת שהתועלת נובעת דווקא מתזמון האכילה ולא מהפחתה קלורית כללית","F":"משך הצום בפרוטוקולים השונים נע משעות בודדות ועד מספר ימים","G":"אין כל ביקורת מדעית על גישת הצום לסירוגין"},"answer":["B","D","F"],"multi":true,"explanation":"יש עשרות פרוטוקולים שונים, הרעיון המשותף הוא צמצום קלורי חלקי או מלא במחזוריות משתנה, ומשך הצום נע משעות בודדות ועד ימים. לעומת זאת הביקורת המרכזית טוענת שהירידה במשקל נובעת מהפחתה קלורית כללית ולא מעצם הצום לסירוגין. שקופית: 29 - צום לסירוגין: מבוא","slides":"","section":"A"},{"n":9,"text":"אילו מהמשפטים הבאים לגבי מושגים ומדידת לחץ דם נכונים?","options":{"A":"תפוקת הלב מבטאת כמה דם הלב מזרים בדקה","B":"ההתנגדות הפריפרית תלויה בין היתר בקוטר כלי הדם ובנפח הדם","C":"לחץ דם סיסטולי הוא הלחץ הנמדד בעת כיווץ הלב","D":"לחץ דם דיאסטולי הוא הלחץ הנמדד בעת הרפיית הלב","E":"יש למדוד לחץ דם פעמיים או שלוש פעמים ולהתייחס לבדיקה השנייה או השלישית","F":"יש למדוד לחץ דם לאחר ישיבה במנוחה למשך מספר דקות","G":"הגוף יכול להעלות לחץ דם באמצעות כיווץ עורקים, האצת קצב הלב והגדלת נפח הנוזלים בגוף"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל הקביעות תואמות את ההגדרות והכללים שהוצגו למדידת לחץ דם ולמנגנוני העלאתו על ידי הגוף. שקופית: 39-40 - יתר לחץ דם: מושגים ומדידה","slides":"","section":"A"},{"n":10,"text":"אילו מהקביעות הבאות לגבי תחמוצת החנקן (NO) ותפקידה בהרחבת כלי הדם נכונות?","options":{"A":"רדיקלים חופשיים משפרים את פעילות האנזים הסינתאז ומגבירים ייצור NO","B":"מומלצת תזונה דלת נוגדי חמצון כדי לשמר את פעילות ה-NO","C":"פירות יער וירקות עליים אינם תורמים לייצור NO בגוף","D":"כל המחקרים על קקאו והרחבת כלי דם הראו תוצאות זהות לחלוטין ללא כל שונות","E":"יש להרבות בצריכת סוכר לצד קקאו כדי למקסם את האפקט על כלי הדם","F":"אלוורה וקקטוס אינם קשורים כלל לנושא הרחבת כלי הדם בהקשר זה","G":"NO פועל רק על שרירי הלב ולא על העורקים ההיקפיים","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"רדיקלים חופשיים פוגעים בפעילות הסינתאז, ולכן נדרשת דווקא תזונה עתירת נוגדי חמצון (פירות, ירקות, עלים, פירות יער). נמצאה שונות גדולה בין מחקרי הקקאו, יש להיזהר מסוכר נלווה, ואלוורה/קקטוס הוזכרו כתוספת אפשרית לשיפור הרפיית כלי הדם ההיקפיים. שקופית: 43-44 - NO וכיצד הוא פועל באופן טבעי","slides":"","section":"A"},{"n":11,"text":"מי מבין המטופלים הבאים נחשב, לפי השקופית, כמי שצום לסירוגין אינו מתאים לו?","options":{"A":"אדם הנוטל תרופות מרשם ומקפיד על מעקב רפואי","B":"אישה בהיריון שהייתה רגילה לצום לסירוגין חודשים רבים לפני ההיריון","C":"מבוגר בריא המבצע את הצום בהדרגה ובזהירות","D":"אדם שעושה צום רק בחלק מימות השבוע","E":"אדם עם לחץ דם תקין החש בטוב","F":"אדם עם היסטוריה של הפרעות אכילה","G":"ספורטאי הבונה מסת שריר תוך כדי הקפדה על תזונה"},"answer":["F"],"multi":false,"explanation":"היסטוריה של הפרעות אכילה מוזכרת במפורש כניגוד לצום לסירוגין. לעומת זאת נטילת תרופות מותרת בזהירות, אישה שהייתה רגילה לכך לרוב יכולה להמשיך, וביצוע חלקי או הדרגתי מותרים. שקופית: 32 - למי צום לסירוגין לא מתאים ונשים","slides":"","section":"A"},{"n":12,"text":"אילו מהקביעות הבאות נכונות ביחס לצום לסירוגין ומחזור וסת אצל נשים?","options":{"A":"הפסקת המחזור עקב צום לסירוגין היא תמיד בלתי הפיכה","B":"אין שום קשר בין צום לסירוגין לבין סדירות המחזור החודשי","C":"דווח על הפסקת מחזור בנשים שעשו צום לסירוגין","D":"כאשר ההפסקה במחזור קצרה, היא לרוב בלתי הפיכה","E":"שינוי דרסטי בכמות הקלוריות וירידה מהירה מדי במשקל עלול להוביל לאי-סדירות במחזור ואף להפסקתו","F":"צום לסירוגין תמיד גורם לעלייה בפוריות","G":"ההנחיה היא שנשים לעולם לא יעשו צום לסירוגין"},"answer":["C","E"],"multi":true,"explanation":"דווח על מקרים של הפסקת מחזור בנשים שביצעו צום לסירוגין, ושינוי דרסטי בכמות הקלוריות עם ירידה מהירה מדי במשקל עלול לגרום לאי-סדירות ואף להפסקת המחזור. ברוב המקרים ההפסקה הפיכה, אלא אם נמשכה זמן רב מאוד. שקופית: 32 - צום לסירוגין לנשים","slides":"","section":"A"},{"n":13,"text":"אילו מהקביעות הבאות על שיטת ה-Alternate-Day Fasting (ADF) נכונות?","options":{"A":"הרעיון הוא אכילה במעגלים של יום אכילה רגילה ולאחריו יום צום","B":"המחקרים שנעשו על השיטה היו ארוכי טווח ומקיפים","C":"השיטה נחקרה אך ורק בבעלי חיים ולא בבני אדם כלל","D":"ביום הצום מותר לשתות מים, סודה ותה/קפה ללא ממתיקים","E":"אין שום עדות ליעילות השיטה בירידה במשקל","F":"השיטה הובילה במחקרים לירידה משמעותית במשקל ובשומן הבטני ולשיפור במדדים קרדיווסקולריים","G":"השיטה כרוכה תמיד בצום מלא של שבוע רצוף"},"answer":["A","D","F"],"multi":true,"explanation":"ADF מבוססת על מעגלים של יום אכילה רגילה ויום צום, כאשר ביום הצום מותרים מים, סודה ותה/קפה ללא ממתיקים. המחקרים הראו ירידה משמעותית במשקל ובשומן הבטני ושיפור קרדיווסקולרי, אך היו כולם קצרי טווח. שקופית: 33 - Alternate-Day Fasting (ADF)","slides":"","section":"A"},{"n":14,"text":"אילו מהמשפטים הבאים לגבי FMD (Fasting Mimicking Diet) נכונים?","options":{"A":"השיטה פותחה על ידי דר' לונגו","B":"לונגו ראה את יתרונות צומות המים אך לא הצליח לקבל אישורי הלסינקי למחקרים על צום מלא","C":"השיטה מבוססת על תפריט דל קלוריות המורכב בעיקר מירקות, זיתים ואגוזים","D":"במהלך השיטה נמנעים כמעט לחלוטין מפחמימות","E":"חוזרים על הפרוטוקול בממוצע פעם בחודשיים, ויש הנוהגים לעשות זאת פעם בחודש","F":"בעקבות השיטה תועדו ירידה במשקל, איזון סוכר, עלייה ברמת קטונים ושיפור במיקרוביום","G":"תועדה תועלת של השיטה במחלות מטבוליות, דלקתיות, אוטואימוניות וסרטן"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל הפרטים תואמים את מקורה, עקרונותיה ותוצאותיה המתועדות של שיטת ה-FMD כפי שהוצגו בשקופיות. שקופית: 34-35 - FMD: מבוא ותוצאות","slides":"","section":"A"},{"n":15,"text":"אילו מהקביעות הבאות לגבי סימני השאלה שהועלו על שיטת ה-FMD נכונות?","options":{"A":"החוקרים קבעו בוודאות שהגוף אינו נכנס למצב הגנה במהלך הצום","B":"פעילות גופנית בימי הצום ואחריו בטוח מגבירה איבוד מסת שריר","C":"המחקרים על גישה זו ארוכי טווח ומקיפים מאוד","D":"בחמישה ימים רצופים של צריכת חלבון נמוכה בוודאות לא תהיה כל פגיעה במסת השריר","E":"אין כל שאלה לגבי השפעות ארוכות הטווח של הגישה","F":"ההשפעה על חילוף החומרים לעולם אינה עלולה להיפגע מתחושת \"מגננה\" של הגוף","G":"פעילות גופנית לפני ואחרי הצום עלולה תמיד להזיק ולכן אינה מומלצת","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"יש שאלה פתוחה האם הגוף ייכנס למצב הגנה ויאט את חילוף החומרים (פעילות גופנית עשויה למנוע זאת ולא להגביר איבוד שריר), המחקרים קצרי טווח, וחמישה ימים של חלבון נמוך יגרמו בוודאות לאיבוד מסת שריר. שקופית: 35 - FMD: סימני שאלה","slides":"","section":"A"},{"n":16,"text":"לפי השקופית, מהו הזמן המומלץ לביצוע פעילות גופנית מבחינת מצב הקיבה?","options":{"A":"בערב, על קיבה מלאה","B":"מיד לאחר ארוחת הצהריים","C":"בבוקר, על קיבה ריקה","D":"באמצע הלילה","E":"תמיד יחד עם ארוחה עשירה בפחמימות","F":"רק לאחר צום של שבוע שלם","G":"אין להתייחס כלל לתזמון הפעילות הגופנית"},"answer":["C"],"multi":false,"explanation":"השקופית מציינת כי עיתוי הפעילות הגופנית המועדף הוא בבוקר, על קיבה ריקה. שקופית: 36 - טריקים נוספים לירידה במשקל","slides":"","section":"A"},{"n":17,"text":"אילו מהקביעות הבאות לגבי כלים נוספים לתמיכה בירידה במשקל מופיעות בשקופית?","options":{"A":"יש להימנע לחלוטין מכל פעילות גופנית משותפת עם אחרים","B":"מקלחת קרה מאוד למשך דקה כל יום","C":"אבקת קפה שחור אסורה באופן מוחלט לפני אימון","D":"יש להימנע משתיית תה ירוק בכל מצב","E":"בניית מסת שריר ועליה במדרגות אינן מומלצות כחלק מפעילות גופנית","F":"שתיית תה ירוק עשויה לסייע בשמירה על המשקל לאחר ירידה","G":"שתיית אבקת קקטוס בלבד ללא שום פעילות נוספת מספיקה"},"answer":["B","F"],"multi":true,"explanation":"מוזכרים מקלחת קרה מאוד למשך דקה מדי יום, ותה ירוק שיש מחקרים שהראו שהוא מסייע לשמירה על משקל לאחר ירידה. פעילות משותפת עם בן/בת זוג או חבר, קפה שחור/אספרסו לפני אימון, ובניית מסת שריר ועליה במדרגות כולם מומלצים ולא אסורים. שקופית: 36 - טריקים נוספים לירידה במשקל","slides":"","section":"A"},{"n":18,"text":"אילו מהגישות הבאות הוזכרו כאפשרויות נוספות אם הטיפול הראשוני בהרזיה אינו מספיק?","options":{"A":"שיטת 5:2 (חמישה ימי אכילה רגילה, יומיים של הגבלה)","B":"חובה לעבור ניתוח בריאטרי כשלב הבא","C":"יום צום שבועי שבו שותים רק מים ובערב מרק ירקות","D":"יש להפסיק לחלוטין כל פעילות גופנית בשלב זה","E":"ניקוי איורוודי המבוסס על תבשיל אחד וירקות למשך חודש","F":"אסור בהחלט לשתות מיצים או שייקים בשום שלב","G":"יש להימנע משימור מסת השריר בזמן צום פירות וירקות"},"answer":["A","C","E"],"multi":true,"explanation":"בין האפשרויות הנוספות שהוצגו: שיטת 5:2, יום צום שבועי (מים בלבד ומרק ירקות בערב), וניקוי איורוודי של תבשיל וירקות במשך חודש. לא הוזכר ניתוח בריאטרי, הפסקת פעילות גופנית, איסור מוחלט על מיצים/שייקים, וההנחיה היא דווקא לשמר מסת שריר. שקופית: 37 - אם זה לא עוזר (המשך אפשרויות)","slides":"","section":"A"},{"n":19,"text":"אילו מהמשפטים הבאים לגבי דגשים לטיפול טבעי ביתר לחץ דם נכונים?","options":{"A":"ירידה במשקל היא דגש מרכזי בטיפול הטבעי ביתר לחץ דם","B":"פעילות גופנית מומלצת כחלק מהטיפול","C":"מומלץ לעודד פעילות פאראסימפתטית באמצעים כמו נשימות סרעפתיות, יוגה, צ'י-קונג וטאי-צ'י","D":"ניהול סטרס, מגע, שינוי דפוסי חשיבה וצחוק נמנים עם הדגשים המומלצים","E":"יש להקפיד על שינה מספקת","F":"אין חובה להימנע ממלח לחלוטין, אך גם לא כדאי להרבות בו","G":"הפעלת קולטנים בדפנות העורקים גורמת להרפיית השרירים ולהגדלת קוטר העורק, מה שמוריד את לחץ הדם"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל הדגשים תואמים במדויק את ההמלצות שהוצגו לטיפול טבעי ביתר לחץ דם, כולל המנגנון הפיזיולוגי של הרחבת כלי הדם. שקופית: 43 - דגשים לטיפול טבעי ביתר לחץ דם","slides":"","section":"A"},{"n":20,"text":"אילו מהקביעות הבאות לגבי מזונות וחליטות להורדת לחץ דם נכונות?","options":{"A":"הירק (שאינו עלה ירוק) המכיל הכי הרבה ניטראטים הוא תפוח אדמה","B":"מבין העלים הירוקים, לתרד יש את ריכוז הניטראטים הגבוה ביותר, גבוה יותר מרוקט","C":"חליטת היביסקוס ידועה כבעלת ריכוז נוגדי החמצון הנמוך ביותר מבין החליטות","D":"מנגולד הוא זן שבוית כדי להגדיל את השורש על חשבון העלים","E":"כוסברה וחסת משי אינן נחשבות מקור לניטראטים לפי השקופית","F":"תה שחור ותה ירוק אינם קשורים כלל להורדת לחץ דם","G":"עלי בייבי כגון רוקט, גרגיר הנחלים ותרד אינם תורמים לניטראטים בתזונה","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"הירק שאינו עלה ירוק עם הכי הרבה ניטראטים הוא רוברב, והעלה עם הריכוז הגבוה ביותר הוא רוקט (ארוגולה). היביסקוס דווקא בעלת ריכוז נוגדי חמצון גבוה, מנגולד בוית לטובת העלים על חשבון השורש, וכוסברה, חסת משי, עלי בייבי, תה שחור ותה ירוק כולם מוזכרים כתורמים להורדת לחץ דם. שקופית: 45-47 - מזונות המכילים ניטראטים, עלים ירוקים וחליטות","slides":"","section":"A"},{"n":21,"text":"לפי השקופית, איזה רכיב בתפוזים צוין כתורם להורדת לחץ דם ולשיפור תפקוד אנדותל כלי הדם?","options":{"A":"ליקופן","B":"בטא-קרוטן","C":"קפאין","D":"טאורין","E":"אינולין","F":"הספרידין","G":"חומצה פולית"},"answer":["F"],"multi":false,"explanation":"השקופית מציינת כי בתפוזים נמצא חומר בשם הספרידין (hesperidin) שתורם להורדת לחץ דם ולשיפור תפקוד כלי הדם. שקופית: 50 - מזונות נוספים המורידים לחץ דם","slides":"","section":"A"},{"n":22,"text":"אילו מהמזונות הבאים הוזכרו כתורמים להורדת לחץ דם על בסיס מחקרים שהוצגו בשקופית?","options":{"A":"שוקולד חלב מתועש","B":"משקאות אנרגיה","C":"תפוחים","D":"בשר אדום מעובד","E":"חמאה","F":"תרד","G":"סוכריות דלות קלוריות"},"answer":["C","F"],"multi":true,"explanation":"תפוחים ותרד הוזכרו במפורש כמזונות שתורמים לשיפור מדדי תחמוצת החנקן ותפקוד אנדותל כלי הדם, בהתבסס על מחקר שהוצג בשקופית. שקופית: 50 - מזונות נוספים המורידים לחץ דם (המשך)","slides":"","section":"A"},{"n":23,"text":"אילו משלושת המזונות הבאים הוזכרו במפורש כמזונות שנמצאו מורידים לחץ דם או משפרים תפקוד אנדותליאלי?","options":{"A":"חמאת בוטנים ממותקת","B":"אוכמניות (Blueberries)","C":"משקאות מוגזים ממותקים","D":"אגוזי מלך","E":"גבינה צהובה מעובדת","F":"נקניקיות","G":"שום"},"answer":["B","D","G"],"multi":true,"explanation":"אוכמניות, אגוזי מלך ושום הוזכרו כולם כמזונות שנחקרו ונמצאו תורמים להורדת לחץ דם ולשיפור תפקוד אנדותליאלי, בהתבסס על מקורות שצוינו בשקופית. שקופית: 50 - מזונות נוספים המורידים לחץ דם (המשך)","slides":"","section":"A"},{"n":24,"text":"אילו מהמשפטים הבאים לגבי הגדרת ומנגנוני האוסטיאופורוזיס נכונים?","options":{"A":"אוסטיאופורוזיס מוגדר כירידה בצפיפות העצם ואיבוד מינרלים מהעצם","B":"T score משווה את צפיפות עצם המטופל לצפיפות עצם ייחוס (לנשים/גברים), במספר סטיות תקן מעל או מתחת לממוצע","C":"Z score משווה את צפיפות העצם לאנשים מאותו מין וגיל, במספר סטיות תקן","D":"בין מנגנוני המחלה יש חוסר במרכיב המינרלי של העצם (הסידן)","E":"פגיעה בקשרים המצליבים בין סיבי הקולגן בשלד האורגני של העצם עלולה לגרום לזליגת מינרלים","F":"חוסר איזון הורמונלי, כגון חוסר באסטרוגן, נמנה עם מנגנוני המחלה","G":"חוסר חשיפה לשמש בחברה המערבית מהווה גורם נוסף למחלה"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל הפרטים תואמים את ההגדרות (T score מול Z score) ואת מנגנוני האוסטיאופורוזיס שהוצגו: מרכיב מינרלי, שלד אורגני-קולגני, איזון תאי בנייה/פירוק, הורמונלי וחשיפה לשמש. שקופית: 52-53 - אוסטיאופורוזיס: הגדרה ומנגנונים","slides":"","section":"A"},{"n":25,"text":"אילו מהקביעות הבאות לגבי הטיפול העיקרי באוסטיאופורוזיס (עומס על השלד) נכונות?","options":{"A":"יש להימנע לחלוטין מעמידה ממושכת כדי להגן על העצם","B":"פעילות גופנית כמו קפיצה, הליכה וריצה אינה מומלצת לחיזוק העצם","C":"אין כל תועלת בבניית מסת שריר לבריאות העצם","D":"יש להימנע מנשיאת משקולות או תרמילים כדי לא להעמיס על השלד","E":"מומלץ להשתמש במעלית תמיד במקום במדרגות כדי להימנע מפציעה","F":"אין קשר בין הגבלת שעות מסך לילדים לבין פעילות גופנית ובריאות העצם","G":"עודף משקל מעולם אינו נחשב כגורם מגן מפני אוסטיאופורוזיס","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"הטיפול העיקרי דווקא ממליץ לעמוד כמה שיותר, לבצע קפיצה/הליכה/ריצה, לבנות מסת שריר, לשאת משקולות ותרמילים, לעלות במדרגות במקום במעלית, ולהגביל שעות מסך אצל ילדים לטובת משחק בחוץ. עודף משקל אף מוזכר כגורם מגן יחסית. שקופית: 54 - עיקר הטיפול באוסטיאופורוזיס","slides":"","section":"A"},{"n":26,"text":"לפי השקופית, איזה גורם צוין כמגן יחסית מפני אוסטיאופורוזיס אצל חלק גדול מהנשים הסובלות פחות מהמחלה?","options":{"A":"תזונה עתירת סוכר","B":"חוסר פעילות גופנית","C":"עישון כבד","D":"צריכת קפאין מרובה","E":"עודף משקל","F":"חשיפה מוגברת למסכים","G":"הימנעות מוחלטת מחלבון מהחי"},"answer":["E"],"multi":false,"explanation":"השקופית מציינת שבחלק גדול מהמקרים, לנשים שאינן סובלות מאוסטיאופורוזיס יש עודף משקל שמגן עליהן. שקופית: 55 - המשך הטיפול באוסטיאופורוזיס","slides":"","section":"A"},{"n":27,"text":"אילו מהקביעות הבאות לגבי תוספי תזונה לאוסטיאופורוזיס נכונות לפי השקופית?","options":{"A":"יש להימנע לחלוטין ממגנזיום בכל מקרה של אוסטיאופורוזיס","B":"ניתן לתת סידן בצורת כמוסות (למשל גסטרילקס) או טבליות סידן אמורפי","C":"ויטמין D אינו רלוונטי כלל לטיפול באוסטיאופורוזיס","D":"ויטמין K2 מומלץ במיוחד אצל אישה רזה שאינה אוכלת הרבה","E":"מומלץ להימנע מכל תוסף תזונה ולהסתמך אך ורק על תזונה","F":"יש לתת ברזל במינון גבוה כטיפול מרכזי","G":"אבץ הוא התוסף המרכזי המומלץ לאוסטיאופורוזיס לפי השקופית"},"answer":["B","D"],"multi":true,"explanation":"השקופית ממליצה על סידן בכמוסות (כגון גסטרילקס) או טבליות סידן אמורפי, וכן על ויטמין K2 במיוחד עבור אישה רזה שאינה אוכלת הרבה. מגנזיום וויטמין D כן מוזכרים כרלוונטיים, ולא הוזכרו ברזל או אבץ כתוספים מרכזיים. שקופית: 56 - תוספי תזונה לאוסטיאופורוזיס","slides":"","section":"A"},{"n":28,"text":"אילו מהקביעות הבאות לגבי מקורות ויטמין K2 נכונות לפי השקופית?","options":{"A":"כרוב כבוש וירקות מותססים אחרים ודאי אינם מכילים K2 כלל","B":"פלורת מעיים בריאה חיונית לייצור ויטמין K2 בגוף","C":"נאטו (פולי סויה מותססים עם חיידק ספציפי) מכיל בוודאות K2","D":"אין שום ספק מדעי לגבי תכולת K2 במזונות מותססים שונים","E":"ויטמין K2 אינו רלוונטי לאנשים בתזונה טבעונית","F":"K2 נמצא במזון מן החי","G":"המזונות המותססים הצמחיים הם המקור הבטוח והמוכח ביותר ל-K2, עדיף על פני מזון מן החי"},"answer":["B","C","F"],"multi":true,"explanation":"K2 נמצא במזון מן החי, ופלורת מעיים בריאה חיונית לייצורו בגוף. נאטו מכיל בוודאות K2, בעוד שלגבי מזונות מותססים אחרים (כמו כרוב כבוש) יש סימן שאלה ולא ודאות מלאה - ולכן הנושא רלוונטי במיוחד לאנשים בתזונה צמחונית/טבעונית/פרו-טבעונית. שקופית: 54 - דגשים תזונתיים נוספים לאוסטיאופורוזיס (ויטמין K2)","slides":"","section":"A"},{"n":29,"text":"אילו מהמשפטים הבאים לגבי נספח התפריטים לדוגמא נכונים?","options":{"A":"התפריטים בעמודים הבאים הם לדוגמא בלבד ואינם מחייבים","B":"מטרת התפריטים היא לתת רעיונות למטופל ולמטפל","C":"חשוב להיות יצירתיים במטבח בתזונה ובריפוי","D":"התפריטים לדוגמא מורכבים ממנות קלות ופשוטות שאינן דורשות זמן הכנה רב","E":"התפריטים אינם כוללים מנות מורכבות כמו קציצות טבעוניות או פשטידות","F":"ניתן להשתמש בתפריטים כבסיס ולהתאים אותם אישית למטופל","G":"התפריטים נועדו להראות כיוון אפשרי ולא נוסחה קבועה אחת נכונה"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל המשפטים תואמים את ההקדמה לנספח התפריטים לדוגמא - הם אינם מחייבים, נועדו לתת רעיונות, מבוססים על מנות פשוטות וקלות הכנה ומעודדים יצירתיות. שקופית: 56 - תפריטים לדוגמא - נספח","slides":"","section":"A"},{"n":30,"text":"אילו מהקביעות הבאות לגבי המשך טיפול כאשר לחץ הדם עדיין גבוה נכונות, לפי השקופית?","options":{"A":"יש לוותר מיד ולעבור לטיפול תרופתי בלבד ללא כל ניסיון תזונתי נוסף","B":"אין כל צורך בסבלנות - שינויים אמורים להיראות תוך יום אחד","C":"יש להפחית את תדירות הנשימה הסרעפתית כדי להוריד לחץ דם","D":"הגברת דאגות ומחשבות שליליות מומלצת כדי לשפר את התוצאה","E":"טבעונות דלת שומן ותזונה פליאו/קטוגנית נחשבות גישות מתונות באמצע הסקאלה, ללא הבדל מהותי מתזונה רגילה","F":"אין שום קשר בין דיאטת אורז/כוסמת לבין טיפול נוסף ביתר לחץ דם","G":"צום מים ממושך (\"נשק יום הדין\") אינו מוזכר כלל כאפשרות קיצונית","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"השקופית ממליצה דווקא על סבלנות, על הגברת תדירות הנשימה הסרעפתית ועל הפחתת דאגות. טבעונות דלת שומן ופליאו/קטוגני מוצגות כשתי גישות קיצוניות בקצוות הסקאלה, דיאטת אורז/כוסמת כן מוזכרת כאפשרות, וגם צום מים ממושך (\"נשק יום הדין\") מוזכר כאפשרות קיצונית אחרונה. שקופית: 51 - אם לחץ הדם עדיין גבוה וסיכום יתר לחץ דם","slides":"","section":"A"},{"n":1,"text":"מטופלת בת 45 מגיעה למרפאה בשל עודף משקל משמעותי. היא מספרת שניסתה דיאטות רבות בעבר ללא הצלחה, מרגישה עייפות מתמדת ואינה מצליחה לרדת במשקל למרות שהיא אוכלת מעט מאוד. לפני התחלת תוכנית טיפול תזונתי, מה הצעד הראשון המומלץ לפי החומר שנלמד?","options":{"A":"להתחיל מיד בצום לסירוגין של 16/8","B":"להפנות מיידית לניתוח בריאטרי","C":"להורות לה להפחית עוד יותר את כמות הקלוריות שהיא אוכלת","D":"לבדוק רמות TSH כדי לשלול תת פעילות של בלוטת התריס","E":"להתעלם מהעייפות ולהתמקד רק בתזונה","F":"להתחיל מיד בדיאטה קטוגנית קפדנית","G":"להמליץ על צום מים ממושך כצעד ראשון"},"answer":["D"],"multi":false,"explanation":"לפני התחלת טיפול בעודף משקל יש לבדוק TSH כדי לשלול תת-פעילות של בלוטת התריס. בנוסף, אצל מי שכבר עשתה דיאטות רבות מומלץ להתמקד יותר בהגדלת הקלוריות היוצאות מאשר בהפחתה נוספת של הנכנסות, כך שאפשרות קביעה זו שגויה. שקופית: 26 - עודף משקל: הכי חשוב לזכור / לפני שמתחילים","slides":"","section":"B"},{"n":2,"text":"גבר בן 68 עם היסטוריה של הפרעת אכילה בנעוריו, כיום במשקל יציב, מעוניין לנסות Alternate-Day Fasting (ADF) כדי לרדת כמה קילוגרמים. אשתו, בהיריון, מעוניינת להצטרף אליו ולבצע את אותו הפרוטוקול. אילו מהקביעות הבאות נכונות לגבי תוכנית הזוג?","options":{"A":"שני בני הזוג יכולים לבצע ADF ללא כל הגבלה","B":"יש להתחיל את שניהם בפרוטוקול צום מים מלא של שבוע","C":"יש להימנע מ-ADF אצל הבעל בשל ההיסטוריה של הפרעת אכילה","D":"אין צורך בזהירות מיוחדת אצל קשישים בביצוע שיטות צום","E":"אישה בהיריון אינה מועמדת מתאימה ל-ADF במהלך ההיריון","F":"יש להעדיף לוותר על פעילות גופנית בזמן ADF כדי לחסוך אנרגיה","G":"גיל 68 אינו רלוונטי כלל לשיקולי זהירות בביצוע שיטות צום"},"answer":["C","E"],"multi":true,"explanation":"ADF אינו מתאים לאנשים עם היסטוריה של הפרעות אכילה, ואינו מתאים כלל בהיריון והנקה. יש לציין שדווקא פעילות גופנית מומלצת במהלך ADF לשימור מסת שריר, ולא לוותר עליה. שקופית: 34 - ADF: למי לא מתאים","slides":"","section":"B"},{"n":3,"text":"מטופל בן 55 עם יתר לחץ דם (150/95) ועודף משקל, שאינו נוטל תרופות עדיין. הוא שואל אילו שינויים תזונתיים ואורח חיים יתאימו לו על בסיס החומר שנלמד. אילו מההמלצות הבאות מתאימות למטופל זה?","options":{"A":"להימנע כליל מכל פעילות גופנית עד שהלחץ דם יירד מתחת ל-110/70","B":"לשלב ירידה במשקל (כולל שיקול של צום לסירוגין בהתאם למצבו) כחלק מהטיפול","C":"להרבות במלח כדי לשפר את התיאבון","D":"להרבות בירקות עליים ירוקים עשירים בניטראטים כמו רוקט ותרד","E":"להתעלם מניהול סטרס כי אינו קשור ללחץ דם","F":"להימנע לחלוטין מכל צריכת שומן, כולל שמן זית","G":"לשתות חליטות כמו עלי זית, עוזרר והיביסקוס כתוספת אפשרית"},"answer":["B","D","G"],"multi":true,"explanation":"לפי הדגשים לטיפול טבעי ביתר לחץ דם, מומלץ לשלב ירידה במשקל, להרבות בעלים ירוקים עשירי ניטראטים ולשקול חליטות תומכות. לעומת זאת פעילות גופנית מומלצת ולא אסורה, אין להרבות במלח, ניהול סטרס חשוב מאוד, ושמן זית עשיר פוליפנולים דווקא תורם לתפקוד כלי הדם. שקופית: 22-26 (43-50) - דגשים לטיפול ביתר לחץ דם ומזונות תומכים","slides":"","section":"B"},{"n":4,"text":"מטופלת בריאה בת 40 מעוניינת לנסות FMD (Fasting Mimicking Diet) כדי לשפר סמנים מטבוליים. היא שואלת אתכם להסביר לה את השיטה. אילו מהמשפטים הבאים נכונים ומתאימים להסבר שתיתנו לה?","options":{"A":"השיטה פותחה כדי לשחזר חלק מהיתרונות של צום מים, מבלי לבצע צום מלא","B":"בימי הפרוטוקול התפריט דל קלוריות ומבוסס בעיקר על ירקות, זיתים ואגוזים, כמעט ללא פחמימות","C":"השיטה עשויה לתרום לירידה במשקל, איזון סוכר, עלייה בקטונים ושיפור במיקרוביום","D":"מומלץ לחזור על המחזור בערך אחת לחודשיים, ויש הנוהגים לעשות זאת אחת לחודש","E":"חשוב להסביר לה שהמחקרים על ההשפעות ארוכות הטווח עדיין מוגבלים יחסית","F":"כדאי להמליץ לה על פעילות גופנית בזמן הפרוטוקול ואחריו, מכיוון שיכולה לסייע למנוע האטה מטבולית","G":"יש להסביר לה שבימים עם צריכת חלבון נמוכה מאוד לאורך חמישה ימים רצופים צפויה פגיעה מסוימת במסת השריר"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל הפרטים תואמים את עקרונות שיטת ה-FMD, תוצאותיה והסתייגויות החוקרים לגביה, כפי שהוצגו בחומר. שקופית: 34-35 - FMD: מבוא, תוצאות וסימני שאלה","slides":"","section":"B"},{"n":5,"text":"מטופלת בת 60, רזה מאוד, בתפריט טבעוני קפדני, מאובחנת עם אוסטיאופורוזיס. קרובת משפחה מציעה לה מספר \"עצות\" שקראה באינטרנט. אילו מהעצות הבאות נכונות ומתאימות לפי החומר שנלמד?","options":{"A":"עדיף להימנע לחלוטין מכל פעילות גופנית נושאת משקל כדי לא \"לשחוק\" את העצם","B":"אין צורך בחשיפה לשמש כלל, שכן אין לכך קשר לבריאות העצם","C":"כדאי להימנע ממקורות סידן צמחיים כמו טחינה, שקדים וקטניות מונבטות כי הם אינם נספגים בגוף","D":"עדיף להימנע לחלוטין מוויטמין K2 אצל טבעונים כי הוא אינו רלוונטי להם","E":"מומלץ להוריד את צריכת החלבון לאפס כדי להגן על הכליות","F":"אין שום ערך לתרגילי בניית מסת שריר לבריאות העצם","G":"יש להימנע מנשיאת משקל נוסף (כמו תרמיל עם משקל) כי זה מזיק לעצם","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"כל העצות הפוכות מהמלצות החומר - מומלצת דווקא פעילות נושאת משקל, חשיפה לשמש רלוונטית למניעת המחלה, טחינה/שקדים/קטניות מונבטות הם מקורות סידן מומלצים, K2 חשוב במיוחד לטבעונים, חלבון גבוה מחזק עצמות, בניית מסת שריר מומלצת ונשיאת משקל נוסף (חגורה/תרמיל) מומלצת להעמסה על השלד. שקופית: 53-56 - דגשים תזונתיים וטיפול באוסטיאופורוזיס","slides":"","section":"B"},{"n":6,"text":"מטופל המעוניין בתזונה ללא דגנים וקטניות בכלל, אך מוכן לאכול בשר עוף ובקר, דגים וירקות בשפע. איזה מהתפריטים לדוגמא שהוצגו הכי מתאים לו?","options":{"A":"תפריט טבעונות דלת שומן","B":"תפריט עם קטניות בכל ארוחה","C":"תפריט המבוסס על קמחים בלבד","D":"תפריט צום מים ממושך יומיומי","E":"תפריט פליאו","F":"תפריט עתיר קמח לבן","G":"תפריט המבוסס אך ורק על מוצרי חלב"},"answer":["E"],"multi":false,"explanation":"התפריט הפליאו לדוגמא בנוי ללא דגנים וקטניות, וכולל עוף/בשר בקר, סלמון, סלט ירקות, ירקות מאודים ומרק ירקות - מתאים בדיוק לדרישת המטופל. שקופית: 59 - דוגמא לתפריט פליאו","slides":"","section":"B"},{"n":7,"text":"מטופלת העוקבת אחר תפריט הטבעונות דלת השומן לדוגמא, אכלה בסלט הבוקר שלה חצי אבוקדו. אילו מהקביעות הבאות נכונות לגבי המשך היום שלה, לפי עקרונות התפריט לדוגמא שהוצג?","options":{"A":"מכיוון שאכלה אבוקדו בבוקר, לא כדאי לה לאכול גם שקדים ואגוזים באותו היום","B":"הרוטב לסלט חייב להיות תמיד מבוסס על חמאה מומסת בלבד","C":"עליה להוסיף גם מנת שקדים ואגוזים בצהריים כדי לאזן את הארוחה","D":"עליה להימנע מכל קטניות במהלך היום מכיוון שאכלה אבוקדו","E":"אם היא רעבה בין הארוחות, עליה להימנע גם מפירות","F":"תפריט זה מבוסס בעיקרו על סלט גדול, פחמימה מורכבת, קטניות, ירקות מאודים ומרק ירקות בצהריים ובערב","G":"יש להרבות בחמאה ושמנת כדי להשלים את צריכת השומן היומית"},"answer":["A","F"],"multi":true,"explanation":"לפי התפריט לדוגמא, אם היה אבוקדו לא יהיו שקדים ואגוזים באותו היום. התפריט מבוסס בעיקרו על סלט גדול, פחמימה מורכבת, קטניות, ירקות מאודים ומרק ירקות בצהריים ובערב. הרוטב מבוסס על שמן זית/אבוקדו או רוטב ירקות ולא על חמאה, וקטניות ופירות (כנשנוש בשעת הצורך) לא נשללים בגלל אבוקדו. שקופית: 59 - דוגמא לתפריט טבעונות דלת שומן","slides":"","section":"B"},{"n":8,"text":"מטופלת בת 58, לאחר גיל המעבר, רזה יחסית (ללא עודף משקל), עם אבחנה של אוסטיאופורוזיס, המעוניינת גם לשפר את חילוף החומרים שלה בזהירות. אילו מההמלצות הבאות מתאימות לה במיוחד, בשילוב הידע על אוסטיאופורוזיס וגיל המעבר?","options":{"A":"יש לזכור שבגיל המעבר יש האטה בחילוף החומרים, ולכן יש לקחת זאת בחשבון בתכנון הטיפול","B":"יש להימנע ממנה מכל פעילות גופנית נושאת משקל כי היא לאחר גיל המעבר","C":"מכיוון שהיא רזה, פחות סביר שהיא נהנית מההגנה שעודף משקל נותן מפני אוסטיאופורוזיס, ולכן יש להקפיד במיוחד על הדגשים למניעת המחלה","D":"יש להנחות אותה לרדת במשקל בכל מחיר, גם מתחת למשקל תקין","E":"ויטמין K2 חשוב לשקול עבורה במיוחד אם אינה אוכלת הרבה","F":"אין כל צורך בסידן, מגנזיום או ויטמין D אצלה","G":"יש להתעלם לחלוטין מרמות קורטיזול אצלה"},"answer":["A","C","E"],"multi":true,"explanation":"יש לזכור את ההאטה המטבולית בגיל המעבר, ומכיוון שהיא רזה (ולא נהנית מההגנה שעודף משקל מעניק) יש להקפיד במיוחד על מניעת אוסטיאופורוזיס, כולל שקילת K2. אין להוריד את משקלה מתחת לתקין, פעילות נושאת משקל ותוספי סידן/מגנזיום/ויטמין D דווקא רלוונטיים לה, וקורטיזול נשאר גורם רלוונטי לבדיקה. שקופית: 26, 53-56 - עודף משקל וגיל המעבר; אוסטיאופורוזיס","slides":"","section":"B"},{"n":9,"text":"מטופל חדש מגיע עם מחלה כרונית לא ספציפית ומבקש להבין את הגישה הטיפולית הכללית של המרפאה לפני שנכנסים לפרטים הספציפיים של מצבו. אילו מהמשפטים הבאים משקפים נכונה את עקרונות הגישה הטיפולית שהוצגו, ומתאימים להסבר שתיתנו לו?","options":{"A":"הגוף הוא זה שמרפא את המחלה, לא המזון עצמו - המזון הוא הדלק לתהליך","B":"מטרת הטיפול היא לאזן את הגוף במישורים העצבי, הרגשי, ההורמונלי, המטבולי והחיסוני, כדי לאפשר לגוף להתמקד בריפוי","C":"עקרונות התזונה דומים ברוב המחלות הכרוניות, אך יש דגשים שונים למחלות שונות","D":"האתגר המרכזי הוא להתאים את העקרונות לחייו של המטופל וללוות אותו לאורך התהליך","E":"תזונה טבעית ובריאה היא רק כלי אחד מתוך כמה בדרך לריפוי, לצד תנועה, שינה, נשימות ואיזון נפשי","F":"יש מזונות עם פעילות ביולוגית ספציפית וחזקה שיכולים לתרום לריפוי מצבים מסוימים","G":"אם שינוי אורח חיים כולל לא הביא לתוצאה, אפשר להמשיך ולבחון אילו התאמות נוספות ניתן לעשות"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל המשפטים תואמים במדויק את פילוסופיית הטיפול הטבעי במחלות כרוניות שהוצגה בפתיחת המצגת - הגוף כמרפא, איזון רב-מערכתי, עקרונות דומים עם דגשים ייחודיים, וליווי המטופל בתהליך השינוי. שקופית: 23-25 - עקרונות הטיפול הטבעי והטיפול התזונתי","slides":"","section":"B"},{"n":10,"text":"מטפלת מייעצת למטופלת בהיריון בשבוע 20, שמעולם לא נהגה בעברה לצום, להתחיל פרוטוקול ADF אגרסיבי כדי \"להיות בכושר לפני הלידה\", וגם ממליצה לה להפסיק לחלוטין את תרופת לחץ הדם שהיא נוטלת ללא התייעצות עם רופא. אילו מההמלצות/קביעות הבאות של המטפלת נכונות ומקצועיות, לפי החומר שנלמד?","options":{"A":"ADF מתאים באופן מלא לנשים בהיריון ללא כל הסתייגות","B":"מכיוון שמדובר בהיריון, אין שום צורך בזהירות מיוחדת בכל שינוי תזונתי","C":"יש לעודד את המטופלת להפסיק תרופות מרשם ביוזמתה וללא ליווי רפואי","D":"צום לסירוגין תמיד בטוח באופן מוחלט ואינו יכול להשפיע על סדירות המחזור או ההיריון","E":"עדיף להתחיל דווקא בפרוטוקול הקיצוני ביותר האפשרי כדי להשיג תוצאות מהירות לפני הלידה","F":"אין צורך לשקול השפעות של ירידה מהירה במשקל על ההיריון","G":"ניתן להמליץ למטופלת בהיריון על כל פרוטוקול צום קיצוני כל עוד היא מרגישה בסדר באותו הרגע","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"ADF אינו מתאים כלל להיריון והנקה, כל שינוי תזונתי משמעותי בהיריון מצריך זהירות, אין להנחות מטופלים להפסיק תרופות מרשם ללא ליווי רפואי, וירידה מהירה מדי במשקל/שינוי קלורי דרסטי עלולים לפגוע בסדירות המחזור ואף בהיריון - ולכן אין להתחיל דווקא בפרוטוקול הקיצוני ביותר. שקופית: 32, 34 - למי צום לסירוגין ו-ADF אינם מתאימים","slides":"","section":"B"},{"n":9000,"text":"מבין העלים הירוקים, לתרד יש את ריכוז הניטראטים הגבוה ביותר, גבוה יותר מרוקט — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["B"],"multi":false,"explanation":"המשפט שגוי על פי החומר. הירק שאינו עלה ירוק עם הכי הרבה ניטראטים הוא רוברב, והעלה עם הריכוז הגבוה ביותר הוא רוקט (ארוגולה). היביסקוס דווקא בעלת ריכוז נוגדי חמצון גבוה, מנגולד בוית לטובת העלים על חשבון השורש, וכוסברה, חסת משי, עלי בייבי, תה שחור ותה ירוק כולם מוזכרים כתורמים להורדת לחץ דם. שקופית: 45-47 - מזונות המכילים ניטראטים, עלים ירוקים וחליטות","slides":"","section":"A","tf":1},{"n":9001,"text":"עקרונות התזונה דומים ברוב המחלות, אך יש דגשים שונים למחלות שונות — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["A"],"multi":false,"explanation":"המשפט נכון על פי החומר. כל המשפטים תואמים במדויק את התוכן שהוצג בשקופית לגבי מהות הטיפול התזונתי ומטרתו. שקופית: 24 - הטיפול התזונתי","slides":"","section":"A","tf":1},{"n":9002,"text":"שינוי דרסטי בכמות הקלוריות וירידה מהירה מדי במשקל עלול להוביל לאי-סדירות במחזור ואף להפסקתו — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["A"],"multi":false,"explanation":"המשפט נכון על פי החומר. דווח על מקרים של הפסקת מחזור בנשים שביצעו צום לסירוגין, ושינוי דרסטי בכמות הקלוריות עם ירידה מהירה מדי במשקל עלול לגרום לאי-סדירות ואף להפסקת המחזור. ברוב המקרים ההפסקה הפיכה, אלא אם נמשכה זמן רב מאוד. שקופית: 32 - צום לסירוגין לנשים","slides":"","section":"A","tf":1},{"n":9003,"text":"פגיעה בקשרים המצליבים בין סיבי הקולגן בשלד האורגני של העצם עלולה לגרום לזליגת מינרלים — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["A"],"multi":false,"explanation":"המשפט נכון על פי החומר. כל הפרטים תואמים את ההגדרות (T score מול Z score) ואת מנגנוני האוסטיאופורוזיס שהוצגו: מרכיב מינרלי, שלד אורגני-קולגני, איזון תאי בנייה/פירוק, הורמונלי וחשיפה לשמש. שקופית: 52-53 - אוסטיאופורוזיס: הגדרה ומנגנונים","slides":"","section":"A","tf":1},{"n":9004,"text":"אין שום ספק מדעי לגבי תכולת K2 במזונות מותססים שונים — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["B"],"multi":false,"explanation":"המשפט שגוי על פי החומר. K2 נמצא במזון מן החי, ופלורת מעיים בריאה חיונית לייצורו בגוף. נאטו מכיל בוודאות K2, בעוד שלגבי מזונות מותססים אחרים (כמו כרוב כבוש) יש סימן שאלה ולא ודאות מלאה - ולכן הנושא רלוונטי במיוחד לאנשים בתזונה צמחונית/טבעונית/פרו-טבעונית. שקופית: 54 - דגשים תזונתיים נוספים לאוסטיאופורוזיס (ויטמין K2)","slides":"","section":"A","tf":1},{"n":9005,"text":"אין כל שאלה לגבי השפעות ארוכות הטווח של הגישה — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["B"],"multi":false,"explanation":"המשפט שגוי על פי החומר. יש שאלה פתוחה האם הגוף ייכנס למצב הגנה ויאט את חילוף החומרים (פעילות גופנית עשויה למנוע זאת ולא להגביר איבוד שריר), המחקרים קצרי טווח, וחמישה ימים של חלבון נמוך יגרמו בוודאות לאיבוד מסת שריר. שקופית: 35 - FMD: סימני שאלה","slides":"","section":"A","tf":1}]},{"id":"32","title":"פרוטוקולים לבעיות בריאות נפוצות","questions":[{"n":1,"text":"אילו מהקביעות הבאות לגבי מנגנוני הסכרת נכונות?","options":{"A":"עמידות לאינסולין מוגדרת כמצב שבו תאי הגוף אינם מגיבים כראוי לאינסולין - וזו למעשה ההגדרה של סכרת.","B":"תיאוריית \"השומן שפוגע\" נתמכת בכך ששבטים האוכלים הרבה שומן סובלים משיעורי סכרת גבוהים.","C":"באזורים הכחולים, שבהם רוב התזונה היא פחמימות, אין שכיחות גבוהה של סכרת - דבר הסותר את תיאוריית \"הפחמימות שפוגעות\".","D":"שילוב של תזונה מערבית עתירת סוכר ופחמימות לבנות, ללא ירקות, עם שומן רב וחוסר תנועה, נחשב ככל הנראה לגורם המשולב למחלה.","E":"לפי תיאוריה שהוצעה על ידי מספר חוקרים, רעלים הנמצאים בכמות רבה במזון מן הצומח פוגעים ברצפטורים לאינסולין.","F":"התיאוריה המרכזית להתפתחות עמידות לאינסולין מדגישה גנטיקה נטו, ללא כל קשר לתזונה.","G":"תיאוריית \"השומן שפוגע\" ותיאוריית \"הפחמימות שפוגעות\" שתיהן נתמכות באופן מלא על ידי הממצאים האפידמיולוגיים שהוצגו."},"answer":["A","C","D"],"multi":true,"explanation":"השבטים האוכלים הרבה שומן אינם סובלים מסכרת (בעיה בתיאוריית השומן), והאזורים הכחולים אוכלים בעיקר פחמימה וגם הם אינם סובלים מסכרת (בעיה בתיאוריית הפחמימות). התיאוריה המשולבת מדברת על שילוב תזונה מערבית, שומן רב וחוסר תנועה, והרעלים המוזכרים הם ממזון מן החי ולא מהצומח. שקופית: 61 - מנגנונים אפשריים לסכרת","slides":"","section":"A"},{"n":2,"text":"אילו מהקביעות הבאות לגבי הדגשים התזונתיים בסכרת נכונות?","options":{"A":"ההמלצה התזונתית המרכזית כוללת אכילת קמחים מלאים בכמות מתונה, שכן הם עדיפים על פחמימות אחרות.","B":"מומלץ לשלב תמיד סלט או קטניות עם כל ארוחה המכילה פחמימה, כדי להוריד את העומס הגליקמי.","C":"אין כל צורך בירידה במשקל אצל חולי סכרת.","D":"ניתן לצרוך כמות בלתי מוגבלת של פירות ללא השפעה על רמת הסוכר.","E":"מומלץ להימנע לחלוטין ממעקב סוכר בעת שינוי תזונתי.","F":"בניית מסת שריר אינה חלק מההמלצות התזונתיות לסכרת.","G":"סוכר ממקורות טבעיים מרוכזים (כגון דבש) מותר בכמות מבוקרת."},"answer":["B"],"multi":false,"explanation":"קמחים מעלים סוכר יותר מכל מאכל אחר ולכן מומלץ להימנע מהם לחלוטין; יש להגביל פירות זמנית; יש לנטר סוכר בתדירות גבוהה בעקבות שינוי תזונתי; דגש מרכזי הוא גם על בניית מסת שריר. פחמימה תמיד עם סלט או קטניות מפחיתה עומס גליקמי. שקופית: 62 - דגשים תזונתיים לסכרת","slides":"","section":"A"},{"n":3,"text":"אילו מהקביעות הבאות לגבי חילבה וסכרת נכונות?","options":{"A":"זרעי חילבה עשירים בעיקר בברזל ובסידן מבין הויטמינים והמינרלים.","B":"חילבה נמצאת בשימוש אלפי שנים, ויש עדויות לשימושה במצרים העתיקה ובסין בעיקר להגברת פוריות הגבר.","C":"בימי הביניים השתמשו בחילבה, בין השאר, להמסת אבנים בכליות ולדלקות פרקים.","D":"במחקר, נטילת זרעי חילבה תרמה לרמת סוכר נמוכה יותר הן בצום והן לאחר מבחן העמסת סוכר.","E":"באותו מחקר, זרעי החילבה הורידו משמעותית גם את רמות הטריגליצרידים (TG).","F":"במחקר על חולדות, זרעי חילבה שניתנו לחולדות סכרתיות שינו את רמות האנזימים האחראים על פירוק גלוקוז, יצירת גלוקוז חדש ופירוק שומנים, לרמה הדומה לחולדות בריאות.","G":"החומר האחראי לריח הגוף האופייני לאוכלי חילבה נקרא טריגונלין (Trigonelline)."},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל הפרטים מופיעים במפורש בשקופיות על חילבה - הרכב תזונתי, היסטוריה, מחקר האדם (סוכר ו-TG) ומחקר החולדות (איזון אנזימים), וכן החומר הגורם לריח הגוף. שקופית: 63-64 - חילבה","slides":"","section":"A"},{"n":4,"text":"אילו מהקביעות הבאות לגבי פרוטוקולים ספציפיים לסכרת שאינה מגיבה לשינויים בסיסיים נכונות?","options":{"A":"הפרוטוקול הקשוח ביותר שהוזכר כולל צריכה חופשית של פירות יבשים כמקור אנרגיה מהיר.","B":"השלב הראשון בפרוטוקול לסכרת שאינה מגיבה לשינויים בסיסיים הוא הוספת קמחים מלאים לתפריט.","C":"תזונת \"Raw Food\" המוזכרת ככלי אפשרי כוללת קטניות בכמות גדולה כמקור חלבון עיקרי.","D":"פרוטוקול ה-1-3 השבועות המתואר מתיר צריכה חופשית של פחמימות מלאות לצד הירקות.","E":"הפרוטוקול הקשוח ביותר שתואר פותח בצום מים ממושך ולאחריו מעבר ישיר לתזונה קטוגנית.","F":"במהלך הפרוטוקולים המתוארים, מזון מן החי מומלץ בכל מקרה בכמות גדולה קבועה, ללא תלות במקרה הפרטני.","G":"צום לסירוגין אינו נחשב לכלי רלוונטי בפרוטוקולים לסכרת שאינה מגיבה לשינויים ראשוניים.","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"הפרוטוקול כולל דווקא הימנעות מגלוטן וקמחים, ללא פחמימות ופירות, מזון מן החי לפי המקרה בלבד, והפרוטוקול הקשוח ביותר פותח בצום ירקות (מיצים, שייק ירוק, סלטים) ולא בצום מים. צום לסירוגין דווקא כן מוזכר ככלי מרכזי, ותזונת Raw Food מתוארת ללא קטניות. שקופית: 65 - פרוטוקולים ספציפיים לסכרת","slides":"","section":"A"},{"n":5,"text":"אילו מהקביעות הבאות לגבי שיטות תזונתיות יעילות להורדת סוכר נכונות?","options":{"A":"טבעונות דלת שומן נמצאה במחקרים (מעטים יחסית) כיעילה להורדת רמת הסוכר.","B":"תזונה פליאו, עם דגש על מיעוט פירות בהתחלה, ידועה כמורידה סוכר במהירות רבה.","C":"תזונה קטוגנית ופליאו כמעט ואינן נבחרות על ידי מטופלים כאשר מציגים להם את האפשרויות.","D":"זרעי חילבה מונבטים דורשים בישול או אידוי ממושך לפני האכילה.","E":"תזונה טבעונית עתירת שומן (ולא דלת שומן) היא זו שנמצאה יעילה במחקרים להורדת סוכר.","F":"חומץ תפוחים נצרך מיד לאחר הארוחה, ולא לפניה, כדי לסייע באיזון הסוכר.","G":"תזונה קטוגנית/קרניבורית אינה מוזכרת כלל כאפשרות בהקשר לסכרת."},"answer":["A","B"],"multi":true,"explanation":"טבעונות דלת שומן ופליאו (עם דגש דל פירות) מוצגות כשיטות יעילות. בפועל פליאו/קטוגני היא הבחירה של רוב האנשים כשמציגים את האפשרויות; זרעי חילבה מונבטים אינם דורשים בישול; חומץ תפוחים נלקח לפני הארוחה. שקופית: 66 - שיטות תזונתיות שנמצאו כיעילות להורדת סוכר","slides":"","section":"A"},{"n":6,"text":"אילו מהקביעות הבאות לגבי מנגנון הפעולה של חומץ תפוחים נכונה?","options":{"A":"חומץ תפוחים מסייע לאיזון סוכר לאחר הארוחה, בין השאר על ידי האטת התרוקנות הקיבה.","B":"חומץ תפוחים פועל בעיקר על ידי עיכוב ספיגת שומנים במעי הדק.","C":"יש להימנע לחלוטין משתיית חומץ תפוחים דרך קשית, כיוון שהדבר מגביר את הפגיעה באמייל השן.","D":"השערה שנבדקה בבעלי חיים מציעה שחומץ תפוחים דווקא פוגע באגירת גלוקוז כגליקוגן ברקמות.","E":"חומץ תפוחים מומלץ לצריכה בכמות של כפית בודדת המדוללת בליטר מים לפני כל ארוחה.","F":"עיכוב אנזים האמילאז במעי כלל אינו חלק מהמנגנון המוצע לפעולת חומץ התפוחים.","G":"חומץ תפוחים אינו חומצה, ולכן אינו פוגע באמייל השיניים."},"answer":["A"],"multi":false,"explanation":"המנגנונים המוצעים הם האטת התרוקנות הקיבה ועיכוב אנזים האמילאז (רגיש לחומציות), וכן השערה (במחקרי בעלי חיים) על הגברת אגירת גלוקוז ושיפור ניצולו. השתייה מומלצת דרך קשית בדיוק כדי להפחית פגיעה באמייל, כיוון שזו חומצה. שקופית: 66 - כלי נוסף לאיזון רמות הסוכר לאחר הארוחה (חומץ תפוחים)","slides":"","section":"A"},{"n":7,"text":"אילו מהקביעות הבאות לגבי מתי אין לתת חומץ תפוחים נכונות?","options":{"A":"חומץ תפוחים אינו מומלץ לאנשים עם בעיות בהתרוקנות הקיבה.","B":"יש להיזהר במתן חומץ תפוחים לאנשים הנוטים להיפוקלמיה (אשלגן נמוך), בעקבות דיווח מקרה על שימוש בכמויות גדולות.","C":"חומץ תפוחים בטוח לשימוש ללא הגבלה גם בכיב קיבה פעיל, כיוון שהוא דווקא מקל על הכיב.","D":"אין צורך בזהירות מיוחדת כאשר מטופל הנוטל אינסולין משתמש בחומץ תפוחים.","E":"חומץ תפוחים מיועד במיוחד לטיפול בהיפרקלמיה (אשלגן גבוה בדם).","F":"יש להיזהר משימוש בחומץ תפוחים גם באנשים הנוטלים תרופות אחרות (מלבד אינסולין) להורדת סוכר.","G":"כאבי בטן המוחמרים על ידי חומציות אינם קשורים כלל להחלטה על מתן חומץ תפוחים."},"answer":["A","B","F"],"multi":true,"explanation":"אין לתת חומץ תפוחים בבעיות בהתרוקנות קיבה, בכיב קיבה/רפלוקס/דלקת בוושט/כאבי בטן המוחמרים מחומציות, ובזהירות עם היפוקלמיה ותרופות (כולל אינסולין ותרופות אחרות להורדת סוכר). שקופית: 67 - מתי לא ניתן חומץ תפוחים","slides":"","section":"A"},{"n":8,"text":"אילו מהקביעות הבאות לגבי תסמונת השחר נכונות?","options":{"A":"תסמונת השחר פירושה שרמת הסוכר יורדת בבוקר לעומת רמתה בעת ההליכה לישון.","B":"תהליך פירוק הגליקוגן לגלוקוז בכבד לקראת הבוקר מתרחש פחות אצל חולי סכרת בהשוואה ללא-סכרתיים.","C":"הגישה המומלצת בהרצאה (לדעת המרצה) לטיפול בתסמונת השחר היא לאכול ארוחה לפני השינה, כפי שממליצים רופאים ודיאטנים רבים.","D":"תסמונת השחר מעידה שהמטופל כבר אינו עמיד לאינסולין כלל.","E":"יש צורך בטיפול תרופתי מיוחד וממוקד בכל מקרה של תסמונת השחר, מעבר לטיפול הכללי בסכרת.","F":"אצל אנשים בריאים ללא סכרת, תהליך פירוק הגליקוגן לגלוקוז בבוקר גבוה יותר מאשר אצל חולי סכרת.","G":"תסמונת השחר תישאר קבועה ללא כל שינוי גם לאחר שיפור משמעותי ברגישות לאינסולין.","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"בתסמונת השחר רמת הסוכר עולה (לא יורדת) בבוקר; תהליך פירוק הגליקוגן חזק יותר דווקא אצל סכרתיים; המרצה חולק על ההמלצה לאכול לפני השינה וקורא לה \"טעות\"; התסמונת מעידה שהמטופל עדיין עמיד לאינסולין; אינה דורשת טיפול מיוחד; והיא צפויה להיעלם עם שיפור הרגישות לאינסולין. שקופית: 67-68 - תסמונת השחר","slides":"","section":"A"},{"n":9,"text":"אילו מהקביעות הבאות לגבי מטפורמין נכונות?","options":{"A":"מטפורמין היא התרופה הנפוצה ביותר לטיפול בסכרת.","B":"מנגנון הפעולה של מטפורמין הוא עיכוב פירוק הגליקוגן בכבד.","C":"מטפורמין עלולה לגרום לעלייה ברמת ההומוציסטאין בדם (עקב השפעה על חומצה פולית).","D":"בין תופעות הלוואי המיוחסות למטפורמין מוזכרות עייפות, אנמיה ופגיעה בזיכרון.","E":"מטפורמין עלולה לגרום להתכווצויות שרירים.","F":"קיים דיווח על סיכון מוגבר לפרקינסון ולדמנציה בקרב נוטלי מטפורמין, אך קשה לדעת אם זה נובע מהתרופה עצמה או מעצם קיום הסכרת.","G":"יש הטוענים שגם לאנשים בריאים (ללא סכרת) כדאי לשקול נטילת מטפורמין כדי להוריד את רמת הסוכר עוד יותר."},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל הפרטים מופיעים במפורש בשקופית על מטפורמין - היותה התרופה הנפוצה ביותר, מנגנון עיכוב פירוק גליקוגן בכבד, ורשימת ההשפעות: חומצה פולית/הומוציסטאין, עייפות, אנמיה, פגיעה בזיכרון, התכווצויות שרירים, וסיכון אפשרי לפרקינסון/דמנציה, וכן הטענה שגם בריאים \"כדאי\" להם. שקופית: 69 - מטפורמין, התרופה הנפוצה ביותר לסכרת","slides":"","section":"A"},{"n":10,"text":"אילו מהקביעות הבאות לגבי LADA נכונות?","options":{"A":"LADA מתקדמת באיטיות, וייתכן שבחודשים הראשונים (ולעיתים אף שנה ומעלה) אין צורך באינסולין.","B":"חולי LADA הם לרוב בעודף משקל משמעותי, בדומה לרוב חולי סכרת מסוג 2.","C":"שינויים תזונתיים משפיעים בצורה משמעותית מאוד על מהלך המחלה ב-LADA.","D":"LADA מאובחנת בין השאר באמצעות בדיקת נוגדנים כגון Anti-GAD/GAD65.","E":"רמת ה-C-peptide בחולי LADA היא בדרך כלל גבוהה מאוד, בדומה לחולי סכרת מסוג 2 טיפוסיים.","F":"לחולי LADA אין כלל נטייה מוגברת למחלות אוטואימוניות אחרות.","G":"LADA מופיעה בדרך כלל בגיל צעיר מאוד (ילדות), בשונה מסכרת נעורים."},"answer":["A","D"],"multi":true,"explanation":"LADA מתקדמת לאט, ללא צורך מיידי באינסולין; החולה בדרך כלל רזה/לא בעודף משקל משמעותי; שינויים תזונתיים אינם משפיעים משמעותית; האבחון כולל Anti-GAD/GAD65 ו-C-peptide (שנוטה להיות תקין-נמוך ויורד עם הזמן, בניגוד לסוג 2 שבו הוא גבוה); ויש נטייה למחלות אוטואימוניות נלוות (בלוטת תריס, צליאק, ויטיליגו). המחלה מופיעה בגיל מבוגר, לא בילדות. שקופית: 72 - LADA","slides":"","section":"A"},{"n":11,"text":"אילו מהקביעות הבאות לגבי הדגשים בכולסטרול גבוה נכונות?","options":{"A":"גמילה מסטטינים מוצגת כאחד מיעדי הטיפול, אך יש לבצע זאת בהדרגה ורק בליווי והנחיית רופא המשפחה.","B":"תזונה קטוגנית לעולם אינה מורידה כולסטרול, ולכן אינה נשקלת כלל במצבי כולסטרול גבוה.","C":"הירידה המשמעותית ב-LDL בעקבות שינוי תזונתי מתרחשת בדרך כלל תוך שבועיים בלבד.","D":"שיבולת שועל וזרעי כוסברה אינם קשורים כלל להמלצות התזונתיות לכולסטרול גבוה.","E":"תזונה עתירת נוגדי חמצון, כגון פירות יער ותבלינים, אינה חלק מההמלצות לכולסטרול גבוה.","F":"גמילה מסטטינים מומלצת ליישום מיידי ועצמאי של המטופל, ללא צורך בליווי רפואי.","G":"פעילות גופנית אינה נחשבת גורם משפיע על רמות הכולסטרול לפי המצגת."},"answer":["A"],"multi":false,"explanation":"בכל מקרה יש להתקדם בהדרגה ורק עם הנחיית רופא המשפחה בנוגע לגמילה מתרופות. תזונה קטוגנית וטבעונות שתיהן עשויות להוריד כולסטרול משמעותית; הירידה יכולה לקחת חצי שנה עד שנה ואף יותר; שיבולת שועל, זרעי כוסברה, תזונה עתירת נוגדי חמצון ופעילות גופנית - כולם חלק מההמלצות. שקופית: 73 - כולסטרול גבוה, דגשים","slides":"","section":"A"},{"n":12,"text":"אילו מהקביעות הבאות לגבי תסמיני וסיבות תסמונת המעי הרגיז (IBS) נכונות?","options":{"A":"בין תסמיני התסמונת מוזכרים כאבי בטן, נפיחות וגזים מרובים.","B":"שלשולים ועצירות עלולים להתחלף זה בזה אצל אותו מטופל.","C":"בין הסיבות האפשריות שהוצעו לתסמונת נמנים גם מצב נפשי, מתח וחרדה, מודעים או לא מודעים.","D":"לפי המצגת, לתסמונת המעי הרגיז יש תמיד סיבה זהה ואחידה אצל כל המטופלים.","E":"SIBO (יחלה יתר של חיידקים במעי הדק) אינה נחשבת כלל לגורם אפשרי לתסמונת.","F":"עייפות וקשיי ריכוז אינם חלק מהתסמינים המתוארים לתסמונת.","G":"רגישות ללקטינים ולפרזיטים מוצגת כגורם ודאי ומוכח באופן חד-משמעי, ולא רק כגורם אפשרי."},"answer":["A","B","C"],"multi":true,"explanation":"התסמינים כוללים כאבי בטן, נפיחות, שלשולים/עצירות (יתכן לסירוגין), גזים מרובים, עייפות וקשיי ריכוז. הסיבות המוצעות (לא ודאיות) כוללות רגישות למזונות, SIBO, לקטינים, פרזיטים, חוסר באנזימי עיכול, רגישות מוגברת למתיחות, קנדידה, ומצב נפשי/סטרס/חרדה. אין נוסחה אחידה לכולם. שקופית: 75 - IBS, תסמינים וסיבות אפשריות","slides":"","section":"A"},{"n":13,"text":"אילו מהקביעות הבאות לגבי דיאטת FODMAP נכונות?","options":{"A":"הדיאטה ממליצה על צריכה חופשית של בצל ושום ככל הרצוי.","B":"פרוקטוז נמצא רק בפירות בודדים כמו תפוחים ואגסים, ואינו קיים כלל בשאר הפירות.","C":"קינואה וכוסמת אסורות לחלוטין בדיאטת FODMAP.","D":"ראשי התיבות FODMAP מתייחסים בעיקר לחלבונים ולשומנים הגורמים לגזים, ולא לפחמימות וסוכרים.","E":"בשר, דגים וביצים אסורים לחלוטין בדיאטת FODMAP.","F":"מוצרי חלב מומלצים לצריכה חופשית וללא הגבלה בדיאטת FODMAP.","G":"תפוחי אדמה ואורז נחשבים למזונות אסורים בדיאטת FODMAP בשל תכולת העמילן הגבוהה.","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"FODMAP הוא ראשי תיבות של פחמימות מסוגים שונים (Fermentable Oligo-Di-Mono-saccharides and Polyols). יש להימנע מבצל, שום, קטניות, מצליבים, אגבה/דבש/סילאן/מולסה, ולצמצם מאוד מוצרי חלב. מותר לאכול ירקות, קינואה, כוסמת, תפוחי אדמה, אורז, אגוזים, שקדים, בשר, דגים, ביצים וחמאה/מעט גבינה. פרוקטוז נמצא בכל הפירות, לא רק בתפוחים ואגסים. שקופית: 76-77 - Fodmap diet","slides":"","section":"A"},{"n":14,"text":"אילו מהקביעות הבאות לגבי דגשי הטיפול הטבעי במעי רגיש נכונות?","options":{"A":"אין נוסח אחיד לטיפול בתסמונת המעי הרגיז, וייתכן שהסיבה שונה אצל כל אדם.","B":"הקפדה על כללי אכילה כגון כמות, עיתוי, לעיסה וסדר האכילה נחשבת עיקרון טיפולי חשוב.","C":"פעילות גופנית נחשבת חשובה מאוד ומקלה משמעותית על תסמיני התסמונת.","D":"פרוביוטיקה בדמות ירקות מותססים מומלצת בהדרגה, ולעיתים יש החמרה זמנית בעקבות הוספתם.","E":"ניתן לשלוח את המטופל לבדיקות נשיפה שמאתרות אי-סבילות לפרוקטוז, ללקטוז ולסורביטול.","F":"חליטות כגון זרעי שומר, מנטה וקמומיל מוזכרות ככלי אפשרי לסיוע בספיחת גזים.","G":"יש קשר הדוק בין מצב הרוח והמצב הנפשי של המטופל לבין תסמיני התסמונת, ולכן חשוב להבין את עולמו הרגשי."},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל העקרונות מופיעים בשקופיות דגשי הטיפול הטבעי במעי רגיש - הקפדה על כללי אכילה, פעילות גופנית, פרוביוטיקה בהדרגה, בדיקות נשיפה, חליטות סופחות גזים, וההבנה של הקשר הרגשי-נפשי. שקופית: 77-78 - דגשים לטיפול טבעי במעי רגיש","slides":"","section":"A"},{"n":15,"text":"אילו מהקביעות הבאות לגבי המשך הטיפול במעי רגיש נכונות?","options":{"A":"מקורות עיקריים לאבץ שהוזכרו כוללים נבט חיטה, גרעיני דלעת, אגוזים ושקדים.","B":"הימנעות מגלוטן מוצגת כטעות שיש להימנע ממנה בטיפול במעי רגיש.","C":"עבור טבעונים אידיאולוגיים, מוצעת דיאטת אלימינציה קשוחה כגון דיאטת אורז לבן/כוסמת כדי לשלול רגישות למזון.","D":"חוסר באבץ אינו קשור כלל להפרעות עיכול, לא אצל בני אדם ולא בבעלי חיים.","E":"בשר אינו נחשב מקור לאבץ כלל.","F":"דיאטת אלימינציה קשוחה מיועדת דווקא לאוכלי בשר בלבד ואינה רלוונטית לטבעונים.","G":"קטניות מונבטות אינן נחשבות מקור אבץ רלוונטי."},"answer":["A","C"],"multi":true,"explanation":"מקורות האבץ שהוזכרו הם נבט חיטה, גרעיני דלעת, אגוזים, שקדים, קטניות מונבטות ובשר. חוסר אבץ נקשר להפרעות עיכול (במחקרי חיות). הימנעות מגלוטן \"לא פסולה\" - כלומר מותרת ולא טעות. דיאטת אלימינציה קשוחה (אורז לבן/כוסמת) מוצעת דווקא לטבעונים אידיאולוגיים. שקופית: 78 - המשך טיפול במעי רגיש","slides":"","section":"A"},{"n":16,"text":"אילו מהקביעות הבאות לגבי אפידמיולוגיה של קרוהן/קוליטיס (IBD) נכונות?","options":{"A":"מחלת קרוהן שכיחה במיוחד בקרב יהודים אשכנזים, יותר מכל קבוצה אחרת בעולם.","B":"IBD שכיחה יותר באזורים כפריים לעומת מעמד סוציואקונומי גבוה ואזורים עירוניים.","C":"ל-IBD אין שום נטייה גנטית מובהקת, ומדובר במחלה סביבתית גרידא.","D":"סטרס אינו נחשב טריגר רלוונטי להתפרצות קרוהן/קוליטיס.","E":"קרוהן וקוליטיס אינן נחשבות למחלות אוטואימוניות.","F":"הגורם למחלה ברור לחלוטין ואינו כולל כל מרכיב סביבתי.","G":"IBD שכיחה באופן שווה לחלוטין בכל הקבוצות האתניות בעולם, ללא הבדל."},"answer":["A"],"multi":false,"explanation":"קרוהן שכיחה יותר ביהודים אשכנזים מכל קבוצה אחרת בעולם, ושכיחה יותר במעמד סוציואקונומי גבוה ובאזורים עירוניים (לא כפריים). קיימת נטייה גנטית מובהקת, בשילוב עם כשל חיסוני חלקי וגורם סביבתי, וסטרס מקושר מאוד להתפרצות (בדרך כלל הטריגר). זוהי מחלה אוטואימונית. שקופית: 81 - קרוהן/קוליטיס, IBD","slides":"","section":"A"},{"n":17,"text":"אילו מהקביעות הבאות לגבי הדגשים הכלליים בקרוהן/קוליטיס נכונות?","options":{"A":"לעיסה מושלמת של המזון נחשבת דגש חשוב בטיפול בקרוהן/קוליטיס.","B":"מומלץ שלא לשתות תוך כדי הארוחה.","C":"שמרים וחלב מוזכרים כמזונות שאסורים לחולי קרוהן.","D":"המטרה המעשית המוצגת היא ריפוי מוחלט וסופי של המחלה תוך שבועות בודדים, ללא סיכון להישנות.","E":"מומלץ להתמלא היטב בכל ארוחה כדי להימנע מרעב בין הארוחות.","F":"פעילות גופנית ונשימות סרעפתיות אינן חלק מהדגשים הכלליים בטיפול.","G":"לאחר הגעה להפוגה, אין כל סיכון להתפרצות חוזרת גם בעקבות סטייה קיצונית מהתזונה המטיבה."},"answer":["A","B","C"],"multi":true,"explanation":"הדגשים כוללים לעיסה מושלמת, לא לשתות תוך כדי הארוחה, לא להתמלא בארוחה, פעילות גופנית ונשימות סרעפתיות, וכן הימנעות משמרים וחלב. המטרה המעשית היא הפוגה ולא ריפוי מוחלט - תמיד תישאר רגישות ועלול להופיע התקף חוזר, בין השאר בעקבות סטייה מהתזונה או סטרס. שקופית: 82 - דגשים כללים, קרוהן/קוליטיס","slides":"","section":"A"},{"n":18,"text":"אילו מהקביעות הבאות לגבי חלב, שמרים ואבחון בקרוהן נכונות?","options":{"A":"בחולי קרוהן נמצא אחוז נמוך משמעותית של נוגדנים לשמרים בהשוואה לאוכלוסייה הכללית.","B":"אופים נמצאים בין בעלי המקצוע עם השכיחות הנמוכה ביותר לקרוהן.","C":"ההמלצה לחולי קרוהן היא לאכול לחם רגיל מכל סוג, ללא הגבלה על סוג השמרים.","D":"גבינות המכילות שמרי בירה מומלצות לחולי קרוהן כתחליף בריא לחלב מן החי.","E":"קלפרוטקטין אינו יכול לסייע כלל באבחון או במעקב אחר IBD.","F":"אבחון IBD מתבסס אך ורק על תסמינים, ואינו כולל כלל בדיקות דם או בדיקות הדמיה.","G":"MAP (Mycobacterium avium paratuberculosis) אינו קשור בשום צורה לדיון על הימנעות ממוצרי חלב בקרוהן.","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"בחולי קרוהן נמצא דווקא אחוז גבוה מאוד של נוגדנים לשמרים, ואופים הם בעלי המקצוע עם השכיחות הגבוהה
