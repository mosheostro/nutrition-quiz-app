<style>
:root{
  --bg:#f4f7f6; --card:#ffffff; --ink:#1f2d2b; --muted:#6b7a77;
  --brand:#0f766e; --brand-d:#0b5850; --brand-l:#e3f1ef;
  --accent:#f59e0b; --ok:#15803d; --ok-bg:#dcfce7; --bad:#b91c1c; --bad-bg:#fee2e2;
  --line:#e4ebe9; --shadow:0 6px 22px rgba(15,118,110,.10);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
button,.opt,.qz-card,.mode-opt,a{touch-action:manipulation}
body{margin:0;font-family:'Heebo',system-ui,'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;-webkit-text-size-adjust:100%;text-size-adjust:100%;overscroll-behavior-y:none}
.wrap{max-width:820px;margin:0 auto;padding:20px max(16px,env(safe-area-inset-right)) 80px max(16px,env(safe-area-inset-left))}
header.top{display:flex;align-items:center;gap:12px;padding:max(16px,env(safe-area-inset-top)) max(16px,env(safe-area-inset-right)) 16px max(16px,env(safe-area-inset-left));background:linear-gradient(135deg,var(--brand),var(--brand-d));color:#fff;box-shadow:var(--shadow)}
header.top .logo{width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:22px}
header.top h1{font-size:20px;margin:0;font-weight:800}
header.top .sub{font-size:13px;opacity:.85;margin-top:2px}
.btn{cursor:pointer;border:none;border-radius:12px;font-family:inherit;font-weight:700;font-size:16px;padding:13px 20px;min-height:48px;transition:.15s;display:inline-flex;align-items:center;justify-content:center;gap:8px;-webkit-user-select:none;user-select:none}
.btn-primary{background:var(--brand);color:#fff}
.btn-primary:hover{background:var(--brand-d)}
.btn-ghost{background:#fff;color:var(--brand);border:2px solid var(--brand-l)}
.btn-ghost:hover{border-color:var(--brand)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:22px}
@media(max-width:640px){.grid{grid-template-columns:1fr}}
.qz-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;cursor:pointer;box-shadow:var(--shadow);transition:.18s;display:flex;flex-direction:column;gap:8px;position:relative;overflow:hidden}
.qz-card:hover{transform:translateY(-3px);border-color:var(--brand)}
.qz-card .num{position:absolute;top:12px;left:14px;font-size:12px;font-weight:700;color:var(--brand);background:var(--brand-l);padding:2px 9px;border-radius:20px}
.qz-card h3{margin:6px 0 0;font-size:17px;font-weight:800}
.qz-card p{margin:0;color:var(--muted);font-size:13px}
.section-title{margin:26px 0 4px;font-size:15px;color:var(--muted);font-weight:700}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:24px;box-shadow:var(--shadow)}
.mode-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:20px}
@media(max-width:520px){.mode-row{grid-template-columns:1fr}}
.mode-opt{border:2px solid var(--line);border-radius:14px;padding:20px;text-align:center;cursor:pointer;transition:.15s}
.mode-opt:hover{border-color:var(--brand);background:var(--brand-l)}
.mode-opt .ic{font-size:30px}
.mode-opt h4{margin:8px 0 4px;font-size:18px}
.mode-opt p{margin:0;font-size:13px;color:var(--muted)}
.pbar{height:8px;background:var(--line);border-radius:20px;overflow:hidden;margin:6px 0 18px}
.pbar>i{display:block;height:100%;background:var(--brand);transition:.3s;border-radius:20px}
.qhead{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--muted);font-weight:600;margin-bottom:6px}
.badge{font-size:12px;padding:3px 10px;border-radius:20px;font-weight:700}
.badge.gen{background:#e0f2fe;color:#075985}
.badge.clin{background:#fef3c7;color:#92400e}
.qtext{font-size:19px;font-weight:700;margin:8px 0 4px}
.multi-note{font-size:13px;color:var(--accent);font-weight:700;margin-bottom:10px}
.opts{display:flex;flex-direction:column;gap:10px;margin-top:12px}
.opt{display:flex;align-items:flex-start;gap:12px;border:2px solid var(--line);border-radius:12px;padding:13px 15px;min-height:48px;cursor:pointer;transition:.12s;background:#fff}
.opt:hover{border-color:var(--brand)}
.opt.sel{border-color:var(--brand);background:var(--brand-l)}
.opt .mark{flex:0 0 26px;height:26px;border-radius:8px;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:var(--muted);background:#fff}
.opt.radio .mark{border-radius:50%}
.opt.sel .mark{border-color:var(--brand);background:var(--brand);color:#fff}
.opt .txt{flex:1;font-size:15.5px}
.opt.correct{border-color:var(--ok);background:var(--ok-bg)}
.opt.correct .mark{border-color:var(--ok);background:var(--ok);color:#fff}
.opt.wrong{border-color:var(--bad);background:var(--bad-bg)}
.opt.wrong .mark{border-color:var(--bad);background:var(--bad);color:#fff}
.opt.locked{cursor:default}
.explain{margin-top:16px;border-radius:12px;padding:14px 16px;font-size:15px;border-inline-start:5px solid var(--brand);background:var(--brand-l)}
.explain.ok{border-color:var(--ok);background:var(--ok-bg)}
.explain.bad{border-color:var(--bad);background:var(--bad-bg)}
.explain b{display:block;margin-bottom:4px}
.explain .slides{margin-top:8px;font-size:12.5px;color:var(--muted)}
.nav{display:flex;justify-content:space-between;gap:12px;margin-top:22px}
.score-live{font-size:13px;color:var(--muted);font-weight:700}
.result-hero{text-align:center;padding:10px 0 6px}
.ring{width:150px;height:150px;margin:0 auto 6px;position:relative}
.ring svg{transform:rotate(-90deg)}
.ring .pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring .pct b{font-size:34px}
.ring .pct span{font-size:12px;color:var(--muted)}
.stats{display:flex;justify-content:center;gap:26px;margin:14px 0 4px}
.stats div{text-align:center}
.stats b{display:block;font-size:22px}
.stats.ok b{color:var(--ok)}.stats.bad b{color:var(--bad)}
.stats small{color:var(--muted);font-size:12px}
.review-item{border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-top:10px}
.review-item .rq{font-weight:700;font-size:14.5px;display:flex;gap:8px;align-items:flex-start}
.review-item .ri-mark{flex:0 0 auto;font-weight:800}
.review-item.rok{border-inline-start:5px solid var(--ok)}
.review-item.rbad{border-inline-start:5px solid var(--bad)}
.rdetail{font-size:13.5px;color:var(--muted);margin-top:6px}
.rdetail .yourans{color:var(--bad)} .rdetail .rightans{color:var(--ok);font-weight:700}
.foot{text-align:center;color:var(--muted);font-size:12px;margin-top:30px;padding:0 16px calc(16px + env(safe-area-inset-bottom))}
.link{background:none;border:none;color:var(--brand);font-weight:700;cursor:pointer;font-family:inherit;font-size:14px;padding:6px}
.hidden{display:none}
.exam-banner{background:linear-gradient(135deg,var(--brand),var(--brand-d));color:#fff;border-radius:18px;padding:20px;box-shadow:var(--shadow);margin-bottom:6px}
.exam-banner .eb-top{display:flex;align-items:center;gap:12px}
.exam-banner .eb-ic{font-size:28px;background:rgba(255,255,255,.16);width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.exam-banner h3{margin:0;font-size:19px;font-weight:800}
.exam-banner p{margin:2px 0 0;font-size:13px;opacity:.92}
.exam-banner .eb-btns{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.exam-banner .eb-btns .btn{flex:1 1 90px;background:#fff;color:var(--brand);min-height:46px;padding:10px 12px;font-size:16px}
.exam-banner .eb-btns .btn:active{transform:scale(.98)}
.badge.tf{background:#ede9fe;color:#5b21b6}
.btn-skip{background:#fef3c7;color:#92400e}
.btn-skip:hover{background:#fde68a}
.review-item.rskip{border-inline-start:5px solid var(--accent);background:#fffbeb}
.review-head{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-top:26px}
.wrong-toggle{display:flex;align-items:center;gap:7px;font-size:13.5px;color:var(--muted);cursor:pointer;font-weight:700;-webkit-user-select:none;user-select:none}
.wrong-toggle input{width:18px;height:18px;accent-color:var(--bad)}
#reviewList.only-wrong .review-item.rok,#reviewList.only-wrong .review-item.rskip{display:none}
.stats.skip b{color:var(--accent)}
.tlist{display:grid;grid-template-columns:1fr 1fr;gap:6px}
@media(max-width:560px){.tlist{grid-template-columns:1fr}}
.tpick{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:10px;padding:9px 10px;cursor:pointer;font-size:13.5px;background:#fff}
.tpick input{width:18px;height:18px;flex:0 0 auto;accent-color:var(--brand)}
.tpick .tp-t{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tpick .tp-c{color:var(--muted);font-size:12px;flex:0 0 auto}
.tpick.off{opacity:.5}
.donate{margin-top:22px;background:#f0fdf9;border:1px solid var(--brand-l);border-radius:14px;padding:14px 16px;font-size:14px;color:var(--ink);text-align:center;line-height:1.8}
.donate a{color:var(--brand);font-weight:800;text-decoration:none;white-space:nowrap}
.hint{margin-top:14px;border:1px dashed var(--line);border-radius:10px;padding:0 12px;background:#fafcfb}
.hint summary{cursor:pointer;padding:10px 2px;font-size:13.5px;color:var(--brand);font-weight:700;list-style:none;-webkit-user-select:none;user-select:none}
.hint summary::-webkit-details-marker{display:none}
.hint>div{padding:0 2px 12px;font-size:13.5px;color:var(--muted)}
input[type=range]{-webkit-appearance:none;appearance:none;background:transparent}
input[type=range]::-webkit-slider-runnable-track{height:6px;background:var(--line);border-radius:20px}
input[type=range]::-moz-range-track{height:6px;background:var(--line);border-radius:20px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;margin-top:-8px;width:22px;height:22px;border-radius:50%;background:var(--brand);cursor:pointer}
input[type=range]::-moz-range-thumb{width:22px;height:22px;border:none;border-radius:50%;background:var(--brand);cursor:pointer}
</style>
</head>

<script>
window.QUIZZES=[{"id":"24","title":"פחמימות מורכבות וסיבים תזונתיים","questions":[{"n":1,"text":"מהם שלושת החד-סוכרים (מונוסכרידים) המופיעים בשקופית?","options":{"A":"גלוקוז","B":"סוכרוז","C":"פרוקטוז","D":"עמילן","E":"גלקטוז","F":"לקטוז","G":"גליקוגן"},"answer":["A","C","E"],"multi":true,"explanation":"החד-סוכרים (מונוסכרידים) הם גלוקוז, פרוקטוז וגלקטוז. סוכרוז ולקטוז הם דו-סוכרים, ועמילן וגליקוגן הם פוליסכרידים (פחמימות מורכבות). שקופית: 1 - פחמימות","slides":"","section":"A"},{"n":2,"text":"בהתייחס למבנה העמילן, אילו מהקביעות הבאות נכונות?","options":{"A":"עמילוז הוא שרשרת גלוקוז ישרה ברובה עם מעט הסתעפויות","B":"עמילוז מהווה כ-70% מהעמילן ועמילופקטין כ-30% בלבד","C":"עמילופקטין קל יותר לעיכול מעמילוז בשל מבנהו הפחות דחוס","D":"עמילוז ועמילופקטין שניהם בעלי אותה כמות הסתעפויות בדיוק","E":"עמילופקטין הוא שרשרת גלוקוז עם הסתעפויות רבות","F":"עמילוז קל יותר לעיכול מעמילופקטין בשל הסתעפויותיו הרבות","G":"עמילן מורכב מיחידות חוזרות של פרוקטוז"},"answer":["A","C","E"],"multi":true,"explanation":"עמילן מורכב מעמילוז - שרשרת גלוקוז ישרה ברובה עם מעט הסתעפויות (כ-30% מהעמילן), ועמילופקטין - שרשרת גלוקוז עם הסתעפויות רבות (כ-70%). בשל ריבוי ההסתעפויות, מבנהו של עמילופקטין פחות דחוס ומאפשר לאנזימים לחדור בקלות רבה יותר, ולכן הוא קל יותר לעיכול. שקופית: 2 - עמילן","slides":"","section":"A"},{"n":3,"text":"מהו ההבדל העיקרי במקור בין גליקוגן לעמילופקטין?","options":{"A":"גליקוגן נמצא בצמחים ועמילופקטין בבעלי חיים","B":"גליקוגן נמצא בבעלי חיים ועמילופקטין בצמחים (במזון שלנו)","C":"שניהם נמצאים אך ורק בבעלי חיים","D":"שניהם נמצאים אך ורק בצמחים","E":"גליקוגן ועמילופקטין הם אותו החומר בדיוק ללא כל הבדל","F":"גליקוגן נמצא באצות בלבד","G":"עמילופקטין מיוצר רק בכבד האדם"},"answer":["B"],"multi":false,"explanation":"גליקוגן הוא צורת האגירה של גלוקוז בבעלי חיים, בעוד עמילופקטין הוא מרכיב העמילן הנמצא בצמחים ומהווה חלק ממקורות המזון שלנו. שקופית: 3 - ההבדל בין גליקוגן לעמילופקטין","slides":"","section":"A"},{"n":4,"text":"אילו מהקביעות הבאות נכונות לגבי הגדרת סיבים תזונתיים והקשרים הכימיים בעמילן לעומת סיבים?","options":{"A":"סיבים תזונתיים הם שרשרת חד-סוכרים שהגוף מפרק ביעילות רבה בעזרת אנזימים ייחודיים","B":"רוב הסיבים התזונתיים מורכבים מיחידות של פרוקטוז","C":"הקשרים בעמילן ובגליקוגן הם קשרי ביתא בין גלוקוז לגלוקוז","D":"הקשרים בסיבים תזונתיים הם קשרי אלפא בין גלוקוז לגלוקוז","E":"תאית ועמילן חולקים בדיוק את אותו סוג הקשר הכימי","F":"לגוף האדם יש אנזים ספציפי המפרק את כל סוגי הסיבים התזונתיים ביעילות","G":"סיבים תזונתיים מורכבים אך ורק מיחידות של גלקטוז","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"סיבים תזונתיים הם שרשרת חד-סוכרים (ברובם גלוקוז) שלגוף האדם אין אנזים לפרק את הקשר ביניהם. בעמילן ובגליקוגן הקשרים הם קשרי אלפא, ואילו בסיבים התזונתיים הקשרים הם קשרי ביתא - ולכן כל הקביעות שגויות. שקופית: 8 - הגדרת סיבים תזונתיים","slides":"","section":"A"},{"n":5,"text":"מהי התכונה הפונקציונלית החשובה ביותר בסיווג הסיבים התזונתיים, לפי השקופית?","options":{"A":"מסיסות הסיב היא התכונה הפונקציונלית החשובה ביותר בסיווגו","B":"האם הסיב תוסס או לא הוא התכונה הפונקציונלית החשובה ביותר בסיווגו","C":"צבע הסיב הוא הקריטריון המרכזי לסיווגו","D":"מקור הסיב מהחי או מהצומח הוא הקריטריון החשוב ביותר","E":"גודל מולקולת הסיב הוא הקריטריון המרכזי לסיווגו","F":"כל המזונות מכילים אך ורק סוג אחד של סיב","G":"סיווג הסיבים תלוי אך ורק בתכולת הקלוריות שלהם"},"answer":["B"],"multi":false,"explanation":"למרות שהחלוקה הקלאסית היא למסיסים ובלתי מסיסים, השקופית מדגישה כי התכונה הפונקציונלית החשובה ביותר היא האם הסיב תוסס או לא. שקופית: 9 - מיון הסיבים","slides":"","section":"A"},{"n":6,"text":"אילו מהקביעות הבאות נכונות לגבי סיבים תוססים ולא-תוססים?","options":{"A":"סיב תוסס מגדיל בעיקר את נפח הצואה","B":"סיב תוסס מתפרק על ידי חיידקי המעי הגס ומייצר חומצות שומן קצרות שרשרת","C":"סיב שאינו תוסס מגדיל את נפח הצואה","D":"סיב שאינו תוסס מתפרק ומייצר בעיקר חומצות שומן קצרות שרשרת","E":"שני סוגי הסיבים אינם סופחים חומרים כלל במעי הדק","F":"סיבים תוססים תמיד גדולים יותר בגודלם ממולקולות הפרוקטוז","G":"חיידקים המפרקים סיב תוסס מפרישים אנזימים המפרקים את קשרי הביתא"},"answer":["B","C","G"],"multi":true,"explanation":"סיב תוסס מפורק במעי הגס על ידי אנזימים חיידקיים (המפרקים קשרי ביתא) ויוצר חומצות שומן קצרות שרשרת; סיב שאינו תוסס אינו מתפרק ובמקום זאת מגדיל את נפח הצואה. שקופית: 9 - מיון הסיבים","slides":"","section":"A"},{"n":7,"text":"אילו מהקביעות הבאות נכונות לגבי חומצות שומן קצרות שרשרת?","options":{"A":"חומצות שומן קצרות שרשרת נמצאות בכמות גדולה במזון עצמו","B":"חומצות שומן קצרות שרשרת נוצרות מסיבים שתססו במעי הגס","C":"חומצות שומן קצרות שרשרת מעלות את הסיכון לסרטן המעי הגס","D":"חומצות שומן קצרות שרשרת בעלות אפקט פרה-ביוטי","E":"חומצות שומן קצרות שרשרת אינן נספגות כלל לזרם הדם ולכן אינן תורמות קלוריות","F":"חומצות שומן קצרות שרשרת הן תוצר של פירוק עמילן בלבד ולא של סיבים","G":"חומצות שומן קצרות שרשרת גורמות תמיד לעצירות קשה"},"answer":["B","D"],"multi":true,"explanation":"חומצות שומן קצרות שרשרת נוצרות במעי הגס מתסיסת סיבים תוססים על ידי חיידקי המעי, ובעלות אפקט פרה-ביוטי. הן אינן קיימות במזון עצמו, אינן מעלות סיכון לסרטן, ונספגות בחלקן לזרם הדם. שקופית: 13 - חומצות שומן קצרות שרשרת","slides":"","section":"A"},{"n":8,"text":"מדוע קטניות גורמות לגזים בעוד דגנים ברוב המקרים אינם גורמים לגזים?","options":{"A":"קטניות מכילות כמות רבה של סיבים מסיסים (תוססים) ואילו דגנים מכילים בעיקר סיבים בלתי מסיסים (שאינם תוססים)","B":"קטניות אינן מכילות סיבים כלל; גזים נוצרים אך ורק מעיכול חלבונים ולא מסיבים","C":"קטניות עשירות בסיבים בלתי מסיסים ולכן גורמות לגזים; תסיסת סיבים במעי הגס אינה קשורה כלל להיווצרות גזים","D":"דגנים עשירים בסיבים מסיסים ותוססים ולכן גורמים לגזים; דגנים וקטניות מכילים בדיוק את אותה כמות ואת אותו סוג הסיבים"},"answer":["A"],"multi":false,"explanation":"בקטניות יש כמות רבה של סיבים מסיסים (תוססים), שתסיסתם על ידי חיידקי המעי הגס מייצרת גזים, בעוד שבדגנים יש בעיקר סיבים בלתי מסיסים שאינם עוברים תסיסה משמעותית. שקופית: 13 - חידת הגיון: דגנים מול קטניות","slides":"","section":"A"},{"n":9,"text":"אילו מהקביעות הבאות לגבי מקורות עיקריים לסיבים נכונות?","options":{"A":"קטניות, שקדים, אגוזים, זרעי פשתן, פסיליום, צ'יאה ופירות הם מקורות עיקריים לסיבים מסיסים","B":"דגנים מלאים, קטניות והקליפה של רוב הפירות והירקות הם מקורות עיקריים לסיבים בלתי מסיסים","C":"בכל אחד מהמזונות הסיביים קיימים בדרך כלל שני סוגי הסיבים, אך ביחסים שונים","D":"שיבולת שועל היא הדגן היוצא דופן המכיל כמות משמעותית של סיבים מסיסים","E":"השאלה החשובה בכל מזון היא איזה סוג סיב דומיננטי יותר בו","F":"גם ירקות כגון תפוח אדמה, ענבים ועגבנייה נחשבים למקור לסיבים בלתי מסיסים","G":"אין צורך לזכור בעל פה את כל רשימת המקורות המדויקת, אלא להבין את העיקרון הכללי"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל הקביעות תואמות את תוכן השקופית: חלוקה כללית למקורות עשירים בסיבים מסיסים לעומת בלתי מסיסים, כאשר כל מזון סיבי מכיל בדרך כלל את שני הסוגים ביחסים שונים, ושיבולת שועל בולטת כדגן עם תכולה משמעותית של סיבים מסיסים. שקופית: 14 - מקורות עיקריים לסיבים","slides":"","section":"A"},{"n":10,"text":"אילו מהתועלות הבאות של סיבים תזונתיים מוזכרות בשקופית?","options":{"A":"סיבים תזונתיים תורמים לתחושת שובע","B":"סיבים תזונתיים מעלים את רמת הכולסטרול בדם","C":"סיבים תזונתיים מסייעים בטיפול בעצירות","D":"סיבים תזונתיים מאיצים את ספיגת הסוכר לאחר הארוחה","E":"סיבים תזונתיים מעלים את הסיכון לסרטן המעי הגס","F":"סיבים תזונתיים גורמים תמיד להחמרה במחלות מעי דלקתיות","G":"סיבים תזונתיים אינם קשורים כלל לתסמונת המעי הרגיז (IBS)"},"answer":["A","C"],"multi":true,"explanation":"בין התועלות המוכרות של סיבים תזונתיים: תחושת שובע, הורדת כולסטרול (לא העלאתו), טיפול בעצירות, הפחתת סיכון לסרטן המעי הגס, האטת ספיגת הסוכר, ושיפור במחלות מעי דלקתיות. שקופית: 15 - תועלת של סיבים במחלות ובעיות בריאות","slides":"","section":"A"},{"n":11,"text":"מה קורה למבנה הפחמימות המורכבות בפסטה או באורז לאחר קירור בהשוואה למזון חם שהוכן זה עתה?","options":{"A":"קירור פסטה לאחר בישול גורם ליצירת מבנה סיבים קשה יותר לעיכול (עמילן עמיד)","B":"פסטה קרה תמיד קלה יותר לעיכול מפסטה חמה שהוכנה זה עתה","C":"אין שום הבדל בין אכילת פסטה חמה לקרה מבחינת עיכול פחמימות","D":"קירור אינו משפיע כלל על מבנה העמילן; עמילן עמיד נוצר רק באורז ולעולם לא בפסטה","E":"חימום פסטה קרה הופך אותה לקשה יותר לעיכול; עמילן עמיד מתנהג בגוף בדיוק כמו סוכר פשוט"},"answer":["A"],"multi":false,"explanation":"קירור פסטה (או אורז) לאחר בישול גורם ליצירת מבנה קשה יותר לעיכול, המתנהג יותר כמו סיב תזונתי מאשר עמילן - תופעה הנקראת עמילן עמיד (Resistant starch). שקופית: 16 - השפעת חימום על עיכול פחמימות מורכבות","slides":"","section":"A"},{"n":12,"text":"אילו מהקביעות הבאות נכונות לגבי מזון מבושל ועמילן עמיד?","options":{"A":"יש להמליץ למי שסובל ממערכת עיכול חלשה ורגישה (למשל בהתקף קרוהן) לאכול מזון חם שהוכן זה עתה","B":"קטניות מכילות הרבה יותר עמילן עמיד לעומת דגנים וירקות ולכן הן קשות יותר לעיכול","C":"עמילן עמיד קל יותר לעיכול ומומלץ במיוחד לחולים","D":"קטניות מכילות פחות עמילן עמיד מדגנים וירקות","E":"ככל שהעמילן מכיל יותר עמילופקטין (ופחות עמילוז) כך הוא יהיה עמיד יותר","F":"אין שום גישה תזונתית או טיפולית ההולכת לכיוון אכילת מזון מבושל וחם בלבד","G":"אין שום גישה טיפולית בחולי סרטן המתייחסת לנושא חום המזון או בישולו"},"answer":["A","B"],"multi":true,"explanation":"מומלץ למי שסובל ממערכת עיכול חלשה לאכול מזון חם וטרי; קטניות (גם מבושלות) מכילות הרבה יותר עמילן עמיד מדגנים וירקות ולכן קשות יותר לעיכול. שקופית: 17 - מסקנה בפועל לגבי מזון מבושל","slides":"","section":"A"},{"n":13,"text":"אילו מהקביעות הבאות לגבי עמילן עמיד נכונות?","options":{"A":"אורז הוא הזרע העמילני המכיל את הכמות הרבה ביותר של עמילן עמיד","B":"חיטה מכילה עמילן עמיד רב יותר משעורה","C":"עמילן עמיד קל יותר לעיכול מעמילן רגיל","D":"ככל שעמילן מכיל יותר עמילופקטין (ופחות עמילוז) הוא יהיה עמיד יותר","E":"עמילן עמיד קיים אך ורק בדגנים ולעולם לא בקטניות","F":"קטניות מכילות פחות עמילן עמיד מדגנים","G":"עמילן עמיד מבנהו זהה למבנה של סיב מסיס","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"שעורה (ולא אורז או חיטה) היא הזרע המכיל את כמות עמילן העמיד הגבוהה ביותר; ככל שהעמילן עשיר יותר בעמילוז (ולא עמילופקטין) הוא עמיד יותר; וקטניות דווקא מכילות הרבה יותר עמילן עמיד מדגנים וירקות. שקופית: 18 - עמילן עמיד","slides":"","section":"A"},{"n":14,"text":"אילו מהמקורות הבאים הם מקורות עיקריים לאינולין?","options":{"A":"כל התשובות הנ\"ל הן מקורות עיקריים לאינולין","B":"ארטישוק ירושלמי","C":"עולש (צ'יקוריה)","D":"שום; בצל; חיטה; אספרגוס"},"answer":["A"],"multi":false,"explanation":"המקורות העיקריים לאינולין המוזכרים בשקופית הם צ'יקוריה (עולש), ארטישוק ירושלמי, אספרגוס, שום, בצל וחיטה. שקופית: 5 - המקורות העיקריים לאינולין","slides":"","section":"A"},{"n":15,"text":"אילו מהקביעות הבאות לגבי תכונות האינולין נכונות?","options":{"A":"אינולין הוא סיב בלתי מסיס במים","B":"אינולין פוגע בספיגת הסידן","C":"אינולין משמש בתעשייה כממתיק חזק ואגרסיבי בלבד ואינו קל כלל","D":"אינולין אינו בעל השפעה פרה-ביוטית","E":"אינולין תמיד מתאים לכל אדם עם תסמונת המעי הרגיז ואינו גורם לתופעות לוואי","F":"לגוף האדם יש אנזים שמפרק את הקשר פרוקטוז-פרוקטוז שבאינולין","G":"אינולין נספג במלואו במעי הדק ואינו מגיע כלל למעי הגס","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"אינולין הוא סיב מסיס במים בעל מתיקות קלה המשמש כממתיק קל; משפר (ולא פוגע ב) ספיגת סידן ומהווה חומר פרה-ביוטי; לגוף האדם אין אנזים המפרק אותו ולכן הוא מגיע למעי הגס; ואצל אנשים עם מעי רגיז עלול להיות בעייתי. שקופית: 6 - תכונות האינולין","slides":"","section":"A"},{"n":16,"text":"אילו מהקביעות הבאות לגבי אינולין ומערכת החיסון/העיכול נכונות?","options":{"A":"אצל עכברים, צריכת אינולין מנעה היווצרות סרטן המעי לאחר הזרקת קרצינוגנים","B":"אצל עכברים, צריכת אינולין הגבירה את התמותה בעקבות חשיפה לחיידק הליסטריה","C":"צריכת אינולין הפחיתה את חומרת מחלת הקרוהן בבני אדם","D":"צריכת אינולין בילודים הגבירה את התפתחות הדרמטיטיס האטופיק","E":"אינולין והמטבוליטים שלו מתקשרים עם קשריות הלימפה בדפנות המעי","F":"לאינולין אין שום השפעה מתועדת על מערכת החיסון","G":"אינולין מפחית את כמות חומצות השומן הקצרות שרשרת במעי הגס"},"answer":["A","C","E"],"multi":true,"explanation":"מחקרים בעכברים הראו שאינולין מנע היווצרות סרטן מעי והפחית תמותה כתוצאה מהליסטריה; בבני אדם הפחית את חומרת מחלת הקרוהן ואת התפתחות הדרמטיטיס האטופיק בילודים; ומתקשר עם קשריות הלימפה ומשפר את תפקוד המערכת החיסונית של המעי. שקופית: 7 - אינולין ומערכת החיסון","slides":"","section":"A"},{"n":17,"text":"אילו מהקביעות הבאות לגבי אגר-אגר נכונות?","options":{"A":"אגר-אגר מופק מאצות ממשפחת האצות האדומות (גרצילריה)","B":"השם \"אגר\" מקורו במילה המלזית/אינדונזית לאצה האדומה","C":"לגוף האדם אין אנזים המפרק את קשרי הגלקטוז-גלקטוז שבאגר","D":"אגר משמש בתעשיית המזון כמסמיך מרקים, ליצירת מרקם ג'לי בקינוחים ועוד","E":"אגר משמש כתחליף טבעוני לג'לטין","F":"אגר עשוי לשמש כמשלשל ולדיכוי תיאבון","G":"כל הקביעות הנ\"ל נכונות"},"answer":["G"],"multi":false,"explanation":"אגר-אגר מופק מאצות אדומות (גרצילריה), שמו נגזר מהמילה המלזית/אינדונזית, לגוף האדם אין אנזים לפרק את קשרי הגלקטוז שבו, והוא משמש כמסמיך, ליצירת ג'לי, כתחליף לג'לטין, וכן כמשלשל ומדכא תיאבון. שקופית: 19 - אגר-אגר","slides":"","section":"A"},{"n":18,"text":"אילו מהקביעות הבאות לגבי אגר-אגר בגוף וההשפעה על יפנים נכונות?","options":{"A":"לחיידקי המעי של כלל בני האדם (כולל יפנים) חסר לחלוטין הגן לפירוק אגר, ואין כל יוצא מן הכלל","B":"אצל יפנים אגר מתפקד כסיב שאינו תוסס בדיוק כמו אצל שאר האוכלוסייה בעולם","C":"חיידקי המעי של היפנים רכשו את יכולת פירוק האגר מתאי הכבד שלהם ולא מחיידקים חיצוניים","D":"אגר בגוף האדם תמיד מתפקד כסיב תוסס ללא יוצא מן הכלל","E":"אגר אינו סופח מים כלל ולכן אינו משפיע על נפח הצואה","F":"המחקר שהראה את התופעה ביפנים פורסם בכתב עת בתחום הפיזיקה בלבד","G":"אגר תמיד עובר פירוק מלא במעי הגס אצל כלל בני האדם","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"דווקא אצל יפנים חיידקי המעי רכשו במהלך דורות גן מפרק אגר מחיידקים ימיים (מחקר בכתב העת Nature). אצל רוב בני האדם אגר מתפקד כסיב שאינו תוסס וסופח מים, מגדיל את נפח הצואה. שקופית: 20 - אגר-אגר בגוף שלנו","slides":"","section":"A"},{"n":19,"text":"איזה סיב מורכב כמעט אך ורק בקטניות משילוב של גלוקוז, פרוקטוז וגלקטוז יחד, ולחיידקי המעי (ולא לאדם) יש אנזים המפרק אותו?","options":{"A":"סיב הנמצא כמעט אך ורק בקטניות, המורכב מגלוקוז, פרוקטוז וגלקטוז יחד","B":"תאית; פקטין","C":"אגר-אגר; אינולין","D":"גואר גם; עמילן עמיד"},"answer":["A"],"multi":false,"explanation":"השקופית מתארת סיב ייחודי המורכב משילוב שלושת החד-הסוכרים - גלוקוז, פרוקטוז וגלקטוז - הנמצא כמעט בלעדית בקטניות, ומוגדר כסיב מסיס במים. שקופית: 21 - סיב מגלוקוז, פרוקטוז וגלקטוז","slides":"","section":"A"},{"n":20,"text":"אילו מהקביעות הבאות לגבי דירוג מקורות הסיבים בתזונה נכונות?","options":{"A":"קטניות מהוות את המקור העשיר ביותר לסיבים","B":"עלים ירוקים נמצאים במקום השני מבחינת עושר בסיבים","C":"לאחר מכן מגיעים שאר הירקות, הפירות והדגנים","D":"ברוב הפירות והירקות, הקליפה מכילה בעיקר סיבים בלתי מסיסים","E":"ברוב הפירות והירקות, החלק הפנימי מכיל יחסית יותר סיבים מסיסים","F":"הדירוג מבוסס על כמות הסיבים היחסית במזון","G":"כל הקביעות הנ\"ל תואמות את דירוג מקורות הסיבים בתזונה"},"answer":["G"],"multi":false,"explanation":"קטניות הן המקור העשיר ביותר לסיבים, אחריהן עלים ירוקים, ולאחר מכן שאר הירקות, הפירות והדגנים. הקליפה עשירה בסיבים בלתי מסיסים בעוד החלק הפנימי עשיר יותר בסיבים מסיסים. שקופית: 21 - מקורות לסיבים בתזונה","slides":"","section":"A"},{"n":21,"text":"אילו מהקביעות הבאות לגבי מנוז נכונות?","options":{"A":"מנוז הוא איזומר של גלוקוז - אותה נוסחה כימית אך מבנה מרחבי שונה","B":"מנוז הוא חד-סוכר נדיר מאוד במזונות השונים","C":"מנוז הוא דו-סוכר המורכב מגלוקוז וגלקטוז","D":"מנוז נמצא בשפע רב במרבית הפירות והירקות","E":"מנוז הוא פוליסכריד מורכב","F":"מנוז זהה במבנהו הכימי לפרוקטוז","G":"מנוז אינו קשור כלל לגלוקוז מבחינה מבנית"},"answer":["A","B"],"multi":true,"explanation":"מנוז הוא חד-סוכר נדיר מאוד במזון, בעל אותה נוסחה כימית כמו גלוקוז אך מבנה מרחבי שונה (איזומר). שקופית: 22 - מנוז","slides":"","section":"A"},{"n":22,"text":"אילו מהקביעות הבאות לגבי מנוז נכונות?","options":{"A":"חמוציות הן הפרי המכיל את הכמות הגבוהה ביותר של מנוז","B":"הגוף אינו יכול להשתמש במנוז לאנרגיה כלל, גם לא באופן איטי ולא יעיל","C":"מנוז שנספג לדם מופרש בשתן ואינו עובר ספיגה חוזרת בכליה","D":"צריכת מנוז/חמוציות עשויה למנוע מחיידקי E. coli להיקשר לדרכי השתן","E":"הגוף אינו מסוגל לייצר מנוז בעצמו ולכן חובה לצרוך אותו מהמזון","F":"מנוז אינו מהווה מרכיב חשוב באף חלבון או תא בגוף האדם","G":"מנוז נמצא בשפע גדול כמעט בכל מזון בתזונה המערבית המודרנית"},"answer":["A","C","D"],"multi":true,"explanation":"חמוציות הן המקור העשיר ביותר במנוז מבין הפירות; מנוז הנספג לדם מופרש בשתן ללא ספיגה חוזרת בכליה; ולמנוז יתרון קליני בכך שהוא עשוי למנוע מחיידקי E. coli להיקשר לדפנות דרכי השתן. שקופית: 22 - מנוז","slides":"","section":"A"},{"n":23,"text":"מדוע מנוז אינו נפוץ בתעשיית המזון בכמויות גדולות למרות יתרונותיו לחולי סוכרת?","options":{"A":"הסיבה שמנוז אינו נפוץ בתעשייה בכמויות גדולות היא חוסר בהירות לגבי ספיגתו ואפשרות לגרימת נפיחות, גזים ושלשולים בכמויות גדולות","B":"מנוז זהה לחלוטין לגלוקוז בטעמו ובהשפעתו המטבולית; מנוז אינו מתוק כלל ולכן אינו יכול לשמש כתחליף סוכר","C":"מנוז מעלה את רמת האינסולין בצורה חדה יותר מסוכר רגיל; מנוז יקר משמעותית מסוכר רגיל וזו הסיבה היחידה לאי-שימוש בו","D":"אין כל שימוש אפשרי למנוז בתעשיית המזון, אפילו לא בממתקים קטנים; מנוז אינו מתאים לחולי סוכרת מכיוון שהוא מעלה משמעותית את רמת הסוכר בדם"},"answer":["A"],"multi":false,"explanation":"מנוז אינו מעלה את רמת הסוכר או האינסולין בדם ואף מתוק בטעמו, אך בכמויות גדולות לא ברור אם הוא נספג במלואו - מה שלא נספג עלול לספוח מים במעי הגס, לתסוס ולגרום לנפיחות, גזים ושלשולים. שקופית: 23 - תעלומת המנוז","slides":"","section":"A"},{"n":24,"text":"אילו מהקביעות הבאות לגבי גואר גם נכונות?","options":{"A":"גואר גם מופק מהחלק הפנימי של שעועית גואר, מזן הגדל בהודו","B":"החלק הפנימי של הקטנייה מכיל פוליסכריד המורכב מיחידות מנוז וגלקטוז","C":"עבור האדם, גואר גם מהווה סיב תזונתי משום שאין לנו אנזים לפרק את הקשר בין יחידותיו","D":"במגע עם מים גואר גם הופך לחומר צמיגי המשמש להסמכה","E":"גואר גם אינו משנה את תכונותיו בהקפאה ולכן נפוץ בגלידות","F":"חלק ניכר מהצריכה של גואר גם מיועד לקידוחי גז ליצירת נוזל סמיך","G":"כל הקביעות הנ\"ל נכונות"},"answer":["G"],"multi":false,"explanation":"מקור בשעועית גואר ההודית, פוליסכריד מנוז-גלקטוז, מהווה סיב תזונתי לאדם, הופך צמיגי במגע עם מים, אינו משתנה בהקפאה, וחלק ניכר מהצריכה העולמית מיועד לקידוחי גז. שקופית: 24 - Guar gum","slides":"","section":"A"},{"n":25,"text":"אילו מהקביעות הבאות לגבי שימושי גואר גם נכונות?","options":{"A":"גואר גם הופך לחומר צמיגי במגע עם מים ומשמש להסמכה","B":"גואר גם משנה את תכונותיו בהקפאה ולכן אינו מתאים לגלידות","C":"גואר גם נפוץ בשימוש ברטבים, מרקים, קינוחים קפואים ואף במשחות שיניים ובשמפו","D":"גואר גם מתפקד כסיב שאינו תוסס וחיידקי המעי אינם מסוגלים לפרקו כלל","E":"גואר גם נאסר לשימוש כתוסף לדיאטה עקב דיווחים על חסימת מעיים/ושט","F":"גואר גם אינו יכול לשמש כתחליף להסמכת קמחים ללא גלוטן","G":"גואר גם מיוצר אך ורק לשימוש בקידוחי גז ואין לו כל שימוש במזון"},"answer":["A","C","E"],"multi":true,"explanation":"גואר גם הופך לצמיגי במגע עם מים ומשמש להסמכה ברטבים, מרקים, קינוחים קפואים, משחות שיניים ושמפו; נאסר כתוסף דיאטה בשל דיווחים על חסימת מעיים/ושט. בניגוד לאחרות, אינו משנה תכונות בהקפאה, מתפקד כסיב תוסס, ומשמש גם להסמכת קמחים ללא גלוטן. שקופית: 25 - שימושים במזון (גואר)","slides":"","section":"A"},{"n":26,"text":"אילו מהקביעות הבאות לגבי קוזו נכונות?","options":{"A":"קוזו הוא צמח יפני בעל שורש עמילני המכיל מעט מאוד סיבים","B":"קוזו משמש כתחליף לקמחים המכילים גלוטן, בעיקר לקינוחים","C":"קוזו מכיל פחות קלוריות מגואר גם","D":"קוזו הוא אצה אדומה","E":"קוזו נמכר אך ורק בצורתו הטרייה ולעולם לא כאבקה","F":"עלי ופרחי הקוזו אינם משמשים לשום מטרה במזרח הרחוק","G":"קוזו הוא שם נרדף לאגר-אגר"},"answer":["A","B"],"multi":true,"explanation":"קוזו הוא צמח יפני בעל שורש עמילני דל סיבים, הנמכר כאבקה טחונה ומשמש כתחליף לקמחים המכילים גלוטן. בניגוד לאחרות, מכיל דווקא יותר קלוריות מגואר גם, ובמזרח הרחוק משתמשים גם בעליו ובפרחיו. שקופית: 27 - Kuzu","slides":"","section":"A"},{"n":27,"text":"אילו מהקביעות הבאות לגבי פקטין נכונות?","options":{"A":"פקטין מורכב מיחידות של Galacturonic acid","B":"פקטין מוגדר כסיב תוסס משום שלחיידקי המעי הגס יש אנזים לפרק את הקשר בין יחידותיו","C":"פקטין מורכב מיחידות גלוקוז המחוברות בקשרי אלפא","D":"פקטין אינו מוגדר כסיב תזונתי משום שלגוף יש אנזים המפרק אותו","E":"לחיידקי המעי הגס אין כל יכולת לפרק פקטין","F":"פקטין הוא חד-סוכר פשוט","G":"פקטין זהה מבחינה כימית לתאית"},"answer":["A","B"],"multi":true,"explanation":"פקטין מורכב מיחידות Galacturonic acid; הגוף חסר אנזים לפירוק הקשר ביניהן (ולכן מוגדר כסיב תזונתי), אך לחיידקי המעי הגס יש אנזים כזה (ולכן הוא מוגדר גם כסיב תוסס). שקופית: 27 - פקטין","slides":"","section":"A"},{"n":28,"text":"אילו מהקביעות הבאות לגבי תפקידי הפקטין בהבשלת פירות נכונות?","options":{"A":"הפקטין גורם לפרי להתקשות ולהתייבש ככל שהוא מבשיל","B":"אנזימי ההבשלה מאריכים את שרשראות הפקטין ולא מקצרים אותן","C":"פרי לא בשל מכיל פחות פרוטו-פקטין מפרי בשל","D":"פקטין תפקידו אך ורק בהגנה מפני מזיקים ואין לו כל תפקיד מבני בתא הצמח","E":"הפקטין נמצא רק בזרעי הפרי ולא בדופן התא","F":"ה\"מלט\" בין תאי הצמח מתחזק ככל שהפרי מבשיל, ולכן הפרי מתקשה עם ההבשלה","G":"לפקטין אין כל קשר לגמישות דופן התא","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"ככל שהפרי מבשיל אנזימים מקצרים (לא מאריכים) את שרשראות הפקטין, ה\"מלט\" בין התאים נחלש (לא מתחזק) והפרי מתרכך; פרי לא בשל מכיל דווקא יותר פרוטו-פקטין; ולפקטין תפקיד מבני (גמישות דופן התא) בנוסף להגנה מפני מזיקים. שקופית: 28 - תפקידי הפקטין בפירות ובירקות","slides":"","section":"A"},{"n":29,"text":"מהו מנגנון הפעולה הנכון של פקטין בהורדת רמות כולסטרול?","options":{"A":"פקטין מוריד כולסטרול על ידי כך שהוא סופח גלוקוז ומוציא אותו ישירות מהגוף","B":"פקטין מעלה את רמות ה-LDL בדם","C":"פקטין לוכד חומצות מרה במעי הדק ומונע את ספיגתן החוזרת, ואין לכך כל השפעה על רמות הכולסטרול","D":"הכבד אינו נדרש לייצר חומצות מרה חדשות בעקבות פעילות הפקטין","E":"פקטין מוריד את רמות ה-HDL בצורה ניכרת","F":"פקטין מוריד כולסטרול על ידי פירוק ישיר של מולקולות הכולסטרול במעי","G":"השפעת הפקטין על כולסטרול אינה קשורה כלל לחומצות מרה","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"פקטין יוצר רשת שלוכדת חומצות מרה במעי הדק ומוציאה אותן מהגוף; כדי להשלים את החוסר, הכבד נאלץ למשוך כולסטרול מהדם לייצור חומצות מרה חדשות - וכך יורדת רמת ה-LDL, ללא השפעה משמעותית על HDL. שקופית: 28 - תכונות הפקטין בהקשר לתזונת האדם","slides":"","section":"A"},{"n":30,"text":"אילו מהקביעות הבאות לגבי פקטין ועיכוב ספיגת סוכר/תמיכה במעי נכונות?","options":{"A":"פקטין מאט את ריקון הקיבה בשל צמיגותו והנפח שהוא יוצר, ובכך מאט את ספיגת הסוכר","B":"פקטין אינו סופח את הגלוקוז עצמו ואינו מוציא אותו מהגוף","C":"פקטין מהווה מצע גידול לחיידקים פרוביוטיים במעי הגס, שמייצרים ממנו חומצות שומן קצרות שרשרת","D":"פקטין תורם לתחושת שובע ממושכת יותר בזכות התנפחות בקיבה והאטת ריקונה","E":"פקטין עשוי לסייע בהקטנת כמות הקלוריות הנצרכת","F":"לפקטין השפעה חיובית על רירית המעי ועל מערכת החיסון, כולל הפחתת דלקת","G":"כל הקביעות הנ\"ל נכונות"},"answer":["G"],"multi":false,"explanation":"פקטין מאט ספיגת סוכר דרך האטת ריקון הקיבה (ולא ספיחת גלוקוז), משמש כמצע גידול פרוביוטי, תורם לשובע ולהפחתת צריכת קלוריות, ומשפיע לטובה על רירית המעי ומערכת החיסון. שקופית: 29 - המשך תכונות הפקטין","slides":"","section":"A"},{"n":1,"text":"מטופלת בת 34 עם תסמונת מעי רגיז (IBS) מדווחת על נפיחות משמעותית וכאבי בטן לאחר ארוחות המכילות שום, בצל, אספרגוס וארטישוק ירושלמי. מהו ההסבר הסביר ביותר וההמלצה המתאימה?","options":{"A":"המזונות הללו עשירים באינולין, סיב מסיס שעובר תסיסה במעי ועלול להיות בעייתי במיוחד למטופלים עם מעי רגיז - מומלץ לנסות להפחית את צריכתם באופן זמני ולעקוב אחר התסמינים","B":"אין כל קשר אפשרי בין מזונות אלו לתסמיני IBS; מדובר בהרעלת מזון חריפה שאינה קשורה לתזונה הכרונית","C":"יש להגביר דווקא את צריכת המזונות הללו כדי לשפר את התסמינים; המזונות הללו מכילים גלוטן שהוא הגורם היחיד האפשרי לתסמינים","D":"המזונות הללו מכילים בעיקר סיבים בלתי מסיסים הגורמים לעצירות בלבד; המזונות הללו עשירים בעמילן עמיד שגורם לגזים - יש להימנע ממזון מבושל"},"answer":["A"],"multi":false,"explanation":"שום, בצל, אספרגוס וארטישוק ירושלמי הם מקורות עיקריים לאינולין - סיב מסיס שיוצר תסיסה ומגדיל את כמות המים במעי, ועלול להיות בעייתי במיוחד לאנשים עם מעי רגיז. שקופית: 5-6 - מקורות ותכונות האינולין","slides":"","section":"B"},{"n":2,"text":"מטופלת עם זיהומים חוזרים בדרכי השתן שואלת האם יש הגיון מדעי בהמלצה לשתות מיץ חמוציות למניעת זיהומים. מהו ההסבר הפיזיולוגי הרלוונטי ביותר מתוך החומר הנלמד?","options":{"A":"חמוציות מכילות ריכוז גבוה יחסית של מנוז, שעשוי למנוע מחיידקי E. coli להיקשר לדפנות דרכי השתן","B":"חמוציות עשירות בפקטין שמפרק חיידקים ישירות בדרכי השתן","C":"אין שום בסיס פיזיולוגי אפשרי לקשר בין חמוציות לדרכי השתן","D":"חמוציות מכילות אנטיביוטיקה טבעית ברמה גבוהה; חמוציות משמשות כתחליף לגלוטן ולכן מונעות דלקת","E":"חמוציות מפחיתות את חומציות השתן וכך מונעות זיהום; חמוציות מעלות את רמת הסוכר בשתן וכך הורגות חיידקים"},"answer":["A"],"multi":false,"explanation":"חמוציות הן הפרי העשיר ביותר במנוז - חד-סוכר שנספג לדם ומופרש בשתן ללא ספיגה חוזרת בכליה, ובעל יתרון קליני אפשרי במניעת היקשרות חיידקי E. coli לדפנות דרכי השתן. שקופית: 22 - מנוז","slides":"","section":"B"},{"n":3,"text":"מטופל בן 55 עם רמות LDL גבוהות מעוניין בהמלצות תזונתיות המבוססות על מנגנון הפעולה של פקטין. אילו קביעות נכונות ורלוונטיות להמלצה שיש לתת לו?","options":{"A":"מומלץ לו לאכול תפוחים עם הקליפה, שהיא המקור המרוכז ביותר לפקטין","B":"פקטין מוריד כולסטרול על ידי לכידת חומצות מרה במעי הדק ומניעת ספיגתן החוזרת, מה שמאלץ את הכבד לייצר חומצות מרה חדשות מכולסטרול","C":"יש להמליץ לו להימנע לחלוטין מכל סוגי הפירות והירקות","D":"פקטין פועל על ידי פירוק ישיר של מולקולות הכולסטרול בדם","E":"יש לצפות להשפעה משמעותית של פקטין על העלאת רמות ה-HDL","F":"תפוזים וקליפותיהם אינם מקור משמעותי לפקטין","G":"פקטין עשוי גם להאט את עליית רמת הסוכר לאחר הארוחה בזכות האטת ריקון הקיבה"},"answer":["A","B","G"],"multi":true,"explanation":"תפוחים עם הקליפה הם מהמקורות המרוכזים ביותר לפקטין; פקטין מוריד כולסטרול על ידי לכידת חומצות מרה במעי הדק, מה שמאלץ את הכבד למשוך כולסטרול מהדם; ופקטין גם מאט את עליית רמת הסוכר לאחר הארוחה. שקופית: 28-30 - תכונות ומקורות הפקטין","slides":"","section":"B"},{"n":4,"text":"מטופל סובל מעצירות כרונית ומבקש המלצה תזונתית מבוססת סיבים. איזה סוג סיב יהיה היעיל ביותר להגדלת נפח הצואה ולשיפור התנועתיות?","options":{"A":"סיב תוסס בלבד, כגון אינולין, ללא שילוב סיבים נוספים","B":"סיב שאינו תוסס (בלתי מסיס), המגדיל את נפח הצואה","C":"חומצות שומן קצרות שרשרת בלבד ללא סיבים כלל","D":"עמילן עמיד בלבד","E":"פקטין בלבד ללא כל סיב אחר","F":"גואר גם בלבד","G":"אין קשר בין סוג הסיב לבעיית עצירות"},"answer":["B"],"multi":false,"explanation":"סיב שאינו תוסס (בלתי מסיס) שומר על מבנהו במעי, סופח מים ומגדיל את נפח הצואה - תכונה יעילה במיוחד לטיפול בעצירות. שקופית: 9, 15 - מיון סיבים ותועלת בעצירות","slides":"","section":"B"},{"n":5,"text":"מטופל עם רגישות מעי מדווח על נפיחות לאחר צריכת גלידות מסחריות ולאחר ארוחות עתירות שום ובצל. אילו קביעות מסבירות זאת נכונה?","options":{"A":"גלידות רבות מכילות גואר גם כמסמיך, המתפקד כסיב תוסס שעלול לגרום לתסיסה ולנפיחות","B":"שום ובצל עשירים באינולין, סיב מסיס-תוסס שעלול לגרום לנפיחות אצל אנשים רגישים","C":"גלידות ושום/בצל מכילים בעיקר עמילן עמיד שגורם לתופעות אלו","D":"גואר גם ואינולין הם שני שמות שונים לאותו החומר בדיוק","E":"גואר גם ואינולין אינם קשורים כלל לתסיסה במעי","F":"הפתרון היחיד הוא הימנעות מוחלטת וקבועה מכל מזון המכיל סיבים","G":"גם גואר גם וגם אינולין עוברים פירוק על ידי חיידקי המעי הגס ותסיסתם עלולה להגביר גזים ונפיחות"},"answer":["A","B","G"],"multi":true,"explanation":"גואר גם המשמש להסמכת גלידות מתפקד כסיב תוסס שחיידקי המעי מפרקים; שום ובצל עשירים באינולין, גם הוא סיב תוסס. תסיסת שני הסיבים הללו במעי הגס עלולה לגרום לנפיחות ולגזים אצל אנשים רגישים. שקופית: 6, 25 - תכונות האינולין וגואר גם","slides":"","section":"B"},{"n":6,"text":"מטופל קשיש המחלים מדלקת קיבה-מעיים חריפה שואל האם עדיף לו לאכול אורז שהתקרר או אורז חם שהוכן זה עתה. מהי ההמלצה הנכונה ביותר בהתבסס על עקרון העמילן העמיד?","options":{"A":"אורז חם שהוכן זה עתה עדיף, מכיוון שקירור יוצר עמילן עמיד שקשה יותר לעיכול","B":"חימום מחדש של אורז קר אינו משנה את רמת קלות העיכול שלו","C":"עמילן עמיד קל יותר לעיכול ולכן אורז קר מתאים יותר לקשישים","D":"אורז קר עדיף כי הוא מכיל פחות עמילן עמיד; יש להימנע מאורז לחלוטין ולעולם לא לחזור לאוכלו","E":"אין כל הבדל בין אורז חם לקר עבור מערכת עיכול חלשה; יש להעדיף דווקא אורז שהוכן ואוחסן במקרר מספר ימים"},"answer":["A"],"multi":false,"explanation":"קירור מזון עמילני כמו אורז או פסטה יוצר עמילן עמיד - מבנה הדומה לסיב תזונתי וקשה יותר לעיכול. לכן למי שסובל ממערכת עיכול חלשה או מחלים ממחלה, מומלץ מזון חם שהוכן זה עתה. שקופית: 16-17 - השפעת חימום/קירור על עיכול פחמימות","slides":"","section":"B"},{"n":7,"text":"מטופל מדווח שקטניות גורמות לו לגזים רבים בעוד אורז וקינואה כמעט ואינם משפיעים עליו. מהו ההסבר הפיזיולוגי המתאים ביותר שיש לתת לו?","options":{"A":"קטניות מכילות כמות גדולה של סיבים מסיסים התוססים במעי הגס ומייצרים גזים, בעוד בדגנים דומיננטיים בעיקר סיבים בלתי מסיסים שאינם תוססים","B":"קטניות מכילות בעיקר סיבים בלתי מסיסים שאינם תוססים, בעוד דגנים מכילים סיבים מסיסים תוססים","C":"אין הבדל בין תכולת הסיבים בקטניות לבין דגנים; יש להפסיק לחלוטין את צריכת כל הקטניות לצמיתות","D":"גזים נגרמים אך ורק מצריכת חלבון מן החי ואינם קשורים לסיבים; קטניות אינן מכילות סיבים כלל; התופעה נובעת מרגישות לגלוטן בלבד"},"answer":["A"],"multi":false,"explanation":"קטניות עשירות בסיבים מסיסים (תוססים) שתסיסתם במעי הגס יוצרת גזים, בעוד דגנים מכילים בעיקר סיבים בלתי מסיסים (שאינם תוססים) שאינם עוברים תסיסה משמעותית. שקופית: 13 - חידת הגיון: דגנים מול קטניות","slides":"","section":"B"},{"n":8,"text":"מטופלת מתבגרת עם סיכון מוגבר לצפיפות עצם נמוכה. הרופא שוקל להמליץ על העשרת התזונה בסיבי אינולין. אילו קביעות נכונות ותומכות בהמלצה זו?","options":{"A":"סיבים תוססים (כגון אינולין) מעלים את רמת החומציות במעי הגס, מה שהופך מינרלים כגון סידן למסיסים יותר ומשפר את ספיגתם","B":"במחקר שהוזכר, למתבגרים שקיבלו סיבי אינולין הייתה לאחר שנה עלייה בצפיפות העצם לעומת קבוצת ביקורת","C":"אינולין עשוי לפגוע ישירות בתאי העצם ולהחליש אותם","D":"תסיסת סיבים מסיסים במעי הגס מייצרת סביבה שמאפשרת \"שחרור\" מינרלים מהסיבים וספיגתם במעי הגס - הזדמנות נוספת לספיגת מינרלים שלא נספגו במעי הדק","E":"סיבים תזונתיים לעולם אינם משפיעים על ספיגת מינרלים","F":"יש להימנע לחלוטין מכל סוגי הסיבים אצל מטופלים עם סיכון לאוסטאופורוזיס","G":"סידן אינו מושפע כלל מרמת החומציות במעי"},"answer":["A","B","D"],"multi":true,"explanation":"סיבים תוססים כמו אינולין מעלים את החומציות במעי הגס, מה שמשפר את מסיסות המינרלים (כולל סידן) וספיגתם. מחקר שהוזכר בשקופית הראה שיפור בצפיפות העצם אצל מתבגרים שקיבלו סיבי אינולין לעומת קבוצת ביקורת. שקופית: 31 - סיבים תזונתיים וספיגת מינרלים","slides":"","section":"B"},{"n":9,"text":"מטופל הנמצא בדיאטה ללא גלוטן שם לב שמוצרי קמח ללא גלוטן רבים מכילים גואר גם ושואל מה תפקידו שם. מהי התשובה הנכונה?","options":{"A":"גואר גם משמש כתחליף לגלוטן עצמו ומחליף אותו מבחינה תזונתית לחלוטין","B":"גואר גם משמש כתוספת להסמכת קמחים ללא גלוטן על מנת לשפר את תפיחת המוצר","C":"גואר גם מוסיף גלוטן טבעי למוצר","D":"גואר גם משמש רק לצביעת המוצר","E":"גואר גם מפחית את כמות הסיבים במוצר","F":"גואר גם משמש אך ורק בתעשיית הגלידות ולא במוצרי מאפה","G":"גואר גם הוא חומר משמר בלבד וללא כל השפעה על מרקם"},"answer":["B"],"multi":false,"explanation":"גואר גם משמש כתוספת נפוצה להסמכת קמחים ללא גלוטן על מנת לשפר את תפיחת המוצר האפוי, מכיוון שהוא מקנה תכונות צמיגות/מרקם שהגלוטן מספק בדרך כלל. שקופית: 25 - שימושים במזון (גואר)","slides":"","section":"B"},{"n":10,"text":"מטופל סוכרתי שמע שמנוז הוא \"היהלום של הסוכרים\" ומעוניין לדעת אם הוא יכול להחליף איתו את הסוכר הרגיל בכמויות גדולות (למשל בעוגה שלמה). מהי התשובה המקצועית הנכונה?","options":{"A":"מנוז אכן אינו מעלה משמעותית את רמת הסוכר או האינסולין בדם ומתאים בכמויות קטנות (כגון בסוכריות), אך בכמויות גדולות לא ברור אם הוא נספג במלואו, ועלול לגרום לנפיחות, גזים ושלשולים","B":"כן, אפשר להחליף בכמויות בלתי מוגבלות ללא כל חשש, מכיוון שמנוז אינו מעלה סוכר או אינסולין בדם","C":"מנוז מסוכן יותר לסוכרתיים מסוכר רגיל בכל כמות; מנוז אינו מתוק כלל ולכן לא רלוונטי כתחליף ממתיק","D":"מנוז מזוהה עם עליה חדה ברמת האינסולין ולכן אסור לחלוטין לסוכרתיים; אין כל הבדל מטבולי בין מנוז לסוכר רגיל; לא בכלל, מנוז אסור לשימוש לחלוטין בכל כמות"},"answer":["A"],"multi":false,"explanation":"מנוז אינו מעלה משמעותית את רמת הסוכר או האינסולין ובעל טעם מתוק, מה שהופך אותו לאטרקטיבי בכמויות קטנות. עם זאת, בכמויות גדולות לא ברור אם הוא נספג במלואו, ומה שלא נספג עלול לגרום לנפיחות, גזים ושלשולים. שקופית: 23 - תעלומת המנוז","slides":"","section":"B"},{"n":9000,"text":"סיבים תזונתיים מורכבים אך ורק מיחידות של גלקטוז — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["B"],"multi":false,"explanation":"המשפט שגוי על פי החומר. סיבים תזונתיים הם שרשרת חד-סוכרים (ברובם גלוקוז) שלגוף האדם אין אנזים לפרק את הקשר ביניהם. בעמילן ובגליקוגן הקשרים הם קשרי אלפא, ואילו בסיבים התזונתיים הקשרים הם קשרי ביתא - ולכן כל הקביעות שגויות. שקופית: 8 - הגדרת סיבים תזונתיים","slides":"","section":"A","tf":1},{"n":9001,"text":"ברוב הפירות והירקות, החלק הפנימי מכיל יחסית יותר סיבים מסיסים — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["A"],"multi":false,"explanation":"המשפט נכון על פי החומר. קטניות הן המקור העשיר ביותר לסיבים, אחריהן עלים ירוקים, ולאחר מכן שאר הירקות, הפירות והדגנים. הקליפה עשירה בסיבים בלתי מסיסים בעוד החלק הפנימי עשיר יותר בסיבים מסיסים. שקופית: 21 - מקורות לסיבים בתזונה","slides":"","section":"A","tf":1},{"n":9002,"text":"פקטין מאט את ריקון הקיבה בשל צמיגותו והנפח שהוא יוצר, ובכך מאט את ספיגת הסוכר — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["A"],"multi":false,"explanation":"המשפט נכון על פי החומר. פקטין מאט ספיגת סוכר דרך האטת ריקון הקיבה (ולא ספיחת גלוקוז), משמש כמצע גידול פרוביוטי, תורם לשובע ולהפחתת צריכת קלוריות, ומשפיע לטובה על רירית המעי ומערכת החיסון. שקופית: 29 - המשך תכונות הפקטין","slides":"","section":"A","tf":1},{"n":9003,"text":"אין שום גישה טיפולית בחולי סרטן המתייחסת לנושא חום המזון או בישולו — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["B"],"multi":false,"explanation":"המשפט שגוי על פי החומר. מומלץ למי שסובל ממערכת עיכול חלשה לאכול מזון חם וטרי; קטניות (גם מבושלות) מכילות הרבה יותר עמילן עמיד מדגנים וירקות ולכן קשות יותר לעיכול. שקופית: 17 - מסקנה בפועל לגבי מזון מבושל","slides":"","section":"A","tf":1},{"n":9004,"text":"סיב הנמצא כמעט אך ורק בקטניות, המורכב מגלוקוז, פרוקטוז וגלקטוז יחד — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["A"],"multi":false,"explanation":"המשפט נכון על פי החומר. השקופית מתארת סיב ייחודי המורכב משילוב שלושת החד-הסוכרים - גלוקוז, פרוקטוז וגלקטוז - הנמצא כמעט בלעדית בקטניות, ומוגדר כסיב מסיס במים. שקופית: 21 - סיב מגלוקוז, פרוקטוז וגלקטוז","slides":"","section":"A","tf":1},{"n":9005,"text":"כל המזונות מכילים אך ורק סוג אחד של סיב — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["B"],"multi":false,"explanation":"המשפט שגוי על פי החומר. למרות שהחלוקה הקלאסית היא למסיסים ובלתי מסיסים, השקופית מדגישה כי התכונה הפונקציונלית החשובה ביותר היא האם הסיב תוסס או לא. שקופית: 9 - מיון הסיבים","slides":"","section":"A","tf":1}]},{"id":"25","title":"תזונה חומצית - בסיסית","questions":[{"n":1,"text":"מה עלול לקרות אם מגדילים בבת אחת ובאופן חד את צריכת הסיבים התזונתיים ללא הסתגלות הדרגתית, על פי השיעור?","options":{"A":"כאבי בטן, גזים, נפיחות ושינוי במרקם הצואה, ולעיתים שילשולים","B":"עלייה מיידית וניכרת בצפיפות העצם","C":"ירידה מיידית ברמת ה-IGF-1 בדם","D":"שיפור מיידי בספיגת מינרלים","E":"עלייה בחומציות הדם למשך שעות ספורות","F":"שיפור מיידי בייצור קולגן","G":"אין כל השפעה שלילית, ולכן אין צורך בהתאמת כמות מים"},"answer":["A"],"multi":false,"explanation":"הגדלה חדה של צריכת הסיבים ללא הסתגלות הדרגתית עלולה לגרום לכאבי בטן, גזים, נפיחות ושינוי במרקם הצואה ואף שילשולים; לכן מומלצת הסתגלות הדרגתית והתאמת כמות המים. שקופית: 1 - דגשים לצריכת סיבים","slides":"","section":"A"},{"n":2,"text":"אילו שני מרכיבים במזון גורמים לפסולת מטבולית חומצית, על פי השיעור?","options":{"A":"זרחן","B":"אשלגן","C":"חלבון","D":"סידן","E":"מגנזיום","F":"ויטמין C","G":"סיבים תזונתיים"},"answer":["A","C"],"multi":true,"explanation":"לפי השיעור, זרחן וחלבון (יחד עם גופרית) הם מרכיבים במזון הגורמים לפסולת מטבולית חומצית. סידן, אשלגן ומגנזיום גורמים לפסולת בסיסית. שקופית: 3 - טענה שנבחן - מרכיבי מזון וחומציות","slides":"","section":"A"},{"n":3,"text":"אילו מהקביעות הבאות לגבי \"קשרים מצליבים\" (cross-links) בסיבי הקולגן, על פי השיעור, נכונות?","options":{"A":"קיימים שני סוגים - קשרים הנוצרים על ידי אנזימים וקשרים שאינם תלויים באנזימים","B":"קשרים הנוצרים עקב גליקציה או חמצון מחזקים את סיבי הקולגן ומשפרים מינרליזציה","C":"בחולי אוסטיאופורוזיס נמצאו קשרים מצליבים פגומים בשכיחות גבוהה יותר מאשר בבריאים","D":"קשרים מצליבים פגומים נמצאו רק בחולי אוסטיאופורוזיס ולעולם לא בחולי סכרת","E":"גליקציה היא תהליך של קישור גלוקוז לקולגן","F":"כל הקשרים המצליבים בקולגן תלויים באנזימים בלבד","G":"קשרים מצליבים פגומים משפרים את חוזק העצם"},"answer":["A","C","E"],"multi":true,"explanation":"קיימים קשרים מצליבים אנזימטיים ולא-אנזימטיים; גליקציה היא קישור גלוקוז לקולגן; ונמצאו קשרים פגומים בשכיחות גבוהה יותר בחולי אוסטיאופורוזיס (וגם בחולי סכרת) לעומת בריאים. הקשרים הפגומים דווקא מחלישים את הקולגן, לא מחזקים אותו. שקופית: 13 - קולגן, עצמות וזקנה","slides":"","section":"A"},{"n":4,"text":"אילו מהקביעות הבאות לגבי סוכר, שומן ועמילן נכונות, על פי \"החידון הבסיסי/חומצי\" שהוצג בשיעור?","options":{"A":"סוכר, שומן ועמילן הם כולם מזונות ניטרליים מבחינת השפעתם על חומציות השתן","B":"הניטרליות שלהם נובעת מכך שהם מורכבים רק מפחמן, מימן וחמצן","C":"אין בהם גופרית או חנקן שהגוף צריך לפנות דרך חומצות חזקות","D":"הגוף מפנה עודפי גופרית וחנקן דרך השתן ודרך הריאות","E":"שומן יכול בכל זאת לגרום להשפעה חומצית בשתן במצב של קטוזיס","F":"מזון עמילני עדיין יכול להעלות חומציות בזכות תכולת הזרחן שבו (בזרעים כמו חיטה או קינואה)","G":"עמילן כשלעצמו אינו הגורם הישיר להעלאת החומציות במזונות עמילניים"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל הקביעות הללו הוצגו במפורש בשיעור - סוכר, שומן ועמילן ניטרליים כי הם מכילים רק פחמן/מימן/חמצן; שומן כן משפיע בקטוזיס; ועמילן עצמו אינו האשם בהעלאת חומציות במזונות עמילניים אלא הזרחן שבזרעים. שקופית: 4-5 - חידון בסיסי/חומצי","slides":"","section":"A"},{"n":5,"text":"אילו מהקביעות הבאות לגבי חומצות אמינו וחומציות נכונות?","options":{"A":"כל חומצות האמינו יוצרות פסולת חומצית באותה המידה בדיוק","B":"גליצין ואלנין הן חומצות האמינו החומציות ביותר","C":"גלוטמט ואספרטט הן חומצות אמינו שמעלות את חומציות השתן באופן החזק ביותר","D":"מתיונין וציסטאין הן חומצות אמינו ניטרליות לחלוטין מבחינת השפעתן על החומציות","E":"ליזין וארגינין הם חומצות אמינו שנמצאות רק במזון מן הצומח","F":"חלבון מן הצומח עשיר במיוחד במתיונין ובציסטאין בהשוואה לחלבון מן החי","G":"וולין היא חומצת האמינו החומצית ביותר הידועה","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"כל הקביעות הפוכות מהעובדות שנלמדו: מתיונין וציסטאין (המכילות גופרית) הן החומציות ביותר, גלוטמט ואספרטט הן דווקא בסיסיות (\"פרדוקסליות\"), גליצין/אלנין/וולין ניטרליות, וחלבון מן החי (לא מהצומח) עשיר במיוחד במתיונין ובציסטאין. שקופית: 3-4 - חומציות חומצות אמינו","slides":"","section":"A"},{"n":6,"text":"על פי ההגדרות שניתנו בשיעור, מהי \"תזונה בסיסית\"?","options":{"A":"תזונה שגורמת לשתן להיות בסיסי יותר","B":"תזונה שגורמת לדם להיות בסיסי יותר","C":"תזונה נטולת בשר בלבד","D":"תזונה שגורמת לשתן להיות חומצי יותר","E":"תזונה המבוססת על ירקות ירוקים בלבד","F":"תזונה שמעלה את חומציות הדם","G":"תזונה שאין לה כל השפעה על ה-pH של הגוף"},"answer":["A"],"multi":false,"explanation":"לפי ההגדרה שניתנה בשיעור, תזונה בסיסית מוגדרת כתזונה הגורמת לשתן להיות בסיסי יותר (לא לדם). שקופית: 2 - מבוא לתזונה חומצית/בסיסית","slides":"","section":"A"},{"n":7,"text":"אילו שני מזונות מהבאים מסווגים כ\"מזונות בסיסיים\" לפי מדד החומציות שהוצג בשיעור?","options":{"A":"פירות","B":"דגנים","C":"ירקות","D":"ביצים","E":"דגנים מלאים","F":"מוצרי חלב","G":"אלכוהול"},"answer":["A","C"],"multi":true,"explanation":"המזונות הבסיסיים שהוצגו הם פירות, ירקות ואגוזים/קטניות. דגנים (כולל דגנים מלאים), ביצים, מוצרי חלב ואלכוהול מסווגים כמזונות חומציים. שקופית: 5 - מדד החומציות של מזונות נפוצים","slides":"","section":"A"},{"n":8,"text":"אילו שלוש קביעות נכונות לגבי הממצא היוצא דופן שהוזכר ביחס לקשר בין חומציות שתן לצפיפות עצם?","options":{"A":"נמצא קשר מסוים בין חומציות השתן לצפיפות העצם בגברים קשישים","B":"לא נמצא קשר כזה בנשים","C":"באופן כללי, ברוב האוכלוסייה לא נמצא קשר בין רמת החומציות בשתן לצפיפות העצם","D":"הקשר נמצא חזק וברור בכל קבוצות הגיל והמין","E":"הקשר נמצא רק בילדים","F":"חומציות שתן מנבאת סיכון לאוסטיאופורוזיס בכל האוכלוסיות","G":"המחקר שבדק זאת בוצע אך ורק על ילדים מתחת לגיל 10"},"answer":["A","B","C"],"multi":true,"explanation":"הממצא היוצא דופן שהוזכר הוא שנמצא קשר מסוים בין חומציות שתן לצפיפות עצם בגברים קשישים בלבד - לא בנשים ולא ביתר האוכלוסייה, כאשר באופן כללי לא נמצא קשר כזה. שקופית: 16 - מזון חומצי ואוסטיאופורוזיס (המחקרים)","slides":"","section":"A"},{"n":9,"text":"אילו מהקביעות הבאות לגבי קולגן נכונות, על פי השיעור?","options":{"A":"קולגן הוא החלבון החוץ-תאי הנפוץ ביותר בגוף","B":"קולגן הוא מרכיב עיקרי ברקמות חיבור כמו עצמות, גידים וסחוסים","C":"מידת הקשיחות של רקמת החיבור תלויה בכמות המינרלים בתוך רשת סיבי הקולגן","D":"קולגן נמצא בכמות רבה בעצמות, בחוליות, בדנטין, בדפנות כלי הדם ובעור","E":"לקולגן תפקיד חשוב בריפוי פצעים וכוויות","F":"גידים ורצועות הם למעשה סיבים של קולגן","G":"קולגן הוא מרכיב מהותי בקרמים רבים נגד קמטים (אנטי-אייג'ינג)"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל הפרטים הללו הוצגו בשיעור ביחס לקולגן - היותו החלבון החוץ-תאי הנפוץ ביותר, מרכיב עיקרי ברקמות חיבור, תלות קשיחות הרקמה במינרליזציה, מיקומיו בגוף, תפקידו בריפוי, זהותם של הגידים והרצועות כסיבי קולגן, ושימושו בקוסמטיקה. שקופית: 10-11 - קולגן","slides":"","section":"A"},{"n":10,"text":"אילו מהקביעות הבאות לגבי הבסיס הפיזיולוגי של \"תאוריית האפר החומצי\" והביקורת עליה נכונות?","options":{"A":"תחום ה-pH התקין של הדם הוא כ-6.35-6.45","B":"נמצא שינוי ברור וניתן למדידה בחומציות הדם בעקבות אכילת מזון חומצי בודד","C":"הכליות אינן מפרישות ביקרבונט בשום מצב","D":"חומציות השתן מהווה עדות ישירה ואמינה לחומציות הדם","E":"תאוריית האפר החומצי טענה במפורש שיש חומציות מדידה בדם","F":"לריאות אין כל תפקיד באיזון חומצה-בסיס בגוף","G":"שתן בסיסי מהווה הוכחה חד-משמעית לבריאות טובה","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"כל הקביעות שגויות: תחום ה-pH התקין הוא 7.35-7.45; לא נמצא שינוי מדיד בדם (\"latent acidosis\"); הכליות כן מייצרות ביקרבונט; חומציות השתן אינה מעידה על חומציות הדם; התאוריה עצמה טענה לצורך בפירוק עצם לתיקון ולא לחומציות דם מדידה; לריאות יש תפקיד באיזון חומצה-בסיס; ושתן בסיסי אינו הוכחה לבריאות. שקופית: 7-8 - הבסיס הפיזיולוגי וטענות הנגד","slides":"","section":"A"},{"n":11,"text":"לפי השיעור, בקרב אילו חולים הועלתה לראשונה ההשערה שהעצמות משמשות כאמצעי לאיזון חומצה-בסיס בדם?","options":{"A":"חולים עם מחלת כליות כרונית","B":"חולי סוכרת","C":"חולי אוסטיאופורוזיס ללא מחלה נוספת","D":"ילדים עם אפילפסיה","E":"חולי סרטן גרורתי","F":"נשים בגיל המעבר","G":"ספורטאים בעלי מסת שריר גבוהה"},"answer":["A"],"multi":false,"explanation":"ההשערה הועלתה לראשונה בקרב חוקרים שבדקו חולים עם מחלת כליות כרונית, ולאחר מכן הורחבה - למרות סימני שאלה - גם לאנשים בריאים. שקופית: 7 - מאיפה נולדה התאוריה","slides":"","section":"A"},{"n":12,"text":"אילו שתי קביעות נכונות לגבי מדד ה-PRAL (Potential Renal Acid Load)?","options":{"A":"הוא מחושב על פי מרכיבי המזון ואמור לנבא את השפעתו על חומציות השתן","B":"הוא נמדד ביחידות של mEq/100g","C":"הוא מודד ישירות את חומציות הדם ולא את חומציות השתן","D":"הוא מספק תשובה מדויקת ומוחלטת ולא קירוב","E":"הוא פותח לראשונה על ידי חוקרת בשם קרסטטר (Kerstetter)","F":"הוא רלוונטי רק למזונות מן החי","G":"הוא זהה עבור כל סוגי המזון ללא תלות במרכיביהם"},"answer":["A","B"],"multi":true,"explanation":"PRAL הוא ערך המחושב עבור כל מזון על פי מרכיביו, נועד לנבא את ההשפעה החומצית/בסיסית על השתן (לא על הדם), ונמדד ב-mEq/100g. מדובר בקירוב ולא במדידה מוחלטת. שקופית: 6 - PRAL","slides":"","section":"A"},{"n":13,"text":"אילו משלושת המנגנונים הבאים הוצגו בשיעור כדרכים בהן חלבון משפר ספיגת סידן?","options":{"A":"חלבון מעלה חומציות קיבה, וסביבה חומצית ממיסה טוב יותר מלחי סידן להפיכתם ליוני סידן חופשיים","B":"חומצות אמינו מסוימות נקשרות לסידן במעי ומונעות ממנו להיקשר לחומרים מעכבי ספיגה כמו חומצה פיטית או אוקסלית","C":"חלבון מפעיל IGF-1 שבין היתר מגדיל ייצור משאבות סידן במעי","D":"חלבון מגביר את קצב הנשימה ובכך משפר ספיגת סידן בריאות","E":"חלבון מפחית את חומציות הקיבה ובכך משפר ספיגה","F":"חלבון חוסם לחלוטין את פעולת חומצה פיטית בכבד","G":"חלבון מגדיל ישירות את מספר העצמות בגוף"},"answer":["A","B","C"],"multi":true,"explanation":"שלושת המנגנונים שהוצגו: הגברת חומציות הקיבה הממיסה מלחי סידן; קשירת חומצות אמינו לסידן המונעת עיכוב ספיגה; והפעלת IGF-1 המגדילה משאבות סידן במעי. שקופית: 23 - כיצד חלבון משפר ספיגת סידן","slides":"","section":"A"},{"n":14,"text":"אילו מהקביעות הבאות לגבי זרחן, קזאין וחלבון ובריאות העצם (כפי שהוצגו במחקרים שנסקרו) נכונות?","options":{"A":"צריכת זרחן גבוהה נמצאה קשורה לאיבוד סידן נמוך יותר בשתן, בניגוד לצפוי מתיאוריית האפר החומצי","B":"ההסבר שהוצע הוא שצריכת זרחן גבוהה קשורה לספיגה חוזרת גבוהה יותר של סידן בכליה","C":"תוספת קזאין (חלבון \"חומצי\") לאחר ניתוחים אורתופדיים נמצאה קשורה למסת עצם גדולה יותר","D":"תוספת קזאין נמצאה קשורה לריפוי מהיר יותר ולמסת שריר גדולה יותר","E":"צריכת חלבון גבוהה, כולל חלבון מן החי, נמצאה קשורה למסת עצם גדולה יותר","F":"צריכת חלבון גבוהה נמצאה קשורה לסיכון מופחת לאוסטיאופורוזיס","G":"כל הממצאים הללו סותרים את תיאוריית האפר החומצי"},"answer":["G"],"multi":false,"explanation":"כל הממצאים הללו הוצגו בשיעור וכולם סותרים את הציפייה מתיאוריית האפר החומצי - זרחן גבוה קשור לפחות איבוד סידן (ולא יותר), קזאין וחלבון גבוה קשורים למסת עצם ושריר גדולה יותר ולריפוי טוב יותר. שקופית: 20 - זרחן, קזאין וחלבון ועצם","slides":"","section":"A"},{"n":15,"text":"אילו מהקביעות הבאות לגבי הקשר בין מזון חומצי לאוסטיאופורוזיס, כפי שהוצגו במחקרים שנסקרו בשיעור, נכונות?","options":{"A":"נמצא קשר חזק ועקבי בין צריכת מזון חומצי לבין אוסטיאופורוזיס בכל האוכלוסיות","B":"חומציות השתן נמצאה כמנבא אמין וחזק לסיכון לאוסטיאופורוזיס","C":"צריכת חלבון גבוהה נמצאה קשורה למסת עצם נמוכה יותר ולסיכון מוגבר לשברים","D":"מטא-אנליזה מ-2011 מצאה סימוכין ברורים לקשר בין הפרשת חומצה בשתן לאובדן סידן מהעצם","E":"חלבון מן החי (המזון החומצי ביותר) נמצא קשור לסיכון מוגבר לשבר בצוואר הירך בנשים לאחר גיל המעבר","F":"מסקנת פנטון (Fenton) הייתה שיש עדות איכותית לכך שעומס חומצה תזונתי מקדם אובדן מינרלים בעצם","G":"חומציות השתן נמצאה מנבאת סיכון לאוסטיאופורוזיס בכל האוכלוסיות ללא יוצא מן הכלל","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"המחקרים שנסקרו הראו את ההפך: אין קשר עקבי בין מזון חומצי לאוסטיאופורוזיס, חומציות השתן אינה מנבאת סיכון (למעט חריג מסוים בגברים קשישים בלבד), חלבון גבוה קשור למסת עצם גבוהה יותר וסיכון מופחת לשבר צוואר הירך, ומסקנת פנטון הייתה שאין עדות לכך שעומס חומצה מקדם אובדן עצם. שקופית: 16-18 - מזון חומצי ואוסטיאופורוזיס","slides":"","section":"A"},{"n":16,"text":"מהם שני הרכיבים ההכרחיים המוזכרים בשיעור לייצור קולגן על ידי פיברובלסטים?","options":{"A":"אספקה של חומצות אמינו וויטמין C","B":"גלוקוז וחמצן בלבד","C":"סידן וויטמין D בלבד","D":"זרחן וגופרית; אבץ וויטמין A","E":"אשלגן ומגנזיום; ברזל וויטמין B12"},"answer":["A"],"multi":false,"explanation":"לייצור קולגן דרושה אספקה של חומצות אמינו וויטמין C, כאשר פיברובלסטים (תאים בוני רקמת חיבור) הם התאים הפועלים בתהליך. שקופית: 14 - ייצור קולגן","slides":"","section":"A"},{"n":17,"text":"אילו שתי טענות נגד הבאות הועלו כלפי \"תאוריית האפר החומצי\" בשיעור?","options":{"A":"הכליות מתעלמות לחלוטין מהתהליך ואינן משפיעות על איזון החומצה בדם","B":"הפרשת חומצה בשתן היא למעשה אחת הדרכים של הגוף להיפטר מעודפי חומצה","C":"הכליות מסוגלות לייצר ביקרבונט (בסיס) בעצמן","D":"חומציות השתן היא האמצעי הבלעדי שבו הגוף נפטר מעודפי חומצה, ואין לכליות תפקיד נוסף","E":"אין לריאות שום תפקיד באיזון חומצה-בסיס","F":"שתן חומצי הוא אינדיקציה ברורה למחלה","G":"מזון חומצי גורם תמיד לירידה מדידה ומיידית ב-pH הדם"},"answer":["B","C"],"multi":true,"explanation":"טענות הנגד המרכזיות היו שהפרשת חומצה בשתן היא מנגנון תקין של הגוף, ושהכליות (בניגוד לטענת ההתעלמות) דווקא כן מייצרות ביקרבונט ומאזנות את החומציות בדם. שקופית: 8 - טענות הנגד","slides":"","section":"A"},{"n":18,"text":"אילו שלוש אסטרטגיות מהבאות הוצעו בשיעור לאיזון בין הצורך בחלבון לבין הסיכונים הפוטנציאליים בגילאי 50-65?","options":{"A":"מעבר לחלבון מן הצומח (כגון קטניות, טופו, אגוזים וזרעים) שמפחית את האפקט המסרטן המיוחס לחלבון גבוה","B":"הימנעות מוחלטת מכל חלבון מכל סוג שהוא","C":"בחירה ב\"אזור הזהב\" - סך חלבון בינוני, לא גבוה מדי ולא נמוך מדי","D":"שילוב אימוני התנגדות (כנגד עומס) כטריגר לבניית עצם ושריר ללא תלות ברמת החלבון בדם","E":"הגדלת צריכת אלכוהול לאיזון החומציות","F":"אכילת חלבון מן החי בלבד ללא כל ירקות או פירות","G":"הפסקת פעילות גופנית לחלוטין כדי לשמר את מסת העצם"},"answer":["A","C","D"],"multi":true,"explanation":"האסטרטגיות שהוצגו כללו מעבר לחלבון מן הצומח, בחירה בכמות חלבון כוללת בינונית (\"אזור הזהב\"), ושילוב אימוני התנגדות כטריגר לבניית עצם ושריר ללא תלות ברמת החלבון בדם. שקופית: 26-27 - אסטרטגיות לגילאי 50-65","slides":"","section":"A"},{"n":19,"text":"אילו מהקביעות הבאות לגבי ג'לטין נכונות, על פי השיעור?","options":{"A":"הוא מיוצר מקולגן שעבר פירוק בלתי הפיך","B":"הוא מיוצר לרוב מעצמות של דגים או בקר","C":"הוא משמש כחומר ג'לי בסוכריות גומי, מרשמלו, קינוחים וגלידות","D":"הוא נמכר כדפים, גרגרים או אבקה","E":"הוא חסר טעם","F":"הוא נחשב פרווה (לא בשרי) על פי היהדות","G":"הוא נמס במים חמים והופך לג'ל כאשר הוא מתקרר"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל התכונות הללו של ג'לטין הוצגו בשיעור במפורש. שקופית: 15 - ג'לטין","slides":"","section":"A"},{"n":20,"text":"אילו מהקביעות הבאות לגבי מחקרו של פרופ' לונגו (Levine et al., 2014) נכונות?","options":{"A":"המחקר הראה שצריכת חלבון גבוהה קשורה לירידה משמעותית בתמותה מסרטן בקרב כלל האוכלוסייה ללא תלות בגיל","B":"המחקר הראה שצריכת חלבון נמוכה קשורה לירידה משמעותית ב-IGF-1, בסרטן ובתמותה כללית - באוכלוסייה מעל גיל 65 בלבד","C":"באוכלוסייה המבוגרת (65+), נמצא שצריכת חלבון גבוהה מגדילה משמעותית את הסיכון לתמותה","D":"המחקר היה מחקר התערבות אקראי (randomized controlled trial) מלא","E":"המחקר לא בדק כלל את הקשר בין חלבון לתמותה","F":"תוצאות המחקר היו זהות לחלוטין בין הקבוצה הצעירה לקבוצה המבוגרת","G":"המחקר מיין את המשתתפים לפי סוג החלבון שאכלו (מן החי מול מן הצומח) בלבד","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"כל הקביעות שגויות: המחקר מצא ירידה בתמותה/סרטן/IGF-1 בעקבות חלבון נמוך רק באוכלוסייה מתחת לגיל 65 (לא מעליו); באוכלוסייה המבוגרת חלבון גבוה דווקא הגן וקשור לירידה בתמותה; המחקר לא היה התערבותי-אקראי אלא מבוסס שאלוני תזונה; והוא לא מיין משתתפים לפי סוג החלבון. שקופית: 25, 28 - מחקר לונגו/לוין","slides":"","section":"A"},{"n":21,"text":"מהו \"ג'לטין\", כפי שהוגדר בשיעור?","options":{"A":"קולגן שעבר פירוק (דנטורציה) באופן בלתי הפיך","B":"חלבון סינתטי שאינו קשור לקולגן","C":"תרכובת סיליקון המשמשת לבניית קולגן","D":"חלבון הנמצא רק בצמחים; הורמון המעודד ייצור קולגן","E":"צורת האגירה של גלוקוז בכבד; חומצת אמינו חיונית לבניית עצם"},"answer":["A"],"multi":false,"explanation":"ג'לטין מיוצר מקולגן שעבר פירוק בלתי הפיך (דנטורציה), לרוב מעצמות דגים או בקר, ולכן נחשב על פי היהדות לפרווה. שקופית: 15 - ג'לטין","slides":"","section":"A"},{"n":22,"text":"לפי ה\"הוכחה הניצחת\" (הנוקאוט) שהוצגה כלפי תאוריית האפר החומצי, אילו שתי קביעות נכונות?","options":{"A":"עלייה בהפרשת סידן בשתן בעקבות אכילת חלבון נובעת בעיקר משיפור ספיגת הסידן במעי הדק, לא מפירוק עצם","B":"התופעה של עלייה בהפרשת סידן בשתן נצפית הן עם חלבון מן החי והן עם חלבון מן הצומח","C":"התופעה נצפית אך ורק עם חלבון מן החי","D":"עלייה בהפרשת סידן בשתן מוכיחה בהכרח פירוק מוגבר של עצם","E":"מחקרים הראו עלייה משמעותית בפרקציית הסידן ממקור עצם בתזונה עתירת חלבון","F":"אין שום הסבר מדעי לתופעה זו","G":"תיאוריית האפר החומצי צדקה במלואה בטענה זו"},"answer":["A","B"],"multi":true,"explanation":"ה\"הוכחה הניצחת\" הראתה שהעלייה בהפרשת סידן בשתן לאחר אכילת חלבון נובעת משיפור ספיגת הסידן במעי (לא מפירוק עצם), ותופעה זו נצפית הן עם חלבון מן החי והן מן הצומח. מחקרים דווקא הראו ירידה (לא עלייה) בפרקציית הסידן ממקור עצם בתזונה עתירת חלבון. שקופית: 21 - הנוקאוט לתיאוריית האפר החומצי","slides":"","section":"A"},{"n":23,"text":"אילו מהמגבלות הבאות של מחקר לונגו הוזכרו בשיעור כסייגים לפרשנות תוצאותיו?","options":{"A":"זה לא היה מחקר התערבות אקראי - המשתתפים מוינו לפי דיווח עצמי בשאלוני תזונה","B":"לא נבדק סוג החלבון (מוצרי חלב, בשר מעובד מול איכותי, עוף מול בקר, דגים)","C":"לא נבדק אם גורמים נלווים כמו ג'אנק פוד וסוכרים בקרב אוכלי חלבון רב תרמו לסיכון שנמצא","D":"המחקר בוצע על קבוצה של 5 משתתפים בלבד","E":"המחקר בדק במפורש תזונה פליאוליתית עם ירקות אורגניים ומצא שהיא מזיקה","F":"המחקר נעשה רק על עכברים ולא על בני אדם","G":"המחקר בדק במפורש דיאטה קטוגנית ומצא שהיא מגדילה סיכון לסרטן"},"answer":["A","B","C"],"multi":true,"explanation":"המגבלות שהוצגו: המחקר לא היה התערבותי אלא מבוסס שאלוני דיווח עצמי; לא הובחן סוג/מקור החלבון; ולא נבדקה תרומת גורמים נלווים כמו מזון מעובד וסוכר. המחקר לא בדק תזונה פליאוליתית או קטוגנית במפורש, ולא בוצע על עכברים. שקופית: 28 - האם לונגו הוכיח","slides":"","section":"A"},{"n":24,"text":"אילו מהקביעות הבאות לגבי תפקידי הורמון IGF-1 נכונות, על פי השיעור?","options":{"A":"הוא הורמון אנבולי, מעין \"קבלן הביצוע\" של הורמון הגדילה","B":"הוא מביא לשכפול של תאי סחוס (כונדרוציטים) שיוצרים בהמשך עצם קשיחה","C":"הוא מפעיל את האוסטאובלסטים שמחדירים סידן לעצמות","D":"הוא מאיץ ייצור חלבונים בתוך תאי שריר ומפעיל תאי גזע של השריר","E":"בזכות דמיון לאינסולין הוא מכניס גלוקוז לתאי השריר","F":"רמות אופטימליות שלו נקשרו לירידה בסיכון לאלצהיימר","G":"הוא חוסם את מנגנון ההתאבדות המתוכנן של התא (אפופטוזיס)"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל התפקידים הללו של IGF-1 הוצגו בשיעור: תפקיד אנבולי, שכפול כונדרוציטים, הפעלת אוסטאובלסטים, בניית שריר והפעלת תאי גזע שריריים, השפעה דמוית אינסולין, הגנה מדמנציה, וחסימת אפופטוזיס (שהיא גם הבסיס לקשר שלו לסרטן). שקופית: 24 - IGF-1","slides":"","section":"A"},{"n":25,"text":"אילו מהקביעות הבאות לגבי הצד השני (החיסרון) של פעילות IGF-1 נכונות, על פי השיעור?","options":{"A":"IGF-1 מאיץ את מנגנון ההתאבדות המתוכננת של התא (אפופטוזיס)","B":"רמות גבוהות של IGF-1 נמצאו קשורות ישירות להאטת תהליכים סרטניים","C":"IGF-1 משדר לתאי הגוף מסר של מחסור באנרגיה, ולכן מעכב חלוקת תאים","D":"רמות גבוהות של IGF-1 מגבירות עמידות של תאים סרטניים מפני מנגנון ההשמדה העצמית של התא","E":"שגשוג יתר של תאים בגיל מבוגר, בזמן שמנגנוני תיקון השכפול חלשים יותר, הוא לעולם לא בעייתי","F":"חלבון מן הצומח מעלה את IGF-1 לרמות גבוהות יותר מחלבון מן החי","G":"אין שום מנגנון ביולוגי המקשר בין IGF-1 לסרטן","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"כל הקביעות הפוכות מהעובדות: IGF-1 חוסם (לא מאיץ) אפופטוזיס; רמות גבוהות שלו קשורות להאצת (לא האטת) תהליכים סרטניים ולעמידות מוגברת (לא ירידה) של תאי סרטן מפני השמדה עצמית; הוא משדר שפע (לא מחסור) המעודד חלוקת תאים; שגשוג יתר בגיל מבוגר עלול להיות בעייתי; וחלבון מן החי (לא מהצומח) מעלה IGF-1 יותר. שקופית: 24 - IGF-1 (החיסרון)","slides":"","section":"A"},{"n":26,"text":"מהו ההסבר החלופי שהוצג בשיעור לקשר שנמצא בין חומציות בנוזל החוץ-תאי לבין התפתחות גידולים?","options":{"A":"הגידול, בהתרבותו המהירה, משחרר חומצה לקטית (מטבוליזם ללא חמצן) לנוזל החוץ-תאי, ולכן החומצה היא תוצאה של הסרטן ולא סיבתו","B":"הגידול מפריש ביקרבונט עודף שגורם לחומציות; מזון חומצי חודר ישירות לגידול וגורם לו לגדול","C":"חומציות הנוזל החוץ-תאי נובעת מזרחן עודף במזון; הקשר בין חומציות לגידולים נובע אך ורק מנשימה לקויה","D":"אין שום הסבר חלופי - החומציות היא בהכרח הגורם לסרטן; חומציות הדם עולה תמיד באזורי גידול בשל ירידה בתפקוד הכליות"},"answer":["A"],"multi":false,"explanation":"ההסבר החלופי שהוצג הוא שהגידול עצמו, במטבוליזם המהיר שלו (גליקוליזה אנאירובית), משחרר חומצה לקטית לסביבתו - כלומר \"לא חמצת שגורמת לסרטן אלא הסרטן שגורם לחמצת\". שקופית: 30 - חומציות מאיצה גידולים","slides":"","section":"A"},{"n":27,"text":"אילו שתי עובדות מחקריות הבאות הוצגו בשיעור בהקשר לתזונה קטוגנית?","options":{"A":"במחקר על עכברים עם גידולי מוח (גליובלסטומה), תזונה קטוגנית הקטינה משמעותית את הגידולים","B":"במחקר על ילדים אפילפטיים, מעבר לתזונה קטוגנית לא גרם לירידה מדידה בחומציות הדם (ה-pH אף עלה מעט)","C":"תזונה קטוגנית נמצאה כגורמת לחמצת מטבולית חמורה וממושכת בכל הנבדקים","D":"תזונה קטוגנית לא נבדקה מעולם בהקשר לגידולים","E":"במחקר הילדים, הזרקת גלוקוז לוריד חיזקה עוד יותר את ההשפעה נגד הפרכוסים","F":"שני המחקרים לא קשורים כלל לנושא החומציות","G":"תזונה קטוגנית הוכחה כמעלה סיכון לסרטן במחקר העכברים"},"answer":["A","B"],"multi":true,"explanation":"מחקר העכברים הראה הקטנה משמעותית של גידולי מוח בעקבות תזונה קטוגנית, ומחקר הילדים האפילפטיים הראה שהמעבר לתזונה קטוגנית לא הפחית (ואף מעט העלה) את ה-pH בדם, למרות ההשפעה האנטי-פרכוסית החזקה (שדווקא בוטלה בעקבות הזרקת גלוקוז). שקופית: 32, 35 - תזונה קטוגנית וחומציות/סרטן","slides":"","section":"A"},{"n":28,"text":"אילו משלושת הגורמים הבאים הוצגו בשיעור כ\"אויבים האמיתיים\" לבריאות העצם (אוסטיאופורוזיס), להבדיל מ\"תזונה חומצית\" עצמה שהתאוריה לגביה הופרכה?","options":{"A":"עודף סוכר בתזונה","B":"עודף ישיבה וחוסר בפעילות גופנית ועומס על השלד","C":"תזונה דלת חלבון (חסר חלבון)","D":"תזונה חומצית כשלעצמה","E":"צריכת יתר של ירקות ופירות","F":"עודף פעילות גופנית מאומצת","G":"עודף חלבון מן הצומח"},"answer":["A","B","C"],"multi":true,"explanation":"האויבים האמיתיים שהוצגו בשיעור כללו עודף סוכר, תזונה דלת חלבון, וחוסר פעילות גופנית/עומס על השלד (וגם חוסר מגנזיום/ויטמין D) - ולא תזונה חומצית כשלעצמה, שהתאוריה בעניינה הופרכה. שקופית: 36 - שורה תחתונה","slides":"","section":"A"},{"n":29,"text":"אילו מהקביעות הבאות תואמות את \"שורת התחתונה\" שהוצגה בסיום השיעור?","options":{"A":"תיאוריית \"הפסולת החומצית\" הופרכה","B":"תזונה בסיסית (הגורמת לשתן בסיסי) עדיין נחשבת בריאה ומומלצת","C":"תזונה בסיסית ככל הנראה בריאה לא בגלל היותה בסיסית, אלא כי היא מחייבת אכילת הרבה פירות וירקות","D":"תזונה בסיסית אינה חייבת להיות טבעונית ויכולה לכלול גם מזון מן החי","E":"עודף סוכר ותזונה דלת חלבון נמנים על האויבים האמיתיים לבריאות העצם","F":"חוסר בפעילות גופנית ועומס על השלד הוא אחד האויבים המשמעותיים ביותר לבריאות העצם","G":"חוסר במגנזיום נמנה גם הוא על גורמי הסיכון לבריאות העצם שהוזכרו"},"answer":["A","B","C","D","E","F","G"],"multi":true,"explanation":"כל הקביעות הללו סוכמו במפורש בשקופית המסכמת: התיאוריה הופרכה, תזונה בסיסית עדיין מומלצת (אך בזכות הפירות/ירקות ולא בזכות הבסיסיות עצמה), אינה חייבת להיות טבעונית, והאויבים האמיתיים לעצם הם עודף סוכר, מיעוט חלבון, חוסר מגנזיום וחוסר פעילות גופנית. שקופית: 36 - שורה תחתונה","slides":"","section":"A"},{"n":30,"text":"אילו מהקביעות הבאות נכונות?","options":{"A":"לתיאוריה הנבדקת בשיעור (הקושרת בין מזון חומצי לאוסטיאופורוזיס) יש שם מקובל: \"hyperinsulinemia hypothesis\"","B":"הריאות אינן מעורבות כלל באיזון חומצה-בסיס בדם","C":"קצב הנשימה אינו יכול להשפיע על רמת החומציות בדם","D":"איבוד ביקרבונט מהיר ובלתי מבוקר בשתן הוא הסיבה המרכזית לחמצת בעקבות מזון חומצי","E":"הכליה, כשהיא \"כבויה\" ותופסת נתרן בעודף, מוציאה במקומו ביקרבונט בלבד ולעולם לא מימן","F":"תיאוריה זו נקראת \"insulin resistance hypothesis of osteoporosis\"","G":"הפרשת חומצה בשתן מהווה סימן מובהק וברור למחלה חמורה","N":"אף אחת מהתשובות אינה נכונה"},"answer":["N"],"multi":false,"explanation":"כל הקביעות שגויות: לריאות יש תפקיד באיזון חומצה-בסיס וקצב הנשימה כן יכול להשפיע על חומציות הדם; אין איבוד ביקרבונט בשתן (יש ספיגה חוזרת); לתיאוריה הנבדקת יש שם מקובל - \"acid-ash hypothesis of osteoporosis\" (לא השמות שהוצעו כאן); והפרשת חומצה בשתן היא מנגנון תקין ולא סימן למחלה. שקופית: 7-10, 19 - טענות נגד, ריאות, ביקרבונט","slides":"","section":"A"},{"n":1,"text":"מטופלת בת 62 עם אוסטיאופניה קראה באינטרנט שיש להימנע לחלוטין מבשר, ביצים, דגים ומוצרי חלב כי הם \"מזון חומצי\" הפוגע בעצמות, ועברה לתזונה טבעונית דלה מאוד בחלבון. בבדיקה נמצאת חולשת שרירים קלה. מה הייעוץ המבוסס ביותר על החומר שנלמד?","options":{"A":"אין קשר מוכח בין מזון חומצי לאוסטיאופורוזיס, ודווקא צריכת חלבון נמוכה מדי (גם מהצומח) עלולה לפגוע במסת העצם ולתרום לחולשת שרירים - יש לשקול הגדלת צריכת החלבון","B":"יש להפסיק מיד כל צריכת פירות וירקות; יש להימנע מוויטמין C כי הוא \"מחמצן\"","C":"אין כל צורך בחלבון לבניית עצם או קולגן; יש להחליף מיד לתזונה קטוגנית עתירת בשר בלבד","D":"הייעוץ נכון לחלוטין - יש להימנע לגמרי ממזון מן החי כדי להגן על העצמות; חומציות השתן שלה היא האינדיקטור הקובע לבריאות העצם ויש לעקוב אחריה בלבד"},"answer":["A"],"multi":false,"explanation":"המחקרים שנסקרו הראו שאין קשר בין מזון חומצי לאוסטיאופורוזיס, ולעומת זאת חלבון נמוך מדי (כולל מהצומח) קשור לפגיעה במסת העצם, חולשת שרירים וסיכון מוגבר לשברים - ולכן הימנעות גורפת מחלבון עלולה להזיק. שקופית: 16-18, 29 - מזון חומצי, אוסטיאופורוזיס וחלבון","slides":"","section":"B"},{"n":2,"text":"גבר בן 74 אושפז לאחר שבר בצוואר הירך. מבירור עולה כי הוא צורך תזונה דלה בחלבון מחשש שחלבון \"מחמיץ\" את הדם ופוגע בעצמות. מהי ההמלצה הנתמכת בראיות שהוצגו בשיעור?","options":{"A":"להעלות בהדרגה את צריכת החלבון (כולל מן החי), שכן צריכת חלבון נמוכה נצפית לא פעם אצל מבוגרים עם שבר צוואר ירך, ובגילאים אלו חלבון גבוה יותר קשור לירידה בתמותה","B":"יש להעלות רק פחמימות ולא חלבון; חלבון אינו רלוונטי לשיקום לאחר שבר","C":"יש להוריד את צריכת החלבון עוד יותר; להפסיק אכילת פירות וירקות באופן מיידי","D":"יש להימנע לחלוטין מכל מוצר מן החי גם לאחר השבר; להמשיך בדיוק באותה תזונה - החשש שלו מוצדק לחלוטין"},"answer":["A"],"multi":false,"explanation":"הראיות מהשיעור מראות שצריכת חלבון נמוכה נמצאת לא פעם במבוגרים עם שבר צוואר ירך, ושבגילאי 65 ומעלה צריכת חלבון גבוהה (כולל מן החי) קשורה לירידה בתמותה ובסיכון - ולכן יש להעלות ולא להוריד את צריכת החלבון. שקופית: 23, 29 - חוסר חלבון ושבר צוואר הירך; חלבון בגיל 65+","slides":"","section":"B"},{"n":3,"text":"מטופל הנמצא בדיאטה קטוגנית בדק בעצמו את חומציות השתן בעזרת רצועות בדיקה ביתיות, וגילה ערך חומצי מאוד. הוא מבוהל וחושב שהדם שלו \"הפך לחומצי\" וזה עלול לפגוע בעצמותיו. מה ההסבר הנכון שיש לתת לו?","options":{"A":"חומציות השתן היא אחת הדרכים התקינות של הגוף להיפטר מעודפי חומצה, ואינה מעידה על חומציות הדם - שנשארת מוסדרת בטווח צר (כ-7.35-7.45) ללא קשר לתזונה; מחקר על ילדים בדיאטה קטוגנית אף הראה שאין ירידה בחומציות הדם","B":"יש להפסיק מיד כל צריכת שומן; יש להזריק לו ביקרבונט מיידית למניעת נזק לעצם","C":"חומציות שתן חומצית פירושה שהכליות אינן מתפקדות כלל; שתן חומצי הוא הוכחה מדעית מוצקה לאוסטיאופורוזיס עתידי","D":"עליו לשתות כמות גדולה של סודה לשתייה כדי לנטרל את החומציות בדם; חומציות השתן אכן משקפת ישירות את חומציות הדם, ועליו להפסיק את הדיאטה מיד"},"answer":["A"],"multi":false,"explanation":"חומציות השתן היא מנגנון תקין של פינוי חומצה ואינה מעידה על חומציות הדם, שנשארת מאוזנת בטווח צר; מחקר על תזונה קטוגנית בילדים הראה שאין שינוי (ואף עלייה קלה) ב-pH הדם למרות שתן חומצי מאוד. שקופית: 7-8, 35 - חומציות שתן מול דם, latent acidosis, מחקר הילדים הקטוגני","slides":"","section":"B"},{"n":4,"text":"מטופל בריא בן 45 שמע שיש טענה כי גם אם הכליות מאזנות היטב את החומציות כרגע, ייתכן שנזק \"שקט\" מצטבר יגרם לאורך עשרות שנים מחמצת קלה בתחום התקין. הוא שואל אם יש להיבהל מכך. מהי התשובה המדויקת ביותר בהתאם למה שהוצג בשיעור?","options":{"A":"זו טענה ספקולטיבית שהמרצה ציין במפורש שטרם נמצאו מחקרים התומכים בה, ומנגד קיימות עדויות (כמו שבטים של ציידים-לקטים על תזונה חומצית מאוד) שאינן תומכות בקיומו של נזק כזה","B":"אין שום מחלוקת בנושא זה כלל; יש להפסיק לחלוטין כל צריכת חלבון עקב טענה זו","C":"הטענה כבר הופרכה במפורש על ידי עשרות מחקרי אורך; הטענה מתייחסת רק לילדים ואינה רלוונטית למבוגרים","D":"זו עובדה מדעית מוכחת חד-משמעית שיש לפעול לפיה מיד; הטענה הוכחה במלואה במחקר על עכברים עם גליובלסטומה"},"answer":["A"],"multi":false,"explanation":"זו טענה שהוצגה כספקולציה בלבד (\"טרם מצאתי מחקרים שתומכים בטענות אלו\"), ומנגד קיימת עדות עקיפה משבטים על תזונה חומצית מאוד שאינם סובלים משכיחות סרטן/פגיעה גבוהה יותר. שקופית: 34 - טענות נגד לטענות הנגד","slides":"","section":"B"},{"n":5,"text":"מטופלת המתקשה לשפר את ספיגת הסידן שלה שואלת אם משנה מתי ועם מה היא נוטלת תוסף סידן. מה ההמלצה המבוססת ביותר על שלושת המנגנונים שהוצגו בשיעור?","options":{"A":"עדיף ליטול את הסידן יחד עם ארוחה עשירה בחלבון, שכן חלבון מעלה חומציות קיבה (משפרת המסת מלחי סידן), מכיל חומצות אמינו שנקשרות לסידן ומונעות עיכוב ספיגה, ומפעיל IGF-1 שמגדיל משאבות סידן במעי","B":"עדיף ליטול את הסידן יחד עם אלכוהול; אין שום השפעה של חלבון על ספיגת סידן","C":"יש ליטול את הסידן רק בלילה על קיבה ריקה; חלבון פוגע בספיגת סידן ולכן יש להפרידם בזמן","D":"עדיף ליטול סידן על קיבה ריקה לגמרי וללא כל מזון; יש להימנע לחלוטין מחלבון בסמוך לנטילת הסידן כדי לא \"לבזבז\" סידן בשתן"},"answer":["A"],"multi":false,"explanation":"שלושת המנגנונים שהוצגו (עלייה בחומציות קיבה, קשירת חומצות אמינו לסידן, הפעלת IGF-1) כולם משפרים ספיגת סידן כאשר הוא נלקח יחד עם ארוחה עשירה בחלבון. שקופית: 23 - כיצד חלבון משפר ספיגת סידן","slides":"","section":"B"},{"n":6,"text":"אישה בת 58 אוכלת הרבה חלבון מן החי ומודאגת מהקשר בין חלבון גבוה ל-IGF-1 ולסיכון לסרטן שנמצא במחקר לונגו. היא לא מוכנה לוותר לגמרי על חלבון אך רוצה למזער סיכון. מהי האסטרטגיה המתאימה ביותר שהוצגה בשיעור עבור טווח הגילאים שלה?","options":{"A":"לעבור בעיקר לחלבון מן הצומח (קטניות, טופו, אגוזים, זרעים) ולשמור על סך חלבון בינוני, ולשלב אימוני התנגדות סדירים כטריגר לבניית עצם ושריר ללא תלות ברמת החלבון בדם","B":"להפסיק לגמרי כל צריכת חלבון; לצרוך רק שומן וללא כל חלבון","C":"להגדיל את כמות החלבון מן החי פי שלוש; להפסיק כל פעילות גופנית כדי \"לחסוך אנרגיה\"","D":"לעבור לצריכת אלכוהול מוגברת לאיזון החומציות; להמשיך בדיוק באותה כמות חלבון מן החי ולא לשנות דבר"},"answer":["A"],"multi":false,"explanation":"עבור טווח הגילאים 50-65 הוצעה אסטרטגיית \"מיצוע\" - מעבר עיקרי לחלבון מן הצומח (שבו האפקט המעלה IGF-1 חלש יותר), שמירה על כמות חלבון כוללת בינונית, ושילוב אימוני התנגדות כטריגר עצמאי לבניית עצם ושריר. שקופית: 26-27 - אסטרטגיות לגילאי 50-65","slides":"","section":"B"},{"n":7,"text":"מטופל סוכרתי סובל משבריריות עצם חריגה יחסית לצפיפות המינרלים הנמדדת בבדיקת צפיפות עצם (DEXA) שנראית תקינה יחסית. מהו ההסבר הפיזיולוגי הסביר ביותר לכך על סמך החומר שנלמד?","options":{"A":"ברמות סוכר גבוהות עלולים להיווצר קשרים מצליבים לא-אנזימטיים פגומים (עקב גליקציה) בין סיבי הקולגן בעצם, המוחלשים ומשפיעים על איכות/חוזק העצם גם כאשר צפיפות המינרלים תקינה יחסית - תופעה שנמצאה בשכיחות גבוהה גם בחולי סכרת","B":"הבעיה נובעת אך ורק מעודף סידן בדם; יש להפסיק לו לחלוטין את הטיפול באינסולין","C":"שבריריות העצם בסוכרת נובעת מעודף ויטמין D; הבעיה נובעת מכך שהוא אוכל יותר מדי חלבון מן הצומח","D":"אין שום קשר ידוע בין רמת הסוכר לאיכות סיבי הקולגן; סוכרת אינה קשורה כלל לאיכות העצם, מדובר בטעות מדידה"},"answer":["A"],"multi":false,"explanation":"קשרים מצליבים לא-אנזימטיים הנוצרים עקב גליקציה (קישור גלוקוז לקולגן) מוחלשים ופוגעים באיכות רשת הקולגן והשפעתה על מינרליזציה, ונמצאו בשכיחות גבוהה הן בחולי אוסטיאופורוזיס והן בחולי סכרת - גם כאשר צפיפות המינרלים הנמדדת תקינה יחסית. שקופית: 13, 15 - קשרים מצליבים, גליקציה וסוכרת","slides":"","section":"B"},{"n":8,"text":"מטופל אונקולוגי קרא שגידולים \"אוהבים סביבה חומצית\" והחליט להימנע לחלוטין מכל מזון חומצי (כולל חלבון) כדי \"להרעיב\" את הגידול. הוא שואל את דעתך המבוססת על החומר שנלמד. מה נכון להשיב לו?","options":{"A":"ייתכן שהחומציות באזור הגידול נובעת דווקא מכך שהגידול עצמו משחרר חומצה לקטית בקצב חילוף החומרים המהיר שלו, כלומר ייתכן שהסרטן גורם לחמצת ולא להיפך; אין עדות ישירה לכך שמזון חומצי גורם לסרטן, ואם רוצים להפחית חומציות מומלץ להגדיל פירות וירקות ולא להימנע מחלבון","B":"יש לעבור מיד לתזונה קטוגנית - זהו טיפול מוכח לחלוטין בבני אדם על סמך החומר שנלמד","C":"אין כל קשר בין מטבוליזם של תאי גידול לחומציות סביבתם; יש להימנע מכל פעילות גופנית כדי להפחית ייצור חומצה לקטית","D":"ההימנעות מחלבון היא הדרך המומלצת והמוכחת ביותר להילחם בגידול; יש להימנע לחלוטין גם מפירות וירקות; חומציות היא הגורם היחיד הידוע להתפתחות סרטן"},"answer":["A"],"multi":false,"explanation":"ההסבר החלופי שהוצג הוא שהגידול, בהתרבותו המהירה, משחרר חומצה לקטית לסביבתו - כלומר ייתכן שהסרטן גורם לחמצת ולא להפך. אין עדות ישירה לקשר בין חמצת תזונתית לסרטן, וההמלצה היא הגדלת פירות וירקות ולא הימנעות מחלבון. מחקר העכברים על תזונה קטוגנית וגליובלסטומה הוא ממצא מעכברים בלבד ולא הוכחה קלינית מלאה בבני אדם. שקופית: 30, 32 - חומציות וגידולים","slides":"","section":"B"},{"n":9,"text":"מטופל בתזונה דלת פחמימות שואל האם עליו להימנע מקינואה וכוסמת מכיוון ש\"עמילן הוא מזון חומצי\". מה ההסבר המדויק שיש לתת לו, בהתאם למה שנלמד?","options":{"A":"עמילן כשלעצמו הוא מזון ניטרלי; ההשפעה החומצית של מזונות עמילניים כמו קינואה וכוסמת נובעת מכך שהם זרעים העשירים בזרחן, לא מהעמילן עצמו","B":"קינואה וכוסמת אינן מכילות עמילן כלל; זרחן הוא מרכיב בסיסי (לא חומצי) במזון","C":"עמילן הוא תמיד המזון החומצי ביותר הקיים; יש להימנע מכל הזרעים לחלוטין ללא יוצא מן הכלל","D":"עמילן הופך חומצי רק כאשר משלבים אותו עם ירקות; אין כל הבדל בין עמילן לסוכר מבחינת השפעתם על חומציות השתן, שניהם חומציים"},"answer":["A"],"multi":false,"explanation":"עמילן עצמו הוא מזון ניטרלי; ההשפעה החומצית של מזונות עמילניים כמו קינואה, כוסמת וחיטה נובעת מתכולת הזרחן שבזרעים אלו, ולא מהעמילן עצמו. שקופית: 5 - חידון חומצי, עמילן וזרחן","slides":"","section":"B"},{"n":10,"text":"מטופל בן 82 עם תפקוד כלייתי ירוד יחסית שואל אם עליו לדאוג במיוחד מ\"מזון חומצי\" בגלל גילו. איזו תשובה משקפת בצורה המאוזנת ביותר את החומר שנלמד?","options":{"A":"קיימת טענה (לא מוכחת עדיין במחקרים שהוצגו) שתפקוד כלייתי פוחת עם הגיל ועלול להפחית ייצור ביקרבונט לאורך זמן, אך זו נותרת השערה שהמרצה ציין שטרם נמצאו מחקרים התומכים בה ישירות, ומרבית העדויות שהוצגו בשיעור לא מצאו קשר בין מזון חומצי לנזק לעצם/גידולים גם באוכלוסייה מבוגרת","B":"מומלץ להימנע מכל חלבון בגלל גילו בלבד; תפקוד כלייתי אינו קשור כלל לאיזון חומצה-בסיס","C":"יש להימנע לגמרי מכל מזון מלבד ירקות בגלל גילו; יש להגדיל מיד תרופות משתנות כדי \"לשטוף\" חומצה","D":"חומציות השתן שלו היא המדד היחיד שצריך לעקוב אחריו; בגילו אין שום סיבה לדאגה כלל, שכן תפקוד הכליות משתפר עם הגיל"},"answer":["A"],"multi":false,"explanation":"השיעור התייחס לטענה שתפקוד כלייתי פוחת עם הגיל וכי חמצת קלה כרונית עלולה להזיק לאורך שנים רבות, אך ציין במפורש שזו השערה שטרם נמצאו לה מחקרים תומכים, בעוד שרוב הראיות שהוצגו לא מצאו קשר בין מזון חומצי לנזק לעצם. שקופית: 34 - טענות נגד לטענות הנגד (גיל ותפקוד כלייתי)","slides":"","section":"B"},{"n":9000,"text":"תזונה בסיסית (הגורמת לשתן בסיסי) עדיין נחשבת בריאה ומומלצת — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["A"],"multi":false,"explanation":"המשפט נכון על פי החומר. כל הקביעות הללו סוכמו במפורש בשקופית המסכמת: התיאוריה הופרכה, תזונה בסיסית עדיין מומלצת (אך בזכות הפירות/ירקות ולא בזכות הבסיסיות עצמה), אינה חייבת להיות טבעונית, והאויבים האמיתיים לעצם הם עודף סוכר, מיעוט חלבון, חוסר מגנזיום וחוסר פעילות גופנית. שקופית: 36 - שורה תחתונה","slides":"","section":"A","tf":1},{"n":9001,"text":"חלבון מן החי (המזון החומצי ביותר) נמצא קשור לסיכון מוגבר לשבר בצוואר הירך בנשים לאחר גיל המעבר — נכון או שגוי?","options":{"A":"נכון","B":"שגוי"},"answer":["B"],"multi":false,"explanation":"המשפט שגוי על פי החומר. המחקרים שנסקרו הראו את ההפך: אין קשר עקבי בין מזון חומצי לאוסטיאופורוזיס, חומציות השתן אינה מנבאת סיכון (למעט חריג מסוים בגברים קשישים בלבד), חלבון גבוה קשור למסת עצם גבוהה יותר וסיכון מופחת לשבר צוואר הירך, ומסקנת פנטון הייתה שאין עדות לכך שעומס חומצה מקדם אובדן עצם. שקופית: 16-18 - מזון חומצי ואוסטיאופורוזיס","slides":"","section":"A","tf":1},{"n":9002,"tex
